<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRUTAL_AGENT_LAB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --main-yellow: #FFDE03;
            --main-bg: #FFFFFF;
            --main-border: #000000;
        }
        body {
            background-color: var(--main-bg);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .brutal-card {
            background: white;
            border: 4px solid var(--main-border);
            box-shadow: 8px 8px 0px 0px var(--main-border);
            transition: all 0.1s ease;
        }
        .brutal-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px 0px var(--main-border);
        }
        .brutal-btn {
            background: var(--main-yellow);
            border: 3px solid var(--main-border);
            box-shadow: 4px 4px 0px 0px var(--main-border);
            font-weight: 900;
            text-transform: uppercase;
        }
        .brutal-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px var(--main-border);
        }
        .brutal-input {
            border: 3px solid var(--main-border);
            box-shadow: 4px 4px 0px 0px var(--main-border);
        }
        /* 长方形变色动画 */
        .thinking-box {
            width: 12px;
            height: 24px;
            background: var(--main-yellow);
            animation: colorShift 1s infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes colorShift {
            0%, 100% { background: var(--main-yellow); }
            25% { background: #4ECDC4; }
            50% { background: #FF6B6B; }
            75% { background: #4B7BEC; }
        }
        /* 响应式侧边栏遮罩 */
        #mobile-overlay {
            display: none;
            background: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="border-b-[4px] border-black p-4 bg-white flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <div class="bg-black text-white p-2 text-xl rotate-[-2deg]">
                <i class="fas fa-bolt"></i>
            </div>
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">Brutal_Agent</h1>
        </div>
        <div class="flex gap-4">
            <button class="brutal-btn px-4 py-2 hidden md:block">Login_User</button>
            <button id="sidebar-toggle" class="lg:hidden w-12 h-12 brutal-card flex items-center justify-center text-2xl border-2 border-black">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <div class="flex-1 flex overflow-hidden">
        
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-80 bg-[#FF6B6B] border-r-[4px] border-black transform -translate-x-full lg:translate-x-0 lg:relative transition-transform duration-200 p-6 overflow-y-auto">
            <h2 class="text-xl font-black mb-6 border-b-2 border-black pb-2 uppercase italic">Settings // 配置</h2>
            
            <div class="space-y-6">
                <div class="brutal-card p-4 bg-black text-white">
                    <label class="block font-black text-xs uppercase mb-2">AI_URL</label>
                    <input type="text" id="ai-url" value="http://localhost:5000/v1/chat/completions" class="w-full bg-white border-2 border-black font-bold p-2 outline-none text-black">
                </div>

                <div class="brutal-card p-4 bg-[#4ECDC4]">
                    <label class="block font-black text-xs uppercase mb-2">API_KEY</label>
                    <input type="text" id="api-key" value="sk-no-key-required" class="w-full bg-white border-2 border-black font-bold p-2 outline-none text-black">
                </div>

                <div class="brutal-card p-4">
                    <label class="block font-black text-sm uppercase mb-2">Model_Engine</label>
                    <input type="text" id="model-engine" value="qwen2.5:0.5b" class="w-full bg-white border-2 border-black font-bold p-2 outline-none text-black">
                </div>

                <div class="brutal-card p-4 bg-[#4ECDC4]">
                    <label class="block font-black text-sm uppercase mb-2">Creativity_Level</label>
                    <input type="range" class="w-full accent-black cursor-pointer">
                </div>

                <div class="space-y-4">
                    <button class="brutal-btn w-full py-4 text-lg bg-white">Clear_Context</button>
                    <button class="brutal-btn w-full py-4 text-lg">Save_Agent</button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col bg-[#F7F7F7] p-4 lg:p-8 relative overflow-hidden">
            <div class="flex-1 overflow-y-auto space-y-6 pb-20 px-2">
                
                <div class="flex items-start gap-4">
                    <div class="w-12 h-12 brutal-card flex-shrink-0 flex items-center justify-center bg-blue-400 text-white text-xl">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="brutal-card p-5 max-w-2xl font-bold leading-tight">
                        <p>READY_TO_PROCEED. 系统已就绪。新野兽派风格加载完成。这种风格不讲究呼吸感，讲究的是【态度】。请输入指令。</p>
                    </div>
                </div>

                <div class="flex items-start gap-4 flex-row-reverse">
                    <div class="w-12 h-12 brutal-card flex-shrink-0 flex items-center justify-center bg-yellow-400 text-black text-xl">
                        <i class="fas fa-terminal"></i>
                    </div>
                    <div class="brutal-card p-5 max-w-2xl font-bold bg-white italic shadow-[6px_6px_0px_0px_rgba(78,205,196,1)]">
                        告诉我，为什么这个界面这么多黑框？
                    </div>
                </div>

                <div class="flex items-start gap-4">
                    <div class="w-12 h-12 brutal-card flex-shrink-0 flex items-center justify-center bg-blue-400 text-white text-xl">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="brutal-card p-5 max-w-2xl font-bold leading-tight">
                        <p>因为黑框代表了坚固和明确。在新野兽派中，我们拒绝微妙，我们选择直接。这种 UI 极其适合高效率的 Agent 调试，因为每一个交互点都像石头一样清晰。</p>
                    </div>
                </div>
            </div>

            <div class="absolute bottom-4 left-0 right-0 px-4 lg:px-12">
                <div class="max-w-5xl mx-auto flex gap-3 lg:gap-4">
                    <input id="chat-input" type="text" class="brutal-input flex-1 p-3 lg:p-5 text-lg font-black outline-none placeholder-gray-400" placeholder="TYPE_COMMAND_HERE...">
                    <button class="brutal-btn px-4 lg:px-8 text-xl bg-[#4ECDC4] hover:bg-[#3db7ae]">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </main>

        <aside class="hidden xl:flex w-72 flex-col p-6 bg-white border-l-[4px] border-black overflow-y-auto">
            <h2 class="text-xl font-black mb-6 uppercase italic">Telemetry</h2>
            <div class="space-y-6">
                <div class="brutal-card p-4 bg-black text-white">
                    <p class="text-[10px] mb-1">TOKEN_USAGE</p>
                    <p class="text-3xl font-black">4,902</p>
                </div>
                <div class="brutal-card p-4 bg-yellow-400">
                    <p class="text-[10px] mb-1 font-black">LATENCY</p>
                    <p class="text-3xl font-black text-white shadow-text" style="text-shadow: 2px 2px 0 #000;">12ms</p>
                </div>
                <div class="brutal-card p-4">
                    <p class="text-[10px] mb-4 font-black">Ainput_PLUGINS</p>
                    <ul class="text-xs font-black space-y-2">
                        <li><i class="fas fa-check-square mr-2"></i>PYTHON_VENV</li>
                        <li><i class="fas fa-check-square mr-2"></i>FILE_SYSTEM</li>
                        <li><i class="fas fa-square mr-2 text-gray-300"></i>SEARCH_API</li>
                    </ul>
                </div>
            </div>
        </aside>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const toggle = document.getElementById('sidebar-toggle');
        const chatInput = document.getElementById('chat-input');
        const chatContainer = document.querySelector('.flex-1.overflow-y-auto');
        const aiUrlInput = document.getElementById('ai-url');
        const apiKeyInput = document.getElementById('api-key');
        const modelEngineSelect = document.getElementById('model-engine');
        
        function loadSettings() {
            const savedUrl = localStorage.getItem('ai_url');
            const savedKey = localStorage.getItem('api_key');
            const savedModel = localStorage.getItem('model_engine');
            
            if (savedUrl) aiUrlInput.value = savedUrl;
            if (savedKey) apiKeyInput.value = savedKey;
            if (savedModel) modelEngineSelect.value = savedModel;
        }
        
        function saveSettings() {
            localStorage.setItem('ai_url', aiUrlInput.value);
            localStorage.setItem('api_key', apiKeyInput.value);
            localStorage.setItem('model_engine', modelEngineSelect.value);
        }
        
        loadSettings();
        
        let conversationHistory = [
            { role: 'system', content: '你是一个高效、直接的AI助手，用简洁有力的方式回答问题。' },
            { role: 'assistant', content: 'READY_TO_PROCEED. 系统已就绪。新野兽派风格加载完成。这种风格不讲究呼吸感，讲究的是【态度】。请输入指令。' }
        ];
        
        toggle.addEventListener('click', () => {
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
            } else {
                sidebar.classList.add('-translate-x-full');
            }
        });

        function createUserMessage(text) {
            return `
                <div class="flex items-start gap-4 flex-row-reverse">
                    <div class="w-12 h-12 brutal-card flex-shrink-0 flex items-center justify-center bg-yellow-400 text-black text-xl">
                        <i class="fas fa-terminal"></i>
                    </div>
                    <div class="brutal-card p-5 max-w-2xl font-bold bg-white italic shadow-[6px_6px_0px_0px_rgba(78,205,196,1)]">
                        ${escapeHtml(text)}
                    </div>
                </div>
            `;
        }

        function createAIMessage(text) {
            return `
                <div class="flex items-start gap-4">
                    <div class="w-12 h-12 brutal-card flex-shrink-0 flex items-center justify-center bg-blue-400 text-white text-xl">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="brutal-card p-5 max-w-2xl font-bold leading-tight">
                        <p>${escapeHtml(text)}</p>
                    </div>
                </div>
            `;
        }

        function createLoadingMessage() {
            return `
                <div class="flex items-start gap-4" id="loading-message">
                    <div class="w-12 h-12 brutal-card flex-shrink-0 flex items-center justify-center bg-blue-400 text-white text-xl">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="brutal-card p-5 max-w-2xl font-bold leading-tight">
                        <p><div class="thinking-box"></div> <span class="ml-0">THINKING...</span></p>
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            chatInput.value = '';
            conversationHistory.push({ role: 'user', content: message });
            chatContainer.insertAdjacentHTML('beforeend', createUserMessage(message));
            chatContainer.insertAdjacentHTML('beforeend', createLoadingMessage());
            scrollToBottom();

            try {
                const response = await fetch(aiUrlInput.value, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKeyInput.value}`
                    },
                    body: JSON.stringify({
                        model: modelEngineSelect.value,
                        messages: conversationHistory
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                conversationHistory.push({ role: 'assistant', content: aiResponse });
                
                const loadingMsg = document.getElementById('loading-message');
                if (loadingMsg) loadingMsg.remove();
                
                chatContainer.insertAdjacentHTML('beforeend', createAIMessage(aiResponse));
                scrollToBottom();

            } catch (error) {
                const loadingMsg = document.getElementById('loading-message');
                if (loadingMsg) loadingMsg.remove();
                
                chatContainer.insertAdjacentHTML('beforeend', createAIMessage(`ERROR: ${error.message}`));
                scrollToBottom();
            }
        }

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        document.querySelector('.fa-arrow-right').parentElement.addEventListener('click', sendMessage);
        
        document.querySelector('button:contains("Save_Agent")')?.addEventListener('click', saveSettings);
    </script>
</body>
</html>
