<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BRUTAL_AGENT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --main-yellow: #FFDE03;
            --main-bg: #FFFFFF;
            --main-border: #000000;
        }
        body {
            background-color: var(--main-bg);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .brutal-card {
            background: white;
            border: 4px solid var(--main-border);
            box-shadow: 8px 8px 0px 0px var(--main-border);
            transition: all 0.1s ease;
        }
        .brutal-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px 0px var(--main-border);
        }
        .brutal-btn {
            background: var(--main-yellow);
            border: 3px solid var(--main-border);
            box-shadow: 4px 4px 0px 0px var(--main-border);
            font-weight: 900;
            text-transform: uppercase;
        }
        .brutal-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px 0px var(--main-border);
        }
        .brutal-input {
            border: 3px solid var(--main-border);
            box-shadow: 4px 4px 0px 0px var(--main-border);
        }
        /* 长方形变色动画 */
        .thinking-box {
            width: 12px;
            height: 24px;
            background: var(--main-yellow);
            animation: colorShift 1s infinite;
            display: inline-block;
            vertical-align: middle;
        }
        @keyframes colorShift {
            0%, 100% { background: var(--main-yellow); }
            25% { background: #4ECDC4; }
            50% { background: #FF6B6B; }
            75% { background: #4B7BEC; }
        }
        /* 响应式侧边栏遮罩 */
        #mobile-overlay {
            display: none;
            background: rgba(0,0,0,0.5);
        }
        
        /* 模态框样式 */
        .hidden {
            display: none;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <nav class="border-b-[4px] border-black p-4 bg-white flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <div class="bg-black text-white p-2 text-xl rotate-[-2deg]">
                <i class="fas fa-bolt"></i>
            </div>
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">Brutal_Agent</h1>
        </div>
        <div class="flex gap-4">
            <button class="brutal-btn px-4 py-2 hidden md:block">Login_User</button>
            <div class="relative">
                <button id="mobile-menu-toggle" class="lg:hidden w-12 h-12 brutal-card flex items-center justify-center text-2xl border-2 border-black">
                    <i class="fas fa-bars"></i>
                </button>
                <div id="mobile-menu" class="absolute right-0 top-14 w-48 bg-white border-2 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] hidden flex-col z-50">
                    <button id="toggle-settings-btn" class="brutal-btn w-full py-3 text-left px-4 border-b-2 border-black">
                        <i class="fas fa-cog mr-2"></i>Settings
                    </button>
                    <button id="toggle-telemetry-btn" class="brutal-btn w-full py-3 text-left px-4">
                        <i class="fas fa-chart-line mr-2"></i>Statistics
                    </button>
                </div>
            </div>
            <button id="telemetry-toggle" class="hidden w-12 h-12 brutal-card flex items-center justify-center text-2xl border-2 border-black">
                <i class="fas fa-chart-line"></i>
            </button>
        </div>
    </nav>

    <div class="flex-1 flex overflow-hidden">
        
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-80 bg-[#FF6B6B] border-r-[4px] border-black transform -translate-x-full lg:translate-x-0 lg:relative transition-transform duration-200 p-6 overflow-y-auto pt-28 lg:pt-6">
            <div class="flex justify-between items-center mb-2 pb-2 gap-4">
                <h2 class="text-xl font-black uppercase italic">Settings // 配置</h2>
                <button id="close-sidebar-btn" class="lg:hidden w-8 h-8 brutal-card flex items-center justify-center border-2 border-black">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="mb-6">
                <div class="flex justify-between items-center mb-3">
                    <p class="text-xs font-black uppercase">Selected_Agents</p>
                    <button id="add-agent-btn" class="brutal-btn px-3 py-1 text-xs bg-[#4ECDC4]">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div id="agent-list" class="space-y-3">
                    <!-- Agent items will be rendered here -->
                </div>
            </div>

            <div class="brutal-card p-4 bg-[#4ECDC4] mb-6">
                <label class="block font-black text-sm uppercase mb-2">Creativity_Level</label>
                <input type="range" class="w-full accent-black cursor-pointer">
            </div>

            <div class="space-y-3 mb-6">
                <button id="clear-context-btn" class="brutal-btn w-full py-3 text-sm bg-white">Clear_Context</button>
                <button id="collab-mode-btn" class="brutal-btn w-full py-3 text-sm bg-[#FF6B6B] text-white">Collab_Mode</button>
                <button id="exit-collab-btn" class="brutal-btn w-full py-3 text-sm bg-gray-400 text-white hidden">Exit_Collab</button>
            </div>

            <div class="brutal-card p-4 bg-black text-white">
                <p class="text-[10px] font-black uppercase mb-2">Total_Agents</p>
                <p class="text-2xl font-black" id="agent-count">1</p>
            </div>
        </aside>

        <div id="add-agent-modal" class="fixed inset-0 z-50 bg-black bg-opacity-50 hidden flex items-center justify-center p-4">
            <div class="brutal-card bg-white p-6 max-w-md w-full">
                <h3 class="text-xl font-black mb-4 uppercase">Create_New_Agent</h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="block font-black text-xs uppercase mb-2">Agent_Name</label>
                        <input type="text" id="new-agent-name" placeholder="e.g. Researcher, Coder, Writer" class="w-full brutal-input p-3 font-bold">
                    </div>
                    
                    <div>
                        <label class="block font-black text-xs uppercase mb-2">Role_Description</label>
                        <textarea id="new-agent-role" rows="3" placeholder="Describe what this agent does..." class="w-full brutal-input p-3 font-bold resize-none"></textarea>
                    </div>
                    
                    <div>
                        <label class="block font-black text-xs uppercase mb-2">AI_URL</label>
                        <input type="text" id="new-agent-url" value="http://localhost:5000/v1/chat/completions" class="w-full brutal-input p-3 font-bold">
                    </div>
                    
                    <div>
                        <label class="block font-black text-xs uppercase mb-2">API_Key</label>
                        <input type="text" id="new-agent-api" value="sk-no-key-required" class="w-full brutal-input p-3 font-bold">
                    </div>
                    
                    <div>
                        <label class="block font-black text-xs uppercase mb-2">Model</label>
                        <input type="text" id="new-agent-model" value="qwen2.5:0.5b" class="w-full brutal-input p-3 font-bold">
                    </div>
                    
                    <div class="flex gap-3 mt-6">
                        <button id="create-agent-btn" class="brutal-btn flex-1 py-3 bg-[#4ECDC4]">Create</button>
                        <button id="cancel-agent-btn" class="brutal-btn flex-1 py-3 bg-gray-300">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="collab-modal" class="fixed inset-0 z-50 bg-black bg-opacity-50 hidden flex items-center justify-center p-4">
            <div class="brutal-card bg-white p-6 max-w-md w-full">
                <h3 class="text-xl font-black mb-4 uppercase">Collaboration_Mode</h3>
                
                <p class="text-sm font-black mb-4 text-gray-600">Select agents to collaborate:</p>
                
                <div id="collab-agent-list" class="space-y-3 mb-6">
                    <!-- Collaboration agent checkboxes will be rendered here -->
                </div>
                
                <div class="flex gap-3">
                    <button id="start-collab-btn" class="brutal-btn flex-1 py-3 bg-[#FF6B6B] text-white">Start</button>
                    <button id="cancel-collab-btn" class="brutal-btn flex-1 py-3 bg-gray-300">Cancel</button>
                </div>
            </div>
        </div>

        <div id="edit-agent-modal" class="fixed inset-0 z-50 bg-black bg-opacity-50 hidden flex items-center justify-center p-4">
            <div class="brutal-card bg-white p-6 max-w-md w-full">
                <h3 class="text-xl font-black mb-4 uppercase">Edit_Agent</h3>
                
                <div class="space-y-4">
                    <div>
                        <label class="block font-black text-xs uppercase mb-2">Agent_Name</label>
                        <input type="text" id="edit-agent-name" class="w-full brutal-input p-3 font-bold">
                    </div>
                    
                    <div>
                        <label class="block font-black text-xs uppercase mb-2">Role_Description</label>
                        <textarea id="edit-agent-role" rows="3" class="w-full brutal-input p-3 font-bold resize-none"></textarea>
                    </div>
                    
                    <div>
                        <label class="block font-black text-xs uppercase mb-2">AI_URL</label>
                        <input type="text" id="edit-agent-url" class="w-full brutal-input p-3 font-bold">
                    </div>
                    
                    <div>
                        <label class="block font-black text-xs uppercase mb-2">API_Key</label>
                        <input type="text" id="edit-agent-api" class="w-full brutal-input p-3 font-bold">
                    </div>
                    
                    <div>
                        <label class="block font-black text-xs uppercase mb-2">Model</label>
                        <input type="text" id="edit-agent-model" class="w-full brutal-input p-3 font-bold">
                    </div>
                    
                    <div class="flex gap-3 mt-6">
                        <button id="save-agent-edit-btn" class="brutal-btn flex-1 py-3 bg-[#4ECDC4]">Save</button>
                        <button id="cancel-agent-edit-btn" class="brutal-btn flex-1 py-3 bg-gray-300">Cancel</button>
                    </div>
                </div>
            </div>
        </div>

        <main class="flex-1 flex flex-col bg-[#F7F7F7] p-4 lg:p-8 relative overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-black uppercase italic">Chat</h2>
                <div class="flex gap-2">
                    <button id="new-chat-btn" class="brutal-btn px-3 py-1 text-xs bg-[#4ECDC4]">
                        <i class="fas fa-plus"></i>
                    </button>
                    <button id="load-history-btn" class="brutal-btn px-3 py-1 text-xs bg-[#FFDE03]">
                        <i class="fas fa-history"></i>
                    </button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto space-y-6 pb-20 px-2" id="chat-container">
            </div>

            <div class="absolute bottom-4 left-0 right-0 px-4 lg:px-12">
                <div class="max-w-5xl mx-auto flex gap-3 lg:gap-4">
                    <input id="chat-input" type="text" class="brutal-input flex-1 p-3 lg:p-5 text-lg font-black outline-none placeholder-gray-400" placeholder="TYPE_COMMAND_HERE...">
                    <button id="send-btn" class="brutal-btn px-4 lg:px-8 text-xl bg-[#4ECDC4] hover:bg-[#3db7ae]">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </main>

        <aside id="telemetry-panel" class="fixed inset-y-0 left-0 z-40 w-80 bg-white border-r-[4px] border-black transform -translate-x-full lg:translate-x-0 lg:relative transition-transform duration-200 p-6 overflow-y-auto pt-28 lg:pt-6">
            <div class="flex justify-between items-center mb-4 pb-2 gap-4">
                <h2 class="text-xl font-black uppercase italic flex-1 min-w-0">Telemetry</h2>
                <button id="close-telemetry-btn" class="lg:hidden w-8 h-8 brutal-card flex items-center justify-center border-2 border-black">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="space-y-6">
                <div class="brutal-card p-4 bg-black text-white">
                    <p class="text-[10px] mb-1">TOKEN_USAGE</p>
                    <p class="text-3xl font-black">4,902</p>
                </div>
                <div class="brutal-card p-4 bg-yellow-400">
                    <p class="text-[10px] mb-1 font-black">LATENCY</p>
                    <p class="text-3xl font-black text-white shadow-text" style="text-shadow: 2px 2px 0 #000;">12ms</p>
                </div>
                <div class="brutal-card p-4">
                    <p class="text-[10px] mb-4 font-black">Ainput_PLUGINS</p>
                    <ul class="text-xs font-black space-y-2">
                        <li><i class="fas fa-check-square mr-2"></i>PYTHON_VENV</li>
                        <li><i class="fas fa-check-square mr-2"></i>FILE_SYSTEM</li>
                        <li><i class="fas fa-square mr-2 text-gray-300"></i>SEARCH_API</li>
                    </ul>
                </div>
            </div>
        </aside>
    </div>

    <script>
        const sidebar = document.getElementById('sidebar');
        const mobileMenuToggle = document.getElementById('mobile-menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        const toggleSettingsBtn = document.getElementById('toggle-settings-btn');
        const toggleTelemetryBtn = document.getElementById('toggle-telemetry-btn');
        const chatInput = document.getElementById('chat-input');
        const telemetryPanel = document.getElementById('telemetry-panel');
        let telemetryVisible = true;
        
        let editingAgentId = null;
        
        // Agent 管理
        let agents = [];
        let activeAgentId = null;
        let collabMode = false;
        let selectedCollabAgents = [];
        
        let conversationHistory = {
            'default': [
                { role: 'system', content: '你是一个高效、直接的AI助手，用简洁有力的方式回答问题。' },
                { role: 'assistant', content: 'READY_TO_PROCEED. 系统已就绪。新野兽派风格加载完成。这种风格不讲究呼吸感，讲究的是【态度】。请输入指令。' }
            ]
        };
        
        let chatSessions = [];
        let currentSessionId = null;
        
        let chatContainer = document.querySelector('#chat-container');
        
        function loadAgents() {
            const savedAgents = localStorage.getItem('agents');
            if (savedAgents) {
                agents = JSON.parse(savedAgents);
            } else {
                agents = [{
                    id: Date.now().toString(),
                    name: 'Default Agent',
                    role: '你是一个高效、直接的AI助手，用简洁有力的方式回答问题。',
                    url: 'http://localhost:5000/v1/chat/completions',
                    api: 'sk-no-key-required',
                    model: 'qwen2.5:0.5b',
                    color: 'bg-blue-400'
                }];
            }
            
            if (agents.length > 0) {
                if (!activeAgentId) {
                    activeAgentId = agents[0].id;
                }
            }
            
            loadChatSessions();
            
            agents.forEach(agent => {
                if (!conversationHistory[agent.id]) {
                    conversationHistory[agent.id] = [
                        { role: 'system', content: agent.role },
                        { role: 'assistant', content: `${agent.name} is ready.` }
                    ];
                }
            });
            
            renderAgentList();
        }
        
        function saveAgents() {
            localStorage.setItem('agents', JSON.stringify(agents));
            saveChatSessions();
        }
        
        function renderAgentList() {
            const agentList = document.getElementById('agent-list');
            agentList.innerHTML = '';
            
            agents.forEach(agent => {
                const isSelected = collabMode ? selectedCollabAgents.includes(agent.id) : agent.id === activeAgentId;
                const agentDiv = document.createElement('div');
                agentDiv.className = `brutal-card p-3 flex items-center gap-3 cursor-pointer transition-all ${isSelected ? 'bg-[#FFDE03]' : ''}`;
                agentDiv.dataset.id = agent.id;
                
                agentDiv.innerHTML = `
                    <div class="${agent.color} w-8 h-8 rounded flex items-center justify-center text-white">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-black text-sm">${agent.name}</p>
                        <p class="text-[10px] text-gray-600">${agent.model}</p>
                    </div>
                    <button class="edit-agent-btn text-xs brutal-btn px-2 py-1 bg-[#FFDE03] text-black mr-2" data-id="${agent.id}" title="Edit Agent">
                        <i class="fas fa-edit"></i>
                    </button>
                    <button class="delete-agent-btn text-xs brutal-btn px-2 py-1 bg-red-400 text-white" data-id="${agent.id}">
                        <i class="fas fa-trash"></i>
                    </button>
                `;
                
                agentList.appendChild(agentDiv);
            });
            
            document.getElementById('agent-count').textContent = agents.length;
        }
        
        function createNewAgent() {
            const name = document.getElementById('new-agent-name').value.trim();
            const role = document.getElementById('new-agent-role').value.trim();
            const url = document.getElementById('new-agent-url').value.trim();
            const api = document.getElementById('new-agent-api').value.trim();
            const model = document.getElementById('new-agent-model').value.trim();
            
            if (!name) {
                alert('Agent name is required!');
                return;
            }
            
            const colors = ['bg-blue-400', 'bg-green-400', 'bg-purple-400', 'bg-pink-400', 'bg-orange-400', 'bg-red-400', 'bg-indigo-400', 'bg-teal-400'];
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            
            const newAgent = {
                id: Date.now().toString(),
                name: name,
                role: role || `You are ${name}, an AI agent specialized in your domain.`,
                url: url,
                api: api,
                model: model,
                color: randomColor
            };
            
            agents.push(newAgent);
            activeAgentId = newAgent.id;
            
            const defaultHistory = [
                { role: 'system', content: newAgent.role },
                { role: 'assistant', content: `${newAgent.name} is ready. I can help you with your tasks.` }
            ];
            conversationHistory[newAgent.id] = defaultHistory;
            
            if (currentSessionId) {
                const session = chatSessions.find(s => s.id === currentSessionId);
                if (session) {
                    session.history = [...defaultHistory];
                    saveChatSessions();
                }
            }
            
            saveAgents();
            renderAgentList();
            
            document.getElementById('add-agent-modal').classList.add('hidden');
            
            document.getElementById('new-agent-name').value = '';
            document.getElementById('new-agent-role').value = '';
            document.getElementById('new-agent-url').value = 'http://localhost:5000/v1/chat/completions';
            document.getElementById('new-agent-api').value = 'sk-no-key-required';
            document.getElementById('new-agent-model').value = 'qwen2.5:0.5b';
        }
        
        function setActiveAgent(agentId) {
            activeAgentId = agentId;
            collabMode = false;
            selectedCollabAgents = [];
            document.getElementById('collab-mode-btn').classList.remove('hidden');
            document.getElementById('exit-collab-btn').classList.add('hidden');
            
            if (currentSessionId) {
                const session = chatSessions.find(s => s.id === currentSessionId);
                if (session) {
                    session.agentId = agentId;
                    saveChatSessions();
                }
            }
            
            saveAgents();
            renderAgentList();
        }
        
        function deleteAgent(agentId) {
            if (agents.length <= 1) {
                alert('Cannot delete the last agent!');
                return;
            }
            
            if (confirm('Delete this agent?')) {
                agents = agents.filter(a => a.id !== agentId);
                
                if (activeAgentId === agentId) {
                    activeAgentId = agents[0].id;
                }
                
                saveAgents();
                renderAgentList();
            }
        }
        
        function editAgent(agentId) {
            const name = document.getElementById('edit-agent-name').value.trim();
            const role = document.getElementById('edit-agent-role').value.trim();
            const url = document.getElementById('edit-agent-url').value.trim();
            const api = document.getElementById('edit-agent-api').value.trim();
            const model = document.getElementById('edit-agent-model').value.trim();
            
            if (!name) {
                alert('Agent name is required!');
                return;
            }
            
            const agent = agents.find(a => a.id === agentId);
            if (agent) {
                agent.name = name;
                agent.role = role;
                agent.url = url;
                agent.api = api;
                agent.model = model;
                
                if (conversationHistory[agentId]) {
                    conversationHistory[agentId][0].content = role;
                }
                
                saveAgents();
                renderAgentList();
                document.getElementById('edit-agent-modal').classList.add('hidden');
                editingAgentId = null;
            }
        }
        
        function openEditAgentModal(agentId) {
            const agent = agents.find(a => a.id === agentId);
            if (!agent) return;
            
            editingAgentId = agentId;
            document.getElementById('edit-agent-name').value = agent.name;
            document.getElementById('edit-agent-role').value = agent.role;
            document.getElementById('edit-agent-url').value = agent.url || 'http://localhost:5000/v1/chat/completions';
            document.getElementById('edit-agent-api').value = agent.api || 'sk-no-key-required';
            document.getElementById('edit-agent-model').value = agent.model;
            
            document.getElementById('edit-agent-modal').classList.remove('hidden');
        }
        
        function renderCollabAgentList() {
            const collabList = document.getElementById('collab-agent-list');
            collabList.innerHTML = '';
            
            agents.forEach(agent => {
                const agentDiv = document.createElement('div');
                agentDiv.className = 'flex items-center gap-3 brutal-card p-3 bg-white';
                
                agentDiv.innerHTML = `
                    <input type="checkbox" class="collab-checkbox w-5 h-5 accent-black" data-id="${agent.id}">
                    <div class="${agent.color} w-8 h-8 rounded flex items-center justify-center text-white flex-shrink-0">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="flex-1">
                        <p class="font-black text-sm">${agent.name}</p>
                        <p class="text-[10px] text-gray-600">${agent.model}</p>
                    </div>
                `;
                
                collabList.appendChild(agentDiv);
            });
            
            selectedCollabAgents = agents.map(a => a.id);
            updateCollabSelection();
        }
        
        function updateCollabSelection() {
            const checkboxes = document.querySelectorAll('.collab-checkbox');
            selectedCollabAgents = [];
            checkboxes.forEach(cb => {
                if (cb.checked) {
                    selectedCollabAgents.push(cb.dataset.id);
                }
            });
            renderAgentList();
        }
        
        async function sendCollaborativeMessage(message) {
            if (selectedCollabAgents.length === 0) return;
            
            if (selectedCollabAgents.length === 1) {
                activeAgentId = selectedCollabAgents[0];
                await sendMessage();
                return;
            }
            
            chatInput.value = '';
            chatContainer.insertAdjacentHTML('beforeend', createUserMessage(message));
            chatContainer.insertAdjacentHTML('beforeend', createLoadingMessage());
            scrollToBottom();
            
            const loadingMsg = document.getElementById('loading-message');
            
            try {
                const responses = [];
                const collabAgents = agents.filter(a => selectedCollabAgents.includes(a.id));
                
                for (const agent of collabAgents) {
                    if (!conversationHistory[agent.id]) {
                        conversationHistory[agent.id] = [
                            { role: 'system', content: agent.role },
                            { role: 'assistant', content: `${agent.name} is ready.` }
                        ];
                    }
                    
                    conversationHistory[agent.id].push({ role: 'user', content: message });
                    
                    const response = await fetch(agent.url || 'http://localhost:5000/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${agent.api || 'sk-no-key-required'}`
                        },
                        body: JSON.stringify({
                            model: agent.model,
                            messages: conversationHistory[agent.id]
                        })
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        const aiResponse = data.choices[0].message.content;
                        conversationHistory[agent.id].push({ role: 'assistant', content: aiResponse });
                        responses.push({ agent, response: aiResponse });
                    } else {
                        responses.push({ agent, response: `ERROR: API Error ${response.status}` });
                    }
                }
                
                if (loadingMsg) loadingMsg.remove();
                
                responses.forEach(({ agent, response }) => {
                    chatContainer.insertAdjacentHTML('beforeend', createCollabAIMessage(agent, response));
                });
                
                const summaryResponse = generateCollabSummary(responses);
                chatContainer.insertAdjacentHTML('beforeend', createCollabSummaryMessage(summaryResponse));
                scrollToBottom();
                
                if (currentSessionId) {
                    const session = chatSessions.find(s => s.id === currentSessionId);
                    if (session) {
                        session.history.push({ role: 'user', content: message });
                        responses.forEach(({ agent, response }) => {
                            session.history.push({ role: 'assistant', content: `${agent.name}: ${response}` });
                        });
                        session.history.push({ role: 'assistant', content: summaryResponse });
                        saveChatSessions();
                    }
                }
                
            } catch (error) {
                if (loadingMsg) loadingMsg.remove();
                chatContainer.insertAdjacentHTML('beforeend', createCollabSummaryMessage(`ERROR: ${error.message}`));
                scrollToBottom();
            }
        }
        
        function generateCollabSummary(responses) {
            let summary = '### Collaboration Summary\n\n';
            responses.forEach(({ agent, response }) => {
                summary += `#### ${agent.name}\n${response}\n\n`;
            });
            summary += '---\n**This is a collaborative response from multiple agents.**';
            return summary;
        }
        
        function createCollabAIMessage(agent, text) {
            return `
                <div class="flex items-start gap-4">
                    <div class="w-12 h-12 brutal-card flex-shrink-0 flex items-center justify-center ${agent.color} text-white text-xl">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="brutal-card p-5 max-w-2xl font-bold leading-tight">
                        <p class="text-xs font-black text-gray-500 mb-1">${agent.name}</p>
                        <p>${escapeHtml(text)}</p>
                    </div>
                </div>
            `;
        }
        
        function createCollabSummaryMessage(text) {
            return `
                <div class="flex items-start gap-4">
                    <div class="w-12 h-12 brutal-card flex-shrink-0 flex items-center justify-center bg-[#FFDE03] text-black text-xl">
                        <i class="fas fa-users"></i>
                    </div>
                    <div class="brutal-card p-5 max-w-2xl font-bold leading-tight bg-[#4ECDC4]">
                        <p class="text-xs font-black text-black mb-1">Collaboration Summary</p>
                        <pre class="whitespace-pre-wrap font-mono text-sm">${escapeHtml(text)}</pre>
                    </div>
                </div>
            `;
        }
        
        function loadSettings() {
        }
        
        function saveSettings() {
        }
        
        
        function getConversationHistory() {
            const agent = agents.find(a => a.id === activeAgentId);
            if (!agent) return conversationHistory['default'];
            
            if (!conversationHistory[agent.id]) {
                conversationHistory[agent.id] = [
                    { role: 'system', content: agent.role },
                    { role: 'assistant', content: `${agent.name} is ready. I can help you with your tasks.` }
                ];
            }
            
            return conversationHistory[agent.id];
        }
        
        function updateConversationHistory(role, content) {
            const agent = agents.find(a => a.id === activeAgentId);
            if (!agent) {
                if (!conversationHistory['default']) {
                    conversationHistory['default'] = [];
                }
                conversationHistory['default'].push({ role, content });
                
                if (currentSessionId) {
                    const session = chatSessions.find(s => s.id === currentSessionId);
                    if (session) {
                        session.history.push({ role, content });
                        saveChatSessions();
                    }
                }
                return;
            }
            
            if (!conversationHistory[agent.id]) {
                conversationHistory[agent.id] = [];
            }
            
            conversationHistory[agent.id].push({ role, content });
            
            if (currentSessionId) {
                const session = chatSessions.find(s => s.id === currentSessionId);
                if (session) {
                    session.history.push({ role, content });
                    saveChatSessions();
                }
            }
        }
        
        function clearConversationHistory() {
            const agent = agents.find(a => a.id === activeAgentId);
            if (!agent) {
                conversationHistory['default'] = [
                    { role: 'system', content: '你是一个高效、直接的AI助手，用简洁有力的方式回答问题。' },
                    { role: 'assistant', content: 'READY_TO_PROCEED. 系统已就绪。新野兽派风格加载完成。这种风格不讲究呼吸感，讲究的是【态度】。请输入指令。' }
                ];
                
                if (currentSessionId) {
                    const session = chatSessions.find(s => s.id === currentSessionId);
                    if (session) {
                        session.history = [...conversationHistory['default']];
                        saveChatSessions();
                    }
                }
                return;
            }
            
            conversationHistory[agent.id] = [
                { role: 'system', content: agent.role },
                { role: 'assistant', content: `${agent.name} is ready. I can help you with your tasks.` }
            ];
            
            if (currentSessionId) {
                const session = chatSessions.find(s => s.id === currentSessionId);
                if (session) {
                    session.history = [...conversationHistory[agent.id]];
                    saveChatSessions();
                }
            }
            
            if (collabMode) {
                collabMode = false;
                selectedCollabAgents = [];
                document.getElementById('collab-mode-btn').classList.remove('hidden');
                document.getElementById('exit-collab-btn').classList.add('hidden');
            }
        }
        
        function createNewChat() {
            const sessionId = Date.now().toString();
            const sessionName = `Chat_${sessionId.slice(-6)}`;
            
            chatSessions.push({
                id: sessionId,
                name: sessionName,
                timestamp: Date.now(),
                agentId: activeAgentId,
                history: []
            });
            
            currentSessionId = sessionId;
            saveChatSessions();
            
            chatContainer.innerHTML = '';
            
            const agent = agents.find(a => a.id === activeAgentId);
            if (agent) {
                chatContainer.insertAdjacentHTML('beforeend', createAIMessage(`${agent.name} is ready. I can help you with your tasks.`));
            } else {
                chatContainer.insertAdjacentHTML('beforeend', createAIMessage('READY_TO_PROCEED. 系统已就绪。请输入指令。'));
            }
        }
        
        function loadChatSessions() {
            const savedSessions = localStorage.getItem('chat_sessions');
            if (savedSessions) {
                chatSessions = JSON.parse(savedSessions);
            }
            
            if (chatSessions.length > 0) {
                currentSessionId = chatSessions[0].id;
                loadSessionHistory(currentSessionId);
            } else {
                createNewChat();
            }
        }
        
        function saveChatSessions() {
            localStorage.setItem('chat_sessions', JSON.stringify(chatSessions));
        }
        
        function loadSessionHistory(sessionId) {
            const session = chatSessions.find(s => s.id === sessionId);
            if (!session) return;
            
            activeAgentId = session.agentId;
            currentSessionId = sessionId;
            
            chatContainer.innerHTML = '';
            
            if (session.history && session.history.length > 0) {
                session.history.forEach(msg => {
                    if (msg.role === 'user') {
                        chatContainer.insertAdjacentHTML('beforeend', createUserMessage(msg.content));
                    } else if (msg.role === 'assistant') {
                        chatContainer.insertAdjacentHTML('beforeend', createAIMessage(msg.content));
                    }
                });
            } else {
                const agent = agents.find(a => a.id === activeAgentId);
                if (agent) {
                    chatContainer.insertAdjacentHTML('beforeend', createAIMessage(`${agent.name} is ready. I can help you with your tasks.`));
                } else {
                    chatContainer.insertAdjacentHTML('beforeend', createAIMessage('READY_TO_PROCEED. 系统已就绪。请输入指令。'));
                }
            }
            
            renderAgentList();
        }
        
        function showChatHistoryModal() {
            let modal = document.getElementById('chat-history-modal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'chat-history-modal';
                modal.className = 'fixed inset-0 z-50 bg-black bg-opacity-50 hidden flex items-center justify-center p-4';
                modal.innerHTML = `
                    <div class="brutal-card bg-white p-6 max-w-md w-full">
                        <h3 class="text-xl font-black mb-4 uppercase">Chat_History</h3>
                        <div id="sessions-list" class="space-y-3 mb-6 max-h-96 overflow-y-auto"></div>
                        <div class="flex gap-3">
                            <button id="close-modal-btn" class="brutal-btn flex-1 py-3 bg-gray-300">Close</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);
            }
            
            const sessionsList = document.getElementById('sessions-list');
            sessionsList.innerHTML = '';
            
            if (chatSessions.length === 0) {
                sessionsList.innerHTML = '<p class="text-center text-gray-500">No chat history found</p>';
            } else {
                chatSessions.forEach(session => {
                    const sessionDiv = document.createElement('div');
                    const isSelected = session.id === currentSessionId;
                    sessionDiv.className = `brutal-card p-3 flex items-center gap-3 cursor-pointer hover:bg-gray-50 ${isSelected ? 'bg-[#FFDE03]' : ''}`;
                    sessionDiv.innerHTML = `
                        <div class="bg-[#FFDE03] w-8 h-8 rounded flex items-center justify-center text-black">
                            <i class="fas fa-comment"></i>
                        </div>
                        <div class="flex-1">
                            <p class="font-black text-sm">${session.name}</p>
                            <p class="text-[10px] text-gray-600">Agent: ${agents.find(a => a.id === session.agentId)?.name || 'Unknown'}</p>
                            <p class="text-[10px] text-gray-500">Messages: ${session.history?.length || 0}</p>
                        </div>
                        <button class="delete-session-btn text-xs brutal-btn px-2 py-1 bg-red-400 text-white" data-session-id="${session.id}">
                            <i class="fas fa-trash"></i>
                        </button>
                    `;
                    sessionDiv.addEventListener('click', (e) => {
                        if (!e.target.closest('.delete-session-btn')) {
                            loadSessionHistory(session.id);
                            document.getElementById('chat-history-modal').classList.add('hidden');
                        }
                    });
                    sessionsList.appendChild(sessionDiv);
                });
            }
            
            modal.classList.remove('hidden');
            
            document.getElementById('close-modal-btn').onclick = () => {
                modal.classList.add('hidden');
            };
            
            sessionsList.addEventListener('click', (e) => {
                if (e.target.closest('.delete-session-btn')) {
                    const sessionId = e.target.closest('.delete-session-btn').dataset.sessionId;
                    deleteSession(sessionId);
                }
            });
        }
        
        function deleteSession(sessionId) {
            if (confirm('Delete this chat session?')) {
                chatSessions = chatSessions.filter(s => s.id !== sessionId);
                saveChatSessions();
                
                if (currentSessionId === sessionId && chatSessions.length > 0) {
                    loadSessionHistory(chatSessions[0].id);
                } else if (chatSessions.length === 0) {
                    currentSessionId = null;
                    chatContainer.innerHTML = '';
                    const agent = agents.find(a => a.id === activeAgentId);
                    if (agent) {
                        chatContainer.insertAdjacentHTML('beforeend', createAIMessage(`${agent.name} is ready.`));
                    }
                }
                
                showChatHistoryModal();
            }
        }
        
        mobileMenuToggle.addEventListener('click', (e) => {
            e.stopPropagation();
            mobileMenu.classList.toggle('hidden');
        });
        
        toggleSettingsBtn.addEventListener('click', () => {
            sidebar.classList.remove('-translate-x-full');
            mobileMenu.classList.add('hidden');
        });
        
        document.getElementById('close-sidebar-btn').addEventListener('click', () => {
            sidebar.classList.add('-translate-x-full');
        });
        
        toggleTelemetryBtn.addEventListener('click', () => {
            if (window.innerWidth < 1024) {
                telemetryPanel.classList.remove('-translate-x-full');
            } else {
                telemetryPanel.classList.remove('hidden');
            }
            mobileMenu.classList.add('hidden');
        });
        
        document.getElementById('close-telemetry-btn').addEventListener('click', () => {
            if (window.innerWidth < 1024) {
                telemetryPanel.classList.add('-translate-x-full');
            } else {
                telemetryPanel.classList.add('hidden');
            }
        });
        
        document.getElementById('add-agent-btn').addEventListener('click', () => {
            document.getElementById('add-agent-modal').classList.remove('hidden');
        });
        
        document.getElementById('cancel-agent-btn').addEventListener('click', () => {
            document.getElementById('add-agent-modal').classList.add('hidden');
        });
        
        document.getElementById('create-agent-btn').addEventListener('click', createNewAgent);
        
        document.getElementById('cancel-agent-edit-btn').addEventListener('click', () => {
            document.getElementById('edit-agent-modal').classList.add('hidden');
            editingAgentId = null;
        });
        
        document.getElementById('save-agent-edit-btn').addEventListener('click', () => {
            if (editingAgentId) {
                editAgent(editingAgentId);
            }
        });
        
        document.getElementById('collab-mode-btn').addEventListener('click', () => {
            renderCollabAgentList();
            document.getElementById('collab-modal').classList.remove('hidden');
        });
        
        document.getElementById('cancel-collab-btn').addEventListener('click', () => {
            document.getElementById('collab-modal').classList.add('hidden');
        });
        
        document.getElementById('start-collab-btn').addEventListener('click', () => {
            updateCollabSelection();
            collabMode = selectedCollabAgents.length > 1;
            document.getElementById('collab-modal').classList.add('hidden');
            renderAgentList();
            
            if (collabMode) {
                document.getElementById('collab-mode-btn').classList.add('hidden');
                document.getElementById('exit-collab-btn').classList.remove('hidden');
                alert(`Collaboration mode enabled with ${selectedCollabAgents.length} agents!\nAll selected agents will respond to your messages.`);
            } else {
                alert(`Single agent mode: ${agents.find(a => a.id === selectedCollabAgents[0])?.name}`);
            }
        });
        
        document.getElementById('exit-collab-btn').addEventListener('click', () => {
            collabMode = false;
            selectedCollabAgents = [];
            document.getElementById('collab-mode-btn').classList.remove('hidden');
            document.getElementById('exit-collab-btn').classList.add('hidden');
            renderAgentList();
            alert('Exited collaboration mode. Switched to single agent mode.');
        });
        
        document.getElementById('clear-context-btn').addEventListener('click', () => {
            clearConversationHistory();
            chatContainer.innerHTML = '';
            
            const agent = agents.find(a => a.id === activeAgentId);
            if (agent) {
                chatContainer.insertAdjacentHTML('beforeend', createAIMessage(`${agent.name} is ready. I can help you with your tasks.`));
            } else {
                chatContainer.insertAdjacentHTML('beforeend', createAIMessage('READY_TO_PROCEED. 系统已就绪。请输入指令。'));
            }
        });
        
        const agentList = document.getElementById('agent-list');
        agentList.addEventListener('click', (e) => {
            if (e.target.closest('.delete-agent-btn')) {
                const agentId = e.target.closest('.delete-agent-btn').dataset.id;
                deleteAgent(agentId);
            } else if (e.target.closest('.edit-agent-btn')) {
                const agentId = e.target.closest('.edit-agent-btn').dataset.id;
                openEditAgentModal(agentId);
            } else if (e.target.closest('.brutal-card') && e.target.closest('.brutal-card').dataset.id && !collabMode) {
                const agentId = e.target.closest('.brutal-card').dataset.id;
                setActiveAgent(agentId);
            }
        });
        
        chatContainer.addEventListener('click', (e) => {
            if (e.target.closest('.brutal-card') && e.target.closest('.brutal-card').dataset.id && !collabMode) {
                const agentId = e.target.closest('.brutal-card').dataset.id;
                setActiveAgent(agentId);
            }
        });
        
        document.addEventListener('click', (e) => {
            if (e.target.closest('.collab-checkbox')) {
                updateCollabSelection();
            }
            if (!e.target.closest('#mobile-menu-toggle') && !e.target.closest('#mobile-menu')) {
                mobileMenu.classList.add('hidden');
            }
        });

        function createUserMessage(text) {
            return `
                <div class="flex items-start gap-4 flex-row-reverse">
                    <div class="w-12 h-12 brutal-card flex-shrink-0 flex items-center justify-center bg-yellow-400 text-black text-xl">
                        <i class="fas fa-terminal"></i>
                    </div>
                    <div class="brutal-card p-5 max-w-2xl font-bold bg-white italic shadow-[6px_6px_0px_0px_rgba(78,205,196,1)]">
                        ${escapeHtml(text)}
                    </div>
                </div>
            `;
        }

        function createAIMessage(text) {
            const agent = agents.find(a => a.id === activeAgentId);
            const agentName = agent ? agent.name : 'Agent';
            const agentColor = agent ? agent.color : 'bg-blue-400';
            
            // 解析代码块，将 ```code``` 转换为 <pre><code>
            // 配色方案：深色背景 + 鲜艳文字 + 高亮边框
            const formattedText = text.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre class="bg-[#2d3748] border-l-4 border-[#4fd1c5] p-3 rounded mb-3 whitespace-pre-wrap break-all font-mono text-sm">
                    <code class="text-[#e0e6ed]">${escapeHtml(code)}</code>
                </pre>`;
            });
            
            return `
                <div class="flex items-start gap-4">
                    <div class="w-12 h-12 brutal-card flex-shrink-0 flex items-center justify-center ${agentColor} text-white text-xl">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="brutal-card p-5 max-w-2xl font-bold leading-tight">
                        <p class="text-xs font-black text-gray-500 mb-1">${agentName}</p>
                        <div class="whitespace-pre-wrap break-all">${formattedText}</div>
                    </div>
                </div>
            `;
        }

        function createLoadingMessage() {
            return `
                <div class="flex items-start gap-4" id="loading-message">
                    <div class="w-12 h-12 brutal-card flex-shrink-0 flex items-center justify-center bg-blue-400 text-white text-xl">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="brutal-card p-5 max-w-2xl font-bold leading-tight">
                        <p><div class="thinking-box"></div> <span class="ml-0">THINKING...</span></p>
                    </div>
                </div>
            `;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message) return;

            if (collabMode && selectedCollabAgents.length > 0) {
                await sendCollaborativeMessage(message);
                return;
            }

            chatInput.value = '';
            updateConversationHistory('user', message);
            chatContainer.insertAdjacentHTML('beforeend', createUserMessage(message));
            chatContainer.insertAdjacentHTML('beforeend', createLoadingMessage());
            scrollToBottom();

            try {
                const agent = agents.find(a => a.id === activeAgentId);
                const currentUrl = agent ? (agent.url || 'http://localhost:5000/v1/chat/completions') : 'http://localhost:5000/v1/chat/completions';
                const currentApi = agent ? (agent.api || 'sk-no-key-required') : 'sk-no-key-required';
                const currentModel = agent ? agent.model : 'qwen2.5:0.5b';
                const currentHistory = getConversationHistory();
                
                const response = await fetch(currentUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentApi}`
                    },
                    body: JSON.stringify({
                        model: currentModel,
                        messages: currentHistory
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                const aiResponse = data.choices[0].message.content;

                updateConversationHistory('assistant', aiResponse);
                
                const loadingMsg = document.getElementById('loading-message');
                if (loadingMsg) loadingMsg.remove();
                
                chatContainer.insertAdjacentHTML('beforeend', createAIMessage(aiResponse));
                scrollToBottom();

            } catch (error) {
                const loadingMsg = document.getElementById('loading-message');
                if (loadingMsg) loadingMsg.remove();
                
                chatContainer.insertAdjacentHTML('beforeend', createAIMessage(`ERROR: ${error.message}`));
                scrollToBottom();
            }
        }

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        document.getElementById('send-btn').addEventListener('click', sendMessage);
        
        document.getElementById('new-chat-btn').addEventListener('click', createNewChat);
        
        document.getElementById('load-history-btn').addEventListener('click', showChatHistoryModal);
        
        document.getElementById('telemetry-toggle').addEventListener('click', () => {
            telemetryVisible = !telemetryVisible;
            if (telemetryVisible) {
                telemetryPanel.classList.remove('hidden');
            } else {
                telemetryPanel.classList.add('hidden');
            }
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            loadAgents();
        });
    </script>
</body>
</html>
