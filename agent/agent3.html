<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign AI | 企业主决策空间</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap');
        
        :root {
            --paper-bg: #F8F9FA;
            --accent-gold: #B59A7D;
        }

        body {
            background-color: var(--paper-bg);
            font-family: 'Plus Jakarta Sans', 'PingFang SC', sans-serif;
            color: #2D3436;
        }

        .serif-title { font-family: 'Noto Serif SC', serif; }

        /* 细腻阴影 */
        .soft-card {
            background: #FFFFFF;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border-radius: 24px;
        }

        /* 自定义滚动条 */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }

        .ai-bubble {
            background: #FFFFFF;
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 4px 20px 20px 20px;
        }

        .user-bubble {
            background: #2D3436;
            color: #FFFFFF;
            border-radius: 20px 20px 4px 20px;
        }
    </style>
</head>
<body class="h-screen flex flex-col lg:flex-row">

    <nav class="hidden lg:flex w-24 flex-col items-center py-10 border-r border-gray-100 bg-white shadow-sm">
        <div class="mb-12">
            <div class="w-12 h-12 bg-stone-800 rounded-2xl flex items-center justify-center text-white text-xl font-bold">S</div>
        </div>
        <div class="flex-1 space-y-8 text-gray-400">
            <button class="block hover:text-stone-800 transition-colors"><i class="fa-solid fa-house-chimney text-xl"></i></button>
            <button class="block text-stone-800"><i class="fa-solid fa-wand-magic-sparkles text-xl"></i></button>
            <button class="block hover:text-stone-800 transition-colors"><i class="fa-solid fa-vault text-xl"></i></button>
            <button class="block hover:text-stone-800 transition-colors"><i class="fa-solid fa-address-book text-xl"></i></button>
        </div>
        <div class="mt-auto">
            <img src="https://ui-avatars.com/api/?name=Boss&background=B59A7D&color=fff" class="w-10 h-10 rounded-full shadow-md" alt="Avatar">
        </div>
    </nav>

    <div class="flex-1 flex flex-col relative overflow-hidden">
        
        <header class="lg:hidden h-16 bg-white px-6 flex items-center justify-between border-b border-gray-100">
            <span class="serif-title text-xl tracking-tight">Sovereign</span>
            <button class="text-gray-500"><i class="fa-solid fa-bars-staggered"></i></button>
        </header>

        <main class="flex-1 overflow-y-auto px-4 py-6 md:px-12 md:py-10">
            <div class="max-w-3xl mx-auto space-y-10">
                
                <section class="space-y-2">
                    <h2 class="serif-title text-3xl md:text-4xl text-stone-800 italic">下午好，王先生</h2>
                    <p class="text-gray-400 text-sm font-light">今天是 2026年3月7日 · 您有 2 条业务动态需要关注</p>
                </section>

                <div class="flex space-x-4 overflow-x-auto no-scrollbar pb-4">
                    <div class="soft-card min-w-[200px] p-6 border-l-4 border-stone-800 flex-shrink-0">
                        <span class="text-xs uppercase tracking-widest text-gray-400">营收目标</span>
                        <div class="text-2xl font-bold mt-2">82.4%</div>
                        <div class="w-full bg-gray-100 h-1 mt-4 rounded-full overflow-hidden">
                            <div class="bg-stone-800 h-full w-[82%]"></div>
                        </div>
                    </div>
                    <div class="soft-card min-w-[200px] p-6 flex-shrink-0">
                        <span class="text-xs uppercase tracking-widest text-gray-400">现金流状态</span>
                        <div class="text-2xl font-bold mt-2 text-green-600">稳健</div>
                        <div class="text-xs text-gray-400 mt-4">预计覆盖未来 6 个月运营</div>
                    </div>
                </div>

                <div class="space-y-8">
                    <div class="flex items-start group">
                        <div class="ai-bubble p-5 shadow-sm text-gray-700 leading-relaxed text-[15px]">
                            王总，我注意到上个月的**渠道获客成本 (CAC)** 有所下降，但转化周期延长了 4 天。
                            <br><br>
                            这通常意味着销售团队在跟进高客单价客户，需要我调取**大客户漏斗数据**给您审阅吗？
                        </div>
                    </div>

                    <div class="flex justify-end">
                        <div class="user-bubble p-5 shadow-lg text-[15px]">
                            很好，帮我对比一下上海和杭州分公司的回款速度。
                        </div>
                    </div>

                    <div class="flex items-start">
                        <div class="ai-bubble p-6 shadow-sm w-full">
                            <h4 class="font-bold text-stone-800 mb-4 flex items-center">
                                <i class="fa-solid fa-arrows-left-right text-xs mr-2"></i> 区域效率对比
                            </h4>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="bg-stone-50 p-4 rounded-xl text-center">
                                    <span class="text-xs text-gray-500">上海分部</span>
                                    <div class="text-xl font-bold text-stone-700 mt-1">14天</div>
                                    <span class="text-[10px] text-green-600">↑ 较上季快2天</span>
                                </div>
                                <div class="bg-stone-50 p-4 rounded-xl text-center">
                                    <span class="text-xs text-gray-500">杭州分部</span>
                                    <div class="text-xl font-bold text-stone-700 mt-1">21天</div>
                                    <span class="text-[10px] text-red-400">↓ 较上季慢3天</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="p-6 md:px-12 md:pb-10 bg-gradient-to-t from-gray-50 to-transparent">
            <div class="max-w-3xl mx-auto relative">
                <div class="soft-card flex items-center px-6 py-4 border border-gray-100 focus-within:ring-1 ring-stone-200 transition-all">
                    <button class="text-stone-300 hover:text-stone-500 mr-4 transition-colors">
                        <i class="fa-solid fa-paperclip text-lg"></i>
                    </button>
                    <input type="text" placeholder="向 AI 索取业务洞察..." class="flex-1 bg-transparent border-none outline-none text-gray-700 placeholder:text-gray-300 text-sm">
                    <button class="ml-4 w-10 h-10 bg-stone-800 text-white rounded-full flex items-center justify-center hover:bg-stone-700 transition-transform active:scale-95">
                        <i class="fa-solid fa-arrow-up"></i>
                    </button>
                </div>
                <div class="flex justify-center mt-4 space-x-4">
                    <button class="text-[11px] font-semibold text-gray-400 hover:text-stone-800 uppercase tracking-widest">导出简报</button>
                    <button class="text-[11px] font-semibold text-gray-400 hover:text-stone-800 uppercase tracking-widest">查看待办项</button>
                    <button class="text-[11px] font-semibold text-gray-400 hover:text-stone-800 uppercase tracking-widest">紧急预警设置</button>
                </div>
            </div>
        </footer>
    </div>

</body>
</html>
