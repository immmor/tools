<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 动态彩色背景气泡 */
        body {
            margin: 0;
            padding: 0;
            background: #121212;
            overflow: hidden;
            height: 100vh;
        }
        .bg-blobs {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            filter: blur(80px);
            overflow: hidden;
        }
        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }
        .blob-1 { background: rgba(67, 56, 202, 0.4); top: -100px; left: -100px; }
        .blob-2 { background: rgba(147, 51, 234, 0.3); bottom: -150px; right: -50px; animation-delay: -5s; }
        .blob-3 { background: rgba(236, 72, 153, 0.2); top: 50%; left: 50%; animation-delay: -10s; }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        /* 磨砂玻璃效果 */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2rem;
        }

        .chat-gradient {
            background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(255,255,255,0.02) 100%);
        }

        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 按钮微动效 */
        .btn-hover:active { transform: scale(0.95); }
    </style>
</head>
<body class="text-white/90">
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="h-screen flex flex-col p-4 lg:p-8 gap-4 max-w-[1600px] mx-auto">
        
        <header class="h-16 glass flex items-center justify-between px-8 shrink-0">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-pink-500 flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i class="fas fa-brain"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-none">Nebula</h1>
                    <span class="text-[10px] text-white/40 tracking-widest uppercase">Agent Studio</span>
                </div>
            </div>
            
            <div class="flex items-center gap-2 lg:gap-6">
                <div class="hidden md:flex flex-col items-end">
                    <span class="text-xs font-medium text-indigo-300">Pro Subscription</span>
                    <span class="text-[10px] text-white/30 italic">Cloud Sync Active</span>
                </div>
                <button id="menu-btn" class="lg:hidden w-10 h-10 glass flex items-center justify-center rounded-xl">
                    <i class="fas fa-th-large"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 flex gap-4 overflow-hidden relative">
            
            <aside id="sidebar" class="absolute lg:relative z-20 w-72 h-full glass p-6 flex flex-col gap-8 transition-all duration-500 -translate-x-[120%] lg:translate-x-0">
                <section>
                    <h3 class="text-xs font-semibold text-white/30 uppercase tracking-widest mb-4">核心参数</h3>
                    <div class="space-y-4">
                        <div class="p-4 bg-white/5 rounded-2xl border border-white/5">
                            <label class="text-xs text-white/50 block mb-2">温度 (Temperature)</label>
                            <input type="range" class="w-full accent-indigo-500 h-1 bg-white/10 rounded-lg">
                        </div>
                        <div class="p-4 bg-white/5 rounded-2xl border border-white/5">
                            <label class="text-xs text-white/50 block mb-2">上下文窗口</label>
                            <select class="w-full bg-transparent text-sm outline-none cursor-pointer">
                                <option class="bg-gray-900">32k Tokens</option>
                                <option class="bg-gray-900">128k Tokens</option>
                            </select>
                        </div>
                    </div>
                </section>

                <section class="flex-1">
                    <h3 class="text-xs font-semibold text-white/30 uppercase tracking-widest mb-4">活跃技能</h3>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="p-3 glass rounded-xl text-center hover:bg-white/10 transition-colors cursor-pointer">
                            <i class="fas fa-globe text-blue-400 mb-1"></i>
                            <p class="text-[10px]">Web</p>
                        </div>
                        <div class="p-3 glass rounded-xl text-center hover:bg-white/10 transition-colors cursor-pointer">
                            <i class="fas fa-file-pdf text-red-400 mb-1"></i>
                            <p class="text-[10px]">PDF</p>
                        </div>
                    </div>
                </section>
                
                <button class="w-full py-4 bg-indigo-500/80 hover:bg-indigo-500 rounded-2xl font-bold text-sm btn-hover transition-all shadow-xl shadow-indigo-500/20">
                    发布 Agent
                </button>
            </aside>

            <section class="flex-1 flex flex-col min-w-0 glass overflow-hidden relative">
                <div class="flex-1 overflow-y-auto p-6 lg:p-10 space-y-8 no-scrollbar chat-gradient">
                    <div class="flex gap-4 max-w-[90%]">
                        <div class="w-10 h-10 rounded-2xl glass flex-shrink-0 flex items-center justify-center border border-white/20">
                            <i class="fas fa-robot text-indigo-400"></i>
                        </div>
                        <div class="space-y-2">
                            <div class="p-4 glass rounded-3xl rounded-tl-none leading-relaxed text-sm lg:text-base">
                                您好。我是 Nebula AI。当前环境已通过高度模糊渲染完成，您可以体验极具“悬浮感”的开发界面。
                            </div>
                            <span class="text-[10px] text-white/20 ml-2 font-mono uppercase tracking-tighter">Lat: 42ms</span>
                        </div>
                    </div>

                    <div class="flex gap-4 max-w-[90%] ml-auto flex-row-reverse">
                        <div class="w-10 h-10 rounded-2xl bg-white flex-shrink-0 flex items-center justify-center">
                            <i class="fas fa-user text-indigo-900"></i>
                        </div>
                        <div class="p-4 bg-indigo-500/20 glass rounded-3xl rounded-tr-none text-sm lg:text-base border-indigo-500/30">
                            请解释一下什么是“磨砂玻璃”UI 趋势。
                        </div>
                    </div>
                </div>

                <div class="p-6">
                    <div class="max-w-4xl mx-auto glass p-2 flex items-center gap-2 border-white/20 focus-within:border-indigo-500/50 transition-all shadow-2xl">
                        <button class="w-10 h-10 rounded-xl hover:bg-white/10 text-white/40 hover:text-white transition-all">
                            <i class="fas fa-plus"></i>
                        </button>
                        <input type="text" class="flex-1 bg-transparent border-none outline-none text-sm px-2" placeholder="向星云发出指令...">
                        <button class="bg-white text-indigo-900 px-6 py-2 rounded-xl font-bold text-sm btn-hover hover:bg-indigo-50 shadow-lg transition-all">
                            发送
                        </button>
                    </div>
                </div>
            </section>

            <aside class="hidden xl:flex w-64 flex-col gap-4">
                <div class="glass p-6">
                    <h4 class="text-xs font-bold text-white/40 mb-4 uppercase tracking-widest">系统负载</h4>
                    <div class="space-y-4">
                        <div class="flex items-center justify-between">
                            <span class="text-xs">Neural Load</span>
                            <span class="text-xs text-indigo-400 font-mono">14%</span>
                        </div>
                        <div class="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                            <div class="h-full bg-indigo-500 w-[14%] rounded-full shadow-[0_0_10px_#6366f1]"></div>
                        </div>
                    </div>
                </div>

                <div class="glass p-6 flex-1 overflow-y-auto no-scrollbar">
                    <h4 class="text-xs font-bold text-white/40 mb-4 uppercase tracking-widest">实时链路</h4>
                    <div class="space-y-3">
                        <div class="text-[11px] p-2 bg-white/5 rounded-xl border border-white/5 flex gap-3 items-center">
                            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                            <span class="text-white/60">Gateway Sector 7-A OK</span>
                        </div>
                        <div class="text-[11px] p-2 bg-white/5 rounded-xl border border-white/5 flex gap-3 items-center">
                            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                            <span class="text-white/60">Logic Engine v3 Active</span>
                        </div>
                    </div>
                </div>
            </aside>
        </main>
    </div>

    <script>
        // 侧边栏交互逻辑
        const menuBtn = document.getElementById('menu-btn');
        const sidebar = document.getElementById('sidebar');
        let sidebarOpen = false;

        menuBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            sidebarOpen = !sidebarOpen;
            sidebar.style.transform = sidebarOpen ? 'translateX(0)' : 'translateX(-120%)';
        });

        document.addEventListener('click', (e) => {
            if (sidebarOpen && !sidebar.contains(e.target)) {
                sidebarOpen = false;
                sidebar.style.transform = 'translateX(-120%)';
            }
        });

        // 窗口缩放适配
        window.addEventListener('resize', () => {
            if (window.innerWidth >= 1024) {
                sidebar.style.transform = 'translateX(0)';
            } else {
                sidebar.style.transform = 'translateX(-120%)';
            }
        });
    </script>
</body>
</html>
