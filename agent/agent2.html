<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业决策助手 - AI Agent Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', 'Microsoft YaHei', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .chat-container { height: calc(100vh - 240px); }
        @media (max-width: 768px) {
            .chat-container { height: calc(100vh - 300px); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-64 bg-slate-900 text-white transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
        <div class="p-6">
            <h1 class="text-2xl font-bold flex items-center">
                <i class="fas fa-robot mr-3 text-blue-400"></i>智策 AI
            </h1>
        </div>
        <nav class="mt-4 px-4 space-y-2">
            <a href="#" class="block py-2.5 px-4 rounded bg-blue-600 text-white"><i class="fas fa-chart-line mr-3"></i>经营总览</a>
            <a href="#" class="block py-2.5 px-4 rounded hover:bg-slate-800 transition"><i class="fas fa-comment-dots mr-3"></i>智能对话</a>
            <a href="#" class="block py-2.5 px-4 rounded hover:bg-slate-800 transition"><i class="fas fa-file-invoice-dollar mr-3"></i>财务分析</a>
            <a href="#" class="block py-2.5 px-4 rounded hover:bg-slate-800 transition"><i class="fas fa-users mr-3"></i>人效管理</a>
        </nav>
        <div class="absolute bottom-0 w-full p-6 border-t border-slate-800">
            <div class="flex items-center">
                <div class="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center">王</div>
                <div class="ml-3">
                    <p class="text-sm font-semibold">王总</p>
                    <p class="text-xs text-gray-400">高级版账号</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="lg:ml-64 min-h-screen flex flex-col transition-all duration-300">
        
        <header class="h-16 bg-white border-b flex items-center justify-between px-6 sticky top-0 z-40">
            <button onclick="toggleSidebar()" class="lg:hidden text-gray-600">
                <i class="fas fa-bars text-xl"></i>
            </button>
            <div class="flex items-center space-x-4">
                <span class="hidden md:inline-block text-sm text-gray-500">今日状况：<span class="text-green-500 font-bold">业绩达标 105%</span></span>
                <button class="bg-blue-50 hover:bg-blue-100 text-blue-600 px-4 py-2 rounded-lg text-sm font-medium transition">
                    <i class="fas fa-plus mr-2"></i>新任务
                </button>
            </div>
        </header>

        <div class="p-4 md:p-8 flex-grow">
            <div class="max-w-4xl mx-auto">
                
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                        <p class="text-xs text-gray-500 mb-1">现金流预警</p>
                        <p class="text-xl font-bold text-gray-900">健康</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                        <p class="text-xs text-gray-500 mb-1">待批流程</p>
                        <p class="text-xl font-bold text-red-500">3 件</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                        <p class="text-xs text-gray-500 mb-1">本月净利</p>
                        <p class="text-xl font-bold text-gray-900">￥24.8万</p>
                    </div>
                    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                        <p class="text-xs text-gray-500 mb-1">行业排名</p>
                        <p class="text-xl font-bold text-blue-600">↑ 2%</p>
                    </div>
                </div>

                <div class="bg-white rounded-2xl shadow-lg border border-gray-200 overflow-hidden">
                    <div id="chatBox" class="chat-container overflow-y-auto p-4 md:p-6 space-y-6">
                        <div class="flex items-start">
                            <div class="w-8 h-8 rounded-lg bg-blue-600 flex-shrink-0 flex items-center justify-center text-white text-xs">AI</div>
                            <div class="ml-3 bg-gray-100 p-4 rounded-2xl rounded-tl-none max-w-[85%]">
                                <p class="text-sm leading-relaxed">
                                    王总，早上好。我是您的经营助手。
                                    <br><br>
                                    当前财务数据显示，上周销售额环比增长 12%，但营销成本上升了 5%。需要我为您生成一份**成本优化建议**，还是查看**最新的库存周转率**？
                                </p>
                            </div>
                        </div>

                        <div class="flex items-start flex-row-reverse">
                            <div class="w-8 h-8 rounded-lg bg-slate-800 flex-shrink-0 flex items-center justify-center text-white text-xs">王</div>
                            <div class="mr-3 bg-blue-600 text-white p-4 rounded-2xl rounded-tr-none max-w-[85%] shadow-md">
                                <p class="text-sm italic">分析一下上个月的员工人效。</p>
                            </div>
                        </div>
                    </div>

                    <div class="p-4 border-t bg-gray-50">
                        <div class="flex items-center bg-white rounded-xl border border-gray-300 p-2 shadow-inner">
                            <button class="p-2 text-gray-400 hover:text-blue-500"><i class="fas fa-paperclip"></i></button>
                            <input type="text" placeholder="输入指令或咨询经营问题..." class="flex-grow px-4 py-2 focus:outline-none text-sm">
                            <button class="bg-blue-600 text-white w-10 h-10 rounded-lg flex items-center justify-center hover:bg-blue-700 transition">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>
                        <div class="flex flex-wrap gap-2 mt-3">
                            <button class="text-xs bg-white border border-gray-200 px-3 py-1 rounded-full text-gray-600 hover:border-blue-400">对比竞品价格</button>
                            <button class="text-xs bg-white border border-gray-200 px-3 py-1 rounded-full text-gray-600 hover:border-blue-400">总结本周汇报</button>
                            <button class="text-xs bg-white border border-gray-200 px-3 py-1 rounded-full text-gray-600 hover:border-blue-400">查找合同风险</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // 移动端菜单切换
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }

        // 点击外部关闭菜单 (针对移动端)
        window.onclick = function(event) {
            const sidebar = document.getElementById('sidebar');
            const menuBtn = document.querySelector('header button');
            if (window.innerWidth < 1024 && !sidebar.contains(event.target) && !menuBtn.contains(event.target)) {
                sidebar.classList.add('-translate-x-full');
            }
        }
    </script>
</body>
</html>
