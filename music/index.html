<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>immmorMusic AI - 极简音质</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #e0e5ec;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --accent: #6d5dfc;
            --text-main: #4a5568;
            --text-dim: #94a3b8;
        }

        /* 深色模式变量 */
        [data-theme="dark"] {
            --bg-color: #1a202c;
            --shadow-light: #2d3748;
            --shadow-dark: #0d1117;
            --text-main: #e2e8f0;
            --text-dim: #718096;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            transition: background-color 0.3s ease;
            padding-top: env(safe-area-inset-top, 0);
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            padding: 1.5rem;
            padding-top: calc(1.5rem + env(safe-area-inset-top, 0));
            padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0));
            position: relative;
        }

        /* 核心新态感样式 */
        .neu-inset {
            background: var(--bg-color);
            box-shadow: inset 6px 6px 12px var(--shadow-dark), 
                        inset -6px -6px 12px var(--shadow-light);
            border-radius: 20px;
        }

        .neu-flat {
            background: var(--bg-color);
            box-shadow: 8px 8px 16px var(--shadow-dark), 
                        -8px -8px 16px var(--shadow-light);
            border-radius: 20px;
        }

        .neu-button {
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-main);
        }

        .neu-button:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), 
                        inset -4px -4px 8px var(--shadow-light);
            transform: scale(0.98);
        }

        .breathing {
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { box-shadow: 0 0 10px rgba(109, 93, 252, 0.2); }
            50% { box-shadow: 0 0 25px rgba(109, 93, 252, 0.5); }
        }

        .page { display: none; }
        .page-active { display: block; }

        .safe-bottom { padding-bottom: calc(8rem + env(safe-area-inset-bottom, 0)); }

        .nav-fixed {
            position: fixed;
            bottom: env(safe-area-inset-bottom, 2rem);
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 550px;
            z-index: 50;
            background: var(--bg-color);
            padding-bottom: env(safe-area-inset-bottom, 0);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            opacity: 0.98;
            backdrop-filter: blur(10px);
            z-index: 200;
            display: none;
            flex-direction: column;
            padding: 2rem;
        }

        .drawer {
            position: fixed;
            top: 0;
            left: -100%;
            width: 80%;
            max-width: 300px;
            height: 100%;
            background: var(--bg-color);
            z-index: 300;
            transition: 0.3s ease;
            padding: 2rem;
            box-shadow: 10px 0 30px rgba(0,0,0,0.05);
        }

        .drawer-active { left: 0; }
        
        input, textarea { color: var(--text-main); }
        .text-gray-400 { color: var(--text-dim); }
        .text-gray-600 { color: var(--text-main); }
    </style>
</head>
<body>

    <div id="side-drawer" class="drawer">
        <div class="flex justify-between items-center mb-10">
            <h3 class="font-bold text-[#6d5dfc]">菜单</h3>
            <div class="neu-button w-8 h-8 rounded-full neu-flat" onclick="toggleDrawer()"><i class="fas fa-times text-xs"></i></div>
        </div>
        <div class="space-y-6">
            <div id="drawer-user-info" class="flex items-center gap-4 text-gray-600 font-bold cursor-pointer" onclick="showAuth('login')"><i class="fas fa-sign-in-alt"></i> 登录账号</div>
            <div class="flex items-center gap-4 text-gray-600 font-bold cursor-pointer"><i class="fas fa-history"></i> 最近播放</div>
            <div class="flex items-center gap-4 text-gray-600 font-bold cursor-pointer"><i class="fas fa-heart"></i> 我的收藏</div>
            <div class="flex items-center justify-between text-gray-600 font-bold cursor-pointer" onclick="toggleDarkMode()">
                <div class="flex items-center gap-4"><i class="fas fa-adjust"></i> 深色模式</div>
                <div id="theme-status" class="text-[10px] opacity-50">OFF</div>
            </div>
            <div id="logout-btn" class="hidden flex items-center gap-4 text-red-400 font-bold cursor-pointer" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> 退出登录</div>
        </div>
    </div>

    <div id="search-overlay" class="overlay">
        <div class="max-w-[550px] mx-auto w-full">
            <div class="flex items-center gap-4 mb-8">
                <div class="neu-inset flex-1 px-4 py-3 flex items-center">
                    <i class="fas fa-search text-gray-400 mr-3"></i>
                    <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="搜索 AI 创作、曲风..." class="bg-transparent outline-none w-full text-sm">
                </div>
                <div class="neu-button px-4 py-3 neu-flat text-xs font-bold" onclick="toggleSearch()">取消</div>
            </div>
            
            <div id="search-results" class="space-y-4 mb-8"></div>

            <div id="search-hot">
                <div class="text-xs font-bold text-gray-400 mb-4 uppercase tracking-widest">热门搜索</div>
                <div class="flex flex-wrap gap-3">
                    <span class="neu-flat px-4 py-2 rounded-full text-xs cursor-pointer" onclick="handleSearch('赛博')">赛博朋克</span>
                    <span class="neu-flat px-4 py-2 rounded-full text-xs cursor-pointer" onclick="handleSearch('虚幻')">虚幻之城</span>
                    <span class="neu-flat px-4 py-2 rounded-full text-xs cursor-pointer" onclick="handleSearch('森林')">专注森林</span>
                </div>
            </div>
        </div>
    </div>

    <div id="auth-overlay" class="overlay justify-center">
        <div class="neu-flat p-8 w-full max-w-sm mx-auto">
            <h2 id="auth-title" class="text-2xl font-bold mb-8 text-center text-gray-600">欢迎回来</h2>
            <div class="space-y-6 mb-8">
                <div class="neu-inset p-3"><input type="text" id="auth-username" placeholder="用户名" class="bg-transparent outline-none w-full text-sm"></div>
                <div class="neu-inset p-3"><input type="password" id="auth-password" placeholder="密码" class="bg-transparent outline-none w-full text-sm"></div>
            </div>
            <button id="auth-submit-btn" class="w-full py-4 neu-flat neu-button text-[#6d5dfc] font-bold mb-6" onclick="handleAuth()">进入音乐世界</button>
            <p class="text-center text-xs text-gray-400" id="auth-switch-container">还没有账号？<span class="text-[#6d5dfc] cursor-pointer" onclick="toggleAuthMode()">立即注册</span></p>
            <div class="mt-8 text-center" onclick="closeAuth()">
                <i class="fas fa-times-circle text-gray-300 text-2xl cursor-pointer"></i>
            </div>
        </div>
    </div>

    <audio id="main-audio"></audio>

    <div class="app-container">
        <main id="page-home" class="page page-active safe-bottom">
            <header class="flex justify-between items-center mb-8">
                <div class="neu-button w-11 h-11 rounded-full neu-flat" onclick="toggleDrawer()"><i class="fas fa-bars"></i></div>
                <h1 class="text-lg font-bold text-gray-600">immmorMusic</h1>
                <div class="neu-button w-11 h-11 rounded-full neu-flat" onclick="toggleSearch()"><i class="fas fa-search"></i></div>
            </header>

            <section class="mb-8">
                <div class="neu-flat p-6 relative">
                    <span class="px-3 py-1 bg-[#6d5dfc] text-white text-[10px] font-bold rounded-full">AI 每日精选</span>
                    <h2 class="text-2xl font-bold mt-3 mb-1">清晨冥想</h2>
                    <p class="text-xs text-gray-400 italic">基于睡眠质量实时生成</p>
                </div>
            </section>

            <h3 class="font-bold mb-4 ml-2 text-gray-500 text-xs uppercase tracking-widest">为你创作</h3>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-5">
                <div class="neu-flat p-4 aspect-square flex flex-col items-center justify-center cursor-pointer" onclick="playSpecific(0)">
                    <div class="neu-inset w-12 h-12 rounded-full flex items-center justify-center mb-2 text-yellow-500"><i class="fas fa-bolt"></i></div>
                    <span class="text-[11px] font-bold">能量泵</span>
                </div>
                <div class="neu-flat p-4 aspect-square flex flex-col items-center justify-center cursor-pointer" onclick="playSpecific(1)">
                    <div class="neu-inset w-12 h-12 rounded-full flex items-center justify-center mb-2 text-indigo-500"><i class="fas fa-moon"></i></div>
                    <span class="text-[11px] font-bold">助眠波</span>
                </div>
                <div class="neu-flat p-4 aspect-square flex flex-col items-center justify-center cursor-pointer" onclick="playSpecific(2)">
                    <div class="neu-inset w-12 h-12 rounded-full flex items-center justify-center mb-2 text-green-500"><i class="fas fa-leaf"></i></div>
                    <span class="text-[11px] font-bold">专注森</span>
                </div>
            </div>
        </main>

        <main id="page-ai" class="page safe-bottom">
            <h2 class="text-xl font-bold mb-8 text-center text-gray-600">AI 调音台</h2>
            <div class="neu-inset p-5 mb-8">
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">创意灵感</label>
                <textarea class="w-full bg-transparent outline-none mt-2 text-sm text-gray-600" rows="3" placeholder="描述你想要的氛围..."></textarea>
            </div>
            <div class="space-y-8 mb-10 px-2">
                <div>
                    <div class="flex justify-between text-[11px] mb-3 font-bold text-gray-400"><span>节奏 (BPM)</span><span class="text-[#6d5dfc]">128</span></div>
                    <div class="neu-inset h-3 p-0.5"><div class="h-full bg-[#6d5dfc] rounded-full w-[65%]"></div></div>
                </div>
                <div>
                    <div class="flex justify-between text-[11px] mb-3 font-bold text-gray-400"><span>情感强度</span><span class="text-[#6d5dfc]">激昂</span></div>
                    <div class="neu-inset h-3 p-0.5"><div class="h-full bg-[#6d5dfc] rounded-full w-[85%]"></div></div>
                </div>
            </div>
            <button class="w-full py-4 neu-flat neu-button text-[#6d5dfc] font-bold">
                <i class="fas fa-wand-sparkles mr-2"></i> 开始编曲
            </button>
        </main>

        <main id="page-player" class="page safe-bottom">
            <div class="flex flex-col items-center pt-2">
                <div class="neu-flat p-3 rounded-[40px] mb-6">
                    <img id="player-cover" src="https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=500" class="w-56 h-56 md:w-64 md:h-64 rounded-[32px] object-cover transition-all duration-500">
                </div>

                <h2 id="player-title" class="text-xl font-bold text-gray-700 text-center">虚幻之城</h2>
                <p id="player-artist" class="text-gray-400 mb-6 uppercase tracking-[0.2em] text-[9px] font-bold">Lo-Fi AI Beats</p>

                <div class="w-full px-6 mb-8">
                    <div class="neu-inset h-2.5 w-full mb-3 p-0.5 cursor-pointer" id="progress-container">
                        <div id="progress-bar" class="h-full bg-[#6d5dfc] rounded-full w-0 relative">
                            <div class="absolute -right-2 -top-1.5 w-5 h-5 neu-flat rounded-full border-[3px] border-[#e0e5ec] transition-colors duration-300" id="progress-dot"></div>
                        </div>
                    </div>
                    <div class="flex justify-between text-[10px] font-bold text-gray-400">
                        <span id="current-time">00:00</span>
                        <span id="duration-time">00:00</span>
                    </div>
                </div>

                <div class="flex justify-between items-center w-full px-10">
                    <div class="neu-button w-12 h-12 rounded-full neu-flat text-gray-400" onclick="prevSong()">
                        <i class="fas fa-backward text-sm"></i>
                    </div>
                    <div id="play-btn" class="neu-button w-20 h-20 rounded-full neu-flat text-[#6d5dfc] text-xl">
                        <i class="fas fa-play ml-1" id="play-icon"></i>
                    </div>
                    <div class="neu-button w-12 h-12 rounded-full neu-flat text-gray-400" onclick="nextSong()">
                        <i class="fas fa-forward text-sm"></i>
                    </div>
                </div>
            </div>
        </main>

        <main id="page-user" class="page safe-bottom">
            <header class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold text-gray-600">个人中心</h2>
                <div class="neu-button w-11 h-11 rounded-full neu-flat" onclick="toggleDrawer()"><i class="fas fa-cog"></i></div>
            </header>
            <section class="flex flex-col items-center mb-6">
                <div class="neu-flat p-1 w-28 h-28 rounded-full mb-3 overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=400" class="w-full h-full rounded-full object-cover">
                </div>
                <h3 id="profile-name" class="text-lg font-bold text-gray-700">未登录</h3>
            </section>
            <div class="flex gap-4 mb-6">
                <div class="neu-flat flex-1 py-3 text-center">
                    <span id="stat-creations" class="block text-lg font-bold text-[#6d5dfc]">0</span>
                    <span class="text-[13px] font-bold text-gray-400 uppercase">创作</span>
                </div>
                <div class="neu-flat flex-1 py-3 text-center">
                    <span id="stat-balance" class="block text-lg font-bold text-[#6d5dfc]">0</span>
                    <span class="text-[13px] font-bold text-gray-400 uppercase">余额</span>
                </div>
                <div class="neu-flat flex-1 py-3 text-center">
                    <span id="stat-likes" class="block text-lg font-bold text-[#6d5dfc]">0</span>
                    <span class="text-[13px] font-bold text-gray-400 uppercase">收藏</span>
                </div>
            </div>
            <div class="space-y-3">
                <div class="neu-flat p-4 flex items-center justify-between cursor-pointer">
                    <div class="flex items-center"><div class="w-9 h-9 neu-inset flex items-center justify-center mr-3 text-[#6d5dfc]"><i class="fas fa-crown text-xs"></i></div><span class="font-bold text-xs text-gray-600">Pro 会员</span></div>
                    <i class="fas fa-chevron-right text-gray-300 text-[10px]"></i>
                </div>
                <div id="user-auth-entry" class="neu-flat p-4 flex items-center justify-between cursor-pointer" onclick="showAuth('login')">
                    <div class="flex items-center"><div class="w-9 h-9 neu-inset flex items-center justify-center mr-3 text-blue-500"><i class="fas fa-user-circle text-xs"></i></div><span id="user-auth-text" class="font-bold text-xs text-gray-600">账号登录</span></div>
                    <i class="fas fa-chevron-right text-gray-300 text-[10px]"></i>
                </div>
            </div>
        </main>

        <nav class="nav-fixed h-20 neu-flat flex justify-around items-center px-4">
            <button onclick="navTo('home', event)" class="nav-item neu-button w-12 h-12 rounded-2xl text-[#6d5dfc]">
                <i class="fas fa-home"></i>
            </button>
            <button onclick="navTo('ai', event)" class="nav-item neu-button w-12 h-12 rounded-2xl text-gray-400">
                <i class="fas fa-magic"></i>
            </button>
            <button onclick="navTo('player', event)" class="nav-item neu-button w-12 h-12 rounded-2xl text-gray-400">
                <i class="fas fa-music"></i>
            </button>
            <button onclick="navTo('user', event)" class="nav-item neu-button w-12 h-12 rounded-2xl text-gray-400">
                <i class="fas fa-user"></i>
            </button>
        </nav>
    </div>

    <script>
        // 配置 API 地址
        const API_BASE = "https://api.immmor.com"; // ⚠️ 请替换为你真实的 Worker URL

        // 1. 数据配置
        const playlist = [
            { title: "虚幻之城", artist: "Lo-Fi AI Beats", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3", cover: "https://images.unsplash.com/photo-1493225255756-d9584f8606e9?w=500" },
            { title: "赛博脉冲", artist: "Synthwave AI", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3", cover: "https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=500" },
            { title: "森林深处", artist: "Nature Ambient", src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3", cover: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=500" }
        ];
        let currentIndex = 0;
        let currentUser = JSON.parse(localStorage.getItem('im_user')) || null;

        // 2. 核心逻辑：导航
        function navTo(pageId, event) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            const target = document.getElementById('page-' + pageId);
            if(target) target.classList.add('page-active');
            
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('text-[#6d5dfc]');
                btn.classList.add('text-gray-400');
            });
            const currentBtn = event ? event.currentTarget : document.querySelector(`.nav-item:nth-child(${['home','ai','player','user'].indexOf(pageId)+1})`);
            if(currentBtn) {
                currentBtn.classList.remove('text-gray-400');
                currentBtn.classList.add('text-[#6d5dfc]');
            }

            if (window.navigator.vibrate) window.navigator.vibrate(10);
            window.scrollTo(0, 0);
            if(pageId === 'user') updateUI();
        }

        // 3. 核心逻辑：播放控制
        const audio = document.getElementById('main-audio');
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const progressBar = document.getElementById('progress-bar');
        const progressContainer = document.getElementById('progress-container');
        const currentTimeEl = document.getElementById('current-time');
        const durationTimeEl = document.getElementById('duration-time');

        function loadSong(index) {
            const song = playlist[index];
            audio.src = song.src;
            document.getElementById('player-title').textContent = song.title;
            document.getElementById('player-artist').textContent = song.artist;
            document.getElementById('player-cover').src = song.cover;
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playIcon.classList.replace('fa-play', 'fa-pause');
                playBtn.classList.add('breathing');
            } else {
                audio.pause();
                playIcon.classList.replace('fa-pause', 'fa-play');
                playBtn.classList.remove('breathing');
            }
        }

        function nextSong() {
            currentIndex = (currentIndex + 1) % playlist.length;
            loadSong(currentIndex);
            audio.play();
            playIcon.classList.replace('fa-play', 'fa-pause');
            playBtn.classList.add('breathing');
        }

        function prevSong() {
            currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            loadSong(currentIndex);
            audio.play();
            playIcon.classList.replace('fa-play', 'fa-pause');
            playBtn.classList.add('breathing');
        }

        function playSpecific(index) {
            currentIndex = index;
            loadSong(currentIndex);
            navTo('player');
            setTimeout(() => togglePlay(), 100);
        }

        playBtn.addEventListener('click', togglePlay);
        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressBar.style.width = `${percent || 0}%`;
            currentTimeEl.textContent = formatTime(audio.currentTime);
        });
        audio.addEventListener('loadedmetadata', () => {
            durationTimeEl.textContent = formatTime(audio.duration);
        });
        progressContainer.addEventListener('click', (e) => {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            audio.currentTime = (clickX / width) * audio.duration;
        });

        function formatTime(time) {
            if (isNaN(time)) return "00:00";
            const min = Math.floor(time / 60);
            const sec = Math.floor(time % 60);
            return `${min.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        // 4. UI 交互逻辑 (侧边栏/搜索/登录/深色模式)
        function toggleDrawer() {
            document.getElementById('side-drawer').classList.toggle('drawer-active');
        }

        function toggleSearch() {
            const el = document.getElementById('search-overlay');
            const isVisible = el.style.display === 'flex';
            el.style.display = isVisible ? 'none' : 'flex';
            if (!isVisible) {
                document.getElementById('search-input').value = '';
                document.getElementById('search-results').innerHTML = '';
                document.getElementById('search-hot').style.display = 'block';
                document.getElementById('search-input').focus();
            }
        }

        function handleSearch(query) {
            const resultsContainer = document.getElementById('search-results');
            const hotContainer = document.getElementById('search-hot');
            const inputEl = document.getElementById('search-input');
            inputEl.value = query;
            if (!query.trim()) {
                resultsContainer.innerHTML = '';
                hotContainer.style.display = 'block';
                return;
            }
            hotContainer.style.display = 'none';
            const filtered = playlist.map((song, index) => ({...song, originalIndex: index}))
                                     .filter(song => song.title.includes(query) || song.artist.includes(query));

            if (filtered.length > 0) {
                resultsContainer.innerHTML = filtered.map(song => `
                    <div class="neu-flat p-4 flex items-center justify-between cursor-pointer" onclick="playSpecific(${song.originalIndex}); toggleSearch();">
                        <div class="flex items-center">
                            <img src="${song.cover}" class="w-10 h-10 rounded-lg object-cover mr-4">
                            <div>
                                <div class="text-sm font-bold">${song.title}</div>
                                <div class="text-[10px] text-gray-400">${song.artist}</div>
                            </div>
                        </div>
                        <i class="fas fa-play text-[#6d5dfc] text-xs"></i>
                    </div>
                `).join('');
            } else {
                resultsContainer.innerHTML = '<div class="text-center text-gray-400 text-xs py-10">未找到相关创作</div>';
            }
        }

        function toggleDarkMode() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            if (isDark) {
                body.removeAttribute('data-theme');
                document.getElementById('theme-status').textContent = 'OFF';
            } else {
                body.setAttribute('data-theme', 'dark');
                document.getElementById('theme-status').textContent = 'ON';
            }
            if (window.navigator.vibrate) window.navigator.vibrate(20);
        }

        // --- 核心：登录注册对接 ---
        let isLoginMode = true;

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').textContent = isLoginMode ? "欢迎回来" : "创建账号";
            document.getElementById('auth-submit-btn').textContent = isLoginMode ? "进入音乐世界" : "注册并登录";
            document.getElementById('auth-switch-container').innerHTML = isLoginMode ? 
                '还没有账号？<span class="text-[#6d5dfc] cursor-pointer" onclick="toggleAuthMode()">立即注册</span>' : 
                '已有账号？<span class="text-[#6d5dfc] cursor-pointer" onclick="toggleAuthMode()">去登录</span>';
        }

        function showAuth(mode) {
            if (currentUser && mode === 'login') return; // 已登录不触发
            document.getElementById('auth-overlay').style.display = 'flex';
            if (document.getElementById('side-drawer').classList.contains('drawer-active')) {
                toggleDrawer();
            }
        }

        function closeAuth() {
            document.getElementById('auth-overlay').style.display = 'none';
        }

        async function handleAuth() {
            const username = document.getElementById('auth-username').value;
            const password = document.getElementById('auth-password').value;

            if (!username || !password) {
                alert("请输入账号和密码");
                return;
            }

            const endpoint = isLoginMode ? '/api/login' : '/api/register';
            const btn = document.getElementById('auth-submit-btn');
            const originalText = btn.textContent;
            
            btn.textContent = "处理中...";
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.success) {
                    currentUser = result.userInfo;
                    localStorage.setItem('im_user', JSON.stringify(currentUser));
                    alert(isLoginMode ? "登录成功！" : "注册成功并已登录！");
                    closeAuth();
                    updateUI();
                } else {
                    alert(result.message || "操作失败，请重试");
                }
            } catch (err) {
                alert("连接服务器失败，请检查网络或 API 配置");
            } finally {
                btn.textContent = originalText;
                btn.disabled = false;
            }
        }

        function handleLogout() {
            currentUser = null;
            localStorage.removeItem('im_user');
            updateUI();
            toggleDrawer();
            alert("已退出登录");
        }

        async function updateUI() {
            const profileName = document.getElementById('profile-name');
            const userAuthText = document.getElementById('user-auth-text');
            const drawerUser = document.getElementById('drawer-user-info');
            const logoutBtn = document.getElementById('logout-btn');
            const statBalance = document.getElementById('stat-balance');

            if (currentUser) {
                profileName.textContent = currentUser.username;
                userAuthText.textContent = "账号已登录";
                drawerUser.innerHTML = `<i class="fas fa-user-circle"></i> ${currentUser.username}`;
                logoutBtn.classList.remove('hidden');
                
                // 异步获取余额
                try {
                    const res = await fetch(`${API_BASE}/api/balance?username=${currentUser.username}`);
                    const data = await res.json();
                    if(data.code === 200) statBalance.textContent = data.balance;
                } catch(e) {}
            } else {
                profileName.textContent = "未登录";
                userAuthText.textContent = "账号登录";
                drawerUser.innerHTML = `<i class="fas fa-sign-in-alt"></i> 登录账号`;
                logoutBtn.classList.add('hidden');
                statBalance.textContent = "0";
            }
        }

        // 初始化 
        loadSong(0);
        updateUI();
    </script>
</body>
</html>
