<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroAI - 怀旧智能音箱</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #ffedd5; /* 暖米色背景 */
            --accent: #ff3e00; /* 复古红 */
            --dark: #2d2d2d; /* 碳素黑 */
            --blue: #00d2ff; /* 蒸汽波蓝 */
        }

        body {
            background-color: var(--bg);
            color: var(--dark);
            font-family: 'Courier New', Courier, monospace; /* 模拟打印机字体 */
            font-weight: bold;
        }

        /* 复古硬边投影 */
        .retro-shadow {
            box-shadow: 6px 6px 0px var(--dark);
            border: 3px solid var(--dark);
        }

        .active-btn {
            background-color: var(--dark) !important;
            color: white !important;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--dark);
        }

        /* 旋转唱片机效果 */
        @keyframes rotate-vinyl {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .vinyl-record {
            background: radial-gradient(circle, #333 30%, #111 31%, #333 33%, #111 35%, #333 70%);
            animation: rotate-vinyl 4s linear infinite;
            animation-play-state: paused;
        }
        .playing .vinyl-record {
            animation-play-state: running;
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* 模拟LCD屏幕 */
        .lcd-screen {
            background-color: #94a3b8;
            color: #1e293b;
            font-family: 'monospace';
            text-shadow: 1px 1px 0px rgba(255,255,255,0.3);
            border: 4px inset #64748b;
        }
    </style>
</head>
<body class="p-4 min-h-screen pb-28">

    <header class="flex justify-between items-end mb-6">
        <div>
            <p class="text-xs uppercase tracking-widest opacity-60">System v2.0</p>
            <h1 class="text-3xl font-black italic">RETRO<span class="text-[var(--accent)]">AI</span></h1>
        </div>
        <div class="retro-shadow bg-yellow-300 px-3 py-1 text-sm font-bold">
            ON AIR
        </div>
    </header>

    <div id="content">
        
        <section id="tab-home" class="tab-panel active">
            <div class="lcd-screen p-4 mb-6 rounded-sm">
                <marquee scrollamount="5">>>> 正在连接 AI 频率... 发现 128 个新的合成波音轨... <<<</marquee>
            </div>

            <h2 class="text-lg mb-4 border-b-4 border-dark inline-block">热门黑胶 / HOT</h2>
            <div class="grid grid-cols-1 gap-6">
                <div class="retro-shadow bg-white p-4 flex gap-4 items-center">
                    <div class="w-20 h-20 bg-blue-400 flex-shrink-0 border-2 border-black flex items-center justify-center">
                        <i class="fas fa-compact-disc text-3xl"></i>
                    </div>
                    <div class="flex-grow">
                        <h3 class="font-bold">午夜出租车</h3>
                        <p class="text-xs opacity-70">风格: City Pop / AI</p>
                        <button class="mt-2 text-xs border-2 border-black px-2 py-1 font-bold hover:bg-black hover:text-white">播放 TRACK-01</button>
                    </div>
                </div>
                <div class="retro-shadow bg-orange-400 p-4 flex gap-4 items-center">
                    <div class="w-20 h-20 bg-pink-400 flex-shrink-0 border-2 border-black flex items-center justify-center">
                        <i class="fas fa-robot text-3xl"></i>
                    </div>
                    <div class="flex-grow text-white">
                        <h3 class="font-bold text-black">电子心脏</h3>
                        <p class="text-xs text-black opacity-70">风格: Future Bass</p>
                        <button class="mt-2 text-xs border-2 border-black bg-white text-black px-2 py-1 font-bold">播放 TRACK-02</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="tab-create" class="tab-panel">
            <div class="retro-shadow bg-white p-6">
                <h2 class="text-xl font-black mb-4 underline">AI 编曲实验室</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block mb-2">选择情感采样：</label>
                        <select class="w-full border-4 border-black p-2 font-bold focus:outline-none">
                            <option>忧郁 (Blue)</option>
                            <option>狂欢 (Party)</option>
                            <option>怀旧 (Vaporwave)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block mb-2">AI 歌词关键词：</label>
                        <input type="text" placeholder="例如: 霓虹、雨幕、电话亭" class="w-full border-4 border-black p-2 outline-none">
                    </div>
                    <div class="pt-4">
                        <button class="w-full bg-[var(--accent)] text-white p-4 font-black text-xl retro-shadow active:translate-y-1 active:shadow-none transition-all">
                            GENERATE / 生成
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section id="tab-player" class="tab-panel text-center">
            <div id="player-container" class="relative inline-block mt-8 mb-8 playing">
                <div class="vinyl-record w-64 h-64 rounded-full border-8 border-gray-800 flex items-center justify-center relative shadow-2xl">
                    <div class="w-20 h-20 bg-yellow-400 rounded-full border-4 border-black flex items-center justify-center">
                        <div class="w-2 h-2 bg-black rounded-full"></div>
                    </div>
                </div>
                <div class="absolute -top-4 -right-4 w-12 h-32 origin-top transform rotate-12 transition-transform">
                    <div class="w-2 h-24 bg-gray-400 mx-auto border-2 border-black"></div>
                    <div class="w-6 h-4 bg-gray-600 border-2 border-black"></div>
                </div>
            </div>
            
            <div class="retro-shadow bg-white p-4 mx-auto max-w-xs">
                <h3 class="text-xl font-black">Track 04: 涩谷雨后</h3>
                <p class="text-sm">AI Composer v1.2</p>
            </div>

            <div class="flex justify-center gap-6 mt-8">
                <button class="retro-shadow w-12 h-12 bg-white flex items-center justify-center active:bg-gray-200">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button onclick="togglePlay()" class="retro-shadow w-16 h-16 bg-[var(--accent)] text-white flex items-center justify-center text-2xl">
                    <i class="fas fa-play" id="play-icon"></i>
                </button>
                <button class="retro-shadow w-12 h-12 bg-white flex items-center justify-center">
                    <i class="fas fa-step-forward"></i>
                </button>
            </div>
        </section>
    </div>

    <nav class="fixed bottom-6 left-4 right-4 h-20 bg-white border-4 border-black flex justify-around items-center px-2 z-50 retro-shadow">
        <button onclick="switchTab('home')" class="nav-btn p-3 font-bold text-xs flex flex-col items-center active-btn">
            <i class="fas fa-th-large mb-1"></i>
            <span>HOME</span>
        </button>
        <button onclick="switchTab('create')" class="nav-btn p-3 font-bold text-xs flex flex-col items-center">
            <i class="fas fa-flask mb-1"></i>
            <span>LAB</span>
        </button>
        <button onclick="switchTab('player')" class="nav-btn p-3 font-bold text-xs flex flex-col items-center">
            <i class="fas fa-record-vinyl mb-1"></i>
            <span>PLAY</span>
        </button>
        <button class="p-3 font-bold text-xs flex flex-col items-center opacity-40">
            <i class="fas fa-user mb-1"></i>
            <span>USER</span>
        </button>
    </nav>

    <script>
        function switchTab(tabId) {
            // 隐藏所有面板
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            // 显示选中的面板
            document.getElementById('tab-' + tabId).classList.add('active');
            
            // 更新导航按钮状态
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-btn'));
            event.currentTarget.classList.add('active-btn');
        }

        function togglePlay() {
            const container = document.getElementById('player-container');
            const icon = document.getElementById('play-icon');
            container.classList.toggle('playing');
            
            if (container.classList.contains('playing')) {
                icon.classList.replace('fa-play', 'fa-pause');
            } else {
                icon.classList.replace('fa-pause', 'fa-play');
            }
        }
    </script>
</body>
</html>
