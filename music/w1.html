<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CF Web3 收款钱包</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
    body { max-width: 500px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
    .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    h2 { color: #333; margin-bottom: 15px; font-size: 18px; }
    .address-box { padding: 10px; background: #f8f8f8; border-radius: 8px; margin: 10px 0; word-break: break-all; }
    button { background: #2f54eb; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 16px; margin: 10px 0; }
    button:hover { background: #1d39c4; }
    input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; margin: 10px 0; font-size: 16px; }
    .qrcode-box { text-align: center; margin: 20px 0; }
    .balance-item { margin: 10px 0; padding: 10px; background: #f8f8f8; border-radius: 8px; }
    .record-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    .received { color: #00b42a; font-weight: bold; }
    .loading { color: #999; font-size: 14px; margin: 10px 0; }
  </style>
  <!-- 引入ethers.js（生成地址）和二维码库 -->
   <script src="ai.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.0/dist/ethers.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
</head>
<body>
  <!-- 1. 生成收款地址 -->
  <div class="card">
    <h2>🔑 生成专属收款地址</h2>
    <button id="genAddressBtn">生成新收款地址</button>
    <div id="mnemonic" class="address-box" style="display: none; color: #ff4d4f;">
      助记词（请妥善保存，仅本地生成）：<br><span id="mnemonicText"></span>
    </div>
    <div id="addressBox" class="address-box" style="display: none;">
      收款地址：<br><span id="addressText"></span>
    </div>
  </div>

  <!-- 2. 收款码展示 -->
  <div class="card" id="qrcodeCard" style="display: none;">
    <h2>📱 收款二维码</h2>
    <div class="qrcode-box">
  <canvas id="qrcode"></canvas>
</div>
    <input type="number" id="targetAmount" placeholder="输入待收USDT金额（可选）" step="0.000001">
    <button id="checkBtn">检测是否到账</button>
    <div id="receiveStatus"></div>
  </div>

  <!-- 3. 余额查询 -->
  <div class="card">
    <h2>💰 余额查询</h2>
    <input id="queryAddress" placeholder="粘贴收款地址查询余额">
    <button id="queryBalanceBtn">查询 ETH/USDT 余额</button>
    <div class="loading" id="loading" style="display: none;">查询中...</div>
    <div id="balanceBox"></div>
  </div>

  <!-- 4. 收款记录 -->
  <div class="card" id="recordsCard" style="display: none;">
    <h2>📜 最近收款记录</h2>
    <div id="recordsList"></div>
  </div>

  <script>
    // 替换为你的 Workers API 地址
    const API_URL = "https://web3.ninenine000099.workers.dev";
    let currentAddress = "";

    // 1. 生成收款地址（本地生成，永不上传）
    document.getElementById("genAddressBtn").addEventListener("click", async () => {
      const wallet = ethers.Wallet.createRandom();
      currentAddress = wallet.address;
      
      // 显示助记词和地址
      document.getElementById("mnemonic").style.display = "block";
      document.getElementById("mnemonicText").textContent = wallet.mnemonic.phrase;
      document.getElementById("addressBox").style.display = "block";
      document.getElementById("addressText").textContent = currentAddress;
      document.getElementById("queryAddress").value = currentAddress;
      
      // 生成收款二维码
      document.getElementById("qrcodeCard").style.display = "block";
      // 修复后代码
QRCode.toCanvas(document.getElementById("qrcode"), currentAddress, {
  width: 200
}, (error) => {
  if (error) console.error(error);
});
    });

    // 2. 检测是否到账
    document.getElementById("checkBtn").addEventListener("click", async () => {
      if (!currentAddress) return alert("请先生成收款地址");
      const targetAmount = document.getElementById("targetAmount").value;
      if (!targetAmount) return alert("请输入待收USDT金额");

      document.getElementById("receiveStatus").textContent = "检测中...";
      try {
        const res = await fetch(`${API_URL}?address=${currentAddress}&amount=${targetAmount}`);
        const data = await res.json();
        
        if (data.is_received) {
          document.getElementById("receiveStatus").className = "received";
          document.getElementById("receiveStatus").textContent = `✅ 已收到 ${targetAmount} USDT！`;
        } else {
          document.getElementById("receiveStatus").className = "";
          document.getElementById("receiveStatus").textContent = `❌ 暂未收到 ${targetAmount} USDT，当前余额：${data.usdt_balance} USDT`;
        }
      } catch (e) {
        document.getElementById("receiveStatus").textContent = "检测失败：" + e.message;
      }
    });

    // 3. 查询余额和收款记录
    document.getElementById("queryBalanceBtn").addEventListener("click", async () => {
      const address = document.getElementById("queryAddress").value.trim();
      if (!address) return alert("请输入收款地址");

      document.getElementById("loading").style.display = "block";
      document.getElementById("balanceBox").innerHTML = "";
      document.getElementById("recordsCard").style.display = "none";

      try {
        const res = await fetch(`${API_URL}?address=${address}`);
        const data = await res.json();

        if (data.error) throw new Error(data.detail);

        // 显示余额
        document.getElementById("balanceBox").innerHTML = `
          <div class="balance-item">ETH 余额：${data.eth_balance} ETH</div>
          <div class="balance-item">USDT 余额：${data.usdt_balance} USDT</div>
          <div class="balance-item">更新时间：${data.update_time}</div>
        `;

        // 显示收款记录
        document.getElementById("recordsCard").style.display = "block";
        const recordsList = document.getElementById("recordsList");
        recordsList.innerHTML = "";

        if (data.receive_records.length === 0) {
          recordsList.innerHTML = "<div>暂无收款记录</div>";
        } else {
          data.receive_records.forEach(record => {
            const item = document.createElement("div");
            item.className = "record-item";
            item.innerHTML = `
              <div>
                金额：${record.amount} USDT<br>
                时间：${record.timestamp}
              </div>
              <div>交易哈希：<br>${record.tx_hash.slice(0, 8)}...</div>
            `;
            recordsList.appendChild(item);
          });
        }
      } catch (e) {
        document.getElementById("balanceBox").innerHTML = `<div style="color: red;">查询失败：${e.message}</div>`;
      } finally {
        document.getElementById("loading").style.display = "none";
      }
    });
  </script>
</body>
</html>
