<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura AI - 灵感流体</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --aura-1: #4f46e5;
            --aura-2: #ec4899;
            --aura-3: #06b6d4;
        }

        body {
            background-color: #030712;
            color: #f8fafc;
            font-family: 'PingFang SC', -apple-system, sans-serif;
            overflow: hidden; /* 防止滑动抖动 */
            height: 100vh;
        }

        /* 动态弥散背景 */
        .aura-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.6;
            overflow: hidden;
        }
        .aura-sphere {
            position: absolute;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }
        @keyframes move {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(20%, 30%) scale(1.2); }
        }

        /* 毛玻璃容器 */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }

        /* 页面切换动画 */
        .view { display: none; height: calc(100vh - 160px); overflow-y: auto; }
        .view-active { display: block; animation: zoomIn 0.5s ease; }

        @keyframes zoomIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 律动频谱动画 */
        .visualizer-bar {
            background: linear-gradient(to top, var(--aura-1), var(--aura-3));
            animation: spectrum 1.2s ease-in-out infinite;
        }
        @keyframes spectrum {
            0%, 100% { height: 10%; }
            50% { height: 80%; }
        }
    </style>
</head>
<body>

    <div class="aura-bg">
        <div class="aura-sphere w-[500px] h-[500px] bg-indigo-600 top-[-100px] left-[-100px]" style="animation-duration: 15s;"></div>
        <div class="aura-sphere w-[400px] h-[400px] bg-pink-600 bottom-[-50px] right-[-50px]" style="animation-duration: 25s; animation-delay: -5s;"></div>
        <div class="aura-sphere w-[300px] h-[300px] bg-cyan-500 top-[20%] right-[-100px]" style="animation-duration: 20s; animation-delay: -2s;"></div>
    </div>

    <header class="p-6 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-indigo-500 to-pink-500 animate-pulse"></div>
            <span class="text-xl font-light tracking-[0.2em]">AURA<span class="font-bold">AI</span></span>
        </div>
        <button class="text-white/60"><i class="fa-solid fa-sliders"></i></button>
    </header>

    <main id="view-home" class="view view-active px-6 no-scrollbar">
        <h2 class="text-3xl font-bold mb-6">此刻氛围</h2>
        <div class="grid grid-cols-1 gap-6">
            <div class="glass-panel p-6 rounded-[32px] relative overflow-hidden group h-48 flex flex-col justify-end" onclick="openPlayer()">
                <div class="absolute top-0 right-0 p-6 opacity-20 text-6xl italic font-black">01</div>
                <h3 class="text-2xl font-bold">深度入眠</h3>
                <p class="text-white/40 text-sm italic">由 AI 实时合成的 432Hz 疗愈频率</p>
                <div class="mt-4 flex gap-1 h-4 items-center">
                    <div class="visualizer-bar w-1 rounded-full" style="animation-delay: 0.1s"></div>
                    <div class="visualizer-bar w-1 rounded-full" style="animation-delay: 0.3s"></div>
                    <div class="visualizer-bar w-1 rounded-full" style="animation-delay: 0.2s"></div>
                </div>
            </div>
            
            <div class="flex gap-4">
                <div class="glass-panel flex-1 p-6 rounded-[32px] h-40 flex flex-col justify-between border-indigo-500/30">
                    <i class="fa-solid fa-bolt-lightning text-indigo-400"></i>
                    <span class="font-bold">能量唤醒</span>
                </div>
                <div class="glass-panel flex-1 p-6 rounded-[32px] h-40 flex flex-col justify-between border-pink-500/30">
                    <i class="fa-solid fa-brain text-pink-400"></i>
                    <span class="font-bold">专注流</span>
                </div>
            </div>
        </div>
    </main>

    <main id="view-ai" class="view px-6 no-scrollbar">
        <h2 class="text-3xl font-bold mb-6">生成旋律</h2>
        <div class="glass-panel p-8 rounded-[40px] space-y-8">
            <div class="space-y-4">
                <p class="text-center text-white/60 text-sm">选择你的创作基调</p>
                <div class="flex justify-between items-center bg-black/20 p-2 rounded-2xl">
                    <button class="px-6 py-2 rounded-xl bg-white/10 shadow-xl font-bold">空灵</button>
                    <button class="px-6 py-2 rounded-xl text-white/40">机械</button>
                    <button class="px-6 py-2 rounded-xl text-white/40">复古</button>
                </div>
            </div>

            <div class="relative h-24 flex items-center justify-center">
                <div class="absolute w-20 h-20 border-2 border-dashed border-white/20 rounded-full animate-[spin_10s_linear_infinite]"></div>
                <i class="fa-solid fa-wand-sparkles text-3xl text-indigo-400"></i>
            </div>

            <button onclick="startGenerate()" class="w-full py-4 bg-gradient-to-r from-indigo-600 to-cyan-500 rounded-2xl font-bold tracking-widest hover:brightness-110 transition shadow-[0_0_30px_rgba(79,70,229,0.4)]">
                开始合成
            </button>
        </div>
    </main>

    <main id="view-player" class="view px-6 no-scrollbar text-center">
        <div class="mt-8 space-y-8">
            <div class="w-64 h-64 mx-auto glass-panel rounded-full p-2 flex items-center justify-center">
                <div class="w-full h-full rounded-full bg-gradient-to-tr from-indigo-900 to-pink-900 flex items-center justify-center overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/abstract/svg?seed=music" class="w-full opacity-80 scale-150">
                </div>
            </div>
            <div>
                <h3 class="text-2xl font-bold">银河漂流</h3>
                <p class="text-white/40 tracking-[0.3em] uppercase text-[10px] mt-2">Atmospheric AI Symphony</p>
            </div>
            <div class="h-24 flex flex-col justify-center space-y-2">
                <p class="text-white/20 text-sm italic">星尘在指尖跳跃</p>
                <p class="text-white font-medium text-lg">万物皆是振动的回响</p>
                <p class="text-white/20 text-sm italic">时空在频率中折叠</p>
            </div>
            <div class="flex justify-center items-center gap-12 text-2xl">
                <i class="fa-solid fa-shuffle text-white/20 text-lg"></i>
                <i class="fa-solid fa-play"></i>
                <i class="fa-solid fa-repeat text-white/20 text-lg"></i>
            </div>
        </div>
    </main>

    <nav class="fixed bottom-10 left-1/2 -translate-x-1/2 w-[80%] h-16 glass-panel rounded-full flex justify-around items-center px-4 z-[100]">
        <button onclick="switchTab('home')" class="nav-btn text-white"><i class="fa-solid fa-house-chimney"></i></button>
        <button onclick="switchTab('ai')" class="nav-btn text-white/40"><i class="fa-solid fa-plus text-xl"></i></button>
        <button onclick="switchTab('player')" class="nav-btn text-white/40"><i class="fa-solid fa-waveform"></i></button>
        <button class="nav-btn text-white/40"><i class="fa-solid fa-user-ninja"></i></button>
    </nav>

    <div id="gen-toast" class="fixed top-10 left-1/2 -translate-x-1/2 glass-panel px-6 py-3 rounded-2xl border-indigo-500/50 hidden z-[200]">
        <span class="text-sm font-bold tracking-widest animate-pulse">AI 正在捕捉灵感...</span>
    </div>

    <script>
        function switchTab(tab) {
            // 切换 View
            document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
            document.getElementById('view-' + tab).classList.add('view-active');

            // 切换导航颜色
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.add('text-white/40'));
            event.currentTarget.classList.remove('text-white/40');
            event.currentTarget.classList.add('text-white');
        }

        function startGenerate() {
            const toast = document.getElementById('gen-toast');
            toast.style.display = 'block';
            setTimeout(() => {
                toast.innerHTML = '✨ 合成完毕 - "幻梦之境"';
                setTimeout(() => {
                    toast.style.display = 'none';
                    switchTab('player');
                }, 1500);
            }, 3000);
        }

        function openPlayer() {
            switchTab('player');
        }
    </script>
</body>
</html>
