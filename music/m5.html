<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBE-X | AI 音乐实验场</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@500;700&display=swap');

        :root {
            --accent: #FF5D22; /* 活力橙 */
            --bg: #F4F4F0;    /* 纸张白 */
            --yellow: #FFF200;
            --blue: #3E38F5;
        }

        body {
            background-color: var(--bg);
            color: #1a1a1a;
            font-family: 'Space Grotesk', sans-serif;
            padding-bottom: 100px;
        }

        .brutal-card {
            background: white;
            border: 3px solid #1a1a1a;
            box-shadow: 6px 6px 0px #1a1a1a;
            transition: all 0.2s;
        }

        .brutal-card:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0px #1a1a1a;
        }

        .brutal-btn-orange {
            background: var(--accent);
            border: 3px solid #1a1a1a;
            box-shadow: 4px 4px 0px #1a1a1a;
            font-family: 'Archivo Black', sans-serif;
        }

        .font-header { font-family: 'Archivo Black', sans-serif; }

        /* 极简歌词滚动模拟 */
        .lyrics-line {
            opacity: 0.3;
            transition: all 0.5s;
        }
        .lyrics-active {
            opacity: 1;
            transform: scale(1.1);
            color: var(--blue);
        }

        /* 页面切换逻辑 */
        .view { display: none; }
        .view-active { display: block; animation: slideIn 0.3s ease-out; }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* 律动条动画 */
        .bar {
            width: 4px;
            background: #1a1a1a;
            animation: bounce 0.5s ease-in-out infinite alternate;
        }
        @keyframes bounce {
            from { height: 5px; }
            to { height: 25px; }
        }
    </style>
</head>
<body>

    <header class="p-6 flex justify-between items-center border-b-4 border-black bg-white sticky top-0 z-50">
        <h1 class="font-header text-3xl tracking-tighter italic">VIBE-X</h1>
        <div class="brutal-card px-3 py-1 bg-yellow-400 font-bold text-sm">PRO</div>
    </header>

    <main id="view-discover" class="view view-active p-5 space-y-8">
        <section>
            <div class="bg-blue-600 p-6 brutal-card mb-6 overflow-hidden relative">
                <div class="relative z-10 text-white">
                    <h2 class="font-header text-4xl leading-none mb-2">AI MINT<br>REMIX</h2>
                    <p class="text-sm font-bold opacity-80 mb-4">通过神经算法重塑经典</p>
                    <button class="bg-white text-black px-6 py-2 border-2 border-black font-bold text-xs">立即尝试</button>
                </div>
                <i class="fa-solid fa-compact-disc absolute -right-8 -bottom-8 text-9xl opacity-20 rotate-12"></i>
            </div>
        </section>

        <section>
            <h3 class="font-header text-xl mb-4 underline decoration-4 decoration-orange-500">热门风格</h3>
            <div class="grid grid-cols-2 gap-4">
                <div class="brutal-card p-4 bg-purple-400">
                    <div class="w-12 h-12 brutal-card bg-white flex items-center justify-center mb-4 text-xl">🎹</div>
                    <p class="font-bold">Lo-Fi HipHop</p>
                </div>
                <div class="brutal-card p-4 bg-green-400">
                    <div class="w-12 h-12 brutal-card bg-white flex items-center justify-center mb-4 text-xl">🎸</div>
                    <p class="font-bold">AI Rock</p>
                </div>
            </div>
        </section>

        <section>
            <h3 class="font-header text-xl mb-4">社区动态</h3>
            <div class="brutal-card p-4 flex gap-4 items-center mb-4">
                <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=1" class="w-12 h-12 border-2 border-black">
                <div class="flex-1">
                    <p class="text-xs font-bold text-blue-700">@Cyber_Punker</p>
                    <p class="text-sm font-bold">生成了一首 8-bit 复古神曲</p>
                </div>
                <i class="fa-solid fa-play-circle text-2xl"></i>
            </div>
        </section>
    </main>

    <main id="view-create" class="view p-5 space-y-6">
        <div class="brutal-card p-6 bg-white">
            <h2 class="font-header text-2xl mb-6">指令生成器</h2>
            <div class="mb-6">
                <p class="text-xs font-bold uppercase mb-2">1. 核心流派</p>
                <select class="w-full p-3 brutal-card font-bold outline-none appearance-none">
                    <option>未来贝斯 (Future Bass)</option>
                    <option>蒸汽波 (Vaporwave)</option>
                    <option>重金属 (Heavy Metal)</option>
                </select>
            </div>
            <div class="mb-6">
                <p class="text-xs font-bold uppercase mb-2">2. 情感注入</p>
                <div class="flex flex-wrap gap-2">
                    <span class="px-4 py-2 brutal-card bg-yellow-200 text-xs font-bold">孤独的</span>
                    <span class="px-4 py-2 brutal-card bg-pink-200 text-xs font-bold">疯狂的</span>
                    <span class="px-4 py-2 brutal-card bg-cyan-200 text-xs font-bold">清爽的</span>
                </div>
            </div>
            <button class="w-full py-5 brutal-btn-orange text-white text-xl uppercase tracking-widest">
                启动 AI 引擎
            </button>
        </div>
    </main>

    <main id="view-player" class="view p-5 text-center">
        <div class="brutal-card aspect-square mb-8 p-4 bg-white relative">
            <img src="https://picsum.photos/seed/music/600" class="w-full h-full object-cover border-2 border-black">
            <div class="absolute -bottom-4 -left-4 bg-black text-white px-4 py-2 font-bold rotate-[-5deg]">
                NOW VIBING
            </div>
        </div>
        <h2 class="font-header text-3xl mb-1">PLASTIC LOVE</h2>
        <p class="font-bold text-gray-500 mb-8 underline">AI-Remix V2.4</p>
        
        <div class="flex justify-center items-end gap-1 h-12 mb-8">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.5s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
        </div>

        <div class="flex justify-around items-center mb-12">
            <i class="fa-solid fa-backward-step text-3xl"></i>
            <div class="w-20 h-20 brutal-btn-orange rounded-full flex items-center justify-center text-white text-3xl">
                <i class="fa-solid fa-pause"></i>
            </div>
            <i class="fa-solid fa-forward-step text-3xl"></i>
        </div>
    </main>

    <nav class="fixed bottom-6 left-5 right-5 h-20 bg-[#1a1a1a] border-4 border-black flex justify-around items-center z-50 shadow-[8px 8px 0px #FF5D22]">
        <button onclick="changeTab('discover')" class="nav-item text-white flex flex-col items-center">
            <i class="fa-solid fa-house text-xl"></i>
            <span class="text-[10px] font-bold mt-1">发现</span>
        </button>
        <button onclick="changeTab('create')" class="nav-item text-gray-500 flex flex-col items-center">
            <i class="fa-solid fa-plus-square text-xl"></i>
            <span class="text-[10px] font-bold mt-1">创作</span>
        </button>
        <button onclick="changeTab('player')" class="nav-item text-gray-500 flex flex-col items-center">
            <i class="fa-solid fa-headphones text-xl"></i>
            <span class="text-[10px] font-bold mt-1">播放</span>
        </button>
    </nav>

    <script>
        function changeTab(tabName) {
            // 切换页面展示
            document.querySelectorAll('.view').forEach(v => v.classList.remove('view-active'));
            document.getElementById('view-' + tabName).classList.add('view-active');

            // 切换导航高亮
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.replace('text-white', 'text-gray-500');
            });
            event.currentTarget.classList.replace('text-gray-500', 'text-white');

            // 振动反馈 (如果设备支持)
            if (window.navigator.vibrate) {
                window.navigator.vibrate(10);
            }
        }

        // 模拟交互：点击风格卡片
        document.querySelectorAll('.brutal-card').forEach(card => {
            card.addEventListener('click', () => {
                console.log('Selected!');
            });
        });
    </script>
</body>
</html>
