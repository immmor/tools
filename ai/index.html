<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>immmorAI - 你的可爱AI小助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF85A1; /* 糖果粉 */
            --secondary: #7ED957; /* 抹茶绿 */
            --accent: #FFBD59; /* 芒果黄 */
            --bg-soft: #F0F4FF;
        }

        body {
            background-color: var(--bg-soft);
            background-image: radial-gradient(#FF85A1 0.5px, transparent 0.5px), radial-gradient(#FF85A1 0.5px, #F0F4FF 0.5px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            color: #4A4A4A;
            font-family: 'Nunito', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
        }

        .jelly-card {
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid #4A4A4A;
            border-radius: 2rem;
            box-shadow: 8px 8px 0px #4A4A4A;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .jelly-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 12px 12px 0px #4A4A4A;
        }

        .sidebar-item {
            transition: all 0.3s;
            cursor: pointer;
            margin-bottom: 0.5rem;
            border-radius: 1rem;
            border: 2px solid transparent;
        }

        .sidebar-item.active {
            background: var(--primary);
            color: white !important;
            border: 2px solid #4A4A4A;
            transform: scale(1.05);
        }

        .btn-cute {
            background: var(--accent);
            border: 2px solid #4A4A4A;
            box-shadow: 4px 4px 0px #4A4A4A;
            border-radius: 1rem;
            transition: all 0.1s;
        }

        .btn-cute:active {
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #4A4A4A;
        }

        .modal-overlay {
            background: rgba(255, 133, 161, 0.4);
            backdrop-filter: blur(5px);
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active { display: flex; }

        .page-content { display: none; animation: popIn 0.4s ease-out; }
        .page-content.active { display: block; }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body class="pb-20 md:pb-0">

    <div id="modalToken" class="modal-overlay p-4">
        <div class="jelly-card w-full max-w-md p-8 bg-white">
            <h3 class="text-2xl font-bold mb-6 text-center">✨ 召唤新口令 ✨</h3>
            <div class="space-y-4">
                <div>
                    <label class="font-bold block mb-2">给它起个好听的名字</label>
                    <input type="text" id="newTokenName" placeholder="比如：猫咪的秘密钥匙" class="w-full bg-pink-50 border-2 border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 ring-pink-300">
                </div>
                <div>
                    <label class="font-bold block mb-2">零花钱限额 ($)</label>
                    <input type="number" id="newTokenQuota" value="50" class="w-full bg-pink-50 border-2 border-slate-700 rounded-xl px-4 py-3 focus:outline-none">
                </div>
                <div class="flex gap-3 mt-8">
                    <button onclick="closeModal('modalToken')" class="flex-1 px-4 py-3 rounded-xl border-2 border-slate-700 font-bold hover:bg-slate-100">算啦</button>
                    <button onclick="handleCreateToken()" class="flex-1 btn-cute px-4 py-3 font-bold text-slate-800">立马召唤！</button>
                </div>
            </div>
        </div>
    </div>

    <div class="flex min-h-screen">
        <aside class="hidden md:flex flex-col w-72 p-6 space-y-8 bg-white border-r-4 border-slate-800">
            <div class="flex items-center space-x-3 px-2 cursor-pointer hover:rotate-3 transition-transform" onclick="switchPage('dashboard')">
                <div class="w-12 h-12 bg-pink-400 rounded-2xl flex items-center justify-center border-2 border-slate-800 shadow-[4px_4px_0px_#2d3436]">
                    <i class="fas fa-paw text-white text-2xl"></i>
                </div>
                <span class="text-2xl font-black tracking-tight text-slate-800">immmorAI</span>
            </div>
            
            <nav class="flex-1 space-y-3">
                <div onclick="switchPage('dashboard')" class="sidebar-item active flex items-center space-x-3 p-4 font-bold" id="nav-dashboard">
                    <i class="fas fa-house-chimney w-6"></i> <span>秘密基地</span>
                </div>
                <div onclick="switchPage('tokens')" class="sidebar-item text-slate-500 flex items-center space-x-3 p-4 font-bold" id="nav-tokens">
                    <i class="fas fa-key w-6"></i> <span>钥匙包</span>
                </div>
                <div onclick="switchPage('models')" class="sidebar-item text-slate-500 flex items-center space-x-3 p-4 font-bold" id="nav-models">
                    <i class="fas fa-robot w-6"></i> <span>AI 小伙伴</span>
                </div>
                <div onclick="switchPage('profile')" class="sidebar-item text-slate-500 flex items-center space-x-3 p-4 font-bold" id="nav-profile">
                    <i class="fas fa-face-smile w-6"></i> <span>我的地盘</span>
                </div>
            </nav>

            <div class="jelly-card p-4 bg-blue-50">
                <p class="text-xs font-bold text-blue-400 uppercase">小贴士</p>
                <p class="text-sm mt-1 font-medium">今天也是被 AI 治愈的一天呢！加油！🌟</p>
            </div>
        </aside>

        <main class="flex-1 p-4 md:p-10 max-w-7xl mx-auto w-full overflow-y-auto">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-3xl md:text-4xl font-black text-slate-800" id="pageTitle">秘密基地</h1>
                    <p class="text-pink-500 font-bold mt-1" id="pageSubtitle">来看看你的 AI 都在忙什么呀 ~</p>
                </div>
                <div class="flex items-center space-x-4">
                    <button class="relative p-3 bg-white border-2 border-slate-800 rounded-2xl shadow-[4px_4px_0px_#2d3436] hover:translate-y-1 hover:shadow-none transition-all">
                        <i class="fas fa-bell text-xl text-yellow-500"></i>
                        <span class="absolute top-1 right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-white"></span>
                    </button>
                    <div onclick="switchPage('profile')" class="w-12 h-12 rounded-2xl border-2 border-slate-800 overflow-hidden cursor-pointer shadow-[4px_4px_0px_#2d3436]">
                        <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Felix" alt="Avatar">
                    </div>
                </div>
            </header>

            <div id="page-dashboard" class="page-content active">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
                    <div class="jelly-card p-6 bg-pink-100 border-pink-200">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-pink-600 font-bold text-sm">今日用掉哒</p>
                                <h2 class="text-4xl font-black mt-2 text-pink-700">$4.12</h2>
                            </div>
                            <div class="px-3 py-1 bg-white rounded-full border-2 border-pink-200 text-pink-500 text-xs font-bold">
                                <i class="fas fa-heart"></i> 超棒
                            </div>
                        </div>
                        <div class="mt-4 h-12">
                            <canvas id="consumptionChart"></canvas>
                        </div>
                    </div>
                    <div class="jelly-card p-6 bg-blue-100 border-blue-200">
                        <p class="text-blue-600 font-bold text-sm">呼叫次数</p>
                        <h2 class="text-4xl font-black mt-2 text-blue-700">18,502</h2>
                        <div class="mt-4 w-full bg-white/50 rounded-full h-3 border-2 border-blue-200 overflow-hidden">
                            <div class="bg-blue-400 h-full" style="width: 65%"></div>
                        </div>
                    </div>
                    <div class="jelly-card p-6 bg-green-100 border-green-200">
                        <p class="text-green-600 font-bold text-sm">活跃钥匙</p>
                        <h2 class="text-4xl font-black mt-2 text-green-700"><span id="activeTokenCount">2</span><span class="text-xl"> 把</span></h2>
                        <p onclick="switchPage('tokens')" class="text-xs font-bold text-green-600 mt-4 cursor-pointer hover:underline">去钥匙包看看 →</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                    <div class="lg:col-span-2 space-y-6">
                        <div class="flex justify-between items-center">
                            <h3 class="text-2xl font-black text-slate-800">👀 刚才用过的</h3>
                            <button onclick="openModal('modalToken')" class="btn-cute px-6 py-2 font-bold text-sm">加个新钥匙</button>
                        </div>
                        <div id="recentTokensList" class="space-y-4"></div>
                    </div>
                    <div class="space-y-6">
                        <h3 class="text-2xl font-black text-slate-800">🍭 运行频道</h3>
                        <div class="jelly-card p-5 space-y-4 bg-white" id="statusList"></div>
                    </div>
                </div>
            </div>

            <div id="page-tokens" class="page-content">
                <div class="jelly-card p-8 bg-white">
                    <div class="flex flex-col md:flex-row justify-between mb-8 gap-4">
                        <input type="text" placeholder="寻找我的钥匙..." class="bg-slate-50 border-2 border-slate-700 rounded-2xl px-6 py-3 font-bold focus:outline-none focus:ring-2 ring-yellow-400">
                        <button onclick="openModal('modalToken')" class="btn-cute px-8 py-3 font-bold">制作新钥匙 ✨</button>
                    </div>
                    <div id="fullTokensList" class="space-y-6"></div>
                </div>
            </div>

            <div id="page-models" class="page-content">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="modelsGrid"></div>
            </div>

            <div id="page-profile" class="page-content">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                    <div class="lg:col-span-1 space-y-6">
                        <div class="jelly-card p-8 text-center bg-white">
                            <div class="relative w-32 h-32 mx-auto mb-6 floating">
                                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Felix" class="rounded-3xl border-4 border-pink-400 bg-pink-50" alt="Avatar">
                                <div class="absolute -bottom-2 -right-2 w-10 h-10 bg-green-400 border-4 border-white rounded-full flex items-center justify-center">
                                    <i class="fas fa-check text-white text-xs"></i>
                                </div>
                            </div>
                            <h3 class="text-2xl font-black">超厉害的开发者</h3>
                            <p class="text-pink-500 font-bold">至尊 VIP 小可爱</p>
                        </div>
                        <div class="jelly-card p-6 bg-yellow-50">
                            <h4 class="font-black mb-4">💰 我的小金库</h4>
                            <div class="space-y-4">
                                <div class="flex justify-between items-center">
                                    <span class="font-bold text-slate-500">余额</span>
                                    <span class="balance-val text-2xl font-black text-yellow-600">$128.45</span>
                                </div>
                                <button class="w-full btn-cute bg-white text-slate-800 py-3 font-bold">充点小钱钱</button>
                            </div>
                        </div>
                    </div>
                    <div class="lg:col-span-2 space-y-6">
                        <div class="jelly-card p-8 bg-white">
                            <h4 class="text-xl font-black mb-6">📝 基本档案</h4>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="p-4 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-300">
                                    <label class="text-xs font-black text-slate-400 uppercase">电子信箱</label>
                                    <p class="font-bold text-slate-700">hello@kawaii-ai.com</p>
                                </div>
                                <div class="p-4 bg-slate-50 rounded-2xl border-2 border-dashed border-slate-300">
                                    <label class="text-xs font-black text-slate-400 uppercase">入伙日期</label>
                                    <p class="font-bold text-slate-700">2023-11-24</p>
                                </div>
                            </div>
                        </div>
                        <div class="jelly-card p-8 bg-white">
                            <h4 class="text-xl font-black mb-6">🔒 守护安全</h4>
                            <div class="space-y-4">
                                <div class="flex items-center justify-between p-4 bg-pink-50 rounded-2xl border-2 border-pink-100">
                                    <div class="flex items-center space-x-4">
                                        <i class="fas fa-lock text-pink-400 text-xl"></i>
                                        <div>
                                            <p class="font-black">进门密码</p>
                                            <p class="text-xs font-bold text-pink-400">上次改动是 30 天前</p>
                                        </div>
                                    </div>
                                    <button class="font-black text-pink-600 hover:scale-110 transition-transform">修改</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="mobile-nav md:hidden fixed bottom-0 left-0 right-0 bg-white border-t-4 border-slate-800 flex justify-around items-center z-50">
        <div onclick="switchPage('dashboard')" class="text-pink-500 flex flex-col items-center m-nav-item" data-page="dashboard">
            <i class="fas fa-house"></i><span class="text-[10px] font-bold mt-1">首页</span>
        </div>
        <div onclick="switchPage('tokens')" class="text-slate-400 flex flex-col items-center m-nav-item" data-page="tokens">
            <i class="fas fa-key"></i><span class="text-[10px] font-bold mt-1">钥匙</span>
        </div>
        <div class="relative -top-6">
            <button onclick="openModal('modalToken')" class="w-16 h-16 bg-yellow-400 border-4 border-slate-800 rounded-full flex items-center justify-center shadow-lg">
                <i class="fas fa-plus text-slate-800 text-2xl"></i>
            </button>
        </div>
        <div onclick="switchPage('models')" class="text-slate-400 flex flex-col items-center m-nav-item" data-page="models">
            <i class="fas fa-robot"></i><span class="text-[10px] font-bold mt-1">AI 伴侣</span>
        </div>
        <div onclick="switchPage('profile')" class="text-slate-400 flex flex-col items-center m-nav-item" data-page="profile">
            <i class="fas fa-user"></i><span class="text-[10px] font-bold mt-1">我的</span>
        </div>
    </div>

    <div id="toast" class="fixed top-8 left-1/2 -translate-x-1/2 z-[200] bg-slate-800 text-white px-8 py-4 rounded-2xl font-black shadow-2xl transition-all opacity-0 pointer-events-none translate-y-[-20px]">
        消息收到啦！
    </div>

    <script>
        const models = [
            { name: "GPT-4o", provider: "OpenAI", price: "0.01", multiplier: "1x", status: "online", latency: "240ms", color: "bg-pink-100" },
            { name: "Claude 3.5", provider: "Anthropic", price: "0.015", multiplier: "1x", status: "online", latency: "310ms", color: "bg-purple-100" },
            { name: "GPT-4 Turbo", provider: "OpenAI", price: "0.03", multiplier: "3x", status: "online", latency: "420ms", color: "bg-blue-100" },
            { name: "Gemini 1.5", provider: "Google", price: "0.005", multiplier: "0.5x", status: "online", latency: "180ms", color: "bg-green-100" },
            { name: "Midjourney V6", provider: "Imagine", price: "0.1", multiplier: "10x", status: "congested", latency: "High", color: "bg-yellow-100" },
            { name: "Llama 3 70B", provider: "Meta", price: "0.001", multiplier: "0.1x", status: "online", latency: "110ms", color: "bg-orange-100" }
        ];

        let tokens = [
            { name: "我的主钥匙", key: "sk-nebula-xxxxxxa1b2", used: 42.10, status: "active" },
            { name: "测试小沙盒", key: "sk-nebula-xxxxxx9z8y", used: 50.00, status: "exhausted" }
        ];

        let currentBalance = 128.45;

        function switchPage(pageId) {
            const titles = {
                'dashboard': ['秘密基地', '来看看你的 AI 都在忙什么呀 ~'],
                'tokens': ['钥匙包', '所有的 API 密钥都在这保管着呢'],
                'models': ['AI 小伙伴', '这些 AI 都能陪你一起工作哦'],
                'profile': ['我的地盘', '在这里可以修改你的个人设定']
            };
            document.getElementById('pageTitle').innerText = titles[pageId][0];
            document.getElementById('pageSubtitle').innerText = titles[pageId][1];

            document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');

            document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
            document.getElementById(`nav-${pageId}`).classList.add('active');

            document.querySelectorAll('.m-nav-item').forEach(i => i.classList.replace('text-pink-500', 'text-slate-400'));
            const mobileItem = document.querySelector(`.m-nav-item[data-page="${pageId}"]`);
            if(mobileItem) mobileItem.classList.replace('text-slate-400', 'text-pink-500');

            if(pageId === 'models') renderModels();
            if(pageId === 'tokens' || pageId === 'dashboard') renderTokens();
        }

        function renderModels() {
            const grid = document.getElementById('modelsGrid');
            grid.innerHTML = models.map(m => `
                <div class="jelly-card p-6 ${m.color}">
                    <div class="flex justify-between items-start mb-4">
                        <div class="w-12 h-12 bg-white rounded-2xl flex items-center justify-center border-2 border-slate-800">
                            <i class="fas fa-ghost text-2xl text-slate-800"></i>
                        </div>
                        <span class="px-3 py-1 rounded-full border-2 border-slate-800 text-[10px] font-black bg-white">${m.status.toUpperCase()}</span>
                    </div>
                    <h4 class="font-black text-xl text-slate-800">${m.name}</h4>
                    <p class="text-xs font-bold text-slate-500 mb-4">${m.provider}</p>
                    <div class="flex justify-between items-center text-sm border-t-2 border-slate-800/10 pt-4">
                        <span class="font-bold">倍率: ${m.multiplier}</span>
                        <span class="font-mono bg-white px-2 py-1 rounded-lg border border-slate-800">${m.latency}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderTokens() {
            const renderItem = (t) => `
                <div class="jelly-card p-5 bg-white flex flex-col md:flex-row md:items-center justify-between gap-4 group border-2">
                    <div class="flex items-center space-x-4">
                        <div class="w-14 h-14 rounded-2xl flex items-center justify-center border-2 border-slate-800 ${t.status==='exhausted'?'bg-red-100 text-red-500':'bg-indigo-100 text-indigo-500'}">
                            <i class="fas ${t.status==='exhausted'?'fa-heart-crack':'fa-key'} text-2xl"></i>
                        </div>
                        <div>
                            <h4 class="font-black text-lg">${t.name}</h4>
                            <p class="text-xs font-bold text-slate-400 mt-1">${t.key}</p>
                        </div>
                    </div>
                    <div class="flex items-center space-x-6">
                        <div class="text-right">
                            <p class="text-xs font-black text-slate-300 uppercase">本月花掉</p>
                            <p class="text-xl font-black ${t.status==='exhausted'?'text-red-500':'text-slate-800'}">$${t.used.toFixed(2)}</p>
                        </div>
                        <div class="flex space-x-2">
                            <button onclick="copyToClipboard('${t.key}')" class="w-10 h-10 border-2 border-slate-800 rounded-xl flex items-center justify-center hover:bg-yellow-400 transition-colors"><i class="fas fa-copy"></i></button>
                        </div>
                    </div>
                </div>
            `;
            
            if(document.getElementById('recentTokensList')) {
                document.getElementById('recentTokensList').innerHTML = tokens.slice(0, 2).map(renderItem).join('');
            }
            if(document.getElementById('fullTokensList')) {
                document.getElementById('fullTokensList').innerHTML = tokens.map(renderItem).join('');
            }
            document.getElementById('activeTokenCount').innerText = tokens.filter(t => t.status === 'active').length;
        }

        function handleCreateToken() {
            const name = document.getElementById('newTokenName').value || '无名小钥匙';
            tokens.unshift({
                name: name,
                key: `sk-cute-${Math.random().toString(36).substring(7)}`,
                used: 0.00,
                status: "active"
            });
            showToast('哇咔咔，新钥匙做好了！✨');
            renderTokens();
            closeModal('modalToken');
            document.getElementById('newTokenName').value = '';
        }

        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -20px)';
            }, 2500);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => showToast('复制成功！快去用吧~'));
        }

        window.onload = () => {
            renderTokens();
            
            const ctx = document.getElementById('consumptionChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['早', '中', '晚'],
                    datasets: [{
                        data: [2, 5, 4],
                        borderColor: '#FF85A1',
                        borderWidth: 4,
                        fill: false,
                        tension: 0.5
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });

            document.getElementById('statusList').innerHTML = models.slice(0,3).map(m => `
                <div class="flex items-center justify-between p-2 hover:bg-slate-50 rounded-xl transition-colors">
                    <div class="flex items-center space-x-3">
                        <span class="w-3 h-3 ${m.status==='online'?'bg-green-400':'bg-yellow-400'} rounded-full border-2 border-slate-800"></span>
                        <span class="font-bold text-slate-700">${m.name}</span>
                    </div>
                    <span class="text-xs font-black text-slate-400">${m.latency}</span>
                </div>
            `).join('');
        };
    </script>
</body>
</html>
