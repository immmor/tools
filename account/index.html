<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASSET-0 | 极简资产库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Mono&family=Inter:wght@300;400;700&display=swap');

        body {
            background-color: #fbfbfb;
            color: #1a1a1a;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .mono { font-family: 'Space Mono', monospace; }

        /* 创意的侧边固定文字 */
        .vertical-label {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            position: fixed;
            left: 2rem;
            top: 50%;
            transform: translateY(-50%) rotate(180deg);
            font-size: 10px;
            letter-spacing: 0.4em;
            color: #ccc;
            text-transform: uppercase;
        }

        /* 错位布局容器 */
        .grid-broken {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .grid-broken > div {
            flex: 1 1 calc(50% - 0.75rem);
            max-width: calc(50% - 0.75rem);
        }

        @media (max-width: 768px) {
            .grid-broken > div {
                flex: 1 1 100%;
                max-width: 100%;
            }
            .vertical-label { display: none; }
        }

        /* 商品卡片：去掉炫酷光效，改为极简边框和排版 */
        .item-card {
            background: #fff;
            border: 1px solid #eee;
            padding: 2rem;
            transition: all 0.3s ease;
            position: relative;
            height: 280px;
            display: flex;
            flex-direction: column;
        }

        .item-card:hover {
            border-color: #000;
            transform: translateY(-2px);
        }

        .item-card h3 {
            min-height: 3rem;
        }

        .item-card p {
            flex-grow: 1;
        }

        /* 创意价格标签 */
        .price-tag {
            position: absolute;
            top: -10px;
            right: 20px;
            background: #000;
            color: #fff;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: bold;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .grid-broken { grid-template-cols: 1fr; }
            .vertical-label { display: none; }
            .offset-1 { margin-top: 0 !important; }
            .offset-2 { margin-top: 0 !important; }
        }

        .offset-1 { margin-top: 4rem; }
        .offset-2 { margin-top: 8rem; }
    </style>
</head>
<body class="p-6 md:p-16 lg:px-48">

    <div class="vertical-label">Curated Digital Assets / 2026 Protocol</div>

    <header class="flex justify-between items-end mb-32">
        <div>
            <h1 class="text-4xl font-bold tracking-tighter">ASSET-0</h1>
        </div>
        <nav class="flex gap-8 text-[11px] font-bold uppercase tracking-widest">
            <a href="#" class="border-b border-black">商店</a>
            <a href="#" class="text-gray-300 hover:text-black transition-colors">我的</a>
        </nav>
    </header>

    <div class="mb-8">
        <h2 class="text-5xl font-light leading-tight mb-6">
            高效、纯净的<br><b>账号所有权</b>。
        </h2>
        <div class="w-12 h-1 bg-black mb-6"></div>
        <p class="text-sm text-gray-500 max-w-md leading-relaxed">
            我们剔除了一切冗余的 UI 装饰，只为提供最直观的数字化资产获取路径。
        </p>
    </div>

    <div class="mb-8 flex justify-center">
        <input type="text" id="searchInput" placeholder="搜索账号..." class="w-full md:w-80 px-4 py-2 border border-gray-200 text-sm focus:outline-none focus:border-black transition-colors">
    </div>

    <main class="grid-broken pb-10">

    </main>

    <script>
        let allAccounts = [];

        function renderAccounts(accounts) {
            const main = document.querySelector('main');
            main.innerHTML = '';
            accounts.forEach((acc, i) => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="item-card">
                        <span class="price-tag mono">${acc.price}</span>
                        <div class="text-[10px] mono text-gray-400 mb-8">${acc.id}</div>
                        <h3 class="text-2xl font-bold mb-4">${acc.name}</h3>
                        <p class="text-xs text-gray-400 mb-12 leading-relaxed">${acc.description}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] uppercase tracking-widest font-bold">${acc.stock}</span>
                            <button class="text-xs border-b border-black pb-1 hover:text-gray-400 transition-colors">购买 ↗</button>
                        </div>
                    </div>
                `;
                main.appendChild(div);
            });
        }

        fetch('accounts.json')
            .then(res => res.json())
            .then(accounts => {
                allAccounts = accounts;
                renderAccounts(accounts);
            });

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = allAccounts.filter(acc =>
                acc.name.toLowerCase().includes(keyword) ||
                acc.description.toLowerCase().includes(keyword)
            );
            renderAccounts(filtered);
        });
    </script>

    <footer class="mt-20 border-t border-gray-100 pt-8 flex justify-between items-center text-[10px] mono text-gray-300">
        <div>© 2026 ASSET-0 CORE. ALL RIGHTS RESERVED.</div>
    </footer>

</body>
</html>
