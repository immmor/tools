<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum UI | 悬浮光膜交易系统</title>
    <style>
        :root {
            --q-bg: #030308;
            --membrane: rgba(255, 255, 255, 0.02);
            --neon-border: linear-gradient(90deg, #00f2fe, #7000ff);
            --text-glow: #00f2fe;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background: var(--q-bg);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            /* 背景斜纹网格 */
            background-image: 
                linear-gradient(45deg, rgba(255,255,255,0.02) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.02) 50%, rgba(255,255,255,0.02) 75%, transparent 75%, transparent);
            background-size: 10px 10px;
        }

        /* 背景装饰光点 */
        .glow-sphere {
            position: fixed; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(112, 0, 255, 0.2) 0%, transparent 70%);
            top: 20%; left: 10%; z-index: -1; animation: float 10s infinite alternate;
        }
        @keyframes float { from { transform: translate(0,0); } to { transform: translate(100px, 50px); } }

        /* --- 核心：悬浮光膜类 --- */
        .membrane-glass {
            background: var(--membrane);
            backdrop-filter: blur(8px) saturate(250%);
            -webkit-backdrop-filter: blur(8px) saturate(250%);
            /* 胶囊异形圆角 */
            border-radius: 60px 15px 60px 15px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 50px rgba(0,0,0,0.8);
            transition: 0.4s cubic-bezier(0.2, 1, 0.2, 1);
        }

        /* 边缘荧光效果 */
        .membrane-glass::before {
            content: ""; position: absolute; inset: -1px;
            border-radius: 61px 16px 61px 16px;
            padding: 1px;
            background: linear-gradient(135deg, transparent 40%, var(--text-glow), transparent 60%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0.5;
        }

        /* 布局 */
        .wrapper {
            max-width: 1100px; margin: 0 auto; padding: 60px 20px;
            display: flex; flex-direction: column; gap: 30px;
        }

        /* 核心卡片 */
        .hero-section {
            padding: 50px; display: flex; justify-content: space-between; align-items: center;
        }
        .data-point { border-left: 2px solid var(--text-glow); padding-left: 20px; }

        /* 磁贴区域 */
        .tile-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px;
        }
        .tile-item {
            padding: 30px; text-align: center; border-radius: 20px 40px !important;
        }

        /* 进度条：量子风格 */
        .q-progress {
            width: 100%; height: 2px; background: rgba(255,255,255,0.05);
            margin: 20px 0; position: relative;
        }
        .q-progress-bar {
            height: 100%; background: var(--text-glow); width: 65%;
            box-shadow: 0 0 15px var(--text-glow);
        }

        /* 操作按钮 */
        .ghost-btn {
            background: transparent; border: 1px solid var(--text-glow);
            color: var(--text-glow); padding: 15px 40px; border-radius: 50px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .ghost-btn:hover { background: var(--text-glow); color: #000; box-shadow: 0 0 30px var(--text-glow); }

        /* 侧边标签 */
        .side-tabs {
            position: fixed; right: 0; top: 50%; transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 10px;
        }
        .tab-tag {
            padding: 15px 10px; background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px); border-radius: 10px 0 0 10px;
            font-size: 10px; writing-mode: vertical-lr; cursor: pointer;
        }

        @media (max-width: 768px) {
            .hero-section { flex-direction: column; text-align: center; gap: 30px; }
            .data-point { border-left: none; border-top: 2px solid var(--text-glow); padding: 20px 0; }
        }
    </style>
</head>
<body>

    <div class="glow-sphere"></div>

    <div class="wrapper">
        <header class="membrane-glass hero-section">
            <div>
                <p style="font-size: 12px; opacity: 0.4; letter-spacing: 3px;">QUANTUM NODE ALIVE</p>
                <h1 style="font-size: 48px; margin: 10px 0;">$ 1.284M</h1>
                <div class="q-progress"><div class="q-progress-bar"></div></div>
                <p style="font-size: 11px;">节点确认进度: 65%</p>
            </div>
            <div class="data-point">
                <p style="font-size: 12px; opacity: 0.4;">24H REVENUE</p>
                <h2 style="color: var(--text-glow); font-size: 32px;">+14.2%</h2>
                <button class="ghost-btn" style="margin-top: 20px;">提取收益</button>
            </div>
        </header>

        <div class="tile-grid">
            <div class="membrane-glass tile-item">
                <span style="font-size: 24px;">◈</span>
                <p style="margin-top: 10px; font-size: 12px;">智能质押</p>
            </div>
            <div class="membrane-glass tile-item">
                <span style="font-size: 24px;">◒</span>
                <p style="margin-top: 10px; font-size: 12px;">跨链桥</p>
            </div>
            <div class="membrane-glass tile-item">
                <span style="font-size: 24px;">◎</span>
                <p style="margin-top: 10px; font-size: 12px;">流动性池</p>
            </div>
            <div class="membrane-glass tile-item">
                <span style="font-size: 24px;">⌇</span>
                <p style="margin-top: 10px; font-size: 12px;">治理投票</p>
            </div>
        </div>

        <section class="membrane-glass" style="padding: 30px; border-radius: 20px 80px 20px 80px !important;">
            <h4 style="margin-bottom: 20px; font-weight: 300; letter-spacing: 2px;">实时量子交易流</h4>
            <div style="display: grid; gap: 15px;">
                <div style="display:flex; justify-content:space-between; opacity:0.6; font-size:12px;">
                    <span>HASH: 0x82...f91</span>
                    <span style="color: var(--text-glow);">1.500 BTC</span>
                </div>
                <div style="display:flex; justify-content:space-between; opacity:0.6; font-size:12px;">
                    <span>HASH: 0x41...e22</span>
                    <span style="color: var(--text-glow);">42.18 ETH</span>
                </div>
            </div>
        </section>
    </div>

    <nav class="side-tabs">
        <div class="tab-tag">NETWORK</div>
        <div class="tab-tag" style="color: var(--text-glow);">STATUS</div>
        <div class="tab-tag">LOGS</div>
    </nav>

</body>
</html>
