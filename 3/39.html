<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>纯代码多链 USDT 独立收银台</title>
    <style>
        body { font-family: monospace; background: #0c0c0e; color: #00ffaa; padding: 20px; }
        .invoice-box { max-width: 550px; margin: 30px auto; background: #13131c; padding: 30px; border-radius: 12px; border: 1px solid #222533; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: #fff; border-bottom: 1px solid #222533; padding-bottom: 15px; font-size: 18px; }
        .field { margin: 20px 0; }
        .label { color: #6e7282; font-size: 13px; margin-bottom: 8px; display: block; }
        .value-box { background: #1c1c28; padding: 12px; border-radius: 6px; color: #fff; font-size: 14px; word-break: break-all; border: 1px solid #2a2a3d; }
        input { width: 100%; background: #1c1c28; color: #fff; border: 1px solid #2a2a3d; padding: 12px; border-radius: 6px; box-sizing: border-box; font-family: monospace; font-size: 13px; }
        input:focus { border-color: #00ffaa; outline: none; }
        
        /* 链选择按钮 */
        .chain-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .chain-btn { background: #1c1c28; color: #888; border: 1px solid #2a2a3d; padding: 10px; cursor: pointer; font-family: monospace; font-weight: bold; border-radius: 6px; font-size: 12px; }
        .chain-btn.active { background: #00ffaa22; color: #00ffaa; border-color: #00ffaa; }
        
        #pay-btn { background: #00ffaa; color: #0b0b10; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; border-radius: 6px; margin-top: 15px; }
        #pay-btn:hover { background: #00cc88; }
        #pay-btn:disabled { background: #2a2a3d; color: #6e7282; cursor: not-allowed; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.5/ethers.umd.min.js"></script>
</head>
<body>

<div class="invoice-box">
    <h2>💳 独立多链收银台 (无需钱包插件)</h2>
    
    <div class="field">
        <span class="label">🔑 请输入付款钱包的私钥 (Private Key) 用于本地签名</span>
        <input type="password" id="priv-key" placeholder="0x..." oninput="onKeyOrChainChange()">
    </div>

    <div class="field">
        <span class="label">🌐 选择结算区块链网络</span>
        <div class="chain-selector">
            <button class="chain-btn active" id="btn-1" onclick="changeChain(1)">以太坊主网</button>
            <button class="chain-btn" id="btn-42161" onclick="changeChain(42161)">Arbitrum二层</button>
            <button class="chain-btn" id="btn-8453" onclick="changeChain(8453)">Base二层</button>
        </div>
    </div>

    <div class="field">
        <span class="label">商家收款地址</span>
        <div class="value-box">0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045</div>
    </div>

    <div class="field">
        <span class="label">应付金额</span>
        <div class="value-box" style="font-size: 22px; color: #00ffaa; font-weight: bold;">20.00 <span style="font-size:14px; color:#fff;">USDT</span></div>
    </div>

    <div class="field" style="border-top: 1px dashed #222533; padding-top: 15px;">
        <span class="label">⛽ 独立节点预测本次链上 Gas 费</span>
        <div id="gas-estimate" style="font-weight: bold; color: #888;">请输入有效私钥以触发节点测算...</div>
    </div>

    <button id="pay-btn" disabled onclick="executeTransfer()">🔒 纯代码本地签名并广播转账</button>
</div>

<script>
    // 依旧借用你之前建立的通用代理 Worker 地址
    const myWorkerUrl = "https://fancy-silence-934f.ninenine000099.workers.dev";

    const merchantAddress = "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045";
    const payAmountStr = "20.00"; 
    let activeChainId = 1; // 默认停在主网

    // 2026 各大链开放的、免验证的公共免密 RPC 节点
    const RPC_NODES = {
        1:     "https://rpc.mevblocker.io",
        42161: "https://arb1.arbitrum.io/rpc",
        8453:  "https://mainnet.base.org"
    };

    const USDT_CONTRACTS = {
        1:     "0xdAC17F958D2ee523a2206206994597C13D831ec7",
        42161: "0xFd086bC7CD5C481DCC9C85ebE478A1C0b69FCbb9",
        8453:  "0x50c5725949A6F0174600473a42d6c59604978f00"
    };

    // 核心切换逻辑
    function changeChain(chainId) {
        activeChainId = chainId;
        document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${chainId}`).classList.add('active');
        onKeyOrChainChange();
    }

    // 当用户输入私钥或者切换链时触发，纯底层数据计算
    async function onKeyOrChainChange() {
        const keyInput = document.getElementById('priv-key').value.trim();
        const gasEl = document.getElementById('gas-estimate');
        const payBtn = document.getElementById('pay-btn');

        // 验证私钥基本格式 (64位十六进制，有没有0x都行)
        const cleanKey = keyInput.startsWith('0x') ? keyInput.slice(2) : keyInput;
        if (cleanKey.length !== 64) {
            gasEl.innerText = "请输入正确的 64 位加密私钥...";
            payBtn.disabled = true;
            return;
        }

        gasEl.innerText = "正在通过自建 Worker 节点抓取实时链上拥堵度...";
        
        try {
            // 🌟 关键：通过你的万能代理 Worker 去连接目标链的原生公开节点
            const proxyRpcUrl = `${myWorkerUrl}?url=${encodeURIComponent(RPC_NODES[activeChainId])}`;
            const provider = new ethers.JsonRpcProvider(proxyRpcUrl);
            
            // 用私钥直接在纯 JS 内存中初始化钱包实例，完全脱离小狐狸
            const wallet = new ethers.Wallet(keyInput, provider);

            // 绑定对应的 USDT 官方合约
            const uContract = new ethers.Contract(USDT_CONTRACTS[activeChainId], [
                "function transfer(address to, uint256 value) returns (bool)"
            ], wallet);

            const parsedAmount = ethers.parseUnits(payAmountStr, 6);

            // 1. 代码模拟运行，预估 Gas Limit
            const estimatedGasLimit = await uContract.transfer.estimateGas(merchantAddress, parsedAmount);
            
            // 2. 获取节点实时油价
            const feeData = await provider.getFeeData();
            const gasPrice = feeData.gasPrice || feeData.maxFeePerGas || 20000000000n;

            // 3. 计算美金价值 (以 3200 汇率粗算)
            const totalGasCostWei = estimatedGasLimit * gasPrice;
            const totalGasCostEth = ethers.formatEther(totalGasCostWei);
            const totalGasCostUsd = parseFloat(totalGasCostEth) * 3200;

            if (activeChainId === 1) {
                gasEl.innerHTML = `<span style="color:#ff5555;">⚠️ 主网当前过路费：~$${totalGasCostUsd.toFixed(2)} USD</span>`;
            } else {
                gasEl.innerHTML = `<span style="color:#00ffaa;">⚡ L2 当前过路费：~$${totalGasCostUsd.toFixed(3) || '0.002'} USD</span>`;
            }
            payBtn.disabled = false;

        } catch (err) {
            console.error(err);
            gasEl.innerHTML = `<span style="color:#ff9900;">无法精准估算 (可能私钥对应的账户里没有USDT余额用于节点模拟调试，但不影响强行广播转账)</span>`;
            payBtn.disabled = false; 
        }
    }

    // 纯代码静默签名转账并广播
    async function executeTransfer() {
        const keyInput = document.getElementById('priv-key').value.trim();
        const btn = document.getElementById('pay-btn');
        btn.innerText = "🔒 正在进行本地私钥签名并广播交易...";
        btn.disabled = true;

        try {
            const proxyRpcUrl = `${myWorkerUrl}?url=${encodeURIComponent(RPC_NODES[activeChainId])}`;
            const provider = new ethers.JsonRpcProvider(proxyRpcUrl);
            const wallet = new ethers.Wallet(keyInput, provider);

            const uContract = new ethers.Contract(USDT_CONTRACTS[activeChainId], [
                "function transfer(address to, uint256 value) returns (bool)"
            ], wallet);

            const parsedAmount = ethers.parseUnits(payAmountStr, 6);

            // 直接通过代码把带签名的加密数据包（Raw Transaction）推向 Worker 节点
            const tx = await uContract.transfer(merchantAddress, parsedAmount);
            
            alert("🔥 纯代码本地签名成功！交易已直接在链上广播。哈希值:\n" + tx.hash);
            await tx.wait();
            alert("✅ 扣款成功！20 USDT 已到账。");
        } catch (err) {
            console.error(err);
            alert("转账广播失败，请检查私钥钱包内是否有足够的 ETH 当作 Gas 手续费！");
        } finally {
            btn.innerText = "🔒 纯代码本地签名并广播转账";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
