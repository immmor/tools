<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebula Exchange | 流体弥散交易系统</title>
    <style>
        :root {
            --bg-deep: #030014;
            --glass-base: rgba(255, 255, 255, 0.03);
            --glass-edge: rgba(255, 255, 255, 0.1);
            --accent-purple: #7000ff;
            --accent-blue: #00d2ff;
            --up: #00ffa3;
            --down: #ff4d4d;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Lexend', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-deep);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        /* --- 动态流体背景 --- */
        .fluid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: var(--bg-deep);
            overflow: hidden;
        }
        .blob {
            position: absolute; width: 500px; height: 500px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
            filter: blur(80px); border-radius: 50%; opacity: 0.3;
            animation: move 25s infinite alternate;
        }
        .blob-1 { top: -10%; left: -10%; animation-duration: 20s; }
        .blob-2 { bottom: -10%; right: -10%; background: #ff00de; animation-duration: 30s; }
        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(200px, 100px) scale(1.2); }
        }

        /* --- 弥散毛玻璃容器 --- */
        .diffusion-glass {
            background: var(--glass-base);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 0.5px solid var(--glass-edge);
            border-radius: 28px;
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
        }

        /* 顶部导航 */
        header {
            max-width: 1200px; margin: 0 auto; padding: 30px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-weight: 700; font-size: 22px; letter-spacing: -0.5px; }

        /* 主布局 */
        .main-content {
            max-width: 1200px; margin: 0 auto; padding: 0 20px;
            display: grid; grid-template-columns: 1.5fr 1fr; gap: 24px;
        }

        /* 资产卡片：带渐变背景的玻璃 */
        .asset-card {
            padding: 30px; margin-bottom: 24px;
            background: radial-gradient(at top left, rgba(112, 0, 255, 0.1), transparent);
        }

        /* 深度图模拟 */
        .depth-chart {
            height: 100px; display: flex; align-items: flex-end; gap: 2px; margin-top: 20px;
        }
        .depth-bar { flex: 1; border-radius: 2px 2px 0 0; }

        /* 交互表单 */
        .trade-form { padding: 30px; }
        .input-wrapper {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-edge);
            border-radius: 18px; padding: 15px; margin-bottom: 15px;
            transition: 0.3s;
        }
        .input-wrapper:focus-within {
            border-color: var(--accent-blue);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
        }
        .input-wrapper label { font-size: 11px; color: rgba(255,255,255,0.4); display: block; }
        .input-wrapper input { 
            background: transparent; border: none; color: #fff; width: 100%; 
            font-size: 18px; outline: none; margin-top: 5px; font-weight: 500;
        }

        /* 幻彩按钮 */
        .btn-fluid {
            width: 100%; padding: 18px; border-radius: 18px; border: none;
            background: linear-gradient(90deg, #7000ff, #00d2ff, #7000ff);
            background-size: 200% auto;
            color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
            transition: 0.5s; animation: gradientShift 5s infinite;
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .btn-fluid:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(112, 0, 255, 0.4); }

        /* 移动端 Tab Bar */
        .mobile-nav {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; height: 70px;
            display: grid; grid-template-columns: repeat(4, 1fr);
            padding: 5px; z-index: 1000; border-radius: 24px;
        }
        .nav-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: rgba(255,255,255,0.3); font-size: 10px; text-decoration: none; transition: 0.3s;
        }
        .nav-item.active { color: #fff; }
        .nav-item.active .nav-dot { width: 4px; height: 4px; background: var(--accent-blue); border-radius: 50%; margin-top: 4px; box-shadow: 0 0 10px var(--accent-blue); }

        @media (max-width: 800px) {
            .main-content { grid-template-columns: 1fr; }
            .desktop-only { display: none; }
        }
    </style>
</head>
<body>

    <div class="fluid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <header>
        <div class="logo">NEBULA<span style="font-weight:200; opacity:0.6;">EX</span></div>
        <div class="desktop-only" style="display:flex; gap:25px; font-size:14px; opacity:0.7;">
            <span>市场</span><span>交易</span><span>质押</span><span>社区</span>
        </div>
        <div style="background:rgba(255,255,255,0.05); padding:8px 16px; border-radius:12px; font-size:12px; border:1px solid var(--glass-edge);">
            连接钱包
        </div>
    </header>

    <main class="main-content">
        <section>
            <div class="diffusion-glass asset-card">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <h4 style="opacity:0.5; font-weight:400; font-size:14px;">BTC 指数</h4>
                        <h2 style="font-size:32px; margin-top:5px;">$64,231.50</h2>
                    </div>
                    <div style="text-align:right;">
                        <span style="color:var(--up); font-weight:bold;">+2.14%</span>
                        <div style="font-size:12px; opacity:0.4; margin-top:5px;">24H 成交量: 42.1B</div>
                    </div>
                </div>
                
                <div class="depth-chart">
                    <div class="depth-bar" style="height:30%; background:rgba(255,77,77,0.2)"></div>
                    <div class="depth-bar" style="height:45%; background:rgba(255,77,77,0.2)"></div>
                    <div class="depth-bar" style="height:60%; background:rgba(255,77,77,0.2)"></div>
                    <div class="depth-bar" style="height:40%; background:rgba(255,77,77,0.2)"></div>
                    <div style="width:2px; height:100%; background:rgba(255,255,255,0.1); margin:0 5px;"></div>
                    <div class="depth-bar" style="height:50%; background:rgba(0,255,163,0.2)"></div>
                    <div class="depth-bar" style="height:70%; background:rgba(0,255,163,0.2)"></div>
                    <div class="depth-bar" style="height:35%; background:rgba(0,255,163,0.2)"></div>
                    <div class="depth-bar" style="height:55%; background:rgba(0,255,163,0.2)"></div>
                </div>
            </div>

            <div class="diffusion-glass desktop-only" style="padding:25px;">
                <h4 style="margin-bottom:15px; opacity:0.6;">智能订单路由</h4>
                <div style="display:flex; gap:10px;">
                    <div style="flex:1; height:60px; background:rgba(255,255,255,0.02); border-radius:12px; border:1px solid var(--glass-edge); display:flex; align-items:center; justify-content:center; font-size:12px; opacity:0.6;">Uniswap V3</div>
                    <div style="flex:1; height:60px; background:rgba(255,255,255,0.02); border-radius:12px; border:1px solid var(--glass-edge); display:flex; align-items:center; justify-content:center; font-size:12px; opacity:0.6;">Curve</div>
                    <div style="flex:1; height:60px; background:rgba(255,255,255,0.02); border-radius:12px; border:1px solid var(--glass-edge); display:flex; align-items:center; justify-content:center; font-size:12px; opacity:0.6;">Sushiswap</div>
                </div>
            </div>
        </section>

        <section>
            <div class="diffusion-glass trade-form">
                <div style="display:flex; justify-content:space-between; margin-bottom:25px;">
                    <span style="font-weight:600; color:var(--accent-blue);">SWAP</span>
                    <span style="opacity:0.4;">LIMIT</span>
                </div>

                <div class="input-wrapper">
                    <label>卖出 (Pay)</label>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <input type="number" value="1.00">
                        <span style="font-weight:bold; font-size:14px; background:rgba(255,255,255,0.1); padding:4px 10px; border-radius:8px;">ETH</span>
                    </div>
                </div>

                <div style="text-align:center; margin:-10px 0 5px; opacity:0.4; font-size:18px;">↓</div>

                <div class="input-wrapper">
                    <label>买入 (Receive)</label>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <input type="number" value="3250.42">
                        <span style="font-weight:bold; font-size:14px; background:rgba(255,255,255,0.1); padding:4px 10px; border-radius:8px;">USDT</span>
                    </div>
                </div>

                <div style="font-size:12px; opacity:0.5; margin-bottom:20px; display:flex; justify-content:space-between;">
                    <span>汇率: 1 ETH = 3250 USDT</span>
                    <span>滑点: 0.5%</span>
                </div>

                <button class="btn-fluid">立即交易</button>
            </div>
        </section>
    </main>

    <nav class="diffusion-glass mobile-nav">
        <a href="#" class="nav-item active">
            <span style="font-size:20px;">✧</span>
            <span>资产</span>
            <div class="nav-dot"></div>
        </a>
        <a href="#" class="nav-item">
            <span style="font-size:20px;">◈</span>
            <span>交易</span>
            <div></div>
        </a>
        <a href="#" class="nav-item">
            <span style="font-size:20px;">◒</span>
            <span>池子</span>
            <div></div>
        </a>
        <a href="#" class="nav-item">
            <span style="font-size:20px;">◎</span>
            <span>设置</span>
            <div></div>
        </a>
    </nav>

</body>
</html>
