<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IceChain Pro | 冰感超写实交易系统</title>
    <style>
        :root {
            --glass-bg: rgba(20, 30, 60, 0.4);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --glass-shadow: rgba(0, 0, 0, 0.4);
            --accent-glow: #00d2ff;
            --btn-grad: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            --text-main: #e0e0e0;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Space Grotesk', 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: #02050a;
            color: var(--text-main);
            min-height: 100vh;
            display: flex; flex-direction: column;
            overflow-x: hidden;
            padding-bottom: 100px;
        }

        /* 动态流动背景层 */
        .bg-mesh {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(58, 123, 213, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 210, 255, 0.1) 0px, transparent 50%);
        }

        /* 顶部流光进度条 */
        .sync-loader {
            position: fixed; top: 0; left: 0; height: 3px; width: 40%;
            background: var(--btn-grad); box-shadow: 0 0 10px var(--accent-glow);
            z-index: 2000; animation: sync 3s linear infinite;
        }
        @keyframes sync { 0% { left: -40%; } 100% { left: 100%; } }

        /* --- 超写实毛玻璃核心类 --- */
        .ice-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border-radius: 32px;
            /* 关键：模拟玻璃厚度的双重阴影 */
            border: 1px solid var(--glass-highlight);
            box-shadow: 
                0 25px 50px -12px var(--glass-shadow),
                inset 0 1px 1px var(--glass-highlight);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 导航 */
        header {
            padding: 30px 20px; display: flex; justify-content: space-between; align-items: center;
            max-width: 1200px; margin: 0 auto; width: 100%;
        }
        .user-status {
            padding: 10px 20px; border-radius: 50px; font-size: 13px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 8px; cursor: pointer;
        }
        .dot { width: 8px; height: 8px; background: #00ff88; border-radius: 50%; box-shadow: 0 0 8px #00ff88; }

        /* 主容器 */
        .grid-main {
            display: grid; grid-template-columns: 1fr 380px; gap: 25px;
            max-width: 1200px; margin: 0 auto; width: 100%; padding: 0 20px;
        }

        /* 资产统计卡 */
        .stats-area { padding: 30px; margin-bottom: 25px; position: relative; }
        .chart-placeholder {
            height: 120px; width: 100%; margin-top: 20px;
            background: linear-gradient(90deg, transparent, rgba(0,210,255,0.05), transparent);
            border-radius: 15px; position: relative; overflow: hidden;
        }
        .chart-line {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60%;
            border-top: 2px solid var(--accent-glow);
            filter: drop-shadow(0 0 5px var(--accent-glow));
            clip-path: polygon(0 100%, 10% 80%, 30% 90%, 50% 40%, 70% 60%, 90% 10%, 100% 30%, 100% 100%);
        }

        /* 交易输入盒 - 模拟凹陷感 */
        .input-inset {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px; padding: 18px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.03);
        }
        .input-inset label { font-size: 11px; color: #667; text-transform: uppercase; letter-spacing: 1px; }
        .input-inset input { 
            background: transparent; border: none; color: #fff; width: 100%; 
            font-size: 22px; outline: none; margin-top: 8px; font-weight: 300;
        }

        /* 动作按钮 */
        .btn-glass {
            background: var(--btn-grad);
            border: none; padding: 20px; border-radius: 20px;
            color: #fff; font-size: 16px; font-weight: 700;
            cursor: pointer; width: 100%; transition: 0.3s;
            box-shadow: 0 10px 20px rgba(0,210,255,0.2);
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .btn-glass:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0,210,255,0.4); }
        .btn-glass:active { transform: translateY(0); }

        /* 底部导航栏 */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 450px; height: 75px;
            display: grid; grid-template-columns: repeat(4, 1fr);
            padding: 0 15px; z-index: 1000;
        }
        .nav-tab {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #556; transition: 0.3s; cursor: pointer; position: relative;
        }
        .nav-tab.active { color: var(--accent-glow); }
        .nav-tab.active i { transform: translateY(-5px); text-shadow: 0 0 15px var(--accent-glow); }
        .nav-icon { font-size: 24px; margin-bottom: 4px; transition: 0.3s; }

        /* 手机端适配 */
        @media (max-width: 850px) {
            .grid-main { grid-template-columns: 1fr; }
            .desktop-hide { display: none; }
            header { justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="bg-mesh"></div>
    <div class="sync-loader"></div>

    <header>
        <h1 style="font-weight: 800; font-size: 24px; letter-spacing: -1.5px;">ICE<span style="color:var(--accent-glow)">CHAIN</span></h1>
        <div class="user-status">
            <div class="dot"></div>
            <span>0x71C...4f2a</span>
            <span style="opacity: 0.3">|</span>
            <b>$ 12,504</b>
        </div>
    </header>

    <div class="grid-main">
        <div class="page-section">
            <div class="ice-panel stats-area">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <p style="color:#667; font-size:14px;">BTC 指数价格</p>
                        <h2 style="font-size:36px; margin:5px 0;">$64,231.50</h2>
                    </div>
                    <div style="text-align:right;">
                        <p style="color:#00ff88; font-weight:bold;">▲ 4.2%</p>
                        <p style="font-size:12px; opacity:0.5;">Vol: 1.2B</p>
                    </div>
                </div>
                
                <div class="chart-placeholder">
                    <div class="chart-line"></div>
                </div>

                <div style="display:flex; gap:15px; margin-top:25px;">
                    <div style="flex:1; padding:15px; background:rgba(255,255,255,0.02); border-radius:15px; border:1px solid rgba(255,255,255,0.05);">
                        <p style="font-size:10px; color:#667;">24H 最高</p>
                        <p style="font-size:16px;">65,400.00</p>
                    </div>
                    <div style="flex:1; padding:15px; background:rgba(255,255,255,0.02); border-radius:15px; border:1px solid rgba(255,255,255,0.05);">
                        <p style="font-size:10px; color:#667;">24H 最低</p>
                        <p style="font-size:16px;">61,200.00</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="page-section">
            <div class="ice-panel" style="padding:30px;">
                <h3 style="margin-bottom:20px; font-weight:400; display:flex; justify-content:space-between;">
                    执行终端 <span style="font-size:12px; opacity:0.3;">SPOT / USDT</span>
                </h3>
                
                <div class="input-inset">
                    <label>买入价格</label>
                    <input type="number" value="64231.50">
                </div>

                <div class="input-inset">
                    <label>买入金额 (USDT)</label>
                    <input type="number" placeholder="0.00">
                </div>

                <div style="display:flex; justify-content:space-between; padding:0 5px 15px; font-size:12px; color:#667;">
                    <span>可用: 4,200.00 USDT</span>
                    <span style="color:var(--accent-glow); cursor:pointer;">全部买入</span>
                </div>

                <button class="btn-glass">确认执行买入</button>
                
                <p style="text-align:center; font-size:11px; color:#445; margin-top:20px;">
                    经由智能路由分发至 12 个 DEX 节点
                </p>
            </div>
        </div>
    </div>

    <nav class="ice-panel bottom-nav">
        <div class="nav-tab active">
            <span class="nav-icon">◒</span>
            <span style="font-size:10px;">终端</span>
        </div>
        <div class="nav-tab">
            <span class="nav-icon">☷</span>
            <span style="font-size:10px;">市场</span>
        </div>
        <div class="nav-tab">
            <span class="nav-icon">◈</span>
            <span style="font-size:10px;">钱包</span>
        </div>
        <div class="nav-tab">
            <span class="nav-icon">◎</span>
            <span style="font-size:10px;">设置</span>
        </div>
    </nav>

</body>
</html>
