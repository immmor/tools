<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SliceEx | 切片玻璃交易系统</title>
    <style>
        :root {
            --bg-dark: #020205;
            --glass-depth-1: rgba(255, 255, 255, 0.03);
            --glass-depth-2: rgba(255, 255, 255, 0.08);
            --neon-violet: #8b5cf6;
            --neon-cyan: #06b6d4;
            --text-ghost: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            /* 复杂的动态背景背景 */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.15) 0%, transparent 40%);
        }

        /* --- 核心：切片玻璃类 --- */
        .slice-glass {
            background: var(--glass-depth-1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 
                0 4px 30px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1); /* 顶部边缘高光 */
            position: relative;
        }

        /* 内部嵌套的强模糊层 */
        .inner-blur {
            background: var(--glass-depth-2);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 布局容器 */
        .app-grid {
            max-width: 1200px; margin: 0 auto; padding: 40px 20px;
            display: grid; grid-template-columns: 1fr 380px; gap: 30px;
        }

        /* 资产卡片 */
        .main-card { padding: 40px; }
        .balance-label { font-size: 14px; color: var(--text-ghost); letter-spacing: 2px; }
        .balance-value { font-size: 56px; font-weight: 700; margin: 15px 0; letter-spacing: -2px; }

        /* 迷你图表模拟 */
        .mini-chart {
            height: 60px; width: 150px; display: flex; align-items: flex-end; gap: 4px;
        }
        .chart-bar { flex: 1; background: var(--neon-cyan); border-radius: 2px; opacity: 0.5; }

        /* 最近联系人头像 */
        .avatar-slice {
            width: 45px; height: 45px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.2);
            background: linear-gradient(45deg, #333, #666);
            margin-right: -10px; box-shadow: -5px 0 15px rgba(0,0,0,0.5);
        }

        /* 交易输入 */
        .trade-input { padding: 25px; margin-top: 20px; }
        .input-row { display: flex; justify-content: space-between; align-items: center; }
        .input-row input { 
            background: transparent; border: none; color: #fff; 
            font-size: 28px; font-weight: 600; outline: none; width: 60%;
        }

        /* 流光按钮 */
        .glow-btn {
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: #fff; color: #000; font-weight: 800; font-size: 16px;
            cursor: pointer; transition: 0.3s; margin-top: 20px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .glow-btn:hover { box-shadow: 0 0 40px rgba(255,255,255,0.4); transform: translateY(-2px); }

        /* 移动端底部导航 */
        .floating-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; padding: 10px; z-index: 1000;
        }
        .nav-btn {
            width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: #fff; cursor: pointer;
        }

        @media (max-width: 900px) {
            .app-grid { grid-template-columns: 1fr; }
            .desktop-only { display: none; }
        }
    </style>
</head>
<body>

    <header style="padding: 40px 20px; max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between;">
        <h2 style="font-weight: 900; font-size: 24px;">SLICE<span style="color:var(--neon-violet)">EX</span></h2>
        <div style="display:flex;">
            <div class="avatar-slice" style="background:url('https://api.dicebear.com/7.x/avataaars/svg?seed=1')"></div>
            <div class="avatar-slice" style="background:url('https://api.dicebear.com/7.x/avataaars/svg?seed=2')"></div>
            <div class="avatar-slice" style="background:url('https://api.dicebear.com/7.x/avataaars/svg?seed=3')"></div>
        </div>
    </header>

    <main class="app-grid">
        <section class="slice-glass main-card">
            <p class="balance-label">PORTFOLIO VALUE</p>
            <h1 class="balance-value">$92,450.80</h1>
            
            <div style="display:flex; justify-content:space-between; align-items:flex-end;">
                <div class="inner-blur" style="padding:15px 25px; display:flex; gap:15px; align-items:center;">
                    <span style="color:var(--neon-cyan)">+12.4%</span>
                    <div class="mini-chart">
                        <div class="chart-bar" style="height:30%"></div>
                        <div class="chart-bar" style="height:50%"></div>
                        <div class="chart-bar" style="height:45%"></div>
                        <div class="chart-bar" style="height:80%; opacity:1;"></div>
                        <div class="chart-bar" style="height:60%"></div>
                    </div>
                </div>
                <div class="desktop-only" style="text-align:right;">
                    <p style="font-size:12px; color:var(--text-ghost)">24H HIGH</p>
                    <p style="font-weight:600;">$94,200</p>
                </div>
            </div>
        </section>

        <aside class="slice-glass" style="padding:30px;">
            <h3 style="margin-bottom:20px;">QUICK SWAP</h3>
            
            <div class="inner-blur trade-input">
                <div class="input-row">
                    <input type="number" value="1.0">
                    <span style="font-weight:bold;">ETH</span>
                </div>
                <p style="font-size:12px; color:var(--text-ghost); margin-top:10px;">Balance: 4.25 ETH</p>
            </div>

            <div style="text-align:center; margin:10px 0; font-size:20px; opacity:0.3;">⇅</div>

            <div class="inner-blur trade-input" style="background:rgba(255,255,255,0.02)">
                <div class="input-row">
                    <input type="number" placeholder="3240.5">
                    <span style="font-weight:bold;">USDC</span>
                </div>
                <p style="font-size:12px; color:var(--text-ghost); margin-top:10px;">1 ETH ≈ 3,240 USDC</p>
            </div>

            <button class="glow-btn">CONFIRM SWAP</button>
        </aside>
    </main>

    <nav class="floating-nav">
        <div class="slice-glass nav-btn active">📊</div>
        <div class="slice-glass nav-btn">🔄</div>
        <div class="slice-glass nav-btn">👛</div>
        <div class="slice-glass nav-btn">⚙️</div>
    </nav>

    <script>
        // 增加点击反馈效果
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.style.borderColor = 'rgba(255,255,255,0.05)');
                btn.style.borderColor = 'rgba(255,255,255,0.4)';
            });
        });
    </script>
</body>
</html>
