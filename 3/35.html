<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChromeChain | 工业级毛玻璃系统</title>
    <style>
        :root {
            --chrome-bg: #08090a;
            --glass-core: rgba(15, 18, 22, 0.6);
            --metal-border: linear-gradient(135deg, #444, #999, #444);
            --neon-blue: #00f2fe;
            --neon-orange: #ff8c00;
            --text-silver: #c0c0c0;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'IBM Plex Mono', monospace; /* 使用等宽字体增加工业感 */
        }

        body {
            background-color: var(--chrome-bg);
            color: var(--text-silver);
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 24px 24px; /* 点阵底纹 */
        }

        /* 动态背景光轮 */
        .ring-bg {
            position: fixed; width: 600px; height: 600px;
            border: 1px solid rgba(0, 242, 254, 0.1);
            border-radius: 50%; top: 50%; left: 50%;
            transform: translate(-50%, -50%); z-index: -1;
            box-shadow: inset 0 0 100px rgba(0, 242, 254, 0.05);
            animation: rotate-ring 20s linear infinite;
        }
        @keyframes rotate-ring { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* --- 工业切角毛玻璃 --- */
        .industrial-glass {
            background: var(--glass-core);
            backdrop-filter: blur(20px) saturate(200%) contrast(110%);
            -webkit-backdrop-filter: blur(20px) saturate(200%) contrast(110%);
            border-radius: 12px 40px 12px 40px; /* 异形圆角 */
            border: 1px solid transparent;
            background-clip: padding-box;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        /* 模拟金属边框效果 */
        .industrial-glass::after {
            content: ""; position: absolute; top: -1px; left: -1px; right: -1px; bottom: -1px;
            background: var(--metal-border);
            z-index: -1; border-radius: 13px 41px 13px 41px;
            opacity: 0.3;
        }

        /* 顶层容器 */
        .dashboard {
            max-width: 1300px; margin: 0 auto; padding: 40px 20px;
            display: grid; grid-template-columns: 320px 1fr 320px; gap: 20px;
        }

        /* 侧边栏：实时流水 */
        .stream-panel { padding: 20px; font-size: 11px; }
        .stream-item { 
            padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between;
        }

        /* 主中心区 */
        .main-view { padding: 30px; }
        .price-hero { font-size: 48px; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.2); }

        /* 杠杆滑块 */
        .lever-slider {
            -webkit-appearance: none; width: 100%; height: 4px;
            background: #222; border-radius: 2px; margin: 20px 0;
        }
        .lever-slider::-webkit-slider-thumb {
            -webkit-appearance: none; width: 20px; height: 20px;
            background: var(--neon-blue); border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* 交易按钮 */
        .btn-industrial {
            width: 100%; padding: 15px; border: none; border-radius: 8px 24px 8px 24px;
            background: #fff; color: #000; font-weight: 900; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s; margin-top: 15px;
        }
        .btn-industrial:hover { background: var(--neon-blue); box-shadow: 0 0 30px var(--neon-blue); }

        /* 底部导航 (工业风) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 70px;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            display: none; justify-content: space-around; align-items: center;
            border-top: 1px solid #333; z-index: 1000;
        }

        @media (max-width: 1100px) {
            .dashboard { grid-template-columns: 1fr; }
            .desktop-hide { display: none; }
            .bottom-nav { display: flex; }
        }
    </style>
</head>
<body>

    <div class="ring-bg"></div>

    <div class="dashboard">
        <aside class="industrial-glass stream-panel desktop-hide">
            <h4 style="color: var(--neon-blue); margin-bottom: 20px;">LIVE BLOCKS</h4>
            <div id="stream-content">
                </div>
        </aside>

        <main class="industrial-glass main-view">
            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                <div>
                    <span style="background:var(--neon-blue); color:#000; padding:2px 8px; font-size:10px; font-weight:bold;">LIVE</span>
                    <h1 class="price-hero">64,231.50</h1>
                    <p style="font-size: 12px; opacity: 0.5;">BTC / USD - INDEX PRICE</p>
                </div>
                <div style="text-align:right;">
                    <p style="color:var(--neon-orange);">RISK: MODERATE</p>
                    <div style="width: 100px; height: 4px; background: #222; margin-top: 8px;">
                        <div style="width: 60%; height: 100%; background: var(--neon-orange);"></div>
                    </div>
                </div>
            </div>

            <div style="height: 200px; margin-top: 40px; border: 1px dashed rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center;">
                <p style="font-size: 12px; letter-spacing: 4px;">[ GRID_CHART_V.2.0 ]</p>
            </div>
        </main>

        <section class="industrial-glass main-view">
            <h3 style="margin-bottom: 20px;">TERMINAL</h3>
            <div style="margin-bottom: 20px;">
                <label style="font-size: 10px; opacity: 0.5;">LEVERAGE (20x)</label>
                <input type="range" class="lever-slider" min="1" max="100" value="20">
            </div>
            
            <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 4px; margin-bottom: 10px;">
                <label style="font-size: 10px; opacity: 0.4;">AMOUNT</dt>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:5px;">
                    <span style="font-size: 20px;">0.00</span>
                    <span style="color: var(--neon-blue);">MAX</span>
                </div>
            </div>

            <button class="btn-industrial">OPEN LONG</button>
            <button class="btn-industrial" style="background:transparent; border:1px solid #444; color:#fff;">OPEN SHORT</button>
        </section>
    </div>

    <nav class="bottom-nav">
        <span style="color:var(--neon-blue)">[ DATA ]</span>
        <span>[ TRADE ]</span>
        <span>[ ASSET ]</span>
    </nav>

    <script>
        // 模拟区块流水
        const stream = document.getElementById('stream-content');
        const actions = ['BUY', 'SELL', 'SWAP', 'MINT'];
        function addStream() {
            const item = document.createElement('div');
            item.className = 'stream-item';
            const action = actions[Math.floor(Math.random() * actions.length)];
            const color = action === 'BUY' ? 'var(--neon-blue)' : 'var(--neon-orange)';
            item.innerHTML = `
                <span style="color:${color}">${action}</span>
                <span>${(Math.random()).toFixed(4)} BTC</span>
                <span style="opacity:0.3">${new Date().toLocaleTimeString()}</span>
            `;
            stream.prepend(item);
            if (stream.children.length > 15) stream.lastChild.remove();
        }
        setInterval(addStream, 2000);
    </script>
</body>
</html>
