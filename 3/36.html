<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Opaline | 幻彩白瓷交易系统</title>
    <style>
        :root {
            --bg-soft: #f0f2f5;
            --glass-white: rgba(255, 255, 255, 0.45);
            --glass-border: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(120,180,255,0.3));
            --accent-primary: #5e5ce6;
            --text-dark: #1d1d1f;
            --text-sub: #86868b;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-soft);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            padding-bottom: 100px;
        }

        /* --- 超圆润白瓷毛玻璃 --- */
        .ceramic-glass {
            background: var(--glass-white);
            backdrop-filter: blur(30px) saturate(160%) brightness(1.1);
            -webkit-backdrop-filter: blur(30px) saturate(160%) brightness(1.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 40px; /* 超大圆角 */
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.1),
                inset 0 0 0 1px rgba(255,255,255,0.2);
            position: relative;
        }

        /* 布局容器 */
        .container {
            max-width: 1000px; margin: 0 auto; padding: 20px;
            display: grid; grid-template-columns: 1fr; gap: 24px;
        }

        /* 顶部搜索/资产区 */
        header {
            padding: 30px 20px; display: flex; justify-content: space-between; align-items: center;
        }
        .search-bar {
            padding: 12px 25px; width: 250px; font-size: 14px;
        }

        /* 资产大卡片 */
        .hero-balance {
            padding: 40px; text-align: center;
            background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(255,255,255,0.2));
        }
        .balance-num {
            font-size: 48px; font-weight: 700; color: #000; letter-spacing: -1px; margin: 10px 0;
        }

        /* 交易网格 */
        .trade-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
        }

        /* 输入组件 */
        .opaline-input {
            background: rgba(0,0,0,0.03); border-radius: 24px; padding: 20px;
            border: 1px solid rgba(0,0,0,0.05); margin-top: 15px;
        }
        .opaline-input label { font-size: 12px; color: var(--text-sub); display: block; }
        .opaline-input input { 
            background: transparent; border: none; width: 100%; font-size: 24px; 
            font-weight: 600; outline: none; margin-top: 5px; color: #000;
        }

        /* 果冻按钮 */
        .jelly-btn {
            background: var(--accent-primary); color: #fff;
            border: none; padding: 20px; border-radius: 25px;
            font-size: 16px; font-weight: 600; width: 100%;
            cursor: pointer; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(94, 92, 230, 0.3);
        }
        .jelly-btn:active { transform: scale(0.92); }

        /* 移动端底部导航 (胶囊风格) */
        .capsule-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 80%; max-width: 350px; height: 64px;
            display: flex; justify-content: space-around; align-items: center;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(20px); border-radius: 32px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); z-index: 1000;
        }
        .nav-item { font-size: 20px; cursor: pointer; opacity: 0.4; transition: 0.3s; }
        .nav-item.active { opacity: 1; transform: scale(1.2); }

        @media (max-width: 768px) {
            .trade-grid { grid-template-columns: 1fr; }
            .search-bar { width: 150px; }
        }
    </style>
</head>
<body>

    <header class="container">
        <div style="font-size: 20px; font-weight: 800;">OPALINE</div>
        <div class="ceramic-glass search-bar">搜索币种...</div>
    </header>

    <div class="container">
        <section class="ceramic-glass hero-balance">
            <p style="color: var(--text-sub); font-size: 14px;">我的净资产</p>
            <div class="balance-num">$128,450.00</div>
            <div style="display:flex; justify-content:center; gap:10px;">
                <span style="color:#34c759; background:rgba(52,199,89,0.1); padding:4px 12px; border-radius:20px; font-size:12px;">今日 +2.4%</span>
                <span style="color:var(--accent-primary); background:rgba(94,92,230,0.1); padding:4px 12px; border-radius:20px; font-size:12px;">收益榜首</span>
            </div>
        </section>

        <div class="trade-grid">
            <section class="ceramic-glass" style="padding:30px;">
                <h3 style="font-weight:700;">闪电兑换</h3>
                <div class="opaline-input">
                    <label>卖出 ETH</label>
                    <input type="number" value="1.50">
                </div>
                <div class="opaline-input">
                    <label>买入 USDT</label>
                    <input type="number" placeholder="4,250.00">
                </div>
                <div style="margin-top:20px;">
                    <button class="jelly-btn">立即兑换</button>
                </div>
            </section>

            <section class="ceramic-glass" style="padding:30px;">
                <h3 style="font-weight:700;">热门板块</h3>
                <div style="margin-top:20px; display:grid; gap:12px;">
                    <div style="display:flex; align-items:center; gap:15px; padding:10px; background:rgba(255,255,255,0.3); border-radius:20px;">
                        <div style="width:40px; height:40px; background:#f7931a; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff;">₿</div>
                        <div><p style="font-weight:600;">Bitcoin</p><p style="font-size:12px; color:var(--text-sub);">$64,231</p></div>
                    </div>
                    <div style="display:flex; align-items:center; gap:15px; padding:10px; background:rgba(255,255,255,0.3); border-radius:20px;">
                        <div style="width:40px; height:40px; background:#627eea; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff;">Ξ</div>
                        <div><p style="font-weight:600;">Ethereum</p><p style="font-size:12px; color:var(--text-sub);">$3,250</p></div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <nav class="capsule-nav">
        <div class="nav-item active">🏠</div>
        <div class="nav-item">📈</div>
        <div class="nav-item">👛</div>
        <div class="nav-item">⚙️</div>
    </nav>

    <script>
        // 导航切换简单逻辑
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });
    </script>
</body>
</html>
