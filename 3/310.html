<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetroChain | 磨砂亚克力系统</title>
    <style>
        :root {
            --acrylic-bg: rgba(220, 225, 235, 0.4);
            --acrylic-edge: rgba(255, 255, 255, 0.8);
            --retro-green: #00ff41;
            --retro-orange: #ff9d00;
            --case-bg: #e2e8f0;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'JetBrains Mono', 'Courier New', monospace;
        }

        body {
            background-color: #ccd4e0;
            /* 复古网格底纹 */
            background-image: linear-gradient(rgba(0,0,0,0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #2d3748;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* --- 核心：磨砂亚克力类 --- */
        .acrylic-glass {
            background: var(--acrylic-bg);
            backdrop-filter: blur(18px) contrast(1.1);
            -webkit-backdrop-filter: blur(18px) contrast(1.1);
            /* 关键：双重物理边框模拟厚度 */
            border: 2px solid var(--acrylic-edge);
            border-bottom: 4px solid rgba(0,0,0,0.2);
            border-right: 4px solid rgba(0,0,0,0.2);
            border-radius: 24px;
            position: relative;
            overflow: hidden;
        }

        /* 模拟颗粒噪点 */
        .acrylic-glass::before {
            content: ""; position: absolute; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.04; pointer-events: none; z-index: 1;
        }

        .container {
            max-width: 900px; margin: 0 auto;
            display: grid; grid-template-columns: 1fr; gap: 30px;
        }

        /* 顶部面板 */
        .top-deck {
            padding: 30px; display: flex; justify-content: space-between; align-items: center;
        }
        .status-light {
            width: 12px; height: 12px; border-radius: 50%;
            background: var(--retro-green);
            box-shadow: 0 0 10px var(--retro-green);
            display: inline-block; margin-right: 10px;
        }

        /* 资产显示区：嵌入式屏幕感 */
        .display-inset {
            background: #1a202c; border-radius: 12px; padding: 25px;
            color: var(--retro-green); position: relative;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
            border: 2px solid #4a5568;
        }
        .display-inset::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 3px 100%; pointer-events: none;
        }

        /* 按钮：物理质感 */
        .retro-btn {
            background: #cbd5e0;
            border: none; border-radius: 12px; padding: 15px 30px;
            font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 0 #718096, 0 8px 15px rgba(0,0,0,0.1);
            transition: all 0.1s;
        }
        .retro-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #718096;
        }
        .btn-primary { background: var(--retro-orange); color: white; box-shadow: 0 4px 0 #c05621; }

        /* 底部操作区 */
        .control-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;
        }
        .knob-area {
            text-align: center; padding: 20px;
        }
        .knob {
            width: 60px; height: 60px; background: #edf2f7; border-radius: 50%;
            margin: 0 auto 10px; border: 3px solid #cbd5e0;
            position: relative; cursor: pointer;
        }
        .knob::after {
            content: ""; position: absolute; top: 10px; left: 50%;
            width: 4px; height: 15px; background: #718096; border-radius: 2px;
            transform: translateX(-50%);
        }

    </style>
</head>
<body>

    <div class="container">
        <header class="acrylic-glass top-deck">
            <div>
                <p style="font-size: 10px; font-weight: bold; opacity: 0.6;">SYSTEM MODEL: RX-95</p>
                <h2 style="letter-spacing: -1px;">RETRO<span style="opacity: 0.5;">CHAIN</span></h2>
            </div>
            <div style="text-align: right;">
                <div class="status-light"></div>
                <span style="font-size: 12px; font-weight: bold;">LINKED_0X71...</span>
            </div>
        </header>

        <main class="acrylic-glass" style="padding: 30px;">
            <div class="display-inset">
                <p style="font-size: 12px;">> TOTAL_VALUE_SCAN...</p>
                <h1 style="font-size: 42px; margin: 10px 0;">$ 142,504.22</h1>
                <p style="color: #4a5568; font-size: 11px;">[ STATUS: SECURE / STABLE ]</p>
            </div>

            <div style="margin-top: 30px; display: flex; gap: 20px;">
                <button class="retro-btn btn-primary">DEPOSIT</button>
                <button class="retro-btn">WITHDRAW</button>
                <button class="retro-btn" style="flex-grow: 1;">TRANSFER</button>
            </div>
        </main>

        <div class="control-grid">
            <div class="acrylic-glass knob-area">
                <div class="knob"></div>
                <p style="font-size: 10px; font-weight: bold;">杠杆倍率</p>
            </div>
            <div class="acrylic-glass knob-area">
                <div class="knob" style="transform: rotate(45deg);"></div>
                <p style="font-size: 10px; font-weight: bold;">风险系数</p>
            </div>
            <div class="acrylic-glass knob-area">
                <div class="knob" style="transform: rotate(-30deg);"></div>
                <p style="font-size: 10px; font-weight: bold;">刷新频率</p>
            </div>
        </div>
    </div>

</body>
</html>
