<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>多链 USDT 强切收银台</title>
    <style>
        body { font-family: monospace; background: #0c0c10; color: #00ffaa; padding: 20px; }
        .invoice-box { max-width: 550px; margin: 30px auto; background: #13131c; padding: 30px; border-radius: 12px; border: 1px solid #222533; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: #fff; border-bottom: 1px solid #222533; padding-bottom: 15px; font-size: 20px; }
        .field { margin: 20px 0; }
        .label { color: #6e7282; font-size: 13px; margin-bottom: 8px; display: block; }
        .value-box { background: #1c1c28; padding: 12px; border-radius: 6px; color: #fff; font-size: 15px; word-break: break-all; border: 1px solid #2a2a3d; }
        
        /* 链选择按钮样式 */
        .chain-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .chain-btn { background: #1c1c28; color: #888; border: 1px solid #2a2a3d; padding: 10px; cursor: pointer; font-family: monospace; font-weight: bold; border-radius: 6px; font-size: 12px; }
        .chain-btn.active { background: #00ffaa22; color: #00ffaa; border-color: #00ffaa; }
        
        #gas-estimate { font-weight: bold; }
        .gas-loading { color: #888; font-style: italic; }
        
        #pay-btn { background: #00ffaa; color: #0b0b10; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; border-radius: 6px; margin-top: 15px; transition: 0.2s; }
        #pay-btn:hover { background: #00cc88; box-shadow: 0 0 15px rgba(0,255,170,0.4); }
        #pay-btn:disabled { background: #2a2a3d; color: #6e7282; cursor: not-allowed; box-shadow: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.5/ethers.umd.min.js"></script>
</head>
<body>

<div class="invoice-box">
    <h2>💳 智能多链收银台</h2>
    
    <div class="field">
        <span class="label">🛠️ 第一步：请选择你想使用的付款网络（点击直接强切）</span>
        <div class="chain-selector">
            <button class="chain-btn" id="btn-eth" onclick="switchNetwork(1)">🌐 以太坊主网</button>
            <button class="chain-btn" id="btn-arb" onclick="switchNetwork(42161)">🚀 Arbitrum二层</button>
            <button class="chain-btn" id="btn-base" onclick="switchNetwork(8453)">🛡️ Base二层</button>
        </div>
    </div>

    <div class="field">
        <span class="label">商家收款地址</span>
        <div class="value-box">0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045</div>
    </div>

    <div class="field">
        <span class="label">应付金额</span>
        <div class="value-box" style="font-size: 24px; color: #00ffaa; font-weight: bold;">20.00 <span style="font-size:14px; color:#fff;">USDT</span></div>
    </div>

    <div class="field" style="border-top: 1px dashed #222533; padding-top: 15px;">
        <span class="label">⛽ 本次转账预估链上过路费 (Gas Fee)</span>
        <div id="gas-estimate" class="gas-loading">请先点击上方按钮选择一条网络...</div>
    </div>

    <button id="pay-btn" disabled onclick="executePayment()">🚀 确认支付</button>
</div>

<script>
    const merchantAddress = "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045";
    const payAmountStr = "20.00"; 

    // 各大主流链官方的 USDT 智能合约地址
    const USDT_CONTRACTS = {
        1:     "0xdAC17F958D2ee523a2206206994597C13D831ec7", // Ethereum
        42161: "0xFd086bC7CD5C481DCC9C85ebE478A1C0b69FCbb9", // Arbitrum One
        8453:  "0x50c5725949A6F0174600473a42d6c59604978f00"  // Base
    };

    // 每一条链切换所需的参数配置（如果用户钱包没加过这条链，代码会自动帮他拉起添加）
    const CHAIN_PARAMS = {
        1: { chainId: "0x1" },
        42161: {
            chainId: "0xa4b1",
            chainName: "Arbitrum One",
            rpcUrls: ["https://arb1.arbitrum.io/rpc"],
            nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 },
            blockExplorerUrls: ["https://arbiscan.io/"]
        },
        8453: {
            chainId: "0x2105",
            chainName: "Base",
            rpcUrls: ["https://mainnet.base.org"],
            nativeCurrency: { name: "ETH", symbol: "ETH", decimals: 18 },
            blockExplorerUrls: ["https://basescan.org"]
        }
    };

    let provider, signer, currentChainId, uContract;

    // 💥 核心功能：点击按钮，强行让小狐狸换链
    async function switchNetwork(targetChainId) {
        if (!window.ethereum) {
            alert("请先安装小狐狸钱包插件！");
            return;
        }

        const gasEl = document.getElementById('gas-estimate');
        gasEl.className = "gas-loading";
        gasEl.innerText = "正在唤醒小狐狸请求切换网络...";

        try {
            // 强行向钱包发送切换指令
            await window.ethereum.request({
                method: 'wallet_switchEthereumChain',
                params: [{ chainId: CHAIN_PARAMS[targetChainId].chainId }],
            });
            
            // 切换成功后，初始化链环境
            await loadChainData(targetChainId);

        } catch (switchError) {
            // 如果报错代码是 4902，说明用户钱包里从来没加过这条链，我们直接帮他一键创建并添加
            if (switchError.code === 4902 && targetChainId !== 1) {
                try {
                    await window.ethereum.request({
                        method: 'wallet_addEthereumChain',
                        params: [CHAIN_PARAMS[targetChainId]],
                    });
                    await loadChainData(targetChainId);
                } catch (addError) {
                    gasEl.innerText = "添加网络失败";
                }
            } else {
                console.error(switchError);
                gasEl.innerText = "用户拒绝了切换网络请求";
            }
        }
    }

    // 链加载与 Gas 计算
    async function loadChainData(chainId) {
        currentChainId = chainId;
        
        // 刷新按钮高亮 UI
        document.querySelectorAll('.chain-btn').forEach(b => b.classList.remove('active'));
        if(chainId === 1) document.getElementById('btn-eth').classList.add('active');
        if(chainId === 42161) document.getElementById('btn-arb').classList.add('active');
        if(chainId === 8453) document.getElementById('btn-base').classList.add('active');

        // 连节点
        provider = new ethers.BrowserProvider(window.ethereum);
        signer = await provider.getSigner();
        
        uContract = new ethers.Contract(USDT_CONTRACTS[chainId], [
            "function transfer(address to, uint256 value) returns (bool)"
        ], signer);

        // 测算 Gas
        await calculateGas();
    }

    async function calculateGas() {
        const gasEl = document.getElementById('gas-estimate');
        try {
            const parsedAmount = ethers.parseUnits(payAmountStr, 6);
            
            // 模拟跑一下合约获取 Gas 限量
            const estimatedGasLimit = await uContract.transfer.estimateGas(merchantAddress, parsedAmount);
            const feeData = await provider.getFeeData();
            const gasPrice = feeData.gasPrice || feeData.maxFeePerGas;

            const totalGasCostWei = estimatedGasLimit * gasPrice;
            const totalGasCostEth = ethers.formatEther(totalGasCostWei);
            
            // 死价格粗略折算（ETH按3200美金算）
            const totalGasCostUsd = parseFloat(totalGasCostEth) * 3200;

            if (currentChainId === 1) {
                gasEl.innerHTML = `<span style="color:#ff5555;">⚠️ 主网拥堵，预计过路费：$${totalGasCostUsd.toFixed(2)} USD</span>`;
            } else {
                gasEl.innerHTML = `<span style="color:#00ffaa;">⚡ 二层极速，预计过路费：$${totalGasCostUsd.toFixed(3) || '0.005'} USD (不到一毛钱)</span>`;
            }
            
            document.getElementById('pay-btn').disabled = false;
        } catch (e) {
            console.error(e);
            gasEl.innerHTML = `<span style="color:#ff9900;">无法精准测算（可能你选的当前链钱包里没有USDT，但不影响强行点击下方按钮支付）</span>`;
            document.getElementById('pay-btn').disabled = false; // 依然允许盲点支付
        }
    }

    // 执行转账
    async function executePayment() {
        try {
            const parsedAmount = ethers.parseUnits(payAmountStr, 6);
            const btn = document.getElementById('pay-btn');
            btn.innerText = "请在小狐狸中点击确认...";
            
            const tx = await uContract.transfer(merchantAddress, parsedAmount);
            alert("交易已广播！Hash: " + tx.hash);
            await tx.wait();
            alert("✅ 20 USDT 支付成功！");
            btn.innerText = "🚀 确认支付";
        } catch (err) {
            alert("支付取消或链上执行失败");
            document.getElementById('pay-btn').innerText = "🚀 确认支付";
        }
    }
</script>

</body>
</html>
