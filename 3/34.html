<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZenChain | 禅意毛玻璃交易系统</title>
    <style>
        :root {
            --zen-bg: #050508;
            --glass-surface: rgba(255, 255, 255, 0.03);
            --glass-stroke: rgba(255, 255, 255, 0.08);
            --accent-white: #ffffff;
            --accent-soft-blue: #a5b4fc;
            --up: #34d399;
            --down: #fb7185;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Outfit', 'Inter', system-ui;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--zen-bg);
            color: var(--accent-white);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 120px;
        }

        /* 背景微光点动画 */
        .star-field {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #11111d 0%, #050508 100%);
        }
        .star {
            position: absolute; background: white; border-radius: 50%;
            opacity: 0.3; animation: pulse 4s infinite alternate;
        }
        @keyframes pulse { from { opacity: 0.1; transform: scale(1); } to { opacity: 0.5; transform: scale(1.5); } }

        /* --- 禅意毛玻璃类 --- */
        .zen-glass {
            background: var(--glass-surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 0.5px solid var(--glass-stroke);
            border-radius: 40px;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }
        .zen-glass:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* 布局控制 */
        .app-container {
            max-width: 1100px; margin: 0 auto; padding: 20px;
            display: grid; grid-template-columns: 1.2fr 1.8fr; gap: 30px;
        }

        /* 资产模块 */
        .asset-overview { padding: 40px; position: relative; overflow: hidden; }
        .token-selector {
            display: flex; gap: 12px; margin-top: 30px; overflow-x: auto;
            padding-bottom: 10px; scrollbar-width: none;
        }
        .token-pill {
            padding: 10px 20px; border-radius: 30px; background: rgba(255,255,255,0.05);
            font-size: 13px; white-space: nowrap; border: 0.5px solid transparent;
            cursor: pointer; transition: 0.3s;
        }
        .token-pill.active { background: white; color: black; font-weight: 600; }

        /* 交易模块 */
        .trade-card { padding: 40px; }
        .input-group { margin-top: 25px; }
        .input-field {
            background: transparent; border: none; color: white;
            font-size: 42px; width: 100%; outline: none; font-weight: 300;
            margin: 10px 0; letter-spacing: -2px;
        }
        .divider { height: 0.5px; background: var(--glass-stroke); margin: 20px 0; }

        /* 确认按钮：极致简约 */
        .zen-btn {
            width: 100%; padding: 22px; border-radius: 30px; border: none;
            background: var(--accent-white); color: #000;
            font-size: 16px; font-weight: 600; cursor: pointer;
            transition: 0.3s; margin-top: 20px;
        }
        .zen-btn:hover { transform: scale(0.98); opacity: 0.9; }

        /* 底部导航栏 */
        .tab-nav {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: fit-content; padding: 8px 30px;
            display: flex; gap: 40px; z-index: 1000;
        }
        .tab-icon {
            font-size: 20px; opacity: 0.4; cursor: pointer; transition: 0.3s;
            padding: 10px;
        }
        .tab-icon.active { opacity: 1; transform: translateY(-2px); }

        /* 响应式适配 */
        @media (max-width: 850px) {
            .app-container { grid-template-columns: 1fr; }
            .desktop-only { display: none; }
            header { text-align: center; margin-bottom: 20px; }
        }
    </style>
</head>
<body>

    <div class="star-field" id="starField"></div>

    <header style="padding: 40px 20px; max-width: 1100px; margin: 0 auto;">
        <h2 style="font-weight: 300; letter-spacing: 5px; font-size: 18px; opacity: 0.8;">ZEN<span style="font-weight: 700;">CHAIN</span></h2>
    </header>

    <main class="app-container">
        <section class="zen-glass asset-overview">
            <p style="font-size: 14px; opacity: 0.5; letter-spacing: 1px;">TOTAL BALANCE</p>
            <h1 style="font-size: 48px; font-weight: 300; margin: 10px 0;">$84,209.<span style="opacity: 0.3; font-size: 32px;">50</span></h1>
            
            <div class="token-selector">
                <div class="token-pill active">Bitcoin</div>
                <div class="token-pill">Ethereum</div>
                <div class="token-pill">Solana</div>
                <div class="token-pill">Polkadot</div>
            </div>

            <div style="margin-top: 40px; display: flex; align-items: center; gap: 20px;">
                <div style="width: 60px; height: 60px; border-radius: 50%; border: 5px solid white; border-right-color: transparent;"></div>
                <div>
                    <p style="font-size: 12px; opacity: 0.5;">BTC DOMINANCE</p>
                    <p style="font-weight: 600;">64.2%</p>
                </div>
            </div>
        </section>

        <section class="zen-glass trade-card">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 14px; font-weight: 600;">SWAP 代币</span>
                <span style="font-size: 12px; opacity: 0.4;">滑点 0.1%</span>
            </div>

            <div class="input-group">
                <p style="font-size: 12px; opacity: 0.4;">YOU PAY</p>
                <input type="number" class="input-field" value="1.250">
                <p style="font-size: 14px; opacity: 0.6;">≈ $79,250.00</p>
            </div>

            <div class="divider"></div>

            <div class="input-group">
                <p style="font-size: 12px; opacity: 0.4;">YOU RECEIVE</p>
                <input type="number" class="input-field" value="42.5" readonly>
                <p style="font-size: 14px; opacity: 0.6;">ETH</p>
            </div>

            <button class="zen-btn">执行交易</button>
        </section>
    </main>

    <nav class="zen-glass tab-nav">
        <div class="tab-icon active">⦿</div>
        <div class="tab-icon">◒</div>
        <div class="tab-icon">⬡</div>
        <div class="tab-icon">⌇</div>
    </nav>

    <script>
        // 生成背景微光点
        const starField = document.getElementById('starField');
        for (let i = 0; i < 30; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 5 + 's';
            starField.appendChild(star);
        }

        // 简单的 Tab 切换
        document.querySelectorAll('.tab-icon').forEach(icon => {
            icon.addEventListener('click', function() {
                document.querySelectorAll('.tab-icon').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
