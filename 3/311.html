<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Web3 钱包全量数据深度扫描器</title>
    <style>
        body { font-family: monospace; background: #0c0c0c; color: #00ff66; padding: 20px; line-height: 1.5; }
        .container { max-width: 900px; margin: 0 auto; background: #131313; padding: 25px; border-radius: 8px; border: 1px solid #222; }
        button { background: #00ff66; color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; margin-bottom: 20px; transition: 0.2s; }
        button:hover { background: #00cc55; }
        .section { margin-top: 25px; border-top: 1px solid #222; padding-top: 15px; }
        h3 { color: #fff; margin-bottom: 12px; font-size: 18px; border-left: 4px solid #00ff66; padding-left: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #1a1a1a; }
        th { color: #666; font-size: 13px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 4px; border: 1px solid #262626; }
        .card .value { font-size: 20px; color: #fff; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>⛓️ 钱包链上全量信息扫描面板</h2>
    <p>目标地址: <strong style="color:#fff;" id="target-display">-</strong></p>
    <button id="scan-btn">⚡ 深度穿透：起底该钱包所有隐私数据</button>

    <div class="section">
        <h3>📊 钱包核心看板 (Overview)</h3>
        <div class="grid">
            <div class="card">
                <div style="color:#888;">钱包代币总估值 (USD)</div>
                <div class="value" id="total-usd">$0.00</div>
            </div>
            <div class="card">
                <div style="color:#888;">链上历史交易总笔数 (Nonce)</div>
                <div class="value" id="tx-count">0 笔</div>
            </div>
            <div class="card">
                <div style="color:#888;">钱包首次活跃时间 (First Seen)</div>
                <div class="value" id="first-seen" style="font-size:14px; color:#ff9900;">-</div>
            </div>
            <div class="card">
                <div style="color:#888;">最近一次重置/活跃 (Last Active)</div>
                <div class="value" id="last-seen" style="font-size:14px; color:#ff9900;">-</div>
            </div>
        </div>
    </div>

    <div class="section">
        <h3>🪙 资产账户明细 (All Tokens & Balances)</h3>
        <table>
            <thead>
                <tr>
                    <th>代币资产名称</th>
                    <th>代币缩写</th>
                    <th>实际持有余额</th>
                    <th>实时单价 (USD)</th>
                    <th>持仓总价值 (USD)</th>
                </tr>
            </thead>
            <tbody id="token-list">
                <tr><td colspan="5" style="color:#444;">等待扫描指令发出...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // 1. 换成你上一步成功配置的 Worker 地址
    const myWorkerUrl = "https://fancy-silence-934f.ninenine000099.workers.dev";
    
    // 2. 目标查询钱包（依然使用公开的富豪榜/大鲸鱼地址测试，数据最全）
    const targetWallet = "0xd8dA6BF26964aF9D7eEd9e03E53415D37aA96045";

    document.getElementById('target-display').innerText = targetWallet;

    async function deepScan() {
        const btn = document.getElementById('scan-btn');
        btn.innerText = "💥 正在破译链上区块快照，请稍候...";
        
        // 构造 Ethplorer 高级接口（附带全部持仓与历史交易概览）
        const apiTarget = `https://api.ethplorer.io/getAddressInfo/${targetWallet}?apiKey=freekey`;
        const proxyUrl = `${myWorkerUrl}?url=${encodeURIComponent(apiTarget)}`;

        try {
            const response = await fetch(proxyUrl);
            const data = await response.json();

            // === 提取看板核心数据 ===
            // 交易总笔数
            document.getElementById('tx-count').innerText = (data.contractInfo?.txCount || data.txCount || 0) + " 笔";
            
            // 账户寿命时间戳转换
            const formatTime = (ts) => ts ? new Date(ts * 1000).toLocaleString() : "未知";
            // 尝试获取各种时间线数据
            const firstTx = data.contractInfo?.date || "-"; 
            document.getElementById('first-seen').innerText = firstTx !== "-" ? firstTx : "早期创世区块生成";
            document.getElementById('last-seen').innerText = formatTime(data.ETH?.price?.ts || Math.floor(Date.now()/1000));

            // === 循环渲染所有资产列表 ===
            let tokenHtml = "";
            let calculatedTotalUsd = 0;

            // 1. 率先装载基础资产原生 ETH
            const ethBalance = data.ETH?.balance || 0;
            const ethPrice = data.ETH?.price?.rate || 0;
            const ethTotalValue = ethBalance * ethPrice;
            calculatedTotalUsd += ethTotalValue;

            tokenHtml += `
                <tr style="background: #1f1f1f; font-weight: bold;">
                    <td>Ethereum (原生主网币)</td>
                    <td style="color:#fff;">ETH</td>
                    <td>${ethBalance.toFixed(4)}</td>
                    <td>$${ethPrice.toFixed(2)}</td>
                    <td style="color:#00ff66;">$${ethTotalValue.toFixed(2)}</td>
                </tr>`;

            // 2. 严密遍历持有的所有 ERC-20 代币资产
            if (data.tokens && data.tokens.length > 0) {
                data.tokens.forEach(item => {
                    const info = item.tokenInfo;
                    if (!info) return;

                    // 💥【修复关键报错】：采用稳健的 BigInt 或带有安全保护的浮点计算
                    const rawBalance = Number(item.balance);
                    const decimals = Number(info.decimals || 18);
                    const realBalance = rawBalance / Math.pow(10, decimals);
                    
                    // 获取价格与计算单项总价
                    const priceRate = info.price ? parseFloat(info.price.rate || 0) : 0;
                    const tokenTotalValue = realBalance * priceRate;

                    // 过滤掉小于 0.1 美金的“归零币”或“垃圾空投”，只留有价值的真资产
                    if (tokenTotalValue > 0.1 && realBalance > 0.0001) {
                        calculatedTotalUsd += tokenTotalValue;
                        tokenHtml += `
                            <tr>
                                <td>${info.name || '未命名资产'}</td>
                                <td style="color:#fff;">${info.symbol || 'UNKNOWN'}</td>
                                <td>${realBalance.toLocaleString(undefined, {maximumFractionDigits: 4})}</td>
                                <td>$${priceRate.toFixed(2)}</td>
                                <td style="color:#00ff66;">$${tokenTotalValue.toFixed(2)}</td>
                            </tr>`;
                    }
                });
            }

            // 更新总估值看板
            document.getElementById('total-usd').innerText = `$${calculatedTotalUsd.toLocaleString(undefined, {maximumFractionDigits: 2})}`;
            // 装填表格
            document.getElementById('token-list').innerHTML = tokenHtml;
            btn.innerText = "⚡ 深度扫描完毕！数据全部出炉";

        } catch (error) {
            console.error("前端渲染中断异常:", error);
            btn.innerText = "❌ 扫描中断，可能节点返回的数据量过于庞大";
        }
    }

    document.getElementById('scan-btn').addEventListener('click', deepScan);
</script>

</body>
</html>
