<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RetroGlass | 复古琥珀交易系统</title>
    <style>
        :root {
            --retro-bg: #1a1612;
            --amber-glass: rgba(255, 180, 50, 0.12);
            --amber-border: rgba(255, 200, 100, 0.3);
            --text-gold: #e2b053;
            --crt-glow: rgba(255, 180, 50, 0.05);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace; /* 复古等宽字体 */
        }

        body {
            background-color: var(--retro-bg);
            color: var(--text-gold);
            min-height: 100vh;
            overflow-x: hidden;
            /* 模拟 CRT 扫描线 */
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
        }

        /* --- 核心：肥皂块琥珀玻璃 --- */
        .retro-soap-glass {
            background: var(--amber-glass);
            backdrop-filter: blur(25px) sepia(0.4) saturate(1.2);
            -webkit-backdrop-filter: blur(25px) sepia(0.4) saturate(1.2);
            /* 超大肥皂圆角 */
            border-radius: 60px; 
            border: 2px solid var(--amber-border);
            box-shadow: 
                0 20px 50px rgba(0,0,0,0.5),
                inset 0 0 20px rgba(255, 180, 50, 0.1);
            position: relative;
            overflow: hidden;
        }

        /* 玻璃表面的高光磨砂感 */
        .retro-soap-glass::before {
            content: ""; position: absolute; inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
            opacity: 0.03; pointer-events: none;
        }

        .container {
            max-width: 1100px; margin: 0 auto; padding: 40px 20px;
            display: grid; grid-template-columns: 1fr 320px; gap: 30px;
        }

        /* 顶部状态栏 */
        header { padding: 40px; display: flex; justify-content: space-between; align-items: center; }
        .vfd-display { 
            font-size: 12px; border: 1px solid var(--text-gold); padding: 5px 15px; 
            border-radius: 20px; box-shadow: 0 0 10px var(--crt-glow);
        }

        /* 资产显示 */
        .hero-section { padding: 50px; text-align: center; }
        .retro-amount { 
            font-size: 52px; font-weight: bold; margin: 20px 0;
            text-shadow: 0 0 15px var(--text-gold);
        }

        /* 复古旋钮模拟 */
        .knob-container {
            display: flex; gap: 20px; justify-content: center; margin-top: 30px;
        }
        .knob {
            width: 60px; height: 60px; border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #444, #111);
            border: 3px solid var(--amber-border);
            position: relative; cursor: pointer;
        }
        .knob::after {
            content: ""; position: absolute; top: 10px; left: 50%;
            width: 4px; height: 12px; background: var(--text-gold);
            transform: translateX(-50%); border-radius: 2px;
        }

        /* 磁带式列表 */
        .tape-list { margin-top: 30px; }
        .tape-item {
            padding: 15px; background: rgba(0,0,0,0.2); border-radius: 15px;
            margin-bottom: 10px; border-left: 5px solid var(--text-gold);
            display: flex; justify-content: space-between;
        }

        /* 动作按钮 */
        .btn-retro {
            width: 100%; padding: 20px; border-radius: 40px; border: none;
            background: var(--text-gold); color: #222; font-weight: 900;
            font-size: 16px; cursor: pointer; text-transform: uppercase;
            box-shadow: 0 5px 0 #8a6a2a; transition: 0.1s;
        }
        .btn-retro:active { transform: translateY(4px); box-shadow: 0 1px 0 #8a6a2a; }

        @media (max-width: 850px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <h2 style="letter-spacing: 3px;">AMBER<span style="opacity:0.5;">OS</span></h2>
        <div class="vfd-display">SYSTEM STATUS: NOMINAL</div>
    </header>

    <div class="container">
        <main class="retro-soap-glass hero-section">
            <p style="font-size: 12px; opacity: 0.6; letter-spacing: 5px;">ACCOUNT BALANCE</p>
            <h1 class="retro-amount">1,240.52 <span style="font-size: 24px;">ETH</span></h1>
            
            <div class="knob-container">
                <div><div class="knob"></div><p style="font-size: 10px; margin-top: 8px;">VOL</p></div>
                <div><div class="knob" style="transform: rotate(45deg);"></div><p style="font-size: 10px; margin-top: 8px;">FREQ</p></div>
                <div><div class="knob" style="transform: rotate(-30deg);"></div><p style="font-size: 10px; margin-top: 8px;">SYNC</p></div>
            </div>
        </main>

        <aside class="retro-soap-glass" style="padding: 30px;">
            <h3 style="font-size: 14px; text-align: center; margin-bottom: 25px;">TAPE DECK 01</h3>
            
            <div class="tape-list">
                <div class="tape-item"><span>TRANSFER</span><span>-0.52</span></div>
                <div class="tape-item"><span>MINT NFTS</span><span>DONE</span></div>
                <div class="tape-item"><span>STAKING</span><span>+12.0</span></div>
            </div>

            <button class="btn-retro" style="margin-top: 30px;">EXECUTE TASK</button>
            <p style="text-align: center; font-size: 10px; margin-top: 20px; opacity: 0.4;">BUFFERING DATA...</p>
        </aside>
    </div>

</body>
</html>
