<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AquaGlass | 流体水滴交易系统</title>
    <style>
        :root {
            --aqua-bg: #0a1128;
            --glass-base: rgba(255, 255, 255, 0.05);
            --glass-edge: rgba(255, 255, 255, 0.2);
            --accent-glow: #00f2fe;
            --text-main: #f8fafc;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--aqua-bg);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex; flex-direction: column;
            /* 动态水波纹底纹 */
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 242, 254, 0.05) 0%, transparent 70%);
        }

        /* --- 核心：水滴拟态玻璃类 --- */
        .droplet-glass {
            background: var(--glass-base);
            backdrop-filter: blur(25px) saturate(150%);
            -webkit-backdrop-filter: blur(25px) saturate(150%);
            border: 1px solid var(--glass-edge);
            /* 非对称有机圆角 */
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            box-shadow: 
                20px 20px 60px rgba(0, 0, 0, 0.4),
                inset -6px -6px 15px rgba(255, 255, 255, 0.05),
                inset 6px 6px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .droplet-glass:hover {
            border-radius: 40% 60% 70% 30% / 40% 70% 30% 60%;
            transform: scale(1.02) rotate(1deg);
        }

        /* 布局容器 */
        .app-shell {
            max-width: 1200px; margin: 0 auto; width: 100%; padding: 40px 20px;
            display: grid; grid-template-columns: 1fr 340px; gap: 40px;
        }

        /* 资产中心 */
        .main-display {
            padding: 60px; min-height: 400px; display: flex; flex-direction: column; justify-content: center;
        }
        .balance-title { font-size: 14px; text-transform: uppercase; letter-spacing: 4px; opacity: 0.5; }
        .balance-amount { font-size: 64px; font-weight: 800; margin: 20px 0; background: linear-gradient(to right, #fff, var(--accent-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* 交互滑块 */
        .glass-range {
            -webkit-appearance: none; width: 100%; height: 12px;
            background: rgba(255,255,255,0.05); border-radius: 20px;
            border: 1px solid var(--glass-edge); margin: 30px 0;
        }
        .glass-range::-webkit-slider-thumb {
            -webkit-appearance: none; width: 28px; height: 28px;
            background: #fff; border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* 功能卡片列表 */
        .feature-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-top: 40px; }
        .feature-item { padding: 25px; border-radius: 30px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }

        /* 侧边交易栏 */
        .action-sidebar { padding: 30px; border-radius: 40px !important; }
        .input-group { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 24px; margin-bottom: 20px; box-shadow: inset 2px 2px 10px rgba(0,0,0,0.5); }
        .input-group input { background: transparent; border: none; color: #fff; font-size: 20px; width: 100%; outline: none; }

        /* 水滴脉冲按钮 */
        .pulse-btn {
            width: 100%; padding: 20px; border-radius: 20px; border: none;
            background: var(--accent-glow); color: #0a1128; font-weight: 800;
            cursor: pointer; position: relative; overflow: hidden;
        }
        .pulse-btn::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; background: rgba(255,255,255,0.3);
            transform: scale(0); border-radius: 50%; transition: 0.5s;
        }
        .pulse-btn:active::after { transform: scale(2); opacity: 0; }

        @media (max-width: 900px) {
            .app-shell { grid-template-columns: 1fr; }
            .main-display { padding: 30px; border-radius: 40px !important; }
        }
    </style>
</head>
<body>

    <header style="padding: 40px; text-align: center;">
        <h2 style="font-weight: 200; letter-spacing: 10px;">AQUA<span style="font-weight: 800; color: var(--accent-glow);">GLASS</span></h2>
    </header>

    <main class="app-shell">
        <section class="droplet-glass main-display">
            <p class="balance-title">Verified Liquidity</p>
            <h1 class="balance-amount">$ 254,190.00</h1>
            
            <div class="feature-grid">
                <div class="feature-item">
                    <p style="opacity: 0.4; font-size: 12px;">APY 收益</p>
                    <h3 style="color: var(--accent-glow);">+ 18.5%</h3>
                </div>
                <div class="feature-item">
                    <p style="opacity: 0.4; font-size: 12px;">健康系数</p>
                    <h3 style="color: #00ffa3;">98.2</h3>
                </div>
            </div>

            <input type="range" class="glass-range" value="65">
            <p style="text-align: center; font-size: 12px; opacity: 0.5;">滑动调整风险敞口：MODERATE</p>
        </section>

        <aside class="droplet-glass action-sidebar">
            <h3 style="margin-bottom: 30px; font-weight: 300;">执行协议</h3>
            
            <div class="input-group">
                <label style="font-size: 10px; opacity: 0.4;">质押金额 (USDT)</label>
                <input type="number" value="5000">
            </div>

            <div class="input-group" style="margin-bottom: 40px;">
                <label style="font-size: 10px; opacity: 0.4;">预计产出 (AQUA)</label>
                <input type="number" readonly value="142.50">
            </div>

            <button class="pulse-btn">确认流动性注入</button>

            <div style="margin-top: 30px; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 20px;">
                <p style="font-size: 11px; line-height: 1.6; opacity: 0.6;">
                    * 注入操作将产生微小 Gas 费用。资产将通过多签协议进行冷存储保护。
                </p>
            </div>
        </aside>
    </main>

    <div style="position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 20px;">
        <div class="droplet-glass" style="width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;">⚡</div>
        <div class="droplet-glass" style="width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;">⚓</div>
        <div class="droplet-glass" style="width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer;">◈</div>
    </div>

</body>
</html>
