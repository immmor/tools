<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级马里奥：赛博重构 (Super Mario Cyber Refactored)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: #090a10;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .header-title {
            font-size: 24px;
            font-weight: 900;
            margin-bottom: 12px;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ff2a5f, #ffcd00, #00f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.3);
        }

        .game-wrapper {
            position: relative;
            width: 850px;
            height: 480px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), 0 0 30px rgba(0, 240, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            background: #101422;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .hud {
            position: absolute;
            top: 15px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 10;
        }

        .hud-card {
            background: rgba(16, 20, 32, 0.85);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 6px 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .hud-card span.val {
            color: #ffcd00;
            font-size: 16px;
            text-shadow: 0 0 8px rgba(255, 205, 0, 0.5);
        }

        .power-meter {
            width: 70px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .power-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00f0ff, #ff2a5f);
            transition: width 0.2s ease;
        }

        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(8, 10, 16, 0.88);
            backdrop-filter: blur(12px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay-screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        .overlay-title {
            font-size: 40px;
            font-weight: 900;
            color: #ff2a5f;
            text-shadow: 0 0 20px rgba(255, 42, 95, 0.6);
            margin-bottom: 8px;
        }

        .overlay-subtitle {
            font-size: 15px;
            color: #a0aec0;
            margin-bottom: 25px;
        }

        .restart-btn {
            background: linear-gradient(135deg, #ff2a5f, #ff7b00);
            color: #fff;
            border: none;
            padding: 12px 32px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 42, 95, 0.4);
            transition: all 0.2s ease;
        }

        .restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 42, 95, 0.7);
        }

        .controls-hint {
            margin-top: 12px;
            display: flex;
            gap: 12px;
            color: #64748b;
            font-size: 12px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 850px;
        }

        .key {
            background: #1e293b;
            color: #cbd5e1;
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid #334155;
            font-weight: bold;
        }

        #svg-assets { display: none; }
    </style>
</head>
<body>

    <div class="header-title">⚡ SUPER MARIO : CYBER REFACTORED ⚡</div>

    <div class="game-wrapper">
        <canvas id="gameCanvas" width="850" height="480"></canvas>

        <div class="hud">
            <div class="hud-card">SCORE <span class="val" id="scoreVal">00000</span></div>
            <div class="hud-card">COINS <span class="val" id="coinVal">🪙 0</span></div>
            <div class="hud-card">FIRE <span class="val" id="fireVal">🔥 5</span></div>
            <div class="hud-card">
                HYPER ENERGY
                <div class="power-meter"><div class="power-fill" id="powerFill"></div></div>
            </div>
        </div>

        <div class="overlay-screen" id="gameOverScreen">
            <div class="overlay-title">SYSTEM FAILURE</div>
            <div class="overlay-subtitle" id="finalStats">得分: 0 | 金币: 0</div>
            <button class="restart-btn" onclick="restartGame()">重新加载 (按 空格键)</button>
        </div>
    </div>

    <div class="controls-hint">
        <div><span class="key">A</span> / <span class="key">D</span> 移动</div>
        <div><span class="key">W</span> / <span class="key">Space</span> 二段跳/长按滑翔</div>
        <div><span class="key">S</span> 空中下砸波</div>
        <div><span class="key">J</span> 火球</div>
        <div><span class="key">K</span> 闪避</div>
        <div><span class="key">Shift</span> 狂暴</div>
        <div>新增元素: <span class="key">🧱 高空平台</span> | <span class="key">🪴 管道食人花</span> | <span class="key">🛡️ 能量盾</span></div>
    </div>

    <!-- SVG 资源池 -->
    <div id="svg-assets">
        <svg id="mario-stand" viewBox="0 0 60 80"><path d="M 12 22 Q 30 8 48 22 L 54 26 L 10 26 Z" fill="#ff2a5f"/><rect x="18" y="10" width="24" height="12" rx="4" fill="#ff2a5f"/><circle cx="30" cy="16" r="4" fill="#fff"/><text x="30" y="18.5" font-size="5" font-weight="900" text-anchor="middle" fill="#ff2a5f">M</text><rect x="16" y="24" width="28" height="20" rx="6" fill="#ffc896"/><circle cx="38" cy="32" r="6" fill="#ffc896"/><ellipse cx="32" cy="29" rx="2.5" ry="4" fill="#1a202c"/><path d="M 24 38 Q 34 32 46 37 Q 38 42 24 38 Z" fill="#2d3748"/><rect x="18" y="44" width="24" height="22" rx="4" fill="#0066ff"/><rect x="14" y="44" width="32" height="12" rx="3" fill="#ff2a5f"/><circle cx="23" cy="50" r="2" fill="#ffcd00"/><circle cx="37" cy="50" r="2" fill="#ffcd00"/><rect x="8" y="45" width="8" height="16" rx="4" fill="#ff2a5f"/><circle cx="12" cy="62" r="4.5" fill="#fff"/><rect x="20" y="64" width="8" height="10" fill="#0055cc"/><rect x="32" y="64" width="8" height="10" fill="#0055cc"/><rect x="16" y="70" width="12" height="8" rx="3" fill="#6b3ba7"/><rect x="32" y="70" width="12" height="8" rx="3" fill="#6b3ba7"/></svg>
        <svg id="mario-run1" viewBox="0 0 60 80"><g transform="translate(0, 2)"><path d="M 14 20 Q 32 6 50 20 L 56 24 L 12 24 Z" fill="#ff2a5f"/><rect x="20" y="8" width="24" height="12" rx="4" fill="#ff2a5f"/><circle cx="32" cy="14" r="4" fill="#fff"/><text x="32" y="16.5" font-size="5" font-weight="900" text-anchor="middle" fill="#ff2a5f">M</text><rect x="18" y="22" width="28" height="20" rx="6" fill="#ffc896"/><circle cx="40" cy="30" r="6" fill="#ffc896"/><ellipse cx="34" cy="27" rx="2.5" ry="4" fill="#1a202c"/><path d="M 26 36 Q 36 30 48 35 Q 40 40 26 36 Z" fill="#2d3748"/><rect x="20" y="42" width="22" height="20" rx="4" fill="#0066ff"/><rect x="16" y="42" width="30" height="10" rx="3" fill="#ff2a5f"/><g transform="rotate(-40 12 46)"><rect x="10" y="42" width="8" height="16" rx="4" fill="#ff2a5f"/><circle cx="14" cy="59" r="4.5" fill="#fff"/></g><g transform="rotate(35 24 60)"><rect x="20" y="60" width="8" height="12" fill="#0055cc"/><rect x="16" y="68" width="14" height="8" rx="3" fill="#6b3ba7"/></g><g transform="rotate(-40 34 60)"><rect x="30" y="60" width="8" height="12" fill="#0055cc"/><rect x="28" y="68" width="14" height="8" rx="3" fill="#6b3ba7"/></g></g></svg>
        <svg id="mario-run2" viewBox="0 0 60 80"><g transform="translate(0, 0)"><path d="M 14 20 Q 32 6 50 20 L 56 24 L 12 24 Z" fill="#ff2a5f"/><rect x="20" y="8" width="24" height="12" rx="4" fill="#ff2a5f"/><circle cx="32" cy="14" r="4" fill="#fff"/><text x="32" y="16.5" font-size="5" font-weight="900" text-anchor="middle" fill="#ff2a5f">M</text><rect x="18" y="22" width="28" height="20" rx="6" fill="#ffc896"/><circle cx="40" cy="30" r="6" fill="#ffc896"/><ellipse cx="34" cy="27" rx="2.5" ry="4" fill="#1a202c"/><path d="M 26 36 Q 36 30 48 35 Q 40 40 26 36 Z" fill="#2d3748"/><rect x="20" y="42" width="22" height="20" rx="4" fill="#0066ff"/><rect x="16" y="42" width="30" height="10" rx="3" fill="#ff2a5f"/><g transform="rotate(40 12 46)"><rect x="10" y="42" width="8" height="16" rx="4" fill="#ff2a5f"/><circle cx="14" cy="59" r="4.5" fill="#fff"/></g><g transform="rotate(-30 24 60)"><rect x="20" y="60" width="8" height="12" fill="#0055cc"/><rect x="16" y="68" width="14" height="8" rx="3" fill="#6b3ba7"/></g><g transform="rotate(45 34 60)"><rect x="30" y="60" width="8" height="12" fill="#0055cc"/><rect x="28" y="68" width="14" height="8" rx="3" fill="#6b3ba7"/></g></g></svg>
        <svg id="mario-jump" viewBox="0 0 60 80"><g transform="translate(0, -4)"><path d="M 14 16 Q 32 2 50 16 L 56 20 L 12 20 Z" fill="#ff2a5f"/><rect x="20" y="4" width="24" height="12" rx="4" fill="#ff2a5f"/><circle cx="32" cy="10" r="4" fill="#fff"/><text x="32" y="12.5" font-size="5" font-weight="900" text-anchor="middle" fill="#ff2a5f">M</text><rect x="18" y="18" width="28" height="20" rx="6" fill="#ffc896"/><circle cx="40" cy="24" r="6" fill="#ffc896"/><ellipse cx="34" cy="22" rx="3" ry="3" fill="#1a202c"/><rect x="42" y="6" width="8" height="22" rx="4" fill="#ff2a5f" transform="rotate(-20 42 6)"/><circle cx="48" cy="4" r="5" fill="#fff"/><rect x="20" y="38" width="22" height="20" rx="4" fill="#0066ff"/><rect x="14" y="54" width="12" height="10" rx="3" fill="#6b3ba7" transform="rotate(-20 14 54)"/><rect x="30" y="58" width="14" height="8" rx="3" fill="#6b3ba7"/></g></svg>
        <svg id="enemy-goomba" viewBox="0 0 50 50"><path d="M 10 30 C 5 10, 45 10, 40 30 Z" fill="#00f0ff"/><path d="M 14 28 C 10 15, 40 15, 36 28 Z" fill="#091833"/><polygon points="16,20 24,22 22,25 16,22" fill="#ff2a5f"/><polygon points="34,20 26,22 28,25 34,22" fill="#ff2a5f"/><ellipse cx="16" cy="42" rx="8" ry="5" fill="#ff2a5f"/><ellipse cx="34" cy="42" rx="8" ry="5" fill="#ff2a5f"/></svg>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // SVG 缓存
        const svgSprites = {};
        const svgIds = ['mario-stand', 'mario-run1', 'mario-run2', 'mario-jump', 'enemy-goomba'];
        svgIds.forEach(id => {
            const svgElement = document.getElementById(id);
            const svgString = new XMLSerializer().serializeToString(svgElement);
            const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
            const img = new Image();
            img.src = URL.createObjectURL(blob);
            svgSprites[id] = img;
        });

        // 核心参数
        let score = 0, coins = 0, starEnergy = 0, fireAmmo = 5;
        let isInvincible = false, invincibleTimer = 0;
        let isDashing = false, dashTimer = 0;
        let freezeTimer = 0, lowGravityTimer = 0, magnetTimer = 0;
        let gameOver = false, frameCount = 0;
        let cameraX = 0;
        const groundY = 400;

        const keys = { left: false, right: false, jump: false, down: false };

        window.addEventListener('keydown', e => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') {
                keys.down = true;
                handleGroundPound(); // 【新玩法3】空中下砸波
            }
            if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') {
                if (!keys.jump && !gameOver) handleJump();
                keys.jump = true;
                if (gameOver && e.code === 'Space') restartGame();
            }
            if (e.code === 'KeyJ') shootFireball();
            if (e.code === 'KeyK') triggerDash();
            if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') triggerStarPower();
        });

        window.addEventListener('keyup', e => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
            if (e.code === 'ArrowDown' || e.code === 'KeyS') keys.down = false;
            if (e.code === 'ArrowUp' || e.code === 'KeyW' || e.code === 'Space') keys.jump = false;
        });

        // 马里奥物理对象 (调整平滑度与下砸/降落伞标志)
        const mario = {
            x: 100, y: 300,
            baseWidth: 42, baseHeight: 56,
            width: 42, height: 56,
            vx: 0, vy: 0,
            accel: 0.65,
            friction: 0.82,
            maxSpeed: 6.0,
            gravity: 0.58,
            jumpPower: -12.0,
            jumpCount: 0, maxJumps: 2,
            grounded: false, facingRight: true,
            isBig: false,
            hasShield: false, // 【新玩法4】能量护盾
            isGroundPounding: false, // 【新玩法3】下砸中
            isParachuting: false    // 【新玩法5】滑翔中
        };

        // 实体容器
        let obstacles = [];
        let coinItems = [];
        let blocks = [];
        let platforms = [];     // 【新玩法1】高空平台
        let pipes = [];         // 【新玩法2】绿管道
        let piranhaPlants = []; // 【新玩法2】食人花
        let mushrooms = [];
        let fireballs = [];
        let freezeCrystals = [];
        let balloons = [];
        let magnets = [];
        let shields = [];       // 【新玩法4】护盾道具
        let shockwaves = [];    // 下砸震地波
        let particles = [];
        let floatingTexts = [];

        function handleJump() {
            if (mario.jumpCount < mario.maxJumps) {
                const power = (lowGravityTimer > 0) ? mario.jumpPower * 1.25 : mario.jumpPower;
                mario.vy = power;
                mario.jumpCount++;
                mario.grounded = false;
                mario.isGroundPounding = false;
                createParticles(mario.x + mario.width / 2, mario.y + mario.height, '#00f0ff', 10);
            }
        }

        // 【新玩法3】空中急坠下砸
        function handleGroundPound() {
            if (!mario.grounded && !mario.isGroundPounding) {
                mario.isGroundPounding = true;
                mario.vy = 16; // 瞬时高速向下坠击
                mario.vx = 0;
                createParticles(mario.x + mario.width / 2, mario.y, '#ffcd00', 10);
            }
        }

        function shootFireball() {
            if (fireAmmo > 0 && !gameOver) {
                fireAmmo--;
                document.getElementById('fireVal').innerText = `🔥 ${fireAmmo}`;
                fireballs.push({
                    x: mario.facingRight ? mario.x + mario.width : mario.x - 15,
                    y: mario.y + 20,
                    vx: mario.facingRight ? 10 : -10,
                    vy: 2
                });
                createParticles(mario.x + 20, mario.y + 20, '#ff7b00', 8);
            }
        }

        function triggerDash() {
            if (!isDashing && !gameOver) {
                isDashing = true;
                dashTimer = 15;
                mario.vx = mario.facingRight ? 16 : -16;
                createParticles(mario.x, mario.y + 20, '#00f0ff', 15);
                createFloatingText(mario.x, mario.y - 20, 'DASH!', '#00f0ff');
            }
        }

        function triggerStarPower() {
            if (starEnergy >= 100 && !isInvincible) {
                isInvincible = true;
                invincibleTimer = 300;
                starEnergy = 0;
                document.getElementById('powerFill').style.width = '0%';
                createFloatingText(mario.x, mario.y - 20, 'HYPER DRIVE!', '#ffcd00');
            }
        }

        function createFloatingText(x, y, text, color) {
            floatingTexts.push({ x, y, text, color, alpha: 1 });
        }

        function createParticles(x, y, color, count = 8) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6,
                    size: Math.random() * 4 + 2,
                    color, alpha: 1
                });
            }
        }

        // 精准生成器（绝不凭空刷在脸上，只在屏幕右侧远处生成）
        let lastSpawnX = 600;
        function spawnEntities() {
            if (cameraX + canvas.width + 200 > lastSpawnX) {
                lastSpawnX += 180 + Math.random() * 120;

                const randType = Math.random();

                // 【新玩法1】生成高空砖块平台
                if (randType < 0.25) {
                    const platY = groundY - 100 - Math.random() * 80;
                    platforms.push({ x: lastSpawnX, y: platY, width: 120, height: 20 });
                    // 平台上放置金币
                    coinItems.push({ x: lastSpawnX + 50, y: platY - 25, size: 10, rotation: 0 });
                }
                // 【新玩法2】生成绿管道与食人花
                else if (randType < 0.45) {
                    const pipeH = 60 + Math.random() * 30;
                    const pipeX = lastSpawnX;
                    pipes.push({ x: pipeX, y: groundY - pipeH, width: 50, height: pipeH });
                    // 管道概率出食人花
                    if (Math.random() < 0.7) {
                        piranhaPlants.push({ pipeX: pipeX, x: pipeX + 13, y: groundY - pipeH - 30, width: 24, height: 30, timer: 0 });
                    }
                }
                // 生成普通地面蘑菇怪
                else if (randType < 0.75) {
                    obstacles.push({ x: lastSpawnX, y: groundY - 38, width: 38, height: 38 });
                }
                // 问号砖块
                else {
                    blocks.push({ x: lastSpawnX, y: groundY - 120, width: 36, height: 36, hit: false });
                }

                // 随机道具生成
                if (Math.random() < 0.2) freezeCrystals.push({ x: lastSpawnX + 40, y: groundY - 40, size: 15 });
                if (Math.random() < 0.15) balloons.push({ x: lastSpawnX + 30, y: 160, size: 16 });
            }
        }

        function restartGame() {
            score = 0; coins = 0; starEnergy = 0; fireAmmo = 5;
            isInvincible = false; isDashing = false;
            freezeTimer = 0; lowGravityTimer = 0; magnetTimer = 0;
            gameOver = false; cameraX = 0; lastSpawnX = 600;

            mario.x = 100; mario.y = groundY - mario.baseHeight;
            mario.vx = 0; mario.vy = 0; mario.isBig = false; mario.hasShield = false;
            mario.isGroundPounding = false; mario.isParachuting = false;
            mario.width = mario.baseWidth; mario.height = mario.baseHeight;

            obstacles = []; coinItems = []; blocks = []; platforms = [];
            pipes = []; piranhaPlants = []; mushrooms = []; fireballs = [];
            freezeCrystals = []; balloons = []; magnets = []; shields = [];
            shockwaves = []; particles = []; floatingTexts = [];

            document.getElementById('gameOverScreen').classList.remove('active');
            document.getElementById('powerFill').style.width = '0%';
            document.getElementById('fireVal').innerText = `🔥 ${fireAmmo}`;
            gameLoop();
        }

        // 核心更新逻辑
        function update() {
            if (gameOver) return;
            frameCount++;

            if (invincibleTimer > 0) invincibleTimer--; else isInvincible = false;
            if (dashTimer > 0) dashTimer--; else isDashing = false;
            if (freezeTimer > 0) freezeTimer--;
            if (lowGravityTimer > 0) lowGravityTimer--;
            if (magnetTimer > 0) magnetTimer--;

            // 左右移动
            if (keys.left) {
                mario.vx -= mario.accel;
                mario.facingRight = false;
            } else if (keys.right) {
                mario.vx += mario.accel;
                mario.facingRight = true;
            } else if (!isDashing) {
                mario.vx *= mario.friction;
            }

            if (!isDashing) {
                mario.vx = Math.max(-mario.maxSpeed, Math.min(mario.maxSpeed, mario.vx));
            }

            mario.x += mario.vx;
            if (mario.x < cameraX + 10) mario.x = cameraX + 10;

            if (mario.x - cameraX > 300) {
                cameraX = mario.x - 300;
            }

            // 【新玩法5】长按跳跃键触发滑翔伞
            if (keys.jump && mario.vy > 0 && !mario.isGroundPounding) {
                mario.isParachuting = true;
                mario.vy = 1.8; // 极慢的缓缓滑翔下落
            } else {
                mario.isParachuting = false;
            }

            // 重力设定
            if (!mario.isParachuting && !mario.isGroundPounding) {
                const currentGravity = (lowGravityTimer > 0) ? mario.gravity * 0.4 : mario.gravity;
                mario.vy += currentGravity;
            }
            mario.y += mario.vy;

            // 地面碰撞与下砸震地波【新玩法3】
            if (mario.y + mario.height >= groundY) {
                if (mario.isGroundPounding) {
                    mario.isGroundPounding = false;
                    // 触发两侧震地冲击波
                    shockwaves.push({ x: mario.x + mario.width / 2, y: groundY - 5, radius: 10, maxRadius: 120 });
                    createParticles(mario.x + mario.width / 2, groundY - 10, '#ffcd00', 25);
                }
                mario.y = groundY - mario.height;
                mario.vy = 0;
                mario.grounded = true;
                mario.jumpCount = 0;
            }

            // 【新玩法1】高空平台站立碰撞判定
            platforms.forEach(plat => {
                if (mario.vx >= 0 || mario.vx < 0) {
                    if (mario.x + mario.width > plat.x && mario.x < plat.x + plat.width) {
                        // 从上方落下站立
                        if (mario.vy > 0 && mario.y + mario.height - mario.vy <= plat.y + 10 && mario.y + mario.height >= plat.y) {
                            mario.y = plat.y - mario.height;
                            mario.vy = 0;
                            mario.grounded = true;
                            mario.jumpCount = 0;
                            if (mario.isGroundPounding) {
                                mario.isGroundPounding = false;
                                shockwaves.push({ x: mario.x + mario.width / 2, y: plat.y, radius: 10, maxRadius: 80 });
                            }
                        }
                    }
                }
            });

            // 【新玩法2】绿管道挡路碰撞
            pipes.forEach(pipe => {
                if (mario.x + mario.width > pipe.x && mario.x < pipe.x + pipe.width) {
                    // 顶部站立
                    if (mario.vy > 0 && mario.y + mario.height - mario.vy <= pipe.y + 10) {
                        mario.y = pipe.y - mario.height;
                        mario.vy = 0;
                        mario.grounded = true;
                        mario.jumpCount = 0;
                    } else if (mario.x + mario.width - mario.vx <= pipe.x) { // 左侧阻挡
                        mario.x = pipe.x - mario.width;
                    } else if (mario.x - mario.vx >= pipe.x + pipe.width) { // 右侧阻挡
                        mario.x = pipe.x + pipe.width;
                    }
                }
            });

            // 更新下砸震地波【新玩法3】
            for (let i = shockwaves.length - 1; i >= 0; i--) {
                const sw = shockwaves[i];
                sw.radius += 8;
                // 震地波消灭两侧敌人
                obstacles.forEach((obs, index) => {
                    if (Math.abs((obs.x + obs.width / 2) - sw.x) < sw.radius) {
                        createParticles(obs.x + 20, obs.y + 20, '#ffcd00', 15);
                        obstacles.splice(index, 1);
                        score += 200;
                    }
                });
                if (sw.radius >= sw.maxRadius) shockwaves.splice(i, 1);
            }

            // 火球逻辑
            for (let i = fireballs.length - 1; i >= 0; i--) {
                const f = fireballs[i];
                f.x += f.vx; f.y += f.vy;
                if (f.y + 10 >= groundY) f.vy = -f.vy * 0.8;

                // 清理敌人或食人花
                for (let j = obstacles.length - 1; j >= 0; j--) {
                    const obs = obstacles[j];
                    if (Math.abs(f.x - (obs.x + obs.width / 2)) < 25 && Math.abs(f.y - (obs.y + obs.height / 2)) < 25) {
                        createParticles(obs.x + 20, obs.y + 20, '#ff7b00', 15);
                        obstacles.splice(j, 1);
                        fireballs.splice(i, 1);
                        score += 200;
                        break;
                    }
                }
                if (f && (f.x > cameraX + canvas.width || f.x < cameraX)) fireballs.splice(i, 1);
            }

            // 【新玩法2】食人花伸缩与攻击判定
            for (let i = piranhaPlants.length - 1; i >= 0; i--) {
                const p = piranhaPlants[i];
                p.timer += 0.05;
                p.y = (groundY - 80) + Math.sin(p.timer) * 25; // 伸缩动画

                if (mario.x < p.x + p.width && mario.x + mario.width > p.x &&
                    mario.y < p.y + p.height && mario.y + mario.height > p.y
                ) {
                    if (isInvincible || isDashing) {
                        piranhaPlants.splice(i, 1);
                        score += 300;
                    } else if (mario.hasShield) { // 【新玩法4】护盾抵挡
                        piranhaPlants.splice(i, 1);
                        mario.hasShield = false;
                        createFloatingText(mario.x, mario.y - 20, 'SHIELD LOST', '#00f0ff');
                    } else {
                        triggerGameOver();
                    }
                }
            }

            // 【新玩法4】能量护盾道具收集
            for (let i = shields.length - 1; i >= 0; i--) {
                const s = shields[i];
                if (Math.abs((mario.x + mario.width / 2) - s.x) < 30 && Math.abs((mario.y + mario.height / 2) - s.y) < 30) {
                    shields.splice(i, 1);
                    mario.hasShield = true;
                    createFloatingText(mario.x, mario.y - 20, 'SHIELD ON!', '#00f0ff');
                }
            }

            // 冰霜晶体
            for (let i = freezeCrystals.length - 1; i >= 0; i--) {
                const fc = freezeCrystals[i];
                if (Math.abs((mario.x + mario.width / 2) - fc.x) < 30 && Math.abs((mario.y + mario.height / 2) - fc.y) < 30) {
                    freezeCrystals.splice(i, 1);
                    freezeTimer = 180;
                    createFloatingText(mario.x, mario.y - 20, 'FREEZE ALL!', '#00f0ff');
                }
            }

            // 低重力气球
            for (let i = balloons.length - 1; i >= 0; i--) {
                const b = balloons[i];
                if (Math.abs((mario.x + mario.width / 2) - b.x) < 30 && Math.abs((mario.y + mario.height / 2) - b.y) < 30) {
                    balloons.splice(i, 1);
                    lowGravityTimer = 300;
                    createFloatingText(mario.x, mario.y - 20, 'LOW GRAVITY!', '#ff2a5f');
                }
            }

            // 问号砖块逻辑
            for (let i = blocks.length - 1; i >= 0; i--) {
                const b = blocks[i];
                if (!b.hit &&
                    mario.x < b.x + b.width && mario.x + mario.width > b.x &&
                    mario.y < b.y + b.height && mario.y + mario.height > b.y
                ) {
                    if (mario.vy < 0 && mario.y <= b.y + b.height) {
                        b.hit = true;
                        mario.vy = 2;
                        createParticles(b.x + 18, b.y, '#ffcd00', 12);

                        const rand = Math.random();
                        if (rand < 0.3) mushrooms.push({ x: b.x + 5, y: b.y - 30, width: 26, height: 26, vy: -3 });
                        else if (rand < 0.6) shields.push({ x: b.x + 18, y: b.y - 25 });
                        else {
                            fireAmmo += 3;
                            document.getElementById('fireVal').innerText = `🔥 ${fireAmmo}`;
                            createFloatingText(b.x, b.y - 20, '+3 FIRE!', '#ff7b00');
                        }
                    }
                }
            }

            // 蘑菇怪碰撞
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const obs = obstacles[i];
                if (freezeTimer <= 0) obs.x -= 0.5;

                if (mario.x < obs.x + obs.width - 6 && mario.x + mario.width - 6 > obs.x &&
                    mario.y < obs.y + obs.height - 6 && mario.y + mario.height > obs.y
                ) {
                    // 踩踏，或下砸爆破
                    if (mario.vy > 0 && mario.y + mario.height - mario.vy <= obs.y + 12) {
                        obstacles.splice(i, 1);
                        mario.vy = mario.jumpPower * 0.85;
                        score += 200;
                        createParticles(obs.x + 20, obs.y + 20, '#00f0ff', 12);
                    } else if (isInvincible || isDashing || freezeTimer > 0 || mario.isGroundPounding) {
                        obstacles.splice(i, 1);
                        score += 300;
                        createParticles(obs.x + 20, obs.y + 20, '#ffcd00', 20);
                    } else if (mario.hasShield) { // 【新玩法4】护盾抵挡
                        obstacles.splice(i, 1);
                        mario.hasShield = false;
                        createFloatingText(mario.x, mario.y - 20, 'SHIELD LOST', '#00f0ff');
                    } else if (mario.isBig) {
                        obstacles.splice(i, 1);
                        mario.isBig = false;
                        mario.width = mario.baseWidth;
                        mario.height = mario.baseHeight;
                        createFloatingText(mario.x, mario.y - 20, 'MINI MARIO', '#ff2a5f');
                    } else {
                        triggerGameOver();
                    }
                }
            }

            // 金币逻辑
            for (let i = coinItems.length - 1; i >= 0; i--) {
                const coin = coinItems[i];
                coin.rotation += 0.1;

                const dx = (mario.x + mario.width / 2) - coin.x;
                const dy = (mario.y + mario.height / 2) - coin.y;
                if (Math.sqrt(dx * dx + dy * dy) < mario.width / 2 + coin.size) {
                    coinItems.splice(i, 1);
                    coins++; score += 100;
                    createParticles(coin.x, coin.y, '#ffcd00', 6);

                    if (starEnergy < 100) {
                        starEnergy = Math.min(100, starEnergy + 10);
                        document.getElementById('powerFill').style.width = starEnergy + '%';
                    }
                }
            }

            // 粒子与文字
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i]; p.x += p.vx; p.y += p.vy; p.alpha -= 0.04;
                if (p.alpha <= 0) particles.splice(i, 1);
            }
            for (let i = floatingTexts.length - 1; i >= 0; i--) {
                const ft = floatingTexts[i]; ft.y -= 1.2; ft.alpha -= 0.025;
                if (ft.alpha <= 0) floatingTexts.splice(i, 1);
            }

            spawnEntities();
            score += Math.floor(Math.abs(mario.vx) * 0.2);
            document.getElementById('scoreVal').innerText = String(score).padStart(5, '0');
            document.getElementById('coinVal').innerText = `🪙 ${coins}`;
        }

        function triggerGameOver() {
            gameOver = true;
            document.getElementById('finalStats').innerText = `最终得分: ${score} | 收集金币: ${coins}`;
            document.getElementById('gameOverScreen').classList.add('active');
        }

        // 渲染视口
        function draw() {
            ctx.fillStyle = '#0f1322';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-cameraX, 0);

            // 背景网格线
            ctx.strokeStyle = 'rgba(0, 240, 255, 0.05)';
            ctx.lineWidth = 1;
            for (let x = Math.floor(cameraX / 40) * 40; x < cameraX + canvas.width + 40; x += 40) {
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
            }

            // 科技地面
            ctx.fillStyle = '#161b2e';
            ctx.fillRect(cameraX - 100, groundY, canvas.width + 200, canvas.height - groundY);
            ctx.strokeStyle = freezeTimer > 0 ? '#00f0ff' : (isInvincible ? '#ff2a5f' : '#00f0ff');
            ctx.lineWidth = 3; 
            ctx.beginPath(); ctx.moveTo(cameraX - 100, groundY); ctx.lineTo(cameraX + canvas.width + 100, groundY); ctx.stroke();

            // 绘制【新玩法1】高空平台
            platforms.forEach(plat => {
                ctx.fillStyle = '#1e293b';
                ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
                ctx.strokeStyle = '#00f0ff';
                ctx.lineWidth = 2;
                ctx.strokeRect(plat.x, plat.y, plat.width, plat.height);
            });

            // 绘制【新玩法2】管道
            pipes.forEach(pipe => {
                ctx.fillStyle = '#059669';
                ctx.fillRect(pipe.x, pipe.y, pipe.width, pipe.height);
                ctx.fillStyle = '#10b981';
                ctx.fillRect(pipe.x - 4, pipe.y, pipe.width + 8, 15); // 管道口
            });

            // 绘制【新玩法2】食人花
            piranhaPlants.forEach(p => {
                ctx.fillStyle = '#ff2a5f';
                ctx.beginPath(); ctx.arc(p.x + p.width / 2, p.y + 10, 12, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#fff'; // 尖牙
                ctx.fillRect(p.x + 4, p.y + 8, 4, 6); ctx.fillRect(p.x + 16, p.y + 8, 4, 6);
            });

            // 绘制【新玩法3】震地冲击波
            shockwaves.forEach(sw => {
                ctx.strokeStyle = '#ffcd00';
                ctx.lineWidth = 4;
                ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.radius, 0, Math.PI * 2); ctx.stroke();
            });

            // 火球
            fireballs.forEach(f => {
                ctx.fillStyle = '#ff7b00';
                ctx.beginPath(); ctx.arc(f.x, f.y, 7, 0, Math.PI * 2); ctx.fill();
            });

            // 问号砖块
            blocks.forEach(b => {
                ctx.fillStyle = b.hit ? '#334155' : '#ffcd00';
                ctx.fillRect(b.x, b.y, b.width, b.height);
                ctx.fillStyle = '#000'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center';
                ctx.fillText(b.hit ? '•' : '?', b.x + b.width / 2, b.y + 25);
            });

            // 【新玩法4】护盾道具
            shields.forEach(s => {
                ctx.fillStyle = '#00f0ff';
                ctx.beginPath(); ctx.arc(s.x, s.y, 10, 0, Math.PI * 2); ctx.fill();
            });

            // 冰霜晶体
            freezeCrystals.forEach(fc => {
                ctx.fillStyle = '#00f0ff';
                ctx.beginPath(); ctx.arc(fc.x, fc.y, fc.size, 0, Math.PI * 2); ctx.fill();
            });

            // 低重力气球
            balloons.forEach(b => {
                ctx.fillStyle = '#ff2a5f';
                ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2); ctx.fill();
            });

            // 马里奥主体绘制
            let sprite = !mario.grounded ? 'mario-jump' : ((Math.floor(frameCount / 7) % 2 === 0) ? 'mario-run1' : 'mario-run2');
            ctx.save();
            if (isInvincible) { ctx.shadowColor = '#ff2a5f'; ctx.shadowBlur = 20; }
            if (isDashing) { ctx.shadowColor = '#00f0ff'; ctx.shadowBlur = 25; }

            // 【新玩法4】马里奥外围荧光护盾特效
            if (mario.hasShield) {
                ctx.strokeStyle = '#00f0ff';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(mario.x + mario.width / 2, mario.y + mario.height / 2, mario.width * 0.8, 0, Math.PI * 2);
                ctx.stroke();
            }

            // 【新玩法5】降落伞绘制
            if (mario.isParachuting) {
                ctx.fillStyle = '#ffcd00';
                ctx.beginPath();
                ctx.arc(mario.x + mario.width / 2, mario.y - 15, 25, Math.PI, 0);
                ctx.fill();
            }

            if (!mario.facingRight) {
                ctx.translate(mario.x + mario.width, mario.y);
                ctx.scale(-1, 1);
                if (svgSprites[sprite]) ctx.drawImage(svgSprites[sprite], 0, 0, mario.width, mario.height);
            } else {
                if (svgSprites[sprite]) ctx.drawImage(svgSprites[sprite], mario.x, mario.y, mario.width, mario.height);
            }
            ctx.restore();

            // 蘑菇怪
            obstacles.forEach(obs => {
                if (svgSprites['enemy-goomba']) ctx.drawImage(svgSprites['enemy-goomba'], obs.x, obs.y, obs.width, obs.height);
            });

            // 金币
            coinItems.forEach(coin => {
                ctx.save();
                ctx.translate(coin.x, coin.y);
                ctx.scale(Math.sin(coin.rotation), 1);
                ctx.fillStyle = '#ffcd00'; ctx.beginPath(); ctx.arc(0, 0, coin.size, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            });

            // 粒子与文字
            particles.forEach(p => {
                ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
            });
            ctx.globalAlpha = 1.0;

            floatingTexts.forEach(ft => {
                ctx.fillStyle = ft.color; ctx.globalAlpha = ft.alpha;
                ctx.font = 'bold 15px monospace'; ctx.fillText(ft.text, ft.x, ft.y);
            });
            ctx.globalAlpha = 1.0;

            ctx.restore();
        }

        function gameLoop() {
            update(); draw();
            if (!gameOver) requestAnimationFrame(gameLoop);
        }

        setTimeout(gameLoop, 200);
    </script>
</body>
</html>
