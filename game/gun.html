<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js FPS 游戏（爆头机制版）</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
            user-select: none;
        }
        /* 准星 */
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            width: 10px; height: 10px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 2;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { top: 4px; left: -10px; width: 30px; height: 2px; }
        #crosshair::after { top: -10px; left: 4px; width: 2px; height: 30px; }

        /* 游戏 UI 容器 */
        #ui-container {
            position: absolute;
            top: 20px; left: 20px;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 2;
        }
        #score-board { margin-bottom: 10px; }
        
        /* 爆头提示特效文字 */
        #headshot-alert {
            position: absolute;
            top: 30%; left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            color: #ffcc00;
            font-size: 48px;
            font-weight: 900;
            font-style: italic;
            text-shadow: 0 0 10px #ff3300, 3px 3px 0 #000;
            opacity: 0;
            pointer-events: none;
            transition: all 0.1s ease-out;
            z-index: 3;
        }

        /* 玩家血条 UI */
        .hp-bar-container {
            width: 200px; height: 20px;
            background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid white;
            border-radius: 5px;
            overflow: hidden;
        }
        #player-hp-bar {
            width: 100%; height: 100%;
            background-color: #ff3333;
            transition: width 0.1s ease;
        }

        /* 敌人头顶血条容器 */
        #enemy-health-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }
        .enemy-hp-container {
            position: absolute;
            width: 50px; height: 6px;
            background-color: rgba(0,0,0,0.6);
            border: 1px solid #000;
            transform: translate(-50%, -50%);
            display: none; 
        }
        .enemy-hp-fill {
            width: 100%; height: 100%;
            background-color: #00ff00;
        }

        /* 受击红幕提示 */
        #damage-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 0, 0, 0.4);
            opacity: 0; pointer-events: none;
            transition: opacity 0.1s ease-out;
            z-index: 5;
        }

        /* 开始/结束 提示界面 */
        #blocker {
            position: absolute;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            display: flex; justify-content: center; align-items: center;
            color: white; text-align: center;
            cursor: pointer; z-index: 10;
        }
        #instructions { font-size: 20px; }
        #instructions h1 { font-size: 48px; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <h1 id="menu-title">爆头训练战</h1>
            <p id="menu-sub">消灭全部 <span style="color:#ffcc00; font-weight:bold;">5</span> 个敌人。<br>提示：击中敌人上方的<span style="color:#ffcc00; font-weight:bold;">金色圆点</span>可直接秒杀（爆头）！<br><br>点击屏幕开始游戏</p>
            <br>
            <p style="font-size: 16px; color: #aaa;">移动: WASD | 跳跃: 空格 | 射击: 鼠标左键</p>
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="headshot-alert">HEADSHOT!</div>
    
    <div id="ui-container">
        <div id="score-board">消灭敌人: <span id="score">0</span> / 5</div>
        <div style="font-size: 14px; margin-bottom: 3px;">玩家生命值</div>
        <div class="hp-bar-container">
            <div id="player-hp-bar"></div>
        </div>
    </div>

    <div id="enemy-health-layer"></div>
    
    <div id="damage-flash"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // --- 1. 基础场景设置 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xcccccc);
        scene.fog = new THREE.FogExp2(0xcccccc, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 2; 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 2. 灯光 ---
        const ambientLight = new THREE.AmbientLight(0x666666);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- 3. 地面与环境 ---
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // 墙壁
        const wallGeo = new THREE.BoxGeometry(4, 8, 4);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
        for(let i=0; i<15; i++) {
            const wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.set((Math.random() - 0.5) * 100, 4, (Math.random() - 0.5) * 100);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
        }

        // --- 4. 持枪视觉效果 ---
        const gunGroup = new THREE.Group();
        const gunBody = new THREE.Mesh(
            new THREE.BoxGeometry(0.1, 0.15, 0.5),
            new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 })
        );
        gunBody.position.set(0.2, -0.25, -0.5); 
        gunGroup.add(gunBody);
        camera.add(gunGroup); 
        scene.add(camera);

        // --- 5. 游戏状态变量 ---
        let playerHp = 100;
        let score = 0;
        const maxEnemies = 5; 
        let isGameEnded = false; 

        // --- 6. 敌人与敌方子弹系统 ---
        const enemyGroups = []; // 存放敌人Group的数组
        const shootableObjects = []; // 专门用来供射线检测（射线射击）的网格数组
        const enemyBullets = []; 

        const bodyGeo = new THREE.BoxGeometry(2, 2, 2);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff3333 });
        
        // 爆头点：金色球体几何体与材质
        const headGeo = new THREE.SphereGeometry(0.4, 16, 16);
        const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc00, metalness: 0.5, roughness: 0.1 });

        const bulletGeo = new THREE.SphereGeometry(0.2, 8, 8);
        const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 }); 

        const healthLayer = document.getElementById('enemy-health-layer');

        function spawnEnemy() {
            // 创建一个统一的敌人Group
            const enemyGroup = new THREE.Group();
            
            // 1. 创建身体
            const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat);
            bodyMesh.position.y = 1; // 离地高度
            bodyMesh.castShadow = true;
            enemyGroup.add(bodyMesh);

            // 2. 创建头部圆点（爆头点）
            const headMesh = new THREE.Mesh(headGeo, headMat);
            headMesh.position.set(0, 2.3, 0); // 在身体的正上方一点
            headMesh.castShadow = true;
            enemyGroup.add(headMesh);

            // 随机设置敌人的初始地面位置
            enemyGroup.position.set((Math.random() - 0.5) * 60, 0, (Math.random() - 0.5) * 60);
            
            // 创建 HTML 血条
            const hpContainer = document.createElement('div');
            hpContainer.className = 'enemy-hp-container';
            const hpFill = document.createElement('div');
            hpFill.className = 'enemy-hp-fill';
            hpContainer.appendChild(hpFill);
            healthLayer.appendChild(hpContainer);

            // 把重要的数据挂载到 Group 的 userData 上
            enemyGroup.userData = {
                maxHp: 3,
                hp: 3,          
                shootCooldown: Math.random() * 2 + 1,
                hpElement: hpContainer,
                hpFillElement: hpFill,
                body: bodyMesh,
                head: headMesh
            };

            // 建立反向引用，方便射线击中 Mesh 时找到它所属的父级 Group，并知道击中了哪
            bodyMesh.userData = { parentGroup: enemyGroup, isHead: false };
            headMesh.userData = { parentGroup: enemyGroup, isHead: true };

            // 将身体和头部扔进检测池
            shootableObjects.push(bodyMesh, headMesh);

            scene.add(enemyGroup);
            enemyGroups.push(enemyGroup);
        }
        
        for(let i = 0; i < maxEnemies; i++) { spawnEnemy(); }

        // --- 7. 控制器与运动 ---
        const controls = new THREE.PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');
        const menuTitle = document.getElementById('menu-title');
        const menuSub = document.getElementById('menu-sub');
        const damageFlash = document.getElementById('damage-flash');
        const playerHpBar = document.getElementById('player-hp-bar');
        const headshotAlert = document.getElementById('headshot-alert');

        blocker.addEventListener('click', () => { 
            if(!isGameEnded) controls.lock(); 
        });
        controls.addEventListener('lock', () => { blocker.style.display = 'none'; });
        controls.addEventListener('unlock', () => { if(!isGameEnded) blocker.style.display = 'flex'; });

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let canJump = false;
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        const onKeyDown = (event) => {
            switch (event.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space':
                    if (canJump === true) velocity.y += 11; 
                    canJump = false;
                    break;
            }
        };

        const onKeyUp = (event) => {
            switch (event.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyD': moveRight = false; break;
            }
        };
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // 显示爆头视觉特效
        function showHeadshotUI() {
            headshotAlert.style.opacity = '1';
            headshotAlert.style.transform = 'translate(-50%, -50%) scale(1.2)';
            setTimeout(() => {
                headshotAlert.style.opacity = '0';
                headshotAlert.style.transform = 'translate(-50%, -50%) scale(0.5)';
            }, 600);
        }

        // --- 8. 玩家射击与爆头判定逻辑 ---
        const raycaster = new THREE.Raycaster();
        const mouseCenter = new THREE.Vector2(0, 0); 

        document.addEventListener('mousedown', (event) => {
            if (!controls.isLocked || event.button !== 0 || isGameEnded) return;

            // 开火动画
            gunBody.position.z += 0.1;
            setTimeout(() => { gunBody.position.z -= 0.1; }, 50);

            raycaster.setFromCamera(mouseCenter, camera);
            // 射线检测射击池中的所有身体和头部
            const intersects = raycaster.intersectObjects(shootableObjects);

            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                const targetGroup = hitMesh.userData.parentGroup;
                const isHeadshot = hitMesh.userData.isHead;

                if (isHeadshot) {
                    // 1. 【爆头机制】：血量直接归零
                    targetGroup.userData.hp = 0;
                    showHeadshotUI();
                } else {
                    // 2. 击中身体：正常扣血
                    targetGroup.userData.hp--;
                    const hpPercent = (targetGroup.userData.hp / targetGroup.userData.maxHp) * 100;
                    targetGroup.userData.hpFillElement.style.width = hpPercent + '%';
                }

                // 检查敌人是否死亡
                if (targetGroup.userData.hp <= 0) {
                    // 销毁血条 DOM
                    if(targetGroup.userData.hpElement) targetGroup.userData.hpElement.remove();
                    
                    // 从射线检测池中移除该敌人的各个部件
                    const bIdx = shootableObjects.indexOf(targetGroup.userData.body);
                    if(bIdx > -1) shootableObjects.splice(bIdx, 1);
                    const hIdx = shootableObjects.indexOf(targetGroup.userData.head);
                    if(hIdx > -1) shootableObjects.splice(hIdx, 1);

                    // 从场景中彻底移除 Group
                    scene.remove(targetGroup);
                    const gIdx = enemyGroups.indexOf(targetGroup);
                    if (gIdx > -1) enemyGroups.splice(gIdx, 1);

                    score++;
                    document.getElementById('score').innerText = score;
                    
                    // 胜利判定
                    if (score >= maxEnemies) {
                        triggerGameWin();
                    }
                }
            }
        });

        // 玩家受击
        function takeDamage(amount) {
            if(isGameEnded) return;
            playerHp -= amount;
            if(playerHp < 0) playerHp = 0;
            
            playerHpBar.style.width = playerHp + '%';
            
            damageFlash.style.opacity = '1';
            setTimeout(() => { damageFlash.style.opacity = '0'; }, 100);

            if(playerHp <= 0) {
                triggerGameOver();
            }
        }

        function triggerGameOver() {
            isGameEnded = true;
            controls.unlock();
            blocker.style.display = 'flex';
            menuTitle.innerText = "游戏结束";
            menuTitle.style.color = "#ff3333";
            menuSub.innerHTML = `你被打败了！别气馁，瞄准金色圆点可以一枪秒杀！<br>最终战绩: 消灭了 ${score} / 5 个敌人<br><br><span style="color:#fff; font-size:16px;">刷新网页可重新挑战</span>`;
        }

        function triggerGameWin() {
            isGameEnded = true;
            controls.unlock();
            blocker.style.display = 'flex';
            menuTitle.innerText = "游戏胜利！";
            menuTitle.style.color = "#00ff00";
            menuSub.innerHTML = `枪神降临！你成功清空了战场！<br><br><span style="color:#fff; font-size:16px;">刷新网页可以再玩一次</span>`;
            
            enemyBullets.forEach(bullet => scene.remove(bullet));
            enemyBullets.length = 0;
        }

        // --- 9. 游戏主循环动画 ---
        const clock = new THREE.Clock();
        const tempV = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked && !isGameEnded) {
                const delta = clock.getDelta(); 

                // 1. 运动物理计算
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 3.5 * delta; 

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); 

                const speed = 40.0;
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                controls.getObject().position.y += (velocity.y * delta);

                if (controls.getObject().position.y < 2) {
                    velocity.y = 0;
                    controls.getObject().position.y = 2;
                    canJump = true; 
                }

                const playerPos = controls.getObject().position;

                // 2. 敌人Group AI与血条同步
                enemyGroups.forEach(enemyGroup => {
                    // 让整个 Group（连带身体和头部）一同面朝并追踪玩家
                    enemyGroup.lookAt(playerPos.x, enemyGroup.position.y, playerPos.z);
                    enemyGroup.translateZ(2.0 * delta); 

                    // 血条坐标转换 (挂载在金色头部正上方)
                    tempV.copy(enemyGroup.position);
                    tempV.y += 2.8; 
                    tempV.project(camera); 

                    if (tempV.z <= 1) {
                        const x = (tempV.x * .5 + .5) * window.innerWidth;
                        const y = (tempV.y * -.5 + .5) * window.innerHeight;
                        
                        enemyGroup.userData.hpElement.style.display = 'block';
                        enemyGroup.userData.hpElement.style.left = `${x}px`;
                        enemyGroup.userData.hpElement.style.top = `${y}px`;
                    } else {
                        enemyGroup.userData.hpElement.style.display = 'none';
                    }

                    // 敌人射击逻辑
                    enemyGroup.userData.shootCooldown -= delta;
                    if (enemyGroup.userData.shootCooldown <= 0) {
                        const bullet = new THREE.Mesh(bulletGeo, bulletMat);
                        // 从敌人的金色头部附近发射
                        bullet.position.set(enemyGroup.position.x, enemyGroup.position.y + 2.3, enemyGroup.position.z);
                        
                        const dir = new THREE.Vector3();
                        dir.subVectors(playerPos, bullet.position).normalize();
                        
                        bullet.userData = { direction: dir, lifeTime: 4.0 }; 
                        scene.add(bullet);
                        enemyBullets.push(bullet);

                        enemyGroup.userData.shootCooldown = Math.random() * 1 + 2.5; 
                    }
                });

                // 3. 子弹更新与伤害判定
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    const bullet = enemyBullets[i];
                    const bulletSpeed = 25.0; 
                    bullet.position.addScaledVector(bullet.userData.direction, bulletSpeed * delta);
                    bullet.userData.lifeTime -= delta;

                    const distance = bullet.position.distanceTo(playerPos);
                    
                    if (distance < 1.2) { 
                        takeDamage(20); 
                        scene.remove(bullet);
                        enemyBullets.splice(i, 1);
                        continue;
                    }

                    if (bullet.userData.lifeTime <= 0) {
                        scene.remove(bullet);
                        enemyBullets.splice(i, 1);
                    }
                }
            } else {
                enemyGroups.forEach(group => {
                    if(group.userData.hpElement) group.userData.hpElement.style.display = 'none';
                });
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
