<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炫酷可爱糖果魔方 ✨</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #2c1654 0%, #0b051d 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
        /* 简单的UI提示 */
        #hint {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #ff94c2;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 148, 194, 0.6);
            pointer-events: none;
            user-select: none;
            animation: breathe 2s infinite ease-in-out;
        }
        @keyframes breathe {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="hint">✨ 拖动鼠标旋转视角，一起玩转糖果魔方吧！ ✨</div>
    <div id="canvas-container"></div>

    <script>
        // --- 1. 初始化场景、相机和渲染器 ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // 相机
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 6, 9);

        // 渲染器 (开启抗锯齿)
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        container.appendChild(renderer.domElement);

        // 控制器
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 5;
        controls.maxDistance = 20;

        // --- 2. 灯光设置 (打造粉嫩可爱的关键) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7); // 环境光
        scene.add(ambientLight);

        const dirLight1 = new THREE.DirectionalLight(0xffe5ec, 0.8); // 主方向光（偏粉白）
        dirLight1.position.set(5, 10, 7);
        scene.add(dirLight1);

        const dirLight2 = new THREE.DirectionalLight(0xd8f3dc, 0.5); // 辅助光（淡绿，增加色彩层次）
        dirLight2.position.set(-5, -5, -5);
        scene.add(dirLight2);

        // --- 3. 创建炫酷粒子背景 ---
        const particlesGeometry = new THREE.BufferGeometry();
        const particlesCount = 200;
        const posArray = new Float32Array(particlesCount * 3);

        for(let i=0; i<particlesCount*3; i++) {
            posArray[i] = (Math.random() - 0.5) * 25;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        
        // 粒子材质（星星点点）
        const particlesMaterial = new THREE.PointsMaterial({
            size: 0.15,
            color: 0xffb703,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending
        });
        const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
        scene.add(particlesMesh);

        // --- 4. 生成魔方 (3x3x3) ---
        const cubeGroup = new THREE.Group();
        scene.add(cubeGroup);

        // 核心：魔方马卡龙配色方案
        const colors = {
            right:  0xff7096, // 粉红 (R)
            left:   0xffbeb2, // 浅粉橙 (L)
            top:    0x98f5e1, // 薄荷绿 (U)
            bottom: 0xffe3e0, // 奶油白 (D)
            front:  0x70d6ff, // 天空蓝 (F)
            back:   0xe9c46a, // 柠檬黄 (B)
            inside: 0x432818  // 内部巧克力色（缝隙颜色）
        };

        // 为了让魔方“可爱”，我们不用硬邦邦的 BoxGeometry
        // 而是用 BoxGeometry 的分段 + 材质的 roughness 模拟圆润感（高版本可用 BoxLineGeometry，这里用标准立体调整）
        const cubeSize = 0.95; // 留出一点点缝隙
        const geometry = new THREE.BoxGeometry(cubeSize, cubeSize, cubeSize);

        // 创建方块的方法
        function createCubelet(x, y, z) {
            // 每一个方块有 6 个面
            const materials = [
                new THREE.MeshStandardMaterial({ color: (x === 1) ? colors.right : colors.inside, roughness: 0.3, metalness: 0.1 }),  // +X
                new THREE.MeshStandardMaterial({ color: (x === -1) ? colors.left : colors.inside, roughness: 0.3, metalness: 0.1 }), // -X
                new THREE.MeshStandardMaterial({ color: (y === 1) ? colors.top : colors.inside, roughness: 0.3, metalness: 0.1 }),   // +Y
                new THREE.MeshStandardMaterial({ color: (y === -1) ? colors.bottom : colors.inside, roughness: 0.3, metalness: 0.1 }),// -Y
                new THREE.MeshStandardMaterial({ color: (z === 1) ? colors.front : colors.inside, roughness: 0.3, metalness: 0.1 }), // +Z
                new THREE.MeshStandardMaterial({ color: (z === -1) ? colors.back : colors.inside, roughness: 0.3, metalness: 0.1 })  // -Z
            ];

            const mesh = new THREE.Mesh(geometry, materials);
            mesh.position.set(x, y, z);
            // 存储初始坐标，方便后续逻辑判断
            mesh.userData = { initialX: x, initialY: y, initialZ: z };
            return mesh;
        }

        // 堆叠出 3x3x3 的魔方
        const cubelets = [];
        for (let x = -1; x <= 1; x++) {
            for (let y = -1; y <= 1; y++) {
                for (let z = -1; z <= 1; z++) {
                    // 跳过中心完全隐蔽的方块（可选）
                    if (x === 0 && y === 0 && z === 0) continue;
                    const cubelet = createCubelet(x, y, z);
                    cubeGroup.add(cubelet);
                    cubelets.push(cubelet);
                }
            }
        }

        // --- 5. 自动随机炫酷旋转动画 (让魔方自己动起来) ---
        let isRotating = false;
        const axes = ['x', 'y', 'z'];
        const layers = [-1, 0, 1];

        function rotateRandomLayer() {
            if (isRotating) return;
            isRotating = true;

            // 随机选择轴、层和方向
            const randomAxis = axes[Math.floor(Math.random() * axes.length)];
            const randomLayer = layers[Math.floor(Math.random() * layers.length)];
            const randomAngle = Math.random() > 0.5 ? Math.PI / 2 : -Math.PI / 2;

            // 筛选出当前需要旋转的方块
            const activeCubelets = cubelets.filter(cubelet => {
                // 通过当前的绝对世界坐标来判断它属于哪一层
                const worldPosition = new THREE.Vector3();
                cubelet.getWorldPosition(worldPosition);
                
                // 允许微小的浮点数误差
                if (randomAxis === 'x') return Math.abs(worldPosition.x - randomLayer) < 0.1;
                if (randomAxis === 'y') return Math.abs(worldPosition.y - randomLayer) < 0.1;
                if (randomAxis === 'z') return Math.abs(worldPosition.z - randomLayer) < 0.1;
                return false;
            });

            // 创建一个临时旋转组
            const rotationGroup = new THREE.Group();
            scene.add(rotationGroup);

            // 将方块移入临时组（保持世界坐标不变）
            activeCubelets.forEach(cubelet => {
                rotationGroup.attach(cubelet);
            });

            // 动画参数
            const duration = 600; // 旋转时间 (毫秒)
            const startTime = performance.now();
            const startRotation = 0;

            function animateRotation(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // 缓动函数 (Cubic Ease Out 让动作更灵动可爱)
                const easeProgress = 1 - Math.pow(1 - progress, 3);

                // 应用旋转
                if (randomAxis === 'x') rotationGroup.rotation.x = randomAngle * easeProgress;
                if (randomAxis === 'y') rotationGroup.rotation.y = randomAngle * easeProgress;
                if (randomAxis === 'z') rotationGroup.rotation.z = randomAngle * easeProgress;

                if (progress < 1) {
                    requestAnimationFrame(animateRotation);
                } else {
                    // 动画结束，将方块还给原本的 cubeGroup，并释放临时组
                    activeCubelets.forEach(cubelet => {
                        cubeGroup.attach(cubelet);
                    });
                    scene.remove(rotationGroup);
                    isRotating = false;
                    
                    // 随机等待一段时间后进行下一次旋转
                    setTimeout(rotateRandomLayer, Math.random() * 1000 + 500);
                }
            }

            requestAnimationFrame(animateRotation);
        }

        // 2秒后启动自动乱序/演示动画
        setTimeout(rotateRandomLayer, 2000);


        // --- 6. 渲染循环与动态效果 ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();

            // 1. 轨道控制器更新
            controls.update();

            // 2. 整个魔方轻微地上下浮动和自转，显得有灵气
            if (!isRotating) {
                cubeGroup.rotation.y = Math.sin(elapsedTime * 0.2) * 0.2;
                cubeGroup.position.y = Math.sin(elapsedTime * 1.5) * 0.15;
            } else {
                cubeGroup.position.y = THREE.MathUtils.lerp(cubeGroup.position.y, 0, 0.1);
            }

            // 3. 背景粒子缓缓旋转
            particlesMesh.rotation.y = elapsedTime * 0.03;
            particlesMesh.rotation.x = Math.sin(elapsedTime * 0.05) * 0.1;

            renderer.render(scene, camera);
        }

        animate();

        // --- 7. 窗口大小自适应 ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
