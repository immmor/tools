<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI进化论：神经元之战</title>
    <style>
        :root {
            --bg-color: #0a0e17;
            --panel-color: #161f30;
            --accent-color: #00f2fe;
            --text-color: #e0e6ed;
            --card-bot: #ff2a74;
            --card-player: #00f2fe;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 游戏主容器（支持响应式横卡/竖屏适配） */
        #game-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            padding: 10px;
            position: relative;
        }

        /* 顶部状态栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-content: center;
            background: var(--panel-color);
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
        }

        .hp-bar { color: #ff4757; font-weight: bold; }
        .energy-bar { color: #eccc68; font-weight: bold; }

        /* 战场区域 */
        #battlefield {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 15px 0;
            position: relative;
        }

        .battle-zone {
            width: 100%;
            height: 120px;
            border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: rgba(255,255,255,0.02);
            transition: all 0.3s;
        }

        .battle-zone.active {
            border-color: var(--accent-color);
            background: rgba(0, 242, 254, 0.05);
        }

        /* 卡牌样式 */
        .card {
            width: 80px;
            height: 110px;
            background: #1e293b;
            border: 2px solid #475569;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 8px;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            touch-action: none;
        }

        @media (min-width: 600px) {
            .card { width: 100px; height: 140px; padding: 12px; }
        }

        .card.selected {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-color);
            transform: translateY(-10px);
        }

        .card-name {
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        @media (min-width: 600px) { .card-name { font-size: 13px; } }

        .card-props {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-weight: bold;
        }
        @media (min-width: 600px) { .card-props { font-size: 12px; } }

        .cost { color: #eccc68; }
        .atk { color: #ff4757; }
        .def { color: #2ed573; }

        /* 玩家手牌区 */
        #hand-container {
            background: var(--panel-color);
            padding: 12px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .hand-label {
            font-size: 12px;
            color: #8a99ad;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        #hand {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
            min-height: 125px;
            align-items: flex-end;
        }
        @media (min-width: 600px) { #hand { min-height: 155px; } }

        /* 控制按钮 */
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            flex: 1;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            color: #000;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.8; }
        button:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
        button.btn-alt { background: linear-gradient(135deg, #ff0844, #ffb199); color: white;}

        /* 浮层提示（伤害数值等） */
        .log-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.85);
            padding: 15px 25px;
            border-radius: 20px;
            border: 1px solid var(--accent-color);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
            text-align: center;
            font-weight: bold;
        }
        .log-overlay.show { opacity: 1; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="status-bar">
            <span>🤖 AI 母体 (Level <span id="bot-lvl">1</span>)</span>
            <span class="hp-bar">HP: <span id="bot-hp">50</span>/50</span>
        </div>

        <div id="battlefield">
            <div class="battle-zone" id="bot-zone"></div>
            
            <div class="log-overlay" id="game-log">回合开始</div>

            <div class="battle-zone" id="player-zone">
                <span style="color:#475569; font-size:12px; position:absolute;">点击手牌上阵或融合</span>
            </div>
        </div>

        <div id="hand-container">
            <div class="status-bar" style="margin-bottom: 10px; background: rgba(0,0,0,0.2);">
                <span>👤 人类反抗军</span>
                <span class="energy-bar">计算力(🔋): <span id="player-energy">3</span>/3</span>
                <span class="hp-bar">HP: <span id="player-hp">50</span>/50</span>
            </div>
            
            <div class="hand-label">
                <span>我的手牌</span>
                <span style="color: var(--accent-color)">选择2张牌可激活【AI融合】</span>
            </div>
            <div id="hand"></div>

            <div class="btn-group">
                <button id="fuse-btn" disabled onclick="fuseCards()">🧬 AI 融合进化</button>
                <button id="end-turn-btn" class="btn-alt" onclick="endTurn()">📡 终端运行 (回合结束)</button>
            </div>
        </div>
    </div>

    <script>
        // 基础卡池数据库（用于随机和融合）
        const BASE_CARDS = [
            { name: "数据爬虫", cost: 1, atk: 3, def: 2 },
            { name: "防火墙", cost: 1, atk: 1, def: 5 },
            { name: "线性回归", cost: 2, atk: 5, def: 3 },
            { name: "随机森林", cost: 2, atk: 4, def: 6 },
            { name: "梯度下降", cost: 3, atk: 8, def: 2 }
        ];

        const PREFIXES = ["量子", "超频", "深层", "暗网", "赛博", "神经"];
        const SUFFIXES = ["矩阵", "协议", "霸权", "节点", "风暴", "遗客"];

        // 游戏状态
        let gameState = {
            player: { hp: 50, maxEnergy: 3, energy: 3, hand: [], field: null },
            bot: { hp: 50, level: 1, field: null },
            selectedCards: []
        };

        // 初始化游戏
        function initGame() {
            // 初始抽4张牌
            for(let i=0; i<4; i++) {
                gameState.player.hand.push(getRandomCard());
            }
            updateUI();
            botTurn(); // 敌方先占场
        }

        // 随机获取基础卡
        function getRandomCard() {
            const template = BASE_CARDS[Math.floor(Math.random() * BASE_CARDS.length)];
            return { ...template, id: Math.random().toString(36).substr(2, 9) };
        }

        // 渲染更新UI
        function updateUI() {
            // 更新数值
            document.getElementById('player-hp').innerText = gameState.player.hp;
            document.getElementById('player-energy').innerText = gameState.player.energy;
            document.getElementById('bot-hp').innerText = gameState.bot.hp;
            document.getElementById('bot-lvl').innerText = gameState.bot.level;

            // 渲染手牌
            const handDiv = document.getElementById('hand');
            handDiv.innerHTML = '';
            gameState.player.hand.forEach(card => {
                const cardEl = createCardElement(card, true);
                if (gameState.selectedCards.includes(card.id)) {
                    cardEl.classList.add('selected');
                }
                handDiv.appendChild(cardEl);
            });

            // 渲染玩家战场
            const pZone = document.getElementById('player-zone');
            pZone.innerHTML = '';
            if(gameState.player.field) {
                pZone.appendChild(createCardElement(gameState.player.field, false, 'player'));
            } else {
                pZone.innerHTML = `<span style="color:#475569; font-size:12px;">点击手牌召唤上阵</span>`;
            }

            // 渲染敌方战场
            const bZone = document.getElementById('bot-zone');
            bZone.innerHTML = '';
            if(gameState.bot.field) {
                bZone.appendChild(createCardElement(gameState.bot.field, false, 'bot'));
            } else {
                bZone.innerHTML = `<span style="color:#475569; font-size:12px;">空机位</span>`;
            }

            // 控制融合按钮状态
            document.getElementById('fuse-btn').disabled = gameState.selectedCards.length !== 2;
        }

        // 创建卡牌HTML节点
        function createCardElement(card, isHand = false, owner = '') {
            const div = document.createElement('div');
            div.className = 'card';
            if(owner === 'bot') div.style.borderColor = 'var(--card-bot)';
            if(owner === 'player') div.style.borderColor = 'var(--card-player)';
            
            div.innerHTML = `
                <div class="card-props"><span class="cost">🔋${card.cost}</span></div>
                <div class="card-name">${card.name}</div>
                <div class="card-props">
                    <span class="atk">⚔️${card.atk}</span>
                    <span class="def">🛡️${card.def}</span>
                </div>
            `;

            if(isHand) {
                div.addEventListener('click', () => handleCardClick(card));
            }
            return div;
        }

        // 处理手牌点击（选中/召唤逻辑）
        function handleCardClick(card) {
            // 如果点击已经选中的卡，取消选中
            if (gameState.selectedCards.includes(card.id)) {
                gameState.selectedCards = gameState.selectedCards.filter(id => id !== card.id);
            } else {
                // 如果未选中，且当前选中少于2张
                if(gameState.selectedCards.length < 2) {
                    gameState.selectedCards.push(card.id);
                }
                // 如果点击第3张，或者只想单张召唤：当选中1张时，再次点击其他卡可以走单卡出牌逻辑
                if(gameState.selectedCards.length === 1 && gameState.player.energy >= card.cost) {
                    // 这里我们设定：短按单选是准备融合，双击或者特定逻辑是出牌。
                    // 为了手机端体验简化：如果足够能量且战场为空，直接点击可以出牌；想融合就点两张。
                }
            }

            // 特殊快捷操作：如果只选了一张，且战场为空，允许单卡直接上阵
            if(gameState.selectedCards.length === 1) {
                const targetCard = gameState.player.hand.find(c => c.id === gameState.selectedCards[0]);
                if(!gameState.player.field && gameState.player.energy >= targetCard.cost) {
                    gameState.player.field = targetCard;
                    gameState.player.energy -= targetCard.cost;
                    gameState.player.hand = gameState.player.hand.filter(c => c.id !== targetCard.id);
                    gameState.selectedCards = [];
                    showLog(`部署了 [${targetCard.name}]`);
                }
            }

            updateUI();
        }

        // 核心创新点：AI 融合变异算法
        function fuseCards() {
            if(gameState.selectedCards.length !== 2) return;

            const card1 = gameState.player.hand.find(c => c.id === gameState.selectedCards[0]);
            const card2 = gameState.player.hand.find(c => c.id === gameState.selectedCards[1]);

            // 融合消耗：两张卡牌能耗的平均值（向上取整）
            const fuseCost = Math.ceil((card1.cost + card2.cost) / 2);

            if(gameState.player.energy < fuseCost) {
                showLog("⚡ 计算力不足以支持AI融合进化！");
                return;
            }

            // 属性变异逻辑 (融合后增强，并带有随机扰动)
            const newAtk = Math.round((card1.atk + card2.atk) * 0.8 + Math.random() * 3);
            const newDef = Math.round((card1.def + card2.def) * 0.8 + Math.random() * 3);
            
            // 名字随机生成组合，营造AI感
            const pfx = PREFIXES[Math.floor(Math.random() * PREFIXES.length)];
            const sfx = SUFFIXES[Math.floor(Math.random() * SUFFIXES.length)];
            const newName = `${pfx}·${card1.name.substring(0,2)}${card2.name.substring(0,2)}`;

            const evolvedCard = {
                id: Math.random().toString(36).substr(2, 9),
                name: newName,
                cost: fuseCost,
                atk: newAtk,
                def: newDef
            };

            // 从手牌移除旧卡，加入新卡并直接上阵（若战场空）
            gameState.player.hand = gameState.player.hand.filter(c => !gameState.selectedCards.includes(c.id));
            gameState.player.energy -= fuseCost;
            
            if(!gameState.player.field) {
                gameState.player.field = evolvedCard;
                showLog(`进化成功！诞生神级卡牌并上阵！`);
            } else {
                gameState.player.hand.push(evolvedCard);
                showLog(`进化成功！[${newName}] 已加入手牌`);
            }

            gameState.selectedCards = [];
            updateUI();
        }

        // AI对手的回合AI逻辑
        function botTurn() {
            if(!gameState.bot.field) {
                // 模拟AI从底层数据库进化出怪兽
                const level = gameState.bot.level;
                gameState.bot.field = {
                    name: `AI次世代·核芯 v${level}.0`,
                    cost: 0,
                    atk: 3 + level * 2,
                    def: 2 + level * 2
                };
            }
        }

        // 结束回合 & 战斗结算
        function endTurn() {
            let logMsg = "";
            
            // 战斗交火阶段
            if(gameState.player.field && gameState.bot.field) {
                // 都有卡牌，对撞
                const pCard = gameState.player.field;
                const bCard = gameState.bot.field;

                pCard.def -= bCard.atk;
                bCard.def -= pCard.atk;

                logMsg = `交火！双方卡牌对撞！`;

                if(pCard.def <= 0) gameState.player.field = null;
                if(bCard.def <= 0) gameState.bot.field = null;

            } else if(gameState.player.field && !gameState.bot.field) {
                // 玩家直接攻击AI
                gameState.bot.hp -= gameState.player.field.atk;
                logMsg = `直击母体！造成 ${gameState.player.field.atk} 点伤害！`;
            } else if(!gameState.player.field && gameState.bot.field) {
                // AI直接攻击玩家
                gameState.player.hp -= gameState.bot.field.atk;
                logMsg = `警告！母体攻破防线，收到 ${gameState.bot.field.atk} 点伤害！`;
            } else {
                logMsg = `静默回合，数据流平稳。`;
            }

            // 检查输赢
            if(gameState.player.hp <= 0) {
                alert("💻 阵线失守，人类文明被AI格式化。游戏结束！");
                location.reload();
                return;
            }
            if(gameState.bot.hp <= 0) {
                alert("🎉 成功阻断AI母体！人类赢得了暂时的和平！");
                location.reload();
                return;
            }

            // 进入下一回合准备
            gameState.player.maxEnergy = Math.min(gameState.player.maxEnergy + 1, 8); // 能量上限提高
            gameState.player.energy = gameState.player.maxEnergy;
            
            // 补牌
            if(gameState.player.hand.length < 5) {
                gameState.player.hand.push(getRandomCard());
            }

            // 提升AI等级
            gameState.bot.level++;
            botTurn();

            showLog(logMsg);
            updateUI();
        }

        // 弹出提示框
        function showLog(text) {
            const logEl = document.getElementById('game-log');
            logEl.innerText = text;
            logEl.classList.add('show');
            setTimeout(() => {
                logEl.classList.remove('show');
            }, 1800);
        }

        // 启动游戏
        initGame();
    </script>
</body>
</html>
