<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Three.js 简易 3D 汽车</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1a1a1a;
        }
        canvas {
            display: block;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<script>
    // 1. 创建场景、相机和渲染器
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(7, 5, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true; // 开启阴影
    document.body.appendChild(renderer.domElement);

    // 添加鼠标轨道控制
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    // 2. 添加光源
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
    dirLight.position.set(10, 20, 15);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 2048;
    dirLight.shadow.mapSize.height = 2048;
    scene.add(dirLight);

    // 3. 创建地面
    const floorGeo = new THREE.PlaneGeometry(50, 50);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    // 4. 构建汽车组合体
    const car = new THREE.Group();

    // 车身材质（亮红色）
    const bodyMaterial = new THREE.MeshStandardMaterial({ 
        color: 0xcc1111, 
        roughness: 0.2,
        metalness: 0.5 
    });
    // 车顶材质（深灰色/车窗感觉）
    const roofMaterial = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.5 });
    // 车轮材质
    const wheelMaterial = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.7 });
    // 车灯材质
    const lightMaterial = new THREE.MeshBasicMaterial({ color: 0xfffee0 });

    // --- 车身下半部分 ---
    const mainBodyGeo = new THREE.BoxGeometry(4, 1, 2);
    const mainBody = new THREE.Mesh(mainBodyGeo, bodyMaterial);
    mainBody.position.y = 0.8;
    mainBody.castShadow = true;
    car.add(mainBody);

    // --- 车顶舱 ---
    const roofGeo = new THREE.BoxGeometry(2.2, 0.8, 1.8);
    const roof = new THREE.Mesh(roofGeo, roofMaterial);
    roof.position.set(-0.2, 1.7, 0); // 稍微偏后一点
    roof.castShadow = true;
    car.add(roof);

    // --- 前大灯 ---
    const headlightGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.1, 16);
    headlightGeo.rotateZ(Math.PI / 2); // 旋转使其朝前
    
    const leftLight = new THREE.Mesh(headlightGeo, lightMaterial);
    leftLight.position.set(2, 0.8, 0.6);
    const rightLight = leftLight.clone();
    rightLight.position.z = -0.6;
    car.add(leftLight, rightLight);

    // --- 车轮创建函数 ---
    const wheels = [];
    function createWheel(x, z) {
        // 使用圆柱体制作车轮，多加一些分段使其更圆润
        const wheelGeo = new THREE.CylinderGeometry(0.5, 0.5, 0.4, 32);
        wheelGeo.rotateX(Math.PI / 2); // 旋转使车轮直立
        
        // 加上一点纹路细节（这里用一条内嵌线代替）
        const wheel = new THREE.Mesh(wheelGeo, wheelMaterial);
        wheel.position.set(x, 0.5, z);
        wheel.castShadow = true;
        
        car.add(wheel);
        wheels.push(wheel);
    }

    // 添加4个车轮 (前左、前右、后左、后右)
    createWheel(1.3, 1.1);
    createWheel(1.3, -1.1);
    createWheel(-1.3, 1.1);
    createWheel(-1.3, -1.1);

    // 将整辆车放入场景
    scene.add(car);

    // 5. 动画循环
    function animate() {
        requestAnimationFrame(animate);

        // 让车子在场景里自己转圈或者前后移动，这里我们让车轮自转，模拟汽车前进
        wheels.forEach(wheel => {
            wheel.rotation.z -= 0.05; // 车轮自转
        });

        // 顺便让整辆车绕着中心缓缓打转，方便360度观察
        car.rotation.y += 0.005;

        controls.update();
        renderer.render(scene, camera);
    }

    animate();

    // 6. 监听窗口大小改变
    window.addEventListener('resize', onWindowResize, false);
    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

</script>
</body>
</html>
