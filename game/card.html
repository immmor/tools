<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子纠缠 - 创新卡牌游戏</title>
    <style>
        :root {
            --bg-color: #0a0a16;
            --card-bg: #1a1a3a;
            --text-color: #e0e0ff;
            --accent-fire: #ff4757;
            --accent-water: #2ed573;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 游戏顶栏看板 */
        #scoreboard {
            display: flex;
            justify-content: space-between;
            width: 80%;
            margin-top: 20px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,255,255,0.1);
        }

        .score-box {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* 战场区域 */
        #battlefield {
            flex: 1;
            width: 80%;
            margin: 20px 0;
            border: 2px dashed #444;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle, #151530 0%, #0a0a16 100%);
        }

        #battlefield.drag-over {
            border-color: #00ffff;
            background: radial-gradient(circle, #1a2a4a 0%, #0a0a16 100%);
        }

        /* 提示语 */
        .placeholder-text {
            color: #666;
            font-size: 1.5rem;
            pointer-events: none;
        }

        /* 手牌区域 */
        #hand {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            height: 220px;
            justify-content: center;
            align-items: center;
        }

        /* 量子卡牌样式 */
        .card {
            width: 140px;
            height: 200px;
            background: var(--card-bg);
            border: 2px solid #444;
            border-radius: 12px;
            cursor: grab;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            box-sizing: border-box;
            user-select: none;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,255,255,0.2);
            border-color: #888;
        }

        /* 叠加态的双重属性显示 */
        .superposition {
            display: flex;
            flex-direction: column;
            height: 100%;
            justify-content: space-around;
            text-align: center;
        }

        .state-a { color: var(--accent-fire); font-weight: bold; }
        .state-b { color: var(--accent-water); font-weight: bold; }
        .divider { border-top: 1px dashed #555; margin: 5px 0; }

        /* 坍缩后的卡牌动画与样式 */
        .card.collapsed {
            animation: collapseAnim 0.4s ease-out;
            cursor: default;
            transform: none !important;
        }

        @keyframes collapseAnim {
            0% { transform: scale(1.2) rotateY(0deg); filter: brightness(2); }
            100% { transform: scale(1) rotateY(360deg); filter: brightness(1); }
        }

        .card.fire-collapsed { border-color: var(--accent-fire); box-shadow: 0 0 15px var(--accent-fire); }
        .card.water-collapsed { border-color: var(--accent-water); box-shadow: 0 0 15px var(--accent-water); }

        /* 游戏结束弹窗 */
        #game-over {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 10;
        }

        #game-over h1 { font-size: 3rem; color: #00ffff; margin-bottom: 20px; }
        #game-over button {
            padding: 10px 25px;
            font-size: 1.2rem;
            background: #00ffff;
            color: #000;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="scoreboard">
        <div class="score-box">玩家核心能量: <span id="player-hp">100</span></div>
        <div class="score-box" style="color: #00ffff;">当前纠缠倍率: <span id="multiplier">x1</span></div>
        <div class="score-box">量子裂缝稳定度: <span id="boss-hp">150</span></div>
    </div>

    <div id="battlefield">
        <div class="placeholder-text" id="battle-hint">拖拽量子卡牌至此，观测其最终形态</div>
    </div>

    <div id="hand"></div>

    <div id="game-over">
        <h1 id="game-result">你成功稳定了量子裂缝！</h1>
        <button onclick="initGame()">再次量子跃迁</button>
    </div>

    <script>
        // 游戏状态数据
        let gameState = {
            playerHp: 100,
            bossHp: 150,
            currentMultiplier: 1,
            lastCollapsedType: null, // 记录上一次坍缩的属性用于计算“纠缠连击”
            handSize: 4
        };

        // 预设卡牌可能的量子叠加态
        const cardPool = [
            { name: "微观粒子", a: { type: '火', val: 12 }, b: { type: '水', val: 15 } },
            { name: "薛定谔猫", a: { type: '火', val: 25 }, b: { type: '水', val: 5 } },
            { name: "光子跃迁", a: { type: '火', val: 8 },  b: { type: '水', val: 20 } },
            { name: "暗物质束", a: { type: '火', val: 18 }, b: { type: '水', val: 18 } }
        ];

        const battlefield = document.getElementById('battlefield');
        const handContainer = document.getElementById('hand');

        // 初始化/重置游戏
        function initGame() {
            gameState = { playerHp: 100, bossHp: 150, currentMultiplier: 1, lastCollapsedType: null, handSize: 4 };
            document.getElementById('game-over').style.display = 'none';
            battlefield.innerHTML = '<div class="placeholder-text" id="battle-hint">拖拽量子卡牌至此，观测其最终形态</div>';
            updateUI();
            dealHand();
        }

        // 更新界面数值
        function updateUI() {
            document.getElementById('player-hp').innerText = gameState.playerHp;
            document.getElementById('boss-hp').innerText = gameState.bossHp;
            document.getElementById('multiplier').innerText = `x${gameState.currentMultiplier}`;

            if(gameState.bossHp <= 0) {
                endGame(true);
            } else if(gameState.playerHp <= 0 || (handContainer.children.length === 0 && gameState.bossHp > 0)) {
                // 如果手牌用尽且没击败BOSS，扣除剩余裂缝值的反噬能量
                gameState.playerHp -= 20;
                document.getElementById('player-hp').innerText = Math.max(0, gameState.playerHp);
                if(gameState.playerHp <= 0) endGame(false);
                else dealHand(); // 补牌
            }
        }

        // 发牌
        function dealHand() {
            handContainer.innerHTML = '';
            for (let i = 0; i < gameState.handSize; i++) {
                const randomTemplate = cardPool[Math.floor(Math.random() * cardPool.length)];
                const cardEl = createCardElement(randomTemplate);
                handContainer.appendChild(cardEl);
            }
        }

        // 创建卡牌DOM并绑定拖拽事件
        function createCardElement(template) {
            const card = document.createElement('div');
            card.className = 'card';
            card.draggable = true;
            
            // 将量子数据绑定在DOM上
            card.dataset.cardData = JSON.stringify(template);

            card.innerHTML = `
                <div style="font-size:0.8rem; color:#aaa; text-align:center;">${template.name}</div>
                <div class="superposition">
                    <div class="state-a">【🔥 炽火】<br>伤害 +${template.a.val}</div>
                    <div class="divider">或 (概率叠加)</div>
                    <div class="state-b">【💧 潮汐】<br>治愈 +${template.b.val}</div>
                </div>
                <div style="font-size:0.6rem; color:#666; text-align:center;">未观测态</div>
            `;

            // 拖拽开始
            card.addEventListener('dragstart', (e) => {
                e.dataTransfer.setData('text/plain', card.dataset.cardData);
                // 延时隐藏手牌中的本体，形成拖拽空气感
                setTimeout(() => card.style.opacity = '0.4', 0);
                window.draggedCardRef = card; // 临时保存引用以便移除
            });

            card.addEventListener('dragend', () => {
                card.style.opacity = '1';
            });

            return card;
        }

        // 战场拖拽监听
        battlefield.addEventListener('dragover', (e) => {
            e.preventDefault();
            battlefield.classList.add('drag-over');
        });

        battlefield.addEventListener('dragleave', () => {
            battlefield.classList.remove('drag-over');
        });

        battlefield.addEventListener('drop', (e) => {
            e.preventDefault();
            battlefield.classList.remove('drag-over');
            
            const dataStr = e.dataTransfer.getData('text/plain');
            if (!dataStr) return;
            const cardData = JSON.parse(dataStr);

            // 移除提示文字或老卡牌
            battlefield.innerHTML = '';

            // 在战场生成坍缩中的卡牌
            const collapsedCard = document.createElement('div');
            collapsedCard.className = 'card collapsed';
            battlefield.appendChild(collapsedCard);

            // 核心：量子坍缩逻辑（50%几率触发A或B形态）
            const isStateA = Math.random() < 0.5;
            const finalState = isStateA ? { type: '火', val: cardData.a.val } : { type: '水', val: cardData.b.val };

            // 计算量子纠缠连击
            if (gameState.lastCollapsedType === finalState.type) {
                gameState.currentMultiplier += 1; // 连续观测到同属性，纠缠强化
            } else {
                gameState.currentMultiplier = 1;  // 属性改变，波函数退相干，倍率重置
            }
            gameState.lastCollapsedType = finalState.type;

            // 结算数值影响
            const finalValue = finalState.val * gameState.currentMultiplier;
            if (finalState.type === '火') {
                gameState.bossHp = Math.max(0, gameState.bossHp - finalValue);
                collapsedCard.classList.add('fire-collapsed');
                collapsedCard.innerHTML = `
                    <div style="text-align:center;font-weight:bold;">观测结果</div>
                    <div style="font-size: 2.5rem; text-align:center; color:var(--accent-fire)">🔥</div>
                    <div style="text-align:center; color:var(--accent-fire)">量子火炮爆发！<br>造成 ${finalValue} 伤害</div>
                `;
            } else {
                gameState.playerHp = Math.min(100, gameState.playerHp + finalValue);
                collapsedCard.classList.add('water-collapsed');
                collapsedCard.innerHTML = `
                    <div style="text-align:center;font-weight:bold;">观测结果</div>
                    <div style="font-size: 2.5rem; text-align:center; color:var(--accent-water)">💧</div>
                    <div style="text-align:center; color:var(--accent-water)">能量逆熵修复！<br>恢复 ${finalValue} 生命</div>
                `;
            }

            // 移除手牌中的那张卡
            if (window.draggedCardRef) {
                window.draggedCardRef.remove();
                window.draggedCardRef = null;
            }

            // 更新游戏全局状态
            updateUI();
        });

        // 游戏结束判定
        function endGame(isWin) {
            const screen = document.getElementById('game-over');
            const title = document.getElementById('game-result');
            if (isWin) {
                title.innerText = "🎉 成功！你稳定了量子裂缝！";
                title.style.color = "#2ed573";
            } else {
                title.innerText = "❌ 失败！时空遭遇量子湮灭！";
                title.style.color = "#ff4757";
            }
            screen.style.display = 'flex';
        }

        // 启动游戏
        initGame();
    </script>
</body>
</html>
