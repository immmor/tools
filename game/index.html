<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Three.js FPS 游戏（支持手机双端自适应）</title>
    <style>
        body {
            margin: 0; overflow: hidden; background-color: #000;
            font-family: sans-serif; user-select: none;
            -webkit-user-select: none; touch-action: none;
        }
        /* 准星 */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 2;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { top: 4px; left: -10px; width: 30px; height: 2px; }
        #crosshair::after { top: -10px; left: 4px; width: 2px; height: 30px; }

        /* 游戏 UI 容器 */
        #ui-container {
            position: absolute; top: 20px; left: 20px;
            color: white; font-size: 18px; font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 2;
        }
        #score-board { margin-bottom: 5px; }
        
        /* 玩家血条 */
        .hp-bar-container {
            width: 150px; height: 15px; background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid white; border-radius: 5px; overflow: hidden;
        }
        #player-hp-bar { width: 100%; height: 100%; background-color: #ff3333; transition: width 0.1s ease; }

        #headshot-alert {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            color: #ffcc00; font-size: 40px; font-weight: 900; font-style: italic;
            text-shadow: 0 0 10px #ff3300, 3px 3px 0 #000; opacity: 0; pointer-events: none; z-index: 3;
        }

        #enemy-health-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .enemy-hp-container { position: absolute; width: 45px; height: 5px; background-color: rgba(0,0,0,0.6); border: 1px solid #000; transform: translate(-50%, -50%); display: none; }
        .enemy-hp-fill { width: 100%; height: 100%; background-color: #00ff00; }

        #damage-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 0, 0, 0.4); opacity: 0; pointer-events: none; z-index: 5; }

        /* 开始/结束 提示界面 */
        #blocker {
            position: absolute; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85);
            display: flex; justify-content: center; align-items: center; color: white; text-align: center; z-index: 10;
        }
        #instructions { font-size: 18px; padding: 20px; }
        #instructions h1 { font-size: 36px; margin-bottom: 15px; }

        /* ================= 手机端独有虚拟触控 UI ================= */
        #mobile-ui {
            display: none; /* 默认隐藏，JS检测到移动端时开启 */
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 4;
        }
        /* 左摇杆底盘 */
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px; background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.4); border-radius: 50%;
            pointer-events: auto; touch-action: none;
        }
        /* 摇杆中心纽扣 */
        #joystick-knob {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px; background: rgba(255, 255, 255, 0.7);
            border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.05s linear;
        }
        /* 开火按钮 */
        #btn-fire {
            position: absolute; bottom: 50px; right: 140px;
            width: 75px; height: 75px; background: rgba(255, 0, 0, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.6); border-radius: 50%;
            color: white; font-weight: bold; font-size: 18px;
            display: flex; justify-content: center; align-items: center;
            pointer-events: auto; touch-action: none;
        }
        /* 跳跃按钮 */
        #btn-jump {
            position: absolute; bottom: 130px; right: 50px;
            width: 65px; height: 65px; background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.5); border-radius: 50%;
            color: white; font-weight: bold; font-size: 16px;
            display: flex; justify-content: center; align-items: center;
            pointer-events: auto; touch-action: none;
        }
        /* 换武器按钮 */
        #btn-weapon {
            position: absolute; bottom: 50px; right: 50px;
            width: 70px; height: 70px; background: rgba(0, 150, 255, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.6); border-radius: 50%;
            color: white; font-weight: bold; font-size: 14px;
            display: flex; justify-content: center; align-items: center;
            pointer-events: auto; touch-action: none;
        }
        /* 武器显示UI */
        #weapon-display {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            color: white; font-size: 24px; font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 2;
        }
        /* 弹夹显示UI */
        #ammo-display {
            position: absolute; bottom: 70px; left: 50%; transform: translateX(-50%);
            color: white; font-size: 20px; font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 2;
        }
        /* 手机端换弹按钮 */
        #btn-reload {
            position: absolute; bottom: 130px; right: 140px;
            width: 60px; height: 60px; background: rgba(255, 150, 0, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.6); border-radius: 50%;
            color: white; font-weight: bold; font-size: 12px;
            display: flex; justify-content: center; align-items: center;
            pointer-events: auto; touch-action: none;
        }
        /* 手机端车辆按钮 */
        #btn-car {
            position: absolute; bottom: 50px; right: 240px;
            width: 65px; height: 65px; background: rgba(0, 255, 100, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.6); border-radius: 50%;
            color: white; font-weight: bold; font-size: 14px;
            display: flex; justify-content: center; align-items: center;
            pointer-events: auto; touch-action: none;
        }
        /* 手机端蹲下按钮 */
        #btn-crouch {
            position: absolute; bottom: 210px; right: 50px;
            width: 60px; height: 60px; background: rgba(150, 100, 50, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.6); border-radius: 50%;
            color: white; font-weight: bold; font-size: 14px;
            display: flex; justify-content: center; align-items: center;
            pointer-events: auto; touch-action: none;
        }
    </style>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <h1 id="menu-title">双端全能枪战</h1>
            <p id="menu-sub">正在载入配置...</p>
            <br>
            <p id="guide-text" style="font-size: 14px; color: #aaa;"></p>
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="headshot-alert">HEADSHOT!</div>
    
    <div id="ui-container">
        <div id="score-board">消灭敌人: <span id="score">0</span> / 3</div>
        <div class="hp-bar-container"><div id="player-hp-bar"></div></div>
    </div>

    <div id="weapon-display">🔫 手枪</div>
    <div id="ammo-display">12 / 12</div>
    <div id="car-prompt" style="position:absolute;bottom:120px;left:50%;transform:translateX(-50%);color:#ffcc00;font-size:20px;font-weight:bold;text-shadow:2px 2px 4px rgba(0,0,0,0.8);pointer-events:none;z-index:2;display:none;">按 E 进入车辆</div>

    <div id="enemy-health-layer"></div>
    <div id="damage-flash"></div>

    <div id="mobile-ui">
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        <div id="btn-fire">开火</div>
        <div id="btn-jump">跳跃</div>
        <div id="btn-weapon">武器</div>
        <div id="btn-reload">换弹</div>
        <div id="btn-car">车辆</div>
        <div id="btn-crouch">蹲下</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/objects/Sky.js"></script>

    <script>
        // --- 1. 设备环境判定 ---
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const mobileUi = document.getElementById('mobile-ui');
        const guideText = document.getElementById('guide-text');
        const menuSub = document.getElementById('menu-sub');

        if (isMobile) {
            mobileUi.style.display = 'block';
            menuSub.innerHTML = `消灭全部 <span style="color:#ffcc00;">3</span> 个敌人！<br>金色圆点是爆头弱点！<br>也可以开车撞敌人！`;
            guideText.innerHTML = `【触控操作】<br>左侧摇杆控制移动 | 右半屏滑动调整视角<br>点击右侧[开火]/[跳跃]/[蹲下]/[武器]/[换弹]/[车辆]按钮`;
        } else {
            menuSub.innerHTML = `消灭全部 <span style="color:#ffcc00;">3</span> 个敌人！<br>金色圆点是一枪秒杀的暴击点！<br>也可以开车撞敌人！<br><br>点击屏幕锁鼠标开始`;
            guideText.innerHTML = `【PC键盘操作】<br>WASD 键移动 | 空格键跳跃 | Ctrl 键蹲下 | 鼠标左键射击<br>按 1/2/3 键切换武器 | 按 R 键换弹 | 按 E 键进入/离开车辆`;
        }

        // --- 2. 基础场景设置 ---
        const scene = new THREE.Scene();

        const sky = new THREE.Sky();
        sky.scale.setScalar(10000);
        scene.add(sky);
        const skyUniforms = sky.material.uniforms;
        skyUniforms['turbidity'].value = 10;
        skyUniforms['rayleigh'].value = 2;
        skyUniforms['mieCoefficient'].value = 0.005;
        skyUniforms['mieDirectionalG'].value = 0.8;
        const sunPosition = new THREE.Vector3();
        sunPosition.setFromSphericalCoords(1, Math.PI / 2, Math.PI / 4);
        skyUniforms['sunPosition'].value.copy(sunPosition);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 0.5;
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 2;

        const playerNode = new THREE.Object3D();
        playerNode.position.set(0, 0, 0);
        playerNode.add(camera);
        scene.add(playerNode);

        // 灯光与场景构建
        scene.add(new THREE.AmbientLight(0x666666));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const textureLoader = new THREE.TextureLoader();
        const floorTexture = textureLoader.load('static/img/floor.jpg');
        floorTexture.wrapS = THREE.RepeatWrapping;
        floorTexture.wrapT = THREE.RepeatWrapping;
        floorTexture.repeat.set(20, 20);
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ map: floorTexture, roughness: 0.8 }));
        floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);

        const walls = [];
        const wallTypes = [
            { type: 'box', size: [4, 8, 4], color: 0x888888 },
            { type: 'box', size: [6, 4, 3], color: 0x8B4513 },
            { type: 'cylinder', radius: 1.5, height: 10, color: 0x696969 },
            { type: 'box', size: [3, 6, 3], color: 0x556B2F },
            { type: 'box', size: [8, 3, 4], color: 0xA0522D },
            { type: 'cylinder', radius: 2, height: 5, color: 0x708090 },
            { type: 'box', size: [5, 7, 5], color: 0x8B0000 },
            { type: 'box', size: [2, 12, 2], color: 0x2F4F4F },
            { type: 'box', size: [7, 3, 7], color: 0xCD853F },
            { type: 'cylinder', radius: 1, height: 8, color: 0xBC8F8F }
        ];
        for(let i=0; i<15; i++) {
            const wallType = wallTypes[i % wallTypes.length];
            let wall;
            if (wallType.type === 'box') {
                wall = new THREE.Mesh(
                    new THREE.BoxGeometry(...wallType.size),
                    new THREE.MeshStandardMaterial({ color: wallType.color })
                );
                wall.userData.size = new THREE.Vector3(...wallType.size);
            } else {
                wall = new THREE.Mesh(
                    new THREE.CylinderGeometry(wallType.radius, wallType.radius, wallType.height, 12),
                    new THREE.MeshStandardMaterial({ color: wallType.color })
                );
                wall.userData.size = new THREE.Vector3(wallType.radius * 2, wallType.height, wallType.radius * 2);
            }
            wall.position.set((Math.random() - 0.5) * 100, wall.userData.size.y / 2, (Math.random() - 0.5) * 100);
            wall.castShadow = true; wall.receiveShadow = true; scene.add(wall);
            walls.push(wall);
        }

        // 车辆系统
        const carGroup = new THREE.Group();
        const carBodyMat = new THREE.MeshStandardMaterial({ color: 0x2244aa, metalness: 0.6, roughness: 0.4 });
        const carBody = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.8, 4), carBodyMat);
        carBody.position.y = 0.6;
        carBody.castShadow = true;
        carGroup.add(carBody);
        const carHoodMat = new THREE.MeshStandardMaterial({ color: 0x111133, metalness: 0.7, roughness: 0.3 });
        const carHood = new THREE.Mesh(new THREE.BoxGeometry(2.0, 0.15, 1.2), carHoodMat);
        carHood.position.set(0, 1.05, 1.2);
        carHood.castShadow = true;
        carGroup.add(carHood);
        const carCabin = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 2), new THREE.MeshStandardMaterial({ color: 0x88aacc, metalness: 0.3, roughness: 0.5 }));
        carCabin.position.set(0, 1.2, -0.2);
        carCabin.castShadow = true;
        carGroup.add(carCabin);
        const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 12);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.2, roughness: 0.8 });
        const wheelPositions = [[-0.9, 0.35, 1.2], [0.9, 0.35, 1.2], [-0.9, 0.35, -1.2], [0.9, 0.35, -1.2]];
        wheelPositions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(...pos);
            wheel.castShadow = true;
            carGroup.add(wheel);
        });
        const carHeadlightMat = new THREE.MeshBasicMaterial({ color: 0xffffcc });
        const headlightL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.1), carHeadlightMat);
        headlightL.position.set(-0.6, 0.6, 2);
        carGroup.add(headlightL);
        const headlightR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.1), carHeadlightMat);
        headlightR.position.set(0.6, 0.6, 2);
        carGroup.add(headlightR);
        const carTaillightMat = new THREE.MeshBasicMaterial({ color: 0xff3333 });
        const taillightL = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.1), carTaillightMat);
        taillightL.position.set(-0.6, 0.6, -2);
        carGroup.add(taillightL);
        const taillightR = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.15, 0.1), carTaillightMat);
        taillightR.position.set(0.6, 0.6, -2);
        carGroup.add(taillightR);
        carGroup.position.set(15, 0, 15);
        scene.add(carGroup);

        let isInCar = false;
        const carSize = new THREE.Vector3(2.5, 1.5, 4.5);
        const carEnterDistance = 4;
        const carPrompt = document.getElementById('car-prompt');

        // 武器系统
        const weapons = {
            current: 'gun',
            gun: null,
            knife: null,
            ak47: null,
            grenade: null
        };

        // 创建手枪
        const gunGroup = new THREE.Group();
        const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.4), new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 }));
        gunBody.position.set(0.15, -0.2, -0.4); 
        gunGroup.add(gunBody);
        weapons.gun = gunGroup;
        camera.add(gunGroup);

        // 创建AK47
        const ak47Group = new THREE.Group();
        const ak47Body = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.6), new THREE.MeshStandardMaterial({ color: 0x4a3520, metalness: 0.4, roughness: 0.6 }));
        ak47Body.position.set(0.15, -0.22, -0.5);
        const ak47Barrel = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.05, 0.4), new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.9, roughness: 0.2 }));
        ak47Barrel.position.set(0.15, -0.18, -0.9);
        const ak47Stock = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.25), new THREE.MeshStandardMaterial({ color: 0x4a3520, metalness: 0.3, roughness: 0.7 }));
        ak47Stock.position.set(0.15, -0.22, -0.15);
        const ak47Mag = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.18, 0.08), new THREE.MeshStandardMaterial({ color: 0x1a1a1a, metalness: 0.8, roughness: 0.3 }));
        ak47Mag.position.set(0.15, -0.32, -0.55);
        ak47Group.add(ak47Body);
        ak47Group.add(ak47Barrel);
        ak47Group.add(ak47Stock);
        ak47Group.add(ak47Mag);
        weapons.ak47 = ak47Group;
        ak47Group.visible = false;
        camera.add(ak47Group);

        // 创建刀 - 长刀
        const knifeGroup = new THREE.Group();
        const bladeMat = new THREE.MeshStandardMaterial({ color: 0xb0b0b0, metalness: 0.85, roughness: 0.2 });

        const blade = new THREE.Mesh(new THREE.BoxGeometry(0.03, 0.06, 0.35), bladeMat);
        blade.position.set(0.18, -0.08, -0.25);

        knifeGroup.add(blade);
        weapons.knife = knifeGroup;
        knifeGroup.visible = false;
        camera.add(knifeGroup);

        const grenadeGroup = new THREE.Group();
        const grenadeBody = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshStandardMaterial({ color: 0x2d5016, metalness: 0.3, roughness: 0.7 }));
        grenadeBody.position.set(0.18, -0.15, -0.4);
        const grenadeHandle = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.1, 0.03), new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.6, roughness: 0.4 }));
        grenadeHandle.position.set(0.18, -0.05, -0.4);
        grenadeGroup.add(grenadeBody);
        grenadeGroup.add(grenadeHandle);
        weapons.grenade = grenadeGroup;
        grenadeGroup.visible = false;
        camera.add(grenadeGroup);

        const thrownGrenades = [];
        const explosionRadius = 8;
        const grenadeDelay = 2.5;

        function throwGrenade() {
            if (ammoSystem.grenade.current <= 0) return;
            ammoSystem.grenade.current--;
            updateAmmoDisplay();

            const grenade = new THREE.Group();
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 8), new THREE.MeshStandardMaterial({ color: 0x2d5016, metalness: 0.3, roughness: 0.7 }));
            const handle = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.15, 0.05), new THREE.MeshStandardMaterial({ color: 0x444444, metalness: 0.6, roughness: 0.4 }));
            handle.position.y = 0.15;
            grenade.add(body);
            grenade.add(handle);

            const throwPos = new THREE.Vector3();
            grenadeBody.getWorldPosition(throwPos);
            grenade.position.copy(throwPos);
            const dir = camera.getWorldDirection(new THREE.Vector3());
            if (dir.y < 0) dir.y *= 1.5;
            grenade.userData.velocity = dir.multiplyScalar(20);
            grenade.userData.velocity.y += 5;
            grenade.userData.timeLeft = grenadeDelay;
            grenade.userData.exploded = false;

            scene.add(grenade);
            thrownGrenades.push(grenade);

            grenadeGroup.visible = false;
        }

        function createExplosion(pos) {
            document.getElementById('damage-flash').style.backgroundColor = 'rgba(255, 100, 0, 0.4)';
            document.getElementById('damage-flash').style.opacity = '1';
            setTimeout(() => { document.getElementById('damage-flash').style.opacity = '0'; document.getElementById('damage-flash').style.backgroundColor = 'rgba(255, 0, 0, 0.4)'; }, 200);

            const explosionGeo = new THREE.SphereGeometry(1, 16, 16);
            const explosionMat = new THREE.MeshBasicMaterial({ color: 0xff6600, transparent: true, opacity: 0.8 });
            const explosion = new THREE.Mesh(explosionGeo, explosionMat);
            explosion.position.copy(pos);
            scene.add(explosion);

            const shockwaveGeo = new THREE.SphereGeometry(1, 16, 16);
            const shockwaveMat = new THREE.MeshBasicMaterial({ color: 0xff3300, transparent: true, opacity: 0.5, wireframe: true });
            const shockwave = new THREE.Mesh(shockwaveGeo, shockwaveMat);
            shockwave.position.copy(pos);
            scene.add(shockwave);

            let scale = 0.1;
            const expandInterval = setInterval(() => {
                scale += 0.5;
                explosion.scale.set(scale, scale, scale);
                shockwave.scale.set(scale * 1.2, scale * 1.2, scale * 1.2);
                explosionMat.opacity -= 0.05;
                shockwaveMat.opacity -= 0.05;
                if (scale >= explosionRadius) {
                    clearInterval(expandInterval);
                    scene.remove(explosion);
                    scene.remove(shockwave);
                }
            }, 50);

            for (let i = enemyGroups.length - 1; i >= 0; i--) {
                const enemy = enemyGroups[i];
                const dist = enemy.position.distanceTo(pos);
                if (dist < explosionRadius) {
                    const damage = Math.floor(5 * (1 - dist / explosionRadius) + 3);
                    enemy.userData.hp -= damage;
                    const hpPercent = (enemy.userData.hp / enemy.userData.maxHp) * 100;
                    enemy.userData.hpFillElement.style.width = Math.max(0, hpPercent) + '%';
                    if (enemy.userData.hp <= 0) {
                        if(enemy.userData.hpElement) enemy.userData.hpElement.remove();
                        shootableObjects.splice(shootableObjects.indexOf(enemy.userData.body), 1);
                        shootableObjects.splice(shootableObjects.indexOf(enemy.userData.head), 1);

            return (
                Math.abs(pos1.x - pos2.x) < (size1.x + size2.x) / 2 &&
                Math.abs(pos1.z - pos2.z) < (size1.z + size2.z) / 2
            );
        }

        function resolveCollision(playerPos, playerSize, wallPos, wallSize) {
            const dx = playerPos.x - wallPos.x;
            const dz = playerPos.z - wallPos.z;
            const overlapX = (playerSize.x + wallSize.x) / 2 - Math.abs(dx);
            const overlapZ = (playerSize.z + wallSize.z) / 2 - Math.abs(dz);

            if (overlapX < overlapZ) {
                playerPos.x += (dx > 0 ? 1 : -1) * overlapX;
            } else {
                playerPos.z += (dz > 0 ? 1 : -1) * overlapZ;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (gameStarted && !isGameEnded) {
                const delta = clock.getDelta(); 

                // AK47连发逻辑
                if (weapons.current === 'ak47' && (isMouseDown || isTouchDown)) {
                    ak47FireTimer -= delta;
                    if (ak47FireTimer <= 0) {
                        fireWeapon();
                        ak47FireTimer = ak47FireRate;
                    }
                }

                // 物理阻尼与重力
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 3.5 * delta;

                for (let i = thrownGrenades.length - 1; i >= 0; i--) {
                    const g = thrownGrenades[i];
                    g.userData.velocity.y -= 20 * delta;
                    g.position.add(g.userData.velocity.clone().multiplyScalar(delta));
                    if (g.position.y < 0.15) {
                        g.position.y = 0.15;
                        g.userData.velocity.y *= -0.4;
                        g.userData.velocity.x *= 0.7;
                        g.userData.velocity.z *= 0.7;
                    }
                    g.userData.timeLeft -= delta;
                    if (g.userData.timeLeft <= 0 && !g.userData.exploded) {
                        g.userData.exploded = true;
                        createExplosion(g.position.clone());
                        scene.remove(g);
                        thrownGrenades.splice(i, 1);
                        grenadeGroup.visible = true;
                    }
                }

                // 计算方向输入（兼容手机和电脑）
                if (isMobile) {
                    direction.x = joystickVector.x;
                    direction.z = joystickVector.y;
                } else {
                    direction.z = Number(moveForward) - Number(moveBackward);
                    direction.x = Number(moveLeft) - Number(moveRight);
                    direction.normalize();
                }

                const playerSize = isCrouching ? new THREE.Vector3(1.5, 1, 1.5) : new THREE.Vector3(1.5, 2, 1.5);
                const cameraOffsetY = isCrouching ? 1 : 2;

                if (!isInCar) {
                    camera.position.y = cameraOffsetY;
                }

                if (isInCar) {
                    carVelocity.z -= carVelocity.z * 8.0 * delta;
                    carRotationVelocity -= carRotationVelocity * 15.0 * delta;

                    const carSpeed = 40.0;
                    const turnSpeed = 0.08;

                    if (isMobile) {
                        if (direction.z < -0.2) {
                            carVelocity.z += carSpeed * delta;
                        }
                        if (direction.z > 0.2) {
                            carVelocity.z -= carSpeed * delta;
                        }
                        if (direction.x < -0.2) {
                            carRotationVelocity += turnSpeed * delta;
                        }
                        if (direction.x > 0.2) {
                            carRotationVelocity -= turnSpeed * delta;
                        }
                    } else {
                        if (moveForward) {
                            carVelocity.z += carSpeed * delta;
                        }
                        if (moveBackward) {
                            carVelocity.z -= carSpeed * delta;
                        }
                        if (moveLeft) {
                            carRotationVelocity += turnSpeed * delta;
                        }
                        if (moveRight) {
                            carRotationVelocity -= turnSpeed * delta;
                        }
                    }

                    carRotation += carRotationVelocity;
                    carGroup.rotation.y = carRotation;
                    carGroup.translateZ(carVelocity.z * delta);

                    const carOldPos = carGroup.position.clone();
                    walls.forEach(wall => {
                        if (checkBoxCollision(carGroup.position, carSize, wall.position, wall.userData.size)) {
                            resolveCollision(carGroup.position, carSize, wall.position, wall.userData.size);
                        }
                    });
                    if (carGroup.position.x !== carOldPos.x || carGroup.position.z !== carOldPos.z) {
                        carVelocity.z *= -0.3;
                    }
                } else {
                    const speed = 40.0;
                    if (isMobile) {
                        playerNode.translateX(direction.x * speed * 0.4 * delta);
                        playerNode.translateZ(direction.z * speed * 0.4 * delta);
                    } else {
                        if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                        if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;
                        playerNode.translateX(velocity.x * delta);
                        playerNode.translateZ(velocity.z * delta);
                    }

                    playerNode.position.y += (velocity.y * delta);
                    const carRoofHeight = carGroup.position.y + 1.2;
                    if (playerNode.position.y < 0) {
                        velocity.y = 0; playerNode.position.y = 0; canJump = true;
                    } else if (playerNode.position.y > carRoofHeight - 0.1 && playerNode.position.y < carRoofHeight + 0.5) {
                        const xDist = Math.abs(playerNode.position.x - carGroup.position.x);
                        const zDist = Math.abs(playerNode.position.z - carGroup.position.z);
                        if (xDist < carSize.x / 2 - 0.3 && zDist < carSize.z / 2 - 0.3) {
                            playerNode.position.y = carRoofHeight;
                            velocity.y = 0;
                            canJump = true;
                        }
                    }

                    walls.forEach(wall => {
                        if (checkBoxCollision(playerNode.position, playerSize, wall.position, wall.userData.size)) {
                            resolveCollision(playerNode.position, playerSize, wall.position, wall.userData.size);
                        }
                    });

                    if (checkBoxCollision(playerNode.position, playerSize, carGroup.position, carSize)) {
                        const carRoofHeight = carGroup.position.y + 1.2;
                        const playerFeet = playerNode.position.y;
                        if (playerFeet < carRoofHeight - 0.3) {
                            resolveCollision(playerNode.position, playerSize, carGroup.position, carSize);
                        }
                    }
                }

                // 显示车辆交互提示
                if (isInCar) {
                    carPrompt.textContent = '按 E 下车';
                    carPrompt.style.display = 'block';
                } else {
                    const distToCar = playerNode.position.distanceTo(carGroup.position);
                    const playerOnGround = Math.abs(playerNode.position.y) < 0.2;
                    carPrompt.textContent = '按 E 进入车辆';
                    carPrompt.style.display = (distToCar < carEnterDistance && playerOnGround) ? 'block' : 'none';
                }

                // 驾驶时相机跟随车辆
                if (isInCar) {
                    playerNode.position.copy(carGroup.position);
                    camera.rotation.z = 0;
                }

                // 统一同步玩家的3D位置
                const pPos = new THREE.Vector3();
                playerNode.getWorldPosition(pPos);
                pPos.y += isInCar ? 2 : cameraOffsetY; 

                // 敌人 AI 与血条 2D 反向投影
                enemyGroups.forEach(eg => {
                    const enemyOldPos = eg.position.clone();
                    eg.lookAt(pPos.x, eg.position.y, pPos.z);
                    eg.translateZ(1.8 * delta); 

                    // 敌人与柱子碰撞
                    const enemySize = new THREE.Vector3(2, 2, 2);
                    walls.forEach(wall => {
                        if (checkBoxCollision(eg.position, enemySize, wall.position, wall.userData.size)) {
                            resolveCollision(eg.position, enemySize, wall.position, wall.userData.size);
                        }
                    });

                    // 敌人与玩家碰撞
                    if (checkBoxCollision(eg.position, enemySize, playerNode.position, playerSize)) {
                        eg.position.copy(enemyOldPos);
                    }

                    // 车辆与敌人碰撞
                    if (isInCar && checkBoxCollision(eg.position, enemySize, carGroup.position, carSize)) {
                        eg.userData.hp = 0;
                        const hpPercent = 0;
                        eg.userData.hpFillElement.style.width = hpPercent + '%';
                        if (eg.userData.hp <= 0) {
                            if (eg.userData.hpElement) eg.userData.hpElement.remove();
                            shootableObjects.splice(shootableObjects.indexOf(eg.userData.body), 1);
                            shootableObjects.splice(shootableObjects.indexOf(eg.userData.head), 1);
                            scene.remove(eg);
                            enemyGroups.splice(enemyGroups.indexOf(eg), 1);
                            score++;
                            document.getElementById('score').innerText = score;
                            if (score >= maxEnemies) triggerEnd(true);
                        }
                    } else if (checkBoxCollision(eg.position, enemySize, carGroup.position, carSize)) {
                        resolveCollision(eg.position, enemySize, carGroup.position, carSize);
                    }

                    tempV.copy(eg.position); tempV.y += 2.8; tempV.project(camera); 
                    if (tempV.z <= 1) {
                        const x = (tempV.x * .5 + .5) * window.innerWidth;
                        const y = (tempV.y * -.5 + .5) * window.innerHeight;
                        eg.userData.hpElement.style.display = 'block';
                        eg.userData.hpElement.style.left = `${x}px`; eg.userData.hpElement.style.top = `${y}px`;
                    } else { eg.userData.hpElement.style.display = 'none'; }

                    // 攻击冷却
                    eg.userData.shootCooldown -= delta;
                    if (eg.userData.shootCooldown <= 0) {
                        const b = new THREE.Mesh(bulletGeo, bulletMat);
                        b.position.set(eg.position.x, eg.position.y + 2.3, eg.position.z);
                        const dir = new THREE.Vector3(); dir.subVectors(pPos, b.position).normalize();
                        b.userData = { direction: dir, lifeTime: 4.0 };
                        scene.add(b); enemyBullets.push(b);
                        eg.userData.shootCooldown = Math.random() * 1 + 2.5; 
                    }
                });

                // 敌方子弹逻辑
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    const b = enemyBullets[i];
                    b.position.addScaledVector(b.userData.direction, 22.0 * delta);
                    b.userData.lifeTime -= delta;

                    let hitWall = false;
                    const bulletSize = new THREE.Vector3(0.4, 0.4, 0.4);
                    for (let j = 0; j < walls.length; j++) {
                        if (checkBoxCollision(b.position, bulletSize, walls[j].position, walls[j].userData.size)) {
                            hitWall = true;
                            break;
                        }
                    }

                    if (hitWall) {
                        scene.remove(b); enemyBullets.splice(i, 1); continue;
                    }
                    if (!isInCar && b.position.distanceTo(pPos) < 1.3) {
                        takeDamage(20); scene.remove(b); enemyBullets.splice(i, 1); continue;
                    }
                    if (b.userData.lifeTime <= 0) { scene.remove(b); enemyBullets.splice(i, 1); }
                }

                // 玩家子弹逻辑
                for (let i = playerBullets.length - 1; i >= 0; i--) {
                    const b = playerBullets[i];
                    b.position.addScaledVector(b.userData.direction, b.userData.speed * delta);
                    b.userData.lifeTime -= delta;

                    let hitWall = false;
                    const bulletSize = new THREE.Vector3(0.2, 0.2, 0.5);
                    for (let j = 0; j < walls.length; j++) {
                        if (checkBoxCollision(b.position, bulletSize, walls[j].position, walls[j].userData.size)) {
                            hitWall = true;
                            break;
                        }
                    }

                    if (hitWall || b.userData.lifeTime <= 0) {
                        scene.remove(b); playerBullets.splice(i, 1); continue;
                    }

                    let hitEnemy = false;
                    for (let j = enemyGroups.length - 1; j >= 0; j--) {
                        const eg = enemyGroups[j];
                        const enemySize = new THREE.Vector3(2, 2, 2);
                        if (checkBoxCollision(b.position, bulletSize, eg.position, enemySize)) {
                            hitEnemy = true;
                            eg.userData.hp -= b.userData.damage;
                            const hpPercent = (eg.userData.hp / eg.userData.maxHp) * 100;
                            eg.userData.hpFillElement.style.width = Math.max(0, hpPercent) + '%';
                            if (eg.userData.hp <= 0) {
                                if (eg.userData.hpElement) eg.userData.hpElement.remove();
                                shootableObjects.splice(shootableObjects.indexOf(eg.userData.body), 1);
                                shootableObjects.splice(shootableObjects.indexOf(eg.userData.head), 1);
                                scene.remove(eg);
                                enemyGroups.splice(j, 1);
                                score++;
                                document.getElementById('score').innerText = score;
                                if (score >= maxEnemies) triggerEnd(true);
                            }
                            break;
                        }
                    }
                    if (hitEnemy) {
                        scene.remove(b); playerBullets.splice(i, 1);
                    }
                }
            } else {
                enemyGroups.forEach(eg => { if(eg.userData.hpElement) eg.userData.hpElement.style.display = 'none'; });
            }
            renderer.render(scene, camera);
        }

        updateAmmoDisplay();
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
