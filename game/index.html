<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Three.js FPS 游戏（支持手机双端自适应）</title>
    <style>
        body {
            margin: 0; overflow: hidden; background-color: #000;
            font-family: sans-serif; user-select: none;
            -webkit-user-select: none; touch-action: none;
        }
        /* 准星 */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 2;
        }
        #crosshair::before, #crosshair::after {
            content: ''; position: absolute; background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { top: 4px; left: -10px; width: 30px; height: 2px; }
        #crosshair::after { top: -10px; left: 4px; width: 2px; height: 30px; }

        /* 游戏 UI 容器 */
        #ui-container {
            position: absolute; top: 20px; left: 20px;
            color: white; font-size: 18px; font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; z-index: 2;
        }
        #score-board { margin-bottom: 5px; }
        
        /* 玩家血条 */
        .hp-bar-container {
            width: 150px; height: 15px; background-color: rgba(0, 0, 0, 0.5);
            border: 2px solid white; border-radius: 5px; overflow: hidden;
        }
        #player-hp-bar { width: 100%; height: 100%; background-color: #ff3333; transition: width 0.1s ease; }

        #headshot-alert {
            position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%) scale(0.5);
            color: #ffcc00; font-size: 40px; font-weight: 900; font-style: italic;
            text-shadow: 0 0 10px #ff3300, 3px 3px 0 #000; opacity: 0; pointer-events: none; z-index: 3;
        }

        #enemy-health-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .enemy-hp-container { position: absolute; width: 45px; height: 5px; background-color: rgba(0,0,0,0.6); border: 1px solid #000; transform: translate(-50%, -50%); display: none; }
        .enemy-hp-fill { width: 100%; height: 100%; background-color: #00ff00; }

        #damage-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 0, 0, 0.4); opacity: 0; pointer-events: none; z-index: 5; }

        /* 开始/结束 提示界面 */
        #blocker {
            position: absolute; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85);
            display: flex; justify-content: center; align-items: center; color: white; text-align: center; z-index: 10;
        }
        #instructions { font-size: 18px; padding: 20px; }
        #instructions h1 { font-size: 36px; margin-bottom: 15px; }

        /* ================= 手机端独有虚拟触控 UI ================= */
        #mobile-ui {
            display: none; /* 默认隐藏，JS检测到移动端时开启 */
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 4;
        }
        /* 左摇杆底盘 */
        #joystick-zone {
            position: absolute; bottom: 40px; left: 40px;
            width: 120px; height: 120px; background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.4); border-radius: 50%;
            pointer-events: auto; touch-action: none;
        }
        /* 摇杆中心纽扣 */
        #joystick-knob {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px; background: rgba(255, 255, 255, 0.7);
            border-radius: 50%; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            transition: transform 0.05s linear;
        }
        /* 开火按钮 */
        #btn-fire {
            position: absolute; bottom: 50px; right: 140px;
            width: 75px; height: 75px; background: rgba(255, 0, 0, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.6); border-radius: 50%;
            color: white; font-weight: bold; font-size: 18px;
            display: flex; justify-content: center; align-items: center;
            pointer-events: auto; touch-action: none;
        }
        /* 跳跃按钮 */
        #btn-jump {
            position: absolute; bottom: 130px; right: 50px;
            width: 65px; height: 65px; background: rgba(255, 255, 255, 0.2);
            border: 3px solid rgba(255, 255, 255, 0.5); border-radius: 50%;
            color: white; font-weight: bold; font-size: 16px;
            display: flex; justify-content: center; align-items: center;
            pointer-events: auto; touch-action: none;
        }
    </style>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <h1 id="menu-title">双端全能枪战</h1>
            <p id="menu-sub">正在载入配置...</p>
            <br>
            <p id="guide-text" style="font-size: 14px; color: #aaa;"></p>
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="headshot-alert">HEADSHOT!</div>
    
    <div id="ui-container">
        <div id="score-board">消灭敌人: <span id="score">0</span> / 5</div>
        <div class="hp-bar-container"><div id="player-hp-bar"></div></div>
    </div>

    <div id="enemy-health-layer"></div>
    <div id="damage-flash"></div>

    <div id="mobile-ui">
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        <div id="btn-fire">开火</div>
        <div id="btn-jump">跳跃</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // --- 1. 设备环境判定 ---
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const mobileUi = document.getElementById('mobile-ui');
        const guideText = document.getElementById('guide-text');
        const menuSub = document.getElementById('menu-sub');

        if (isMobile) {
            mobileUi.style.display = 'block';
            menuSub.innerHTML = `消灭全部 <span style="color:#ffcc00;">5</span> 个敌人！<br>金色圆点是爆头弱点！`;
            guideText.innerHTML = `【触控操作】<br>左侧摇杆控制移动 | 右半屏滑动调整视角<br>点击右侧[开火]/[跳跃]按钮`;
        } else {
            menuSub.innerHTML = `消灭全部 <span style="color:#ffcc00;">5</span> 个敌人！<br>金色圆点是一枪秒杀的暴击点！<br><br>点击屏幕锁鼠标开始`;
            guideText.innerHTML = `【PC键盘操作】<br>WASD 键移动 | 空格键跳跃 | 鼠标左键射击`;
        }

        // --- 2. 基础场景设置 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xcccccc);
        scene.fog = new THREE.FogExp2(0xcccccc, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 2; 

        // 统一在底层创建一个核心管理节点对象，用来统一在手机端和电脑端操作其旋转与移动
        const playerNode = new THREE.Object3D();
        playerNode.position.set(0, 0, 0);
        playerNode.add(camera);
        scene.add(playerNode);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 灯光与场景构建
        scene.add(new THREE.AmbientLight(0x666666));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 }));
        floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);

        const wallGeo = new THREE.BoxGeometry(4, 8, 4);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
        for(let i=0; i<12; i++) {
            const wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.set((Math.random() - 0.5) * 100, 4, (Math.random() - 0.5) * 100);
            wall.castShadow = true; wall.receiveShadow = true; scene.add(wall);
        }

        // 第一人称武器
        const gunGroup = new THREE.Group();
        const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.12, 0.4), new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 }));
        gunBody.position.set(0.15, -0.2, -0.4); 
        gunGroup.add(gunBody); camera.add(gunGroup);

        // 核心游戏状态
        let playerHp = 100, score = 0, maxEnemies = 5, isGameEnded = false, gameStarted = false;
        const enemyGroups = [], shootableObjects = [], enemyBullets = [];

        const bodyGeo = new THREE.BoxGeometry(2, 2, 2), bodyMat = new THREE.MeshStandardMaterial({ color: 0xff3333 });
        const headGeo = new THREE.SphereGeometry(0.4, 12, 12), headMat = new THREE.MeshStandardMaterial({ color: 0xffcc00 });
        const bulletGeo = new THREE.SphereGeometry(0.18, 6, 6), bulletMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 }); 
        const healthLayer = document.getElementById('enemy-health-layer');

        function spawnEnemy() {
            const enemyGroup = new THREE.Group();
            const bodyMesh = new THREE.Mesh(bodyGeo, bodyMat); bodyMesh.position.y = 1; bodyMesh.castShadow = true; enemyGroup.add(bodyMesh);
            const headMesh = new THREE.Mesh(headGeo, headMat); headMesh.position.set(0, 2.3, 0); headMesh.castShadow = true; enemyGroup.add(headMesh);
            enemyGroup.position.set((Math.random() - 0.5) * 60, 0, (Math.random() - 0.5) * 60);
            
            const hpContainer = document.createElement('div'); hpContainer.className = 'enemy-hp-container';
            const hpFill = document.createElement('div'); hpFill.className = 'enemy-hp-fill';
            hpContainer.appendChild(hpFill); healthLayer.appendChild(hpContainer);

            enemyGroup.userData = { maxHp: 3, hp: 3, shootCooldown: Math.random() * 2 + 1.5, hpElement: hpContainer, hpFillElement: hpFill, body: bodyMesh, head: headMesh };
            bodyMesh.userData = { parentGroup: enemyGroup, isHead: false };
            headMesh.userData = { parentGroup: enemyGroup, isHead: true };

            shootableObjects.push(bodyMesh, headMesh); scene.add(enemyGroup); enemyGroups.push(enemyGroup);
        }
        for(let i = 0; i < maxEnemies; i++) { spawnEnemy(); }

        // --- 3. 双端输入控制系统 ---
        const blocker = document.getElementById('blocker');
        const menuTitle = document.getElementById('menu-title');
        const playerHpBar = document.getElementById('player-hp-bar');
        const headshotAlert = document.getElementById('headshot-alert');

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        const velocity = new THREE.Vector3(), direction = new THREE.Vector3();

        // 手机端摇杆偏移量临时数据
        let joystickVector = { x: 0, y: 0 }; 

        if (!isMobile) {
            // ---- PC 端控制逻辑 ----
            const pcControls = new THREE.PointerLockControls(playerNode, document.body);
            // 覆盖camera的控制，转由整体playerNode承接
            pcControls.getObject = () => playerNode; 

            blocker.addEventListener('click', () => { if(!isGameEnded) { pcControls.lock(); gameStarted = true; } });
            pcControls.addEventListener('lock', () => { blocker.style.display = 'none'; });
            pcControls.addEventListener('unlock', () => { if(!isGameEnded) blocker.style.display = 'flex'; });

            document.addEventListener('keydown', (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'Space': if (canJump) velocity.y += 11; canJump = false; break;
                }
            });
            document.addEventListener('keyup', (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            });
            document.addEventListener('mousedown', (e) => {
                if (pcControls.isLocked && e.button === 0) fireWeapon();
            });
        } else {
            // ---- 手机端触控逻辑 ----
            blocker.addEventListener('touchstart', (e) => { 
                if(!isGameEnded) { blocker.style.display = 'none'; gameStarted = true; } 
            });

            // 1. 右半屏滑动视角控制
            let touchX = 0, touchY = 0;
            // 设定摄像机的基础旋转欧拉角
            let lon = 0, lat = 0; 

            window.addEventListener('touchstart', (e) => {
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    // 只有在屏幕右半边触碰才判定为滑动视野
                    if (touch.clientX > window.innerWidth / 2) {
                        touchX = touch.clientX; touchY = touch.clientY;
                    }
                }
            }, { passive: true });

            window.addEventListener('touchmove', (e) => {
                if (!gameStarted || isGameEnded) return;
                for (let i = 0; i < e.changedTouches.length; i++) {
                    const touch = e.changedTouches[i];
                    if (touch.clientX > window.innerWidth / 3) { // 避开左侧摇杆区间
                        const movementX = touch.clientX - touchX;
                        const movementY = touch.clientY - touchY;

                        lon -= movementX * 0.25; // 灵敏度
                        lat -= movementY * 0.25;
                        lat = Math.max(-85, Math.min(85, lat)); // 锁死仰角上下限

                        // 将旋转应用给playerNode(水平左右)和camera(垂直上下)
                        playerNode.rotation.y = THREE.MathUtils.degToRad(lon);
                        camera.rotation.x = THREE.MathUtils.degToRad(lat);

                        touchX = touch.clientX; touchY = touch.clientY;
                    }
                }
            }, { passive: false });

            // 2. 左侧虚拟摇杆手势管理
            const joystickZone = document.getElementById('joystick-zone');
            const joystickKnob = document.getElementById('joystick-knob');
            const maxRadius = 45; // 摇杆最大位移

            joystickZone.addEventListener('touchstart', (e) => {
                e.preventDefault();
            });

            joystickZone.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.targetTouches[0];
                const rect = joystickZone.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;

                let deltaX = touch.clientX - centerX;
                let deltaY = touch.clientY - centerY;
                const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

                if (distance > maxRadius) {
                    deltaX = (deltaX / distance) * maxRadius;
                    deltaY = (deltaY / distance) * maxRadius;
                }

                joystickKnob.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                // 归一化摇杆向量值 (-1 到 1)
                joystickVector.x = deltaX / maxRadius;
                joystickVector.y = deltaY / maxRadius;
            });

            const resetJoystick = () => {
                joystickKnob.style.transform = `translate(0px, 0px)`;
                joystickVector = { x: 0, y: 0 };
            };
            joystickZone.addEventListener('touchend', resetJoystick);
            joystickZone.addEventListener('touchcancel', resetJoystick);

            // 3. 移动端独立按钮绑定
            document.getElementById('btn-fire').addEventListener('touchstart', (e) => { e.preventDefault(); fireWeapon(); });
            document.getElementById('btn-jump').addEventListener('touchstart', (e) => { e.preventDefault(); if (canJump) velocity.y += 11; canJump = false; });
        }

        // --- 4. 核心开火函数 (双端共用) ---
        const raycaster = new THREE.Raycaster();
        const mouseCenter = new THREE.Vector2(0, 0); 

        function fireWeapon() {
            if (isGameEnded || !gameStarted) return;
            gunBody.position.z += 0.1; setTimeout(() => { gunBody.position.z -= 0.1; }, 50);

            raycaster.setFromCamera(mouseCenter, camera);
            const intersects = raycaster.intersectObjects(shootableObjects);

            if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                const targetGroup = hitMesh.userData.parentGroup;
                const isHeadshot = hitMesh.userData.isHead;

                if (isHeadshot) {
                    targetGroup.userData.hp = 0;
                    headshotAlert.style.opacity = '1';
                    headshotAlert.style.transform = 'translate(-50%, -50%) scale(1.1)';
                    setTimeout(() => { headshotAlert.style.opacity = '0'; }, 500);
                } else {
                    targetGroup.userData.hp--;
                    const hpPercent = (targetGroup.userData.hp / targetGroup.userData.maxHp) * 100;
                    targetGroup.userData.hpFillElement.style.width = hpPercent + '%';
                }

                if (targetGroup.userData.hp <= 0) {
                    if(targetGroup.userData.hpElement) targetGroup.userData.hpElement.remove();
                    shootableObjects.splice(shootableObjects.indexOf(targetGroup.userData.body), 1);
                    shootableObjects.splice(shootableObjects.indexOf(targetGroup.userData.head), 1);
                    scene.remove(targetGroup);
                    enemyGroups.splice(enemyGroups.indexOf(targetGroup), 1);

                    score++; document.getElementById('score').innerText = score;
                    if (score >= maxEnemies) triggerEnd(true);
                }
            }
        }

        // 玩家受击与胜负处理
        function takeDamage(amount) {
            if(isGameEnded) return; playerHp -= amount;
            playerHpBar.style.width = Math.max(0, playerHp) + '%';
            document.getElementById('damage-flash').style.opacity = '1';
            setTimeout(() => { document.getElementById('damage-flash').style.opacity = '0'; }, 100);
            if(playerHp <= 0) triggerEnd(false);
        }

        function triggerEnd(isWin) {
            isGameEnded = true; blocker.style.display = 'flex';
            if(isWin) {
                menuTitle.innerText = "游戏胜利！"; menuTitle.style.color = "#00ff00";
                menuSub.innerHTML = `战神！成功击杀 5 个敌人！<br><br><span style="font-size:14px;color:#fff">重新刷新网页可以再次挑战</span>`;
            } else {
                menuTitle.innerText = "游戏结束"; menuTitle.style.color = "#ff3333";
                menuSub.innerHTML = `你尽力了！瞄准金色弱点能够瞬间秒杀敌人。<br><br><span style="font-size:14px;color:#fff">重新刷新网页可以再次挑战</span>`;
            }
            enemyBullets.forEach(b => scene.remove(b)); enemyBullets.length = 0;
        }

        // --- 5. 游戏主循环渲染 ---
        const clock = new THREE.Clock();
        const tempV = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);
            if (gameStarted && !isGameEnded) {
                const delta = clock.getDelta(); 

                // 物理阻尼与重力
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 3.5 * delta; 

                // 计算方向输入（兼容手机和电脑）
                if (isMobile) {
                    // 手机端直接使用摇杆回传的归一化向量值
                    direction.x = joystickVector.x;
                    direction.z = joystickVector.y;
                } else {
                    // 电脑端计算键盘
                    direction.z = Number(moveForward) - Number(moveBackward);
                    direction.x = Number(moveRight) - Number(moveLeft);
                    direction.normalize();
                }

                const speed = 40.0;
                if (isMobile) {
                    // 手机端摇杆推动
                    playerNode.translateX(direction.x * speed * 0.4 * delta);
                    playerNode.translateZ(direction.z * speed * 0.4 * delta);
                } else {
                    // 电脑端移动
                    if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                    if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;
                    playerNode.translateX(-velocity.x * delta);
                    playerNode.translateZ(-velocity.z * delta);
                }

                // 高度变化应用
                playerNode.position.y += (velocity.y * delta);
                if (playerNode.position.y < 0) {
                    velocity.y = 0; playerNode.position.y = 0; canJump = true; 
                }

                // 统一同步玩家的3D位置
                const pPos = new THREE.Vector3();
                playerNode.getWorldPosition(pPos);
                // 加上眼睛的高度差
                pPos.y += 2; 

                // 敌人 AI 与血条 2D 反向投影
                enemyGroups.forEach(eg => {
                    eg.lookAt(pPos.x, eg.position.y, pPos.z);
                    eg.translateZ(1.8 * delta); 

                    tempV.copy(eg.position); tempV.y += 2.8; tempV.project(camera); 
                    if (tempV.z <= 1) {
                        const x = (tempV.x * .5 + .5) * window.innerWidth;
                        const y = (tempV.y * -.5 + .5) * window.innerHeight;
                        eg.userData.hpElement.style.display = 'block';
                        eg.userData.hpElement.style.left = `${x}px`; eg.userData.hpElement.style.top = `${y}px`;
                    } else { eg.userData.hpElement.style.display = 'none'; }

                    // 攻击冷却
                    eg.userData.shootCooldown -= delta;
                    if (eg.userData.shootCooldown <= 0) {
                        const b = new THREE.Mesh(bulletGeo, bulletMat);
                        b.position.set(eg.position.x, eg.position.y + 2.3, eg.position.z);
                        const dir = new THREE.Vector3(); dir.subVectors(pPos, b.position).normalize();
                        b.userData = { direction: dir, lifeTime: 4.0 };
                        scene.add(b); enemyBullets.push(b);
                        eg.userData.shootCooldown = Math.random() * 1 + 2.5; 
                    }
                });

                // 敌方子弹逻辑
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    const b = enemyBullets[i];
                    b.position.addScaledVector(b.userData.direction, 22.0 * delta);
                    b.userData.lifeTime -= delta;

                    if (b.position.distanceTo(pPos) < 1.3) { 
                        takeDamage(20); scene.remove(b); enemyBullets.splice(i, 1); continue;
                    }
                    if (b.userData.lifeTime <= 0) { scene.remove(b); enemyBullets.splice(i, 1); }
                }
            } else {
                enemyGroups.forEach(eg => { if(eg.userData.hpElement) eg.userData.hpElement.style.display = 'none'; });
            }
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
