<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js FPS 游戏（敌人会射击）</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: sans-serif;
        }
        /* 准星 */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { top: 4px; left: -10px; width: 30px; height: 2px; }
        #crosshair::after { top: -10px; left: 4px; width: 2px; height: 30px; }

        /* 计分板 */
        #score-board {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        /* 受击红幕提示 */
        #damage-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 0, 0, 0.4);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s ease-out;
            z-index: 5;
        }

        /* 开始提示界面 */
        #blocker {
            position: absolute;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            cursor: pointer;
            z-index: 10;
        }
        #instructions {
            font-size: 20px;
        }
        #instructions h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="blocker">
        <div id="instructions">
            <h1>3D 射击游戏测试</h1>
            <p>点击屏幕开始游戏</p>
            <p>移动: WASD | 跳跃: 空格键</p>
            <p>瞄准: 鼠标 | 射击: 鼠标左键</p>
            <p style="color: #ff6666; font-weight: bold;">注意：躲避敌人的黄色光球子弹！</p>
        </div>
    </div>

    <div id="crosshair"></div>
    <div id="score-board">击杀数: <span id="score">0</span></div>
    <div id="damage-flash"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // --- 1. 基础场景设置 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xcccccc);
        scene.fog = new THREE.FogExp2(0xcccccc, 0.015);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 2; 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 2. 灯光 ---
        const ambientLight = new THREE.AmbientLight(0x666666);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(20, 40, 20);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // --- 3. 地面与环境 ---
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x555555, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        // 简单的障碍物墙壁
        const wallGeo = new THREE.BoxGeometry(4, 8, 4);
        const wallMat = new THREE.MeshStandardMaterial({ color: 0x888888 });
        for(let i=0; i<20; i++) {
            const wall = new THREE.Mesh(wallGeo, wallMat);
            wall.position.set((Math.random() - 0.5) * 100, 4, (Math.random() - 0.5) * 100);
            wall.castShadow = true;
            wall.receiveShadow = true;
            scene.add(wall);
        }

        // --- 4. 持枪视觉效果 ---
        const gunGroup = new THREE.Group();
        const gunBody = new THREE.Mesh(
            new THREE.BoxGeometry(0.1, 0.15, 0.5),
            new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.8, roughness: 0.2 })
        );
        gunBody.position.set(0.2, -0.25, -0.5); 
        gunGroup.add(gunBody);
        camera.add(gunGroup); 
        scene.add(camera);

        // --- 5. 敌人与敌方子弹系统 ---
        const enemies = [];
        const enemyBullets = []; // 存放所有敌方子弹的数组

        const enemyGeo = new THREE.BoxGeometry(2, 2, 2);
        const enemyMat = new THREE.MeshStandardMaterial({ color: 0xff3333 });
        
        // 敌方子弹的几何体与材质（黄色发光球体）
        const bulletGeo = new THREE.SphereGeometry(0.2, 8, 8);
        const bulletMat = new THREE.MeshBasicMaterial({ color: 0xffcc00 }); 

        let score = 0;

        function spawnEnemy() {
            const enemy = new THREE.Mesh(enemyGeo, enemyMat);
            enemy.position.set((Math.random() - 0.5) * 60, 1, (Math.random() - 0.5) * 60);
            enemy.castShadow = true;
            
            // 给每个敌人绑定一个独立的射击冷却计时器
            enemy.userData = {
                shootCooldown: Math.random() * 2 + 1 // 1到3秒的随机初始冷却
            };

            scene.add(enemy);
            enemies.push(enemy);
        }
        
        // 初始生成 5 个敌人
        for(let i = 0; i < 5; i++) { spawnEnemy(); }

        // --- 6. 控制器与运动变量 ---
        const controls = new THREE.PointerLockControls(camera, document.body);
        const blocker = document.getElementById('blocker');
        const damageFlash = document.getElementById('damage-flash');

        blocker.addEventListener('click', () => { controls.lock(); });
        controls.addEventListener('lock', () => { blocker.style.display = 'none'; });
        controls.addEventListener('unlock', () => { blocker.style.display = 'flex'; });

        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        let canJump = false;

        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        const onKeyDown = (event) => {
            switch (event.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyD': moveRight = true; break;
                case 'Space':
                    if (canJump === true) velocity.y += 11; 
                    canJump = false;
                    break;
            }
        };

        const onKeyUp = (event) => {
            switch (event.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyD': moveRight = false; break;
            }
        };

        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // --- 7. 玩家射击逻辑 ---
        const raycaster = new THREE.Raycaster();
        const mouseCenter = new THREE.Vector2(0, 0); 

        document.addEventListener('mousedown', (event) => {
            if (!controls.isLocked || event.button !== 0) return;

            gunBody.position.z += 0.1;
            setTimeout(() => { gunBody.position.z -= 0.1; }, 50);

            raycaster.setFromCamera(mouseCenter, camera);
            const intersects = raycaster.intersectObjects(enemies);

            if (intersects.length > 0) {
                const hitEnemy = intersects[0].object;
                scene.remove(hitEnemy);
                const index = enemies.indexOf(hitEnemy);
                if (index > -1) enemies.splice(index, 1);

                score++;
                document.getElementById('score').innerText = score;
                spawnEnemy();
            }
        });

        // 玩家受击反馈红光
        function triggerDamageFlash() {
            damageFlash.style.opacity = '1';
            setTimeout(() => { damageFlash.style.opacity = '0'; }, 100);
        }

        // --- 8. 游戏主循环动画 ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                const delta = clock.getDelta(); 

                // 1. 水平与重力位移计算
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 3.5 * delta; 

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); 

                const speed = 40.0;
                if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                controls.getObject().position.y += (velocity.y * delta);

                if (controls.getObject().position.y < 2) {
                    velocity.y = 0;
                    controls.getObject().position.y = 2;
                    canJump = true; 
                }

                const playerPos = controls.getObject().position;

                // 2. 敌人 AI 与射击逻辑
                enemies.forEach(enemy => {
                    // 让敌人面朝玩家并缓缓走近
                    enemy.lookAt(playerPos.x, enemy.position.y, playerPos.z);
                    enemy.translateZ(2.0 * delta); 

                    // 射击冷却计算
                    enemy.userData.shootCooldown -= delta;
                    if (enemy.userData.shootCooldown <= 0) {
                        // 冷却结束，发射子弹
                        const bullet = new THREE.Mesh(bulletGeo, bulletMat);
                        // 子弹初始位置在敌人中心稍微偏高一点
                        bullet.position.set(enemy.position.x, enemy.position.y + 0.5, enemy.position.z);
                        
                        // 计算射击方向向量（敌人指向玩家相机位置）
                        const dir = new THREE.Vector3();
                        dir.subVectors(playerPos, bullet.position).normalize();
                        
                        // 存储子弹的方向
                        bullet.userData = { direction: dir, lifeTime: 4.0 }; // 最多存活4秒防止内存泄漏
                        
                        scene.add(bullet);
                        enemyBullets.push(bullet);

                        // 重置冷却时间（2到3秒之间随机下一次开火）
                        enemy.userData.shootCooldown = Math.random() * 1 + 2;
                    }
                });

                // 3. 敌方子弹飞行动画与碰撞检测
                for (let i = enemyBullets.length - 1; i >= 0; i--) {
                    const bullet = enemyBullets[i];
                    
                    // 让子弹沿方向飞行
                    const bulletSpeed = 25.0; // 子弹速度
                    bullet.position.addScaledVector(bullet.userData.direction, bulletSpeed * delta);
                    
                    // 减少生命时间
                    bullet.userData.lifeTime -= delta;

                    // 判定子弹与玩家相机的距离（碰撞检测）
                    const distance = bullet.position.distanceTo(playerPos);
                    
                    if (distance < 1.2) { // 距离小于1.2说明击中了玩家
                        triggerDamageFlash(); // 屏幕闪红
                        
                        // 从场景和数组中移除子弹
                        scene.remove(bullet);
                        enemyBullets.splice(i, 1);
                        continue;
                    }

                    // 如果子弹超时没打中，自动销毁
                    if (bullet.userData.lifeTime <= 0) {
                        scene.remove(bullet);
                        enemyBullets.splice(i, 1);
                    }
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
