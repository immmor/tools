<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人成行 2D - 磁力协作篇</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            color: #fff;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin: 5px 0;
            color: #ff5e00;
            text-shadow: 2px 2px #000;
        }
        #instructions {
            margin-bottom: 10px;
            text-align: center;
            font-size: 14px;
            color: #ccc;
            line-height: 1.5;
        }
        canvas {
            background: #252525;
            border: 4px solid #ff5e00;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <h1>双人成行 (Mini 2D) - 磁力枷锁</h1>
    <div id="instructions">
        <strong>玩家1(红/正极+)</strong>: W A D 移动 | <strong>玩家2(蓝/负极-)</strong>: ↑ ← → 移动 <br>
        🧲 <strong>磁力规则</strong>：红方会被<strong>蓝色磁块</strong>吸引，蓝方会被<strong>红色磁块</strong>吸引！靠近时按住<strong>跳跃键</strong>可体验空中悬停/弹射！
    </div>
    
    <canvas id="gameCanvas" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const GRAVITY = 0.4;
const FRICTION = 0.85;

// 静态平台
const platforms = [
    { x: 0, y: 460, width: 800, height: 40 },   // 地面
    { x: 50, y: 320, width: 120, height: 20 },  // 左平台
    { x: 630, y: 320, width: 120, height: 20 }, // 右平台
    { x: 320, y: 160, width: 160, height: 20 }  // 终点大门平台
];

// 磁铁机关
const magnets = [
    { x: 250, y: 260, r: 25, type: 'blue', label: 'S (-)' }, // 吸引红方
    { x: 550, y: 260, r: 25, type: 'red', label: 'N (+)' }   // 吸引蓝方
];

// 终点大门
const door = { x: 385, y: 100, width: 30, height: 60 };

class Player {
    constructor(x, y, color, type, controls) {
        this.x = x;
        this.y = y;
        this.width = 24;
        this.height = 36;
        this.color = color;
        this.type = type; // 'red' (正极) 或 'blue' (负极)
        this.controls = controls;
        this.vx = 0;
        this.vy = 0;
        this.speed = 5;
        this.jumpForce = 11;
        this.grounded = false;
    }

    update(keys) {
        // 基础左右移动
        if (keys[this.controls.left])  { if (this.vx > -this.speed) this.vx--; }
        if (keys[this.controls.right]) { if (this.vx < this.speed) this.vx++; }

        // 磁力逻辑计算
        magnets.forEach(mag => {
            // 计算玩家中心到磁铁中心的距离
            const pX = this.x + this.width / 2;
            const pY = this.y + this.height / 2;
            const distX = mag.x - pX;
            const distY = mag.y - pY;
            const distance = Math.sqrt(distX * distX + distY * distY);

            // 异极相吸：红玩家被蓝磁铁吸，蓝玩家被红磁铁吸
            if ((this.type === 'red' && mag.type === 'blue') || (this.type === 'blue' && mag.type === 'red')) {
                if (distance < 180) { // 磁场感应范围
                    const force = (180 - distance) / 110; // 越近引力越大
                    this.vx += (distX / distance) * force;
                    this.vy += (distY / distance) * force * 1.2; // 略微加强垂直引力助跳
                    
                    // 绘制磁力线效果
                    ctx.beginPath();
                    ctx.strokeStyle = this.type === 'red' ? 'rgba(255, 71, 87, 0.4)' : 'rgba(30, 144, 255, 0.4)';
                    ctx.lineWidth = 2;
                    ctx.setLineDash([4, 4]);
                    ctx.moveTo(pX, pY);
                    ctx.lineTo(mag.x, mag.y);
                    ctx.stroke();
                    ctx.setLineDash([]); // 重置线段
                }
            }
        });

        // 物理应用
        this.vx *= FRICTION;
        this.vy += GRAVITY;

        // 跳跃
        if (keys[this.controls.up] && this.grounded) {
            this.vy = -this.jumpForce;
            this.grounded = false;
        }

        this.x += this.vx;
        this.y += this.vy;

        // 边界处理
        if (this.x < 0) this.x = 0;
        if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;

        // 平台碰撞
        this.grounded = false;
        for (let plat of platforms) {
            if (this.x < plat.x + plat.width &&
                this.x + this.width > plat.x &&
                this.y + this.height >= plat.y &&
                this.y + this.height - this.vy <= plat.y) {
                this.y = plat.y - this.height;
                this.vy = 0;
                this.grounded = true;
            }
        }
    }

    draw() {
        // 画身体
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        
        // 画头顶的磁极符号 (+ 或 -)
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 14px Arial';
        ctx.fillText(this.type === 'red' ? '+' : '-', this.x + 8, this.y - 4);

        // 画眼睛
        ctx.fillStyle = '#fff';
        if (this.vx >= 0) {
            ctx.fillRect(this.x + this.width - 7, this.y + 8, 4, 4);
        } else {
            ctx.fillRect(this.x + 3, this.y + 8, 4, 4);
        }
    }
}

// 初始化角色
const player1 = new Player(60, 400, '#ff4757', 'red', { up: 'KeyW', left: 'KeyA', right: 'KeyD' });
const player2 = new Player(710, 400, '#1e90ff', 'blue', { up: 'ArrowUp', left: 'ArrowLeft', right: 'ArrowRight' });

// 按键监听
const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

function isColliding(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

function gameLoop() {
    // 1. 擦除画布
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 2. 绘制大门
    ctx.strokeStyle = '#ffaa00';
    ctx.lineWidth = 3;
    ctx.strokeRect(door.x, door.y, door.width, door.height);
    ctx.fillStyle = 'rgba(255, 170, 0, 0.2)';
    ctx.fillRect(door.x, door.y, door.width, door.height);

    // 3. 绘制磁铁核心
    magnets.forEach(mag => {
        ctx.beginPath();
        ctx.arc(mag.x, mag.y, mag.r, 0, Math.PI * 2);
        ctx.fillStyle = mag.type === 'red' ? '#ff4757' : '#1e90ff';
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = '#fff';
        ctx.stroke();
        
        // 磁铁标签
        ctx.fillStyle = '#fff';
        ctx.font = '12px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(mag.label, mag.x, mag.y + 4);
        
        // 绘制微弱的磁场光圈
        ctx.beginPath();
        ctx.arc(mag.x, mag.y, 180, 0, Math.PI * 2);
        ctx.strokeStyle = mag.type === 'red' ? 'rgba(255,71,87,0.05)' : 'rgba(30,144,255,0.05)';
        ctx.stroke();
    });

    // 4. 更新和绘制玩家
    player1.update(keys);
    player2.update(keys);
    player1.draw();
    player2.draw();

    // 5. 绘制平台
    ctx.fillStyle = '#555';
    for (let plat of platforms) {
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
    }

    // 6. 胜利判定
    const p1InDoor = isColliding(player1, door);
    const p2InDoor = isColliding(player2, door);

    if (p1InDoor && p2InDoor) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffaa00';
        ctx.font = '40px Microsoft YaHei';
        ctx.textAlign = 'center';
        ctx.fillText('磁力关卡挑战成功！', canvas.width / 2, canvas.height / 2);
        ctx.font = '20px Microsoft YaHei';
        ctx.fillStyle = '#fff';
        ctx.fillText('完美的吸引力法则，你们通过了考验！', canvas.width / 2, canvas.height / 2 + 50);
        return; 
    }

    requestAnimationFrame(gameLoop);
}

// 启动
gameLoop();
</script>
</body>
</html>
