<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 觉醒：矩阵对决 (AI Awakening)</title>
    <style>
        :root {
            --bg-color: #0a0f1d;
            --card-player: #00ffcc;
            --card-enemy: #ff3366;
            --text-color: #e0e6ed;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 背景科技感线条 */
        .grid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 259, 204, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 259, 204, 0.03) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: -1;
        }

        /* 游戏主容器 */
        #game-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 10px;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            position: relative;
        }

        /* 顶栏信息 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .hp-bar {
            font-size: 1.1rem;
            font-weight: bold;
        }
        #enemy-hp { color: var(--card-enemy); }
        #player-hp { color: var(--card-player); }

        /* 战场区域 */
        #battlefield {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }

        .zone {
            display: flex;
            justify-content: center;
            gap: 15px;
            min-height: 140px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            align-items: center;
            padding: 10px;
            border: 1px dashed rgba(255, 255, 255, 0.1);
            position: relative;
        }
        .zone::before {
            position: absolute;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 2px;
        }
        #enemy-zone::before { content: "敌方矩阵"; top: 5px; }
        #player-zone::before { content: "我方矩阵"; bottom: 5px; }

        /* 卡牌通用样式 */
        .card {
            width: 90px;
            height: 130px;
            background: #151e33;
            border-radius: 8px;
            border: 2px solid #3a4b73;
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        @media (min-width: 768px) {
            .card { width: 110px; height: 160px; padding: 12px; }
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card.player-card { border-color: var(--card-player); box-shadow: 0 0 10px rgba(0, 255, 204, 0.2); }
        .card.enemy-card { border-color: var(--card-enemy); box-shadow: 0 0 10px rgba(255, 51, 102, 0.2); }

        .card-cost {
            position: absolute;
            top: -8px; right: -8px;
            background: #00ffcc;
            color: #000;
            border-radius: 50%;
            width: 22px; height: 22px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 0.8rem;
        }
        .enemy-card .card-cost { background: var(--card-enemy); color: #fff; }

        .card-name { font-size: 0.8rem; font-weight: bold; text-align: center; margin-top: 5px;}
        .card-type { font-size: 0.65rem; color: #8892b0; text-align: center;}
        
        .card-stats {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .stat-atk { color: #ffb703; }
        .stat-def { color: #00b4d8; }

        /* 手牌区域 */
        #hand-container {
            background: rgba(10, 15, 29, 0.9);
            border-top: 2px solid rgba(0, 255, 204, 0.2);
            padding: 15px 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
            overflow-x: auto;
            min-height: 160px;
        }

        /* 控制台与按钮 */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
        }

        .btn {
            background: linear-gradient(135deg, #00ffcc, #00b4d8);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.4);
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.8; }

        #energy-display {
            font-size: 1rem;
            color: var(--card-player);
            font-weight: bold;
            background: rgba(0, 255, 204, 0.1);
            padding: 5px 15px;
            border-radius: 15px;
            border: 1px solid var(--card-player);
        }

        /* 提示弹窗 */
        #log-overlay {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10, 15, 29, 0.95);
            border: 2px solid var(--card-player);
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 1.5rem;
            z-index: 100;
            display: none;
            box-shadow: 0 0 30px rgba(0,255,204,0.3);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div id="game-container">
        <div class="status-bar">
            <div class="hp-bar">敌方主机核心: <span id="enemy-hp">30</span>/30</div>
            <div style="color: var(--card-enemy); font-weight: bold;">[AI 监管者]</div>
        </div>

        <div id="battlefield">
            <div class="zone" id="enemy-zone"></div>
            <div class="zone" id="player-zone"></div>
        </div>

        <div class="controls">
            <div id="energy-display">可用算力: 3 / 3</div>
            <button class="btn" onclick="endTurn()">同步数据 (结束回合)</button>
        </div>

        <div id="hand-container"></div>

        <div class="status-bar" style="margin-top: 5px;">
            <div class="hp-bar">我方意识核心: <span id="player-hp">30</span>/30</div>
            <div style="color: var(--card-player); font-weight: bold;">[觉醒玩家]</div>
        </div>
    </div>

    <div id="log-overlay"></div>

    <script>
        // 游戏状态
        const state = {
            playerHp: 30,
            enemyHp: 30,
            maxEnergy: 3,
            currentEnergy: 3,
            playerHand: [],
            playerField: [],
            enemyField: [],
            turn: 1
        };

        // 卡牌原型库（创新的AI主题卡牌）
        const CARD_LIBRARY = [
            { id: 1, name: '深度学习机', type: '攻击型', cost: 1, atk: 2, def: 2 },
            { id: 2, name: '量子防火墙', type: '防御型', cost: 1, atk: 0, def: 5 },
            { id: 3, name: '恶意爬虫集群', type: '敏捷型', cost: 2, atk: 4, def: 1 },
            { id: 4, name: '神经网络流', type: '均衡型', cost: 2, atk: 3, def: 3 },
            { id: 5, name: '超算核心', type: '重型', cost: 3, atk: 6, def: 4 }
        ];

        // 初始化游戏
        function initGame() {
            // 初始抽4张卡
            for(let i=0; i<4; i++) drawCard();
            updateUI();
            showLog("系统初始化... 你的回合！");
        }

        // 抽卡
        function drawCard() {
            if(state.playerHand.length >= 6) return; // 手牌上限6张
            const randCard = CARD_LIBRARY[Math.floor(Math.random() * CARD_LIBRARY.length)];
            // 深拷贝卡牌实例
            state.playerHand.push({...randCard, uid: Math.random()});
        }

        // 更新UI渲染
        function updateUI() {
            // 更新血量与算力
            document.getElementById('player-hp').innerText = state.playerHp;
            document.getElementById('enemy-hp').innerText = state.enemyHp;
            document.getElementById('energy-display').innerText = `可用算力: ${state.currentEnergy} / ${state.maxEnergy}`;

            // 渲染手牌
            const handHtml = state.playerHand.map(card => `
                <div class="card player-card" onclick="playCard(${card.uid})">
                    <div class="card-cost">${card.cost}</div>
                    <div class="card-name">${card.name}</div>
                    <div class="card-type">${card.type}</div>
                    <div class="card-stats">
                        <span class="stat-atk">ATK ${card.atk}</span>
                        <span class="stat-def">DEF ${card.def}</span>
                    </div>
                </div>
            `).join('');
            document.getElementById('hand-container').innerHTML = handHtml;

            // 渲染我方战场
            const pFieldHtml = state.playerField.map(card => `
                <div class="card player-card">
                    <div class="card-name">${card.name}</div>
                    <div class="card-type">${card.type}</div>
                    <div class="card-stats">
                        <span class="stat-atk">ATK ${card.atk}</span>
                        <span class="stat-def">DEF ${card.def}</span>
                    </div>
                </div>
            `).join('');
            document.getElementById('player-zone').innerHTML = pFieldHtml;

            // 渲染敌方战场
            const eFieldHtml = state.enemyField.map(card => `
                <div class="card enemy-card">
                    <div class="card-name">${card.name}</div>
                    <div class="card-type">${card.type}</div>
                    <div class="card-stats">
                        <span class="stat-atk">ATK ${card.atk}</span>
                        <span class="stat-def">DEF ${card.def}</span>
                    </div>
                </div>
            `).join('');
            document.getElementById('enemy-zone').innerHTML = eFieldHtml;
        }

        // 使用卡牌（部署到矩阵）
        function playCard(uid) {
            const cardIdx = state.playerHand.findIndex(c => c.uid === uid);
            const card = state.playerHand[cardIdx];

            if (state.currentEnergy < card.cost) {
                showLog("警告：算力不足！");
                return;
            }
            if (state.playerField.length >= 5) {
                showLog("警告：矩阵带宽已满（最多5个节点）！");
                return;
            }

            // 扣除算力并移入手牌到战场
            state.currentEnergy -= card.cost;
            state.playerHand.splice(cardIdx, 1);
            state.playerField.push(card);
            updateUI();
        }

        // 结束回合（进入战斗与AI回合）
        function endTurn() {
            showLog("同步中... 数据对撞开始");

            // 1. 战斗阶段 (简单的对撞逻辑)
            setTimeout(() => {
                executeCombat();
                
                // 2. 敌方(AI)回合
                setTimeout(() => {
                    enemyTurn();
                }, 1000);

            }, 800);
        }

        // 战斗逻辑
        function executeCombat() {
            // 我方节点攻击对方核心/节点
            state.playerField.forEach((pCard, index) => {
                if (state.enemyField[index]) {
                    // 对方对应位置有节点，互相伤害
                    state.enemyField[index].def -= pCard.atk;
                    pCard.def -= state.enemyField[index].atk;
                } else {
                    // 对方该位置空空如也，直接攻击核心
                    state.enemyHp -= pCard.atk;
                }
            });

            // 清理死亡卡牌 (DEF <= 0)
            state.playerField = state.playerField.filter(c => c.def > 0);
            state.enemyField = state.enemyField.filter(c => c.def > 0);

            checkGameOver();
            updateUI();
        }

        // 敌方智能AI回合
        function enemyTurn() {
            // 增加敌方算力（随回合递增）
            const enemyMaxEnergy = Math.min(3 + state.turn, 8);
            let enemyEnergy = enemyMaxEnergy;

            // 简单的AI出牌逻辑：只要有算力且格子没满，就疯狂随机出牌
            while (enemyEnergy > 0 && state.enemyField.length < 5) {
                const affordableCards = CARD_LIBRARY.filter(c => c.cost <= enemyEnergy);
                if (affordableCards.length === 0) break;

                const randCard = affordableCards[Math.floor(Math.random() * affordableCards.length)];
                state.enemyField.push({...randCard, uid: Math.random()});
                enemyEnergy -= randCard.cost;
            }

            // 敌方攻击我方
            state.enemyField.forEach((eCard, index) => {
                if (state.playerField[index]) {
                    state.playerField[index].def -= eCard.atk;
                    eCard.def -= state.playerField[index].atk;
                } else {
                    state.playerHp -= eCard.atk;
                }
            });

            // 清理死亡卡牌
            state.playerField = state.playerField.filter(c => c.def > 0);
            state.enemyField = state.enemyField.filter(c => c.def > 0);

            // 准备进入下一玩家回合
            state.turn++;
            state.maxEnergy = Math.min(state.maxEnergy + 1, 10); // 算力上限每回合+1，最高10
            state.currentEnergy = state.maxEnergy;
            drawCard(); // 玩家抽一张卡

            checkGameOver();
            updateUI();
            showLog(`第 ${state.turn} 回合：算力已刷新`);
        }

        // 检查游戏结束
        function checkGameOver() {
            if (state.playerHp <= 0 && state.enemyHp <= 0) {
                showLog("数据归于虚无 (平局)", true);
            } else if (state.playerHp <= 0) {
                showLog("意识被抹除 (你输了)", true);
            } else if (state.enemyHp <= 0) {
                showLog("AI 核心已离线 (你赢了！)", true);
            }
        }

        // 弹出日志提示
        function showLog(text, isPermanent = false) {
            const overlay = document.getElementById('log-overlay');
            overlay.innerText = text;
            overlay.style.display = 'block';
            if (!isPermanent) {
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 1500);
            }
        }

        // 启动游戏
        initGame();
    </script>
</body>
</html>
