<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人成行 2D 网页版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #222;
            color: #fff;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin: 5px 0;
            color: #ffaa00;
            text-shadow: 2px 2px #000;
        }
        #instructions {
            margin-bottom: 10px;
            text-align: center;
            font-size: 14px;
            color: #aaa;
        }
        canvas {
            background: #333;
            border: 4px solid #555;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <h1>双人成行 (It Takes Two) - Mini 2D</h1>
    <div id="instructions">
        玩家1(红): W A D 移动 | 玩家2(蓝): ↑ ← → 移动 <br>
        <strong>提示：必须有一人踩住【绿色按钮】，【金色大门】才会开启。两人同时到达大门即可通关！</strong>
    </div>
    
    <canvas id="gameCanvas" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 游戏配置
const GRAVITY = 0.5;
const FRICTION = 0.8;

// 关卡元素
const platforms = [
    { x: 0, y: 460, width: 800, height: 400 }, // 地面
    { x: 100, y: 350, width: 150, height: 20 },
    { x: 550, y: 350, width: 150, height: 20 },
    { x: 300, y: 260, width: 200, height: 20 }, // 按钮平台
    { x: 350, y: 150, width: 100, height: 20 }  // 终点平台
];

const button = { x: 380, y: 250, width: 40, height: 10, pressed: false };
const door = { x: 385, y: 90, width: 30, height: 60, open: false };

// 玩家类
class Player {
    constructor(x, y, color, controls) {
        this.x = x;
        this.y = y;
        this.width = 25;
        this.height = 40;
        this.color = color;
        this.controls = controls;
        this.vx = 0;
        this.vy = 0;
        this.speed = 5;
        this.jumpForce = 12;
        this.grounded = false;
    }

    update(keys) {
        // 左右移动
        if (keys[this.controls.left]) {
            if (this.vx > -this.speed) this.vx--;
        }
        if (keys[this.controls.right]) {
            if (this.vx < this.speed) this.vx++;
        }

        // 摩擦力
        this.vx *= FRICTION;
        // 重力
        this.vy += GRAVITY;

        // 跳跃
        if (keys[this.controls.up] && this.grounded) {
            this.vy = -this.jumpForce;
            this.grounded = false;
        }

        // 物理位移
        this.x += this.vx;
        this.y += this.vy;

        // 边界限制
        if (this.x < 0) this.x = 0;
        if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;

        this.grounded = false;

        // 碰撞检测（平台）
        for (let plat of platforms) {
            if (this.x < plat.x + plat.width &&
                this.x + this.width > plat.x &&
                this.y + this.height >= plat.y &&
                this.y + this.height - this.vy <= plat.y) {
                // 踩在平台上
                this.y = plat.y - this.height;
                this.vy = 0;
                this.grounded = true;
            }
        }
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        
        // 画个小眼睛区分方向
        ctx.fillStyle = '#fff';
        if (this.vx >= 0) {
            ctx.fillRect(this.x + this.width - 8, this.y + 8, 5, 5);
        } else {
            ctx.fillRect(this.x + 3, this.y + 8, 5, 5);
        }
    }
}

// 实例化玩家
const player1 = new Player(50, 400, '#ff4757', { up: 'KeyW', left: 'KeyA', right: 'KeyD' });
const player2 = new Player(720, 400, '#1e90ff', { up: 'ArrowUp', left: 'ArrowLeft', right: 'ArrowRight' });

// 按键监听
const keys = {};
window.addEventListener('keydown', e => keys[e.code] = true);
window.addEventListener('keyup', e => keys[e.code] = false);

// 碰撞检测辅助函数
function isColliding(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

// 游戏主循环
function gameLoop() {
    // 1. 更新状态
    player1.update(keys);
    player2.update(keys);

    // 检测按钮是否被踩下
    button.pressed = isColliding(player1, button) || isColliding(player2, button);
    door.open = button.pressed;

    // 检测通关条件：门开启，且两名玩家都在门的位置
    const p1InDoor = isColliding(player1, door);
    const p2InDoor = isColliding(player2, door);

    // 2. 渲染画面
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 画平台
    ctx.fillStyle = '#666';
    for (let plat of platforms) {
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
    }

    // 画按钮
    ctx.fillStyle = button.pressed ? '#2ed573' : '#26af5f';
    ctx.fillRect(button.x, button.pressed ? button.y + 4 : button.y, button.width, button.pressed ? button.height - 4 : button.height);
    ctx.fillStyle = '#fff';
    ctx.font = '10px Arial';
    ctx.fillText("机关", button.x + 8, button.y - 5);

    // 画终点大门
    if (door.open) {
        ctx.strokeStyle = '#ffa500';
        ctx.lineWidth = 3;
        ctx.strokeRect(door.x, door.y, door.width, door.height);
        ctx.fillStyle = 'rgba(255, 165, 0, 0.2)';
        ctx.fillRect(door.x, door.y, door.width, door.height);
    } else {
        ctx.fillStyle = '#b33939';
        ctx.fillRect(door.x, door.y, door.width, door.height);
        ctx.fillStyle = '#fff';
        ctx.fillRect(door.x + 5, door.y + 25, 5, 5); // 门把手
    }

    // 画玩家
    player1.draw();
    player2.draw();

    // 判断输赢
    if (door.open && p1InDoor && p2InDoor) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffaa00';
        ctx.font = '40px Microsoft YaHei';
        ctx.textAlign = 'center';
        ctx.fillText('你们成功通关了！', canvas.width / 2, canvas.height / 2);
        ctx.font = '20px Microsoft YaHei';
        ctx.fillStyle = '#fff';
        ctx.fillText('完美配合，不愧是最佳搭档！', canvas.width / 2, canvas.height / 2 + 50);
        return; // 停止游戏循环
    }

    requestAnimationFrame(gameLoop);
}

// 启动游戏
gameLoop();
</script>
</body>
</html>
