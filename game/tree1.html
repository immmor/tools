<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小树长成参天大树动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #e0f7fa, #fffde7);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            overflow: hidden;
            padding-bottom: 50px;
        }

        /* 大地 */
        .ground {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: #8d6e63;
            border-top: 10px solid #4caf50;
            z-index: 10;
        }

        /* 树的容器 */
        .tree-container {
            position: relative;
            width: 200px;
            height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }

        /* 树干动画 */
        .trunk {
            position: relative;
            background: #5d4037;
            border-radius: 4px 4px 0 0;
            transform-origin: bottom center;
            animation: grow-trunk 6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* 树冠/树叶容器 */
        .canopy {
            position: absolute;
            bottom: 0; /* 初始在底部，随树干长高而被推上去 */
            display: flex;
            justify-content: center;
            align-items: center;
            animation: grow-canopy 6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* 单个树叶球体 */
        .leaf {
            position: absolute;
            background: #2e7d32;
            border-radius: 50%;
            opacity: 0;
            animation: show-leaves 4s 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* 不同的树叶堆叠出层次感 */
        .leaf-main { width: 180px; height: 180px; top: -150px; background: #2e7d32; z-index: 3; }
        .leaf-left { width: 140px; height: 140px; top: -110px; left: -100px; background: #388e3c; z-index: 2; }
        .leaf-right { width: 140px; height: 140px; top: -110px; right: -100px; background: #1b5e20; z-index: 2; }
        .leaf-top { width: 120px; height: 120px; top: -210px; background: #4caf50; z-index: 4; }

        /* --- 动画核心关键帧 --- */

        /* 树干生长：高度变高，宽度变粗 */
        @keyframes grow-trunk {
            0% {
                width: 4px;
                height: 0px;
            }
            30% {
                width: 8px;
                height: 100px;
            }
            70% {
                width: 16px;
                height: 250px;
            }
            100% {
                width: 24px;
                height: 320px;
            }
        }

        /* 树冠位移：随着树干的高度上升 */
        @keyframes grow-canopy {
            0% {
                bottom: 0px;
            }
            30% {
                bottom: 100px;
            }
            70% {
                bottom: 250px;
            }
            100% {
                bottom: 320px;
            }
        }

        /* 树叶生长：从无到有，带有一点弹簧膨胀效果 */
        @keyframes show-leaves {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                opacity: 0.9;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

    <div class="tree-container">
        <div class="canopy">
            <div class="leaf leaf-main"></div>
            <div class="leaf leaf-left"></div>
            <div class="leaf leaf-right"></div>
            <div class="leaf leaf-top"></div>
        </div>
        <div class="trunk"></div>
    </div>

    <div class="ground"></div>

</body>
</html>
