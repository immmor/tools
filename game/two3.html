<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人成行 2D - 时空分身篇</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #111;
            color: #fff;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin: 5px 0;
            color: #00ffcc;
            text-shadow: 2px 2px #000;
        }
        #instructions {
            margin-bottom: 10px;
            text-align: center;
            font-size: 14px;
            color: #ccc;
            line-height: 1.5;
        }
        canvas {
            background: #1a1a1a;
            border: 4px solid #00ffcc;
            box-shadow: 0 10px 30px rgba(0, 255, 204, 0.3);
        }
    </style>
</head>
<body>

    <h1>双人成行 (Mini 2D) - 时空异能</h1>
    <div id="instructions">
        <strong>玩家1(红)</strong>: W A D 移动，<strong>【Left Shift】</strong>留下1秒后倒流的时间残影<br>
        <strong>玩家2(蓝)</strong>: ↑ ← → 移动，<strong>【Enter】</strong>发射时空光波，可以将红方瞬间拉到自己身边！<br>
        ⚡ <strong>警告</strong>：避开中间的红色电网！两人齐心协力越过电网到达右上的金色大门吧！
    </div>
    
    <canvas id="gameCanvas" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const GRAVITY = 0.5;
const FRICTION = 0.8;

// 平台
const platforms = [
    { x: 0, y: 460, width: 350, height: 40 },   // 左地面
    { x: 450, y: 460, width: 350, height: 40 }, // 右地面
    { x: 100, y: 320, width: 150, height: 20 }, // 左高台
    { x: 550, y: 220, width: 200, height: 20 }  // 终点平台
];

// 障碍物：电网
const hazard = { x: 380, y: 150, width: 40, height: 350 };
// 终点大门
const door = { x: 700, y: 160, width: 30, height: 60 };

class Player {
    constructor(x, y, color, controls, id) {
        this.startX = x;
        this.startY = y;
        this.x = x;
        this.y = y;
        this.width = 24;
        this.height = 36;
        this.color = color;
        this.controls = controls;
        this.id = id;
        this.vx = 0;
        this.vy = 0;
        this.speed = 5;
        this.jumpForce = 12;
        this.grounded = false;
        
        // 玩家1专属：时间残影
        this.echo = null;
        this.echoTimer = 0;
    }

    reset() {
        this.x = this.startX;
        this.y = this.startY;
        this.vx = 0;
        this.vy = 0;
        this.echo = null;
    }

    update(keys) {
        if (keys[this.controls.left])  { if (this.vx > -this.speed) this.vx--; }
        if (keys[this.controls.right]) { if (this.vx < this.speed) this.vx++; }

        this.vx *= FRICTION;
        this.vy += GRAVITY;

        if (keys[this.controls.up] && this.grounded) {
            this.vy = -this.jumpForce;
            this.grounded = false;
        }

        this.x += this.vx;
        this.y += this.vy;

        // 边界限制
        if (this.x < 0) this.x = 0;
        if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
        if (this.y > canvas.height) this.reset();

        // 平台碰撞
        this.grounded = false;
        for (let plat of platforms) {
            if (this.x < plat.x + plat.width &&
                this.x + this.width > plat.x &&
                this.y + this.height >= plat.y &&
                this.y + this.height - this.vy <= plat.y) {
                this.y = plat.y - this.height;
                this.vy = 0;
                this.grounded = true;
            }
        }

        // 电网碰撞
        if (isColliding(this, hazard)) {
            this.reset();
        }

        // 玩家1专属：时间倒流逻辑
        if (this.id === 1) {
            if (this.echo) {
                this.echoTimer--;
                if (this.echoTimer <= 0) {
                    this.x = this.echo.x;
                    this.y = this.echo.y;
                    this.vx = 0;
                    this.vy = 0;
                    this.echo = null;
                }
            }
        }
    }

    draw() {
        // 画残影
        if (this.id === 1 && this.echo) {
            ctx.fillStyle = 'rgba(46, 213, 115, 0.4)';
            ctx.fillRect(this.echo.x, this.echo.y, this.width, this.height);
            // 连线
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(46, 213, 115, 0.2)';
            ctx.moveTo(this.x + this.width/2, this.y + this.height/2);
            ctx.lineTo(this.echo.x + this.width/2, this.echo.y + this.height/2);
            ctx.stroke();
        }

        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
    }
}

const player1 = new Player(50, 400, '#ff4757', { up: 'KeyW', left: 'KeyA', right: 'KeyD' }, 1);
const player2 = new Player(500, 400, '#1e90ff', { up: 'ArrowUp', left: 'ArrowLeft', right: 'ArrowRight' }, 2);

const keys = {};
let laserActive = false;
let laserTimer = 0;

window.addEventListener('keydown', e => {
    keys[e.code] = true;

    // 玩家1：触发时间残影
    if (e.code === 'ShiftLeft' && !player1.echo) {
        player1.echo = { x: player1.x, y: player1.y };
        player1.echoTimer = 60; // 1秒 (60帧)
    }

    // 玩家2：触发空间钩爪/传送
    if (e.code === 'Enter') {
        laserActive = true;
        laserTimer = 15; // 光波持续15帧
        
        // 计算蓝方到红方的距离
        const dist = Math.abs((player2.x + player2.width/2) - (player1.x + player1.width/2));
        // 如果红方在蓝方的左侧/可视范围内，且没有隔着太远，将其拉过来
        if (dist < 400) {
            player1.x = player2.x - 30;
            player1.y = player2.y;
            player1.vx = 0;
            player1.vy = 0;
            player1.echo = null; // 清除倒流
        }
    }
});
window.addEventListener('keyup', e => keys[e.code] = false);

function isColliding(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. 更新物理
    player1.update(keys);
    player2.update(keys);

    // 2. 绘制环境
    ctx.fillStyle = '#555';
    for (let plat of platforms) {
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
    }

    // 绘制电网障碍（闪烁红光）
    ctx.fillStyle = Math.sin(Date.now() / 100) > 0 ? '#ff4757' : '#ff6b81';
    ctx.fillRect(hazard.x, hazard.y, hazard.width, hazard.height);
    ctx.fillStyle = '#fff';
    ctx.font = '12px Arial';
    ctx.fillText("⚡ 高压电网 ⚡", hazard.x - 20, hazard.y - 10);

    // 绘制大门
    ctx.strokeStyle = '#ffaa00';
    ctx.lineWidth = 3;
    ctx.strokeRect(door.x, door.y, door.width, door.height);
    ctx.fillStyle = 'rgba(255, 170, 0, 0.2)';
    ctx.fillRect(door.x, door.y, door.width, door.height);

    // 3. 绘制技能特效 (蓝方传送光波)
    if (laserActive) {
        ctx.beginPath();
        ctx.strokeStyle = '#00d2d3';
        ctx.lineWidth = 4;
        ctx.moveTo(player2.x + player2.width/2, player2.y + player2.height/2);
        ctx.lineTo(player1.x + player1.width/2, player1.y + player1.height/2);
        ctx.stroke();
        
        laserTimer--;
        if (laserTimer <= 0) laserActive = false;
    }

    // 4. 绘制角色
    player1.draw();
    player2.draw();

    // 5. 胜利判定
    const p1InDoor = isColliding(player1, door);
    const p2InDoor = isColliding(player2, door);

    if (p1InDoor && p2InDoor) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ffcc';
        ctx.font = '40px Microsoft YaHei';
        ctx.textAlign = 'center';
        ctx.fillText('时空大冒险通关！', canvas.width / 2, canvas.height / 2);
        ctx.font = '20px Microsoft YaHei';
        ctx.fillStyle = '#fff';
        ctx.fillText('时间与空间的完美重合，干得漂亮！', canvas.width / 2, canvas.height / 2 + 50);
        return;
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
