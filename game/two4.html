<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>双人成行 2D - 大小重力协作篇</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            color: #fff;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        h1 {
            margin: 5px 0;
            color: #ffaa00;
            text-shadow: 2px 2px #000;
        }
        #instructions {
            margin-bottom: 10px;
            text-align: center;
            font-size: 14px;
            color: #ccc;
            line-height: 1.5;
        }
        canvas {
            background: #252525;
            border: 4px solid #ffaa00;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        }
    </style>
</head>
<body>

    <h1>双人成行 (Mini 2D) - 身形巨变</h1>
    <div id="instructions">
        <strong>玩家1(红)</strong>: W A D 移动，<strong>【Left Shift】</strong>切换 正常/微小 身形 (可通过窄道，无法触发重力)<br>
        <strong>玩家2(蓝)</strong>: ↑ ← → 移动，<strong>【Enter】</strong>切换 正常/巨大 身形 (极重，可通过重力升降梯)<br>
        合作：蓝方利用重量压下升降梯，红方缩小穿过窄道到达对岸！
    </div>
    
    <canvas id="gameCanvas" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const GRAVITY = 0.5;
const FRICTION = 0.8;

// 静态平台
const platforms = [
    { x: 0, y: 460, width: 250, height: 40 },   // 左地面
    { x: 350, y: 460, width: 450, height: 40 }, // 右地面
    { x: 250, y: 380, width: 100, height: 10 }, // 升降梯导轨
    { x: 50, y: 300, width: 150, height: 20 },  // 左高台
    { x: 350, y: 150, width: 450, height: 20 }, // 右上方平台 (终点)
    { x: 450, y: 350, width: 20, height: 110 }, // 升降梯旁的高墙
    { x: 450, y: 250, width: 20, height: 50 },  // 窄道高墙1
    { x: 450, y: 150, width: 20, height: 50 },  // 窄道高墙2
    { x: 470, y: 280, width: 100, height: 10 }, // 窄道平台
    { x: 600, y: 380, width: 100, height: 10 }, // 开关平台
];

// 重力升降梯
const elevator = { x: 250, y: 380, width: 100, height: 20, minY: 380, maxY: 460, currentY: 380, speed: 2, weightThreshold: 2.0 };
// 窄道开关 (红方专用)
const remoteSwitch = { x: 650, y: 370, width: 20, height: 10, pressed: false };
// 升降梯另一侧的开关 (红方按下后Cody才能过)
const doorSwitch = { x: 680, y: 140, width: 20, height: 10, open: false };
// 终点大门
const door = { x: 740, y: 90, width: 30, height: 60 };

class Player {
    constructor(x, y, color, controls, id) {
        this.startX = x;
        this.startY = y;
        this.x = x;
        this.y = y;
        this.width = 24;
        this.height = 36;
        this.normalWidth = 24;
        this.normalHeight = 36;
        this.tinyWidth = 12;
        this.tinyHeight = 18;
        this.hugeWidth = 48;
        this.hugeHeight = 72;
        this.color = color;
        this.controls = controls;
        this.id = id;
        this.vx = 0;
        this.vy = 0;
        this.speed = 5;
        this.jumpForce = 12;
        this.grounded = false;
        this.state = 'normal'; // 'normal', 'tiny', 'huge'
    }

    update(keys) {
        if (keys[this.controls.left])  { if (this.vx > -this.speed) this.vx--; }
        if (keys[this.controls.right]) { if (this.vx < this.speed) this.vx++; }

        this.vx *= FRICTION;
        this.vy += GRAVITY;

        if (keys[this.controls.up] && this.grounded) {
            this.vy = -this.jumpForce;
            this.grounded = false;
        }

        this.x += this.vx;
        this.y += this.vy;

        if (this.x < 0) this.x = 0;
        if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
        if (this.y > canvas.height) this.x = this.startX, this.y = this.startY;

        this.grounded = false;

        // 平台碰撞
        for (let plat of platforms) {
            this.checkPlatformCollision(plat);
        }

        // 升降梯碰撞 (它本身是个移动平台)
        this.checkElevatorCollision();

        // 窄道开关判定 (May专用)
        if (this.id === 1 && this.state === 'tiny' && isColliding(this, remoteSwitch)) {
            remoteSwitch.pressed = true;
        }

        // 终点开关判定 (May专用)
        if (this.id === 1 && this.state === 'normal' && isColliding(this, doorSwitch)) {
            doorSwitch.open = true;
        }
    }

    checkPlatformCollision(plat) {
        if (this.x < plat.x + plat.width &&
            this.x + this.width > plat.x &&
            this.y + this.height >= plat.y &&
            this.y + this.height - this.vy <= plat.y) {
            
            // May缩小后可以穿过平台窄道 (检查窄道)
            if (this.id === 1 && this.state === 'tiny' && (plat.x === 450 && (plat.y === 250 || plat.y === 150))) {
                 return; // May缩小后不与窄道高墙碰撞
            }

            // Cody变大后无法通过窄道 (检查窄道)
            if (this.id === 2 && this.state === 'huge' && plat.x === 450) {
                 // 变大后Cody碰到窄道高墙直接反弹
                 this.x -= this.vx * 2;
                 return;
            }

            this.y = plat.y - this.height;
            this.vy = 0;
            this.grounded = true;
        }
    }

    checkElevatorCollision() {
        if (this.x < elevator.x + elevator.width &&
            this.x + this.width > elevator.x &&
            this.y + this.height >= elevator.currentY &&
            this.y + this.height - this.vy <= elevator.currentY) {
            this.y = elevator.currentY - this.height;
            this.vy = 0;
            this.grounded = true;
        }
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        
        // 画个简单的标记区分
        ctx.fillStyle = '#fff';
        if (this.id === 1 && this.state === 'tiny') {
            ctx.font = '10px Arial';
            ctx.fillText("T", this.x + 2, this.y + 12);
        } else if (this.id === 2 && this.state === 'huge') {
            ctx.font = '20px Arial';
            ctx.fillText("H", this.x + 15, this.y + 45);
        }
    }
}

const player1 = new Player(50, 400, '#ff4757', { up: 'KeyW', left: 'KeyA', right: 'KeyD' }, 1);
const player2 = new Player(150, 400, '#1e90ff', { up: 'ArrowUp', left: 'ArrowLeft', right: 'ArrowRight' }, 2);

const keys = {};
window.addEventListener('keydown', e => {
    keys[e.code] = true;

    // 玩家1：切换身形 (正常/微小)
    if (e.code === 'ShiftLeft') {
        if (player1.state === 'normal') {
            player1.state = 'tiny';
            player1.width = player1.tinyWidth;
            player1.height = player1.tinyHeight;
            player1.speed = 3; // 缩小后速度变慢
        } else {
            // 只有在空旷地方才能变回
            player1.state = 'normal';
            player1.width = player1.normalWidth;
            player1.height = player1.normalHeight;
            player1.speed = 5;
        }
    }

    // 玩家2：切换身形 (正常/巨大)
    if (e.code === 'Enter') {
        if (player2.state === 'normal') {
            player2.state = 'huge';
            player2.width = player2.hugeWidth;
            player2.height = player2.hugeHeight;
            player2.speed = 3; // 变大后速度变慢
            player2.jumpForce = 15; // 变大后跳得更高
        } else {
            // 同样需要检查是否有空间变回
            player2.state = 'normal';
            player2.width = player2.normalWidth;
            player2.height = player2.normalHeight;
            player2.speed = 5;
            player2.jumpForce = 12;
        }
    }
});
window.addEventListener('keyup', e => keys[e.code] = false);

function isColliding(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. 更新玩家物理
    player1.update(keys);
    player2.update(keys);

    // 2. 更新升降梯逻辑
    let totalWeight = 0;
    if (player1.x + player1.width > elevator.x && player1.x < elevator.x + elevator.width && player1.y + player1.height >= elevator.currentY - 2) {
        totalWeight += (player1.state === 'huge' ? 2.0 : (player1.state === 'tiny' ? 0.1 : 1.0));
    }
    if (player2.x + player2.width > elevator.x && player2.x < elevator.x + elevator.width && player2.y + player2.height >= elevator.currentY - 2) {
        totalWeight += (player2.state === 'huge' ? 2.0 : (player2.state === 'tiny' ? 0.1 : 1.0));
    }

    if (totalWeight >= elevator.weightThreshold) {
        if (elevator.currentY < elevator.maxY) elevator.currentY += elevator.speed;
    } else {
        if (elevator.currentY > elevator.minY) elevator.currentY -= elevator.speed;
    }

    // 3. 绘制环境
    ctx.fillStyle = '#555';
    for (let plat of platforms) {
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
    }
    
    // 特别绘制管道窄道高墙
    ctx.fillStyle = '#333';
    ctx.fillRect(450, 250, 20, 50);
    ctx.fillRect(450, 150, 20, 50);

    // 绘制升降梯
    ctx.fillStyle = '#ff4500';
    ctx.fillRect(elevator.x, elevator.currentY, elevator.width, elevator.height);
    ctx.fillStyle = '#fff';
    ctx.font = '10px Arial';
    ctx.fillText("重力感应", elevator.x + 25, elevator.currentY + 12);

    // 绘制管道开关
    ctx.fillStyle = remoteSwitch.pressed ? '#2ed573' : '#26af5f';
    ctx.fillRect(remoteSwitch.x, remoteSwitch.y, remoteSwitch.width, remoteSwitch.height);
    ctx.fillStyle = '#fff';
    ctx.font = '10px Arial';
    ctx.fillText("开关", remoteSwitch.x + 1, remoteSwitch.y - 5);

    // 绘制终点开关
    ctx.fillStyle = doorSwitch.open ? '#2ed573' : '#26af5f';
    ctx.fillRect(doorSwitch.x, doorSwitch.y, doorSwitch.width, doorSwitch.height);
    ctx.fillStyle = '#fff';
    ctx.fillText("终点开关", doorSwitch.x - 15, doorSwitch.y - 5);

    // 绘制终点大门
    ctx.strokeStyle = '#ffaa00';
    ctx.lineWidth = 3;
    ctx.strokeRect(door.x, door.y, door.width, door.height);
    ctx.fillStyle = 'rgba(255, 170, 0, 0.2)';
    ctx.fillRect(door.x, door.y, door.width, door.height);

    // 4. 绘制玩家
    player1.draw();
    player2.draw();

    // 5. 胜利判定
    const p1InDoor = isColliding(player1, door);
    const p2InDoor = isColliding(player2, door);

    if (p1InDoor && p2InDoor && doorSwitch.open) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ffaa00';
        ctx.font = '40px Microsoft YaHei';
        ctx.textAlign = 'center';
        ctx.fillText('大小身形挑战成功！', canvas.width / 2, canvas.height / 2);
        ctx.font = '20px Microsoft YaHei';
        ctx.fillStyle = '#fff';
        ctx.fillText('完美的重量级配合！', canvas.width / 2, canvas.height / 2 + 50);
        return;
    }

    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
