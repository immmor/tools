<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER SLOT 2026</title>
    <style>
        :root {
            --neon-purple: #bc13fe;
            --neon-blue: #08f7fe;
            --neon-pink: #f900bf;
            --neon-green: #05f200;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: #05050a;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
            background-image: 
                radial-gradient(at 50% 0%, rgba(188, 19, 254, 0.15) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(8, 247, 254, 0.15) 0px, transparent 50%);
        }

        /* 游戏外壳 */
        .slot-machine {
            background: rgba(20, 20, 35, 0.85);
            border: 4px solid var(--neon-purple);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.3),
                        inset 0 0 20px rgba(188, 19, 254, 0.2);
            backdrop-filter: blur(10px);
            width: 450px;
            text-align: center;
            position: relative;
            transition: transform 0.1s ease;
        }

        /* 霓虹标题 */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
            animation: pulse 2s infinite alternate;
        }

        /* 仪表盘 */
        .dashboard {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
            background: rgba(0, 0, 0, 0.4);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-box {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--neon-blue);
            text-shadow: 0 0 5px rgba(8, 247, 254, 0.5);
        }

        #multiplier {
            color: var(--neon-pink);
            text-shadow: 0 0 5px rgba(249, 0, 191, 0.5);
        }

        /* 滚轮视窗 */
        .window-container {
            position: relative;
            margin-bottom: 30px;
        }

        .window-container::before, .window-container::after {
            content: '';
            position: absolute;
            left: 4px;
            right: 4px;
            height: 40px;
            z-index: 2;
            pointer-events: none;
        }
        .window-container::before {
            top: 4px;
            background: linear-gradient(to bottom, rgba(20,20,35,1), transparent);
        }
        .window-container::after {
            bottom: 4px;
            background: linear-gradient(to top, rgba(20,20,35,1), transparent);
        }

        .slots-window {
            display: flex;
            justify-content: space-between;
            background: #000;
            padding: 15px;
            border-radius: 16px;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px rgba(8, 247, 254, 0.2);
            overflow: hidden;
            height: 150px;
        }

        /* 单个滚轮轨道 */
        .reel-track {
            width: 30%;
            height: 100%;
            position: relative;
            overflow: hidden;
            background: #0a0a14;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* 真正滚动的条 */
        .reel-container {
            position: absolute;
            top: -120px; /* 初始对齐中间的元素 */
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .slot-item {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            transition: transform 0.1s;
        }

        /* 核心按钮 */
        .spin-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
            border: none;
            border-radius: 12px;
            padding: 16px;
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 0 15px var(--neon-pink);
            transition: all 0.2s ease;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .spin-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0 25px var(--neon-pink), inset 0 0 10px rgba(255,255,255,0.4);
        }

        .spin-btn:active:not(:disabled) {
            transform: translateY(1px);
        }

        .spin-btn:disabled {
            background: #333;
            box-shadow: none;
            color: #666;
            cursor: not-allowed;
        }

        /* 提示信息栏 */
        .msg-banner {
            margin-top: 20px;
            height: 24px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #aaa;
            transition: all 0.3s;
        }

        .win-flash {
            color: var(--neon-green) !important;
            text-shadow: 0 0 10px var(--neon-green);
            animation: bounce 0.5s ease infinite alternate;
        }

        /* 震动动画 */
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(0px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(2px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(2px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        @keyframes pulse {
            from { text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue); }
            to { text-shadow: 0 0 15px var(--neon-blue), 0 0 30px var(--neon-blue), 0 0 40px var(--neon-purple); }
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        /* 粒子背景特效 */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="slot-machine" id="machine">
        <h1>Cyber Slot</h1>
        
        <div class="dashboard">
            <div class="stat-box">
                <span class="stat-label">Credits</span>
                <span class="stat-value" id="credits">1000</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Multiplier</span>
                <span class="stat-value" id="multiplier">x1</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Cost</span>
                <span class="stat-value" style="color: #ffb800;">50</span>
            </div>
        </div>

        <div class="window-container">
            <div class="slots-window">
                <div class="reel-track">
                    <div class="reel-container" id="reel1"></div>
                </div>
                <div class="reel-track">
                    <div class="reel-container" id="reel2"></div>
                </div>
                <div class="reel-track">
                    <div class="reel-container" id="reel3"></div>
                </div>
            </div>
        </div>

        <button class="spin-btn" id="spin-trigger" onclick="startSpin()">SPIN</button>

        <div class="msg-banner" id="msg-display">READY TO WIN?</div>
    </div>

    <script>
        // 游戏配置
        const EMOJIS = ['💎', '🍒', '🍋', '🔔', '⭐', '7️⃣'];
        const SPIN_COST = 50;
        let currentCredits = 1000;
        let comboMultiplier = 1;
        let isSpinning = false;

        // 获取DOM节点
        const reelContainers = [
            document.getElementById('reel1'),
            document.getElementById('reel2'),
            document.getElementById('reel3')
        ];
        const creditsDisplay = document.getElementById('credits');
        const multiplierDisplay = document.getElementById('multiplier');
        const msgDisplay = document.getElementById('msg-display');
        const spinButton = document.getElementById('spin-trigger');
        const machine = document.getElementById('machine');

        // 初始化轮盘布局（每个轮盘生成前后缓存，用于制造循环滚动假象）
        function initReels() {
            reelContainers.forEach(reel => {
                reel.innerHTML = '';
                // 预先放入3个随机图标
                for(let i=0; i<3; i++) {
                    const item = document.createElement('div');
                    item.className = 'slot-item';
                    item.textContent = getRandomEmoji();
                    reel.appendChild(item);
                }
            });
        }

        function getRandomEmoji() {
            return EMOJIS[Math.floor(Math.random() * EMOJIS.length)];
        }

        // 核心抽奖逻辑
        async function startSpin() {
            if (isSpinning) return;
            
            // 检查余额
            if (currentCredits < SPIN_COST) {
                msgDisplay.textContent = "🚨 OUT OF CREDITS!";
                msgDisplay.style.color = "var(--neon-pink)";
                return;
            }

            // 扣除积分
            isSpinning = true;
            currentCredits -= SPIN_COST;
            creditsDisplay.textContent = currentCredits;
            spinButton.disabled = true;
            msgDisplay.textContent = "SPINNING...";
            msgDisplay.classList.remove('win-flash');
            msgDisplay.style.color = '#aaa';

            // 随机最终中奖结果
            const finalResults = [getRandomEmoji(), getRandomEmoji(), getRandomEmoji()];
            
            // 产生滚动动画
            const spinPromises = reelContainers.map((reel, index) => {
                return animateReel(reel, index, finalResults[index]);
            });

            // 等待所有轮盘停下
            await Promise.all(spinPromises);

            // 结算奖励
            evaluateResult(finalResults);
            isSpinning = false;
            spinButton.disabled = false;
        }

        // 操纵单个轮盘的动画机制
        function animateReel(reelContainer, reelIndex, targetEmoji) {
            return new Promise(resolve => {
                const itemHeight = 120; // 对应 css 里的高度
                const totalItems = 15 + (reelIndex * 5); // 后面的轮盘转更久
                
                // 构建一条临时的长滚动条
                const tempItems = [];
                // 填充随机过渡图标
                for(let i=0; i<totalItems - 2; i++) {
                    tempItems.push(getRandomEmoji());
                }
                // 倒数第二张放目标图标，刚好对齐中心视窗
                tempItems.push(targetEmoji);
                // 补充一张结尾垫底
                tempItems.push(getRandomEmoji());

                // 渲染到DOM中
                reelContainer.innerHTML = '';
                tempItems.forEach(emoji => {
                    const item = document.createElement('div');
                    item.className = 'slot-item';
                    item.textContent = emoji;
                    reelContainer.appendChild(item);
                });

                // 运动参数
                let currentTop = -120;
                const targetTop = -((totalItems - 2) * itemHeight);
                let speed = 2;
                const maxSpeed = 45;
                let step = 0;

                function scroll() {
                    step++;
                    // 模拟前段加速，后段减速
                    if (step < totalItems * 0.4 && speed < maxSpeed) {
                        speed += 2.5;
                    } else if (step > totalItems * 0.6 && speed > 6) {
                        speed -= 1.5;
                    }

                    currentTop -= speed;

                    // 到达或超过目标位置
                    if (currentTop <= targetTop) {
                        reelContainer.style.top = `-120px`;
                        // 净化结构，只保留最终可视的及前后各一个
                        reelContainer.innerHTML = `
                            <div class="slot-item">${getRandomEmoji()}</div>
                            <div class="slot-item">${targetEmoji}</div>
                            <div class="slot-item">${getRandomEmoji()}</div>
                        `;
                        resolve();
                    } else {
                        reelContainer.style.top = `${currentTop}px`;
                        requestAnimationFrame(scroll);
                    }
                }

                requestAnimationFrame(scroll);
            });
        }

        // 结果判定
        function evaluateResult(results) {
            const [r1, r2, r3] = results;
            
            // 触发机身微弱震动特效
            machine.style.animation = 'shake 0.3s ease';
            setTimeout(() => machine.style.style = '', 300);

            // 3个全中 (大奖)
            if (r1 === r2 && r2 === r3) {
                let baseWin = 0;
                if (r1 === '7️⃣') baseWin = 1000;
                else if (r1 === '💎') baseWin = 750;
                else if (r1 === '⭐') baseWin = 500;
                else baseWin = 300;

                const finalWin = baseWin * comboMultiplier;
                currentCredits += finalWin;
                
                msgDisplay.textContent = `💥 JACKPOT! +${finalWin} 💥`;
                msgDisplay.classList.add('win-flash');
                
                // 连胜倍率提升
                comboMultiplier++;
                createExplosion(); // 爆裂粒子效果
            } 
            // 任意2个相同 (小奖)
            else if (r1 === r2 || r2 === r3 || r1 === r3) {
                const finalWin = 100 * comboMultiplier;
                currentCredits += finalWin;
                msgDisplay.textContent = `🎉 MATCH TWO! +${finalWin}`;
                msgDisplay.style.color = "var(--neon-blue)";
                comboMultiplier++;
            } 
            // 没中
            else {
                msgDisplay.textContent = "TRY AGAIN";
                comboMultiplier = 1; // 连胜中断
            }

            // 更新显示
            creditsDisplay.textContent = currentCredits;
            multiplierDisplay.textContent = `x${comboMultiplier}`;
            machine.style.animation = ''; 
        }

        /* --- 背景炫酷画布粒子动效 --- */
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, isExplosion = false) {
                this.x = x;
                this.y = y;
                this.isExplosion = isExplosion;
                this.size = Math.random() * (isExplosion ? 4 : 2) + 1;
                this.speedX = isExplosion ? (Math.random() - 0.5) * 12 : (Math.random() - 0.5) * 1;
                this.speedY = isExplosion ? (Math.random() - 0.5) * 12 : -Math.random() * 1 - 0.2;
                this.color = isExplosion ? 
                    (['#08f7fe', '#f900bf', '#05f200'])[Math.floor(Math.random()*3)] : 
                    'rgba(188, 19, 254, 0.3)';
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.005;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if(this.isExplosion) {
                    this.alpha -= this.decay;
                }
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function createExplosion() {
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;
            for(let i=0; i<80; i++) {
                particles.push(new Particle(centerX, centerY, true));
            }
        }

        function initBackgroundParticles() {
            for(let i=0; i<40; i++) {
                particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height, false));
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 维持基础环境背景粒子数量
            if(particles.filter(p => !p.isExplosion).length < 50 && Math.random() < 0.1) {
                particles.push(new Particle(Math.random() * canvas.width, canvas.height + 10, false));
            }

            particles.forEach((p, index) => {
                p.update();
                p.draw();
                // 移除移出屏幕或透明度归零的粒子
                if (p.alpha <= 0 || p.y < -10 || p.x < -10 || p.x > canvas.width + 10) {
                    particles.splice(index, 1);
                }
            });
            requestAnimationFrame(animateParticles);
        }

        // 初始化
        initReels();
        initBackgroundParticles();
        animateParticles();

    </script>
</body>
</html>
