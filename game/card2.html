<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量子纠缠：无尽之域 (Quantum Entanglement)</title>
    <style>
        :root {
            --bg-color: #0a0a16;
            --panel-bg: rgba(255, 255, 255, 0.05);
            --blue-energy: #00e5ff;
            --red-energy: #ff0055;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 背景微光特效 */
        .background-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0,229,255,0.1) 0%, rgba(255,0,85,0.1) 50%, transparent 100%);
            transform: translate(-50%, -50%);
            z-index: -1;
            filter: blur(80px);
            animation: pulse 8s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.8); }
            100% { transform: translate(-50%, -50%) scale(1.2); }
        }

        /* 顶部仪表盘 */
        header {
            margin-top: 20px;
            text-align: center;
            width: 100%;
        }

        h1 {
            font-size: 24px;
            letter-spacing: 4px;
            margin: 0 0 10px 0;
            background: linear-gradient(45deg, var(--blue-energy), var(--red-energy));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 核心创新：量子天平显示 */
        .quantum-field {
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 300px;
        }

        .energy-display {
            font-size: 64px;
            font-weight: bold;
            font-family: monospace;
            text-shadow: 0 0 20px currentColor;
            transition: all 0.5s ease;
        }

        .status-text {
            font-size: 14px;
            color: #aaa;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* 战场区域 */
        .battleground {
            display: flex;
            justify-content: space-around;
            width: 90%;
            max-width: 1000px;
            margin: 20px 0;
        }

        .zone {
            background: rgba(255,255,255,0.02);
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 8px;
            width: 45%;
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            position: relative;
        }

        .zone::before {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }

        .player-zone::before { content: "蓝方量子域 (YOUR SIDE)"; }
        .ai-zone::before { content: "红方反物质域 (AI SIDE)"; }

        /* 卡牌样式 */
        .card {
            width: 100px;
            height: 140px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 12px;
            box-sizing: border-box;
            cursor: pointer;
            position: relative;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            user-select: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .card:hover {
            transform: translateY(-15px) scale(1.05);
        }

        /* 蓝色正卡 */
        .card.positive {
            background: linear-gradient(135deg, #005577 0%, #00e5ff 100%);
            border: 1px solid var(--blue-energy);
            box-shadow: 0 0 10px rgba(0,229,255,0.3);
        }

        /* 红色负卡 */
        .card.negative {
            background: linear-gradient(135deg, #770022 0%, #ff0055 100%);
            border: 1px solid var(--red-energy);
            box-shadow: 0 0 10px rgba(255,0,85,0.3);
            cursor: not-allowed; /* AI卡牌玩家不可点 */
        }

        .card .value {
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
        }

        .card .name {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card .desc {
            font-size: 10px;
            color: rgba(255,255,255,0.8);
            line-height: 1.2;
        }

        /* 玩家手牌区 */
        .hand-container {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .hand {
            display: flex;
            gap: 15px;
            height: 160px;
            align-items: flex-end;
        }

        /* 游戏结束弹窗 */
        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 22, 0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .overlay h2 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .btn {
            background: transparent;
            border: 2px solid #fff;
            color: #fff;
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 20px #fff;
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <header>
        <h1>QUANTUM ENTANGLEMENT</h1>
        <p style="color: #667; margin: 0;">让坍缩在你的正数阵营，或者保持动态平衡</p>
    </header>

    <div class="quantum-field">
        <div id="energyDisplay" class="energy-display" style="color: var(--blue-energy);">0</div>
        <div id="statusText" class="status-text">当前状态: 绝对零度 (平衡)</div>
    </div>

    <div class="battleground">
        <div class="zone player-zone" id="playerZone"></div>
        <div class="zone ai-zone" id="aiZone"></div>
    </div>

    <div class="hand-container">
        <div class="hand" id="playerHand"></div>
        <div style="font-size: 12px; color: #556;">点击卡牌向量子场注入能量 | 剩余回合: <span id="roundCount">5</span></div>
    </div>

    <div class="overlay" id="overlay">
        <h2 id="resultTitle">维面坍缩</h2>
        <p id="resultDesc" style="color: #aaa; margin-bottom: 30px;"></p>
        <button class="btn" onclick="initGame()">重新初始化粒子场</button>
    </div>

    <script>
        // 游戏状态
        let totalEnergy = 0;
        let roundsLeft = 5;
        const maxRounds = 5;

        // 卡牌库定义 (创新机制：特殊卡牌效果)
        const cardTemplates = [
            { name: '叠加态', value: 2, desc: '注入稳定正能量 +2' },
            { name: '激化子', value: 4, desc: '强力正能量脉冲 +4' },
            { name: '光子束', stroke: 1, value: 1, desc: '微弱能量修正 +1' },
            { name: '跃迁跃', value: 3, desc: '高能粒子轨道 +3' },
            { name: '纠缠态', value: 5, desc: '瞬时波函数引动 +5' }
        ];

        const aiTemplates = [
            { name: '反物质', value: -2, desc: '湮灭正能量 -2' },
            { name: '黑洞引力', value: -4, desc: '塌陷空间能量 -4' },
            { name: '熵增', value: -1, desc: '系统混乱无序 -1' },
            { name: '暗物质', value: -3, desc: '不可见负引力 -3' },
            { name: '虚空撕裂', value: -5, desc: '吞噬一切光芒 -5' }
        ];

        // 初始化游戏
        function initGame() {
            totalEnergy = 0;
            roundsLeft = maxRounds;
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('playerZone').innerHTML = '';
            document.getElementById('aiZone').innerHTML = '';
            updateUI();
            fillPlayerHand();
        }

        // 更新UI状态
        function updateUI() {
            const display = document.getElementById('energyDisplay');
            const status = document.getElementById('statusText');
            document.getElementById('roundCount').innerText = roundsLeft;

            display.innerText = (totalEnergy > 0 ? '+' : '') + totalEnergy;

            // 根据能量改变颜色和状态描述
            if (totalEnergy > 0) {
                display.style.color = 'var(--blue-energy)';
                status.innerText = '当前状态: 正能过载 (蓝方领先)';
            } else if (totalEnergy < 0) {
                display.style.color = 'var(--red-energy)';
                status.innerText = '当前状态: 负能湮灭 (红方领先)';
            } else {
                display.style.color = '#ffffff';
                status.innerText = '当前状态: 绝对零度 (量子平衡)';
            }
        }

        // 填充玩家手牌（保持5张）
        function fillPlayerHand() {
            const handDiv = document.getElementById('playerHand');
            handDiv.innerHTML = '';
            for (let i = 0; i < 5; i++) {
                const randCard = cardTemplates[Math.floor(Math.random() * cardTemplates.length)];
                const cardEl = document.createElement('div');
                cardEl.className = 'card positive';
                cardEl.innerHTML = `
                    <div class="value">+${randCard.value}</div>
                    <div class="name">${randCard.name}</div>
                    <div class="desc">${randCard.desc}</div>
                `;
                // 绑定出牌事件
                cardEl.onclick = () => playCard(randCard, cardEl);
                handDiv.appendChild(cardEl);
            }
        }

        // 玩家出牌逻辑
        function playCard(card, element) {
            if (roundsLeft <= 0) return;

            // 1. 将卡牌移至玩家战场区域
            const playerZone = document.getElementById('playerZone');
            playerZone.innerHTML = ''; // 清空上次的出牌
            const deployedCard = element.cloneNode(true);
            deployedCard.onclick = null; // 移除点击事件
            playerZone.appendChild(deployedCard);

            // 2. 计算能量变化
            totalEnergy += card.value;
            updateUI();

            // 3. 玩家出牌后，移除手牌并补一张新牌
            element.remove();
            setTimeout(() => {
                // 补牌
                const randCard = cardTemplates[Math.floor(Math.random() * cardTemplates.length)];
                const cardEl = document.createElement('div');
                cardEl.className = 'card positive';
                cardEl.innerHTML = `
                    <div class="value">+${randCard.value}</div>
                    <div class="name">${randCard.name}</div>
                    <div class="desc">${randCard.desc}</div>
                `;
                cardEl.onclick = () => playCard(randCard, cardEl);
                document.getElementById('playerHand').appendChild(cardEl);

                // 4. 触发 AI 自动反制
                aiTurn();
            }, 400);
        }

        // AI 反制逻辑（动态算法）
        function aiTurn() {
            const aiZone = document.getElementById('aiZone');
            aiZone.innerHTML = '';

            // AI 的智能决策：尝试让总能量逼近负数，或者在最后几个回合直接拉向极端
            let bestCard = aiTemplates[0];
            
            // 简单的AI评估：寻找让场面最有利（即让能量变负）的卡牌
            let minDiff = Infinity;
            aiTemplates.forEach(card => {
                let hypotheticalEnergy = totalEnergy + card.value;
                // AI喜欢负数，且接近0（诱导平局或险胜）或者极度负数
                if (hypotheticalEnergy < minDiff) {
                    bestCard = card;
                }
            });

            // 也有概率随机出，增加不确定性
            if(Math.random() > 0.7) {
                bestCard = aiTemplates[Math.floor(Math.random() * aiTemplates.length)];
            }

            // 渲染 AI 卡牌到战场
            const aiCardEl = document.createElement('div');
            aiCardEl.className = 'card negative';
            aiCardEl.innerHTML = `
                <div class="value">${bestCard.value}</div>
                <div class="name">${bestCard.name}</div>
                <div class="desc">${bestCard.desc}</div>
            `;
            
            setTimeout(() => {
                aiZone.appendChild(aiCardEl);
                totalEnergy += bestCard.value;
                roundsLeft--;
                updateUI();

                // 检查游戏是否结束
                if (roundsLeft <= 0) {
                    setTimeout(checkGameOver, 800);
                }
            }, 600);
        }

        // 胜负判定
        function checkGameOver() {
            const overlay = document.getElementById('overlay');
            const title = document.getElementById('resultTitle');
            const desc = document.getElementById('resultDesc');

            overlay.style.display = 'flex';

            if (totalEnergy === 0) {
                title.innerText = "★ 量子相消 (BALANCE) ★";
                title.style.color = "#ffffff";
                desc.innerText = `最终能量场精准归于 0。你成功完成了量子纠缠的最高境界——完美动态平衡，双方化为虚无（平局）。`;
            } else if (totalEnergy > 0) {
                title.innerText = "■ 物质界胜利 (VICTORY) ■";
                title.style.color = "var(--blue-energy)";
                desc.innerText = `最终能量保持在正数区 (+${totalEnergy})。正物质击溃了虚空，你成功稳定了现实维度！`;
            } else {
                title.innerText = "▲ 虚空吞噬 (DEFEAT) ▲";
                title.style.color = "var(--red-energy)";
                desc.innerText = `最终能量跌入负数区 (${totalEnergy})。反物质风暴席卷了战场，你的意识被湮灭在无尽深渊。`;
            }
        }

        // 启动游戏
        initGame();
    </script>
</body>
</html>
