<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵呜 Vegas - 4.0液态金属与全息水晶按钮军火库</title>
    <style>
        /* 演示背景：奢华的碳素暗夜背景，更能衬托出金属铬与全息光泽 */
        body {
            background-color: #030108;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 0;
            padding: 60px 20px;
            font-family: 'PingFang SC', sans-serif;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(138, 43, 226, 0.15) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(0, 245, 255, 0.08) 0%, transparent 45%);
        }

        .sandbox-title {
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(138, 43, 226, 0.6);
            text-align: center;
        }

        /* 奢华通透暗钛合金网格容器 */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1100px;
            width: 100%;
            background: rgba(10, 5, 20, 0.6);
            border: 1px solid rgba(138, 43, 226, 0.2);
            padding: 40px;
            border-radius: 28px;
            backdrop-filter: blur(20px);
            box-shadow: 
                0 25px 60px rgba(0, 0, 0, 0.8),
                inset 0 1px 1px rgba(255, 255, 255, 0.05);
        }

        .button-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 35px 20px;
            border-radius: 20px;
            transition: all 0.3s;
        }

        .button-item:hover {
            border-color: rgba(138, 43, 226, 0.3);
            background: rgba(255, 255, 255, 0.03);
        }

        .button-desc {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-align: center;
            line-height: 1.4;
        }

        /* =======================================================
           按钮 1：【主 CTA】液态流体银 · 熔融猫耳（首屏专属）
           ======================================================= */
        .btn-chrome-main {
            position: relative;
            /* 奢华的水银铬反光质感渐变 */
            background: linear-gradient(135deg, #ffffff 0%, #dcdcdc 25%, #999999 45%, #ffffff 55%, #555555 75%, #cccccc 100%);
            background-size: 400% 400%;
            border: none;
            color: #030108;
            padding: 16px 42px;
            font-size: 16px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.6),
                0 0 20px rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 1;
        }

        /* 液态金属猫耳：在按钮上方融出两个小水银滴 */
        .btn-chrome-main::before, .btn-chrome-main::after {
            content: '';
            position: absolute;
            width: 14px;
            height: 20px;
            background: inherit;
            border-radius: 45% 45% 0 0;
            top: 5px;
            opacity: 0;
            z-index: -1;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            filter: drop-shadow(0 -2px 5px rgba(255, 255, 255, 0.3));
        }
        .btn-chrome-main::before { left: 30px; transform: rotate(-25deg); }
        .btn-chrome-main::after { right: 30px; transform: rotate(25deg); }

        /* 鼠标悬停：背景产生水银流动的金属质感，猫耳拔地而起 */
        .btn-chrome-main:hover {
            transform: translateY(-2px) scale(1.03);
            background-position: 100% 100%;
            box-shadow: 
                0 15px 35px rgba(0, 0, 0, 0.8),
                0 0 30px rgba(255, 255, 255, 0.3);
        }
        
        .btn-chrome-main:hover::before { opacity: 1; top: -14px; transform: rotate(-35deg) scale(1.15); }
        .btn-chrome-main:hover::after { opacity: 1; top: -14px; transform: rotate(35deg) scale(1.15); }

        .btn-chrome-main:active {
            transform: scale(0.96);
        }


        /* =======================================================
           按钮 2：【YES 预测】全息镭射水晶 · 偏光扫射
           ======================================================= */
        .btn-holo-prism {
            position: relative;
            background: linear-gradient(135deg, rgba(20, 10, 40, 0.95), rgba(10, 5, 25, 0.95));
            border: 1px solid rgba(0, 245, 255, 0.3);
            color: #ffffff;
            padding: 14px 40px;
            font-size: 15px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            transition: all 0.3s;
        }

        /* 隐藏的折射镭射流光（彩虹偏光） */
        .btn-holo-prism::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(90deg, #00f5ff, #9d4edd, #ff007f, #00f5ff);
            background-size: 300% 100%;
            z-index: -1;
            opacity: 0.15;
            transition: opacity 0.3s;
        }

        /* 水平扫过的棱镜高亮线条 */
        .btn-holo-prism::after {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 100%; height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(0, 245, 255, 0.3) 10%,
                rgba(255, 0, 127, 0.3) 50%,
                transparent 100__
            );
            transform: skewX(-35deg);
            transition: none;
        }

        .btn-holo-prism:hover {
            color: #00f5ff;
            border-color: #00f5ff;
            box-shadow: 
                0 0 25px rgba(0, 245, 255, 0.3),
                inset 0 0 10px rgba(0, 245, 255, 0.1);
        }

        .btn-holo-prism:hover::before {
            opacity: 0.5;
            animation: holoFlow 3s linear infinite;
        }

        .btn-holo-prism:hover::after {
            left: 150%;
            transition: all 0.9s cubic-bezier(0.25, 1, 0.5, 1);
        }

        @keyframes holoFlow {
            0% { background-position: 0% 0%; }
            100% { background-position: 300% 0%; }
        }


        /* =======================================================
           按钮 3：【NO 预测】暗钛金属消隐 · 极简侧光灯
           ======================================================= */
        .btn-stealth-titanium {
            position: relative;
            background: linear-gradient(180deg, #181524 0%, #0d0b14 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.4);
            padding: 13px 40px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* 侧边隐藏的极细LED流光灯管 */
        .btn-stealth-titanium::after {
            content: '';
            position: absolute;
            left: 50%; bottom: 0;
            width: 0%; height: 2px;
            background: #ff007f;
            box-shadow: 0 0 12px #ff007f;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .btn-stealth-titanium:hover {
            color: #fff;
            border-color: rgba(255, 0, 127, 0.4);
            background: #14111f;
            box-shadow: 
                0 8px 25px rgba(0, 0, 0, 0.6),
                inset 0 1px 1px rgba(255, 255, 255, 0.08);
            transform: translateY(-1px);
        }

        /* 悬停时：底部的LED红色指示灯向两侧极速拉伸开机 */
        .btn-stealth-titanium:hover::after {
            left: 10%;
            width: 80%;
        }


        /* =======================================================
           按钮 4：【游戏大厅】全息气钻 · 水晶悬浮界面
           ======================================================= */
        .btn-quartz-crystal {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
            padding: 14px 36px;
            font-size: 15px;
            font-weight: 800;
            border-radius: 16px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 
                0 10px 25px rgba(0, 0, 0, 0.5),
                inset 0 1px 2px rgba(255, 255, 255, 0.15);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 四角高精度的折角边框指示线 */
        .btn-quartz-crystal::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            border: 1.5px solid #9d4edd;
            border-radius: 16px;
            clip-path: polygon(0 0, 15px 0, 0 15px, 100% 100%, calc(100% - 15px) 100%, 100% calc(100% - 15px));
            opacity: 0;
            transition: all 0.3s;
        }

        .btn-quartz-crystal:hover {
            color: #fff;
            background: rgba(157, 122, 255, 0.08);
            border-color: rgba(157, 122, 255, 0.3);
            box-shadow: 
                0 15px 35px rgba(157, 122, 255, 0.15),
                inset 0 1px 3px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        /* 悬停显示四角全息水晶对准线 */
        .btn-quartz-crystal:hover::before {
            opacity: 1;
            clip-path: polygon(0 0, 10px 0, 0 10px, 100% 100%, calc(100% - 10px) 100%, 100% calc(100% - 10px), 100% 0, 100% 10px, calc(100% - 10px) 0, 0 100%, 0 calc(100% - 10px), 100% 100%);
        }


        /* =======================================================
           按钮 5：【爆金 SPIN】流线拉丝 · 机械重力回弹
           ======================================================= */
        .btn-brushed-spin {
            position: relative;
            background: radial-gradient(circle at 50% 150%, #555 0%, #1a1a1a 80%);
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            color: #fff;
            padding: 16px 42px;
            font-size: 15px;
            font-weight: 900;
            letter-spacing: 1.5px;
            border-radius: 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 
                0 8px 25px rgba(0, 0, 0, 0.7),
                inset 0 2px 2px rgba(255, 255, 255, 0.05);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-brushed-spin .spin-arrow {
            font-size: 18px;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.5);
        }

        .btn-brushed-spin:hover {
            color: #ccff00;
            border-color: rgba(204, 255, 0, 0.4);
            background: radial-gradient(circle at 50% 150%, #6d8011 0%, #141a02 80%);
            box-shadow: 
                0 15px 35px rgba(204, 255, 0, 0.2),
                inset 0 2px 5px rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        /* 悬停时，齿轮/拉手图标高速顺时针自转充电 */
        .btn-brushed-spin:hover .spin-arrow {
            transform: rotate(360deg) scale(1.15);
        }

        .btn-brushed-spin:active {
            transform: scale(0.95) translateY(1px);
        }


        /* =======================================================
           按钮 6：【提现/下分】流汞充能 · 水银表面张力
           ======================================================= */
        .btn-mercury-fill {
            position: relative;
            background: #090611;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 14px 42px;
            font-size: 14px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            overflow: hidden;
            z-index: 1;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
            transition: all 0.4s;
        }

        /* 水银流体层 */
        .btn-mercury-fill::before {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -160%;
            width: 140%;
            height: 140%;
            background: linear-gradient(180deg, #ffffff 0%, #aaaaaa 100%);
            border-radius: 35%; /* 自转造成波浪涌动 */
            transform: translateX(-50%) rotate(0deg);
            transition: bottom 0.6s cubic-bezier(0.165, 0.84, 0.44, 1), transform 5s linear infinite;
            z-index: -1;
            box-shadow: inset 0 3px 8px rgba(255, 255, 255, 0.8);
        }

        .btn-mercury-fill:hover {
            color: #030108;
            font-weight: 900;
            border-color: #ffffff;
            box-shadow: 
                0 12px 30px rgba(255, 255, 255, 0.25),
                inset 0 0 10px rgba(255, 255, 255, 0.2);
        }

        /* 悬停时：水银流体液面自动上涨，并具有液态张力自转波动 */
        .btn-mercury-fill:hover::before {
            bottom: -20%;
            transform: translateX(-50%) rotate(360deg);
        }


        /* =======================================================
           按钮 7：【客服通道】镭射猫尾 · 全息偏光
           ======================================================= */
        .btn-laser-tail {
            position: relative;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .btn-laser-tail .laser-part {
            font-size: 18px;
            display: inline-block;
            transform-origin: bottom center;
            transition: transform 0.3s;
        }

        .btn-laser-tail:hover {
            color: #00f5ff;
            border-color: #00f5ff;
            background: rgba(0, 245, 255, 0.03);
            box-shadow: 
                0 10px 25px rgba(0, 245, 255, 0.2),
                inset 0 0 8px rgba(0, 245, 255, 0.1);
            transform: translateY(-2px);
        }

        /* 悬停时：彩虹全息猫咪摆动，并在极度高保真曲率下震颤 */
        .btn-laser-tail:hover .laser-part {
            animation: laserTailWhip 0.7s cubic-bezier(0.445, 0.05, 0.55, 0.95) infinite alternate;
        }

        @keyframes laserTailWhip {
            0% { transform: rotate(-12deg) scale(1.2); filter: drop-shadow(0 0 2px #ff007f); }
            100% { transform: rotate(20deg) scale(1.2); filter: drop-shadow(0 0 10px #00f5ff); }
        }
    </style>
</head>
<body>

    <div class="sandbox-title">🐾 MeowVegas - 4.0“液态流体金属与全息水晶”奢华按钮军火库 🐾</div>

    <div class="button-grid">
        
        <!-- 按钮 1 -->
        <div class="button-item">
            <button class="btn-chrome-main">
                接受猫娘的邀请 (ฅ•ω•ฅ)
            </button>
            <div class="button-desc">【主 CTA】水银液态流体铬材质<br>悬停顶部流出高反光 3D 融入猫耳</div>
        </div>

        <!-- 按钮 2 -->
        <div class="button-item">
            <button class="btn-holo-prism">
                YES · 确认买入 ⚡
            </button>
            <div class="button-desc">【YES 按钮】偏光镭射棱镜底衬<br>悬停时全息彩虹色带高速折射闪过</div>
        </div>

        <!-- 按钮 3 -->
        <div class="button-item">
            <button class="btn-stealth-titanium">
                NO · 放弃份额 ❄️
            </button>
            <div class="button-desc">【NO 按钮】黑钛合金拉丝哑光感<br>悬停底部隐藏的深粉 LED 瞬间开机开边</div>
        </div>

        <!-- 按钮 4 -->
        <div class="button-item">
            <button class="btn-quartz-crystal">
                启动喵呜游戏大厅
            </button>
            <div class="button-desc">【大厅启动】高纯度切割空气水晶<br>悬停高保真极光紫四角对准线合拢</div>
        </div>

        <!-- 按钮 5 -->
        <div class="button-item">
            <button class="btn-brushed-spin">
                <span>SPIN! 爆金老虎机</span>
                <span class="spin-arrow">⚙️</span>
            </button>
            <div class="button-desc">【老虎机 SPIN】重力机械拉丝齿盘<br>悬停自转充能并散发出高能极光绿背光</div>
        </div>

        <!-- 按钮 6 -->
        <div class="button-item">
            <button class="btn-mercury-fill">
                主人的提现控制台
            </button>
            <div class="button-desc">【提现下分】抗张力液态水银容器<br>悬停液态汞反光面自动灌满并旋转波动</div>
        </div>

        <!-- 按钮 7 -->
        <div class="button-item">
            <button class="btn-laser-tail">
                <span>召唤专属猫娘秘书</span>
                <span class="laser-part">🔮</span>
            </button>
            <div class="button-desc">【客服/浮动球】透明光纤对齐玻璃<br>悬停全息水晶产生霓虹交替的高频摇摆</div>
        </div>

    </div>

</body>
</html>
