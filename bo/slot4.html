<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魅惑萌虎机 ✨ Lucky Slots</title>
    <style>
        :root {
            --primary: #ff477e;
            --secondary: #ff85a2;
            --accent: #7000ff;
            --dark: #1a002c;
            --glow: 0 0 20px rgba(255, 71, 126, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0f001a, var(--dark));
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* 标题特效 */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--accent);
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 10px var(--primary), 0 0 20px var(--accent); }
            100% { transform: scale(1.05); text-shadow: 0 0 15px var(--secondary), 0 0 30px var(--primary); }
        }

        /* 老虎机主外壳 */
        .machine-container {
            position: relative;
            background: rgba(25, 10, 40, 0.85);
            border: 4px solid var(--primary);
            border-radius: 30px;
            padding: 30px;
            box-shadow: var(--glow), inset 0 0 20px rgba(112, 0, 255, 0.4);
            backdrop-filter: blur(10px);
            width: 360px;
            text-align: center;
        }

        /* 魅惑霓虹边框跑马灯 */
        .machine-container::before {
            content: '';
            position: absolute;
            top: -8px; left: -8px; right: -8px; bottom: -8px;
            border-radius: 36px;
            border: 4px dashed var(--secondary);
            animation: rotateLights 4s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateLights {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        /* 分数与提示栏 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--secondary);
            text-shadow: 0 0 5px rgba(255,133,162,0.5);
        }

        /* 滚轮区域 */
        .slots-window {
            display: flex;
            justify-content: space-between;
            background: #000;
            padding: 15px;
            border-radius: 20px;
            border: 3px solid var(--accent);
            box-shadow: inset 0 0 20px rgba(0,0,0,1), 0 0 15px rgba(112, 0, 255, 0.4);
            overflow: hidden;
            height: 120px;
        }

        .reel {
            width: 80px;
            height: 120px;
            background: linear-gradient(to bottom, #111, #222 50%, #111);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .symbol-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .symbol {
            height: 120px;
            line-height: 120px;
            font-size: 3.5rem;
            text-align: center;
            user-select: none;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
        }

        /* 炫酷按钮 */
        .spin-btn {
            margin-top: 30px;
            width: 80%;
            padding: 15px;
            font-size: 1.5rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(45deg, var(--primary), var(--accent));
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .spin-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(255, 71, 126, 0.7);
        }

        .spin-btn:active {
            transform: translateY(1px);
        }

        .spin-btn:disabled {
            background: #555;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* 获胜特效层 */
        .win-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 71, 126, 0.2);
            border-radius: 26px;
            display: none;
            pointer-events: none;
            animation: flash 0.5s infinite alternate;
            z-index: 10;
        }

        @keyframes flash {
            0% { opacity: 0; }
            100% { opacity: 1; border: 4px solid #fff; box-shadow: 0 0 30px #ff477e; }
        }

        /* 飘落桃心/粒子容器 */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }
        .particle {
            position: absolute;
            animation: fall linear forwards;
        }
        @keyframes fall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <h1>✨ 魅惑萌虎机 ✨</h1>
    
    <div class="machine-container">
        <div class="win-overlay" id="winOverlay"></div>
        
        <div class="status-bar">
            <span id="coinsDisplay">💖 积分: 100</span>
            <span id="msgDisplay" style="color: #fff;">来试试运气吧~</span>
        </div>

        <div class="slots-window">
            <div class="reel"><div class="symbol-container" id="reel1"></div></div>
            <div class="reel"><div class="symbol-container" id="reel2"></div></div>
            <div class="reel"><div class="symbol-container" id="reel3"></div></div>
        </div>

        <button class="spin-btn" id="spinBtn" onclick="spin()">💖 摇奖 SPIN! 💖</button>
    </div>

    <div class="particles" id="particlesContainer"></div>

    <script>
        // 可爱且带有一点魅惑属性的图标库
        const symbols = ['🐯', '🐱', '🦊', '💖', '💋', '🔮', '🎀', '🍒'];
        
        let coins = 100;
        let isSpinning = false;

        // Web Audio API 音效生成器 (无需加载外部音频文件)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'spin') {
                // 启动声音：向上滑音
                osc.type = 'sine';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15);
            } else if (type === 'stop') {
                // 刹车声：短促的Q弹音
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            } else if (type === 'win') {
                // 赢奖：欢快的双音符
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // C5
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // E5
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // G5
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
            } else if (type === 'jackpot') {
                // 大奖：连续快速上扬
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                osc.start(); osc.stop(audioCtx.currentTime + 0.5);
            }
        }

        // 初始化滚轮内容
        function initReels() {
            for (let i = 1; i <= 3; i++) {
                const container = document.getElementById(`reel${i}`);
                container.innerHTML = '';
                // 默认初始显示第一个图标
                const sym = document.createElement('div');
                sym.className = 'symbol';
                sym.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                container.appendChild(sym);
            }
        }

        // 制造粒子特效 (爱心与星星)
        function createParticle(isJackpot = false) {
            const container = document.getElementById('particlesContainer');
            const p = document.createElement('div');
            p.className = 'particle';
            p.innerText = isJackpot ? ['✨','💖','🐯','💰'][Math.floor(Math.random()*4)] : ['💖','🌸','✨'][Math.floor(Math.random()*3)];
            p.style.left = Math.random() * 100 + 'vw';
            p.style.fontSize = (Math.random() * 20 + 15) + 'px';
            p.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
            container.appendChild(p);
            setTimeout(() => p.remove(), 3000);
        }

        // 核心摇奖逻辑
        async function spin() {
            if (isSpinning || coins < 10) return;

            // 扣除积分
            coins -= 10;
            document.getElementById('coinsDisplay').innerText = `💖 积分: ${coins}`;
            document.getElementById('msgDisplay').innerText = "转动中... *奏乐*";
            document.getElementById('msgDisplay').style.color = "#fff";
            document.getElementById('winOverlay').style.display = 'none';
            
            isSpinning = true;
            document.getElementById('spinBtn').disabled = true;

            playSound('spin');

            const finalSymbols = [];
            const reelDuration = [1000, 1500, 2000]; // 每个滚轮转动的时间

            for (let i = 1; i <= 3; i++) {
                const container = document.getElementById(`reel${i}`);
                
                // 生成一长串随机图标用于滚动动画
                const scrollCount = 20; 
                container.innerHTML = '';
                
                // 最终停留的目标图标
                const targetSymbol = symbols[Math.floor(Math.random() * symbols.length)];
                finalSymbols.push(targetSymbol);

                for (let j = 0; j < scrollCount - 1; j++) {
                    const sym = document.createElement('div');
                    sym.className = 'symbol';
                    sym.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                    container.appendChild(sym);
                }
                
                // 把目标图标塞到最底部
                const targetSymDiv = document.createElement('div');
                targetSymDiv.className = 'symbol';
                targetSymDiv.innerText = targetSymbol;
                container.appendChild(targetSymDiv);

                // 运用过场动效实现高难度滚动
                container.style.transition = 'none';
                container.style.top = '0px';
                
                // 强制重绘
                container.offsetHeight; 

                // 开始往下抽动
                const targetTop = -(scrollCount - 1) * 120;
                container.style.transition = `top ${reelDuration[i-1]}ms cubic-bezier(0.25, 1, 0.5, 1)`;
                container.style.top = `${targetTop}px`;

                // 阶段性停下并响声音
                setTimeout(() => {
                    playSound('stop');
                }, reelDuration[i-1]);
            }

            // 等待所有滚轮停止
            await new Promise(resolve => setTimeout(resolve, 2200));

            // 判定结果
            const [s1, s2, s3] = finalSymbols;
            
            if (s1 === s2 && s2 === s3) {
                // 三连全中！
                let winAmount = 100;
                let msg = "🎉 绝赞大奖！太魅惑了！ +100";
                
                if (s1 === '🐯') {
                    winAmount = 250;
                    msg = "🐯 萌虎咆哮！终极爆奖！ +250";
                    playSound('jackpot');
                } else {
                    playSound('win');
                }

                coins += winAmount;
                document.getElementById('msgDisplay').innerText = msg;
                document.getElementById('msgDisplay').style.color = 'var(--secondary)';
                document.getElementById('winOverlay').style.display = 'block';

                // 爆出满屏爱心和粒子特效
                for(let k=0; k<40; k++) setTimeout(() => createParticle(true), k * 50);

            } else if (s1 === s2 || s2 === s3 || s1 === s3) {
                // 两连中
                coins += 20;
                document.getElementById('msgDisplay').innerText = "✨ 好运连连！再接再厉！ +20";
                document.getElementById('msgDisplay').style.color = '#ff85a2';
                playSound('win');
                
                for(let k=0; k<15; k++) createParticle(false);
            } else {
                // 没中
                document.getElementById('msgDisplay').innerText = "差一点点呢，再摸一把~";
            }

            document.getElementById('coinsDisplay').innerText = `💖 积分: ${coins}`;
            isSpinning = false;
            document.getElementById('spinBtn').disabled = false;

            // 破产保护机制
            if (coins < 10) {
                setTimeout(() => {
                    alert("哎呀，点数用光了！萌虎赠送你 50 额外积分~ 💖");
                    coins = 50;
                    document.getElementById('coinsDisplay').innerText = `💖 积分: ${coins}`;
                }, 500);
            }
        }

        // 初始化
        initReels();
    </script>
</body>
</html>
