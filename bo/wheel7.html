<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魅惑萌动大转盘 ✨</title>
    <style>
        :root {
            --primary-color: #ff477e;
            --secondary-color: #ff758f;
            --dark-purple: #2b1055;
            --neon-glow: #00f5d4;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, var(--dark-purple) 0%, #11052c 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--secondary-color);
            animation: pulse 1.5s infinite alternate;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 10px var(--primary-color); }
            100% { transform: scale(1.05); text-shadow: 0 0 25px var(--secondary-color), 0 0 5px #fff; }
        }

        /* 转盘外层容器 */
        .wheel-container {
            position: relative;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            padding: 15px;
            background: radial-gradient(circle, #ff2a74 0%, #3a0066 100%);
            box-shadow: 0 0 35px var(--primary-color), inset 0 0 20px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 外圈装饰小灯 */
        .decorations {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border-radius: 50%;
            pointer-events: none;
            animation: rotateLights 4s linear infinite;
        }

        @keyframes rotateLights {
            100% { transform: rotate(360deg); }
        }

        /* 实际转动的画布 */
        canvas {
            border-radius: 50%;
            background-color: #fff;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
            transition: transform 5s cubic-bezier(0.1, 0.8, 0.25, 1);
        }

        /* 魅惑爱心指针 */
        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 60px;
            z-index: 10;
            cursor: pointer;
            filter: drop-shadow(0 0 10px var(--neon-glow));
            transition: transform 0.1s;
        }
        .pointer:active {
            transform: translateX(-50%) scale(0.9);
        }

        /* 中心启动按钮 */
        .spin-btn {
            position: absolute;
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #ff007f 0%, #7928ca 100%);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 11;
            cursor: pointer;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(255,21,120,0.8), inset 0 0 10px rgba(255,255,255,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            user-select: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            transition: all 0.2s;
        }

        .spin-btn:hover {
            box-shadow: 0 0 30px var(--neon-glow);
            transform: translate(-50%, -50%) scale(1.05);
        }

        /* 特效画布：用于烟花粒子 */
        #fx-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        /* 弹窗样式 */
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(27, 6, 46, 0.95);
            border: 3px solid var(--primary-color);
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            z-index: 101;
            box-shadow: 0 0 40px var(--primary-color);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .popup.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .popup h2 {
            color: var(--neon-glow);
            margin-top: 0;
            font-size: 2rem;
        }
        
        .popup p {
            font-size: 1.5rem;
            margin: 15px 0;
        }

        .popup button {
            background: var(--primary-color);
            border: none;
            padding: 10px 25px;
            color: white;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
        }
    </style>
</head>
<body>

    <h1>✨ 乖乖，抽个奖吧 ✨</h1>

    <div class="wheel-container">
        <svg class="decorations" viewBox="0 0 100 100">
            <circle cx="50" cy="6" r="2" fill="#fff" />
            <circle cx="80" cy="15" r="2" fill="#ff007f" />
            <circle cx="94" cy="44" r="2" fill="#fff" />
            <circle cx="83" cy="76" r="2" fill="#00f5d4" />
            <circle cx="53" cy="94" r="2" fill="#fff" />
            <circle cx="21" cy="85" r="2" fill="#ff007f" />
            <circle cx="6" cy="56" r="2" fill="#fff" />
            <circle cx="15" cy="23" r="2" fill="#00f5d4" />
        </svg>

        <svg class="pointer" viewBox="0 0 32 36">
            <path d="M16,36 C16,36 32,22 32,11 C32,5 27,0 21,0 C17.5,0 16,3 16,3 C16,3 14.5,0 11,0 C5,0 0,5 0,11 C0,22 16,36 16,36 Z" fill="#ff0055"/>
        </svg>

        <canvas id="wheel" width="420" height="420"></canvas>

        <div class="spin-btn" id="spin-trigger">GO!</div>
    </div>

    <canvas id="fx-canvas"></canvas>

    <div class="popup" id="result-popup">
        <h2>🎉 恭喜小可爱 🎉</h2>
        <p id="prize-text">获得奖励</p>
        <button onclick="closePopup()">贴贴收下</button>
    </div>

<script>
    // --- 游戏配置 ---
    const prizes = [
        { text: "么么哒一个", color: "#ff758f" },
        { text: "清空购物车", color: "#3a0066" },
        { text: "奶茶一杯 🧋", color: "#ff477e" },
        { text: "主人的夸奖", color: "#2b1055" },
        { text: "神秘香吻 💋", color: "#ff0055" },
        { text: "再来一次 💫", color: "#11052c" },
        { text: "辣条一包 🌶️", color: "#7928ca" },
        { text: "深情拥抱 🤗", color: "#9d4edd" }
    ];

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spin-trigger');
    const popup = document.getElementById('result-popup');
    const prizeText = document.getElementById('prize-text');
    const fxCanvas = document.getElementById('fx-canvas');
    const fxCtx = fxCanvas.getContext('2d');

    let currentRotation = 0;
    let isSpinning = false;
    const numSegments = prizes.length;
    const segmentAngle = (2 * Math.PI) / numSegments;

    // --- 音效生成器 (使用 Web Audio API，无需外部音频文件) ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTickSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function playWinSound() {
        const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6 欢快和弦
        notes.forEach((freq, index) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + index * 0.1);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime + index * 0.1);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + index * 0.1 + 0.4);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + index * 0.1);
            osc.stop(audioCtx.currentTime + index * 0.1 + 0.4);
        });
    }

    // --- 绘制大转盘 ---
    function drawWheel() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const radius = canvas.width / 2;
        ctx.save();
        ctx.translate(radius, radius);

        for (let i = 0; i < numSegments; i++) {
            const angle = i * segmentAngle;
            
            // 绘制扇形
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.arc(0, 0, radius, angle, angle + segmentAngle);
            ctx.fillStyle = prizes[i].color;
            ctx.fill();
            ctx.lineWidth = 2;
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.stroke();

            // 绘制文字与小装饰
            ctx.save();
            ctx.rotate(angle + segmentAngle / 2);
            ctx.textAlign = "right";
            ctx.fillStyle = "#fff";
            ctx.font = "bold 16px sans-serif";
            ctx.shadowColor = "rgba(0,0,0,0.5)";
            ctx.shadowBlur = 4;
            // 加上可爱的小红心暗示
            ctx.fillText(prizes[i].text + " 💕", radius - 30, 6);
            ctx.restore();
        }
        ctx.restore();
    }

    // --- 抽奖逻辑 ---
    spinBtn.addEventListener('click', () => {
        if (isSpinning) return;
        isSpinning = true;

        // 随机一个圈数 (5-10圈) 加随机角度
        const baseRotations = 5 + Math.floor(Math.random() * 5);
        const randomTargetAngle = Math.random() * (2 * Math.PI);
        const totalTargetRotation = currentRotation + (baseRotations * 2 * Math.PI) + randomTargetAngle;

        const duration = 5000; // 5秒
        const startTime = performance.now();
        const startRotation = currentRotation;

        // 模拟转盘经过每个扇区的声音反馈
        let lastSegmentTriggered = -1;

        function animateWheel(now) {
            const elapsed = now - startTime;
            const progress = Math.min(elapsed / duration, 1);

            // 缓动函数: Cubic Ease-Out 动画由快变慢
            const easeOut = 1 - Math.pow(1 - progress, 3);
            currentRotation = startRotation + (totalTargetRotation - startRotation) * easeOut;
            
            canvas.style.transform = `rotate(${currentRotation}rad)`;

            // 计算当前指针停在哪个扇区（指针在正上方，即 -Math.PI / 2 处）
            const normalizedAngle = (2 * Math.PI - (currentRotation % (2 * Math.PI))) % (2 * Math.PI);
            const pointerAngle = (normalizedAngle - Math.PI / 2 + 2 * Math.PI) % (2 * Math.PI);
            const currentSegment = Math.floor(pointerAngle / segmentAngle);

            if (currentSegment !== lastSegmentTriggered) {
                playTickSound();
                lastSegmentTriggered = currentSegment;
            }

            if (progress < 1) {
                requestAnimationFrame(animateWheel);
            } else {
                isSpinning = false;
                // 正确计算最终中奖项
                const finalAngle = (2 * Math.PI - (currentRotation % (2 * Math.PI))) % (2 * Math.PI);
                const winningIndex = Math.floor(((finalAngle - Math.PI / 2 + 2 * Math.PI) % (2 * Math.PI)) / segmentAngle);
                
                showResult(prizes[winningIndex].text);
            }
        }
        requestAnimationFrame(animateWheel);
    });

    // --- 结果展示 & 烟花粒子特效 ---
    let particles = [];
    function showResult(text) {
        playWinSound();
        prizeText.innerText = `✨ 【${text}】 ✨`;
        popup.classList.add('show');
        
        // 触发粒子特效
        initFireworks();
    }

    function closePopup() {
        popup.classList.remove('show');
        particles = []; // 清空粒子
    }

    // --- 粒子特效系统 ---
    function initFireworks() {
        resizeFxCanvas();
        for (let i = 0; i < 80; i++) {
            particles.push({
                x: fxCanvas.width / 2,
                y: fxCanvas.height / 2,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10 - 2,
                color: `hsl(${Math.random() * 360}, 100%, 60%)`,
                radius: Math.random() * 4 + 2,
                alpha: 1,
                decay: Math.random() * 0.015 + 0.01
            });
        }
        if(particles.length > 0) requestAnimationFrame(updateParticles);
    }

    function updateParticles() {
        if (particles.length === 0) return;
        fxCtx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);

        particles.forEach((p, index) => {
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.1; // 重力效果
            p.alpha -= p.decay;

            fxCtx.save();
            fxCtx.globalAlpha = p.alpha;
            fxCtx.fillStyle = p.color;
            fxCtx.beginPath();
            fxCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            fxCtx.fill();
            fxCtx.restore();

            if (p.alpha <= 0) {
                particles.splice(index, 1);
            }
        });

        if (particles.length > 0) {
            requestAnimationFrame(updateParticles);
        }
    }

    function resizeFxCanvas() {
        fxCanvas.width = window.innerWidth;
        fxCanvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeFxCanvas);

    // 初始化运行
    drawWheel();
</script>
</body>
</html>
