<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魅惑萌虎 - 炫酷老虎机</title>
    <style>
        :root {
            --primary: #ff2a74;
            --secondary: #8a2be2;
            --accent: #00ffff;
            --dark: #120c1f;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0d0614 0%, #220636 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* 霓虹背景装饰 */
        .bg-glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 42, 116, 0.15) 0%, rgba(138, 43, 226, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        /* 老虎机外壳 */
        .machine-container {
            position: relative;
            z-index: 1;
            background: rgba(25, 10, 40, 0.85);
            border: 6px solid var(--primary);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(255, 42, 116, 0.5),
                        inset 0 0 20px rgba(138, 43, 226, 0.6);
            backdrop-filter: blur(10px);
            text-align: center;
            width: 450px;
            box-sizing: border-box;
        }

        /* 魅惑霓虹标题 */
        h1 {
            margin: 0 0 20px 0;
            font-size: 2.2rem;
            color: #fff;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--secondary);
            letter-spacing: 2px;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { text-shadow: 0 0 10px var(--primary), 0 0 20px var(--secondary); }
            100% { text-shadow: 0 0 15px var(--accent), 0 0 30px var(--primary); }
        }

        /* 视窗区域 */
        .slots-window {
            display: flex;
            justify-content: space-between;
            background: #05020a;
            padding: 15px;
            border-radius: 20px;
            border: 3px solid var(--secondary);
            box-shadow: inset 0 0 15px rgba(0,0,0,1);
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        /* 闪烁跑马灯边框 */
        .slots-window::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 2px dashed var(--accent);
            opacity: 0.5;
            border-radius: 17px;
            animation: blink 0.5s infinite;
            pointer-events: none;
        }

        @keyframes blink {
            50% { opacity: 0.1; }
        }

        /* 单个滚轮轨道 */
        .reel-container {
            width: 100px;
            height: 120px;
            background: linear-gradient(to bottom, #1a0b2e, #2a164d);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            position: relative;
        }

        /* 滚动条卷轴 */
        .reel {
            display: flex;
            flex-direction: column;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transition: top 0s cubic-bezier(0.1, 0.8, 0.1, 1);
        }

        /* 每一个图标 */
        .slot-item {
            width: 100%;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            user-select: none;
            text-shadow: 0 0 10px rgba(255,255,255,0.3);
            box-sizing: border-box;
        }

        /* 状态控制与控制台 */
        .control-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .score-board {
            font-size: 1.2rem;
            color: var(--accent);
            text-shadow: 0 0 5px var(--accent);
            font-weight: bold;
        }

        /* 炫酷拉杆/按钮 */
        .spin-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 42, 116, 0.4),
                        0 0 20px rgba(138, 43, 226, 0.4);
            transition: all 0.2s ease;
            outline: none;
            letter-spacing: 1px;
        }

        .spin-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255, 42, 116, 0.6),
                        0 0 30px var(--accent);
        }

        .spin-btn:active {
            transform: scale(0.95);
        }

        .spin-btn:disabled {
            background: #444;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* 提示信息 */
        .msg {
            height: 24px;
            font-size: 1.1rem;
            color: #ff9dcc;
            font-weight: 500;
        }

        /* 获胜粒子/中奖动效 */
        @keyframes win-glow {
            0%, 100% { box-shadow: 0 0 30px rgba(255, 42, 116, 0.5); }
            50% { box-shadow: 0 0 50px var(--accent), inset 0 0 30px var(--accent); }
        }
        .win-active {
            animation: win-glow 0.4s ease 5;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="machine-container" id="machine">
        <h1>🐯 魅惑萌虎 💖</h1>
        
        <div class="slots-window">
            <div class="reel-container"><div class="reel" id="reel1"></div></div>
            <div class="reel-container"><div class="reel" id="reel2"></div></div>
            <div class="reel-container"><div class="reel" id="reel3"></div></div>
        </div>

        <div class="control-panel">
            <div class="score-board">✨ 萌虎币: <span id="coins">100</span></div>
            <button class="spin-btn" id="spinBtn" onclick="startSpin()">✨ 摇奖! ✨</button>
            <div class="msg" id="message">投币 10 即可摇奖一次哦~</div>
        </div>
    </div>

<script>
    // 可爱魅惑的图标库
    const items = ['🐯', '🐱', '💋', '🍒', '💎', '🔥', '👑'];
    // 每一个滚轮内预设的伪滚动循环元素数量
    const itemsPerReel = 30; 
    
    let coins = 100;
    let isSpinning = false;
    
    // 音频上下文（原生合成音效）
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    // 播放音效函数
    function playSound(type) {
        if (!audioCtx) return;
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'spin') {
            // 滚动音效：频率逐渐下降的哔哔声
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
            gain.gain.setValueAtTime(0.1, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        } else if (type === 'stop') {
            // 停下音效：短促的清脆音
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, now);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'win') {
            // 中奖音效：欢快的和弦/上升音调
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.setValueAtTime(600, now + 0.1);
            osc.frequency.setValueAtTime(800, now + 0.2);
            osc.frequency.exponentialRampToValueAtTime(1200, now + 0.5);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else if (type === 'lose') {
            // 没中奖：略带滑稽的降调
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.linearRampToValueAtTime(80, now + 0.4);
            gain.gain.setValueAtTime(0.15, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.4);
            osc.start(now);
            osc.stop(now + 0.4);
        }
    }

    // 初始化滚轮数据
    function initReels() {
        for (let i = 1; i <= 3; i++) {
            const reel = document.getElementById(`reel${i}`);
            let html = '';
            // 随机填充初始图标
            for (let j = 0; j < itemsPerReel; j++) {
                const randomItem = items[Math.floor(Math.random() * items.length)];
                html += `<div class="slot-item">${randomItem}</div>`;
            }
            reel.innerHTML = html;
            // 初始对齐到倒数第三个（也就是视觉上显示的那个位置）
            reel.style.top = `-${(itemsPerReel - 1) * 120}px`;
        }
    }

    // 摇奖主逻辑
    function startSpin() {
        if (isSpinning) return;
        initAudio(); // 确保用户交互后激活音频容器
        
        if (coins < 10) {
            document.getElementById('message').innerText = "❌ 萌虎币不够啦！客官下次再来~";
            return;
        }

        // 扣除硬币
        coins -= 10;
        document.getElementById('coins').innerText = coins;
        document.getElementById('message').innerText = "🐯 萌虎摇摆中... 嗷呜~";
        
        isSpinning = true;
        document.getElementById('spinBtn').disabled = true;
        document.getElementById('machine').classList.remove('win-active');

        // 播放滚动音效循环
        const spinSoundInterval = setInterval(() => {
            if(isSpinning) playSound('spin');
        }, 150);

        const finalResults = [];

        // 针对3个滚轮分别设置不同的滚动动画时间和最终落点
        for (let i = 1; i <= 3; i++) {
            const reel = document.getElementById(`reel${i}`);
            
            // 产生一个随机的最终停盘图标
            const finalChoiceIndex = Math.floor(Math.random() * items.length);
            const finalItem = items[finalChoiceIndex];
            finalResults.push(finalItem);

            // 把倒数第一个格子的内容强制换成这个最终图标
            reel.children[0].innerText = finalItem;

            // 动态利用 CSS transition 模拟缓动动画
            // 第1轴最快停，第3轴最慢，形成错落感
            const duration = 1.5 + (i * 0.6); 
            reel.style.transition = `top ${duration}s cubic-bezier(0.25, 1, 0.25, 1)`;
            
            // 滚回顶部（也就是到我们刚刚设定好的目标格）
            reel.style.top = '0px';

            // 动画结束后复位，并播放刹车音效
            setTimeout(() => {
                playSound('stop');
                
                // 悄悄地把位置重新归位到尾部，保持下一次还可以往下滚动
                reel.style.transition = 'none';
                
                // 将全盘重新随机洗牌，但保留最后一个格子的当前状态
                let html = `<div class="slot-item">${finalItem}</div>`;
                for (let j = 1; j < itemsPerReel; j++) {
                    const randomItem = items[Math.floor(Math.random() * items.length)];
                    html += `<div class="slot-item">${randomItem}</div>`;
                }
                reel.innerHTML = html;
                reel.style.top = `-${(itemsPerReel - 1) * 120}px`;

                // 当最后一个轴也停下来时，结算奖励
                if (i === 3) {
                    clearInterval(spinSoundInterval);
                    checkResult(finalResults);
                }
            }, duration * 1000);
        }
    }

    // 检查是否中奖
    function checkResult(results) {
        isSpinning = false;
        document.getElementById('spinBtn').disabled = false;

        const [r1, r2, r3] = results;

        if (r1 === r2 && r2 === r3) {
            // 三连全中！
            let winAmount = 100;
            if (r1 === '🐯') winAmount = 200; // 萌虎大奖翻倍！
            
            coins += winAmount;
            document.getElementById('coins').innerText = coins;
            document.getElementById('message').innerText = `🎉 哇！绝赞三连 [${r1}]！暴赚 ${winAmount} 币！`;
            document.getElementById('machine').classList.add('win-active');
            playSound('win');
        } else if (r1 === r2 || r2 === r3 || r1 === r3) {
            // 两连中，小奖
            coins += 20;
            document.getElementById('coins').innerText = coins;
            document.getElementById('message').innerText = `💖 贴贴！两符号相同，小赚 20 币~`;
            playSound('win');
        } else {
            // 没中
            document.getElementById('message').innerText = "💋 哎呀，差一点点就迷倒我了呢，再试一次？";
            playSound('lose');
        }
    }

    // 页面加载完成后初始化
    window.onload = initReels;
</script>

</body>
</html>
