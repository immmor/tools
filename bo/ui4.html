<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵呜 Vegas - 3.0极光果冻肉垫按钮军火库</title>
    <style>
        /* 演示背景：温润的深夜极光渐变，烘托Q弹轻拟物按钮 */
        body {
            background-color: #0b071e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 0;
            padding: 60px 20px;
            font-family: 'PingFang SC', sans-serif;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 105, 180, 0.12) 0%, transparent 45%),
                radial-gradient(circle at 90% 80%, rgba(0, 245, 255, 0.08) 0%, transparent 45%);
        }

        .sandbox-title {
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
            text-align: center;
        }

        /* 升级为超通透的空气感网格容器 */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 32px;
            backdrop-filter: blur(20px);
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .button-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 35px 20px;
            border-radius: 24px;
            transition: all 0.3s;
        }

        .button-item:hover {
            border-color: rgba(255, 105, 180, 0.2);
            background: rgba(255, 255, 255, 0.03);
        }

        .button-desc {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-align: center;
            line-height: 1.4;
        }

        /* =======================================================
           按钮 1：【主 CTA】果冻猫耳 · 充气膨胀按钮
           ======================================================= */
        .btn-jelly-main {
            position: relative;
            background: linear-gradient(135deg, #ff5eb6, #ff1493);
            border: none;
            color: #fff;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            /* 拟物投影：柔和的双重阴影 */
            box-shadow: 
                0 10px 25px rgba(255, 20, 147, 0.4),
                inset 0 -4px 10px rgba(0, 0, 0, 0.2),
                inset 0 4px 10px rgba(255, 255, 255, 0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 顶部隐藏的Q弹气球猫耳 */
        .btn-jelly-main::before, .btn-jelly-main::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: #ff5eb6;
            border-radius: 50% 50% 0 50%;
            top: 2px;
            opacity: 0;
            z-index: -1;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 2px 5px rgba(255, 255, 255, 0.4);
        }
        .btn-jelly-main::before { left: 25px; transform: rotate(-15deg); }
        .btn-jelly-main::after { right: 25px; border-radius: 50% 50% 50% 0; transform: rotate(15deg); }

        /* 鼠标悬停：像充足气一样膨胀，猫耳Q弹地顶出来 */
        .btn-jelly-main:hover {
            transform: scale(1.06) translateY(-2px);
            box-shadow: 
                0 15px 30px rgba(255, 20, 147, 0.6),
                inset 0 -2px 6px rgba(0, 0, 0, 0.2),
                inset 0 4px 12px rgba(255, 255, 255, 0.5);
        }
        .btn-jelly-main:hover::before { opacity: 1; top: -12px; transform: rotate(-35deg) scale(1.2); }
        .btn-jelly-main:hover::after { opacity: 1; top: -12px; transform: rotate(35deg) scale(1.2); }

        /* 点击压扁反馈 */
        .btn-jelly-main:active {
            transform: scale(0.95) translateY(1px);
        }


        /* =======================================================
           按钮 2：【YES 预测】果冻青柠 · 光波荡漾按钮
           ======================================================= */
        .btn-jelly-lime {
            position: relative;
            background: linear-gradient(135deg, #e3ff73, #a2ff00);
            border: none;
            color: #0c081e;
            padding: 14px 42px;
            font-size: 15px;
            font-weight: 900;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 
                0 8px 20px rgba(162, 255, 0, 0.35),
                inset 0 -3px 8px rgba(0, 0, 0, 0.15),
                inset 0 3px 8px rgba(255, 255, 255, 0.6);
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* 内部高亮扫光波纹 */
        .btn-jelly-lime::before {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 100%; height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.6) 50%,
                transparent
            );
            transform: skewX(-25deg);
            transition: none;
        }

        .btn-jelly-lime:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 12px 25px rgba(162, 255, 0, 0.5),
                inset 0 -1px 4px rgba(0, 0, 0, 0.1),
                inset 0 3px 10px rgba(255, 255, 255, 0.8);
        }

        .btn-jelly-lime:hover::before {
            left: 150%;
            transition: all 0.75s ease;
        }

        .btn-jelly-lime:active {
            transform: scale(0.96);
        }


        /* =======================================================
           按钮 3：【NO 预测】冰封极光 · 呼吸发光按钮
           ======================================================= */
        .btn-jelly-ice {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px solid #00f5ff;
            color: #00f5ff;
            padding: 13px 40px;
            font-size: 15px;
            font-weight: 800;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 
                0 0 15px rgba(0, 245, 255, 0.15),
                inset 0 0 8px rgba(0, 245, 255, 0.1);
            transition: all 0.3s;
        }

        .btn-jelly-ice:hover {
            background: #00f5ff;
            color: #050212;
            box-shadow: 
                0 0 25px rgba(0, 245, 255, 0.6),
                inset 0 2px 4px rgba(255, 255, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-jelly-ice:active {
            transform: scale(0.96);
        }


        /* =======================================================
           按钮 4：【游戏大厅】全息气泡 · 3D 浮动控制
           ======================================================= */
        .btn-bubble-float {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
            padding: 14px 36px;
            font-size: 15px;
            font-weight: 800;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 
                0 8px 24px rgba(0, 0, 0, 0.3),
                inset 0 2px 5px rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* 气泡反射高光点 */
        .btn-bubble-float::before {
            content: '';
            position: absolute;
            top: 5px; left: 15px;
            width: 14px; height: 6px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        .btn-bubble-float:hover {
            border-color: rgba(255, 105, 180, 0.5);
            background: rgba(255, 105, 180, 0.15);
            box-shadow: 
                0 12px 30px rgba(255, 105, 180, 0.25),
                inset 0 2px 8px rgba(255, 255, 255, 0.4);
            transform: translateY(-3px) scale(1.02);
        }

        .btn-bubble-float:active {
            transform: translateY(-1px) scale(0.97);
        }


        /* =======================================================
           按钮 5：【爆金 SPIN】高弹肉垫 · 捏捏泄压阀
           ======================================================= */
        .btn-squishy-paw {
            position: relative;
            background: linear-gradient(135deg, #1e133e, #0f0822);
            border: 1.5px solid #ff5eb6;
            color: #ff5eb6;
            padding: 16px 40px;
            font-size: 16px;
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-squishy-paw .paw-unit {
            font-size: 20px;
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.5);
        }

        /* 悬浮：果冻粉高亮并浮起 */
        .btn-squishy-paw:hover {
            background: #ff5eb6;
            color: #fff;
            box-shadow: 
                0 12px 30px rgba(255, 20, 147, 0.5),
                inset 0 -3px 6px rgba(0, 0, 0, 0.2);
            transform: translateY(-3px);
        }

        /* 悬停时，肉垫产生“捏一捏”的软糯回弹 */
        .btn-squishy-paw:hover .paw-unit {
            transform: scale(1.4) rotate(-8deg);
            animation: squishEffect 0.8s ease-in-out infinite alternate;
        }

        /* 按下：彻底踩扁肉垫的解压反馈 */
        .btn-squishy-paw:active {
            transform: scale(0.92) translateY(1px);
        }

        @keyframes squishEffect {
            0% { transform: scale(1.3) scaleY(0.95); }
            100% { transform: scale(1.35) scaleY(1.1); }
        }


        /* =======================================================
           按钮 6：【提现/下分】水滴注入 · 熔岩灯极光
           ======================================================= */
        .btn-lava-fill {
            position: relative;
            background: #110825;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            padding: 14px 42px;
            font-size: 15px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            overflow: hidden;
            z-index: 1;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
            transition: all 0.3s;
        }

        /* 底部的熔岩极光球 */
        .btn-lava-fill::before {
            content: '';
            position: absolute;
            left: 30%;
            bottom: -150%;
            width: 140px;
            height: 140px;
            background: radial-gradient(circle, #ff5eb6 20%, #7b2cbf 70%, transparent 100%);
            border-radius: 50%;
            transition: all 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
            filter: blur(8px);
            z-index: -1;
            opacity: 0.6;
        }

        /* 悬停：彩色水滴浮上来充满视线 */
        .btn-lava-fill:hover {
            border-color: rgba(255, 105, 180, 0.4);
            box-shadow: 0 12px 30px rgba(255, 20, 147, 0.3);
        }

        .btn-lava-fill:hover::before {
            bottom: -70%;
            left: 15%;
            transform: scale(1.3);
            opacity: 1;
        }

        .btn-lava-fill:active {
            transform: scale(0.95);
        }


        /* =======================================================
           按钮 7：【呼叫客服】摇曳尾巴 · 浮动云雾
           ======================================================= */
        .btn-tail-wiggle {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.9);
            border-radius: 50px;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(8px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.15);
        }

        .btn-tail-wiggle .tail-part {
            font-size: 20px;
            display: inline-block;
            transform-origin: bottom center;
            transition: transform 0.3s;
        }

        .btn-tail-wiggle:hover {
            color: #ff5eb6;
            border-color: rgba(255, 105, 180, 0.3);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 
                0 10px 25px rgba(255, 105, 180, 0.15),
                inset 0 0 10px rgba(255, 105, 180, 0.1);
            transform: translateY(-2px);
        }

        /* 鼠标悬停：尾巴产生极柔和的水波式摆动（微风拂过） */
        .btn-tail-wiggle:hover .tail-part {
            animation: tailWave 1s ease-in-out infinite alternate;
        }

        @keyframes tailWave {
            0% { transform: rotate(-12deg) scale(1.2); }
            100% { transform: rotate(18deg) scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="sandbox-title">🐾 喵呜 Vegas - 3.0“极光果冻肉垫”重度解压按钮库 🐾</div>

    <div class="button-grid">
        
        <!-- 按钮 1 -->
        <div class="button-item">
            <button class="btn-jelly-main">
                接受猫娘的邀请 (ฅ•ω•ฅ)
            </button>
            <div class="button-desc">【主 CTA】果冻粉渐变膨胀<br>悬停顶部弹出 3D 软萌双气囊猫耳</div>
        </div>

        <!-- 按钮 2 -->
        <div class="button-item">
            <button class="btn-jelly-lime">
                YES · 确认买入 ⚡
            </button>
            <div class="button-desc">【YES 按钮】爆金青柠多重内高光<br>悬停高亮极光流痕荡漾</div>
        </div>

        <!-- 按钮 3 -->
        <div class="button-item">
            <button class="btn-jelly-ice">
                NO · 放弃份额 ❄️
            </button>
            <div class="button-desc">【NO 按钮】超通透冰封玻璃质感<br>悬停瞬间冷色背光呼吸绽放</div>
        </div>

        <!-- 按钮 4 -->
        <div class="button-item">
            <button class="btn-bubble-float">
                启动喵呜游戏大厅
            </button>
            <div class="button-desc">【大厅启动】高透空气感泡泡球<br>悬停流体上浮产生拟物浮力</div>
        </div>

        <!-- 按钮 5 -->
        <div class="button-item">
            <button class="btn-squishy-paw">
                <span class="paw-unit">🐾</span>
                <span>SPIN! 爆金老虎机</span>
            </button>
            <div class="button-desc">【老虎机机台】重度解压果冻肉垫<br>悬停触发“捏一捏”物理肉垫回弹</div>
        </div>

        <!-- 按钮 6 -->
        <div class="button-item">
            <button class="btn-lava-fill">
                主人的提现控制台
            </button>
            <div class="button-desc">【资金下分】内置极光水滴气泡球<br>悬停时光滑的水滴球自动充能上升</div>
        </div>

        <!-- 按钮 7 -->
        <div class="button-item">
            <button class="btn-tail-wiggle">
                <span>召唤专属猫娘秘书</span>
                <span class="tail-part">🐈</span>
            </button>
            <div class="button-desc">【悬浮球/客服】极光白晶莹剔透感<br>悬停尾巴产生超舒缓的波浪摆动</div>
        </div>

    </div>

</body>
</html>
