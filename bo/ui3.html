<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵呜 Vegas - 赛博黑金轻奢按钮军火库</title>
    <style>
        /* 暗黑极简轻奢背景：黑金曜石质感 */
        body {
            background-color: #050508;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 0;
            padding: 60px 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            /* 哑光金弥散背景 */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(212, 175, 55, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(157, 78, 221, 0.03) 0%, transparent 40%);
        }

        .sandbox-title {
            color: #fff;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            text-align: center;
            text-transform: uppercase;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1100px;
            width: 100%;
            background: rgba(15, 15, 20, 0.7);
            border: 1px solid rgba(212, 175, 55, 0.1);
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .button-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.02);
            padding: 35px 20px;
            border-radius: 16px;
            transition: all 0.3s;
        }

        .button-item:hover {
            border-color: rgba(212, 175, 55, 0.2);
            background: rgba(212, 175, 55, 0.02);
        }

        .button-desc {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.5;
        }

        /* =======================================================
           1号按钮：【哑金流体 · 全息棱镜切面】(主呼吁按钮)
           ======================================================= */
        .btn-gold-prism {
            position: relative;
            background: #121216;
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: #d4af37;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 2px;
            padding: 16px 40px;
            border-radius: 0px; /* 硬核直角 */
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* 棱镜折射扫光层 */
        .btn-gold-prism::before {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 150%; height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(212, 175, 55, 0.1),
                rgba(255, 255, 255, 0.4),
                rgba(212, 175, 55, 0.1),
                transparent
            );
            transform: skewX(-30deg);
            transition: none;
        }

        .btn-gold-prism:hover {
            color: #050508;
            background: #d4af37;
            border-color: #d4af37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
            transform: translateY(-2px);
        }

        .btn-gold-prism:hover::before {
            left: 150%;
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }


        /* =======================================================
           2号按钮：【碳纤维 · 激光雷射描边】(买入/交易按钮)
           ======================================================= */
        .btn-carbon-laser {
            position: relative;
            background: #0d0d11;
            /* 细密碳纤维纹理模拟 */
            background-image: 
                linear-gradient(45deg, #15151a 25%, transparent 25%), 
                linear-gradient(-45deg, #15151a 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #15151a 75%), 
                linear-gradient(-45deg, transparent 75%, #15151a 75%);
            background-size: 8px 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 14px 38px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }

        /* 四角激光瞄准线 */
        .btn-carbon-laser::before, .btn-carbon-laser::after {
            content: '';
            position: absolute;
            width: 8px; height: 8px;
            border-color: #d4af37;
            border-style: solid;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        /* 左上/右下 */
        .btn-carbon-laser::before {
            top: -3px; left: -3px;
            border-width: 1.5px 0 0 1.5px;
        }
        /* 右上/左下 */
        .btn-carbon-laser::after {
            bottom: -3px; right: -3px;
            border-width: 0 1.5px 1.5px 0;
        }

        .btn-carbon-laser:hover {
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.15);
            transform: scale(1.02);
        }

        /* 悬停时四角准星往内收缩锁定 */
        .btn-carbon-laser:hover::before, .btn-carbon-laser:hover::after {
            opacity: 1;
            top: 4px; left: 4px;
            bottom: 4px; right: 4px;
        }


        /* =======================================================
           3号按钮：【暗金印记 · 液体金币融合】(下分提现按钮)
           ======================================================= */
        .btn-gold-liquid {
            position: relative;
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 14px 36px;
            border-radius: 30px;
            color: rgba(212, 175, 55, 0.85);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1.5px;
            cursor: pointer;
            overflow: hidden;
            z-index: 1;
            transition: all 0.4s;
        }

        /* 黄金液体池 */
        .btn-gold-liquid::before {
            content: '';
            position: absolute;
            left: 50%; top: 120%;
            width: 150%; height: 150%;
            background: radial-gradient(circle, #e5c158 0%, #aa7c11 100%);
            border-radius: 40%;
            transform: translateX(-50%) rotate(0deg);
            z-index: -1;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-gold-liquid:hover {
            color: #000;
            border-color: transparent;
            box-shadow: 0 8px 25px rgba(170, 124, 17, 0.4);
        }

        .btn-gold-liquid:hover::before {
            top: -25%;
            transform: translateX(-50%) rotate(360deg);
        }


        /* =======================================================
           4号按钮：【黑玛瑙 · 双重深渊阴影】(大厅切换/功能按钮)
           ======================================================= */
        .btn-onyx-dep {
            background: linear-gradient(180deg, #1a1a24 0%, #0d0d12 100%);
            border: 1.5px solid rgba(255, 255, 255, 0.05);
            border-top-color: rgba(255, 255, 255, 0.12); /* 拟物高光 */
            color: #a0a0b0;
            font-size: 14px;
            font-weight: 600;
            padding: 13px 35px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 
                0 4px 6px rgba(0, 0, 0, 0.6), 
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn-onyx-dep:hover {
            color: #fff;
            border-top-color: rgba(212, 175, 55, 0.4);
            box-shadow: 
                0 10px 20px rgba(0, 0, 0, 0.8),
                0 0 12px rgba(212, 175, 55, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        /* 极致的物理点击触觉回馈 */
        .btn-onyx-dep:active {
            transform: translateY(2px);
            box-shadow: 
                0 2px 3px rgba(0, 0, 0, 0.9),
                inset 0 2px 5px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>
<body>

    <div class="sandbox-title">🐾 Meow Vegas - Cyber-Lux 黑金轻奢版 🐾</div>

    <div class="button-grid">
        
        <!-- 按钮一 -->
        <div class="button-item">
            <button class="btn-gold-prism">ENTER CLUB 🐾</button>
            <div class="button-desc">【硬核主导向】高奢哑金切面<br>悬停触发全息棱镜折射扫光</div>
        </div>

        <!-- 按钮二 -->
        <div class="button-item">
            <button class="btn-carbon-laser">TRADE · 注入筹码</button>
            <div class="button-desc">【精密交易】碳纤维哑光表盘<br>悬停触发四角激光雷射向内锁定</div>
        </div>

        <!-- 按钮三 -->
        <div class="button-item">
            <button class="btn-gold-liquid">WITHDRAW CASH 💸</button>
            <div class="button-desc">【资金结算】暗金环形边框<br>悬停触发重力黄金波浪旋转灌满</div>
        </div>

        <!-- 按钮四 -->
        <div class="button-item">
            <button class="btn-onyx-dep">SPIN NOW 🎰</button>
            <div class="button-desc">【硬核操作】拟物化重工业黑玛瑙键<br>按压时产生物理阻尼下塌反馈</div>
        </div>

    </div>

</body>
</html>
