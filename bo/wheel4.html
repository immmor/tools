<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魅惑萌动 ✨ 幸运大转盘</title>
    <style>
        :root {
            --primary-color: #ff2a74;
            --secondary-color: #ff758c;
            --dark-bg: #1a1025;
            --neon-glow: 0 0 15px #ff2a74, 0 0 30px #ff758c;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #2c163f 0%, var(--dark-bg) 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: var(--neon-glow);
            margin-bottom: 20px;
            animation: pulse 1.5s infinite alternate;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: var(--neon-glow); }
            100% { transform: scale(1.05); text-shadow: 0 0 25px #ff2a74, 0 0 50px #ff758c, 0 0 20px #ff00ff; }
        }

        /* 转盘外饰：霓虹灯璀璨效果 */
        .wheel-container {
            position: relative;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            padding: 15px;
            background: radial-gradient(circle, #2d124d 60%, #110326 100%);
            box-shadow: 0 0 40px rgba(255, 42, 116, 0.6), inset 0 0 20px rgba(255, 117, 140, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 闪烁的小灯泡 */
        .dots-container {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border-radius: 50%;
            animation: rotateDots 4s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateDots {
            100% { transform: rotate(360deg); }
        }

        /* 画布本身 */
        canvas {
            border-radius: 50%;
            background-color: #fff;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: transform 5s cubic-bezier(0.15, 0.85, 0.35, 1);
        }

        /* 魅惑猫耳/爱心造型的指针 */
        .pointer {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80px;
            height: 80px;
            transform: translate(-50%, -50%);
            cursor: pointer;
            z-index: 10;
            user-select: none;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
            transition: transform 0.1s;
        }

        .pointer:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }

        .pointer:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        /* 弹出层：中奖特效 */
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
            z-index: 100;
        }

        .popup.active {
            opacity: 1;
            pointer-events: auto;
        }

        .popup-content {
            background: linear-gradient(135deg, #3a1c5c 0%, #1a0b2e 100%);
            padding: 40px 60px;
            border-radius: 24px;
            text-align: center;
            border: 3px solid var(--primary-color);
            box-shadow: var(--neon-glow);
            transform: scale(0.7);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .popup.active .popup-content {
            transform: scale(1);
        }

        .popup h2 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px var(--secondary-color);
        }

        .popup p {
            color: #ff9ebe;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .popup button {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border: none;
            padding: 12px 35px;
            color: white;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 42, 116, 0.4);
            transition: 0.3s;
        }

        .popup button:hover {
            box-shadow: 0 5px 25px rgba(255, 42, 116, 0.8);
            transform: translateY(-2px);
        }

        /* 烟花 Canvas */
        #fireworks {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>

    <h1>✨ 抽出你的今日小确幸 💋</h1>

    <div class="wheel-container">
        <!-- 闪烁霓虹灯外圈 -->
        <div class="dots-container" id="dotsContainer"></div>
        
        <!-- 转盘 Canvas -->
        <canvas id="wheelCanvas" width="400" height="400"></canvas>
        
        <!-- 魅惑爱心指针 -->
        <div class="pointer" id="spinBtn">
            <svg viewBox="0 0 100 100" width="100%" height="100%">
                <!-- 指针箭头 -->
                <polygon points="50,5 35,45 65,45" fill="#ff2a74" filter="drop-shadow(0 2px 5px rgba(0,0,0,0.3))"/>
                <!-- 中心粉嫩爱心 -->
                <path d="M12,30 A15,15 0 0,1 42,30 A15,15 0 0,1 72,30 Q72,50 42,75 Q12,50 12,30 Z" fill="url(#heartGrad)" transform="scale(0.7) translate(22, 20)"/>
                <!-- 文字 -->
                <text x="50" y="56" fill="#fff" font-size="14" font-weight="bold" text-anchor="middle" style="letter-spacing:1px;">GO!</text>
                
                <defs>
                    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#ff758c" />
                        <stop offset="100%" style="stop-color:#ff2a74" />
                    </linearGradient>
                </defs>
            </svg>
        </div>
    </div>

    <!-- 中奖弹窗 -->
    <div class="popup" id="resultPopup">
        <div class="popup-content">
            <h2>🎉 恭喜小可爱 🎉</h2>
            <p id="prizeText">获得神秘好礼</p>
            <button onclick="closePopup()">贴贴接受</button>
        </div>
    </div>

    <!-- 全屏烟花画布 -->
    <canvas id="fireworks"></canvas>

    <script>
        // --- 游戏配置 ---
        const prizes = [
            { text: "恶魔之吻 💋", color: "#341747", textColor: "#ff758c" },
            { text: "甜心奶茶 🧋", color: "#ff758c", textColor: "#fff" },
            { text: "神秘贴贴 🤗", color: "#1f1035", textColor: "#ff2a74" },
            { text: "清空购物车 🛒", color: "#ff2a74", textColor: "#fff" },
            { text: "温柔摸头杀 🐱", color: "#492063", textColor: "#ff758c" },
            { text: "再来一次 💖", color: "#ff9ebe", textColor: "#fff" },
            { text: "免洗碗券 🎫", color: "#25123e", textColor: "#ff2a74" },
            { text: "限定情话 📜", color: "#e6437b", textColor: "#fff" }
        ];

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultPopup = document.getElementById('resultPopup');
        const prizeText = document.getElementById('prizeText');

        let currentRotation = 0;
        let isSpinning = false;
        const numSegments = prizes.length;
        const segmentAngle = (2 * Math.PI) / numSegments;

        // --- Web Audio API 动态生成音效 (免去外部音频文件依赖) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'tick') {
                // 转盘滴答声
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'win') {
                // 中奖梦幻和弦
                const now = audioCtx.currentTime;
                [440, 554.37, 659.25, 880].forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(f, now + i * 0.1);
                    g.gain.setValueAtTime(0.15, now + i * 0.1);
                    g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.6);
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.start(now + i * 0.1);
                    o.stop(now + i * 0.1 + 0.6);
                });
            }
        }

        // --- 初始化绘制转盘 ---
        function drawWheel() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for (let i = 0; i < numSegments; i++) {
                const angle = i * segmentAngle;
                
                // 绘制扇形
                ctx.beginPath();
                ctx.moveTo(200, 200);
                ctx.arc(200, 200, 190, angle, angle + segmentAngle);
                ctx.fillStyle = prizes[i].color;
                ctx.fill();
                
                // 扇形金边
                ctx.lineWidth = 2;
                ctx.strokeStyle = 'rgba(255,255,255,0.1)';
                ctx.stroke();

                // 绘制文字
                ctx.save();
                ctx.translate(200, 200);
                ctx.rotate(angle + segmentAngle / 2);
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.fillStyle = prizes[i].textColor;
                ctx.font = "bold 16px sans-serif";
                
                // 添加小点缀（可爱爱心）
                let text = prizes[i].text;
                ctx.fillText(text, 170, 0);
                ctx.restore();
            }

            // 绘制中心炫丽内圈
            ctx.beginPath();
            ctx.arc(200, 200, 45, 0, 2 * Math.PI);
            ctx.fillStyle = '#110326';
            ctx.fill();
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#ff2a74';
            ctx.stroke();
        }

        // 生成外圈霓虹装饰灯
        function createDots() {
            const container = document.getElementById('dotsContainer');
            const radius = 203; 
            for (let i = 0; i < 24; i++) {
                const dot = document.createElement('div');
                dot.style.position = 'absolute';
                dot.style.width = '8px';
                dot.style.height = '8px';
                dot.style.borderRadius = '50%';
                // 粉色与青色交替的梦幻灯
                dot.style.background = i % 2 === 0 ? '#ff2a74' : '#00ffff';
                dot.style.boxShadow = i % 2 === 0 ? '0 0 8px #ff2a74' : '0 0 8px #00ffff';
                
                const angle = (i * 15) * Math.PI / 180;
                const x = 210 + radius * Math.cos(angle) - 4;
                const y = 210 + radius * Math.sin(angle) - 4;
                
                dot.style.left = `${x}px`;
                dot.style.top = `${y}px`;
                container.appendChild(dot);
            }
        }

        // --- 核心旋转逻辑 ---
        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;

            // 随机中奖索引
            const prizeIndex = Math.floor(Math.random() * numSegments);
            
            // 计算让该奖项对准12点方向(即 -90度 或 1.5*PI) 所需的角度
            const targetAngle = (numSegments - prizeIndex) * segmentAngle - (Math.PI / 2);
            
            // 额外多转 5 到 8 圈，增加炫酷感
            const extraRotations = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
            currentRotation = currentRotation + extraRotations + (targetAngle - (currentRotation % (2 * Math.PI)));

            canvas.style.transform = `rotate(${currentRotation}rad)`;

            // 模拟旋转过程中的“滴答”音效
            let lastTickAngle = 0;
            const segmentDeg = 360 / numSegments;
            
            const interval = setInterval(() => {
                // 获取当前画布的实际旋转角度
                const style = window.getComputedStyle(canvas);
                const matrix = new DOMMatrix(style.transform);
                const currentAngle = Math.atan2(matrix.b, matrix.a) * (180 / Math.PI);
                const normalizedAngle = (currentAngle + 360) % 360;

                if (Math.floor(normalizedAngle / segmentDeg) !== lastTickAngle) {
                    playSound('tick');
                    lastTickAngle = Math.floor(normalizedAngle / segmentDeg);
                }
            }, 60);

            // 旋转结束
            setTimeout(() => {
                clearInterval(interval);
                isSpinning = false;
                playSound('win');
                showResult(prizes[prizeIndex].text);
            }, 5000); // 对应 CSS 里的 5s 动画时间
        });

        // --- 中奖弹窗与烟花特效 ---
        function showResult(text) {
            prizeText.innerText = text;
            resultPopup.classList.add('active');
            initFireworks();
        }

        function closePopup() {
            resultPopup.classList.remove('active');
            stopFireworks();
        }

        // --- 炫酷烟花特效 (Canvas Fireworks) ---
        const fwCanvas = document.getElementById('fireworks');
        const fwCtx = fwCanvas.getContext('2d');
        let fwAnimationId;
        let particles = [];

        function initFireworks() {
            fwCanvas.width = window.innerWidth;
            fwCanvas.height = window.innerHeight;
            particles = [];
            animateFireworks();
        }

        function stopFireworks() {
            cancelAnimationFrame(fwAnimationId);
            fwCtx.clearRect(0, 0, fwCanvas.width, fwCanvas.height);
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 3 + 1;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.015;
            }
            draw() {
                fwCtx.save();
                fwCtx.globalAlpha = this.alpha;
                fwCtx.beginPath();
                fwCtx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                fwCtx.fillStyle = this.color;
                fwCtx.shadowBlur = 10;
                fwCtx.shadowColor = this.color;
                fwCtx.fill();
                fwCtx.restore();
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.05; // 重力
                this.alpha -= this.decay;
            }
        }

        function animateFireworks() {
            fwAnimationId = requestAnimationFrame(animateFireworks);
            fwCtx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            fwCtx.fillRect(0, 0, fwCanvas.width, fwCanvas.height);

            // 随机触发新烟花
            if (Math.random() < 0.08) {
                const x = Math.random() * fwCanvas.width;
                const y = Math.random() * (fwCanvas.height * 0.6);
                const colors = ['#ff2a74', '#ff758c', '#00ffff', '#ff00ff', '#ffff00'];
                const color = colors[Math.floor(Math.random() * colors.length)];
                for (let i = 0; i < 40; i++) {
                    particles.push(new Particle(x, y, color));
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        window.addEventListener('resize', () => {
            if (resultPopup.classList.contains('active')) {
                fwCanvas.width = window.innerWidth;
                fwCanvas.height = window.innerHeight;
            }
        });

        // 页面加载完毕执行初始化
        drawWheel();
        createDots();
    </script>
</body>
</html>
