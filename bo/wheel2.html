<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 魅惑萌动·幸运大转盘 ✨</title>
    <style>
        :root {
            --primary-color: #ff2a74;
            --secondary-color: #ff758c;
            --bg-dark: #1a0b2e;
            --neon-glow: 0 0 15px #ff2a74, 0 0 30px #ff758c;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #2c124d 0%, var(--bg-dark) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #fff;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: var(--neon-glow);
            animation: heartBeat 2s infinite;
            letter-spacing: 2px;
        }

        /* 转盘外饰：霓虹灯与可爱猫耳装饰感 */
        .wheel-container {
            position: relative;
            width: 450px;
            height: 450px;
            padding: 15px;
            background: #11052C;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 42, 116, 0.6), inset 0 0 20px rgba(255, 117, 140, 0.4);
            border: 4px solid var(--primary-color);
        }

        /* 闪烁走马灯点缀 */
        .dots-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            pointer-events: none;
            animation: rotateDots 4s linear infinite;
        }
        .dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 8px #fff;
            top: 5px;
            left: 50%;
            transform: translateX(-50%);
            transform-origin: 50% 240px;
        }
        /* 动态生成闪烁点效果 */
        .dot:nth-child(even) { background: #ff758c; box-shadow: 0 0 8px #ff758c; animation: blink 0.5s infinite alternate; }
        .dot:nth-child(odd) { background: #00f0ff; box-shadow: 0 0 8px #00f0ff; animation: blink 0.5s infinite alternate 0.25s; }

        /* 实际转动的盘面 */
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            transition: transform 4s cubic-bezier(0.15, 0.85, 0.35, 1);
            background: #fff;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 魅惑爱心指针 */
        .pointer {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 90px;
            height: 90px;
            transform: translate(-50%, -50%);
            z-index: 10;
            cursor: pointer;
            background: radial-gradient(circle, #ff758c 0%, #ff2a74 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 0 25px rgba(255,42,116,0.8), 0 5px 15px rgba(0,0,0,0.5);
            border: 3px solid #fff;
            user-select: none;
            transition: transform 0.1s ease;
        }
        
        /* 指针的尖角（爱心顶部或小恶魔尾巴感） */
        .pointer::after {
            content: '';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-bottom: 30px solid #ff2a74;
            filter: drop-shadow(0 -3px 2px rgba(255,42,116,0.5));
        }

        .pointer:hover {
            transform: translate(-50%, -50%) scale(1.08);
            box-shadow: 0 0 35px #ff2a74, 0 0 15px #00f0ff;
        }
        
        .pointer:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        /* 结果弹窗特效 */
        .popup {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(26, 11, 46, 0.95);
            border: 3px solid var(--secondary-color);
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 42, 116, 0.5), inset 0 0 20px rgba(255,255,255,0.1);
            z-index: 100;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }
        .popup.show {
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }
        .popup h2 {
            color: #ff758c;
            margin-top: 0;
            font-size: 2rem;
            text-shadow: 0 0 10px rgba(255,117,140,0.5);
        }
        .popup p {
            font-size: 1.5rem;
            margin: 20px 0;
            font-weight: bold;
            color: #fff;
        }
        .popup button {
            background: linear-gradient(45deg, #ff2a74, #ff758c);
            border: none;
            padding: 10px 25px;
            color: white;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,42,116,0.4);
            transition: 0.2s;
        }
        .popup button:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(255,42,116,0.6);
        }

        /* 核心动画 */
        @keyframes heartBeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.05); }
            28% { transform: scale(1); }
            42% { transform: scale(1.05); }
            70% { transform: scale(1); }
        }
        @keyframes rotateDots {
            100% { transform: rotate(360deg); }
        }
        @keyframes blink {
            0% { opacity: 0.3; filter: brightness(0.5); }
            100% { opacity: 1; filter: brightness(1.2); }
        }

        /* 纸屑飘落特效画布 */
        #confetti {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>

    <h1>✨ 抽出你的心动奖励 ✨</h1>

    <div class="wheel-container">
        <div class="dots-container" id="dotsContainer"></div>
        
        <div class="wheel" id="wheel">
            <canvas id="wheelCanvas"></canvas>
        </div>
        
        <div class="pointer" id="spinBtn">GO!</div>
    </div>

    <div class="popup" id="popup">
        <h2>💖 恭喜你 💖</h2>
        <p id="prizeText">获得奖励</p>
        <button onclick="closePopup()">太棒啦</button>
    </div>

    <canvas id="confetti"></canvas>

    <script>
        // --- 1. 配置项：魅惑又可爱的奖项组合 ---
        const prizes = [
            { text: "✨ 甜蜜热吻", color: "#ff2a74" },
            { text: "🐱 猫耳少女", color: "#3a1f5d" },
            { text: "🍫 浓情巧克力", color: "#ff758c" },
            { text: "🎵 专属情歌", color: "#251147" },
            { text: "🔮 神秘邀约", color: "#ff4b93" },
            { text: "🐾 贴贴抱抱", color: "#4a2675" },
            { text: "👗 主题换装", color: "#ff8da1" },
            { text: "💌 浪漫告白", color: "#1a0b2e" }
        ];

        // --- 2. 纯音效合成器 (Web Audio API - 无需外部音频文件，直接发声) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'tick') { // 转动时的滴答声
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'win') { // 中奖特效音
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.5);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.6);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.6);
            }
        }

        // --- 3. 渲染绘制大转盘 ---
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const size = 420;
        canvas.width = size;
        canvas.height = size;

        const center = size / 2;
        const arc = Math.PI * 2 / prizes.length;

        function drawWheel() {
            ctx.clearRect(0, 0, size, size);
            for (let i = 0; i < prizes.length; i++) {
                const angle = i * arc;
                ctx.fillStyle = prizes[i].color;
                
                // 画扇区
                ctx.beginPath();
                ctx.moveTo(center, center);
                ctx.arc(center, center, center - 10, angle, angle + arc);
                ctx.lineTo(center, center);
                ctx.fill();

                // 扇区粉嫩勾边
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 写文字
                ctx.save();
                ctx.fillStyle = "#fff";
                // 炫酷文字阴影
                ctx.shadowColor = "#ff2a74";
                ctx.shadowBlur = 6;
                ctx.font = "bold 16px sans-serif";
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                
                // 旋转画布写字
                ctx.translate(center, center);
                ctx.rotate(angle + arc / 2);
                ctx.fillText(prizes[i].text, center - 30, 0);
                ctx.restore();
            }
        }
        drawWheel();

        // 生成外圈霓虹装饰点
        const dotsContainer = document.getElementById('dotsContainer');
        for (let i = 0; i < 24; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.transform = `translateX(-50%) rotate(${i * (360 / 24)}deg)`;
            dotsContainer.appendChild(dot);
        }

        // --- 4. 转盘核心逻辑与音效联动 ---
        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        let isSpinning = false;
        let currentRotation = 0;

        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            
            // 随机多转几圈 (5-10圈) 并加上随机角度
            const startRotation = currentRotation;
            const extraRotations = (5 + Math.floor(Math.random() * 5)) * 360;
            const randomAngle = Math.floor(Math.random() * 360);
            currentRotation += extraRotations + randomAngle;

            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // 模拟转动时的“滴答”音效音轨
            let lastTickAngle = 0;
            const duration = 4000; // 与CSS中的 transition 4s 一致
            const startTime = performance.now();

            function traceTicks(now) {
                const progress = (now - startTime) / duration;
                if (progress < 1) {
                    // 依据贝塞尔曲线的大致速度模拟音效间隔
                    const easeOutProgress = 1 - Math.pow(1 - progress, 3); 
                    const currentAnglePassed = easeOutProgress * (extraRotations + randomAngle);
                    
                    if (currentAnglePassed - lastTickAngle > (360 / prizes.length)) {
                        playSound('tick');
                        lastTickAngle = currentAnglePassed;
                    }
                    requestAnimationFrame(traceTicks);
                }
            }
            requestAnimationFrame(traceTicks);

            // 动画结束，计算中奖结果
            setTimeout(() => {
                isSpinning = false;
                
                // 计算指针落在哪一个扇区
                // 指针在正上方（270度方向），逆时针计算相对转过的角度
                const actualAngle = (360 - (currentRotation % 360) + 270) % 360;
                const sectorAngle = 360 / prizes.length;
                const prizeIndex = Math.floor(actualAngle / sectorAngle) % prizes.length;
                
                showPrize(prizes[prizeIndex].text);
            }, duration);
        });

        // --- 5. 炫酷中奖特效（五彩纸屑与弹窗） ---
        const popup = document.getElementById('popup');
        const prizeText = document.getElementById('prizeText');
        
        function showPrize(text) {
            prizeText.innerText = text;
            popup.classList.add('show');
            playSound('win');
            initConfetti(); // 触发彩带特效
        }

        function closePopup() {
            popup.classList.remove('show');
            stopConfetti();
        }

        // --- 6. Canvas 炫彩纸屑粒子特效 ---
        const confettiCanvas = document.getElementById('confetti');
        const cCtx = confettiCanvas.getContext('2d');
        let particles = [];
        let animationFrameId;

        function initConfetti() {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
            particles = [];
            
            const colors = ['#ff2a74', '#ff758c', '#00f0ff', '#ffb6c1', '#9b5de5'];
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * confettiCanvas.width,
                    y: Math.random() * confettiCanvas.height - confettiCanvas.height,
                    r: Math.random() * 6 + 4,
                    d: Math.random() * confettiCanvas.height,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10 - 5,
                    tiltAngleIncremental: Math.random() * 0.07 + 0.02,
                    tiltAngle: 0
                });
            }
            animateConfetti();
        }

        function animateConfetti() {
            cCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
            let remaining = false;

            particles.forEach((p) => {
                p.tiltAngle += p.tiltAngleIncremental;
                p.y += (Math.cos(p.d) + 3 + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle);
                p.tilt = Math.sin(p.tiltAngle - p.r / 2) * 15;

                if (p.y <= confettiCanvas.height) {
                    remaining = true;
                }

                cCtx.beginPath();
                cCtx.lineWidth = p.r;
                cCtx.strokeStyle = p.color;
                cCtx.moveTo(p.x + p.tilt + p.r / 2, p.y);
                cCtx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r / 2);
                cCtx.stroke();
            });

            if (remaining) {
                animationFrameId = requestAnimationFrame(animateConfetti);
            }
        }

        function stopConfetti() {
            cancelAnimationFrame(animationFrameId);
            cCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
        }

        window.addEventListener('resize', () => {
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
