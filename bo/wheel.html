<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵呜娱乐城 - 猫娘肉垫幸运大转盘</title>
    <style>
        :root {
            --bg-dark: #0d061a;
            --bg-card: rgba(36, 17, 59, 0.7);
            --neon-pink: #ff1493;
            --neon-lime: #a3ff00;
            --neko-purple: #9d4edd;
            --text-light: #ffffff;
            --text-neon: #ff99cc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'PingFang SC', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background-image: 
                radial-gradient(at 20% 20%, rgba(255, 20, 147, 0.25) 0px, transparent 40%),
                radial-gradient(at 80% 80%, rgba(163, 255, 0, 0.15) 0px, transparent 40%);
            background-attachment: fixed;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* 顶部标题区 */
        .header-zone {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .neko-ears {
            font-size: 45px;
            margin-bottom: 5px;
            animation: wiggle 1.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
        }

        h1 {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(to right, #ffffff, var(--text-neon), var(--neon-lime));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 20, 147, 0.5));
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-neon);
            font-size: 14px;
            opacity: 0.9;
        }

        /* 核心转盘容器 */
        .wheel-container {
            position: relative;
            width: 450px;
            height: 450px;
            margin: 20px auto;
            border-radius: 50%;
            padding: 12px;
            background: rgba(20, 10, 35, 0.6);
            box-shadow: 0 0 35px rgba(157, 78, 221, 0.3), inset 0 0 20px rgba(255, 20, 147, 0.2);
            border: 3px dotted var(--neko-purple);
        }

        /* 霓虹跑马灯外圈 */
        .wheel-outer-ring {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #1a0b36;
            position: relative;
            box-shadow: 0 0 25px var(--neon-pink);
            animation: ringPulse 2s infinite alternate;
        }

        @keyframes ringPulse {
            0% { box-shadow: 0 0 20px var(--neon-pink), inset 0 0 10px var(--neon-pink); }
            100% { box-shadow: 0 0 35px var(--neon-lime), inset 0 0 15px var(--neon-lime); }
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            border-radius: 50%;
        }

        /* 精准中央肉垫指针按钮 */
        .pointer-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, #240c42 0%, #06020c 100%);
            border: 4px solid var(--neon-lime);
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            box-shadow: 0 0 20px var(--neon-lime), inset 0 0 10px rgba(163, 255, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pointer-btn:hover {
            transform: translate(-50%, -50%) scale(1.08);
            border-color: #fff;
            box-shadow: 0 0 30px var(--neon-pink), inset 0 0 15px var(--neon-pink);
        }

        .pointer-btn:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        .pointer-btn .paw {
            font-size: 28px;
            line-height: 1;
            margin-bottom: -2px;
        }

        .pointer-btn .text {
            font-size: 11px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 1px;
            text-shadow: 0 0 5px var(--neon-lime);
        }

        /* 真正的物理三角指针（尖端朝下，精准指向转盘） */
        .pointer-marker {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 16px solid transparent;
            border-right: 16px solid transparent;
            border-top: 28px solid var(--neon-pink); /* 改为 border-top，使指针倒过来朝下 */
            filter: drop-shadow(0 0 8px var(--neon-pink));
            z-index: 12;
            animation: markerWiggle 0.5s infinite alternate ease-in-out;
            transform-origin: top center; /* 动画旋转轴心改为顶部 */
        }

        /* 控制台与状态 */
        .control-panel {
            background: var(--bg-card);
            border: 2px solid var(--neko-purple);
            border-radius: 24px;
            padding: 20px 30px;
            width: 100%;
            max-width: 450px;
            text-align: center;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            margin-top: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .wallet-info {
            font-size: 18px;
            font-weight: bold;
            color: var(--neon-lime);
            text-shadow: 0 0 5px rgba(163, 255, 0, 0.4);
            margin-bottom: 10px;
        }

        .cost-tip {
            font-size: 12px;
            color: var(--text-neon);
            opacity: 0.8;
        }

        /* 实时喜报通告栏 */
        .ticker-zone {
            width: 100%;
            max-width: 450px;
            background: rgba(255, 20, 147, 0.1);
            border-left: 4px solid var(--neon-pink);
            padding: 10px 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }

        .ticker-title { color: var(--neon-lime); font-weight: bold; }

        /* 炫酷结果弹窗层 */
        .result-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 3, 22, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .result-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .result-box {
            background: rgba(30, 12, 53, 0.95);
            border: 3px solid var(--neon-lime);
            box-shadow: 0 0 50px var(--neon-lime);
            width: 85%;
            max-width: 380px;
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-overlay.show .result-box {
            transform: scale(1);
        }

        .result-gift-icon {
            font-size: 65px;
            margin-bottom: 15px;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-15px); }
        }

        .result-title {
            font-size: 26px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-pink);
            margin-bottom: 10px;
        }

        .result-prize {
            font-size: 22px;
            color: var(--neon-lime);
            font-weight: bold;
            margin-bottom: 25px;
            text-shadow: 0 0 8px rgba(163,255,0,0.6);
        }

        .btn-close-result {
            background: linear-gradient(45deg, var(--neon-pink), var(--neko-purple));
            border: none;
            color: #fff;
            padding: 12px 35px;
            border-radius: 20px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
            transition: all 0.2s;
        }

        .btn-close-result:hover {
            box-shadow: 0 0 20px var(--neon-lime);
            background: var(--neon-lime);
            color: #000;
        }

        /* 移动端减小尺寸 */
        @media (max-width: 480px) {
            .wheel-container { width: 330px; height: 330px; padding: 8px; }
            h1 { font-size: 28px; }
            .pointer-btn { width: 75px; height: 75px; }
            .pointer-btn .paw { font-size: 22px; }
        }
    </style>
</head>
<body>

    <div class="header-zone">
        <div class="neko-ears">🐱✨</div>
        <h1>肉垫狂欢 · 幸运大转盘</h1>
        <div class="subtitle">摸摸猫娘肉垫，解锁今夜极光粉暴击大奖！</div>
    </div>

    <div class="wheel-container">
        <div class="pointer-marker"></div>
        
        <div class="pointer-btn" id="spin-trigger" onclick="startLuckySpin()">
            <span class="paw">🐾</span>
            <span class="text">开摇!</span>
        </div>

        <div class="wheel-outer-ring">
            <canvas id="wheelCanvas" width="800" height="800"></canvas>
        </div>
    </div>

    <div class="control-panel">
        <div class="wallet-info">核心钱包: <span id="balance-display">8,888.00</span> USDT</div>
        <div class="cost-tip">🐾 每次摇尾抽奖消耗 <span style="color: var(--neon-pink); font-weight: bold;">100</span> USDT</div>
    </div>

    <div class="ticker-zone">
        <div>🎉 <span class="ticker-title">实时喜报：</span> 恭喜主人 <span style="color:var(--text-neon)">主人_k95</span> 刚刚斩获黑丝写真！</div>
        <div style="opacity: 0.5;">秒前</div>
    </div>

    <div class="result-overlay" id="resultOverlay">
        <div class="result-box">
            <div class="result-gift-icon" id="prize-icon">🎁</div>
            <div class="result-title">🐱 契约暴击成功！</div>
            <div class="result-prize" id="prize-name">500 USDT 体验金</div>
            <button class="btn-close-result" onclick="closeResultModal()">收下主人的赏赐 🐾</button>
        </div>
    </div>

    <script>
        // 1. 奖项配置矩阵数据
        const prizes = [
            { name: "888 USDT 礼金", color: "#24113b", textCol: "#ff99cc", icon: "💵" },
            { name: "神秘定制黑丝", color: "#17072b", textCol: "#a3ff00", icon: "🧦" },
            { name: "谢谢主人参与", color: "#24113b", textCol: "#ffffff", icon: "🐟" },
            { name: "50 USDT 深夜金", color: "#17072b", textCol: "#ff99cc", icon: "🪙" },
            { name: "猫娘线下陪伴券", color: "#24113b", textCol: "#a3ff00", icon: "👑" },
            { name: "10000x 暴击池", color: "#17072b", textCol: "#ffffff", icon: "💎" },
            { name: "猫娘语音祝福", color: "#24113b", textCol: "#ff99cc", icon: "🎵" },
            { name: "200 USDT 签到金", color: "#17072b", textCol: "#a3ff00", icon: "✨" }
        ];

        let userBalance = 8888.00;
        let isSpinning = false;
        let currentRotation = 0; 
        
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const totalSegments = prizes.length;
        const segmentAngle = (2 * Math.PI) / totalSegments;

        // 2. 音效合成器核心（Web Audio API 纯原生赛博电音，无需外部音频）
        const AudioEngine = {
            ctx: null,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            playTick() { // 经典的机台阻尼刻度跳跃音
                this.init();
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(600, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, this.ctx.currentTime + 0.05);
                gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                osc.stop(this.ctx.currentTime + 0.05);
            },
            playWin() { // 大满贯喜报复音
                this.init();
                let now = this.ctx.currentTime;
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                    let osc = this.ctx.createOscillator();
                    let gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + i * 0.08);
                    gain.gain.setValueAtTime(0.2, now + i * 0.08);
                    gain.gain.linearRampToValueAtTime(0.01, now + i * 0.08 + 0.3);
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now + i * 0.08);
                    osc.stop(now + i * 0.08 + 0.3);
                });
            }
        };

        // 3. 高精度 Canvas 转盘盘面渲染
        function drawWheel() {
            const radius = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            ctx.save();
            ctx.translate(radius, radius);
            ctx.rotate(currentRotation);

            for (let i = 0; i < totalSegments; i++) {
                const startAng = i * segmentAngle - Math.PI / 2; // 纠偏使扇区精准对齐
                const endAng = startAng + segmentAngle;
                
                // 绘制彩格扇区
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius - 15, startAng, endAng);
                ctx.closePath();
                ctx.fillStyle = prizes[i].color;
                ctx.fill();

                // 霓虹内嵌虚线描边
                ctx.lineWidth = 3;
                ctx.strokeStyle = "rgba(157, 78, 221, 0.4)";
                ctx.stroke();

                // 压入文字与Icons描述
                ctx.save();
                ctx.rotate(startAng + segmentAngle / 2);
                
                // 渲染文本说明
                ctx.fillStyle = prizes[i].textCol;
                ctx.font = "bold 26px 'PingFang SC', sans-serif";
                ctx.shadowColor = prizes[i].textCol;
                ctx.shadowBlur = 10;
                ctx.fillText(prizes[i].name, 160, 10);
                
                // 增加装饰 Emoji 图标
                ctx.font = "36px 'Apple Color Emoji'";
                ctx.shadowBlur = 0;
                ctx.fillText(prizes[i].icon, 310, 14);
                
                ctx.restore();
            }
            ctx.restore();
        }

        // 4. 驱动幸运旋转核心控制逻辑
        function startLuckySpin() {
            if (isSpinning) return;
            if (userBalance < 100) {
                alert("🐾 哎呀主人！您的财富代币余额不足 100 USDT 了，请及时补充哦~");
                return;
            }

            // 扣除代币
            userBalance -= 100;
            document.getElementById('balance-display').innerText = userBalance.toFixed(2);
            isSpinning = true;

            // 算法：随机一个目标落点，至少旋转 5 圈以上保证视效体验
            const bonusRounds = 6 + Math.floor(Math.random() * 4); 
            const targetPrizeIndex = Math.floor(Math.random() * totalSegments);
            
            // 物理指针在 12 点钟方向(正上方)。计算落入该扇区所需旋转的最终弧度
            const targetAngle = (bonusRounds * 2 * Math.PI) + 
                                (2 * Math.PI - (targetPrizeIndex * segmentAngle) - (segmentAngle / 2));
            
            const startRotation = currentRotation % (2 * Math.PI);
            currentRotation = startRotation; 
            
            const startTime = performance.now();
            const duration = 4800; // 黄金 4.8 秒慢速刹车缓冲

            let lastTickAngle = 0;

            function animateSpin(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // 经典三次缓出曲线 (Cubic Easing Out) 使减速丝滑真实
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const currentAngle = startRotation + (targetAngle - startRotation) * easeOut;
                
                currentRotation = currentAngle;
                drawWheel();

                // 骨骼动态反馈：转盘每越过一个扇区，触发一次声效
                const currentSegmentCheck = Math.floor((currentRotation % (2 * Math.PI)) / segmentAngle);
                if (currentSegmentCheck !== lastTickAngle) {
                    AudioEngine.playTick();
                    lastTickAngle = currentSegmentCheck;
                }

                if (progress < 1) {
                    requestAnimationFrame(animateSpin);
                } else {
                    // 到达终点，清算最终奖项
                    isSpinning = false;
                    setTimeout(() => {
                        showWinnerResult(targetPrizeIndex);
                    }, 300);
                }
            }
            requestAnimationFrame(animateSpin);
        }

        // 5. 展现大奖揭晓状态
        function showWinnerResult(index) {
            const winPrize = prizes[index];
            document.getElementById('prize-icon').innerText = winPrize.icon;
            document.getElementById('prize-name').innerText = winPrize.name;
            document.getElementById('resultOverlay').classList.add('show');
            AudioEngine.playWin();
        }

        function closeResultModal() {
            document.getElementById('resultOverlay').classList.remove('show');
        }

        // 初始化载入
        window.onload = () => {
            drawWheel();
        };
    </script>
</body>
</html>
