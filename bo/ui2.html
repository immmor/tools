<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵呜 Vegas - 白金全息 UI 3.0 按钮沙盒</title>
    <style>
        /* 演示背景：高级感十足的深海极光暗色（让白金全息按钮极度显眼） */
        body {
            background-color: #0b0914;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 0;
            padding: 60px 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            /* 柔和高雅的白金/蓝紫全息弥散背景 */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(138, 43, 226, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(0, 191, 255, 0.06) 0%, transparent 50%);
        }

        .sandbox-title {
            color: #f3f0f7;
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 3px;
            text-align: center;
            text-shadow: 0 4px 20px rgba(255, 255, 255, 0.1);
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 32px;
            backdrop-filter: blur(25px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
        }

        .button-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 35px 25px;
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .button-item:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
        }

        .button-desc {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-align: center;
            line-height: 1.4;
        }

        /* =======================================================
           按钮 1：【全息流体 · 珍珠白金】 (主CTA超级按钮)
           ======================================================= */
        .btn-holo-pearl {
            position: relative;
            background: #ffffff; /* 珍珠白底色 */
            border: none;
            outline: none;
            padding: 16px 45px;
            font-size: 15px;
            font-weight: 800;
            color: #0d061a; /* 极深紫字 */
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 255, 255, 0.15), 0 15px 30px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        /* 全息彩虹扫光层 */
        .btn-holo-pearl::before {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 150%; height: 100%;
            /* 柔和奢华的液体彩虹光晕 */
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 105, 180, 0.3) 25%,
                rgba(0, 191, 255, 0.3) 50%,
                rgba(204, 255, 0, 0.3) 75%,
                transparent
            );
            transform: skewX(-20deg);
            transition: none;
        }

        .btn-holo-pearl:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 
                0 0 30px rgba(0, 191, 255, 0.25), 
                0 0 15px rgba(255, 105, 180, 0.25),
                0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .btn-holo-pearl:hover::before {
            left: 150%;
            transition: all 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .btn-holo-pearl:active {
            transform: scale(0.97);
        }


        /* =======================================================
           按钮 2：【液态水银 · 阻尼镜面】 (极度精致的科技金属感)
           ======================================================= */
        .btn-liquid-mercury {
            position: relative;
            background: rgba(255, 255, 255, 0.04);
            /* 1px 极细白金边界线 */
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 14px 40px;
            font-size: 14px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.9);
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(12px);
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.2);
        }

        /* 隐藏的液体反射高光 */
        .btn-liquid-mercury::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 30px;
            background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%);
            opacity: 0;
            transition: opacity 0.5s;
        }

        .btn-liquid-mercury:hover {
            background: #ffffff;
            color: #0b0914;
            border-color: #ffffff;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }

        .btn-liquid-mercury:hover::after {
            opacity: 1;
        }


        /* =======================================================
           按钮 3：【毛玻璃泡泡 · 浮动猫耳】 (磨砂高透质感)
           ======================================================= */
        .btn-frosted-bubble {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 36px;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            border-radius: 18px;
            cursor: pointer;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 磨砂气泡感边缘微光 */
        .btn-frosted-bubble::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 18px;
            background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.15), transparent 60%);
            pointer-events: none;
        }

        /* 毛玻璃猫耳朵（悬浮出现） */
        .btn-frosted-bubble::after {
            content: '🐱';
            position: absolute;
            top: 0px;
            left: 50%;
            transform: translateX(-50%) scale(0.6);
            font-size: 20px;
            opacity: 0;
            filter: blur(2px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: -1;
        }

        .btn-frosted-bubble:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.05);
            transform: translateY(-3px);
        }

        .btn-frosted-bubble:hover::after {
            opacity: 1;
            top: -24px;
            transform: translateX(-50%) scale(1.1);
            filter: blur(0px) drop-shadow(0 0 8px rgba(255,255,255,0.3));
        }


        /* =======================================================
           按钮 4：【霓虹切割 · 3D 棱镜】 (极简边缘极光)
           ======================================================= */
        .btn-glass-prism {
            position: relative;
            background: transparent;
            border: none;
            padding: 13px 38px;
            font-size: 14px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: color 0.3s;
        }

        /* 3D 棱镜切线 */
        .btn-glass-prism::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid rgba(255, 255, 255, 0.12);
            /* 极其克制的切角 */
            clip-path: polygon(8px 0%, 100% 0%, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0% 100%, 0% 8px);
            background: rgba(255, 255, 255, 0.01);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .btn-glass-prism:hover {
            color: #ffffff;
        }

        /* 悬浮时，棱镜边缘亮起全息冷光 */
        .btn-glass-prism:hover::before {
            border-color: transparent;
            background: rgba(255, 255, 255, 0.04);
            box-shadow: inset 0 0 10px rgba(0, 191, 255, 0.1);
            /* 使用渐变作为棱镜切割发光线 */
            filter: drop-shadow(0 0 6px rgba(0, 191, 255, 0.4)) drop-shadow(0 0 2px rgba(255, 105, 180, 0.3));
            outline: 1px solid rgba(255, 255, 255, 0.2);
        }


        /* =======================================================
           按钮 5：【全息胶带 · 动态条形码】 (二次元潮牌极客风)
           ======================================================= */
        .btn-cyber-tape {
            position: relative;
            background: #151224;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 4px; /* 硬核直角 */
            padding: 14px 40px;
            font-size: 13px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 2px;
            cursor: pointer;
            overflow: hidden;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }

        /* 模拟极客胶带的黄色/彩色斜线边缘 */
        .btn-cyber-tape::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 4px;
            background: linear-gradient(180deg, #ccff00, #ff4da6);
            transition: width 0.3s ease;
        }

        .btn-cyber-tape:hover {
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
            transform: translateX(2px);
        }

        /* 悬浮时，左侧的全息胶带宽度向右延展，带来极强覆盖感 */
        .btn-cyber-tape:hover::before {
            width: 8px;
        }

        /* 微型的条形码点缀动效 */
        .btn-cyber-tape:hover .barcode-dots {
            animation: barcodeScan 0.5s steps(3) infinite alternate;
        }

        @keyframes barcodeScan {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="sandbox-title">💎 喵呜 Vegas - UI 3.0「白金全息」艺术沙盒 💎</div>

    <div class="button-grid">
        
        <!-- 按钮一 -->
        <div class="button-item">
            <button class="btn-holo-pearl">
                接受猫娘的邀请 (ฅ•ω•ฅ)
            </button>
            <div class="button-desc">【主呼吁行动】全息流体 · 珍珠白金<br>悬停触发液体彩虹丝滑折射扫光</div>
        </div>

        <!-- 按钮二 -->
        <div class="button-item">
            <button class="btn-liquid-mercury">
                YES · 确认注入 🪐
            </button>
            <div class="button-desc">【高能交易按钮】液态镜面水银阻尼<br>悬停全反光固态熔融，苹果冷淡科技风</div>
        </div>

        <!-- 按钮三 -->
        <div class="button-item">
            <button class="btn-frosted-bubble">
                一键唤醒大厅
            </button>
            <div class="button-desc">【功能控制按钮】高透磨砂毛玻璃气泡<br>悬停平滑探出一枚透亮的小猫头</div>
        </div>

        <!-- 按钮四 -->
        <div class="button-item">
            <button class="btn-glass-prism">
                🎰 启动爆金电子机台
            </button>
            <div class="button-desc">【启动大厅按钮】3D 棱镜切面切割<br>悬停边缘浮现极细的高亮极光发光线</div>
        </div>

        <!-- 按钮五 -->
        <div class="button-item">
            <button class="btn-cyber-tape">
                <span>WALLET / 个人资产</span>
                <span class="barcode-dots" style="font-size: 10px; color: #ccff00;">|||||</span>
            </button>
            <div class="button-desc">【资产及后台按钮】极客潮牌全息胶带<br>硬核冷酷风，悬停双色阻燃线增宽</div>
        </div>

    </div>

</body>
</html>
