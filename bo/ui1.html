<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵呜 Vegas - 赛博猫娘特调按钮军火库 2.0</title>
    <style>
        /* 沙盒演示背景环境：深夜猫娘会所暗黑霓虹感 */
        body {
            background-color: #070312;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 0;
            padding: 60px 20px;
            font-family: 'PingFang SC', sans-serif;
            background-image: 
                radial-gradient(circle at 10% 15%, rgba(255, 20, 147, 0.15) 0%, transparent 45%),
                radial-gradient(circle at 90% 85%, rgba(204, 255, 0, 0.1) 0%, transparent 45%);
        }

        .sandbox-title {
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255, 20, 147, 0.5);
            text-align: center;
        }

        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1100px;
            width: 100%;
            background: rgba(24, 12, 43, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 28px;
            backdrop-filter: blur(16px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.6);
        }

        .button-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 30px;
            border-radius: 20px;
            transition: transform 0.3s, border-color 0.3s;
        }

        .button-item:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 77, 166, 0.15);
            background: rgba(255, 255, 255, 0.04);
        }

        .button-desc {
            color: rgba(255, 255, 255, 0.45);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.4;
        }

        /* =======================================================
           按钮 1：【折角流光 · 悬浮弹出猫耳】
           ======================================================= */
        .btn-neko-cyber {
            --primary: #ff4da6;      
            --secondary: #ccff00;    
            position: relative;
            padding: 16px 40px;
            background: transparent;
            border: none;
            cursor: pointer;
            filter: drop-shadow(0 0 10px rgba(255, 77, 166, 0.35));
            transition: all 0.3s ease;
        }

        .btn-neko-cyber .btn-content {
            display: block;
            font-size: 15px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 1px;
            background: linear-gradient(135deg, rgba(25, 10, 48, 0.95) 0%, rgba(13, 5, 26, 0.95) 100%);
            padding: 14px 34px;
            clip-path: polygon(12px 0%, 100% 0%, 100% calc(100% - 12px), calc(100% - 12px) 100%, 0% 100%, 0% 12px);
            border: 1px solid var(--primary);
            box-shadow: inset 0 0 12px rgba(255, 77, 166, 0.2);
            position: relative;
            z-index: 2;
            transition: all 0.3s ease;
        }

        .btn-neko-cyber::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--primary));
            background-size: 200% 200%;
            animation: flowBorder 4s linear infinite;
            clip-path: polygon(13px 0%, 100% 0%, 100% calc(100% - 13px), calc(100% - 13px) 100%, 0% 100%, 0% 13px);
            z-index: 1;
            opacity: 0.8;
        }

        .btn-neko-cyber::after {
            content: '🐾';
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%) translateY(10px) scale(0.5);
            font-size: 24px;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 0;
            text-shadow: 0 0 10px var(--primary);
        }

        .btn-neko-cyber:hover {
            filter: drop-shadow(0 0 25px rgba(255, 77, 166, 0.6))
                    drop-shadow(0 0 10px rgba(204, 255, 0, 0.3));
        }

        .btn-neko-cyber:hover .btn-content {
            color: var(--secondary);
            box-shadow: inset 0 0 20px rgba(204, 255, 0, 0.25);
        }

        .btn-neko-cyber:hover::after {
            opacity: 1;
            transform: translateX(-50%) translateY(-22px) scale(1) rotate(-5deg);
            animation: earWiggle 1.2s ease-in-out infinite alternate;
        }

        @keyframes flowBorder {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes earWiggle {
            0% { transform: translateX(-50%) translateY(-22px) scale(1) rotate(-6deg); }
            100% { transform: translateX(-50%) translateY(-22px) scale(1) rotate(6deg); }
        }


        /* =======================================================
           按钮 2：【高频充能 · Glitch 故障闪烁】
           ======================================================= */
        .btn-charge-neko {
            --color-active: #ccff00; 
            position: relative;
            padding: 14px 45px;
            background: rgba(15, 8, 28, 0.9);
            border: 2px solid rgba(204, 255, 0, 0.35);
            border-radius: 14px;
            font-size: 15px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.85);
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s;
        }

        .btn-charge-neko::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(
                90deg, 
                transparent, 
                rgba(204, 255, 0, 0.1) 20%, 
                rgba(204, 255, 0, 0.5) 60%, 
                transparent
            );
            transition: none;
        }

        .btn-charge-neko:hover {
            color: #000;
            background: var(--color-active);
            border-color: var(--color-active);
            box-shadow: 0 0 25px rgba(204, 255, 0, 0.6);
            transform: scale(1.03);
        }

        .btn-charge-neko:hover::before {
            left: 100%;
            transition: all 0.8s cubic-bezier(0.0, 0.7, 0.1, 1);
        }

        .btn-charge-neko:hover span {
            display: inline-block;
            animation: glitchText 0.3s steps(2) infinite;
        }

        @keyframes glitchText {
            0% { text-shadow: 1.5px 1px 0 #ff4da6, -1.5px -1px 0 #00ffff; }
            50% { text-shadow: -2px 1px 0 #ff4da6, 2px -1.5px 0 #00ffff; }
            100% { text-shadow: 1px -1.5px 0 #ff4da6, -1px 1.5px 0 #00ffff; }
        }


        /* =======================================================
           按钮 3：【软萌肉垫 · 3D 压力感应】
           ======================================================= */
        .btn-paw-press {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: rgba(255, 77, 166, 0.08);
            border: 1.5px dashed #ff4da6;
            padding: 13px 34px;
            border-radius: 50px;
            color: #ff4da6;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .btn-paw-press .paw-icon {
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .btn-paw-press:hover {
            background: rgba(255, 77, 166, 0.16);
            border-style: solid;
            box-shadow: 0 0 20px rgba(255, 77, 166, 0.35);
            transform: translateY(-2px);
        }

        .btn-paw-press:hover .paw-icon {
            transform: scale(1.3) rotate(-10deg);
        }

        .btn-paw-press:active {
            transform: scale(0.94) translateY(1px);
            box-shadow: 0 2px 8px rgba(255, 77, 166, 0.2);
        }


        /* =======================================================
           新增按钮 4：【双生猫耳 · 动态雷达波纹】
           ======================================================= */
        .btn-neko-radar {
            position: relative;
            background: transparent;
            border: none;
            padding: 12px 36px;
            font-size: 15px;
            font-weight: 900;
            color: #ccff00;
            cursor: pointer;
            z-index: 1;
        }

        /* 按钮底盘边框 */
        .btn-neko-radar::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 1.5px solid #ccff00;
            background: rgba(204, 255, 0, 0.03);
            border-radius: 12px;
            transition: all 0.3s;
            z-index: -1;
        }

        /* 隐形的猫耳雷达波纹（左右各一个） */
        .btn-neko-radar::after, .btn-neko-radar .radar-glow {
            content: '';
            position: absolute;
            width: 35px;
            height: 25px;
            background: rgba(204, 255, 0, 0.15);
            border: 1px solid #ccff00;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            top: -16px;
            opacity: 0;
            transform: scale(0.8);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.2);
        }

        /* 左耳 */
        .btn-neko-radar::after { left: 15px; transform-origin: bottom center; }
        /* 右耳 */
        .btn-neko-radar .radar-glow { right: 15px; transform-origin: bottom center; }

        /* 悬停激活猫耳雷达与扫描光效 */
        .btn-neko-radar:hover {
            color: #fff;
            text-shadow: 0 0 10px #ccff00;
        }

        .btn-neko-radar:hover::before {
            background: rgba(204, 255, 0, 0.12);
            box-shadow: 0 0 15px rgba(204, 255, 0, 0.4), inset 0 0 8px rgba(204, 255, 0, 0.2);
        }

        .btn-neko-radar:hover::after, .btn-neko-radar:hover .radar-glow {
            opacity: 1;
            top: -22px;
            transform: scale(1);
            animation: radarPulse 1.4s ease-out infinite alternate;
        }

        .btn-neko-radar:hover .radar-glow {
            animation-delay: 0.2s; /* 双耳错开呼吸频率 */
        }

        @keyframes radarPulse {
            0% { filter: drop-shadow(0 0 2px rgba(204, 255, 0, 0.3)); transform: rotate(-3deg); }
            100% { filter: drop-shadow(0 0 12px rgba(204, 255, 0, 0.8)); transform: rotate(3deg); }
        }


        /* =======================================================
           新增按钮 5：【爆金拉杆 · 像素流星雨】（非常适合老虎机）
           ======================================================= */
        .btn-pixel-drop {
            position: relative;
            background: linear-gradient(135deg, #ff1493, #7b2cbf);
            border: none;
            border-radius: 16px;
            padding: 16px 48px;
            font-size: 16px;
            font-weight: 900;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
            overflow: hidden;
            transition: all 0.3s;
        }

        /* 模拟像素金币微粒 */
        .btn-pixel-drop::before {
            content: '✨ 🪙 ✨';
            position: absolute;
            font-size: 11px;
            display: flex;
            justify-content: space-around;
            width: 100%;
            top: -25px;
            left: 0;
            opacity: 0;
            transition: none;
        }

        .btn-pixel-drop:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 20, 147, 0.7);
            background: linear-gradient(135deg, #ff4da6, #9d4edd);
        }

        /* 悬停时流星雨般掉落金币粒子 */
        .btn-pixel-drop:hover::before {
            animation: pixelDown 0.8s steps(8) infinite;
        }

        @keyframes pixelDown {
            0% { top: -25px; opacity: 1; }
            100% { top: 55px; opacity: 0; }
        }


        /* =======================================================
           新增按钮 6：【胶体注入 · 液体肉垫充能】（适合下分/资金注入）
           ======================================================= */
        .btn-liquid-fill {
            position: relative;
            background: #110825;
            border: 2px solid #ff4da6;
            border-radius: 40px;
            padding: 12px 36px;
            font-size: 14px;
            font-weight: bold;
            color: #ff4da6;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s;
            z-index: 1;
        }

        /* 内部液体模拟层 */
        .btn-liquid-fill::before {
            content: '';
            position: absolute;
            left: 50%;
            bottom: -150%;
            width: 200%;
            height: 200%;
            background-color: #ff4da6;
            border-radius: 42%; /* 旋转时制造浪花效果 */
            transform: translateX(-50%) rotate(0deg);
            transition: bottom 0.6s ease, transform 0.6s ease;
            z-index: -1;
        }

        .btn-liquid-fill:hover {
            color: #fff;
            box-shadow: 0 0 25px rgba(255, 20, 147, 0.5);
        }

        /* 悬停时，胶原液体慢慢往上灌满，并高速自转旋转浪花 */
        .btn-liquid-fill:hover::before {
            bottom: -50%;
            transform: translateX(-50%) rotate(360deg);
            animation: waveRotate 3s linear infinite;
        }

        @keyframes waveRotate {
            100% { transform: translateX(-50%) rotate(720deg); }
        }


        /* =======================================================
           新增按钮 7：【Q弹悬浮 · 猫尾拂过】（非常适合呼叫客服或浮动球）
           ======================================================= */
        .btn-tail-float {
            position: relative;
            background: rgba(25, 10, 50, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 50px;
            padding: 12px 28px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Q弹的赛博猫耳朵/猫尾巴图标 */
        .btn-tail-float .tail-icon {
            font-size: 18px;
            display: inline-block;
            transform-origin: bottom center;
            transition: transform 0.3s;
        }

        .btn-tail-float:hover {
            border-color: #ff4da6;
            background: rgba(25, 10, 50, 0.95);
            box-shadow: 0 10px 25px rgba(255, 20, 147, 0.3);
            transform: scale(1.05);
        }

        /* 悬浮时，尾巴产生像逗猫棒一样大幅度、Q弹的摇摆 */
        .btn-tail-float:hover .tail-icon {
            animation: tailWhip 0.8s cubic-bezier(0.45, 0, 0.55, 1) infinite alternate;
        }

        @keyframes tailWhip {
            0% { transform: rotate(-15deg) scale(1.25); }
            100% { transform: rotate(25deg) scale(1.25); }
        }
    </style>
</head>
<body>

    <div class="sandbox-title">🐾 喵呜 Vegas - 赛博猫娘全业务按钮大弹药库 🐾</div>

    <div class="button-grid">
        
        <div class="button-item">
            <button class="btn-neko-cyber">
                <span class="btn-content">接受猫娘邀请 (ฅ•ω•ฅ)</span>
            </button>
            <div class="button-desc">【主 CTA 按钮】折角未来科技风<br>悬停顶部竖起 3D 小猫爪</div>
        </div>

        <div class="button-item">
            <button class="btn-charge-neko">
                <span>YES · 确认买入 ⚡</span>
            </button>
            <div class="button-desc">【交易预测按钮】荧光高亮充能扫光<br>悬停触发故障(Glitch)闪烁</div>
        </div>

        <div class="button-item">
            <button class="btn-paw-press">
                <span class="paw-icon">🐾</span>
                <span>主人的保险箱通道</span>
            </button>
            <div class="button-desc">【财富管理按钮】软萌肉垫压感反馈<br>点击产生下塌回弹手感</div>
        </div>

        <div class="button-item">
            <button class="btn-neko-radar">
                <span class="radar-glow"></span>
                <span>启动游戏大厅 🔮</span>
            </button>
            <div class="button-desc">【大厅启动按钮】极客双猫耳雷达<br>悬停猫耳高频呼吸发光</div>
        </div>

        <div class="button-item">
            <button class="btn-pixel-drop">
                <span>SPIN! 爆金摇杆 🎰</span>
            </button>
            <div class="button-desc">【老虎机机台按钮】大奖霓虹渐变<br>悬停触发像素级金币流星雨掉落</div>
        </div>

        <div class="button-item">
            <button class="btn-liquid-fill">
                <span>一键注入能量筹码</span>
            </button>
            <div class="button-desc">【资金注入按钮】双层旋转胶原液体<br>悬停时粉色猫咪液体浪花灌满</div>
        </div>

        <div class="button-item">
            <button class="btn-tail-float">
                <span>召唤猫娘小秘书</span>
                <span class="tail-icon">🐈‍⬛</span>
            </button>
            <div class="button-desc">【悬浮球/客服按钮】黑金暗黑尊贵感<br>悬停猫尾产生逗猫棒般Q弹摇摆</div>
        </div>

    </div>

</body>
</html>
