<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵呜 Vegas - 4.0 赛博极道·折纸霓虹按钮库</title>
    <style>
        /* 演示背景：极道歌舞伎深夜暗红与幽绿的冷冽交织 */
        body {
            background-color: #05020c;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 0;
            padding: 60px 20px;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-image: 
                radial-gradient(circle at 10% 30%, rgba(255, 0, 85, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 90% 70%, rgba(0, 255, 170, 0.08) 0%, transparent 50%);
        }

        .sandbox-title {
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
            text-align: center;
        }

        /* 极道折纸硬核网格容器 */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1100px;
            width: 100%;
            background: rgba(12, 5, 26, 0.6);
            border: 2px solid #ff0055;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.15), inset 0 0 20px rgba(255, 0, 85, 0.1);
            padding: 40px;
            border-radius: 4px; /* 抛弃圆角，采用极道硬折角 */
            position: relative;
        }

        /* 容器四角的赛博机械装饰线 */
        .button-grid::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; width: 20px; height: 20px;
            border-top: 4px solid #00ffaa; border-left: 4px solid #00ffaa;
        }
        .button-grid::after {
            content: '';
            position: absolute;
            bottom: -2px; right: -2px; width: 20px; height: 20px;
            border-bottom: 4px solid #00ffaa; border-right: 4px solid #00ffaa;
        }

        .button-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 0, 85, 0.15);
            padding: 35px 20px;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .button-item:hover {
            border-color: #00ffaa;
            background: rgba(0, 255, 170, 0.03);
            box-shadow: 0 0 15px rgba(0, 255, 170, 0.1);
        }

        .button-desc {
            color: rgba(255, 255, 255, 0.45);
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.4;
            text-transform: uppercase;
        }

        /* =======================================================
           按钮 1：【主 CTA】极道折纸 · 赛博鬼面按钮
           ======================================================= */
        .btn-origami-main {
            position: relative;
            background: transparent;
            border: none;
            padding: 18px 45px;
            font-size: 15px;
            font-weight: 900;
            color: #fff;
            letter-spacing: 2px;
            cursor: pointer;
            z-index: 1;
        }

        /* 模拟重叠折纸几何阴影 */
        .btn-origami-main::before {
            content: '';
            position: absolute;
            inset: 0;
            background: #ff0055;
            /* 割切几何风：不对称折纸折边 */
            clip-path: polygon(15px 0%, 100% 0%, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0% 100%, 0% 15px);
            z-index: -1;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.4);
        }

        /* 副色重叠折线层（纸艺边缘） */
        .btn-origami-main::after {
            content: '';
            position: absolute;
            inset: -3px;
            background: #00ffaa;
            clip-path: polygon(17px 0%, 100% 0%, 100% calc(100% - 17px), calc(100% - 17px) 100%, 0% 100%, 0% 17px);
            z-index: -2;
            opacity: 0.8;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* 鼠标悬停：折角瞬间反转，红绿双霓虹高频碰撞 */
        .btn-origami-main:hover::before {
            background: #00ffaa;
            clip-path: polygon(0% 0%, calc(100% - 15px) 0%, 100% 15px, 100% 100%, 15px 100%, 0% calc(100% - 15px));
        }

        .btn-origami-main:hover::after {
            background: #ff0055;
            clip-path: polygon(0% 0%, calc(100% - 17px) 0%, 100% 17px, 100% 100%, 17px 100%, 0% calc(100% - 17px));
        }

        .btn-origami-main:hover {
            color: #000;
            filter: drop-shadow(0 0 15px #00ffaa);
        }

        .btn-origami-main:active {
            transform: scale(0.96);
        }


        /* =======================================================
           按钮 2：【YES 预测】极道家徽 · 荧光切面按钮
           ======================================================= */
        .btn-clan-yes {
            position: relative;
            background: rgba(0, 255, 170, 0.05);
            border: 2px solid #00ffaa;
            color: #00ffaa;
            padding: 14px 40px;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 1px;
            cursor: pointer;
            clip-path: polygon(0 0, 100% 0, 85% 100%, 15% 100%); /* 梯形几何家徽切角 */
            transition: all 0.3s;
        }

        /* 内部发光极道十字（家徽感纹理） */
        .btn-clan-yes::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 170, 0.2), transparent);
            left: -100%;
            transition: none;
        }

        .btn-clan-yes:hover {
            background: #00ffaa;
            color: #000;
            box-shadow: 0 0 25px rgba(0, 255, 170, 0.5);
            clip-path: polygon(15px 0, 85% 0, 100% 100%, 0 100%); /* 悬停时倾斜方向反转 */
        }

        .btn-clan-yes:hover::before {
            left: 100%;
            transition: all 0.6s ease;
        }


        /* =======================================================
           按钮 3：【NO 预测】落樱凋零 · 绯红重切角
           ======================================================= */
        .btn-clan-no {
            position: relative;
            background: rgba(255, 0, 85, 0.05);
            border: 2px solid #ff0055;
            color: #ff0055;
            padding: 14px 40px;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 1px;
            cursor: pointer;
            clip-path: polygon(15px 0, 100% 0, 85% 100%, 0 100%);
            transition: all 0.3s;
        }

        .btn-clan-no:hover {
            background: #ff0055;
            color: #fff;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.5);
            clip-path: polygon(0 0, 85% 0, 100% 100%, 15% 100%);
        }


        /* =======================================================
           按钮 4：【游戏大厅】雷神太鼓 · 八角立体浮雕
           ======================================================= */
        .btn-taiko-oct {
            position: relative;
            background: #110620;
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 14px 38px;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            /* 裁切成完美的立体八边形（太鼓面） */
            clip-path: polygon(30% 0%, 70% 0%, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0% 70%, 0% 30%);
            box-shadow: inset 0 0 15px rgba(255, 0, 85, 0.2);
            transition: all 0.3s;
        }

        .btn-taiko-oct:hover {
            background: #ff0055;
            border-color: #00ffaa;
            color: #fff;
            text-shadow: 0 0 5px #fff;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.6);
            transform: scale(1.05);
        }


        /* =======================================================
           按钮 5：【爆金 SPIN】极速拉丝 · 御守条幅按钮
           ======================================================= */
        .btn-omamori-spin {
            position: relative;
            background: linear-gradient(90deg, #ff0055, #7b002c);
            border: none;
            padding: 16px 45px;
            font-size: 15px;
            font-weight: 900;
            color: #00ffaa;
            letter-spacing: 2px;
            cursor: pointer;
            /* 顶部裁剪成神社“御守”的三角尖头形状 */
            clip-path: polygon(50% 10px, 100% 0, 100% 100%, 0 100%, 0 0);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 神社御守标志性的绑绳穗子挂饰 */
        .btn-omamori-spin::before {
            content: '🧧';
            position: absolute;
            top: -22px;
            left: calc(50% - 12px);
            font-size: 16px;
            opacity: 0;
            transform: scale(0.6);
            transition: all 0.3s;
        }

        .btn-omamori-spin:hover {
            color: #fff;
            background: linear-gradient(90deg, #00ffaa, #006644);
            clip-path: polygon(50% 0px, 100% 10px, 100% 100%, 0 100%, 0 10px);
            transform: translateY(3px); /* 悬浮时产生特殊的向下砸击感 */
            box-shadow: 0 10px 25px rgba(0, 255, 170, 0.4);
        }

        .btn-omamori-spin:hover::before {
            opacity: 1;
            top: -16px;
            transform: scale(1) rotate(15deg);
        }


        /* =======================================================
           按钮 6：【提现/下分】像素家纹 · 条形码切割
           ======================================================= */
        .btn-barcode-pay {
            position: relative;
            background: #000;
            border: 2px solid #ff0055;
            color: #ff0055;
            padding: 12px 35px;
            font-size: 14px;
            font-weight: 900;
            letter-spacing: 3px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s;
        }

        /* 条形码切割装饰线（赛博朋克账单感） */
        .btn-barcode-pay::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: #ff0055;
            box-shadow: 8px 0 #ff0055, 16px 0 rgba(255, 0, 85, 0.5), 24px 0 rgba(255, 0, 85, 0.2);
            transition: all 0.3s;
        }

        .btn-barcode-pay:hover {
            background: #ff0055;
            color: #000;
            box-shadow: 0 0 25px rgba(255, 0, 85, 0.6);
        }

        .btn-barcode-pay:hover::before {
            left: 90%;
            background: #000;
            box-shadow: -8px 0 #000, -16px 0 rgba(0, 0, 0, 0.5);
        }


        /* =======================================================
           按钮 7：【呼叫客服】鸟居结界 · 全息浮光
           ======================================================= */
        .btn-torii-gate {
            position: relative;
            background: transparent;
            border: none;
            padding: 12px 32px;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
        }

        /* 顶部鸟居横梁装饰 */
        .btn-torii-gate::before {
            content: '';
            position: absolute;
            top: 0; left: -5px; right: -5px; height: 4px;
            background: #ff0055;
            box-shadow: 0 0 8px #ff0055;
            transform: scaleX(0.8);
            transition: all 0.3s;
        }

        /* 底部鸟居立柱装饰 */
        .btn-torii-gate::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0; height: 2px;
            background: #00ffaa;
            transform: scaleX(0.5);
            transition: all 0.3s;
        }

        .btn-torii-gate:hover {
            color: #00ffaa;
            text-shadow: 0 0 8px rgba(0, 255, 170, 0.6);
        }

        .btn-torii-gate:hover::before {
            transform: scaleX(1.1);
            background: #00ffaa;
            box-shadow: 0 0 12px #00ffaa;
        }

        .btn-torii-gate:hover::after {
            transform: scaleX(1);
            background: #ff0055;
        }
    </style>
</head>
<body>

    <div class="sandbox-title">🏮 喵呜 Vegas - 4.0“赛博极道·折纸霓虹”立体设计库 🏮</div>

    <div class="button-grid">
        
        <!-- 按钮 1 -->
        <div class="button-item">
            <button class="btn-origami-main">
                <span class="btn-text">接受猫娘的邀请 (ฅ•ω•ฅ)</span>
            </button>
            <div class="button-desc">【主 CTA】歌舞伎斜切面折纸<br>悬停触发红绿双霓虹折角互换</div>
        </div>

        <!-- 按钮 2 -->
        <div class="button-item">
            <button class="btn-clan-yes">
                YES · 签立契约 ⚔️
            </button>
            <div class="button-desc">【YES 按钮】梯形极道家徽轮廓<br>悬停流光划过并使切角方向反转</div>
        </div>

        <!-- 按钮 3 -->
        <div class="button-item">
            <button class="btn-clan-no">
                NO · 撕毁份额 🥀
            </button>
            <div class="button-desc">【NO 按钮】暗夜落樱斜向重折纸<br>悬停高亮绯红并反向拉伸</div>
        </div>

        <!-- 按钮 4 -->
        <div class="button-item">
            <button class="btn-taiko-oct">
                雷神大厅 · 叩击 🥁
            </button>
            <div class="button-desc">【大厅启动】雷神太鼓立体八角面<br>悬停注入绯红辉光与白刃高亮</div>
        </div>

        <!-- 按钮 5 -->
        <div class="button-item">
            <button class="btn-omamori-spin">
                神力运转 SPIN 🧧
            </button>
            <div class="button-desc">【老虎机机台】庇护御守条幅外装<br>悬停向下叩击并弹出福签小图标</div>
        </div>

        <!-- 按钮 6 -->
        <div class="button-item">
            <button class="btn-barcode-pay">
                DEPOSIT // 提取财富
            </button>
            <div class="button-desc">【下分提现】赛博账单条形码切割面<br>悬停黑色高频扫描流光</div>
        </div>

        <!-- 按钮 7 -->
        <div class="button-item">
            <button class="btn-torii-gate">
                召唤极道护卫 (客服)
            </button>
            <div class="button-desc">【客服悬浮】神道鸟居立绘框架<br>悬停鸟居上下两极霓虹辉光逆转</div>
        </div>

    </div>

</body>
</html>
