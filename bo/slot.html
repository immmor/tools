<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵呜娱乐城 - 赛博猫娘霓虹老虎机</title>
    <style>
        :root {
            --bg-dark: #0d061a;
            --bg-card: rgba(36, 17, 59, 0.75);
            --neon-pink: #ff1493;
            --neon-lime: #a3ff00;
            --neko-purple: #9d4edd;
            --text-light: #ffffff;
            --text-neon: #ff99cc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'PingFang SC', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background-image: 
                radial-gradient(at 10% 20%, rgba(255, 20, 147, 0.25) 0px, transparent 40%),
                radial-gradient(at 90% 80%, rgba(163, 255, 0, 0.15) 0px, transparent 40%);
            background-attachment: fixed;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* 顶部标题栏 */
        .header-zone {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .neko-ears {
            font-size: 45px;
            margin-bottom: 5px;
            animation: wiggle 1.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
        }

        h1 {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(to right, #ffffff, var(--text-neon), var(--neon-lime));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 20, 147, 0.5));
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-neon);
            font-size: 14px;
            opacity: 0.9;
        }

        /* 老虎机主体容器（移除了右侧padding，实现完美绝对居中） */
        .slot-machine-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
        }

        .slot-machine {
            background: var(--bg-card);
            border: 4px solid var(--neko-purple);
            border-radius: 35px;
            padding: 30px 65px 30px 25px; /* 右侧padding加大，为一体化嵌入式拉杆腾出内部空间 */
            box-shadow: 0 0 35px rgba(157, 78, 221, 0.4), inset 0 0 20px rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: relative;
        }

        /* 霓虹跑马灯外框 */
        .slot-machine::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 35px;
            border: 2px solid var(--neon-pink);
            pointer-events: none;
            animation: borderGlow 2s infinite alternate;
        }

        @keyframes borderGlow {
            0% { box-shadow: 0 0 15px var(--neon-pink); }
            100% { box-shadow: 0 0 30px var(--neon-lime); }
        }

        /* 滚轮视窗显示区 */
        .reels-container {
            display: flex;
            justify-content: space-between;
            background: #06020c;
            border: 3px solid #1a0b36;
            border-radius: 20px;
            padding: 15px;
            gap: 15px;
            box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.9);
            position: relative;
            overflow: hidden;
        }

        /* 派彩中奖红线指示 */
        .payline-indicator {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--neon-pink), var(--neon-lime), transparent);
            transform: translateY(-50%);
            z-index: 5;
            opacity: 0.6;
            pointer-events: none;
        }

        .payline-indicator.active {
            animation: pulseLine 0.2s infinite alternate;
            opacity: 1;
            height: 4px;
        }

        @keyframes pulseLine {
            0% { filter: drop-shadow(0 0 2px var(--neon-pink)); }
            100% { filter: drop-shadow(0 0 10px var(--neon-lime)); }
        }

        /* 单个独立滚轮 */
        .reel {
            flex: 1;
            height: 150px;
            background: rgba(20, 10, 35, 0.8);
            border: 2px solid rgba(157, 78, 221, 0.3);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .reel-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        .slot-item {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 65px;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
            user-select: none;
        }

        /* 一体化嵌入式物理摇杆（完美融合进机身内部右侧） */
        .handle-container {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            height: 150px;
            width: 30px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(157, 78, 221, 0.4);
            border-radius: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        .handle-bar {
            position: absolute;
            top: 25px;
            left: 9px;
            width: 8px;
            height: 75px;
            background: linear-gradient(to right, #441a70, #9d4edd, #240c42);
            border-radius: 4px;
            transform-origin: bottom center;
            transition: transform 0.15s ease-out;
        }

        .handle-ball {
            position: absolute;
            top: -24px;
            left: -10px;
            width: 28px;
            height: 28px;
            background: radial-gradient(circle at 30% 30%, #ff66cc, var(--neon-pink), #800040);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--neon-pink);
            cursor: pointer;
            transition: background 0.3s;
        }

        .handle-ball:hover {
            background: radial-gradient(circle at 30% 30%, #e6ff66, var(--neon-lime), #4d8000);
            box-shadow: 0 0 15px var(--neon-lime);
        }

        /* 拉杆被拉下时的动画状态 */
        .handle-container.pulled .handle-bar {
            transform: scaleY(0.2) rotateX(70deg);
        }

        /* 控制台状态与面板 */
        .control-panel {
            background: var(--bg-card);
            border: 2px solid var(--neko-purple);
            border-radius: 24px;
            padding: 22px 30px;
            width: 100%;
            max-width: 500px; /* 与上方机器完美对齐 */
            text-align: center;
            margin-top: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 核心钱包居中样式 */
        .wallet-info {
            font-size: 22px;
            font-weight: bold;
            color: var(--neon-lime);
            text-shadow: 0 0 8px rgba(163, 255, 0, 0.5);
            margin-bottom: 18px;
            text-align: center;
            width: 100%;
        }

        .action-zone {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 20px;
            border-top: 1px dashed rgba(157, 78, 221, 0.3);
            padding-top: 15px;
        }

        .bet-info {
            font-size: 13px;
            color: var(--text-neon);
            text-align: left;
        }

        .spin-btn {
            background: linear-gradient(45deg, var(--neon-pink), var(--neko-purple));
            border: none;
            color: white;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: 900;
            border-radius: 18px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
            transition: all 0.2s;
            flex-grow: 1;
        }

        .spin-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--neon-lime);
            background: var(--neon-lime);
            color: #000;
        }

        .spin-btn:disabled {
            background: #331d4d;
            color: #775599;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* 华丽大奖公告弹窗 */
        .result-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 3, 22, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .result-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .result-box {
            background: rgba(30, 12, 53, 0.95);
            border: 3px solid var(--neon-lime);
            box-shadow: 0 0 50px var(--neon-lime);
            width: 85%;
            max-width: 380px;
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-overlay.show .result-box {
            transform: scale(1);
        }

        .result-title {
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px var(--neon-pink);
            margin-bottom: 10px;
        }

        .result-prize {
            font-size: 24px;
            color: var(--neon-lime);
            font-weight: bold;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(163,255,0,0.7);
        }

        .btn-close-result {
            background: linear-gradient(45deg, var(--neon-pink), var(--neko-purple));
            border: none;
            color: #fff;
            padding: 12px 35px;
            border-radius: 20px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
        }

        .btn-close-result:hover {
            background: var(--neon-lime);
            color: #000;
        }

        /* 移动端响应式缩放 */
        @media (max-width: 480px) {
            .slot-machine-wrapper { max-width: 340px; }
            .slot-machine { padding: 20px 50px 20px 15px; border-radius: 25px;}
            .reels-container { padding: 10px; gap: 10px; border-radius: 14px;}
            .reel { height: 100px; }
            .slot-item { height: 100px; font-size: 45px; }
            .handle-container { right: 12px; height: 110px; width: 24px;}
            .handle-bar { height: 55px; left: 7px; top: 20px;}
            .handle-ball { width: 22px; height: 22px; top: -18px; left: -8px;}
            h1 { font-size: 26px; }
            .wallet-info { font-size: 19px; }
            .control-panel { padding: 15px 20px; }
        }
    </style>
</head>
<body>

    <!-- 顶部标题区 -->
    <div class="header-zone">
        <div class="neko-ears">🎰🐾</div>
        <h1>喵呜霓虹 · 赛博狂欢老虎机</h1>
        <div class="subtitle">拉动命运摇杆，三连组合解锁主人的终极赏赐！</div>
    </div>

    <!-- 老虎机主战区 -->
    <div class="slot-machine-wrapper">
        <div class="slot-machine">
            <!-- 核心三滚轮视窗 -->
            <div class="reels-container">
                <div class="payline-indicator" id="payline"></div>
                
                <div class="reel"><div class="reel-strip" id="reel0"></div></div>
                <div class="reel"><div class="reel-strip" id="reel1"></div></div>
                <div class="reel"><div class="reel-strip" id="reel2"></div></div>
            </div>

            <!-- 一体化嵌入式物理摇杆（已移入slot-machine机身内部右侧） -->
            <div class="handle-container" id="mechanical-handle">
                <div class="handle-bar">
                    <div class="handle-ball" onclick="pullMechanicalLever()"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部状态控制台 -->
    <div class="control-panel">
        <!-- 核心钱包：已完美水平居中 -->
        <div class="wallet-info">核心钱包: <span id="balance-display">5,000.00</span> USDT</div>
        
        <div class="action-zone">
            <div class="bet-info">
                <div>🐾 单次下注: <span style="color:var(--neon-pink); font-weight:bold;">100 USDT</span></div>
                <div style="opacity:0.6; font-size:11px; margin-top:2px;">三连最高可获 50倍 爆池</div>
            </div>
            <button class="spin-btn" id="spin-btn" onclick="pullMechanicalLever()">注入能量拉杆 🐾</button>
        </div>
    </div>

    <!-- 华丽结算弹窗 -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-box">
            <div style="font-size: 70px; margin-bottom: 15px; animation: bounce 0.8s infinite alternate;">🎉</div>
            <div class="result-title" id="win-title">LINE COMB!</div>
            <div class="result-prize" id="win-detail">+5000 USDT</div>
            <button class="btn-close-result" onclick="closeResultModal()">继续调教摇杆 🐾</button>
        </div>
    </div>

    <script>
        const slotItems = [
            { icon: "🐱", weight: 50 }, 
            { icon: "💎", weight: 20 }, 
            { icon: "👑", weight: 10 }, 
            { icon: "🧦", weight: 5 },  
            { icon: "🐟", weight: 2 }   
        ];

        let userBalance = 5000.00;
        let isPlaying = false;
        let reelStates = [0, 1, 2]; 

        // Web Audio API 赛博声学引擎
        const AudioEngine = {
            ctx: null,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            playLever() {
                this.init();
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(120, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(40, this.ctx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.15);
            },
            playReelClick() {
                this.init();
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(320, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.05);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.05);
            },
            playWinGlow() {
                this.init();
                let now = this.ctx.currentTime;
                [440, 554.37, 659.25, 880].forEach((freq, i) => {
                    let osc = this.ctx.createOscillator();
                    let gain = this.ctx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now + i * 0.1);
                    gain.gain.setValueAtTime(0.2, now + i * 0.1);
                    gain.gain.linearRampToValueAtTime(0.01, now + i * 0.1 + 0.4);
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.start(now + i * 0.1); osc.stop(now + i * 0.1 + 0.4);
                });
            }
        };

        function initSlotMachine() {
            for(let r = 0; r < 3; r++) {
                generateStripData(r, reelStates[r]);
            }
        }

        function generateStripData(reelIndex, targetIndex) {
            const strip = document.getElementById(`reel${reelIndex}`);
            strip.innerHTML = '';
            
            const len = slotItems.length;
            const sequence = [];
            
            for(let i = -15; i <= 2; i++) {
                let idx = (targetIndex + i + len * 10) % len;
                sequence.push(slotItems[idx]);
            }

            sequence.forEach(item => {
                const div = document.createElement('div');
                div.className = 'slot-item';
                div.innerText = item.icon;
                strip.appendChild(div);
            });
        }

        function pullMechanicalLever() {
            if (isPlaying) return;
            if (userBalance < 100) {
                alert("🐾 主人钱包代币不足了！无法启动下一次老虎机契约拉杆。");
                return;
            }

            isPlaying = true;
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('payline').classList.remove('active');

            userBalance -= 100;
            document.getElementById('balance-display').innerText = userBalance.toFixed(2);

            AudioEngine.playLever();
            const handle = document.getElementById('mechanical-handle');
            handle.classList.add('pulled');
            setTimeout(() => handle.classList.remove('pulled'), 200);

            const finalResults = [
                Math.floor(Math.random() * slotItems.length),
                Math.floor(Math.random() * slotItems.length),
                Math.floor(Math.random() * slotItems.length)
            ];

            for (let r = 0; r < 3; r++) {
                smoothSpinReel(r, finalResults[r], 1500 + r * 500);
            }
        }

        function smoothSpinReel(reelIndex, targetIndex, duration) {
            const strip = document.getElementById(`reel${reelIndex}`);
            const itemHeight = window.innerWidth <= 480 ? 100 : 150;
            
            generateStripData(reelIndex, targetIndex);
            
            const totalDistance = 15 * itemHeight; 
            const startTime = performance.now();
            let lastAudioTickDistance = 0;

            function updateAnimation(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);

                const easeOutQuint = 1 - Math.pow(1 - progress, 5);
                const currentTranslateY = -totalDistance + (totalDistance * easeOutQuint);

                strip.style.transform = `translateY(${currentTranslateY}px)`;

                const currentMilestone = Math.floor(Math.abs(currentTranslateY) / itemHeight);
                if (currentMilestone !== lastAudioTickDistance) {
                    AudioEngine.playReelClick();
                    lastAudioTickDistance = currentMilestone;
                }

                if (progress < 1) {
                    requestAnimationFrame(updateAnimation);
                } else {
                    strip.style.transform = 'translateY(0px)';
                    reelStates[reelIndex] = targetIndex;
                    generateStripData(reelIndex, targetIndex);

                    if (reelIndex === 2) {
                        finalizeSlotResults();
                    }
                }
            }
            strip.style.transform = `translateY(${-totalDistance}px)`;
            requestAnimationFrame(updateAnimation);
        }

        function finalizeSlotResults() {
            isPlaying = false;
            document.getElementById('spin-btn').disabled = false;

            const r0 = reelStates[0];
            const r1 = reelStates[1];
            const r2 = reelStates[2];

            if (r0 === r1 && r1 === r2) {
                const matchedItem = slotItems[r0];
                const prizeWon = 100 * matchedItem.weight;
                userBalance += prizeWon;
                document.getElementById('payline').classList.add('active');
                
                setTimeout(() => {
                    document.getElementById('win-title').innerText = "🐱 完美契约暴击！";
                    document.getElementById('win-detail').innerText = `+${prizeWon} USDT (三连 ${matchedItem.icon})`;
                    document.getElementById('resultOverlay').classList.add('show');
                    AudioEngine.playWinGlow();
                    document.getElementById('balance-display').innerText = userBalance.toFixed(2);
                }, 300);

            } else if (r0 === r1 || r1 === r2 || r0 === r2) {
                const prizeWon = 150; 
                userBalance += prizeWon;
                setTimeout(() => {
                    document.getElementById('win-title').innerText = "✨ 猫娘双连小捷";
                    document.getElementById('win-detail').innerText = `+${prizeWon} USDT`;
                    document.getElementById('resultOverlay').classList.add('show');
                    AudioEngine.playWinGlow();
                    document.getElementById('balance-display').innerText = userBalance.toFixed(2);
                }, 300);
            }
        }

        function closeResultModal() {
            document.getElementById('resultOverlay').classList.remove('show');
        }

        window.onload = () => {
            initSlotMachine();
        };
    </script>
</body>
</html>
