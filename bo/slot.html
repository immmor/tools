<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵呜娱乐城 - 赛博猫娘霓虹老虎机</title>
    <style>
        :root {
            --bg-dark: #0d061a;
            --bg-card: rgba(36, 17, 59, 0.75);
            --neon-pink: #ff1493;
            --neon-lime: #a3ff00;
            --neko-purple: #9d4edd;
            --text-light: #ffffff;
            --text-neon: #ff99cc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'PingFang SC', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background-image: 
                radial-gradient(at 10% 20%, rgba(255, 20, 147, 0.25) 0px, transparent 40%),
                radial-gradient(at 90% 80%, rgba(163, 255, 0, 0.15) 0px, transparent 40%);
            background-attachment: fixed;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* 彩蛋画布层 */
        #confetti-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2001; 
        }

        /* 顶部标题栏 */
        .header-zone {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 10;
        }

        .neko-ears {
            font-size: 45px;
            margin-bottom: 5px;
            animation: wiggle 1.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
        }

        h1 {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(to right, #ffffff, var(--text-neon), var(--neon-lime));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 20, 147, 0.5));
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-neon);
            font-size: 14px;
            opacity: 0.9;
        }

        /* 老虎机主体容器 */
        .slot-machine-wrapper {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 20px auto;
            z-index: 10;
        }

        .slot-machine {
            background: var(--bg-card);
            border: 4px solid var(--neko-purple);
            border-radius: 35px;
            padding: 30px 65px 30px 25px; 
            box-shadow: 0 0 35px rgba(157, 78, 221, 0.4), inset 0 0 20px rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: relative;
            transform-origin: center center;
        }

        /* 大幅度机身剧烈摇晃动画 */
        .machine-shake {
            animation: machineVibrateMega 0.06s linear infinite;
        }

        @keyframes machineVibrateMega {
            0% { transform: translate(6px, 4px) rotate(2deg); }
            20% { transform: translate(-7px, -5px) rotate(-2deg); }
            40% { transform: translate(-9px, 3px) rotate(3deg); }
            60% { transform: translate(8px, -4px) rotate(-2deg); }
            80% { transform: translate(-5px, 6px) rotate(2deg); }
            100% { transform: translate(7px, -3px) rotate(-3deg); }
        }

        .machine-shake-light {
            animation: machineVibrateLight 0.1s linear 5;
        }

        @keyframes machineVibrateLight {
            0% { transform: translate(2px, 1px) rotate(0.5deg); }
            20% { transform: translate(-2px, -1px) rotate(-0.5deg); }
            40% { transform: translate(-3px, 1px) rotate(0.5deg); }
            60% { transform: translate(2px, -1px) rotate(-0.5deg); }
            80% { transform: translate(-1px, 2px) rotate(0.5deg); }
            100% { transform: translate(2px, -1px) rotate(-0.5deg); }
        }

        /* 霓虹跑马灯外框 */
        .slot-machine::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 35px;
            border: 2px solid var(--neon-pink);
            pointer-events: none;
            animation: borderGlow 2s infinite alternate;
        }

        @keyframes borderGlow {
            0% { box-shadow: 0 0 15px var(--neon-pink); }
            100% { box-shadow: 0 0 30px var(--neon-lime); }
        }

        /* 滚轮视窗显示区 */
        .reels-container {
            display: flex;
            justify-content: space-between;
            background: #06020c;
            border: 3px solid #1a0b36;
            border-radius: 20px;
            padding: 15px;
            gap: 15px;
            box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.9);
            position: relative;
            overflow: hidden;
        }

        /* 单个独立滚轮 */
        .reel {
            flex: 1;
            height: 150px;
            background: rgba(20, 10, 35, 0.8);
            border: 2px solid rgba(157, 78, 221, 0.3);
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .reel-strip {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            will-change: transform;
        }

        .slot-item {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 65px;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
            user-select: none;
        }

        /* 一体化嵌入式物理摇杆 */
        .handle-container {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            height: 150px;
            width: 30px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(157, 78, 221, 0.4);
            border-radius: 15px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        .handle-bar {
            position: absolute;
            top: 25px;
            left: 9px;
            width: 8px;
            height: 75px;
            background: linear-gradient(to right, #441a70, #9d4edd, #240c42);
            border-radius: 4px;
            transform-origin: bottom center;
            transition: transform 0.15s ease-out;
        }

        .handle-ball {
            position: absolute;
            top: -24px;
            left: -10px;
            width: 28px;
            height: 28px;
            background: radial-gradient(circle at 30% 30%, #ff66cc, var(--neon-pink), #800040);
            border-radius: 50%;
            box-shadow: 0 0 12px var(--neon-pink);
            cursor: pointer;
            transition: background 0.3s;
        }

        .handle-ball:hover {
            background: radial-gradient(circle at 30% 30%, #e6ff66, var(--neon-lime), #4d8000);
            box-shadow: 0 0 15px var(--neon-lime);
        }

        .handle-container.pulled .handle-bar {
            transform: scaleY(0.2) rotateX(70deg);
        }

        /* 控制台状态与面板 */
        .control-panel {
            background: var(--bg-card);
            border: 2px solid var(--neko-purple);
            border-radius: 24px;
            padding: 22px 30px;
            width: 100%;
            max-width: 500px; 
            text-align: center;
            margin-top: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .wallet-info {
            font-size: 22px;
            font-weight: bold;
            color: var(--neon-lime);
            text-shadow: 0 0 8px rgba(163, 255, 0, 0.5);
            margin-bottom: 18px;
            text-align: center;
            width: 100%;
        }

        .action-zone {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            border-top: 1px dashed rgba(157, 78, 221, 0.3);
            padding-top: 15px;
        }

        .bet-info {
            font-size: 13px;
            color: var(--text-neon);
            text-align: center;
        }

        /* 华丽大奖公告弹窗 */
        .result-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 3, 22, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .result-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .result-box {
            background: rgba(30, 12, 53, 0.95);
            border: 3px solid var(--neon-lime);
            box-shadow: 0 0 50px var(--neon-lime);
            width: 85%;
            max-width: 380px;
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-overlay.show .result-box {
            transform: scale(1);
        }

        .result-title {
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px var(--neon-pink);
            margin-bottom: 10px;
        }

        .result-prize {
            font-size: 24px;
            color: var(--neon-lime);
            font-weight: bold;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(163,255,0,0.7);
        }

        .btn-close-result {
            background: linear-gradient(45deg, var(--neon-pink), var(--neko-purple));
            border: none;
            color: #fff;
            padding: 12px 35px;
            border-radius: 20px;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
        }

        .btn-close-result:hover {
            background: var(--neon-lime);
            color: #000;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        /* 移动端响应式缩放 */
        @media (max-width: 480px) {
            .slot-machine-wrapper { max-width: 340px; }
            .slot-machine { padding: 20px 50px 20px 15px; border-radius: 25px;}
            .reels-container { padding: 10px; gap: 10px; border-radius: 14px;}
            .reel { height: 100px; }
            .slot-item { height: 100px; font-size: 45px; }
            .handle-container { right: 12px; height: 110px; width: 24px;}
            .handle-bar { height: 55px; left: 7px; top: 20px;}
            .handle-ball { width: 22px; height: 22px; top: -18px; left: -8px;}
            h1 { font-size: 26px; }
            .wallet-info { font-size: 19px; }
            .control-panel { padding: 15px 20px; }
        }
    </style>
</head>
<body>

    <!-- 彩蛋效果画布 -->
    <canvas id="confetti-canvas"></canvas>

    <!-- 顶部标题区 -->
    <div class="header-zone">
        <div class="neko-ears">🎰🐾</div>
        <h1>喵呜霓虹 · 赛博狂欢老虎机</h1>
        <div class="subtitle">拉动命运摇杆，三连组合解锁主人的终极赏赐！</div>
    </div>

    <!-- 老虎机主战区 -->
    <div class="slot-machine-wrapper">
        <div class="slot-machine" id="machine-body">
            <!-- 核心三滚轮视窗 -->
            <div class="reels-container">
                <div class="reel"><div class="reel-strip" id="reel0"></div></div>
                <div class="reel"><div class="reel-strip" id="reel1"></div></div>
                <div class="reel"><div class="reel-strip" id="reel2"></div></div>
            </div>

            <!-- 一体化嵌入式物理摇杆 -->
            <div class="handle-container" id="mechanical-handle">
                <div class="handle-bar">
                    <div class="handle-ball" onclick="pullMechanicalLever()"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 底部状态控制台 -->
    <div class="control-panel">
        <div class="wallet-info">核心钱包: <span id="balance-display">5,000.00</span> USDT</div>
        <div class="action-zone">
            <div class="bet-info">
                <div>🐾 单次下注: <span style="color:var(--neon-pink); font-weight:bold;">100 USDT</span></div>
                <div style="opacity:0.6; font-size:11px; margin-top:2px;">三连最高可获 50倍 爆池</div>
            </div>
        </div>
    </div>

    <!-- 华丽结算弹窗 -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-box">
            <div style="font-size: 70px; margin-bottom: 15px; animation: bounce 0.8s infinite alternate;">🎉</div>
            <div class="result-title" id="win-title">LINE COMB!</div>
            <div class="result-prize" id="win-detail">+5000 USDT</div>
            <button class="btn-close-result" onclick="closeResultModal()">继续调教摇杆 🐾</button>
        </div>
    </div>

    <script>
        const slotItems = [
            { icon: "🐱", weight: 50 }, 
            { icon: "💎", weight: 20 }, 
            { icon: "👑", weight: 10 }, 
            { icon: "🧦", weight: 5 },  
            { icon: "🐟", weight: 2 }   
        ];

        let userBalance = 5000.00;
        let isPlaying = false;
        let reelStates = [0, 1, 2]; 

        // 丰富版彩蛋粒子引擎
        const ConfettiEngine = {
            canvas: null,
            ctx: null,
            particles: [],
            colors: ['#ff1493', '#a3ff00', '#9d4edd', '#ff99cc', '#00ffff', '#ffff00', '#ff4500'],
            shapes: ['rect', 'circle', 'star', 'heart'], 
            active: false,
            init() {
                this.canvas = document.getElementById('confetti-canvas');
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                window.addEventListener('resize', () => this.resize());
            },
            resize() {
                if (this.canvas) {
                    this.canvas.width = window.innerWidth;
                    this.canvas.height = window.innerHeight;
                }
            },
            burst(count = 100) {
                this.active = true;
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x: window.innerWidth / 2 + (Math.random() * 160 - 80),
                        y: window.innerHeight / 2 - 50 + (Math.random() * 100 - 50),
                        size: Math.random() * 10 + 6,
                        color: this.colors[Math.floor(Math.random() * this.colors.length)],
                        shape: this.shapes[Math.floor(Math.random() * this.shapes.length)],
                        speedX: (Math.random() - 0.5) * 22, 
                        speedY: (Math.random() - 0.7) * 24 - 8,
                        gravity: 0.35,
                        rotation: Math.random() * 360,
                        rotationSpeed: (Math.random() - 0.5) * 15,
                        opacity: 1
                    });
                }
                if (this.particles.length === count) this.animate();
            },
            // 清理函数：确保彻底擦除并销毁，不会静止驻留
            clear() {
                this.active = false;
                this.particles = [];
                if (this.ctx && this.canvas) {
                    this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                }
            },
            drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
                let rot = Math.PI / 2 * 3; let x = cx; let y = cy; let step = Math.PI / spikes;
                ctx.beginPath(); ctx.moveTo(cx, cy - outerRadius);
                for (let i = 0; i < spikes; i++) {
                    x = cx + Math.cos(rot) * outerRadius; y = cy + Math.sin(rot) * outerRadius; ctx.lineTo(x, y); rot += step;
                    x = cx + Math.cos(rot) * innerRadius; y = cy + Math.sin(rot) * innerRadius; ctx.lineTo(x, y); rot += step;
                }
                ctx.lineTo(cx, cy - outerRadius); ctx.closePath(); ctx.fill();
            },
            drawHeart(ctx, x, y, size) {
                ctx.beginPath(); ctx.moveTo(x, y + size / 4);
                ctx.quadraticCurveTo(x, y, x + size / 2, y); ctx.quadraticCurveTo(x + size, y, x + size, y + size / 3);
                ctx.quadraticCurveTo(x + size, y + size * 2 / 3, x + size / 2, y + size); ctx.quadraticCurveTo(x, y + size * 2 / 3, x, y + size / 3);
                ctx.quadraticCurveTo(x, y, x, y + size / 4); ctx.closePath(); ctx.fill();
            },
            animate() {
                if (!ConfettiEngine.active) return;
                let ctx = ConfettiEngine.ctx;
                ctx.clearRect(0, 0, ConfettiEngine.canvas.width, ConfettiEngine.canvas.height);

                for (let i = ConfettiEngine.particles.length - 1; i >= 0; i--) {
                    let p = ConfettiEngine.particles[i];
                    p.speedY += p.gravity; p.x += p.speedX; p.y += p.speedY; p.rotation += p.rotationSpeed;
                    p.opacity -= 0.012; // 略微加快衰减

                    // 如果粒子生命结束或动画强行关闭，自动过滤
                    if (p.opacity <= 0 || p.y > ConfettiEngine.canvas.height) {
                        ConfettiEngine.particles.splice(i, 1);
                        continue;
                    }

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.opacity;
                    ctx.shadowBlur = 10; ctx.shadowColor = p.color;
                    
                    if (p.shape === 'rect') { ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 1.5); } 
                    else if (p.shape === 'circle') { ctx.beginPath(); ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2); ctx.fill(); } 
                    else if (p.shape === 'star') { ConfettiEngine.drawStar(ctx, 0, 0, 5, p.size, p.size / 2); } 
                    else if (p.shape === 'heart') { ConfettiEngine.drawHeart(ctx, -p.size / 2, -p.size / 2, p.size); }
                    ctx.restore();
                }

                if (ConfettiEngine.particles.length > 0 && ConfettiEngine.active) {
                    requestAnimationFrame(ConfettiEngine.animate);
                } else {
                    ConfettiEngine.clear(); // 动画结束或外部暂停时自动清空，绝不在屏幕停留
                }
            }
        };

        // 重新设计的真实老虎机机械摇晃与金币声学引擎
        const AudioEngine = {
            ctx: null,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            playLever() {
                this.init();
                let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(120, this.ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(40, this.ctx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.3, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.15);
            },
            playReelClick() {
                this.init();
                let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
                osc.type = 'triangle'; osc.frequency.setValueAtTime(280, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.1, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.04);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + 0.04);
            },
            // 新增：拟真机器低频震动撞击声
            playShakeSound(duration = 0.5) {
                this.init();
                let now = this.ctx.currentTime;
                // 用低频锯齿波和噪音模拟机械外壳剧烈颤抖的撞击
                let osc = this.ctx.createOscillator();
                let gain = this.ctx.createGain();
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(65, now);
                // 创造频率微小扰动模拟不规则震动
                osc.frequency.linearRampToValueAtTime(45, now + duration);
                
                gain.gain.setValueAtTime(0.4, now);
                gain.gain.linearRampToValueAtTime(0.01, now + duration);
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start(now);
                osc.stop(now + duration);
            },
            // 新增：模拟复古实体金币掉落托盘的清脆金属碰撞声
            playCoinSound(intensity = 1) {
                this.init();
                let now = this.ctx.currentTime;
                let coinsCount = intensity === 'max' ? 25 : 10;
                
                // 循环生成多个高频清脆的金属撞击微脉冲
                for(let i = 0; i < coinsCount; i++) {
                    let delay = i * (intensity === 'max' ? 0.04 : 0.07);
                    let osc = this.ctx.createOscillator();
                    let gain = this.ctx.createGain();
                    
                    osc.type = 'sine';
                    // 模拟硬币碰撞的高频泛音群 (900Hz ~ 1800Hz)
                    let coinFreq = 950 + Math.random() * 850;
                    osc.frequency.setValueAtTime(coinFreq, now + delay);
                    
                    gain.gain.setValueAtTime(0.18, now + delay);
                    // 极速衰减形成清脆敲击感
                    gain.gain.linearRampToValueAtTime(0.001, now + delay + 0.12);
                    
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    osc.start(now + delay);
                    osc.stop(now + delay + 0.13);
                }
            }
        };

        function initSlotMachine() {
            for(let r = 0; r < 3; r++) { generateStripData(r, reelStates[r]); }
            ConfettiEngine.init();
        }

        function generateStripData(reelIndex, targetIndex) {
            const strip = document.getElementById(`reel${reelIndex}`);
            strip.innerHTML = ''; const len = slotItems.length; const sequence = [];
            for(let i = -15; i <= 2; i++) { let idx = (targetIndex + i + len * 10) % len; sequence.push(slotItems[idx]); }
            sequence.forEach(item => {
                const div = document.createElement('div'); div.className = 'slot-item'; div.innerText = item.icon; strip.appendChild(div);
            });
        }

        function pullMechanicalLever() {
            if (isPlaying) return;
            if (userBalance < 100) { alert("🐾 主人钱包代币不足了！无法启动下一次老虎机契约拉杆。"); return; }

            isPlaying = true;
            userBalance -= 100;
            document.getElementById('balance-display').innerText = userBalance.toFixed(2);

            AudioEngine.playLever();
            const handle = document.getElementById('mechanical-handle');
            handle.classList.add('pulled');
            setTimeout(() => handle.classList.remove('pulled'), 200);

            const machineBody = document.getElementById('machine-body');
            machineBody.classList.add('machine-shake-light');
            setTimeout(() => machineBody.classList.remove('machine-shake-light'), 500);

            const finalResults = [
                Math.floor(Math.random() * slotItems.length),
                Math.floor(Math.random() * slotItems.length),
                Math.floor(Math.random() * slotItems.length)
            ];

            for (let r = 0; r < 3; r++) { smoothSpinReel(r, finalResults[r], 1500 + r * 500); }
        }

        function smoothSpinReel(reelIndex, targetIndex, duration) {
            const strip = document.getElementById(`reel${reelIndex}`);
            const itemHeight = window.innerWidth <= 480 ? 100 : 150;
            generateStripData(reelIndex, targetIndex);
            const totalDistance = 15 * itemHeight; const startTime = performance.now(); let lastAudioTickDistance = 0;

            function updateAnimation(currentTime) {
                const elapsed = currentTime - startTime; const progress = Math.min(elapsed / duration, 1);
                const easeOutQuint = 1 - Math.pow(1 - progress, 5);
                const currentTranslateY = -totalDistance + (totalDistance * easeOutQuint);
                strip.style.transform = `translateY(${currentTranslateY}px)`;
                const currentMilestone = Math.floor(Math.abs(currentTranslateY) / itemHeight);
                if (currentMilestone !== lastAudioTickDistance) { AudioEngine.playReelClick(); lastAudioTickDistance = currentMilestone; }

                if (progress < 1) { requestAnimationFrame(updateAnimation); } 
                else {
                    strip.style.transform = 'translateY(0px)'; reelStates[reelIndex] = targetIndex; generateStripData(reelIndex, targetIndex);
                    if (reelIndex === 2) { finalizeSlotResults(); }
                }
            }
            strip.style.transform = `translateY(${-totalDistance}px)`; requestAnimationFrame(updateAnimation);
        }

        function finalizeSlotResults() {
            isPlaying = false;
            const r0 = reelStates[0]; const r1 = reelStates[1]; const r2 = reelStates[2];
            const machineBody = document.getElementById('machine-body');

            if (r0 === r1 && r1 === r2) {
                const matchedItem = slotItems[r0]; const prizeWon = 100 * matchedItem.weight; userBalance += prizeWon;
                
                // 1. 启动剧烈晃动
                machineBody.classList.add('machine-shake');
                // 2. 混合播放机器摇晃声 + 密集爆金币音效
                AudioEngine.playShakeSound(1.2);
                AudioEngine.playCoinSound('max');
                // 3. 喷涌彩蛋
                ConfettiEngine.burst(260); 

                setTimeout(() => {
                    machineBody.classList.remove('machine-shake');
                    document.getElementById('win-title').innerText = "🐱 完美契约暴击！";
                    document.getElementById('win-detail').innerText = `+${prizeWon} USDT (三连 ${matchedItem.icon})`;
                    document.getElementById('resultOverlay').classList.add('show');
                    document.getElementById('balance-display').innerText = userBalance.toFixed(2);
                }, 1200); 

            } else if (r0 === r1 || r1 === r2 || r0 === r2) {
                const prizeWon = 150; userBalance += prizeWon;

                machineBody.classList.add('machine-shake');
                AudioEngine.playShakeSound(0.7);
                AudioEngine.playCoinSound('mid');
                ConfettiEngine.burst(80); 

                setTimeout(() => {
                    machineBody.classList.remove('machine-shake');
                    document.getElementById('win-title').innerText = "✨ 猫娘双连小捷";
                    document.getElementById('win-detail').innerText = `+${prizeWon} USDT`;
                    document.getElementById('resultOverlay').classList.add('show');
                    document.getElementById('balance-display').innerText = userBalance.toFixed(2);
                }, 750);
            }
        }

        function closeResultModal() {
            document.getElementById('resultOverlay').classList.remove('show');
            ConfettiEngine.clear(); // 只要关闭窗口或者外部终止，彩蛋粒子会被立刻擦除不留痕迹
        }

        window.onload = () => { initSlotMachine(); };
    </script>
</body>
</html>
