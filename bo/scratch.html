<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵呜娱乐城 - 赛博霓虹对奖刮刮乐</title>
    <style>
        :root {
            --bg-dark: #0d061a;
            --bg-card: rgba(36, 17, 59, 0.75);
            --neon-pink: #ff1493;
            --neon-lime: #a3ff00;
            --neko-purple: #9d4edd;
            --text-light: #ffffff;
            --text-neon: #ff99cc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Comic Sans MS', 'PingFang SC', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            background-image: 
                radial-gradient(at 10% 20%, rgba(255, 20, 147, 0.25) 0px, transparent 40%),
                radial-gradient(at 90% 80%, rgba(163, 255, 0, 0.15) 0px, transparent 40%);
            background-attachment: fixed;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        /* 顶部标题栏 */
        .header-zone {
            text-align: center;
            margin-bottom: 25px;
        }

        .neko-ears {
            font-size: 45px;
            margin-bottom: 5px;
            animation: wiggle 1.5s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(-8deg); }
            50% { transform: rotate(8deg); }
        }

        h1 {
            font-size: 38px;
            font-weight: 900;
            background: linear-gradient(to right, #ffffff, var(--text-neon), var(--neon-lime));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 20, 147, 0.5));
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-neon);
            font-size: 14px;
            opacity: 0.9;
        }

        /* 刮刮乐主卡片外框 */
        .scratch-card-container {
            position: relative;
            width: 100%;
            max-width: 460px;
            margin: 15px auto;
        }

        .scratch-card {
            background: var(--bg-card);
            border: 4px solid var(--neko-purple);
            border-radius: 30px;
            padding: 25px;
            box-shadow: 0 0 35px rgba(157, 78, 221, 0.4), inset 0 0 20px rgba(0,0,0,0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: relative;
        }

        .scratch-card::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 30px;
            border: 2px solid var(--neon-pink);
            pointer-events: none;
            animation: borderGlow 2s infinite alternate;
        }

        @keyframes borderGlow {
            0% { box-shadow: 0 0 15px var(--neon-pink); }
            100% { box-shadow: 0 0 30px var(--neon-lime); }
        }

        /* 目标区域（幸运中奖图案提示） */
        .lucky-target-box {
            background: rgba(0, 0, 0, 0.4);
            border: 2px dashed var(--text-neon);
            border-radius: 15px;
            padding: 12px;
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .target-title {
            font-size: 14px;
            color: #fff;
        }

        .target-icon {
            font-size: 32px;
            animation: pulseIcon 0.8s infinite alternate;
        }

        @keyframes pulseIcon {
            0% { transform: scale(0.9); filter: drop-shadow(0 0 2px var(--neon-pink)); }
            100% { transform: scale(1.1); filter: drop-shadow(0 0 10px var(--neon-pink)); }
        }

        /* 刮奖真实底层面板 */
        .scratch-grid-wrapper {
            position: relative;
            width: 100%;
            height: 160px;
            background: #06020c;
            border: 3px solid #1a0b36;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: inset 0 0 25px rgba(0, 0, 0, 0.9);
        }

        /* 底层：显示当前卡片的秘密奖项 */
        .prize-underlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #110724;
            z-index: 1;
        }

        .prize-display-icon {
            font-size: 55px;
            margin-bottom: 5px;
        }

        .prize-display-text {
            font-size: 18px;
            font-weight: bold;
            color: var(--neon-lime);
            text-shadow: 0 0 10px rgba(163, 255, 0, 0.6);
        }

        /* 顶层：Canvas 刮漆层 */
        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            /* 注入粉嫩的霓虹猫爪光标，并在非中心对齐时进行位移校准 (16 16为光标中心点) */
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24"><path d="M12 14c-1.66 0-3 1.34-3 3 0 2 1.34 3.5 3 3.5s3-1.5 3-3.5c0-1.66-1.34-3-3-3zm-4.5-2c-.83 0-1.5-.67-1.5-1.5S6.67 9 7.5 9s1.5.67 1.5 1.5S8.33 12 7.5 12zm9 0c-.83 0-1.5-.67-1.5-1.5S15.67 9 16.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm-4.5-3c-.83 0-1.5-.67-1.5-1.5S11.17 6 12 6s1.5.67 1.5 1.5S12.83 9 12 9z" fill="%23ff1493" stroke="%23ffffff" stroke-width="1"/></svg>') 16 16, crosshair;
            touch-action: none;
        }

        /* 底部状态控制台 */
        .control-panel {
            background: var(--bg-card);
            border: 2px solid var(--neko-purple);
            border-radius: 24px;
            padding: 22px 30px;
            width: 100%;
            max-width: 460px;
            text-align: center;
            margin-top: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wallet-info {
            font-size: 22px;
            font-weight: bold;
            color: var(--neon-lime);
            text-shadow: 0 0 8px rgba(163, 255, 0, 0.5);
            margin-bottom: 18px;
            text-align: center;
            width: 100%;
        }

        .action-zone {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            gap: 20px;
            border-top: 1px dashed rgba(157, 78, 221, 0.3);
            padding-top: 15px;
        }

        .bet-info {
            font-size: 13px;
            color: var(--text-neon);
            text-align: left;
        }

        .buy-btn {
            background: linear-gradient(45deg, var(--neon-pink), var(--neko-purple));
            border: none;
            color: white;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: 900;
            border-radius: 18px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4);
            transition: all 0.2s;
            flex-grow: 1;
        }

        .buy-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 0 20px var(--neon-lime);
            background: var(--neon-lime);
            color: #000;
        }

        .buy-btn:disabled {
            background: #331d4d;
            color: #775599;
            box-shadow: none;
            cursor: not-allowed;
        }

        .scratch-tip {
            margin-top: 12px;
            font-size: 12px;
            color: #9d4edd;
        }

        /* 华丽结算大奖公告弹窗 */
        .result-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10, 3, 22, 0.9);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .result-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .result-box {
            background: rgba(30, 12, 53, 0.95);
            border: 3px solid var(--neon-lime);
            box-shadow: 0 0 50px var(--neon-lime);
            width: 85%;
            max-width: 380px;
            border-radius: 30px;
            padding: 40px 20px;
            text-align: center;
            transform: scale(0.7);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-overlay.show .result-box {
            transform: scale(1);
        }

        .result-title {
            font-size: 32px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 15px var(--neon-pink);
            margin-bottom: 10px;
        }

        .result-prize {
            font-size: 24px;
            color: var(--neon-lime);
            font-weight: bold;
            margin-bottom: 25px;
            text-shadow: 0 0 10px rgba(163,255,0,0.7);
        }

        .btn-close-result {
            background: linear-gradient(45deg, var(--neon-pink), var(--neko-purple));
            border: none;
            color: #fff;
            padding: 12px 35px;
            border-radius: 20px;
            font-weight: 900;
            cursor: pointer;
        }

        @media (max-width: 480px) {
            .scratch-card-container { max-width: 340px; }
            .scratch-card { padding: 18px; border-radius: 22px;}
            .scratch-grid-wrapper { height: 140px; }
            .prize-display-icon { font-size: 45px; }
            h1 { font-size: 26px; }
            .wallet-info { font-size: 19px; }
            .control-panel { padding: 15px 20px; }
        }
    </style>
</head>
<body>

    <!-- 顶部标题区 -->
    <div class="header-zone">
        <div class="neko-ears">🐾⚡</div>
        <h1>喵呜霓虹 · 极光对奖刮刮乐</h1>
        <div class="subtitle">简单直接！刮开图层，结果相符即拿走对应大奖！</div>
    </div>

    <!-- 刮刮乐主卡片 -->
    <div class="scratch-card-container">
        <div class="scratch-card">
            
            <!-- 上方：本轮中奖目标图案 -->
            <div class="lucky-target-box">
                <div class="target-title">🎯 本期幸运猫娘图案:</div>
                <div class="target-icon" id="target-icon-display">🐱</div>
            </div>

            <!-- 下方：主刮奖区 -->
            <div class="scratch-grid-wrapper">
                <div class="prize-underlay">
                    <div class="prize-display-icon" id="card-icon">❓</div>
                    <div class="prize-display-text" id="card-prize">等待开奖</div>
                </div>
                <canvas id="scratch-canvas"></canvas>
            </div>

        </div>
    </div>

    <!-- 底部状态控制台 -->
    <div class="control-panel">
        <div class="wallet-info">核心钱包: <span id="balance-display">5,000.00</span> USDT</div>
        
        <div class="action-zone">
            <div class="bet-info">
                <div>🎟️ 刮刮乐单张: <span style="color:var(--neon-pink); font-weight:bold;">100 USDT</span></div>
                <div class="scratch-tip" id="status-tip">请先购买一张新卡片 🐾</div>
            </div>
            <button class="buy-btn" id="action-btn" onclick="buyNewCard()">购买新卡片 🎟️</button>
        </div>
    </div>

    <!-- 结算弹窗 -->
    <div class="result-overlay" id="resultOverlay">
        <div class="result-box">
            <div style="font-size: 70px; margin-bottom: 15px; animation: bounce 0.8s infinite alternate;">🎉</div>
            <div class="result-title" id="win-title">HIT!</div>
            <div class="result-prize" id="win-detail">+5000 USDT</div>
            <button class="btn-close-result" onclick="closeResultModal()">收下赏赐 🐾</button>
        </div>
    </div>

    <script>
        const prizeList = [
            { icon: "🐱", text: "终极猫娘特奖 (5000 USDT)", prize: 5000, prob: 0.1 },
            { icon: "💎", text: "霓虹钻石大奖 (1500 USDT)", prize: 1500, prob: 0.15 },
            { icon: "👑", text: "王权皇冠好礼 (800 USDT)", prize: 800, prob: 0.2 },
            { icon: "🐟", text: "金枪小鱼安慰奖 (200 USDT)", prize: 200, prob: 0.25 },
            { icon: "🧦", text: "白给原味丝袜 (0 USDT)", prize: 0, prob: 0.3 }
        ];

        let userBalance = 5000.00;
        let cardActivated = false;
        let prizeSettled = false;
        
        let currentTarget = prizeList[0]; 
        let currentCardContent = null;    

        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // 回归并升级：经典的实体沙沙白噪声刮纸声引擎
        const AudioEngine = {
            ctx: null,
            init() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            playCyberScratch() { 
                this.init();
                let bufferSize = this.ctx.sampleRate * 0.05; // 50ms 瞬态音频帧
                let buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
                let data = buffer.getChannelData(0);
                
                // 实时合成解压的白噪声基础波形
                for (let i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                
                let noiseSource = this.ctx.createBufferSource();
                noiseSource.buffer = buffer;
                
                // 引入高阶带通滤波器（Bandpass Filter）重塑沙沙颗粒感
                let bandpassFilter = this.ctx.createBiquadFilter();
                bandpassFilter.type = 'bandpass';
                bandpassFilter.frequency.value = 1200; // 调高至1200Hz，比最初版本音色更爽脆、更解压
                bandpassFilter.Q.value = 3.0;         // 增大Q值，使其更有刮擦金属涂层的质感
                
                let gainNode = this.ctx.createGain();
                gainNode.gain.setValueAtTime(0.09, this.ctx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.001, this.ctx.currentTime + 0.05);
                
                noiseSource.connect(bandpassFilter);
                bandpassFilter.connect(gainNode);
                gainNode.connect(this.ctx.destination);
                
                noiseSource.start();
            },
            playWin() {
                this.init();
                let now = this.ctx.currentTime;
                [523.25, 659.25, 783.99, 1046.50, 1318.51].forEach((freq, i) => {
                    let osc = this.ctx.createOscillator();
                    let gain = this.ctx.createGain();
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(freq, now + i * 0.06);
                    gain.gain.setValueAtTime(0.2, now + i * 0.06);
                    gain.gain.linearRampToValueAtTime(0.01, now + i * 0.06 + 0.4);
                    osc.connect(gain); gain.connect(this.ctx.destination);
                    osc.start(now + i * 0.06); osc.stop(now + i * 0.06 + 0.4);
                });
            }
        };

        function initCanvasLayer() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;

            let gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#3a1c66');
            gradient.addColorStop(0.5, '#200b3b');
            gradient.addColorStop(1, '#ff1493');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = 'rgba(163, 255, 0, 0.15)';
            ctx.lineWidth = 3;
            for(let i = 0; i < canvas.width; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i + 20, canvas.height); ctx.stroke();
            }

            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 18px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText("⚡ 用猫爪划动刮开电子图层 ⚡", canvas.width / 2, canvas.height / 2);
        }

        function buyNewCard() {
            if (userBalance < 100) {
                alert("🐾 余额不足，无法开启新的赛博图层。");
                return;
            }

            userBalance -= 100;
            document.getElementById('balance-display').innerText = userBalance.toFixed(2);

            cardActivated = true;
            prizeSettled = false;
            document.getElementById('status-tip').innerText = "👉 激光对齐中！请直接擦除图层...";
            document.getElementById('status-tip').style.color = "var(--neon-lime)";
            document.getElementById('action-btn').disabled = true;

            currentTarget = prizeList[0];
            document.getElementById('target-icon-display').innerText = currentTarget.icon;

            let roll = Math.random();
            let selected = prizeList[prizeList.length - 1]; 
            let accum = 0;
            for (let item of prizeList) {
                accum += item.prob;
                if (roll <= accum) {
                    selected = item;
                    break;
                }
            }
            currentCardContent = selected;

            document.getElementById('card-icon').innerText = currentCardContent.icon;
            document.getElementById('card-prize').innerText = currentCardContent.text;

            initCanvasLayer();
        }

        function handleScratch(e) {
            if (!cardActivated || prizeSettled) return;

            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(x, y, 25, 0, Math.PI * 2); 
            ctx.fill();

            // 触发爽脆的经典物理沙沙声
            AudioEngine.playCyberScratch();

            checkPercentage();
        }

        let throttle = 0;
        function checkPercentage() {
            throttle++;
            if (throttle % 10 !== 0) return;

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const pixels = imgData.data;
            let clearPixels = 0;

            for (let i = 3; i < pixels.length; i += 4) {
                if (pixels[i] === 0) clearPixels++;
            }

            if (clearPixels / (pixels.length / 4) > 0.40) {
                settleResult();
            }
        }

        function settleResult() {
            if (prizeSettled) return;
            prizeSettled = true;
            cardActivated = false;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            document.getElementById('action-btn').disabled = false;

            if (currentCardContent.icon === currentTarget.icon && currentCardContent.prize > 0) {
                let winAmount = currentCardContent.prize;
                userBalance += winAmount;
                AudioEngine.playWin();

                setTimeout(() => {
                    document.getElementById('win-title').innerText = "🎉 目标完全一致！";
                    document.getElementById('win-detail').innerText = `刮出 [${currentCardContent.icon}], 独揽大奖 +${winAmount} USDT!`;
                    document.getElementById('resultOverlay').classList.add('show');
                    document.getElementById('balance-display').innerText = userBalance.toFixed(2);
                }, 200);

                document.getElementById('status-tip').innerText = `🎉 恭喜中奖！斩获 ${winAmount} USDT！`;
                document.getElementById('status-tip').style.color = "var(--neon-lime)";
            } else if (currentCardContent.prize > 0) {
                let sideAmount = Math.floor(currentCardContent.prize * 0.1); 
                userBalance += sideAmount;
                
                document.getElementById('status-tip').innerText = `获得副券奖励 ${sideAmount} USDT！`;
                document.getElementById('status-tip').style.color = "var(--text-neon)";
                document.getElementById('balance-display').innerText = userBalance.toFixed(2);
            } else {
                document.getElementById('status-tip').innerText = "未命中幸运图案，换张卡试试手气喵~";
                document.getElementById('status-tip').style.color = "var(--neon-pink)";
            }
        }

        function closeResultModal() {
            document.getElementById('resultOverlay').classList.remove('show');
        }

        canvas.addEventListener('mousedown', () => isDrawing = true);
        canvas.addEventListener('mouseup', () => isDrawing = false);
        canvas.addEventListener('mouseleave', () => isDrawing = false);
        canvas.addEventListener('mousemove', (e) => { if(isDrawing) handleScratch(e); });

        canvas.addEventListener('touchstart', (e) => { isDrawing = true; handleScratch(e); });
        canvas.addEventListener('touchend', () => isDrawing = false);
        canvas.addEventListener('touchmove', (e) => { if(isDrawing) handleScratch(e); e.preventDefault(); });

        window.onload = () => {
            initCanvasLayer();
        };
    </script>
</body>
</html>
