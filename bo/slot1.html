<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魅惑萌虎老虎机</title>
    <style>
        :root {
            --primary: #ff477e;
            --secondary: #ff85a2;
            --accent: #7000ff;
            --bg: #1a002c;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #2d004d 0%, var(--bg) 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        /* 霓虹背景粒子 */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.2; }
            100% { transform: scale(1.3); opacity: 0.4; }
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--accent);
            margin-bottom: 5px;
            z-index: 1;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .subtitle {
            color: var(--secondary);
            margin-bottom: 25px;
            z-index: 1;
            font-weight: bold;
            letter-spacing: 2px;
        }

        /* 老虎机主外壳 */
        .slot-machine {
            background: linear-gradient(135deg, #3d0066 0%, #110022 100%);
            border: 8px solid var(--primary);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(255, 71, 126, 0.5), inset 0 0 20px rgba(112, 0, 255, 0.6);
            display: flex;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        /* 滚轮容器 */
        .reel-container {
            display: flex;
            background: #050011;
            padding: 15px;
            border-radius: 20px;
            border: 3px solid var(--accent);
            gap: 15px;
            overflow: hidden;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.9);
        }

        /* 单个滚轮 */
        .reel {
            width: 100px;
            height: 120px;
            background: linear-gradient(to bottom, #220033 0%, #110022 50%, #220033 100%);
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.1);
            overflow: hidden;
            position: relative;
        }

        .strip {
            position: absolute;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            top: 0;
            left: 0;
        }

        .icon {
            width: 100px;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.5rem;
            user-select: none;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* 摇杆区域 */
        .handle-container {
            width: 40px;
            height: 180px;
            margin-left: 25px;
            position: relative;
            cursor: pointer;
        }

        .slot-trigger {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            z-index: 10;
            cursor: pointer;
        }

        .handle-bar {
            width: 12px;
            height: 100px;
            background: linear-gradient(to right, #888, #fff, #444);
            position: absolute;
            bottom: 40px;
            left: 14px;
            border-radius: 5px;
            transform-origin: bottom center;
            transition: transform 0.2s ease-in-out;
        }

        .handle-ball {
            width: 36px;
            height: 36px;
            background: radial-gradient(circle at 30% 30%, #ff6b8b, var(--primary), #b50031);
            border-radius: 50%;
            position: absolute;
            top: 15px;
            left: 2px;
            box-shadow: 0 0 15px var(--primary);
            transition: transform 0.2s ease-in-out;
            transform-origin: center 115px;
        }

        /* 摇杆动画状态 */
        .handle-container.active .handle-bar {
            transform: scaleY(0.3) rotateX(60deg);
        }
        .handle-container.active .handle-ball {
            transform: translateY(70px) scale(0.9);
        }

        /* 控制板（金币与按钮） */
        .dashboard {
            margin-top: 30px;
            display: flex;
            gap: 40px;
            align-items: center;
            z-index: 1;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 25px;
            border-radius: 15px;
            border: 1px solid rgba(255, 71, 126, 0.3);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--secondary);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* 音乐开关 */
        .audio-ctrl {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--secondary);
            color: #fff;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s;
        }
        .audio-ctrl:hover {
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        /* 模糊滤镜用于高转速特效 */
        .blur {
            filter: blur(4px);
        }

        /* 赢取特效弹窗 */
        .win-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        .win-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
        .win-content {
            text-align: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            0% { transform: scale(0.5); }
            100% { transform: scale(1); }
        }
        .win-title {
            font-size: 4rem;
            color: #fff;
            text-shadow: 0 0 20px #fff, 0 0 30px var(--primary), 0 0 40px var(--accent);
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    
    <h1>🐯 魅惑萌虎 🐯</h1>
    <div class="subtitle">LUCKY TIGER SLOT</div>

    <!-- 老虎机主结构 -->
    <div class="slot-machine">
        <div class="reel-container">
            <!-- 轮盘 1 -->
            <div class="reel" id="reel1">
                <div class="strip" id="strip1"></div>
            </div>
            <!-- 轮盘 2 -->
            <div class="reel" id="reel2">
                <div class="strip" id="strip2"></div>
            </div>
            <!-- 轮盘 3 -->
            <div class="reel" id="reel3">
                <div class="strip" id="strip3"></div>
            </div>
        </div>

        <!-- 互动摇杆 -->
        <div class="handle-container" id="handleContainer">
            <div class="handle-bar"></div>
            <div class="handle-ball"></div>
        </div>
    </div>

    <!-- 数据面板 -->
    <div class="dashboard">
        <div class="stat-box">
            <div class="stat-label">✨ 我的金币 ✨</div>
            <div class="stat-value" id="balance">1000</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">💖 本次赢取 💖</div>
            <div class="stat-value" id="winAmount">0</div>
        </div>
    </div>

    <!-- 声音控制按钮 -->
    <button class="audio-ctrl" id="audioBtn">🎵 开启BGM</button>

    <!-- 中奖大弹窗 -->
    <div class="win-overlay" id="winOverlay">
        <div class="win-content">
            <h2 class="win-title">🎉 大吉大利 🐯</h2>
            <p style="font-size: 1.5rem; margin-top: 15px;">恭喜获得金币奖励！</p>
        </div>
    </div>

<script>
    // 充满诱惑和可爱元素的图标池 (老虎、爱心、甜点、宝石)
    const iconPool = ['🐯', '🐱', '💖', '👑', '🍒', '🍩', '💎'];
    const itemHeight = 120; // 每个图标高度
    const visibleIcons = 1; // 每次只展现一行
    let balance = 1000;
    let isSpinning = false;

    // 动态生成音效 (利用 Web Audio API 纯代码合成，无需外部音频文件，即开即用)
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let bgmNode = null;
    let isBgmPlaying = false;

    // 音效1: 拉杆音效 (咔哒一下，接着频率下降)
    function playLeverSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2);
        
        gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
    }

    // 音效2: 滚轮转动中滴答声
    function playTickSound() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.05);
    }

    // 音效3: 中奖音效 (欢快欢腾的上升和弦)
    function playWinSound() {
        const notes = [261.6, 329.6, 392.0, 523.3, 659.3, 784.0, 1046.5];
        notes.forEach((freq, index) => {
            setTimeout(() => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }, index * 80);
        });
    }

    // 音效4: 纯代码合成赛博朋克/可爱风BGM
    function startBGM() {
        if (isBgmPlaying) return;
        isBgmPlaying = true;
        
        const tempo = 150; // 节拍速度
        let step = 0;
        const melody = [261.6, 329.6, 293.7, 349.2, 329.6, 392.0, 349.2, 440.0];

        function playBgmStep() {
            if (!isBgmPlaying) return;
            // 简单循环低音与旋律线
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(melody[step % melody.length] / 2, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.4);
            
            step++;
            setTimeout(playBgmStep, 60000 / tempo);
        }
        playBgmStep();
    }

    // 初始化滚轮数据
    function initReel(stripEl) {
        // 创建一个包含30个图标的长条，用于滚动循环效果
        let html = '';
        for(let i=0; i<30; i++) {
            const randomIcon = iconPool[Math.floor(Math.random() * iconPool.length)];
            html += `<div class="icon">${randomIcon}</div>`;
        }
        stripEl.innerHTML = html;
        stripEl.style.top = '0px';
    }

    const strip1 = document.getElementById('strip1');
    const strip2 = document.getElementById('strip2');
    const strip3 = document.getElementById('strip3');

    initReel(strip1);
    initReel(strip2);
    initReel(strip3);

    // 核心拉杆逻辑
    const handleContainer = document.getElementById('handleContainer');
    handleContainer.addEventListener('click', spin);

    function spin() {
        if (isSpinning) return;
        if (balance < 50) {
            alert('金币不够啦！客官要不要亲亲老虎续个命？');
            return;
        }

        // 扣除金币
        balance -= 50;
        document.getElementById('balance').innerText = balance;
        document.getElementById('winAmount').innerText = '0';
        isSpinning = true;

        // 触发拉杆动画和音效
        handleContainer.classList.add('active');
        playLeverSound();
        setTimeout(() => handleContainer.classList.remove('active'), 200);

        // 为每个轮盘计算最终停留目标
        const results = [];
        const strips = [strip1, strip2, strip3];
        
        strips.forEach((strip, index) => {
            // 添加旋转模糊特效
            strip.classList.add('blur');
            
            // 设定随机目标位置
            const targetIndex = Math.floor(Math.random() * (iconPool.length + 10)) + 10; 
            const finalIcon = strip.children[targetIndex].innerText;
            results.push(finalIcon);

            // 用定时的多段过渡模拟物理减速
            const targetTop = -(targetIndex * itemHeight);
            
            // 滚动音效滴答声
            let tickInterval = setInterval(() => {
                if(strip.classList.contains('blur')) playTickSound();
            }, 100);

            setTimeout(() => {
                clearInterval(tickInterval);
                strip.classList.remove('blur');
                strip.style.transition = 'all 1.5s cubic-bezier(0.1, 0.8, 0.3, 1)';
                strip.style.top = targetTop + 'px';
            }, index * 300); // 错开每个轮盘的停止时间，制造紧张感
        });

        // 最终结果结算
        setTimeout(() => {
            isSpinning = false;
            checkResult(results);
        }, 2200);
    }

    // 判断中奖逻辑
    function checkResult(results) {
        const [r1, r2, r3] = results;
        let winPrize = 0;

        if (r1 === r2 && r2 === r3) {
            // 三连全中！
            if (r1 === '🐯') {
                winPrize = 1000; // 老虎大奖！
            } else {
                winPrize = 500;
            }
        } else if (r1 === r2 || r2 === r3 || r1 === r3) {
            // 两两对对碰
            winPrize = 100;
        }

        if (winPrize > 0) {
            balance += winPrize;
            document.getElementById('balance').innerText = balance;
            document.getElementById('winAmount').innerText = winPrize;
            
            // 中奖狂欢特效
            playWinSound();
            const overlay = document.getElementById('winOverlay');
            if(winPrize >= 500) {
                overlay.querySelector('.win-title').innerText = `🎉 萌虎大爆发 +${winPrize}!`;
            } else {
                overlay.querySelector('.win-title').innerText = `💖 甜心好运 +${winPrize}!`;
            }
            overlay.classList.add('show');
            setTimeout(() => overlay.classList.remove('show'), 2000);
        }
    }

    // 音乐开关互动
    document.getElementById('audioBtn').addEventListener('click', function() {
        if(audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        if(!isBgmPlaying) {
            startBGM();
            this.innerText = '⏸ 关闭BGM';
            this.style.background = 'var(--accent)';
        } else {
            isBgmPlaying = false;
            this.innerText = '🎵 开启BGM';
            this.style.background = 'rgba(0,0,0,0.6)';
        }
    });
</script>

</body>
</html>
