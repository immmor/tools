<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魅惑萌虎机 🎰</title>
    <style>
        :root {
            --primary: #ff2a74;
            --secondary: #ff758c;
            --accent: #8a2be2;
            --bg: #0b0314;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #200b3b 0%, var(--bg) 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        /* 霓虹背景装饰 */
        .neon-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.3;
            z-index: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #fff;
            text-shadow: 0 0 10px var(--primary), 0 0 20px var(--secondary);
            z-index: 1;
            animation: pulse 2s infinite alternate;
        }

        @keyframes pulse {
            0% { transform: scale(0.98); text-shadow: 0 0 10px var(--primary); }
            100% { transform: scale(1.02); text-shadow: 0 0 25px var(--secondary), 0 0 10px #ff00ff; }
        }

        /* 老虎机主外壳 */
        .machine-container {
            position: relative;
            background: linear-gradient(145deg, #1a082e, #0a0314);
            border: 4px solid var(--primary);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 0 30px rgba(255, 42, 116, 0.4), inset 0 0 15px rgba(138, 43, 226, 0.5);
            z-index: 1;
        }

        /* 屏幕显示区域 */
        .slots-display {
            display: flex;
            gap: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 20px;
            border-radius: 16px;
            border: 2px solid var(--accent);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.9);
            margin-bottom: 25px;
        }

        /* 单个滚轮 */
        .slot-window {
            width: 100px;
            height: 120px;
            border-radius: 12px;
            background: linear-gradient(to bottom, #2a114d, #130324);
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .reel {
            position: absolute;
            top: 0;
            display: flex;
            flex-direction: column;
            transition: top 0s ease-in-out;
        }

        .icon {
            width: 100px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            user-select: none;
            filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
        }

        /* 控制区域 */
        .controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .score-board {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff;
        }

        /* 炫酷的摇杆/按钮 */
        .spin-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px var(--primary), 0 5px 0 #b3124b;
            transition: all 0.1s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .spin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px var(--secondary), 0 5px 0 #b3124b;
        }

        .spin-btn:active {
            transform: translateY(3px);
            box-shadow: 0 0 10px var(--primary), 0 2px 0 #b3124b;
        }

        .spin-btn:disabled {
            background: #444;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        /* 胜利庆祝特效层 */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 绚丽粒子 */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: float 1.5s ease-out forwards;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-200px) scale(0.5) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="neon-glow"></div>
    
    <h1>💋 魅惑萌虎机 ✨</h1>

    <div class="machine-container">
        <!-- 滚轮区域 -->
        <div class="slots-display">
            <div class="slot-window"><div class="reel" id="reel1"></div></div>
            <div class="slot-window"><div class="reel" id="reel2"></div></div>
            <div class="slot-window"><div class="reel" id="reel3"></div></div>
        </div>

        <!-- 控制与金币 -->
        <div class="controls">
            <div class="score-board">💝💖 积分: <span id="coins">100</span> 💖💝</div>
            <button class="spin-btn" id="spinBtn" onclick="spin()">SPIN!</button>
        </div>
    </div>

    <div class="overlay" id="overlay"></div>

    <script>
        // 可爱且带点小魅惑的元素池
        const pool = ['🐱', '💋', '💎', '🍒', '🦊', '🔮', '✨'];
        const iconHeight = 120; // 每个图标高度
        const numIconsInReel = 30; // 每次滚动生成的假节点数，创造滚动动画

        const reels = [
            document.getElementById('reel1'),
            document.getElementById('reel2'),
            document.getElementById('reel3')
        ];
        const coinsDisplay = document.getElementById('coins');
        const spinBtn = document.getElementById('spinBtn');
        const overlay = document.getElementById('overlay');

        let coins = 100;
        let currentResult = [0, 0, 0];

        // Web Audio API 声音合成器 (无需外部音频文件)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'spin') {
                // 启动声音：上升频率
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.2);
            } else if (type === 'stop') {
                // 停顿清脆声
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.05);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.05);
            } else if (type === 'win') {
                // 赢的华丽音效：连续和弦
                const now = audioCtx.currentTime;
                [523.25, 659.25, 783.99, 1046.50].forEach((freq, index) => {
                    const o = audioCtx.createOscillator();
                    const g = audioCtx.createGain();
                    o.type = 'sine';
                    o.frequency.setValueAtTime(freq, now + index * 0.08);
                    g.gain.setValueAtTime(0.2, now + index * 0.08);
                    g.gain.linearRampToValueAtTime(0, now + index * 0.08 + 0.3);
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.start(now + index * 0.08);
                    o.stop(now + index * 0.08 + 0.3);
                });
            } else if (type === 'lose') {
                // 输的滑稽沮丧声
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.3);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // 初始化滚轮列表
        function initReels() {
            reels.forEach((reel, i) => {
                reel.innerHTML = '';
                // 随机放一个初始值
                const idx = Math.floor(Math.random() * pool.length);
                currentResult[i] = idx;
                
                const iconDiv = document.createElement('div');
                iconDiv.className = 'icon';
                iconDiv.textContent = pool[idx];
                reel.appendChild(iconDiv);
                reel.style.top = '0px';
            });
        }

        // 启动老虎机
        function spin() {
            if (coins < 10) {
                alert("噢~ 亲爱的，你的小金库空了呢。送你50积分补充一下~ 💋");
                coins += 50;
                coinsDisplay.textContent = coins;
                return;
            }

            // 扣除积分
            coins -= 10;
            coinsDisplay.textContent = coins;
            spinBtn.disabled = true;
            playSound('spin');

            // 决定最终结果
            const results = [
                Math.floor(Math.random() * pool.length),
                Math.floor(Math.random() * pool.length),
                Math.floor(Math.random() * pool.length)
            ];

            // 构建长长的滚动列表来制造飞速旋转假象
            reels.forEach((reel, i) => {
                reel.innerHTML = '';
                // 1. 保留原本的首位
                const firstIcon = document.createElement('div');
                firstIcon.className = 'icon';
                firstIcon.textContent = pool[currentResult[i]];
                reel.appendChild(firstIcon);

                // 2. 填充中间的随机混乱图标
                for(let j=0; j<numIconsInReel - 2; j++) {
                    const tempIcon = document.createElement('div');
                    tempIcon.className = 'icon';
                    tempIcon.textContent = pool[Math.floor(Math.random() * pool.length)];
                    reel.appendChild(tempIcon);
                }

                // 3. 压入最终结果图标在末尾
                const lastIcon = document.createElement('div');
                lastIcon.className = 'icon';
                lastIcon.textContent = pool[results[i]];
                reel.appendChild(lastIcon);

                // CSS 动画重置与启动
                reel.style.transition = 'none';
                reel.style.top = '0px';

                // 强制重绘
                reel.offsetHeight;

                // 加上平滑的缓动特效，三个轮子时间错开更有层次感
                const duration = 1.5 + (i * 0.5); 
                reel.style.transition = `top ${duration}s cubic-bezier(0.1, 0.8, 0.3, 1.01)`;
                const targetTop = -((numIconsInReel - 1) * iconHeight);
                reel.style.top = `${targetTop}px`;

                // 滚动结束后的回调
                setTimeout(() => {
                    playSound('stop');
                    
                    // 动画停止后，砍掉没用的假节点，悄悄把top归零
                    reel.style.transition = 'none';
                    reel.innerHTML = '';
                    const finalIcon = document.createElement('div');
                    finalIcon.className = 'icon';
                    finalIcon.textContent = pool[results[i]];
                    reel.appendChild(finalIcon);
                    reel.style.top = '0px';

                    // 最后一个轮子停下时判断输赢
                    if (i === 2) {
                        currentResult = [...results];
                        checkWin(results);
                    }
                }, duration * 1000);
            });
        }

        // 判定输赢及发放特效
        function checkWin(res) {
            spinBtn.disabled = false;

            if (res[0] === res[1] && res[1] === res[2]) {
                // 三连全中！
                coins += 100;
                coinsDisplay.textContent = coins;
                playSound('win');
                createCelebrationEffect();
            } else if (res[0] === res[1] || res[1] === res[2] || res[0] === res[2]) {
                // 两连中！
                coins += 20;
                coinsDisplay.textContent = coins;
                playSound('win');
                createCelebrationEffect(15);
            } else {
                // 没中
                playSound('lose');
            }
        }

        // 爆破爱心和闪烁的特效
        function createCelebrationEffect(count = 40) {
            const elements = ['✨', '💖', '💋', '⭐', '🌸'];
            const rect = reels[1].getBoundingClientRect(); // 从中间格子爆开

            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.textContent = elements[Math.floor(Math.random() * elements.length)];
                p.style.fontSize = `${Math.random() * 20 + 20}px`;
                
                // 随机散射角度和位置
                p.style.left = `${window.innerWidth / 2 + (Math.random() - 0.5) * 150}px`;
                p.style.top = `${window.innerHeight / 2 + (Math.random() - 0.5) * 100}px`;
                
                // 随机动画路径偏移值
                p.style.setProperty('--x', `${(Math.random() - 0.5) * 300}px`);
                
                overlay.appendChild(p);

                // 动画结束移除节点
                setTimeout(() => p.remove(), 1500);
            }
        }

        // 页面加载完毕初始化
        window.onload = initReels;
    </script>
</body>
</html>
