<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵呜 Vegas - 4.0 赛博液态金属全息按钮军火库</title>
    <style>
        /* 演示背景：极简曜石黑底色，烘托高冷的幻彩全息金属 */
        body {
            background-color: #030108;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 0;
            padding: 60px 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(157, 78, 221, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(0, 245, 255, 0.05) 0%, transparent 50%);
        }

        .sandbox-title {
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(157, 78, 221, 0.6);
            text-align: center;
        }

        /* 极简奢华的暗色玻璃卡片容器 */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1100px;
            width: 100%;
            background: rgba(10, 5, 20, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 40px;
            border-radius: 24px;
            backdrop-filter: blur(20px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.8);
        }

        .button-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.02);
            padding: 40px 20px;
            border-radius: 16px;
            transition: all 0.3s;
        }

        .button-item:hover {
            border-color: rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.02);
        }

        .button-desc {
            color: rgba(255, 255, 255, 0.4);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.4;
        }

        /* =======================================================
           按钮 1：【主 CTA】液态流汞 · 全息跃迁按钮
           ======================================================= */
        .btn-chrome-main {
            position: relative;
            background: #000;
            border: none;
            color: #fff;
            padding: 16px 42px;
            font-size: 15px;
            font-weight: 800;
            letter-spacing: 1.5px;
            border-radius: 50px;
            cursor: pointer;
            z-index: 1;
            box-shadow: 
                0 4px 15px rgba(0, 0, 0, 0.6),
                inset 0 1px 1px rgba(255, 255, 255, 0.2);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        /* 液态全息流光背景层 */
        .btn-chrome-main::before {
            content: '';
            position: absolute;
            inset: -1.5px;
            border-radius: 50px;
            /* 全息幻彩渐变（粉、青、紫、金） */
            background: linear-gradient(90deg, #ff007f, #7b2cbf, #00f5ff, #ff007f);
            background-size: 300% 100%;
            z-index: -1;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        /* 隐藏的流动光影斑驳 */
        .btn-chrome-main::after {
            content: '';
            position: absolute;
            inset: 1px;
            border-radius: 50px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.15) 0%, transparent 100%);
            z-index: -1;
        }

        /* 悬停：外框流汞全息光效高速流转，产生磁吸悬浮 */
        .btn-chrome-main:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 15px 35px rgba(123, 44, 191, 0.4),
                0 0 20px rgba(0, 245, 255, 0.2);
        }

        .btn-chrome-main:hover::before {
            animation: chromeFlow 2s linear infinite;
            opacity: 1;
        }

        .btn-chrome-main:active {
            transform: translateY(1px);
        }

        @keyframes chromeFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }


        /* =======================================================
           按钮 2：【YES 预测】光谱虹光 · 矢量流变按钮
           ======================================================= */
        .btn-chrome-rainbow {
            position: relative;
            background: #0d0614;
            border: 1px solid rgba(0, 245, 255, 0.3);
            color: #fff;
            padding: 14px 40px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 12px;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s;
        }

        /* 虹光折射扫光 */
        .btn-chrome-rainbow::before {
            content: '';
            position: absolute;
            top: 0; left: -150%;
            width: 80%; height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 0, 127, 0.3),
                rgba(0, 245, 255, 0.5),
                rgba(204, 255, 0, 0.3),
                transparent
            );
            transform: skewX(-20deg);
            transition: none;
        }

        .btn-chrome-rainbow:hover {
            border-color: #00f5ff;
            background: rgba(0, 245, 255, 0.05);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
            transform: scale(1.02);
        }

        .btn-chrome-rainbow:hover::before {
            left: 170%;
            transition: all 1s cubic-bezier(0.25, 1, 0.5, 1);
        }


        /* =======================================================
           按钮 3：【NO 预测】暗物质 · 曜石边缘反光
           ======================================================= */
        .btn-chrome-dark {
            position: relative;
            background: #050308;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.6);
            padding: 14px 40px;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.05);
            transition: all 0.3s;
        }

        .btn-chrome-dark:hover {
            border-color: rgba(255, 0, 127, 0.6);
            color: #ff007f;
            box-shadow: 
                0 0 15px rgba(255, 0, 127, 0.2),
                inset 0 1px 5px rgba(255, 0, 127, 0.1);
        }


        /* =======================================================
           按钮 4：【游戏大厅】星轨磁吸 · 全息折叠猫耳
           ======================================================= */
        .btn-chrome-orbit {
            position: relative;
            background: transparent;
            border: none;
            padding: 14px 38px;
            font-size: 14px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1.5px;
            cursor: pointer;
            z-index: 1;
        }

        /* 曜石背衬 */
        .btn-chrome-orbit::before {
            content: '';
            position: absolute;
            inset: 0;
            background: #080410;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            transition: all 0.3s;
            z-index: -1;
        }

        /* 极简流线猫耳（折叠态） */
        .btn-chrome-orbit::after, .btn-chrome-orbit .ear-right {
            content: '';
            position: absolute;
            width: 2px;
            height: 12px;
            background: #ff007f;
            top: -2px;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        /* 左耳流线 */
        .btn-chrome-orbit::after { left: 25px; transform: rotate(-45deg); }
        /* 右耳流线 */
        .btn-chrome-orbit .ear-right { right: 25px; transform: rotate(45deg); }

        .btn-chrome-orbit:hover {
            color: #ff007f;
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.4);
        }

        .btn-chrome-orbit:hover::before {
            border-color: rgba(255, 0, 127, 0.4);
            background: rgba(255, 0, 127, 0.02);
            box-shadow: inset 0 0 10px rgba(255, 0, 127, 0.15);
        }

        /* 悬停时流线猫耳如天线般舒展、伸长并亮起 */
        .btn-chrome-orbit:hover::after {
            opacity: 1;
            top: -12px;
            height: 20px;
            transform: rotate(-30deg);
            box-shadow: 0 0 10px #ff007f;
        }
        .btn-chrome-orbit:hover .ear-right {
            opacity: 1;
            top: -12px;
            height: 20px;
            transform: rotate(30deg);
            box-shadow: 0 0 10px #ff007f;
        }


        /* =======================================================
           按钮 5：【爆金 SPIN】流汞液压 · 全息闪变杠杆
           ======================================================= */
        .btn-chrome-hydraulic {
            position: relative;
            background: linear-gradient(135deg, #181528, #090615);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 16px 42px;
            font-size: 15px;
            font-weight: 900;
            border-radius: 16px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .btn-chrome-hydraulic .hydro-icon {
            font-size: 18px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.5);
        }

        .btn-chrome-hydraulic:hover {
            border-color: #00f5ff;
            background: #00f5ff;
            color: #000;
            box-shadow: 
                0 15px 35px rgba(0, 245, 255, 0.4),
                inset 0 1.5px 3px rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
        }

        /* 悬浮时，内部水银球/能量核心加速抖动，积蓄液压 */
        .btn-chrome-hydraulic:hover .hydro-icon {
            transform: scale(1.3) rotate(360deg);
        }

        .btn-chrome-hydraulic:active {
            transform: scale(0.94) translateY(1px);
        }


        /* =======================================================
           按钮 6：【提现下分】水银重力 · 刻度流沙管
           ======================================================= */
        .btn-chrome-gravity {
            position: relative;
            background: #000;
            border: 1.5px solid rgba(255, 255, 255, 0.08);
            border-radius: 50px;
            padding: 13px 40px;
            font-size: 14px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            overflow: hidden;
            z-index: 1;
            transition: all 0.3s;
        }

        /* 流汞水银层 */
        .btn-chrome-gravity::before {
            content: '';
            position: absolute;
            left: -100%;
            top: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0.15) 0%,
                rgba(123, 44, 191, 0.4) 50%,
                rgba(255, 0, 127, 0.15) 100%
            );
            z-index: -1;
            transition: transform 0.6s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn-chrome-gravity:hover {
            color: #fff;
            border-color: #7b2cbf;
            box-shadow: 0 0 25px rgba(123, 44, 191, 0.3);
            transform: translateY(-1px);
        }

        /* 悬浮：水银液态流光像被磁铁吸引一样顺滑向右滑动灌满 */
        .btn-chrome-gravity:hover::before {
            transform: translateX(100%);
        }


        /* =======================================================
           按钮 7：【呼叫客服】极简尾波 · 波动虚空曲率
           ======================================================= */
        .btn-chrome-curve {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            padding: 12px 28px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .btn-chrome-curve .curve-part {
            display: inline-block;
            width: 18px;
            height: 8px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 0 0 50% 50%;
            transform-origin: center top;
            transition: all 0.3s;
        }

        .btn-chrome-curve:hover {
            border-color: #ff007f;
            color: #fff;
            background: rgba(255, 0, 127, 0.04);
            box-shadow: 0 8px 25px rgba(255, 0, 127, 0.15);
        }

        /* 悬浮时，底部的曲率流线（猫尾抽象写意）产生极具全息质感的液体波浪摆动 */
        .btn-chrome-curve:hover .curve-part {
            border-bottom-color: #ff007f;
            filter: drop-shadow(0 0 4px #ff007f);
            animation: curveRipple 1s ease-in-out infinite alternate;
        }

        @keyframes curveRipple {
            0% { transform: scaleY(0.5) rotate(-10deg); }
            100% { transform: scaleY(1.8) rotate(15deg); }
        }
    </style>
</head>
<body>

    <div class="sandbox-title">🐾 Meow Vegas - 4.0 赛博液态金属全息按钮 🐾</div>

    <div class="button-grid">
        
        <!-- 按钮 1 -->
        <div class="button-item">
            <button class="btn-chrome-main">
                接受猫娘的邀请 (ฅ•ω•ฅ)
            </button>
            <div class="button-desc">【主 CTA】液态水银底座<br>悬停触发高保真全息极光扫光流转</div>
        </div>

        <!-- 按钮 2 -->
        <div class="button-item">
            <button class="btn-chrome-rainbow">
                YES · 确认买入 ⚡
            </button>
            <div class="button-desc">【YES 按钮】矢量光谱虹光折射<br>悬停产生彩虹反射粒子推扫</div>
        </div>

        <!-- 按钮 3 -->
        <div class="button-item">
            <button class="btn-chrome-dark">
                NO · 放弃份额 ❄️
            </button>
            <div class="button-desc">【NO 按钮】暗物质曜石极简风<br>悬停触发超细深海霓虹边缘反光</div>
        </div>

        <!-- 按钮 4 -->
        <div class="button-item">
            <button class="btn-chrome-orbit">
                <span class="ear-right"></span>
                <span>启动游戏大厅</span>
            </button>
            <div class="button-desc">【大厅启动】星轨共振流线<br>悬停顶部弹出科技感极简天线猫耳</div>
        </div>

        <!-- 按钮 5 -->
        <div class="button-item">
            <button class="btn-chrome-hydraulic">
                <span>SPIN! 爆金老虎机</span>
                <span class="hydro-icon">💠</span>
            </button>
            <div class="button-desc">【老虎机机台】液压机械反射盘<br>悬浮能量球极速自转积蓄启动扭矩</div>
        </div>

        <!-- 按钮 6 -->
        <div class="button-item">
            <button class="btn-chrome-gravity">
                主人的提现控制台
            </button>
            <div class="button-desc">【下分提现】水银重力管道流体<br>悬浮时全息重力水银向右平滑充填</div>
        </div>

        <!-- 按钮 7 -->
        <div class="button-item">
            <button class="btn-chrome-curve">
                <span>召唤专属猫娘秘书</span>
                <span class="curve-part"></span>
            </button>
            <div class="button-desc">【呼叫客服】抽象写意液态流线<br>悬停猫尾线段引发空间波浪重力形变</div>
        </div>

    </div>

</body>
</html>
