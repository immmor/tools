<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魅惑萌动 ✨ 幸运大转盘</title>
    <style>
        :root {
            --primary-pink: #ff65a3;
            --neon-purple: #bd00ff;
            --soft-cream: #fff0f5;
            --gold: #ffe600;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #2d0b3d 0%, #0f0215 100%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            color: #fff;
        }

        /* 标题特效 */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #fff;
            text-shadow: 0 0 10px var(--primary-pink),
                         0 0 20px var(--neon-purple),
                         0 0 30px var(--neon-purple);
            animation: pulse 1.5s infinite alternate;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.05); text-shadow: 0 0 15px var(--primary-pink), 0 0 30px var(--gold); }
        }

        /* 核心转盘容器 */
        .wheel-container {
            position: relative;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            padding: 15px;
            background: radial-gradient(circle, #ff2a85 0%, #510068 100%);
            box-shadow: 0 0 35px var(--primary-pink),
                        inset 0 0 20px rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 外圈跑马灯点缀 */
        .led-lights {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            top: 0;
            left: 0;
            border: 4px dashed var(--gold);
            animation: rotateLights 4s linear infinite;
            box-sizing: border-box;
            pointer-events: none;
        }

        @keyframes rotateLights {
            100% { transform: rotate(360deg); }
        }

        /* 转盘本体 */
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            border: 8px solid #fff;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
            transition: transform 4s cubic-bezier(0.25, 1, 0.2, 1);
            background: #fff;
        }

        /* 帆布画布 */
        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 魅惑猫耳指针按钮 */
        .pointer-btn {
            position: absolute;
            width: 90px;
            height: 90px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            cursor: pointer;
            background: linear-gradient(135deg, #ff2a85 0%, #b5006d 100%);
            border: 4px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255, 42, 133, 0.8),
                        0 5px 15px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            user-select: none;
            transition: transform 0.1s;
        }

        .pointer-btn:active {
            transform: translate(-50%, -50%) scale(0.9);
        }

        /* 指针箭头（顶部的魅惑小三角） */
        .pointer-btn::before {
            content: '';
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 15px 30px 15px;
            border-style: solid;
            border-color: transparent transparent #fff transparent;
            filter: drop-shadow(0 -3px 5px rgba(255, 42, 133, 0.5));
        }

        /* 中奖弹窗特效 */
        .popup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            background: linear-gradient(135deg, #ffe3f1 0%, #ffffff 100%);
            border: 4px solid var(--primary-pink);
            border-radius: 24px;
            padding: 30px 50px;
            text-align: center;
            box-shadow: 0 0 50px rgba(255, 101, 163, 0.6), 0 10px 30px rgba(0,0,0,0.3);
            z-index: 100;
            color: #333;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .popup.show {
            display: block;
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .popup h2 {
            color: var(--primary-pink);
            margin-top: 0;
            font-size: 28px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .popup p {
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0 25px 0;
            color: #555;
        }

        .popup button {
            background: linear-gradient(90deg, var(--primary-pink), var(--neon-purple));
            border: none;
            padding: 10px 30px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 42, 133, 0.4);
            transition: transform 0.2s;
        }

        .popup button:hover {
            transform: scale(1.05);
        }

        .mask {
            display: none;
            position: fixed;
            top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.6);
            z-index: 99;
        }
    </style>
</head>
<body>

    <h1>✨ 抽个盲盒嘛 🐾</h1>

    <div class="wheel-container">
        <div class="led-lights"></div>
        <div class="wheel" id="wheel">
            <canvas id="canvas" width="420" height="420"></canvas>
        </div>
        <div class="pointer-btn" id="spinBtn">GO!</div>
    </div>

    <div class="mask" id="mask"></div>
    <div class="popup" id="popup">
        <h2 id="popTitle">恭喜主人~ 🎉</h2>
        <p id="prizeDeg"></p>
        <button onclick="closePopup()">贴贴收下</button>
    </div>

    <script>
        // 奖项配置：可爱与魅惑并存的文案
        const prizes = [
            { text: '温柔摸头杀 🌸', color: '#ff9ebe' },
            { text: '神秘香水 💋', color: '#e271ff' },
            { text: '奶茶一杯 🧋', color: '#ffb576' },
            { text: '糟糕喵喵叫 🐾', color: '#f9609a' },
            { text: '心动抱抱 🧸', color: '#8297ff' },
            { text: '谢谢惠顾 🥺', color: '#d2b4de' },
            { text: '清空购物车 💄', color: '#ff4b82' },
            { text: '恶魔的契约 😈', color: '#ab47bc' }
        ];

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        const popup = document.getElementById('popup');
        const mask = document.getElementById('mask');
        const prizeDeg = document.getElementById('prizeDeg');

        const prizeCount = prizes.length;
        const arc = Math.PI * 2 / prizeCount; // 每个扇区的弧度
        let isRotating = false;
        let currentRotation = 0; // 当前旋转角度

        // 1. 绘制大转盘
        function drawWheel() {
            const radius = canvas.width / 2;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 移到中心以便旋转绘制
            ctx.translate(radius, radius);

            for (let i = 0; i < prizeCount; i++) {
                const angle = i * arc;
                ctx.fillStyle = prizes[i].color;
                
                // 画扇形区
                ctx.beginPath();
                ctx.moveTo(0, 0);
                ctx.arc(0, 0, radius - 10, angle, angle + arc);
                ctx.lineTo(0, 0);
                ctx.fill();
                
                // 绘制内描边增强精致感
                ctx.strokeStyle = 'rgba(255,255,255,0.4)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 写入诱人文字
                ctx.save();
                ctx.fillStyle = '#fff';
                // 阴影让字体变可爱立体
                ctx.shadowColor = 'rgba(0, 0, 0, 0.3)';
                ctx.shadowBlur = 4;
                ctx.font = 'bold 16px Microsoft YaHei';
                
                // 旋转画布写字
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                // 将文字推向外圈
                ctx.fillText(prizes[i].text, radius - 30, 0);
                ctx.restore();
            }
        }

        drawWheel();

        // 2. 核心旋转逻辑
        spinBtn.addEventListener('click', () => {
            if (isRotating) return;
            isRotating = true;

            // 随机决定中奖索引 (0 到 prizeCount - 1)
            const prizeIndex = Math.floor(Math.random() * prizeCount);
            
            // 计算转盘需要停下的角度 
            // 注意：因为指针在正上方（12点钟，即 -90度 或 270度位置），需要做弧度/角度转换
            // 一个圈是360度。每个扇区占 360 / prizeCount 度
            const sectorDegrees = 360 / prizeCount;
            
            // 目标角度：让中奖扇区对准正上方
            // 转盘是顺时针转的，为了让第 index 个奖品到 270度 顶端：
            // 基础目标角度 = 270 - (index * sectorDegrees) - (sectorDegrees / 2) [落到扇区中间]
            const targetSectorAngle = 270 - (prizeIndex * sectorDegrees) - (sectorDegrees / 2);
            
            // 额外旋转 5 到 8 圈以达到炫酷的视觉冲刺效果
            const extraRotations = (5 + Math.floor(Math.random() * 4)) * 360;
            
            // 总共旋转的角度
            const totalDegrees = extraRotations + targetSectorAngle;
            
            // 执行动画
            wheel.style.transform = `rotate(${totalDegrees}deg)`;

            // 监听动画结束
            setTimeout(() => {
                isRotating = false;
                showPrize(prizes[prizeIndex].text);
            }, 4000); // 对应 CSS 里的 transition 4s
        });

        // 3. 弹窗交互
        function showPrize(text) {
            prizeDeg.innerText = `✨ 【${text}】 ✨`;
            if(text.includes('谢谢惠顾')){
                document.getElementById('popTitle').innerText = "呜呜不哭~ 🥺";
            } else {
                document.getElementById('popTitle').innerText = "恭喜主人~ 🎉";
            }
            mask.style.display = 'block';
            popup.classList.add('show');
        }

        function closePopup() {
            popup.classList.remove('show');
            mask.style.display = 'none';
            // 重置转盘角度，防止下次旋转时数值过大或倒转
            wheel.style.transition = 'none';
            wheel.style.transform = 'rotate(0deg)';
            // 强制刷新
            wheel.offsetHeight; 
            wheel.style.transition = 'transform 4s cubic-bezier(0.25, 1, 0.2, 1)';
        }
    </script>
</body>
</html>
