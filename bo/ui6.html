<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>喵呜 Vegas - 4.0 超萌果冻汽水糖按钮库</title>
    <style>
        /* 治愈系暗粉极光背景，专门烘托糖果果冻质感 */
        body {
            background-color: #0d061a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin: 0;
            padding: 60px 20px;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(255, 182, 193, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 80%, rgba(186, 85, 211, 0.12) 0%, transparent 50%);
        }

        .sandbox-title {
            color: #fff;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 25px rgba(255, 105, 180, 0.6);
            text-align: center;
            margin-bottom: 10px;
        }

        /* 像粉紫色软塑料包装袋一样的可爱半透明外壳 */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 40px;
            max-width: 1100px;
            width: 100%;
            background: rgba(40, 20, 60, 0.25);
            border: 3px solid rgba(255, 182, 193, 0.15);
            padding: 45px;
            border-radius: 40px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.6),
                inset 0 4px 20px rgba(255, 182, 193, 0.05);
        }

        .button-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 2px solid rgba(255, 255, 255, 0.03);
            padding: 40px 20px;
            border-radius: 30px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .button-item:hover {
            border-color: rgba(255, 105, 180, 0.3);
            background: rgba(255, 255, 255, 0.04);
            transform: scale(1.02);
        }

        .button-desc {
            color: rgba(255, 182, 193, 0.5);
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            line-height: 1.4;
        }

        /* =======================================================
           按钮 1：【大厅主入口】元气草莓冻 · 啵啵回弹按钮
           ======================================================= */
        .btn-strawberry-bobo {
            position: relative;
            background: linear-gradient(to bottom, #ff9ebb, #ff4da6);
            border: none;
            color: #fff;
            padding: 16px 42px;
            font-size: 16px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            text-shadow: 0 2px 4px rgba(219, 20, 110, 0.6);
            /* 多重厚重阴影，制造出捏捏乐实体硅胶的厚度 */
            box-shadow: 
                0 10px 0 #b5176c,
                0 15px 25px rgba(255, 20, 147, 0.4),
                inset 0 4px 8px rgba(255, 255, 255, 0.5),
                inset 0 -6px 12px rgba(0, 0, 0, 0.15);
            transition: all 0.15s ease;
        }

        /* 隐藏在背后的粉色兔耳/猫耳朵 */
        .btn-strawberry-bobo::before {
            content: '🌸';
            position: absolute;
            top: 5px;
            left: 50%;
            transform: translateX(-50%) scale(0.4);
            font-size: 24px;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: -1;
        }

        /* 悬浮：果冻吸气变鼓，顶部弹出小樱花 */
        .btn-strawberry-bobo:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 12px 0 #b5176c,
                0 18px 30px rgba(255, 20, 147, 0.5),
                inset 0 6px 12px rgba(255, 255, 255, 0.6),
                inset 0 -4px 10px rgba(0, 0, 0, 0.1);
        }
        
        .btn-strawberry-bobo:hover::before {
            opacity: 1;
            top: -24px;
            transform: translateX(-50%) scale(1.1) rotate(15deg);
        }

        /* 点击：实实在在的“啪叽”按下去的效果（完美物理反馈） */
        .btn-strawberry-bobo:active {
            transform: translateY(10px);
            box-shadow: 
                0 0px 0 #b5176c,
                0 5px 10px rgba(255, 20, 147, 0.2),
                inset 0 4px 12px rgba(0, 0, 0, 0.3);
        }


        /* =======================================================
           按钮 2：【YES 预测】蜜桃汽水冻 · 糖流扫光按钮
           ======================================================= */
        .btn-peach-soda {
            position: relative;
            background: linear-gradient(to bottom, #ffe4a0, #ff8c42);
            border: none;
            color: #511d00;
            padding: 14px 44px;
            font-size: 15px;
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 
                0 8px 0 #b55107,
                0 12px 20px rgba(255, 140, 66, 0.4),
                inset 0 4px 6px rgba(255, 255, 255, 0.6),
                inset 0 -4px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.15s ease;
        }

        /* 软糖特有的半圆反光高光片 */
        .btn-peach-soda::before {
            content: '';
            position: absolute;
            top: 4px; left: 8px; right: 8px;
            height: 45%;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 14px 14px 8px 8px;
            pointer-events: none;
        }

        .btn-peach-soda:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 10px 0 #b55107,
                0 15px 25px rgba(255, 140, 66, 0.5),
                inset 0 6px 10px rgba(255, 255, 255, 0.7);
        }

        .btn-peach-soda:active {
            transform: translateY(8px);
            box-shadow: 
                0 0px 0 #b55107,
                0 4px 8px rgba(0, 0, 0, 0.2);
        }


        /* =======================================================
           按钮 3：【NO 预测】薄荷椰蓉冻 · 剔除按钮
           ======================================================= */
        .btn-mint-coconut {
            position: relative;
            background: linear-gradient(to bottom, #a0ffe6, #20b2aa);
            border: none;
            color: #004541;
            padding: 14px 44px;
            font-size: 15px;
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 
                0 8px 0 #126b67,
                0 12px 20px rgba(32, 178, 170, 0.4),
                inset 0 4px 6px rgba(255, 255, 255, 0.6),
                inset 0 -4px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: all 0.15s ease;
        }

        .btn-mint-coconut::before {
            content: '';
            position: absolute;
            top: 4px; left: 8px; right: 8px;
            height: 45%;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 14px 14px 8px 8px;
            pointer-events: none;
        }

        .btn-mint-coconut:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 10px 0 #126b67,
                0 15px 25px rgba(32, 178, 170, 0.5),
                inset 0 6px 10px rgba(255, 255, 255, 0.7);
        }

        .btn-mint-coconut:active {
            transform: translateY(8px);
            box-shadow: 
                0 0px 0 #126b67,
                0 4px 8px rgba(0, 0, 0, 0.2);
        }


        /* =======================================================
           按钮 4：【电子游戏】Q弹糖豆球 · 缩放吸附按钮
           ======================================================= */
        .btn-jelly-bean {
            position: relative;
            background: linear-gradient(to bottom, #dfa8ff, #9c46e3);
            border: none;
            color: #fff;
            padding: 14px 38px;
            font-size: 15px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 
                0 8px 0 #681ea6,
                0 12px 22px rgba(156, 70, 227, 0.4),
                inset 0 4px 6px rgba(255, 255, 255, 0.5),
                inset 0 -4px 10px rgba(0, 0, 0, 0.15);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* 顶部的糖珠白光点 */
        .btn-jelly-bean::before {
            content: '';
            position: absolute;
            top: 6px; left: 16px;
            width: 8px; height: 8px;
            background: #fff;
            border-radius: 50%;
        }

        .btn-jelly-bean:hover {
            transform: scale(1.08) translateY(-3px);
            box-shadow: 
                0 11px 0 #681ea6,
                0 16px 28px rgba(156, 70, 227, 0.5),
                inset 0 6px 12px rgba(255, 255, 255, 0.7);
        }

        .btn-jelly-bean:active {
            transform: scale(0.95) translateY(8px);
            box-shadow: 
                0 0px 0 #681ea6,
                0 4px 10px rgba(0, 0, 0, 0.2);
        }


        /* =======================================================
           按钮 5：【爆金 SPIN】肉垫印章 · 极高粘度挤压按钮
           ======================================================= */
        .btn-paw-stamp {
            position: relative;
            background: #ffe6f0;
            border: 3px solid #ff4da6;
            color: #ff4da6;
            padding: 14px 34px;
            font-size: 15px;
            font-weight: 900;
            border-radius: 24px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 
                0 8px 0 #cc1d7b,
                inset 0 2px 4px rgba(255, 255, 255, 0.8);
            transition: all 0.15s ease;
        }

        .btn-paw-stamp .stamp-icon {
            font-size: 20px;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.5);
        }

        .btn-paw-stamp:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 
                0 10px 0 #cc1d7b,
                0 14px 20px rgba(255, 77, 166, 0.25);
        }

        /* 悬浮时，内部Emoji爪子由于惯性产生轻微挤扁晃动 */
        .btn-paw-stamp:hover .stamp-icon {
            transform: scale(1.3) rotate(-15deg);
            animation: pawSquish 0.6s ease-in-out infinite alternate;
        }

        .btn-paw-stamp:active {
            transform: translateY(8px);
            box-shadow: 
                0 0px 0 #cc1d7b,
                0 3px 6px rgba(0, 0, 0, 0.15);
        }

        @keyframes pawSquish {
            0% { transform: scale(1.3) rotate(-15deg) scaleX(1.1); }
            100% { transform: scale(1.3) rotate(-15deg) scaleY(0.9); }
        }


        /* =======================================================
           按钮 6：【提现/下分】爆金布丁 · 软晃荡充填
           ======================================================= */
        .btn-pudding-shake {
            position: relative;
            background: linear-gradient(to bottom, #ffea85, #ffb800);
            border: none;
            color: #543900;
            padding: 14px 44px;
            font-size: 15px;
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            box-shadow: 
                0 8px 0 #b37400,
                0 12px 20px rgba(255, 184, 0, 0.4),
                inset 0 4px 6px rgba(255, 255, 255, 0.7);
            transition: all 0.15s ease;
        }

        /* 顶层透明果冻帽子 */
        .btn-pudding-shake::before {
            content: '';
            position: absolute;
            top: 4px; left: 8px; right: 8px;
            height: 40%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 12px 12px 6px 6px;
        }

        /* 悬停：布丁由于回弹性，产生一晃一晃的效果 */
        .btn-pudding-shake:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 10px 0 #b37400,
                0 15px 25px rgba(255, 184, 0, 0.5);
            animation: puddingWobble 0.6s ease-in-out;
        }

        .btn-pudding-shake:active {
            transform: translateY(8px);
            box-shadow: 
                0 0px 0 #b37400,
                0 3px 6px rgba(0, 0, 0, 0.15);
        }

        @keyframes puddingWobble {
            0% { transform: scale(1) translateY(-2px); }
            15% { transform: scaleX(1.15) scaleY(0.85) translateY(-2px); }
            40% { transform: scaleX(0.85) scaleY(1.15) translateY(-2px); }
            65% { transform: scaleX(1.05) scaleY(0.95) translateY(-2px); }
            100% { transform: scale(1) translateY(-2px); }
        }


        /* =======================================================
           按钮 7：【客服浮动】毛茸球 · 小尾巴摇摆
           ======================================================= */
        .btn-cloud-wiggle {
            position: relative;
            background: #fff;
            border: none;
            color: #b5176c;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            box-shadow: 
                0 8px 0 #d9d9d9,
                0 12px 20px rgba(0, 0, 0, 0.2),
                inset 0 -4px 6px rgba(0, 0, 0, 0.05);
            transition: all 0.15s ease;
        }

        .btn-cloud-wiggle .wiggle-tail {
            font-size: 18px;
            display: inline-block;
            transform-origin: bottom center;
            transition: transform 0.25s;
        }

        .btn-cloud-wiggle:hover {
            transform: translateY(-2px);
            box-shadow: 
                0 10px 0 #d9d9d9,
                0 15px 25px rgba(255, 182, 193, 0.4);
        }

        /* 悬浮时，尾巴像螺旋桨或撒娇一样疯狂晃动 */
        .btn-cloud-wiggle:hover .wiggle-tail {
            animation: catTailHappy 0.6s ease-in-out infinite alternate;
        }

        .btn-cloud-wiggle:active {
            transform: translateY(8px);
            box-shadow: 
                0 0px 0 #d9d9d9,
                0 4px 8px rgba(0, 0, 0, 0.15);
        }

        @keyframes catTailHappy {
            0% { transform: rotate(-25deg) scale(1.2); }
            100% { transform: rotate(25deg) scale(1.2); }
        }
    </style>
</head>
<body>

    <div class="sandbox-title">🐾 喵呜 Vegas - 4.0 元气糖果果冻可爱风按钮 🐾</div>

    <div class="button-grid">
        
        <!-- 按钮 1 -->
        <div class="button-item">
            <button class="btn-strawberry-bobo">
                接受猫娘的邀请 (ฅ•ω•ฅ)
            </button>
            <div class="button-desc">【主 CTA 按钮】元气草莓泡泡冻<br>点击产生真实的厚实硅胶实体下按反馈</div>
        </div>

        <!-- 按钮 2 -->
        <div class="button-item">
            <button class="btn-peach-soda">
                YES · 确认买入 ⚡
            </button>
            <div class="button-desc">【YES 预测按钮】蜜桃气泡糖豆<br>上半圆自带晶莹糖果保护高光</div>
        </div>

        <!-- 按钮 3 -->
        <div class="button-item">
            <button class="btn-mint-coconut">
                NO · 放弃份额 ❄️
            </button>
            <div class="button-desc">【NO 预测按钮】清爽薄荷椰丝软糖<br>经典的糖果色，可爱不黏腻</div>
        </div>

        <!-- 按钮 4 -->
        <div class="button-item">
            <button class="btn-jelly-bean">
                启动喵呜游戏大厅
            </button>
            <div class="button-desc">【大厅启动按钮】香芋紫色果冻豆<br>悬浮产生明显的吸附感与体积缩放</div>
        </div>

        <!-- 按钮 5 -->
        <div class="button-item">
            <button class="btn-paw-stamp">
                <span class="stamp-icon">🐾</span>
                <span>SPIN! 启动爆金</span>
            </button>
            <div class="button-desc">【老虎机启动按钮】实体橡胶猫爪印章<br>悬停触发肉垫挤压的捏捏乐软胶效果</div>
        </div>

        <!-- 按钮 6 -->
        <div class="button-item">
            <button class="btn-pudding-shake">
                主人的提现控制台
            </button>
            <div class="button-desc">【提现下分按钮】高弹爆焦糖布丁<br>鼠标悬停产生极为魔性的弹性布丁果冻抖动</div>
        </div>

        <!-- 按钮 7 -->
        <div class="button-item">
            <button class="btn-cloud-wiggle">
                <span>呼叫专属猫娘秘书</span>
                <span class="wiggle-tail">🐈</span>
            </button>
            <div class="button-desc">【客服浮动按钮】棉花云朵绒毛感<br>悬浮时尾巴摇晃，像宠物撒娇般治愈</div>
        </div>

    </div>

</body>
</html>
