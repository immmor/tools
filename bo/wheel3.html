<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魅惑萌动大转盘</title>
    <style>
        :root {
            --primary-color: #ff2a74;
            --secondary-color: #8a2be2;
            --accent-color: #ff00ff;
            --bg-color: #0d0214;
        }

        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at center, #2c0e3a 0%, var(--bg-color) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            color: #fff;
        }

        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 10px var(--primary-color), 0 0 20px var(--accent-color);
            margin-bottom: 20px;
            animation: pulse 1.5s infinite alternate;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 10px var(--primary-color); }
            100% { transform: scale(1.05); text-shadow: 0 0 20px var(--accent-color), 0 0 30px var(--primary-color); }
        }

        /* 转盘外框（霓虹灯效果） */
        .wheel-container {
            position: relative;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            padding: 15px;
            background: repeating-conic-gradient(from 0deg, #ff2a74 0deg 10deg, #8a2be2 10deg 20deg);
            box-shadow: 0 0 40px rgba(255, 42, 116, 0.6), 
                        inset 0 0 20px rgba(138, 43, 226, 0.8),
                        0 0 80px rgba(255, 0, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 闪烁跑马灯小球 */
        .lights {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            border-radius: 50%;
            animation: rotateLights 4s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateLights {
            100% { transform: rotate(360deg); }
        }

        /* 实际旋转的转盘 */
        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            transition: transform 5s cubic-bezier(0.1, 0.8, 0.1, 1);
            background: #fff;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 魅惑爱心指针 */
        .pointer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90px;
            height: 90px;
            background: var(--primary-color);
            border-radius: 50%;
            z-index: 10;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: white;
            box-shadow: 0 0 20px rgba(255, 42, 116, 0.8), inset 0 0 10px rgba(255,255,255,0.5);
            user-select: none;
            border: 4px solid #fff;
            transition: transform 0.1s;
        }

        .pointer:hover {
            transform: translate(-50%, -50%) scale(1.1);
            background: var(--accent-color);
            box-shadow: 0 0 30px rgba(255, 0, 255, 1);
        }

        .pointer::after {
            content: '';
            position: absolute;
            top: -35px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 0 20px 40px 20px;
            border-style: solid;
            border-color: transparent transparent #fff transparent;
            filter: drop-shadow(0 -5px 5px rgba(255, 42, 116, 0.6));
        }

        /* 结果弹窗特效 */
        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(20, 5, 35, 0.95);
            border: 3px solid var(--primary-color);
            border-radius: 20px;
            padding: 30px 50px;
            text-align: center;
            z-index: 100;
            box-shadow: 0 0 50px var(--accent-color);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        .popup.show {
            transform: translate(-50%, -50%) scale(1);
            pointer-events: auto;
        }

        .popup h2 {
            color: var(--accent-color);
            margin-top: 0;
            font-size: 2rem;
        }

        .popup p {
            font-size: 1.5rem;
            color: #fff;
            margin: 20px 0;
        }

        .popup button {
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            border: none;
            padding: 10px 30px;
            color: white;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 0 15px var(--primary-color);
            transition: 0.3s;
        }

        .popup button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px var(--accent-color);
        }

        /* 粒子特效画布 */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 99;
        }
    </style>
</head>
<body>

    <h1>✨ 抽出你的专属羁绊 ✨</h1>

    <div class="wheel-container">
        <div class="lights" id="lights"></div>
        <div class="wheel" id="wheel">
            <canvas id="wheelCanvas" width="420" height="420"></canvas>
        </div>
        <div class="pointer" id="spinBtn">GO!</div>
    </div>

    <div class="popup" id="popup">
        <h2>💖 恭喜获得 💖</h2>
        <p id="award-text">神秘礼物</p>
        <button onclick="closePopup()">收下啦~</button>
    </div>

    <canvas id="particle-canvas"></canvas>

    <script>
        // 奖项配置（魅惑+可爱风格）
        const prizes = [
            { text: '👑 恶魔猫耳', color: '#2b1042', textColor: '#ff2a74' },
            { text: '🍬 恋爱软糖', color: '#ff75a0', textColor: '#ffffff' },
            { text: '🔮 占卜水晶', color: '#4a157d', textColor: '#00ffff' },
            { text: '🐾 萌宠肉垫', color: '#ffb3c6', textColor: '#2b1042' },
            { text: '💋 危险香吻', color: '#9d144b', textColor: '#ffffff' },
            { text: '🧸 治愈抱抱', color: '#ffc8dd', textColor: '#4a157d' },
            { text: '🧪 极乐药水', color: '#1a0033', textColor: '#ff00ff' },
            { text: '💌 专属情书', color: '#ffe5ec', textColor: '#ff2a74' }
        ];

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spinBtn');
        const popup = document.getElementById('popup');
        const awardText = document.getElementById('award-text');
        const pCanvas = document.getElementById('particle-canvas');
        const pCtx = pCanvas.getContext('2d');

        let isSpinning = false;
        let currentRotation = 0;
        let particles = [];

        // 调整粒子画布大小
        function resizeCanvas() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 绘制转盘
        const size = canvas.width;
        const center = size / 2;
        const radius = center - 5;
        const arc = Math.PI * 2 / prizes.length;

        function drawWheel() {
            ctx.clearRect(0, 0, size, size);
            
            prizes.forEach((prize, i) => {
                const angle = i * arc;
                
                // 画扇区
                ctx.beginPath();
                ctx.fillStyle = prize.color;
                ctx.moveTo(center, center);
                ctx.arc(center, center, radius, angle, angle + arc);
                ctx.lineTo(center, center);
                ctx.fill();
                
                // 炫酷内边框
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // 画文字
                ctx.save();
                ctx.translate(center, center);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.textColor = prize.textColor;
                ctx.fillStyle = prize.textColor;
                ctx.font = "bold 16px 'Segoe UI', sans-serif";
                ctx.shadowColor = prize.textColor;
                ctx.shadowBlur = 5;
                ctx.fillText(prize.text, radius - 30, 8);
                ctx.restore();
            });
        }

        // 动态生成跑马灯小球
        function createLights() {
            const lightsContainer = document.getElementById('lights');
            const totalLights = 24;
            for (let i = 0; i < totalLights; i++) {
                const light = document.createElement('div');
                light.style.position = 'absolute';
                light.style.width = '8px';
                light.style.height = '8px';
                light.style.borderRadius = '50%';
                light.style.top = '4px';
                light.style.left = '50%';
                light.style.transformOrigin = `0px ${450/2 - 4}px`;
                light.style.transform = `translateX(-50%) rotate(${i * (360/totalLights)}deg)`;
                light.style.backgroundColor = i % 2 === 0 ? '#ff2a74' : '#00ffff';
                light.style.boxShadow = `0 0 8px ${i % 2 === 0 ? '#ff2a74' : '#00ffff'}`;
                // 交替闪烁动画
                light.style.animation = `pulse 0.5s infinite alternate ${i * 0.1}s`;
                lightsContainer.appendChild(light);
            }
        }

        // --- Web Audio API 声音合成器 (免去外部音频依赖) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTickSound() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        }

        function playWinSound() {
            const now = audioCtx.currentTime;
            const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6 喜庆和弦
            notes.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now + index * 0.1);
                gain.gain.setValueAtTime(0.2, now + index * 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, now + index * 0.1 + 0.4);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + index * 0.1);
                osc.stop(now + index * 0.1 + 0.4);
            });
        }

        // --- 粒子特效系统 ---
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 6 + 4;
                this.speedX = (Math.random() - 0.5) * 8;
                this.speedY = (Math.random() - 0.5) * 8 - 4;
                this.color = `hsl(${Math.random() * 40 + 320}, 100%, 60%)`; // 粉紫系列
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01;
                this.isHeart = Math.random() > 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.speedY += 0.1; // 重力
                this.alpha -= this.decay;
            }
            draw() {
                pCtx.save();
                pCtx.globalAlpha = this.alpha;
                pCtx.fillStyle = this.color;
                pCtx.shadowBlur = 10;
                pCtx.shadowColor = this.color;
                
                if (this.isHeart) {
                    // 画小爱心
                    pCtx.beginPath();
                    pCtx.moveTo(this.x, this.y);
                    pCtx.bezierCurveTo(this.x - this.size/2, this.y - this.size/2, this.x - this.size, this.y + this.size/3, this.x, this.y + this.size);
                    pCtx.bezierCurveTo(this.x + this.size, this.y + this.size/3, this.x + this.size/2, this.y - this.size/2, this.x, this.y);
                    pCtx.fill();
                } else {
                    // 画闪烁星星/圆点
                    pCtx.beginPath();
                    pCtx.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
                    pCtx.fill();
                }
                pCtx.restore();
            }
        }

        function createExplosion(x, y) {
            for (let i = 0; i < 60; i++) {
                particles.push(new Particle(x, y));
            }
        }

        function animateParticles() {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) {
                    particles.splice(i, 1);
                }
            }
            requestAnimationFrame(animateParticles);
        }

        // --- 核心旋转逻辑 ---
        function spin() {
            if (isSpinning) return;
            isSpinning = true;
            closePopup();

            // 随机一个结果索引
            const prizeIndex = Math.floor(Math.random() * prizes.length);
            
            // 计算旋转角度：基础圈数(5-10圈) + 目标奖项角度调整
            // 指针在正上方(270度)，需要反向计算转盘落入的扇区位置
            const degreesPerSegment = 360 / prizes.length;
            const targetAngle = 270 - (prizeIndex * degreesPerSegment + degreesPerSegment / 2);
            
            const extraRotations = (5 + Math.floor(Math.random() * 5)) * 360; 
            currentRotation = extraRotations + targetAngle;

            wheel.style.transform = `rotate(${currentRotation}deg)`;

            // 模拟真机转动时的“哒哒哒”音效
            let lastSegment = 0;
            const duration = 5000;
            const startTime = performance.now();

            function checkTick(now) {
                const progress = (now - startTime) / duration;
                if (progress < 1) {
                    // 依据贝塞尔曲线粗略估算当前角度位置从而触发音效
                    const currentAngle = currentRotation * (1 - Math.pow(1 - progress, 4));
                    const currentSeg = Math.floor(currentAngle / degreesPerSegment);
                    if (currentSeg !== lastSegment) {
                        playTickSound();
                        lastSegment = currentSeg;
                    }
                    requestAnimationFrame(checkTick);
                }
            }
            requestAnimationFrame(checkTick);

            // 转盘停止时的回调
            setTimeout(() => {
                isSpinning = false;
                const wonPrize = prizes[prizeIndex];
                
                // 展现炫酷视觉特效
                awardText.innerText = wonPrize.text;
                popup.classList.add('show');
                playWinSound();
                createExplosion(window.innerWidth / 2, window.innerHeight / 2);
            }, duration);
        }

        function closePopup() {
            popup.classList.remove('show');
        }

        // 初始化
        drawWheel();
        createLights();
        animateParticles();
        spinBtn.addEventListener('click', spin);
    </script>
</body>
</html>
