<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformer Matrix | Black Gold</title>
    <style>
        :root {
            --bg-dark: #08080a;
            --accent-gold: #ffdb80;
            --glass-base: rgba(20, 20, 25, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            /* 动态渐变背景 */
            background-image: 
                radial-gradient(circle at 20% 30%, #1a1a2e 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #2e1a1a 0%, transparent 40%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 旋转流光容器 */
        .neon-card-wrapper {
            position: relative;
            width: 100%;
            max-width: 800px;
            padding: 3px; /* 边框厚度 */
            background: linear-gradient(0deg, transparent, transparent);
            border-radius: 40px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 旋转的彩色背景，形成边框动画 */
        .neon-card-wrapper::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(transparent, var(--accent-gold), transparent 30%);
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 核心内容区：磨砂玻璃 */
        .glass-panel {
            position: relative;
            width: 100%;
            background: var(--glass-base);
            backdrop-filter: blur(40px) saturate(120%);
            -webkit-backdrop-filter: blur(40px) saturate(120%);
            border-radius: 38px;
            padding: 60px 40px;
            z-index: 2;
            text-align: center;
            /* 模拟玻璃颗粒感 */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Cfilter id='noiseFilter'%3%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3%3C/filter%3%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3%3C/svg%3");
            background-blend-mode: overlay;
            opacity: 0.98;
        }

        header h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-top: 50px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 25px;
            padding: 25px;
            transition: 0.3s;
        }

        .stat-card:hover {
            background: rgba(255, 255, 255, 0.07);
            transform: translateY(-5px);
            border-color: var(--accent-gold);
        }

        .stat-card h2 {
            font-size: 1.8rem;
            color: var(--accent-gold);
            margin-bottom: 5px;
        }

        .stat-card p {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }

        /* 手机端适配 */
        @media (max-width: 600px) {
            .glass-panel { padding: 40px 20px; }
            .neon-card-wrapper::before { width: 200%; height: 200%; } /* 移动端动画加速视觉感 */
        }
    </style>
</head>
<body>

    <div class="neon-card-wrapper">
        <div class="glass-panel">
            <header>
                <h1>Transformer</h1>
                <p style="color: rgba(255,255,255,0.6); font-size: 1.1rem; max-width: 500px; margin: 0 auto;">
                    从 Attention 机制到万亿参数模型，探索人工智能的核心心脏。
                </p>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <h2>512</h2>
                    <p>Model Dim</p>
                </div>
                <div class="stat-card">
                    <h2>8</h2>
                    <p>Attention Heads</p>
                </div>
                <div class="stat-card">
                    <h2>64</h2>
                    <p>Head Dim</p>
                </div>
                <div class="stat-card" style="border-color: rgba(255,255,255,0.2);">
                    <h2>∞</h2>
                    <p>Potential</p>
                </div>
            </div>

            <button style="margin-top: 50px; padding: 15px 40px; border-radius: 30px; border: none; background: #fff; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                进入实验室
            </button>
        </div>
    </div>

</body>
</html>
