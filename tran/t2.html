<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformer Ice Morphic</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-base: rgba(30, 41, 59, 0.4);
            --highlight: rgba(255, 255, 255, 0.08);
            --accent: #38bdf8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            /* 使用多重径向渐变模拟深海光影 */
            background-image: 
                radial-gradient(circle at 10% 10%, #1e293b 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, #0f172a 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, #111827 0%, #020617 100%);
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 核心立体毛玻璃卡片 */
        .ice-card {
            width: 100%;
            max-width: 850px;
            background: var(--glass-base);
            backdrop-filter: blur(25px) saturate(120%);
            -webkit-backdrop-filter: blur(25px) saturate(120%);
            border-radius: 45px;
            padding: 50px;
            position: relative;
            
            /* 关键：四层阴影打造立体感 */
            box-shadow: 
                20px 20px 60px #05080f,             /* 外部深色阴影 */
                -5px -5px 20px rgba(255,255,255,0.02), /* 外部微弱高光 */
                inset 2px 2px 5px rgba(255,255,255,0.1), /* 内部上边缘高光 */
                inset -2px -2px 10px rgba(0,0,0,0.2);   /* 内部下边缘沉淀 */
            
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 30px;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 300; /* 使用细体字增加高级感 */
            letter-spacing: -1px;
        }

        header span {
            color: var(--accent);
            font-weight: 800;
        }

        /* 极简网格 */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .unit {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 30px;
            padding: 30px;
            transition: all 0.5s ease;
            border: 1px solid transparent;
        }

        .unit:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-8px);
            border-color: rgba(56, 189, 248, 0.3);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .unit-icon {
            width: 40px;
            height: 40px;
            background: var(--accent);
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .unit h3 {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: #fff;
        }

        .unit p {
            font-size: 0.85rem;
            color: #94a3b8;
            line-height: 1.6;
        }

        /* 进度胶囊 */
        .pill {
            margin-top: 40px;
            padding: 15px 30px;
            background: rgba(0,0,0,0.2);
            border-radius: 100px;
            display: inline-flex;
            align-items: center;
            font-size: 0.9rem;
            gap: 15px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .ice-card { padding: 30px 20px; border-radius: 35px; }
            header h1 { font-size: 1.8rem; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <main class="ice-card">
        <header>
            <h1>Attention <span>Architecture</span></h1>
            <p style="margin-top: 10px; color: #64748b;">深度学习的结构化之美</p>
        </header>

        <div class="grid">
            <div class="unit">
                <div class="unit-icon" style="background: #38bdf8;"></div>
                <h3>注意力池化</h3>
                <p>Query 与 Key 的点积不仅是数学，更是权重的重新分配。</p>
            </div>
            <div class="unit">
                <div class="unit-icon" style="background: #818cf8;"></div>
                <h3>残差连接</h3>
                <p>让梯度在深层网络中自由流动的“高速公路”。</p>
            </div>
            <div class="unit">
                <div class="unit-icon" style="background: #c084fc;"></div>
                <h3>多头并行</h3>
                <p>不同头关注不同维度，构建更立体的语义空间。</p>
            </div>
        </div>

        <div class="pill">
            <div class="dot"></div>
            <span>内核已载入：Transformer-v3.0-Core</span>
        </div>
    </main>

</body>
</html>
