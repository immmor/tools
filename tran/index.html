<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transformer Docs | Pure Glass</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --card-bg: rgba(255, 255, 255, 0.45);
            --card-border: rgba(255, 255, 255, 0.7);
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --accent: #0071e3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(196, 113, 237, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(18, 194, 233, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(246, 79, 89, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 核心毛玻璃容器 */
        .glass-container {
            background: var(--card-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--card-border);
            border-radius: 30px;
            box-shadow: 
                0 4px 6px rgba(0,0,0,0.02),
                0 20px 50px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 900px;
            padding: 40px;
            margin-top: 40px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        .badge {
            display: inline-block;
            padding: 6px 16px;
            background: rgba(0, 113, 227, 0.1);
            color: var(--accent);
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 15px;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-sub);
            font-size: 1.1rem;
        }

        /* 列表部分 */
        .section-title {
            font-size: 1.4rem;
            margin: 30px 0 20px 10px;
            font-weight: 600;
        }

        .learning-path {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            padding: 20px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .item-card:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .item-info h3 {
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .item-info p {
            font-size: 0.9rem;
            color: var(--text-sub);
        }

        .arrow {
            font-size: 1.2rem;
            color: var(--accent);
            opacity: 0.5;
            transition: transform 0.3s;
        }

        .item-card:hover .arrow {
            transform: translateX(5px);
            opacity: 1;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            .glass-container {
                padding: 25px 20px;
                margin-top: 20px;
                border-radius: 24px;
            }
            h1 { font-size: 2rem; }
            .item-card { padding: 15px 20px; }
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <header>
            <span class="badge">Artificial Intelligence</span>
            <h1>Transformer 101</h1>
            <p class="subtitle">探索注意力机制如何重塑语言理解</p>
        </header>

        <h2 class="section-title">核心章节</h2>
        <div class="learning-path">
            <a href="#" class="item-card">
                <div class="item-info">
                    <h3>01. 词嵌入与向量空间</h3>
                    <p>将文字转化为机器可理解的连续向量坐标。</p>
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="#" class="item-card">
                <div class="item-info">
                    <h3>02. 注意力评分计算</h3>
                    <p>详解 Query, Key 和 Value 之间的点积运算。</p>
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="#" class="item-card">
                <div class="item-info">
                    <h3>03. 编码器堆叠</h3>
                    <p>深入探讨残差连接与 Layer Normalization 的作用。</p>
                </div>
                <div class="arrow">→</div>
            </a>

            <a href="#" class="item-card">
                <div class="item-info">
                    <h3>04. 模型训练与推理</h3>
                    <p>了解从梯度下降到解码生成的完整流程。</p>
                </div>
                <div class="arrow">→</div>
            </a>
        </div>
    </div>

</body>
</html>
