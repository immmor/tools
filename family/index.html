<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家族宗谱·典藏版</title>
    <style>
        :root {
            --stone-bg: #e5e5e0; 
            --ink: #1a1a1a;
            --bronze: #8c6d46; 
            --border-heavy: #2c2c2c;
            --paper: #f9f7f2;
            --highlight: #c0392b;
        }

        body {
            background-color: #d6d6d0;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            margin: 0;
            padding: 20px 10px 60px 10px;
            font-family: "Noto Serif SC", "Source Han Serif SC", "SimSun", serif;
            color: var(--ink);
            overflow-x: hidden;
        }

        /* 布局容器 */
        .ancestral-shrine {
            max-width: 800px;
            margin: 0 auto;
            border: 6px double var(--border-heavy);
            padding: 40px 20px;
            background: var(--stone-bg);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            position: relative;
            transition: margin-right 0.3s ease;
        }

        #tree-container {
            padding-left: 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .search-container {
            margin-bottom: 30px;
            text-align: center;
            position: relative;
            z-index: 20;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .search-input {
            background: var(--paper);
            border: 1px solid var(--bronze);
            padding: 8px 15px;
            width: 50%;
            font-family: inherit;
            outline: none;
        }

        .shrine-header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--bronze);
            padding-bottom: 20px;
        }

        .shrine-header h1 {
            font-size: 56px;
            letter-spacing: 15px;
            margin: 0;
            font-weight: 900;
        }

        .family-stats {
            font-size: 12px;
            color: var(--bronze);
            margin-top: 10px;
            letter-spacing: 2px;
            text-align: center;
        }

        /* 树形结构线 */
        ul { list-style: none; padding-left: 45px; margin: 0; position: relative; }
        li { position: relative; padding: 15px 0; }
        li::before {
            content: "";
            position: absolute;
            left: -22px;
            top: -15px;
            bottom: 0;
            width: 1.5px;
            background: #bbb;
        }
        li::after {
            content: "";
            position: absolute;
            left: -22px;
            top: 36px;
            width: 22px;
            height: 1.5px;
            background: var(--bronze);
        }
        li:last-child::before { height: 52px; }

        /* 节点样式 */
        .tablet-node {
            background: var(--paper);
            border: 1px solid #d1d1c1;
            border-left: 6px solid var(--border-heavy);
            padding: 12px 20px;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            position: relative;
            width: 420px;
            z-index: 5;
        }

        .tablet-node:hover {
            transform: translateX(8px);
            background: #fff;
            border-color: var(--bronze);
        }

        .avatar-box {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid var(--bronze);
            margin-right: 15px;
            overflow: hidden;
            background: #eee;
            flex-shrink: 0;
        }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; filter: sepia(0.5); }

        .name-area { flex: 1; }
        .full-name { font-size: 18px; font-weight: bold; color: #000; display: block; }
        .life-info { font-size: 12px; color: #666; margin-top: 4px; display: block; }

        .rank-label {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 11px;
            color: var(--bronze);
            border-left: 1px solid #ddd;
            padding: 0 8px;
            height: 50px;
            display: flex;
            align-items: center;
        }

        /* 侧边栏详情 */
        .detail-panel {
            position: fixed;
            right: -400px;
            top: 0;
            width: 350px;
            height: 100%;
            background: var(--paper);
            box-shadow: -5px 0 20px rgba(0,0,0,0.2);
            z-index: 100;
            transition: right 0.3s ease;
            padding: 40px 20px;
            border-left: 4px solid var(--bronze);
        }
        .detail-panel.active { right: 0; }
        .close-panel { position: absolute; top: 20px; right: 20px; cursor: pointer; font-size: 24px; }

        .search-match { border-left-color: var(--highlight) !important; animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(192, 57, 43, 0); }
            100% { box-shadow: 0 0 0 0 rgba(192, 57, 43, 0); }
        }

        .sub-descendants { display: none; }
        .expanded > .sub-descendants { display: block; }

        .corner { position: absolute; width: 30px; height: 30px; border: 3px solid var(--bronze); pointer-events: none; }
        .tl { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .tr { top: 10px; right: 10px; border-left: none; border-bottom: none; }
        .bl { bottom: 10px; left: 10px; border-right: none; border-top: none; }
        .br { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        @media print {
            .search-container, .detail-panel, .toggle-icon { display: none; }
            body { background: white; }
            .ancestral-shrine { box-shadow: none; border: 2px solid #000; }
        }
    </style>
</head>
<body>

<div class="ancestral-shrine" id="main-shrine">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="shrine-header">
        <h1>王氏族譜</h1>
        <div class="family-motto" style="font-size: 16px; color: var(--bronze); margin: 10px 0; font-style: italic;">家训：忠孝传家，诗书继世</div>
    </div>

    <div class="search-container">
        <input type="text" id="memberSearch" class="search-input" placeholder="输入姓名搜索族人...">
        <div id="stats" class="family-stats">—— 溯本求源 · 绵延不绝 ——</div>
    </div>

    <div id="tree-container">
        <ul id="genealogy-tree"></ul>
    </div>
</div>

<div class="detail-panel" id="detailPanel">
    <div class="close-panel" onclick="closePanel()">×</div>
    <div id="detailContent">
        <h2 style="border-bottom: 2px solid var(--bronze); padding-bottom:10px;">族人志</h2>
        <div id="personDetail">
            <p>点击族人卡片查看详细生平...</p>
        </div>
    </div>
</div>

<script>
    const familyData = [
        {
            name: "王公諱世傑",
            meta: "第一世 · 始遷祖 · 配李氏",
            rank: "正本清源",
            desc: "明洪武年间由山西洪洞大槐树迁入，开基创业，勤俭持家。为人慷慨豁达，乡里称颂。",
            avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=ancestor1",
            children: [
                {
                    name: "王公諱繼先",
                    meta: "第二世 · 長房 · 宣德年间生",
                    rank: "枝繁葉茂",
                    desc: "承父志，开垦荒地百余亩。配张氏，育有三子。",
                    avatar: "",
                    children: [
                        {
                            name: "王公諱紹寬",
                            meta: "第三世 · 庠生 · 承嗣",
                            rank: "克紹箕裘",
                            desc: "少而好学，入县庠为生员。晚年隐居城东，教授子弟。",
                            avatar: "",
                            children: []
                        },
                        {
                            name: "王公諱紹敏",
                            meta: "第三世 · 居城南",
                            rank: "兰馨桂馥",
                            desc: "经商有道，富甲一方，乐善好施。",
                            avatar: "",
                            children: []
                        }
                    ]
                },
                {
                    name: "王公諱繼德",
                    meta: "第二世 · 次房 · 居永安",
                    rank: "德厚流光",
                    desc: "迁居永安镇，分支始祖。德行高尚，寿享八十有六。",
                    avatar: "",
                    children: [
                        {
                            name: "王公諱紹严",
                            meta: "第三世 · 岁贡生",
                            rank: "光宗耀祖",
                            desc: "嘉靖年间岁贡，任知县职。为官清廉。",
                            avatar: "",
                            children: []
                        }
                    ]
                }
            ]
        }
    ];

    let memberCount = 0;
    const defaultAvatar = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZmlsbD0iI2NjYyIgZD0iTTEyIDJDNi40OCAyIDIgNi40OCAyIDEyczQuNDggMTAgMTAgMTAgMTAtNC40OCAxMC0xMFMxNy41MiAyIDEyIDJ6bTAgM2MyLjIxIDAgNCAxLjc5IDQgNHMtMS43OSA0LTQgNC00LTEuNzktNC00IDEuNzktNCA0LTR6bTAgMTMuOTFjLTIuNTEgMC00LjczLTEuMjgtNS44Ni0zLjI0LjA4LTEuOTQgMy45OC0zIDUuODYtMyA0LjgyIDAgOC43OSAxLjA2IDguODYgM3YtLjA2Yy0xLjEzIDEuOTYtMy4zNSAzLjI0LTUuODYgMy4yNHoiLz48L3N2Zz4=";

    function renderTree(data, container, depth = 0) {
        data.forEach(person => {
            memberCount++;
            const li = document.createElement('li');
            const hasChildren = person.children && person.children.length > 0;
            li.className = hasChildren ? 'item has-children expanded' : 'item';
            
            li.innerHTML = `
                <div class="tablet-node" data-name="${person.name}">
                    <div class="toggle-icon">${hasChildren ? '▼' : ''}</div>
                    <div class="avatar-box">
                        <img src="${person.avatar || defaultAvatar}" alt="头像">
                    </div>
                    <div class="name-area">
                        <span class="full-name">${person.name}</span>
                        <span class="life-info">${person.meta}</span>
                    </div>
                    <div class="rank-label">${person.rank}</div>
                </div>
                ${hasChildren ? '<ul class="sub-descendants"></ul>' : ''}
            `;

            const node = li.querySelector('.tablet-node');
            const avatarBox = node.querySelector('.avatar-box');
            const toggleIcon = node.querySelector('.toggle-icon');
            
            // 点击头像显示详情页
            avatarBox.addEventListener('click', (e) => {
                e.stopPropagation();
                showDetail(person);
            });
            
            // 点击其他区域处理折叠逻辑
            node.addEventListener('click', (e) => {
                e.stopPropagation();
                if (hasChildren && e.target !== avatarBox) {
                    li.classList.toggle('expanded');
                    toggleIcon.innerText = li.classList.contains('expanded') ? '▼' : '▶';
                }
            });

            if (hasChildren) {
                renderTree(person.children, li.querySelector('.sub-descendants'), depth + 1);
            }
            container.appendChild(li);
        });
    }

    function showDetail(person) {
        const panel = document.getElementById('detailPanel');
        const content = document.getElementById('personDetail');
        panel.classList.add('active');
        content.innerHTML = `
            <div style="text-align:center; margin-bottom:20px;">
                <img src="${person.avatar || defaultAvatar}" style="width:100px; height:100px; border-radius:50%; border:3px solid var(--bronze); filter:sepia(0.5);">
                <h3 style="margin:10px 0;">${person.name}</h3>
                <p style="color:var(--bronze); font-style:italic;">${person.meta}</p>
            </div>
            <div style="line-height:1.8; color:#444; border-top:1px dashed #ccc; padding-top:20px;">
                <strong>生平记述：</strong><br>
                ${person.desc || "暂无详细文字记载。"}
            </div>
            <div style="margin-top:30px; border:1px solid #ddd; padding:10px; font-size:12px; color:#888;">
                族内排行：${person.rank}
            </div>
        `;
    }

    function closePanel() {
        document.getElementById('detailPanel').classList.remove('active');
    }

    // 搜索
    document.getElementById('memberSearch').addEventListener('input', function(e) {
        const keyword = e.target.value.trim();
        const allNodes = document.querySelectorAll('.tablet-node');
        allNodes.forEach(node => {
            const name = node.getAttribute('data-name');
            if (keyword && name.includes(keyword)) {
                node.classList.add('search-match');
                expandParents(node);
            } else {
                node.classList.remove('search-match');
            }
        });
    });

    function expandParents(node) {
        let parent = node.parentElement.closest('.item');
        while (parent) {
            parent.classList.add('expanded');
            const icon = parent.querySelector('.toggle-icon');
            if(icon) icon.innerText = '▼';
            parent = parent.parentElement.closest('.item');
        }
    }

    // 初始化
    const treeRoot = document.getElementById('genealogy-tree');
    renderTree(familyData, treeRoot);
    document.getElementById('stats').innerText = `共载录${memberCount}位家族成员`;
</script>

</body>
</html>
