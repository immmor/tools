<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SleekRide Pro | 极简顺风车</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --shadow-light: #ffffff;
            --shadow-dark: #d1d9e6;
            --accent: #3a86ff;
            --text: #4a5568;
        }
        
        :root.mode-driver {
            --accent: #48bb78;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* --- 导航 Tab 栏 --- */
        .tab-bar {
            width: 80px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 30px;
            box-shadow: 5px 0 15px var(--shadow-dark);
            z-index: 1000;
        }

        .tab-item {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            color: #a0aec0;
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
        }

        .tab-item.active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            color: var(--accent);
        }

        /* --- 主内容区 --- */
        main { flex: 1; display: flex; position: relative; overflow: hidden; }

        .content-panel {
            width: 420px;
            height: 100%;
            padding: 25px;
            overflow-y: auto;
            background: var(--bg);
            z-index: 100;
            display: none; /* 默认隐藏，JS控制切换 */
        }
        .content-panel.active { display: flex; flex-direction: column; gap: 20px; }

        /* --- 凹凸组件 --- */
        .neu-card {
            background: var(--bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
        }

        .neu-input-box {
            background: var(--bg);
            border-radius: 12px;
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .neu-input-box input {
            background: transparent; border: none; outline: none; width: 100%; color: var(--text);
        }

        .btn-primary {
            background: var(--bg);
            border-radius: 15px;
            border: none;
            padding: 18px;
            font-weight: bold;
            color: var(--accent);
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        /* --- 地图 --- */
        #map { flex: 1; z-index: 10; background: #eee; filter: grayscale(1) contrast(0.9); }

        /* --- 路线距离标签 --- */
        .route-distance-label {
            background: rgba(255, 255, 255, 0.95);
            padding: 8px 12px;
            border-radius: 8px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
            font-size: 12px;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
            z-index: 1000;
            pointer-events: none;
            display: inline-flex;
            gap: 10px;
        }
        .route-distance-label span {
            display: inline-block;
        }
        .route-distance-label .straight-distance {
            color: #3a86ff;
        }
        .route-distance-label .driving-distance {
            color: #f56565;
        }

        /* --- 响应式 --- */
        @media (max-width: 900px) {
            body { flex-direction: column; height: 100vh; overflow: hidden; max-height: 100vh; }
            .tab-bar {
                width: 100%; height: 70px; flex-direction: row; 
                order: 3; padding: 0; justify-content: space-around;
                box-shadow: 0 -5px 15px var(--shadow-dark);
                flex-shrink: 0;
            }
            main { flex: none; height: calc(100vh - 70px); position: relative; overflow: hidden; max-height: calc(100vh - 70px); }
            .content-panel {
                position: absolute; bottom: 0; width: 100%; 
                height: 100%; border-radius: 25px 25px 0 0;
                z-index: 100;
            }
            #home.content-panel { 
                height: 50%; 
                transition: height 0.3s ease;
                overflow: hidden;
            }
            #home.content-panel.expanded { height: calc(100% - 70px); } /* 减去tab栏高度 */
            #home.content-panel.collapsed { height: 30%; }
            #map { height: 50%; transition: height 0.3s ease; }
            #map.expanded { height: 0; }
            #map.collapsed { height: 70%; }
            #trips #map, #msg #map, #profile #map { display: none; }
            #trips .content-panel, #msg .content-panel, #profile .content-panel { height: 100%; }
            
            /* 拖拽手柄 - 只在首页显示 */
            #home .drag-handle {
                position: absolute;
                top: 8px;
                left: 50%;
                transform: translateX(-50%);
                width: 40px;
                height: 4px;
                background: #ccc;
                border-radius: 2px;
                cursor: ns-resize;
                z-index: 101;
            }
            #home .drag-handle::before {
                content: '';
                position: absolute;
                top: -8px;
                left: 0;
                width: 100%;
                height: 20px;
                background: transparent;
            }
            /* 其他tab隐藏拖拽手柄 */
            #trips .drag-handle, #msg .drag-handle, #profile .drag-handle {
                display: none;
            }
        }

        /* --- 模式切换开关 --- */
        .mode-switch {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px;
            margin-bottom: 15px;
        }
        .mode-switch-label {
            font-weight: 600;
            font-size: 14px;
        }
        .switch-toggle {
            position: relative;
            width: 60px;
            height: 30px;
            border-radius: 15px;
            background: var(--bg);
            box-shadow: inset 3px 3px 6px var(--shadow-dark), inset -3px -3px 6px var(--shadow-light);
            cursor: pointer;
            transition: 0.3s;
        }
        .switch-toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 3px 3px 6px var(--shadow-dark), -3px -3px 6px var(--shadow-light);
            transition: 0.3s;
        }
        .switch-toggle.active {
            background: var(--bg);
        }
        .switch-toggle.active::after {
            left: 33px;
            background: #48bb78;
        }
        .switch-toggle span {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            font-weight: 600;
            color: #a0aec0;
        }
        .switch-toggle span.passenger {
            left: 7px;
        }
        .switch-toggle span.driver {
            right: 7px;
        }

        /* 隐藏滚动条 */
        .content-panel::-webkit-scrollbar { display: none; }
        
        /* --- 全屏转场动画 --- */
        .fade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease, background 1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .fade-overlay.active {
            opacity: 1;
            pointer-events: all;
            background: var(--accent);
        }
        
        .fade-overlay.fade-out {
            opacity: 0;
            transition: opacity 0.8s ease, background 0.8s ease;
        }
        
        .fade-overlay::after {
            content: '';
            color: white;
            font-size: 48px;
            font-weight: 800;
            animation: fadeInOut 2s ease-in-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        .fade-overlay[data-mode="乘客模式"]::after {
            content: '切换至 乘客模式';
        }
        
        .fade-overlay[data-mode="车主模式"]::after {
            content: '切换至 车主模式';
        }
        
        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            20% {
                opacity: 1;
                transform: scale(1);
            }
            80% {
                opacity: 1;
                transform: scale(1);
            }
            100% {
                opacity: 0;
                transform: scale(0.5);
            }
        }
    </style>
</head>
<body>

    <div class="tab-bar">
        <div class="tab-item active" data-target="home"><i class="fas fa-car"></i></div>
        <div class="tab-item" data-target="trips"><i class="fas fa-calendar-alt"></i></div>

    <div class="fade-overlay" id="fadeOverlay"></div>

    <main>

        <div id="msg" class="content-panel">

                        <span style="font-weight: 600;" id="msgTitle3">支付成功</span>

        <div id="profile" class="content-panel">

            <div class="neu-card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="btn-primary" style="text-align: center; font-size: 13px;">钱包余额<br><b>¥1250.00</b></div>

        <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 0. 用户模式：'passenger' 或 'driver'
        let userMode = 'passenger';
        
        // 模式切换数据
        const modeData = {
            passenger: {
                homeTitle: 'SleekRide',
                homeSubtitle: '要去哪里？',
                carTypeTitle: '车型选择',
                callBtnText: '呼叫顺风车',
                tripsTitle: '我的行程',
                trip1Status: '进行中',
                trip1Route: '静安区 -> 浦东机场',
                trip1Amount: '预计收益: ¥85.00',
                trip2Status: '已完成',
                trip2Route: '徐家汇 -> 五角场',
                trip2Amount: '支付金额: ¥42.50',
                msgTitle: '消息',
                msg1Title: '行程提醒',
                msg1Content: '您的顺风车已出发，预计15分钟到达。',
                msg2Title: '司机留言',
                msg2Content: '司机：您好，我到了上车点，请联系我。',
                msg3Title: '支付成功',
                msg3Content: '行程已完成，金额 ¥42.50 已结算。'
            },
            driver: {
                homeTitle: '接单中心',
                homeSubtitle: '选择接单区域',
                carTypeTitle: '车辆信息',
                callBtnText: '上线接单',
                tripsTitle: '我的收入',
                trip1Status: '服务中',
                trip1Route: '静安区 -> 浦东机场 (进行中)',
                trip1Amount: '收入: ¥85.00',
                trip2Status: '已完成',
                trip2Route: '徐家汇 -> 五角场',
                trip2Amount: '收入: ¥42.50',
                msgTitle: '订单消息',
                msg1Title: '新订单提醒',
                msg1Content: '有乘客下单，预计15分钟后接单。',
                msg2Title: '乘客留言',
                msg2Content: '乘客：您好，我在上车点等您。',
                msg3Title: '收款成功',
                msg3Content: '订单已完成，收入 ¥42.50 已到账。'
            }
        };

        // 更新界面内容
        function updateUIForMode() {
            const data = modeData[userMode];
            
            document.getElementById('homeTitle').textContent = data.homeTitle;
            document.getElementById('homeSubtitle').textContent = data.homeSubtitle;
            document.getElementById('carTypeTitle').textContent = data.carTypeTitle;
            document.getElementById('callRideBtn').textContent = data.callBtnText;
            
            document.getElementById('tripsTitle').textContent = data.tripsTitle;
            document.getElementById('tripsStatus1').textContent = data.trip1Status;
            document.getElementById('trip1Route').textContent = data.trip1Route;
            document.getElementById('trip1Amount').textContent = data.trip1Amount;
            document.getElementById('tripsStatus2').textContent = data.trip2Status;
            document.getElementById('trip2Route').textContent = data.trip2Route;
            document.getElementById('trip2Amount').textContent = data.trip2Amount;
            
            document.getElementById('msgTitle').textContent = data.msgTitle;
            document.getElementById('msgTitle1').textContent = data.msg1Title;
            document.getElementById('msgContent1').textContent = data.msg1Content;
            document.getElementById('msgTitle2').textContent = data.msg2Title;
            document.getElementById('msgContent2').textContent = data.msg2Content;
            document.getElementById('msgTitle3').textContent = data.msg3Title;
            document.getElementById('msgContent3').textContent = data.msg3Content;
            
            const modeToggle = document.getElementById('modeToggle');
            if (userMode === 'driver') {
                modeToggle.classList.add('active');
                document.documentElement.classList.add('mode-driver');
            } else {
                modeToggle.classList.remove('active');
                document.documentElement.classList.remove('mode-driver');
            }
        }

        // 1. 初始化地图 (明亮模式)
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([31.2304, 121.4737], 13);
        
        // 使用CartoDB明亮色调的瓦片
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        // 使用开源Nominatim API进行逆地理编码
        async function reverseGeocode(lat, lng) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`);
                const data = await response.json();
                return data.display_name || '未知位置';
            } catch (error) {
                console.error('逆地理编码失败:', error);
                return '位置获取失败';
            }
        }
        
        // 正向地理编码：地址转坐标
        async function geocodeAddress(address) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1&addressdetails=1`);
                const data = await response.json();
                if (data && data.length > 0) {
                    return {
                        lat: parseFloat(data[0].lat),
                        lng: parseFloat(data[0].lon),
                        displayName: data[0].display_name
                    };
                }
                return null;
            } catch (error) {
                console.error('地理编码失败:', error);
                return null;
            }
        }

        // 使用OSRM获取驾驶路线
        async function getDrivingRoute(startLat, startLng, endLat, endLng) {
            try {
                const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${startLng},${startLat};${endLng},${endLat}?overview=full&geometries=geojson`);
                const data = await response.json();
                if (data.code === 'Ok' && data.routes.length > 0) {
                    return {
                        geometry: data.routes[0].geometry.coordinates,
                        distance: data.routes[0].distance,
                        duration: data.routes[0].duration
                    };
                }
                return null;
            } catch (error) {
                console.error('路线规划失败:', error);
                return null;
            }
        }

        // 更新路线显示
        async function updateRoute() {
            const origin = originMarker.getLatLng();
            const dest = destMarker.getLatLng();
            
            const routeData = await getDrivingRoute(origin.lat, origin.lng, dest.lat, dest.lng);
            
            if (routeData) {
                const coords = routeData.geometry.map(c => [c[1], c[0]]);
                routeLine.setLatLngs(coords);
                routeLine.setStyle({ color: '#3a86ff', weight: 4, opacity: 0.8, dashArray: null });
                
                const drivingDist = routeData.distance / 1000;
                const straightDist = calculateStraightDistance(origin.lat, origin.lng, dest.lat, dest.lng);
                
                const dLon = (dest.lng - origin.lng) * Math.PI / 180;
                const y = Math.sin(dLon) * Math.cos(dest.lat * Math.PI / 180);
                const x = Math.cos(origin.lat * Math.PI / 180) * Math.sin(dest.lat * Math.PI / 180) -
                          Math.sin(origin.lat * Math.PI / 180) * Math.cos(dest.lat * Math.PI / 180) * Math.cos(dLon);
                const bearing = Math.atan2(y, x) * 180 / Math.PI;
                
                distanceLabelHtml = `<div class="route-distance-label" style="transform: rotate(${bearing - 90}deg); transform-origin: center center;"><span class="straight-distance">直线: ${straightDist.toFixed(1)}km</span><span class="driving-distance">驾驶: ${drivingDist.toFixed(1)}km</span></div>`;
                distanceMarker.setIcon(L.divIcon({
                    className: 'distance-label',
                    html: distanceLabelHtml,
                    iconSize: [150, 40],
                    iconAnchor: [75, 0]
                }));
                distanceMarker.setOpacity(1);
                
                const midLat = (origin.lat + dest.lat) / 2;
                const midLng = (origin.lng + dest.lng) / 2;
                distanceMarker.setLatLng([midLat, midLng]);
                
                const bounds = routeLine.getBounds();
                map.fitBounds(bounds, { padding: [50, 50] });
            }
            
            if (!map.hasLayer(routeLine)) map.addLayer(routeLine);
            if (!map.hasLayer(distanceMarker)) map.addLayer(distanceMarker);
        }
        
        // 获取地址信息并更新输入框
        async function updateAddressInput(inputElement, lat, lng) {
            const address = await reverseGeocode(lat, lng);
            inputElement.value = `${address} (${lat.toFixed(6)}, ${lng.toFixed(6)})`;
        }

        // 1.1 获取用户当前位置（仅更新标记和输入框，不规划路线）
        function locateUserPosition() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async function(position) {
                        const userLat = position.coords.latitude;
                        const userLng = position.coords.longitude;
                        const userLatLng = [userLat, userLng];
                        
                        // 更新起始点输入框（包含地名）
                        await updateAddressInput(document.getElementById('originInput'), userLat, userLng);
                        
                        // 更新标记
                        originMarker.setLatLng(userLatLng);
                        
                        // 设置地图视野到当前位置
                        map.setView(userLatLng, 14);
                    },
                    function(error) {
                        console.error('定位错误:', error);
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            }
        }
        locateUserPosition();

        // 输入框地址搜索功能
        let originSearchTimeout = null;
        let destSearchTimeout = null;

        // 起点输入框 - 回车搜索
        document.getElementById('originInput').addEventListener('keypress', async function(e) {
            if (e.key === 'Enter') {
                clearTimeout(originSearchTimeout);
                const address = this.value.trim();
                if (address) {
                    const result = await geocodeAddress(address);
                    if (result) {
                        const latLng = [result.lat, result.lng];
                        originMarker.setLatLng(latLng);
                        updateRoute();
                        this.value = result.displayName;
                    } else {
                        alert('未找到该地址，请尝试更详细的地址');
                    }
                }
            }
        });

        // 起点输入框 - 失去焦点时搜索（带延迟防抖）
        document.getElementById('originInput').addEventListener('blur', async function() {
            clearTimeout(originSearchTimeout);
            const address = this.value.trim();
            if (address && address.length > 5) {
                originSearchTimeout = setTimeout(async () => {
                    const result = await geocodeAddress(address);
                    if (result) {
                        const latLng = [result.lat, result.lng];
                        originMarker.setLatLng(latLng);
                        updateRoute();
                        this.value = result.displayName;
                    }
                }, 800);
            }
        });

        // 终点输入框 - 回车搜索
        document.getElementById('destinationInput').addEventListener('keypress', async function(e) {
            if (e.key === 'Enter') {
                clearTimeout(destSearchTimeout);
                const address = this.value.trim();
                if (address) {
                    const result = await geocodeAddress(address);
                    if (result) {
                        const latLng = [result.lat, result.lng];
                        if (!map.hasLayer(destMarker)) {
                            map.addLayer(destMarker);
                        }
                        destMarker.setLatLng(latLng);
                        updateRoute();
                        this.value = result.displayName;
                    } else {
                        alert('未找到该地址，请尝试更详细的地址');
                    }
                }
            }
        });

        // 终点输入框 - 失去焦点时搜索（带延迟防抖）
        document.getElementById('destinationInput').addEventListener('blur', async function() {
            clearTimeout(destSearchTimeout);
            const address = this.value.trim();
            if (address && address.length > 5) {
                destSearchTimeout = setTimeout(async () => {
                    const result = await geocodeAddress(address);
                    if (result) {
                        const latLng = [result.lat, result.lng];
                        if (!map.hasLayer(destMarker)) {
                            map.addLayer(destMarker);
                        }
                        destMarker.setLatLng(latLng);
                        updateRoute();
                        this.value = result.displayName;
                    }
                }, 800);
            }
        });

        // 2. 模拟司机图标
        const carIcon = L.divIcon({
            className: 'car-marker',
            html: `<div style="background: white; border: 2px solid var(--accent); width: 14px; height: 14px; border-radius: 50%; box-shadow: 2px 2px 5px rgba(0,0,0,0.2);"></div>`
        });

        const drivers = [
            L.marker([31.235, 121.480], {icon: carIcon}).addTo(map),
            L.marker([31.225, 121.465], {icon: carIcon}).addTo(map)
        ];

        // 起始点和目的地标记
        const originIcon = L.divIcon({
            className: 'origin-marker',
            html: '<div style="background: #3a86ff; width: 16px; height: 16px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 0 8px rgba(58,134,255,0.2);"></div>',
            iconSize: [16, 16],
            iconAnchor: [8, 8]
        });

        const destIcon = L.divIcon({
            className: 'dest-marker',
            html: '<div style="background: #000; width: 14px; height: 14px; border-radius: 2px; transform: rotate(45deg); border: 3px solid white; box-shadow: 5px 5px 10px rgba(0,0,0,0.3);"></div>',
            iconSize: [14, 14],
            iconAnchor: [7, 7]
        });

        let originMarker = L.marker([31.2304, 121.4737], {icon: originIcon, draggable: true}).addTo(map);
        let destMarker = L.marker([31.235, 121.480], {icon: destIcon, draggable: true});

        let routeLine = L.polyline([], {
            color: '#3a86ff',
            weight: 4,
            opacity: 0.8
        });

        // 距离显示标签（初始化时不显示）
        let distanceLabelHtml = '';
        let distanceMarker = L.marker([0, 0], {
            icon: L.divIcon({
                className: 'distance-label',
                html: distanceLabelHtml,
                iconSize: [150, 40],
                iconAnchor: [75, 0]
            }),
            opacity: 0
        });

        // 计算两点间直线距离（Haversine公式）
        function calculateStraightDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + 
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        // 更新距离显示
        function updateDistanceDisplay() {
            const origin = originMarker.getLatLng();
            const dest = destMarker.getLatLng();
            
            const straightDist = calculateStraightDistance(origin.lat, origin.lng, dest.lat, dest.lng);
            const drivingDist = straightDist * 1.2;
            
            // 计算路线角度
            const dLon = (dest.lng - origin.lng) * Math.PI / 180;
            const y = Math.sin(dLon) * Math.cos(dest.lat * Math.PI / 180);
            const x = Math.cos(origin.lat * Math.PI / 180) * Math.sin(dest.lat * Math.PI / 180) -
                      Math.sin(origin.lat * Math.PI / 180) * Math.cos(dest.lat * Math.PI / 180) * Math.cos(dLon);
            const bearing = Math.atan2(y, x) * 180 / Math.PI;
            
            distanceLabelHtml = `<div class="route-distance-label" style="transform: rotate(${bearing - 90}deg); transform-origin: center center;"><span class="straight-distance">直线: ${straightDist.toFixed(1)}km</span><span class="driving-distance">开车: ${drivingDist.toFixed(1)}km</span></div>`;
            distanceMarker.setIcon(L.divIcon({
                className: 'distance-label',
                html: distanceLabelHtml,
                iconSize: [150, 40],
                iconAnchor: [75, 0]
            }));
            
            const midLat = (origin.lat + dest.lat) / 2;
            const midLng = (origin.lng + dest.lng) / 2;
            distanceMarker.setLatLng([midLat, midLng]);
        }

        // 起始点拖拽事件
        originMarker.on('drag', function() {
            routeLine.setLatLngs([originMarker.getLatLng(), destMarker.getLatLng()]);
        });

        // 起始点拖拽结束事件
        originMarker.on('dragend', async function() {
            updateRoute();
            // 更新起始点输入框（包含地名）
            const originLatLng = originMarker.getLatLng();
            await updateAddressInput(document.getElementById('originInput'), originLatLng.lat, originLatLng.lng);
        });

        // 目的地拖拽事件
        destMarker.on('drag', function() {
            routeLine.setLatLngs([originMarker.getLatLng(), destMarker.getLatLng()]);
        });

        // 目的地拖拽结束事件
        destMarker.on('dragend', async function() {
            updateRoute();
            // 更新目的地输入框（包含地名）
            const destLatLng = destMarker.getLatLng();
            await updateAddressInput(document.getElementById('destinationInput'), destLatLng.lat, destLatLng.lng);
        });

        // 点击地图添加目的地
        map.on('click', async function(e) {
            destMarker.setLatLng(e.latlng);
            map.addLayer(destMarker);
            updateRoute();
            // 更新目的地输入框（包含地名）
            await updateAddressInput(document.getElementById('destinationInput'), e.latlng.lat, e.latlng.lng);
        });

        // 模式切换按钮
        const modeToggleBtn = document.getElementById('modeToggle');
        modeToggleBtn.addEventListener('click', () => {
            const overlay = document.getElementById('fadeOverlay');
            const targetMode = userMode === 'passenger' ? 'driver' : 'passenger';
            const targetModeText = targetMode === 'passenger' ? '乘客模式' : '车主模式';
            const iconClass = targetMode === 'passenger' ? 'fa-user' : 'fa-car';
            
            // 先清理之前的动画状态
            overlay.classList.remove('active', 'fade-out');
            overlay.innerHTML = '';
            
            // 先更新主题颜色
            if (targetMode === 'driver') {
                document.documentElement.classList.add('mode-driver');
            } else {
                document.documentElement.classList.remove('mode-driver');
            }
            
            // 设置转场动画内容
            overlay.innerHTML = `<div style="display: flex; flex-direction: column; align-items: center; gap: 20px;">
                <i class="fas ${iconClass}" style="font-size: 64px;"></i>
                <span style="font-size: 36px; font-weight: 800;">切换至 ${targetModeText}</span>
            </div>`;
            
            // 强制重绘
            void overlay.offsetWidth;
            
            // 开始转场动画
            overlay.classList.add('active');
            
            setTimeout(() => {
                // 切换模式
                userMode = targetMode;
                updateUIForMode();
                
                // 结束转场动画 - 添加 fade-out 类以获得平滑过渡
                overlay.classList.add('fade-out');
                
                // 监听消失动画结束事件，清理内容
                const handleFadeOutEnd = () => {
                    overlay.classList.remove('active', 'fade-out');
                    overlay.innerHTML = '';
                    overlay.removeEventListener('transitionend', handleFadeOutEnd);
                };
                overlay.addEventListener('transitionend', handleFadeOutEnd);
            }, 3000);
        });

        // 3. 车型选择逻辑
        const carTypes = document.querySelectorAll('#carTypeSelector .tab-item');
        let selectedCarType = 'comfort';

        carTypes.forEach(car => {
            car.addEventListener('click', () => {
                carTypes.forEach(c => c.classList.remove('active'));
                car.classList.add('active');
                selectedCarType = car.getAttribute('data-type');
            });
        });

        // 初始化UI
        updateUIForMode();

        // 5. 叫车/接单功能
        const callBtn = document.getElementById('callRideBtn');
        callBtn.addEventListener('click', () => {
            const inputs = document.querySelectorAll('#home input[type="text"]');
            const origin = inputs[0].value;
            const dest = inputs[1].value;
            
            if(!dest || dest === '输入目的地') {
                alert('请输入目的地');
                return;
            }

            const carTypeMap = { 'comfort': '舒适型', 'six': '六座车', 'electric': '新能源' };
            const carTypeName = carTypeMap[selectedCarType];
            const modeText = userMode === 'passenger' ? '乘客' : '车主';

            callBtn.innerHTML = '匹配中...';
            callBtn.style.opacity = '0.7';

            setTimeout(() => {
                if (userMode === 'passenger') {
                    alert(`成功呼叫${carTypeName}\n起点: ${origin}\n目的地: ${dest}`);
                } else {
                    alert(`成功上线接单\n车型: ${carTypeName}\n区域: ${origin}`);
                }
                callBtn.innerHTML = userMode === 'passenger' ? '已呼叫' : '已上线';
                callBtn.style.background = '#48bb78';
                callBtn.style.color = '#fff';
                callBtn.style.boxShadow = 'inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light)';
            }, 1500);
        });

        // 5. Tab 切换逻辑
        const tabs = document.querySelectorAll('.tab-item[data-target]');
        const panels = document.querySelectorAll('.content-panel');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // 处理 Tab 样式
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                // 处理面板切换
                const target = tab.getAttribute('data-target');
                panels.forEach(p => {
                    p.classList.remove('active');
                    if(p.id === target) p.classList.add('active');
                });

                // 切换Tab时重置地图和面板状态
                const map = document.getElementById('map');
                const isDesktop = window.innerWidth > 900;
                
                if (isDesktop) {
                    // 桌面端：所有 tab 都显示地图
                    map.style.display = 'block';
                    map.style.height = '';
                    map.classList.remove('expanded', 'collapsed');
                } else {
                    // 移动端：只在首页显示地图
                    if (target === 'home') {
                        map.style.display = 'block';
                        const homePanel = document.getElementById('home');
                        homePanel.classList.remove('expanded', 'collapsed');
                        map.classList.remove('expanded', 'collapsed');
                        homePanel.style.height = '';
                        map.style.height = '';
                    } else {
                        // 其他tab：隐藏地图
                        map.style.display = 'none';
                    }
                }

                // 切换后刷新地图布局
                setTimeout(() => map.invalidateSize(), 300);
                // 切换Tab时也更新UI内容
                updateUIForMode();
            });
        });

        // 定位按钮事件
        const locateBtn = document.getElementById('locateBtn');
        locateBtn.addEventListener('click', locateUserPosition);

        // 6. 拖拽功能实现（只在首页生效）
        let isDragging = false;
        let startY = 0;
        let startHeight = 0;
        let currentPanel = null;
        let currentMap = null;

        // 添加拖拽事件监听器（只在首页生效）
        const dragHandles = document.querySelectorAll('.drag-handle');
        dragHandles.forEach(handle => {
            handle.addEventListener('touchstart', handleDragStart);
            handle.addEventListener('mousedown', handleDragStart);
        });

        function handleDragStart(e) {
            if (window.innerWidth > 900) return; // 只在移动端生效
            
            const panel = e.target.closest('.content-panel');
            if (panel.id !== 'home') return; // 只在首页生效
            
            e.preventDefault();
            isDragging = true;
            startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
            currentPanel = panel;
            currentMap = document.getElementById('map');
            startHeight = currentPanel.offsetHeight;
            
            // 添加拖拽状态样式
            currentPanel.style.transition = 'none';
            currentMap.style.transition = 'none';
            
            // 添加事件监听器
            document.addEventListener('touchmove', handleDragMove);
            document.addEventListener('mousemove', handleDragMove);
            document.addEventListener('touchend', handleDragEnd);
            document.addEventListener('mouseup', handleDragEnd);
        }

        function handleDragMove(e) {
            if (!isDragging) return;
            
            e.preventDefault();
            const currentY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
            const deltaY = startY - currentY; // 向上拖拽为正值
            const minHeight = 70;
            const maxHeight = window.innerHeight - 70; // 最大高度（屏幕高度减去tab栏）
            const newHeight = Math.max(minHeight, Math.min(maxHeight, startHeight + deltaY));
            
            // 实时更新高度
            currentPanel.style.height = newHeight + 'px';
            currentMap.style.height = (window.innerHeight - 70 - newHeight) + 'px'; // 70px是tab栏高度
        }

        function handleDragEnd(e) {
            if (!isDragging) return;
            
            e.preventDefault();
            isDragging = false;
            
            // 恢复过渡效果
            currentPanel.style.transition = '';
            currentMap.style.transition = '';
            
            // 根据最终高度决定是展开还是收起
            const finalHeight = currentPanel.offsetHeight;
            const screenHeight = window.innerHeight;
            
            // 移除之前的类
            currentPanel.classList.remove('expanded', 'collapsed');
            currentMap.classList.remove('expanded', 'collapsed');
            
            if (finalHeight > screenHeight * 0.6) {
                // 展开状态
                currentPanel.classList.add('expanded');
                currentMap.classList.add('expanded');
            } else if (finalHeight < screenHeight * 0.4) {
                // 收起状态
                currentPanel.classList.add('collapsed');
                currentMap.classList.add('collapsed');
            }
            // 中间状态保持当前高度
            
            // 移除事件监听器
            document.removeEventListener('touchmove', handleDragMove);
            document.removeEventListener('mousemove', handleDragMove);
            document.removeEventListener('touchend', handleDragEnd);
            document.removeEventListener('mouseup', handleDragEnd);
        }

        // 窗口大小变化时重新计算布局
        window.addEventListener('resize', () => {
            if (window.innerWidth > 900) {
                // 桌面端：重置所有样式
                const panels = document.querySelectorAll('.content-panel');
                const map = document.getElementById('map');
                panels.forEach(panel => {
                    panel.classList.remove('expanded', 'collapsed');
                    panel.style.height = '';
                });
                map.classList.remove('expanded', 'collapsed');
                map.style.height = '';
            }
        });

        // 模拟车辆缓慢移动
        setInterval(() => {
            drivers.forEach(d => {
                const pos = d.getLatLng();
                d.setLatLng([pos.lat + 0.0001, pos.lng + 0.0001]);
            });
        }, 2000);
    </script>
</body>
</html>
