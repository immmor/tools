<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SleekRide Pro | 极简顺风车</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --shadow-light: #ffffff;
            --shadow-dark: #d1d9e6;
            --accent: #3a86ff;
            --text: #4a5568;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        /* --- 导航 Tab 栏 --- */
        .tab-bar {
            width: 80px;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            gap: 30px;
            box-shadow: 5px 0 15px var(--shadow-dark);
            z-index: 1000;
        }

        .tab-item {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            color: #a0aec0;
            box-shadow: 4px 4px 8px var(--shadow-dark), -4px -4px 8px var(--shadow-light);
        }

        .tab-item.active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            color: var(--accent);
        }

        /* --- 主内容区 --- */
        main { flex: 1; display: flex; position: relative; }

        .content-panel {
            width: 420px;
            height: 100%;
            padding: 25px;
            overflow-y: auto;
            background: var(--bg);
            z-index: 100;
            display: none; /* 默认隐藏，JS控制切换 */
        }
        .content-panel.active { display: flex; flex-direction: column; gap: 20px; }

        /* --- 凹凸组件 --- */
        .neu-card {
            background: var(--bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 8px 8px 16px var(--shadow-dark), -8px -8px 16px var(--shadow-light);
        }

        .neu-input-box {
            background: var(--bg);
            border-radius: 12px;
            box-shadow: inset 5px 5px 10px var(--shadow-dark), inset -5px -5px 10px var(--shadow-light);
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .neu-input-box input {
            background: transparent; border: none; outline: none; width: 100%; color: var(--text);
        }

        .btn-primary {
            background: var(--bg);
            border-radius: 15px;
            border: none;
            padding: 18px;
            font-weight: bold;
            color: var(--accent);
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light);
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-primary:active {
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }

        /* --- 地图 --- */
        #map { flex: 1; z-index: 10; background: #eee; }

        /* --- 响应式 --- */
        @media (max-width: 900px) {
            body { flex-direction: column; }
            .tab-bar {
                width: 100%; height: 70px; flex-direction: row; 
                order: 3; padding: 0; justify-content: space-around;
                box-shadow: 0 -5px 15px var(--shadow-dark);
            }
            .content-panel {
                position: absolute; bottom: 70px; width: 100%; 
                height: 50%; border-radius: 25px 25px 0 0;
            }
            #map { height: 50%; }
        }

        /* 隐藏滚动条 */
        .content-panel::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div class="tab-bar">
        <div class="tab-item active" data-target="home"><i class="fas fa-home"></i></div>
        <div class="tab-item" data-target="trips"><i class="fas fa-calendar-alt"></i></div>
        <div class="tab-item" data-target="msg"><i class="fas fa-comment-dots"></i></div>
        <div class="tab-item" data-target="profile"><i class="fas fa-user"></i></div>
    </div>

    <main>
        <div id="home" class="content-panel active">
            <h2 style="font-weight: 800; margin-bottom: 10px;">SleekRide</h2>
            
            <div class="neu-card">
                <p style="font-size: 14px; margin-bottom: 15px; font-weight: 600;">要去哪里？</p>
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <div class="neu-input-box">
                        <i class="fas fa-dot-circle" style="color: #48bb78;"></i>
                        <input type="text" value="我的位置：上海中心大厦">
                    </div>
                    <div class="neu-input-box">
                        <i class="fas fa-map-marker-alt" style="color: #f56565;"></i>
                        <input type="text" placeholder="输入目的地">
                    </div>
                </div>
            </div>

            <div class="neu-card">
                <p style="font-size: 14px; margin-bottom: 15px; font-weight: 600;">车型选择</p>
                <div style="display: flex; gap: 15px;">
                    <div class="tab-item active" style="flex:1; flex-direction: column; font-size: 10px; height: 70px;">
                        <i class="fas fa-car" style="font-size: 20px;"></i>舒适型
                    </div>
                    <div class="tab-item" style="flex:1; flex-direction: column; font-size: 10px; height: 70px;">
                        <i class="fas fa-truck-pickup" style="font-size: 20px;"></i>六座车
                    </div>
                    <div class="tab-item" style="flex:1; flex-direction: column; font-size: 10px; height: 70px;">
                        <i class="fas fa-leaf" style="font-size: 20px;"></i>新能源
                    </div>
                </div>
            </div>

            <button class="btn-primary">呼叫顺风车</button>
        </div>

        <div id="trips" class="content-panel">
            <h2 style="font-weight: 800; margin-bottom: 10px;">我的行程</h2>
            <div class="neu-card" style="margin-bottom: 15px;">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span style="font-size: 12px; color: var(--accent);">进行中</span>
                    <span style="font-size: 12px;">今日 18:30</span>
                </div>
                <p style="font-weight: 600;">静安区 -> 浦东机场</p>
                <p style="font-size: 13px; color: #888; margin-top: 5px;">预计收益: ¥85.00</p>
            </div>
            <div class="neu-card">
                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span style="font-size: 12px; color: #888;">已完成</span>
                    <span style="font-size: 12px;">昨天 09:15</span>
                </div>
                <p style="font-weight: 600;">徐家汇 -> 五角场</p>
                <p style="font-size: 13px; color: #888; margin-top: 5px;">支付金额: ¥42.50</p>
            </div>
        </div>

        <div id="profile" class="content-panel">
            <div class="neu-card" style="text-align: center; padding: 40px 20px;">
                <div style="width: 80px; height: 80px; border-radius: 50%; box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); margin: 0 auto 15px; overflow: hidden;">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Mrok" width="100%">
                </div>
                <h3>Mrok De Engineer</h3>
                <p style="font-size: 12px; color: #888;">系统工程师 | 信用极好 780</p>
            </div>
            <div class="neu-card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="btn-primary" style="text-align: center; font-size: 13px;">钱包余额<br><b>¥1250.00</b></div>
                <div class="btn-primary" style="text-align: center; font-size: 13px;">优惠券<br><b>12 张</b></div>
            </div>
            <button class="btn-primary" style="color: #f56565;">退出登录</button>
        </div>

        <div id="map"></div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 初始化地图 (明亮模式)
        const map = L.map('map', { zoomControl: false }).setView([31.2304, 121.4737], 13);
        
        // 使用标准明亮色调的瓦片
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 2. 模拟司机图标
        const carIcon = L.divIcon({
            className: 'car-marker',
            html: `<div style="background: white; border: 2px solid var(--accent); width: 14px; height: 14px; border-radius: 50%; box-shadow: 2px 2px 5px rgba(0,0,0,0.2);"></div>`
        });

        const drivers = [
            L.marker([31.235, 121.480], {icon: carIcon}).addTo(map),
            L.marker([31.225, 121.465], {icon: carIcon}).addTo(map)
        ];

        // 3. Tab 切换逻辑
        const tabs = document.querySelectorAll('.tab-item[data-target]');
        const panels = document.querySelectorAll('.content-panel');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                // 处理 Tab 样式
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                // 处理面板切换
                const target = tab.getAttribute('data-target');
                panels.forEach(p => {
                    p.classList.remove('active');
                    if(p.id === target) p.classList.add('active');
                });

                // 切换后刷新地图布局
                setTimeout(() => map.invalidateSize(), 300);
            });
        });

        // 模拟车辆缓慢移动
        setInterval(() => {
            drivers.forEach(d => {
                const pos = d.getLatLng();
                d.setLatLng([pos.lat + 0.0001, pos.lng + 0.0001]);
            });
        }, 2000);
    </script>
</body>
</html>
