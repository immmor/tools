<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER-HITCH | 赛博顺风车</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg-dark: #05050a;
            --glass: rgba(255, 255, 255, 0.05);
            --neon-border: rgba(0, 242, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
        }

        /* --- 侧边栏/导航 --- */
        nav {
            width: 80px;
            background: rgba(10, 10, 20, 0.8);
            border-right: 1px solid var(--neon-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            z-index: 100;
            transition: all 0.3s;
        }

        nav .logo {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 40px;
            text-shadow: 0 0 10px var(--primary);
        }

        nav .nav-item {
            margin: 20px 0;
            color: #666;
            cursor: pointer;
            font-size: 20px;
            transition: 0.3s;
        }

        nav .nav-item.active, nav .nav-item:hover {
            color: var(--primary);
            text-shadow: 0 0 8px var(--primary);
        }

        /* --- 主内容区 --- */
        main {
            flex: 1;
            display: flex;
            position: relative;
        }

        /* --- 地图容器 --- */
        #map-container {
            flex: 1;
            background: #111; /* 模拟地图背景 */
            position: relative;
            overflow: hidden;
        }

        /* 模拟地图背景纹理 */
        .map-grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: rotateX(45deg);
            top: -50%;
        }

        /* 模拟定位点 */
        .marker {
            position: absolute;
            top: 40%;
            left: 50%;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 20px var(--primary);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(3); opacity: 0; }
        }

        /* --- 交互面板 --- */
        .panel {
            width: 380px;
            background: rgba(15, 15, 25, 0.85);
            backdrop-filter: blur(20px);
            border-left: 1px solid var(--neon-border);
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
            z-index: 90;
        }

        .search-box {
            background: var(--glass);
            border: 1px solid var(--neon-border);
            border-radius: 12px;
            padding: 15px;
        }

        .input-group {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 5px;
        }

        .input-group i { color: var(--primary); margin-right: 10px; width: 20px;}
        input {
            background: transparent;
            border: none;
            color: #fff;
            width: 100%;
            outline: none;
            font-size: 14px;
        }

        .btn-order {
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 8px;
            color: white;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 242, 255, 0.3);
            transition: 0.3s;
        }

        .btn-order:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 242, 255, 0.5);
        }

        /* --- 司机列表 --- */
        .driver-card {
            background: var(--glass);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid transparent;
            transition: 0.3s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .driver-card:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .avatar {
            width: 50px;
            height: 50px;
            background: #333;
            border-radius: 50%;
            border: 2px solid var(--secondary);
        }

        .driver-info h4 { font-size: 16px; margin-bottom: 4px; }
        .driver-info p { font-size: 12px; color: #aaa; }
        .price { margin-left: auto; color: var(--primary); font-weight: bold; }

        /* --- 移动端适配 --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            nav {
                width: 100%;
                height: 60px;
                flex-direction: row;
                justify-content: space-around;
                padding: 0;
                border-right: none;
                border-top: 1px solid var(--neon-border);
                order: 2;
            }
            nav .logo { display: none; }
            nav .nav-item { margin: 0; }
            
            main { order: 1; flex-direction: column; height: calc(100vh - 60px); }
            .panel {
                width: 100%;
                position: absolute;
                bottom: 0;
                height: 45%;
                border-left: none;
                border-top: 1px solid var(--neon-border);
                border-radius: 20px 20px 0 0;
            }
            #map-container { height: 55%; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fas fa-bolt"></i></div>
        <div class="nav-item active"><i class="fas fa-route"></i></div>
        <div class="nav-item"><i class="fas fa-history"></i></div>
        <div class="nav-item"><i class="fas fa-wallet"></i></div>
        <div class="nav-item"><i class="fas fa-user-astronaut"></i></div>
    </nav>

    <main>
        <div id="map-container">
            <div class="map-grid"></div>
            <div class="marker" style="top: 30%; left: 40%;"></div>
            <div class="marker" style="top: 55%; left: 60%; background: var(--secondary); box-shadow: 0 0 20px var(--secondary);"></div>
            
            <div style="position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 30px; border: 1px solid var(--primary); font-size: 12px;">
                <i class="fas fa-satellite"></i> GPS SIGNAL: <span style="color: var(--primary);">STRONG</span>
            </div>
        </div>

        <div class="panel">
            <h2 style="letter-spacing: 2px; font-size: 20px; margin-bottom: 10px;">发现行程</h2>
            
            <div class="search-box">
                <div class="input-group">
                    <i class="fas fa-circle-dot" style="color: #00ff88;"></i>
                    <input type="text" placeholder="从哪里出发？" value="中关村科技园">
                </div>
                <div class="input-group" style="border: none;">
                    <i class="fas fa-location-arrow"></i>
                    <input type="text" placeholder="去往哪个星系？">
                </div>
                <button class="btn-order" style="width: 100%; margin-top: 10px;">开启即时呼叫</button>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 14px; color: #888;">附近 3 位司机正在接单</span>
                <i class="fas fa-sliders" style="color: var(--primary); cursor: pointer;"></i>
            </div>

            <div class="driver-card">
                <div class="avatar" style="background: url('https://api.dicebear.com/7.x/avataaars/svg?seed=Felix') center/cover;"></div>
                <div class="driver-info">
                    <h4>阿强 (Cyber-T)</h4>
                    <p><i class="fas fa-star" style="color: gold;"></i> 4.9 | 特斯拉 Model S</p>
                </div>
                <div class="price">¥24.5</div>
            </div>

            <div class="driver-card">
                <div class="avatar" style="background: url('https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka') center/cover;"></div>
                <div class="driver-info">
                    <h4>莉莉丝</h4>
                    <p><i class="fas fa-star" style="color: gold;"></i> 5.0 | 蔚来 ET7</p>
                </div>
                <div class="price">¥32.0</div>
            </div>

            <div class="driver-card">
                <div class="avatar" style="background: url('https://api.dicebear.com/7.x/avataaars/svg?seed=Jack') center/cover;"></div>
                <div class="driver-info">
                    <h4>老王</h4>
                    <p><i class="fas fa-star" style="color: gold;"></i> 4.7 | 小米 SU7</p>
                </div>
                <div class="price">¥19.8</div>
            </div>

            <div style="margin-top: auto; padding: 15px; border-radius: 10px; background: linear-gradient(90deg, rgba(112,0,255,0.2), transparent); border-left: 4px solid var(--secondary);">
                <p style="font-size: 12px; color: #ccc;">会员福利</p>
                <p style="font-size: 14px;">今晚雨天，顺风车立减 5 元 ⚡</p>
            </div>
        </div>
    </main>

    <script>
        // 简单的交互脚本
        document.querySelectorAll('.driver-card').forEach(card => {
            card.addEventListener('click', () => {
                alert('正在连接司机...');
            });
        });

        // 模拟地图上的标记随机微动
        setInterval(() => {
            const markers = document.querySelectorAll('.marker');
            markers.forEach(m => {
                const randomX = (Math.random() - 0.5) * 5;
                const randomY = (Math.random() - 0.5) * 5;
                m.style.transform = `translate(${randomX}px, ${randomY}px)`;
            });
        }, 3000);
    </script>
</body>
</html>
