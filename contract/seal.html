<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公章生成器</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .container { display: flex; gap: 30px; max-width: 900px; margin: 0 auto; }
        .panel { flex: 0 0 300px; }
        .canvas-box { flex: 1; text-align: center; }
        h3 { margin: 0 0 15px; color: #d32f2f; border-left: 4px solid #d32f2f; padding-left: 10px; }
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; font-weight: bold; }
        input[type="text"] { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        input[type="range"] { width: 100%; }
        canvas { max-width: 100%; border: 1px solid #eee; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #d32f2f; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px; }
        .hint { font-size: 12px; color: #999; margin-top: 10px; text-align: center; }
        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .panel { flex: 1; }
            .canvas-box { text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <h3>印章生成器</h3>
        
        <div class="control-group">
            <label>单位名称</label>
            <input type="text" id="company" value="演示精密制造电子科技有限公司">
        </div>

        <div class="control-group">
            <label>文字分布广度</label>
            <input type="range" id="angleRange" min="120" max="280" value="220">
        </div>

        <div class="control-group">
            <label>社会信用号</label>
            <input type="text" id="code" value="91310000ABC123456X">
        </div>

        <div class="control-group">
            <label>信用号分布广度</label>
            <input type="range" id="codeAngleRange" min="60" max="180" value="100">
        </div>

        <div class="control-group">
            <label>文字距边框距离</label>
            <input type="range" id="padding" min="10" max="60" value="30">
        </div>

        <button onclick="download()">导出印章</button>
        <p class="hint">调整滑块实时预览效果</p>
    </div>

    <div class="canvas-box">
        <canvas id="seal" width="400" height="400"></canvas>
    </div>
</div>

<script>
const canvas = document.getElementById('seal');
const ctx = canvas.getContext('2d');

function draw() {
    const companyName = document.getElementById('company').value;
    const creditCode = document.getElementById('code').value;
    const totalAngle = parseInt(document.getElementById('angleRange').value);
    const codeAngle = parseInt(document.getElementById('codeAngleRange').value);
    const padding = parseInt(document.getElementById('padding').value);
    
    const r = 160;
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#f00";
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.arc(centerX, centerY, r, 0, Math.PI * 2);
    ctx.stroke();

    drawStar(centerX, centerY, 5, r * 0.35, r * 0.14);

    const companyRadian = (totalAngle * Math.PI) / 180;
    const startAngle = -Math.PI/2 - companyRadian/2;
    const step = companyRadian / (companyName.length - 1);

    ctx.font = `bold ${r * 0.25}px "SimSun", "Songti SC", serif`;
    ctx.fillStyle = "#f00";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    for (let i = 0; i < companyName.length; i++) {
        const charAngle = startAngle + i * step;
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(charAngle + Math.PI/2);
        ctx.fillText(companyName[i], 0, -(r - padding)); 
        ctx.restore();
    }

    const codeRadian = (codeAngle * Math.PI) / 180;
    const codeStartAngle = -Math.PI/2 - codeRadian/2;
    const codeStep = codeRadian / (creditCode.length - 1);
    
    ctx.font = `bold ${r * 0.09}px Arial`;

    for (let i = 0; i < creditCode.length; i++) {
        const charAngle = codeStartAngle + (creditCode.length - 1 - i) * codeStep;
        ctx.save();
        ctx.translate(centerX, centerY);
        ctx.rotate(charAngle + Math.PI/2);
        ctx.fillText(creditCode[i], 0, r - padding + 5);
        ctx.restore();
    }
}

function drawStar(x, y, spikes, outer, inner) {
    let rot = Math.PI / 2 * 3;
    let step = Math.PI / spikes;
    ctx.beginPath();
    ctx.moveTo(x, y - outer);
    for (let i = 0; i < spikes; i++) {
        ctx.lineTo(x + Math.cos(rot) * outer, y + Math.sin(rot) * outer);
        rot += step;
        ctx.lineTo(x + Math.cos(rot) * inner, y + Math.sin(rot) * inner);
        rot += step;
    }
    ctx.closePath();
    ctx.fillStyle = "#f00";
    ctx.fill();
}

function download() {
    const link = document.createElement('a');
    link.download = 'seal.png';
    link.href = canvas.toDataURL();
    link.click();
}

document.querySelectorAll('input').forEach(input => input.oninput = draw);
draw();
</script>
</body>
</html>
