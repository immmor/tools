<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura3D // 极简高端 3D 创作空间</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-bg: rgba(20, 20, 25, 0.6);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #e2e8f0;
            --text-muted: #718096;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
            position: fixed;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 优雅的模糊面板基底 */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            z-index: 10;
            position: absolute;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 顶部状态栏 */
        header {
            top: 20px;
            left: 20px;
            right: 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .logo {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(45deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 左侧工具栏 */
        .toolbar {
            top: 100px;
            left: 20px;
            width: 68px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 16px;
        }

        .tool-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.2s ease;
        }

        .tool-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .tool-btn.active {
            color: #fff;
            background: var(--accent-color);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        .tool-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* 快捷键小角标 */
        .key-badge {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.4);
            font-family: monospace;
        }
        .tool-btn.active .key-badge {
            color: rgba(255, 255, 255, 0.8);
        }

        /* 右侧属性面板 */
        .properties-panel {
            top: 100px;
            right: 20px;
            width: 280px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: calc(100% - 220px);
            overflow-y: auto;
        }

        .properties-panel.collapsed {
            transform: translateX(calc(100% + 40px));
        }

        .panel-toggle {
            position: absolute;
            top: 120px;
            right: 312px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0;
            z-index: 15;
        }

        .panel-toggle:hover {
            color: var(--text-main);
        }

        .panel-toggle svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            transition: transform 0.3s ease;
            transform: rotate(180deg);
        }

        .panel-toggle.collapsed {
            right: 20px;
        }

        .panel-toggle.collapsed svg {
            transform: rotate(0deg);
        }

        .panel-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 自定义高端输入控件 */
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            background: transparent;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 2px solid var(--panel-border);
            border-radius: 50%;
        }

        .range-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            outline: none;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .range-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
            position: relative;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .action-btn.danger:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
        }

        /* 底部提示栏 */
        footer {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 1px;
            pointer-events: none;
            white-space: nowrap;
        }

        /* ----------------------------------------------------------------------
           手机端与小屏幕自适应响应式样式布局 (Media Queries)
        ------------------------------------------------------------------------- */
        @media screen and (max-width: 768px) {
            header {
                top: 10px;
                left: 10px;
                right: 10px;
                height: 50px;
                padding: 0 16px;
            }
            .logo {
                font-size: 15px;
                letter-spacing: 2px;
            }
            header div:last-child {
                display: none; /* 移动端隐藏次要文本 */
            }

            /* 工具栏转换为底部水平排列 */
            .toolbar {
                top: auto;
                bottom: 20px;
                left: 20px;
                width: calc(100% - 40px);
                height: 60px;
                flex-direction: row;
                justify-content: space-around;
                padding: 0 10px;
                gap: 0;
            }
            .tool-btn {
                width: 44px;
                height: 44px;
            }
            /* 小屏幕下隐藏物理快捷键角标 */
            .key-badge {
                display: none; 
            }

            /* 右侧属性面板改为顶部展开式小抽屉，或者精简悬浮在右上角 */
            .properties-panel {
                top: 70px;
                right: 10px;
                left: auto;
                width: 240px;
                padding: 16px;
                gap: 14px;
                max-height: calc(100% - 170px);
            }
            .properties-panel.collapsed {
                transform: translateX(calc(100% + 30px));
            }
            .panel-toggle {
                top: 84px;
                right: 262px;
                width: 28px;
                height: 28px;
            }
            .panel-toggle svg {
                width: 16px;
                height: 16px;
            }
            .panel-toggle.collapsed {
                right: 10px;
            }
            .panel-title {
                font-size: 12px;
                margin-bottom: 4px;
            }
            .control-group label {
                font-size: 11px;
            }
            input[type="color"] {
                width: 32px;
                height: 32px;
            }
            .action-btn {
                padding: 8px;
                font-size: 12px;
            }
            #btn-undo span {
                display: none; /* 移动端隐藏快捷键提示标签 */
            }

            /* 移动端由于屏幕受限，隐藏最底部的纯文字长句提示栏 */
            footer {
                display: none;
            }
        }
    </style>
    <!-- 引入 Three.js 和 OrbitControls 轨道控制器 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- 顶部状态栏 -->
    <header class="glass-panel">
        <div class="logo">Aura 3D</div>
        <div style="font-size: 13px; color: var(--text-muted);">Mode: Studio Creative</div>
    </header>

    <!-- 左侧工具栏 -->
    <div class="toolbar glass-panel">
        <!-- 视角查看工具 -->
        <button class="tool-btn active" id="tool-view" title="视角旋转 (V)">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
            <span class="key-badge">V</span>
        </button>
        <!-- 3D 笔刷工具 -->
        <button class="tool-btn" id="tool-brush" title="3D 空间画笔 (B)">
            <svg viewBox="0 0 24 24"><path d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92 1.22 2.49 2 4 2 2.76 0 5-2.24 5-5 0-1.66-1.34-3-3-3zm13.71-9.37l-1.34-1.34c-.39-.39-1.02-.39-1.41 0L9 12.25 11.75 15l8.96-8.96c.39-.39.39-1.02 0-1.41z"/></svg>
            <span class="key-badge">B</span>
        </button>
        <!-- 立方体放置工具 -->
        <button class="tool-btn" id="tool-box" title="放置立方体 (C)">
            <svg viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
            <span class="key-badge">C</span>
        </button>
        <!-- 球体放置工具 -->
        <button class="tool-btn" id="tool-sphere" title="放置球体 (S)">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
            <span class="key-badge">S</span>
        </button>
    </div>

    <!-- 右侧属性面板切换按钮 -->
    <button class="panel-toggle glass-panel" id="panel-toggle" title="收起/展开面板">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>

    <!-- 右侧属性面板 -->
    <div class="properties-panel glass-panel" id="properties-panel">
        <div class="panel-title">Material / 材质属性</div>
        
        <div class="control-group">
            <label>Color / 颜色</label>
            <div class="color-picker-wrapper">
                <input type="color" id="block-color" value="#6366f1">
                <span id="color-hex" style="font-size: 13px; font-family: monospace;">#6366f1</span>
            </div>
        </div>

        <div class="control-group">
            <label>Size / 笔触尺寸 (<span id="size-val">0.5</span>)</label>
            <input type="range" id="block-size" class="range-slider" min="0.1" max="2" step="0.1" value="0.5">
        </div>

        <div class="control-group">
            <label>Roughness / 粗糙度</label>
            <input type="range" id="mat-roughness" class="range-slider" min="0" max="1" step="0.05" value="0.2">
        </div>

        <div class="control-group">
            <label>Metalness / 金属感</label>
            <input type="range" id="mat-metalness" class="range-slider" min="0" max="1" step="0.05" value="0.5">
        </div>

        <hr style="border: 0; border-top: 1px solid var(--panel-border); margin: 10px 0;">

        <div class="panel-title">Actions / 操作</div>
        <button class="action-btn" id="btn-undo" title="快捷键: Ctrl + Z">撤销上一步 <span style="font-size:10px; color:var(--text-muted); font-family:monospace; margin-left:5px;">[Ctrl+Z]</span></button>
        <button class="action-btn danger" id="btn-clear">清空画布</button>
    </div>

    <!-- 底部提示栏 -->
    <footer class="glass-panel">
        快捷键: V-视角 | B-画笔 | C-立方体 | S-球体 | Ctrl+Z-撤销  ||  操作: 左键绘制/旋转，右键平移，滚轮缩放
    </footer>

    <script>
        // --- 全局变量与初始化 ---
        let scene, camera, renderer, controls;
        let currentTool = 'view'; // view, brush, box, sphere
        let paintColor = '#6366f1';
        let brushSize = 0.5;
        let roughness = 0.2;
        let metalness = 0.5;

        // 用于画笔模式的虚拟绘制平面和射线检测
        let raycaster, mouse;
        let drawingPlane;
        let isDrawing = false;
        const objectsGroup = new THREE.Group(); 
        
        // 撤销历史记录：记录每次独立操作（单次点击或单次拖拽画笔生成的物体集合）
        let actionHistory = [];
        let currentStrokeObjects = [];

        const container = document.getElementById('canvas-container');

        init();
        animate();

        function init() {
            // 1. 场景创建 (纯粹的暗色调艺术背景)
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#08080a');
            scene.fog = new THREE.FogExp2('#08080a', 0.015);
            scene.add(objectsGroup);

            // 2. 相机设置
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(10, 12, 18);

            // 3. 渲染器设置
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            // 4. 轨道控制器
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 + 0.1;

            // 5. 环境光与高质感多光源
            const ambientLight = new THREE.AmbientLight('#ffffff', 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight('#ffffff', 1.5);
            dirLight.position.set(20, 40, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.camera.near = 0.5;
            dirLight.shadow.camera.far = 100;
            const d = 20;
            dirLight.shadow.camera.left = -d;
            dirLight.shadow.camera.right = d;
            dirLight.shadow.camera.top = d;
            dirLight.shadow.camera.bottom = -d;
            dirLight.shadow.bias = -0.0005;
            scene.add(dirLight);

            // 侧边霓虹环境氛围光
            const pointLight1 = new THREE.PointLight('#4f46e5', 2, 50);
            pointLight1.position.set(-15, 10, -15);
            scene.add(pointLight1);

            const pointLight2 = new THREE.PointLight('#ec4899', 1.5, 50);
            pointLight2.position.set(15, 5, -15);
            scene.add(pointLight2);

            // 6. 显式的高级网格线 (画布加上清晰的网格支持)
            const gridHelper = new THREE.GridHelper(60, 60, '#4f46e5', '#3f3f46');
            gridHelper.position.y = 0.001; 
            gridHelper.material.opacity = 0.5;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            // 优雅纯粹的深色哑地平面
            const floorGeo = new THREE.PlaneGeometry(120, 120);
            const floorMat = new THREE.MeshStandardMaterial({
                color: '#0a0a0d',
                roughness: 0.95,
                metalness: 0.0 
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // 7. 射线检测与绘制辅助
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            
            const planeGeo = new THREE.PlaneGeometry(1000, 1000);
            planeGeo.rotateX(-Math.PI / 2);
            drawingPlane = new THREE.Mesh(planeGeo, new THREE.MeshBasicMaterial({ visible: false }));
            scene.add(drawingPlane);

            // 8. 事件监听 (同时监听 Touch 触摸事件以适配手机屏幕)
            window.addEventListener('resize', onWindowResize);
            
            renderer.domElement.addEventListener('pointerdown', onPointerDown);
            renderer.domElement.addEventListener('pointermove', onPointerMove);
            window.addEventListener('pointerup', onPointerUp);

            setupUI();
            setupShortcuts(); 
        }

        // --- 工具切换逻辑封装 ---
        function switchTool(toolId) {
            const tools = ['view', 'brush', 'box', 'sphere'];
            if (!tools.includes(toolId)) return;

            tools.forEach(t => document.getElementById(`tool-${t}`).classList.remove('active'));
            document.getElementById(`tool-${toolId}`).classList.add('active');
            currentTool = toolId;
            controls.enabled = (currentTool === 'view');
        }

        // --- 一键清空画布封装 ---
        function clearCanvas() {
            while(objectsGroup.children.length > 0){
                const obj = objectsGroup.children[0];
                objectsGroup.remove(obj);
            }
            actionHistory = [];
            currentStrokeObjects = [];
        }

        // --- 撤销功能封装 ---
        function undoAction() {
            if (actionHistory.length > 0) {
                const lastObjects = actionHistory.pop();
                lastObjects.forEach(obj => {
                    objectsGroup.remove(obj);
                });
            }
        }

        // --- UI 交互绑定 ---
        function setupUI() {
            const tools = ['view', 'brush', 'box', 'sphere'];
            tools.forEach(tool => {
                document.getElementById(`tool-${tool}`).addEventListener('click', () => {
                    switchTool(tool);
                });
            });

            const colorPicker = document.getElementById('block-color');
            colorPicker.addEventListener('input', (e) => {
                paintColor = e.target.value;
                document.getElementById('color-hex').innerText = paintColor.toUpperCase();
            });

            const sizeSlider = document.getElementById('block-size');
            sizeSlider.addEventListener('input', (e) => {
                brushSize = parseFloat(e.target.value);
                document.getElementById('size-val').innerText = brushSize;
            });

            document.getElementById('mat-roughness').addEventListener('input', (e) => { roughness = parseFloat(e.target.value); });
            document.getElementById('mat-metalness').addEventListener('input', (e) => { metalness = parseFloat(e.target.value); });

            document.getElementById('btn-undo').addEventListener('click', undoAction);
            document.getElementById('btn-clear').addEventListener('click', clearCanvas);

            document.getElementById('panel-toggle').addEventListener('click', () => {
                const panel = document.getElementById('properties-panel');
                const toggle = document.getElementById('panel-toggle');
                panel.classList.toggle('collapsed');
                toggle.classList.toggle('collapsed');
            });
        }

        // --- 全局快捷键监听逻辑 ---
        function setupShortcuts() {
            window.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

                // 捕获 Ctrl + Z 撤销快捷键
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                    e.preventDefault();
                    undoAction();
                    return;
                }

                const key = e.key.toLowerCase();
                
                if (key === 'v') {
                    switchTool('view');
                } else if (key === 'b') {
                    switchTool('brush');
                } else if (key === 'c') {
                    switchTool('box');
                } else if (key === 's') {
                    switchTool('sphere');
                }
            });
        }

        // --- 核心绘制物理逻辑 ---
        function getIntersectionPoint(e) {
            // 兼容移动端 Touch 事件的坐标点获取
            let clientX = e.clientX;
            let clientY = e.clientY;
            
            if (e.changedTouches && e.changedTouches.length > 0) {
                clientX = e.changedTouches[0].clientX;
                clientY = e.changedTouches[0].clientY;
            } else if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            }

            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            if((currentTool === 'box' || currentTool === 'sphere') && objectsGroup.children.length > 0) {
                const intersectsObjects = raycaster.intersectObjects(objectsGroup.children);
                if(intersectsObjects.length > 0) {
                    return intersectsObjects[0].point.add(intersectsObjects[0].face.normal.clone().multiplyScalar(brushSize/2));
                }
            }

            const intersectsPlane = raycaster.intersectObject(drawingPlane);
            if (intersectsPlane.length > 0) {
                return intersectsPlane[0].point;
            }
            return null;
        }

        function createInstance(point, type) {
            let geometry;
            if (type === 'box' || type === 'brush') {
                geometry = new THREE.BoxGeometry(brushSize, brushSize, brushSize);
            } else if (type === 'sphere') {
                geometry = new THREE.SphereGeometry(brushSize / 2, 32, 32);
            }

            const material = new THREE.MeshStandardMaterial({
                color: new THREE.Color(paintColor),
                roughness: roughness,
                metalness: metalness
            });

            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(point);
            if(type !== 'brush' && type === 'box') {
                mesh.position.y = Math.max(mesh.position.y, brushSize / 2);
            }

            mesh.castShadow = true;
            mesh.receiveShadow = true;

            mesh.scale.set(0.01, 0.01, 0.01);
            objectsGroup.add(mesh);
            
            // 追踪当前笔触/动作所生成的全部几何体
            currentStrokeObjects.push(mesh);

            let progress = 0;
            function grow() {
                if(progress < 1) {
                    progress += 0.15;
                    mesh.scale.setScalar(Math.min(progress, 1));
                    requestAnimationFrame(grow);
                }
            }
            grow();
        }

        function onPointerDown(e) {
            if (currentTool === 'view') return;
            const point = getIntersectionPoint(e);
            if (!point) return;

            isDrawing = true;
            currentStrokeObjects = []; // 开始新的一笔操作
            createInstance(point, currentTool);
        }

        function onPointerMove(e) {
            if (!isDrawing || currentTool === 'view') return;
            const point = getIntersectionPoint(e);
            if (!point) return;

            if (currentTool === 'brush') {
                const lastObj = currentStrokeObjects[currentStrokeObjects.length - 1];
                if (lastObj) {
                    const dist = lastObj.position.distanceTo(point);
                    if (dist > brushSize * 0.3) {
                        createInstance(point, 'brush');
                    }
                } else {
                    createInstance(point, 'brush');
                }
            }
        }

        function onPointerUp() {
            if (isDrawing && currentStrokeObjects.length > 0) {
                // 将刚才这一笔生成的所有对象存入撤销历史栈
                actionHistory.push(currentStrokeObjects);
            }
            isDrawing = false;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (currentTool === 'view') {
                controls.update();
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
