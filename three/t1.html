<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aura3D // 极简高端 3D 创作空间</title>
    <!-- 引入 FontAwesome 图标库库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0a0a0c;
            --panel-bg: rgba(20, 20, 25, 0.6);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #e2e8f0;
            --text-muted: #718096;
            --accent-color: #6366f1;
            --accent-hover: #4f46e5;
        }

        /* 亮色模式下的色彩变量 */
        :root.light {
            --bg-color: #f1f5f9;
            --panel-bg: rgba(255, 255, 255, 0.75);
            --panel-border: rgba(0, 0, 0, 0.08);
            --text-main: #0f172a;
            --text-muted: #64748b;
            --accent-color: #4f46e5;
            --accent-hover: #3730a3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
            position: fixed;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* 优雅的模糊面板基底 */
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border);
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            z-index: 10;
            position: absolute;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* 顶部状态栏 */
        header {
            top: 20px;
            left: 20px;
            right: 20px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }

        .logo {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--text-main), var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 左侧工具栏 */
        .toolbar {
            top: 100px;
            left: 20px;
            width: 68px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 16px;
        }

        .tool-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.2s ease;
        }

        .tool-btn:hover {
            color: var(--text-main);
            background: rgba(128, 128, 128, 0.08);
        }

        .tool-btn.active {
            color: #fff;
            background: var(--accent-color);
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.5);
        }

        .tool-btn svg, .tool-btn i {
            font-size: 18px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tool-btn svg {
            fill: currentColor;
        }

        /* 快捷键小角标 */
        .key-badge {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 9px;
            color: rgba(128, 128, 128, 0.5);
            font-family: monospace;
        }
        .tool-btn.active .key-badge {
            color: rgba(255, 255, 255, 0.8);
        }

        /* 右侧属性面板 */
        .properties-panel {
            top: 100px;
            right: 20px;
            width: 280px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            max-height: calc(100% - 220px);
            overflow-y: auto;
        }

        .properties-panel.collapsed {
            transform: translateX(calc(100% + 40px));
        }

        .panel-toggle {
            position: absolute;
            top: 120px;
            right: 312px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0;
            z-index: 15;
        }

        .panel-toggle:hover {
            color: var(--text-main);
        }

        .panel-toggle svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            transition: transform 0.3s ease;
            transform: rotate(180deg);
        }

        .panel-toggle.collapsed {
            right: 20px;
        }

        .panel-toggle.collapsed svg {
            transform: rotate(0deg);
        }

        .panel-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 自定义高端输入控件 */
        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            background: transparent;
        }

        input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        input[type="color"]::-webkit-color-swatch {
            border: 2px solid var(--panel-border);
            border-radius: 50%;
        }

        .range-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(128, 128, 128, 0.15);
            border-radius: 2px;
            outline: none;
        }

        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            transition: transform 0.1s;
        }

        .range-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .action-btn {
            background: rgba(128, 128, 128, 0.05);
            border: 1px solid var(--panel-border);
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s, transform 0.1s;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .action-btn:hover {
            background: rgba(128, 128, 128, 0.1);
        }

        .action-btn:active {
            transform: scale(0.98);
        }

        .action-btn.danger:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
        }

        /* 顶部主题和模式面板容器 */
        .header-actions {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .theme-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--panel-border);
            background: transparent;
            color: var(--text-main);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .theme-btn:hover {
            background: rgba(128, 128, 128, 0.1);
            transform: scale(1.05);
        }

        .theme-btn i {
            font-size: 16px;
        }

        /* 底部提示栏 */
        footer {
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 8px 20px;
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 1px;
            pointer-events: none;
            white-space: nowrap;
        }

        /* ----------------------------------------------------------------------
           手机端与小屏幕自适应响应式样式布局 (Media Queries)
        ------------------------------------------------------------------------- */
        @media screen and (max-width: 768px) {
            header {
                top: 10px;
                left: 10px;
                right: 10px;
                height: 50px;
                padding: 0 16px;
            }
            .logo {
                font-size: 15px;
                letter-spacing: 2px;
            }
            .header-actions div:last-child {
                display: none; /* 移动端隐藏次要文本 */
            }

            /* 工具栏转换为底部水平排列 */
            .toolbar {
                top: auto;
                bottom: 20px;
                left: 20px;
                width: calc(100% - 40px);
                height: 60px;
                flex-direction: row;
                justify-content: space-around;
                padding: 0 10px;
                gap: 0;
            }
            .tool-btn {
                width: 44px;
                height: 44px;
            }
            /* 小屏幕下隐藏物理快捷键角标 */
            .key-badge {
                display: none; 
            }

            /* 右侧属性面板改为顶部展开式小抽屉，或者精简悬浮在右上角 */
            .properties-panel {
                top: 70px;
                right: 10px;
                left: auto;
                width: 240px;
                padding: 16px;
                gap: 14px;
                max-height: calc(100% - 170px);
            }
            .properties-panel.collapsed {
                transform: translateX(calc(100% + 30px));
            }
            .panel-toggle {
                top: 84px;
                right: 262px;
                width: 28px;
                height: 28px;
            }
            .panel-toggle svg {
                width: 16px;
                height: 16px;
            }
            .panel-toggle.collapsed {
                right: 10px;
            }
            .panel-title {
                font-size: 12px;
                margin-bottom: 4px;
            }
            .control-group label {
                font-size: 11px;
            }
            input[type="color"] {
                width: 32px;
                height: 32px;
            }
            .action-btn {
                padding: 8px;
                font-size: 12px;
            }
            #btn-undo span {
                display: none; /* 移动端隐藏快捷键提示标签 */
            }

            /* 移动端由于屏幕受限，隐藏最底部的纯文字长句提示栏 */
            footer {
                display: none;
            }
        }
    </style>
    <!-- 引入 Three.js 和 相关控制器 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <!-- 顶部状态栏 -->
    <header class="glass-panel">
        <div class="logo">Aura 3D</div>
        <div class="header-actions">
            <!-- 极简 FontAwesome 物理主题切换按钮 -->
            <button class="theme-btn" id="theme-toggle" title="切换白天/暗黑模式">
                <i id="theme-icon" class="fa-regular fa-moon"></i>
            </button>
            <div style="font-size: 13px; color: var(--text-muted);">Mode: Studio Creative</div>
        </div>
    </header>

    <!-- 找到 toolbar，用以下代码替换原有的 box 和 sphere 按钮 -->
<div class="toolbar glass-panel">
    <!-- 视角查看工具 -->
    <button class="tool-btn active" id="tool-view" title="视角旋转 (V)">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        <span class="key-badge">V</span>
    </button>
    <!-- 变换工具 -->
    <button class="tool-btn" id="tool-move" title="移动物体 (M)">
        <svg viewBox="0 0 24 24"><path d="M13 10V6h3l-4-4-4 4h3v4H7V7l-4 4 4 4v-3h4v4H8l4 4 4-4h-3v-4h4v3l4-4-4-4v3h-4z"/></svg>
        <span class="key-badge">M</span>
    </button>
    <!-- 3D 笔刷工具 -->
    <button class="tool-btn" id="tool-brush" title="3D 空间画笔 (B)">
        <svg viewBox="0 0 24 24"><path d="M7 14c-1.66 0-3 1.34-3 3 0 1.31-1.16 2-2 2 .92 1.22 2.49 2 4 2 2.76 0 5-2.24 5-5 0-1.66-1.34-3-3-3zm13.71-9.37l-1.34-1.34c-.39-.39-1.02-.39-1.41 0L9 12.25 11.75 15l8.96-8.96c.39-.39.39-1.02 0-1.41z"/></svg>
        <span class="key-badge">B</span>
    </button>
    
    <!-- 👇 升级：合并后的“形状选择”复合按钮 -->
    <button class="tool-btn" id="tool-shape" title="选择并放置 3D 形状 (S)">
        <i class="fa-solid fa-shapes"></i>
        <span class="key-badge">S</span>
    </button>
</div>

<!-- 👇 新增：精美的二级形状选择面板（默认隐藏，点击“形状”按钮时侧向展开） -->
<div id="shape-submenu" class="glass-panel" style="display: none; position: absolute; width: auto; height: auto; padding: 10px; flex-direction: row; gap: 10px; z-index: 99; align-items: center;">
    <button class="tool-btn" id="sub-shape-box" title="立方体" style="width:40px; height:40px;"><i class="fa-solid fa-cube"></i></button>
    <button class="tool-btn" id="sub-shape-sphere" title="球体" style="width:40px; height:40px;"><i class="fa-solid fa-circle"></i></button>
    <button class="tool-btn" id="sub-shape-cone" title="圆锥体" style="width:40px; height:40px;"><i class="fa-solid fa-play" style="transform: rotate(270deg); font-size: 20px;"></i></button>
    <button class="tool-btn" id="sub-shape-cylinder" title="圆柱体" style="width:40px; height:40px;"><i class="fa-solid fa-database"></i></button>
    <button class="tool-btn" id="sub-shape-torus" title="圆环" style="width:40px; height:40px;"><i class="fa-solid fa-circle-dot"></i></button>
</div>

    <!-- 右侧属性面板切换按钮 -->
    <button class="panel-toggle glass-panel" id="panel-toggle" title="收起/展开面板">
        <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
    </button>

    <!-- 右侧属性面板 -->
    <div class="properties-panel glass-panel" id="properties-panel">
        <div class="panel-title">Material / 材质属性</div>
        
        <div class="control-group">
            <label>Color / 颜色</label>
            <div class="color-picker-wrapper">
                <input type="color" id="block-color" value="#6366f1">
                <span id="color-hex" style="font-size: 13px; font-family: monospace;">#6366f1</span>
            </div>
        </div>

        <div class="control-group">
            <label>Size / 笔触尺寸 (<span id="size-val">0.5</span>)</label>
            <input type="range" id="block-size" class="range-slider" min="0.1" max="2" step="0.1" value="0.5">
        </div>

        <div class="control-group">
            <label>Roughness / 粗糙度</label>
            <input type="range" id="mat-roughness" class="range-slider" min="0" max="1" step="0.05" value="0.2">
        </div>

        <div class="control-group">
            <label>Metalness / 金属感</label>
            <input type="range" id="mat-metalness" class="range-slider" min="0" max="1" step="0.05" value="0.5">
        </div>

        <hr style="border: 0; border-top: 1px solid var(--panel-border); margin: 5px 0;">

        <!-- 👇 新增：动画控制模块 -->
        <div class="panel-title">Animation / 动画控制</div>
        <div class="control-group">
            <label>自转速度</label>
            <input type="range" id="anim-rotation-speed" class="range-slider" min="0" max="2" step="0.1" value="0.5">
        </div>
        <div class="control-group">
            <label>漂浮幅度</label>
            <input type="range" id="anim-float-amplitude" class="range-slider" min="0" max="0.5" step="0.02" value="0.1">
        </div>

        <hr style="border: 0; border-top: 1px solid var(--panel-border); margin: 5px 0;">

        <div class="panel-title">Transform / 空间变换</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
            <button class="action-btn" id="btn-mode-translate" style="font-size: 11px; padding: 6px;"><i class="fa-solid fa-arrows-up-down-left-right"></i> 移动</button>
            <button class="action-btn" id="btn-mode-rotate" style="font-size: 11px; padding: 6px;"><i class="fa-solid fa-rotate"></i> 旋转</button>
            <button class="action-btn" id="btn-mode-scale" style="font-size: 11px; padding: 6px;"><i class="fa-solid fa-maximize"></i> 缩放</button>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--panel-border); margin: 5px 0;">

        <div class="panel-title">导入 / 导出</div>
        <div style="display: grid; grid-template-columns: 1fr 1.1fr 0.9fr; gap: 8px;">
            <button class="action-btn" id="btn-import-obj" style="font-size: 11px; padding: 8px 4px;"><i class="fa-solid fa-file-import"></i> 导入</button>
            <button class="action-btn" id="btn-export-img" style="font-size: 11px; padding: 8px 4px;"><i class="fa-regular fa-image"></i> 截图</button>
            <button class="action-btn" id="btn-export-obj" style="font-size: 11px; padding: 8px 4px;"><i class="fa-solid fa-cube"></i> 导出</button>
        </div>
        <!-- 隐藏的文件选择器 -->
        <input type="file" id="obj-file-input" accept=".obj" style="display:none;">

        <hr style="border: 0; border-top: 1px solid var(--panel-border); margin: 5px 0;">

        <div class="panel-title">Actions / 操作</div>
        <button class="action-btn" id="btn-undo" title="快捷键: Ctrl + Z"><i class="fa-solid fa-rotate-left"></i> 撤销上一步 <span style="font-size:10px; color:var(--text-muted); font-family:monospace; margin-left:auto;">[Ctrl+Z]</span></button>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;">
            <button class="action-btn" id="btn-copy" style="font-size:12px;"><i class="fa-regular fa-copy"></i> 复制</button>
            <button class="action-btn" id="btn-paste" style="font-size:12px;"><i class="fa-regular fa-clipboard"></i> 粘贴</button>
        </div>
        <button class="action-btn danger" id="btn-delete-selected" title="快捷键: Delete 或 Backspace"><i class="fa-regular fa-trash-can"></i> 删除选中物体</button>
        <button class="action-btn danger" id="btn-clear"><i class="fa-regular fa-trash-can"></i> 清空画布</button>
    </div>

    <!-- 底部提示栏 -->
    <footer class="glass-panel">
        快捷键: V-视角 | M-移动(Shift多选) | B-画笔 | C-立方体 | S-球体 | Ctrl+Z-撤销  ||  操作: 左键绘制/操作，右键平移，滚轮缩放
    </footer>

    <!-- 用于手机端长按保存图片的精美遮罩层 -->
    <div id="mobile-img-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; flex-direction:column; align-items:center; justify-content:center; padding:20px;">
        <p style="color:#fff; font-size:14px; margin-bottom:15px; letter-spacing:1px;"><i class="fa-solid fa-fingerprint"></i> 长按下方图片，选择“保存到相册”</p>
        <img id="mobile-img-preview" style="max-width:90%; max-height:75%; border-radius:12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border:1px solid rgba(255,255,255,0.1);">
        <button onclick="document.getElementById('mobile-img-modal').style.display='none'" style="margin-top:20px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#fff; padding:10px 24px; border-radius:30px; font-size:13px;">关闭预览</button>
    </div>

    <script>
        // --- 全局变量与初始化 ---
        let scene, camera, renderer, controls, transformControls;
        let currentTool = 'view'; // view, move, brush, box, sphere
        let activeSubShape = 'box'; // 默认放置立方体
        let currentTheme = 'dark'; // dark, light
        let paintColor = '#6366f1';
        let brushSize = 0.5;
        let roughness = 0.2;
        let metalness = 0.5;

        // 用于移动工具的多选与伪容器组
        let selectedObjects = [];
        let selectionGroup = new THREE.Group();

        // 移动前的位置缓存，用于撤销系统
        let prevPositions = []; 

        // 辅助参考线网格
        let gridHelper;
        // 地平面材质
        let floorMat;

        // 用于画笔模式的虚拟绘制平面和射线检测
        let raycaster, mouse;
        let drawingPlane;
        let isDrawing = false;
        const objectsGroup = new THREE.Group(); 
        
        // 撤销历史记录：记录每次独立操作（生成物体、或移动物体）
        let actionHistory = [];
        let currentStrokeObjects = [];

        // 🎬 自定义动画系统核心变量 (Blender 关键帧机制)
        let isPlaying = false;
        let currentFrame = 0;

        function init() {
            // 1. 场景创建
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#08080a');
            scene.fog = new THREE.FogExp2('#08080a', 0.015);
            scene.add(objectsGroup);
            scene.add(selectionGroup);

            // 2. 相机设置
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(10, 12, 18);

            // 3. 渲染器设置
            renderer = new THREE.WebGLRenderer({ 
                antialias: true, 
                alpha: false, 
                powerPreference: "high-performance",
                preserveDrawingBuffer: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            container.appendChild(renderer.domElement);

            // 4. 轨道控制器
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 + 0.1;

            // 5. 变换控制器（移动物体工具）
            transformControls = new THREE.TransformControls(camera, renderer.domElement);
            transformControls.size = 0.8;
            
            transformControls.addEventListener('dragging-changed', function (event) {
                controls.enabled = !event.value;
                // 当用户手动用 K 轴手柄调整物体完毕后，如果处于非播放状态，自动覆盖当前帧的数据
                if(!event.value && !isPlaying) {
                    updateKeyframeData();
                }
            });
            
            transformControls.addEventListener('mouseDown', function () {
                prevPositions = selectedObjects.map(obj => ({
                    object: obj,
                    position: obj.position.clone()
                }));
            });
            
            transformControls.addEventListener('mouseUp', function () {
                if (prevPositions.length > 0) {
                    const moveHistoryItem = prevPositions.map(item => ({
                        type: 'move',
                        object: item.object,
                        from: item.position,
                        to: item.object.position.clone()
                    }));
                    actionHistory.push(moveHistoryItem);
                    prevPositions = [];
                }
            });
            scene.add(transformControls);

            // 6. 环境光与高质感多光源
            const ambientLight = new THREE.AmbientLight('#ffffff', 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight('#ffffff', 1.5);
            dirLight.position.set(20, 40, 20);
            dirLight.castShadow = true;
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            dirLight.shadow.bias = -0.0005;
            scene.add(dirLight);

            const pointLight1 = new THREE.PointLight('#4f46e5', 2, 50);
            pointLight1.position.set(-15, 10, -15);
            scene.add(pointLight1);

            // 7. 网格线与地平面
            gridHelper = new THREE.GridHelper(60, 60, '#6366f1', '#4b5563');
            gridHelper.position.y = 0.001; 
            gridHelper.material.opacity = 0.7;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            const floorGeo = new THREE.PlaneGeometry(120, 120);
            floorMat = new THREE.MeshStandardMaterial({ color: '#0a0a0d', roughness: 0.95, metalness: 0.0 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // 8. 射线检测与绘制辅助
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            
            const planeGeo = new THREE.PlaneGeometry(1000, 1000);
            planeGeo.rotateX(-Math.PI / 2);
            drawingPlane = new THREE.Mesh(planeGeo, new THREE.MeshBasicMaterial({ visible: false }));
            scene.add(drawingPlane);

            // 9. 事件监听
            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('pointerdown', onPointerDown);
            renderer.domElement.addEventListener('pointermove', onPointerMove);
            window.addEventListener('pointerup', onPointerUp);

            injectAnimationUI(); // 动态注入自定义时间轴UI
            setupUI();
            setupShortcuts(); 
        }

        // 🎬 核心：记录/录制关键帧数据
        function insertKeyframe() {
            if (selectedObjects.length === 0) {
                alert("请先用移动工具[M]选中一个物体，再插入关键帧。");
                return;
            }

            selectedObjects.forEach(obj => {
                if (!obj.userData.keyframes) {
                    obj.userData.keyframes = []; // 存放该物体所有自定义关键帧的数组
                }

                // 读取当前物体的空间姿态
                const currentStatus = {
                    frame: currentFrame,
                    position: obj.position.clone(),
                    quaternion: obj.quaternion.clone(),
                    scale: obj.scale.clone()
                };

                // 若该帧已存在数据则覆盖，否则推入新帧
                const existingIdx = obj.userData.keyframes.findIndex(kf => kf.frame === currentFrame);
                if (existingIdx !== -1) {
                    obj.userData.keyframes[existingIdx] = currentStatus;
                } else {
                    obj.userData.keyframes.push(currentStatus);
                }

                // 对帧序列从小到大排序，方便后续插值计算
                obj.userData.keyframes.sort((a, b) => a.frame - b.frame);
            });

            // 简单的关键帧成功反馈动画
            const btn = document.getElementById('btn-insert-key');
            btn.style.background = 'rgba(34, 197, 94, 0.3)';
            setTimeout(() => { btn.style.background = 'rgba(239, 68, 68, 0.15)'; }, 300);
        }

        // 用户用手柄拖动完后在当前帧无缝更新数据
        function updateKeyframeData() {
            selectedObjects.forEach(obj => {
                if (obj.userData.keyframes) {
                    const existingIdx = obj.userData.keyframes.findIndex(kf => kf.frame === currentFrame);
                    if (existingIdx !== -1) {
                        obj.userData.keyframes[existingIdx].position.copy(obj.position);
                        obj.userData.keyframes[existingIdx].quaternion.copy(obj.quaternion);
                        obj.userData.keyframes[existingIdx].scale.copy(obj.scale);
                    }
                }
            });
        }

        // 🎬 核心：根据当前时间帧，混合/插值计算物体应该在的姿态 (类似 Blender 线性插值与四元数球面插值)
        function applyKeyframeInterpolation(frame) {
            objectsGroup.children.forEach(obj => {
                if (!obj.isMesh || !obj.userData.keyframes || obj.userData.keyframes.length === 0) return;

                const kfs = obj.userData.keyframes;

                // 情况A：只有一帧，直接锁定在该帧姿态
                if (kfs.length === 1) {
                    obj.position.copy(kfs[0].position);
                    obj.quaternion.copy(kfs[0].quaternion);
                    obj.scale.copy(kfs[0].scale);
                    return;
                }

                // 情况B：当前帧正好小于或等于定义的第一个关键帧
                if (frame <= kfs[0].frame) {
                    obj.position.copy(kfs[0].position);
                    obj.quaternion.copy(kfs[0].quaternion);
                    obj.scale.copy(kfs[0].scale);
                    return;
                }

                // 情况C：当前帧大于或等于定义的最后一个关键帧
                if (frame >= kfs[kfs.length - 1].frame) {
                    obj.position.copy(kfs[kfs.length - 1].position);
                    obj.quaternion.copy(kfs[kfs.length - 1].quaternion);
                    obj.scale.copy(kfs[kfs.length - 1].scale);
                    return;
                }

                // 情况D：处于两个关键帧之间，进行线性与四元数插值补间
                for (let i = 0; i < kfs.length - 1; i++) {
                    const prevKf = kfs[i];
                    const nextKf = kfs[i + 1];

                    if (frame >= prevKf.frame && frame <= nextKf.frame) {
                        // 计算插值比率百分比 alpha (0.0 ~ 1.0)
                        const totalFramesBetween = nextKf.frame - prevKf.frame;
                        const elapsedFrames = frame - prevKf.frame;
                        const alpha = elapsedFrames / totalFramesBetween;

                        // 1. 位置线性插值 (lerp)
                        obj.position.lerpVectors(prevKf.position, nextKf.position, alpha);

                        // 2. 旋转球面正交插值 (slerp)
                        THREE.Quaternion.slerp(prevKf.quaternion, nextKf.quaternion, obj.quaternion, alpha);

                        // 3. 缩放线性插值
                        obj.scale.lerpVectors(prevKf.scale, nextKf.scale, alpha);
                        break;
                    }
                }
            });
        }

        // --- 主题切换 ---
        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.className = currentTheme;
            const themeIcon = document.getElementById('theme-icon');
            const bgColor = currentTheme === 'dark' ? '#08080a' : '#f8fafc';
            const fogColor = currentTheme === 'dark' ? '#08080a' : '#f8fafc';
            const floorColor = currentTheme === 'dark' ? '#0a0a0d' : '#f1f5f9';

            scene.background.set(bgColor);
            scene.fog.color.set(fogColor);
            floorMat.color.set(floorColor);

            scene.remove(gridHelper);
            const gridColor1 = currentTheme === 'dark' ? '#6366f1' : '#4f46e5';
            const gridColor2 = currentTheme === 'dark' ? '#4b5563' : '#94a3b8';
            gridHelper = new THREE.GridHelper(60, 60, gridColor1, gridColor2);
            gridHelper.position.y = 0.001; 
            gridHelper.material.opacity = currentTheme === 'dark' ? 0.7 : 0.8;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            if (currentTheme === 'dark') {
                themeIcon.className = "fa-regular fa-moon";
            } else {
                themeIcon.className = "fa-regular fa-sun";
            }
        }

        function clearSelection() {
            transformControls.detach();
            if (selectionGroup.children.length > 0) {
                const tempArray = [...selectionGroup.children];
                tempArray.forEach(obj => { objectsGroup.attach(obj); });
            }
            selectedObjects.forEach(obj => {
                if (obj.material && obj.material.emissive) obj.material.emissive.setHex(0x000000);
            });
            selectedObjects = [];
            selectionGroup.position.set(0, 0, 0);
            selectionGroup.rotation.set(0, 0, 0);
            selectionGroup.scale.set(1, 1, 1);
            selectionGroup.updateMatrixWorld(true);
        }

        function handleObjectSelection(clickedObj, isMultiSelect) {
            if (!isMultiSelect && !selectedObjects.includes(clickedObj)) clearSelection();

            if (selectedObjects.includes(clickedObj)) {
                if (isMultiSelect) {
                    if (selectionGroup.children.includes(clickedObj)) {
                        selectionGroup.remove(clickedObj);
                        objectsGroup.add(clickedObj);
                    }
                    if (clickedObj.material && clickedObj.material.emissive) clickedObj.material.emissive.setHex(0x000000);
                    selectedObjects = selectedObjects.filter(item => item !== clickedObj);
                }
            } else {
                selectedObjects.push(clickedObj);
                if (clickedObj.material && clickedObj.material.emissive) clickedObj.material.emissive.setHex(0x222244);
            }

            if (selectedObjects.length === 1) {
                if (selectionGroup.children.length > 0) {
                    const temp = [...selectionGroup.children];
                    temp.forEach(o => { selectionGroup.remove(o); objectsGroup.add(o); });
                }
                transformControls.attach(selectedObjects[0]);
            } else if (selectedObjects.length > 1) {
                transformControls.detach();
                selectionGroup.position.set(0, 0, 0); selectionGroup.rotation.set(0, 0, 0); selectionGroup.scale.set(1, 1, 1);
                selectionGroup.updateMatrixWorld(true);

                const box = new THREE.Box3();
                selectedObjects.forEach(obj => box.expandByObject(obj));
                const center = new THREE.Vector3();
                box.getCenter(center);

                selectionGroup.position.copy(center);
                selectionGroup.updateMatrixWorld(true);
                selectedObjects.forEach(obj => selectionGroup.attach(obj));
                transformControls.attach(selectionGroup);
            } else {
                transformControls.detach();
            }
        }

        function exportImage() {
            const wasAttach = transformControls.object;
            if (wasAttach) transformControls.detach();
            selectedObjects.forEach(obj => { if (obj.material && obj.material.emissive) obj.material.emissive.setHex(0x000000); });
            renderer.render(scene, camera);
            const dataURL = renderer.domElement.toDataURL('image/png');
            if (wasAttach) transformControls.attach(wasAttach);
            selectedObjects.forEach(obj => { if (obj.material && obj.material.emissive) obj.material.emissive.setHex(0x222244); });

            if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                document.getElementById('mobile-img-preview').src = dataURL;
                document.getElementById('mobile-img-modal').style.display = 'flex';
            } else {
                const link = document.createElement('a');
                link.download = `Aura3D_Studio_${Date.now()}.png`;
                link.href = dataURL; link.click();
            }
        }

        function exportOBJ() {
            if (objectsGroup.children.length === 0 && selectionGroup.children.length === 0) {
                alert("场景中没有任何物体可以导出。"); return;
            }
            let objText = "# Aura3D Studio Exported Model\n";
            let vertexOffset = 1;
            const allMeshes = [];
            objectsGroup.traverse(child => { if (child.isMesh) allMeshes.push(child); });
            selectionGroup.traverse(child => { if (child.isMesh) allMeshes.push(child); });

            allMeshes.forEach(mesh => {
                const geometry = mesh.geometry;
                const position = geometry.attributes.position;
                if (!position) return;
                objText += `g Object_${mesh.id}\n`;
                const tempV = new THREE.Vector3();
                mesh.updateMatrixWorld(true);
                for (let i = 0; i < position.count; i++) {
                    tempV.fromBufferAttribute(position, i);
                    tempV.applyMatrix4(mesh.matrixWorld);
                    objText += `v ${tempV.x.toFixed(4)} ${tempV.y.toFixed(4)} ${tempV.z.toFixed(4)}\n`;
                }
                const index = geometry.index;
                if (index) {
                    for (let i = 0; i < index.count; i += 3) {
                        objText += `f ${index.getX(i) + vertexOffset} ${index.getX(i+1) + vertexOffset} ${index.getX(i+2) + vertexOffset}\n`;
                    }
                } else {
                    for (let i = 0; i < position.count; i += 3) {
                        objText += `f ${i + vertexOffset} ${i + 1 + vertexOffset} ${i + 2 + vertexOffset}\n`;
                    }
                }
                vertexOffset += position.count;
            });
            const blob = new Blob([objText], { type: 'text/plain' });
            const link = document.createElement('a');
            link.download = `Aura3D_Model_${Date.now()}.obj`;
            link.href = URL.createObjectURL(blob);
            link.target = '_blank'; link.click();
        }

        function switchTool(toolId, isSubmenuClick = false) {
            const submenu = document.getElementById('shape-submenu');
            if (toolId === 'shape' && currentTool === 'shape' && !isSubmenuClick) {
                if (submenu.style.display === 'flex') {
                    submenu.style.display = 'none'; switchTool('view'); return;
                }
            }
            const tools = ['view', 'move', 'brush', 'shape'];
            if (!tools.includes(toolId)) return;

            tools.forEach(t => document.getElementById(`tool-${t}`).classList.remove('active'));
            document.getElementById(`tool-${toolId}`).classList.add('active');
            currentTool = toolId;
            controls.enabled = (currentTool === 'view');

            if (currentTool === 'shape') {
                submenu.style.display = 'flex';
                const shapeBtn = document.getElementById('tool-shape');
                const rect = shapeBtn.getBoundingClientRect();
                if (window.innerWidth <= 768) {
                    submenu.style.flexDirection = 'column-reverse'; submenu.style.left = (rect.left + rect.width / 2) + 'px'; submenu.style.top = (rect.top - 12) + 'px'; submenu.style.transform = 'translateY(-100%) translateX(-50%)';
                } else {
                    submenu.style.flexDirection = 'row'; submenu.style.left = (rect.right + 12) + 'px'; submenu.style.top = (rect.top + rect.height / 2) + 'px'; submenu.style.transform = 'translateY(-50%)'; 
                }
            } else { submenu.style.display = 'none'; }
            if (currentTool !== 'move') clearSelection();
        }

        function clearCanvas() {
            clearSelection();
            while(objectsGroup.children.length > 0) objectsGroup.remove(objectsGroup.children[0]);
            actionHistory = []; currentStrokeObjects = [];
        }

        function deleteSelectedObjects() {
            if (selectedObjects.length === 0) return;
            const deletedGroup = [...selectedObjects];
            transformControls.detach();
            deletedGroup.forEach(obj => {
                if (selectionGroup.children.includes(obj)) selectionGroup.remove(obj);
                else if (objectsGroup.children.includes(obj)) objectsGroup.remove(obj);
                if (obj.material && obj.material.emissive) obj.material.emissive.setHex(0x000000);
            });
            actionHistory.push(deletedGroup);
            selectedObjects = [];
            selectionGroup.position.set(0,0,0); selectionGroup.rotation.set(0,0,0); selectionGroup.scale.set(1,1,1);
            selectionGroup.updateMatrixWorld(true);
        }

        let copiedObjectsData = [];
        function copySelectedObjects() {
            if (selectedObjects.length === 0) return;
            copiedObjectsData = [];
            selectedObjects.forEach(obj => {
                if (!obj.isMesh) return;
                const worldPos = new THREE.Vector3(); const worldRot = new THREE.Quaternion(); const worldScale = new THREE.Vector3();
                obj.getWorldPosition(worldPos); obj.getWorldQuaternion(worldRot); obj.getWorldScale(worldScale);
                copiedObjectsData.push({
                    geometry: obj.geometry.clone(), color: obj.material.color.getHex(),
                    roughness: obj.material.roughness, metalness: obj.material.metalness,
                    position: worldPos, quaternion: worldRot, scale: worldScale,
                    keyframes: obj.userData.keyframes ? JSON.parse(JSON.stringify(obj.userData.keyframes)) : null
                });
            });
        }

        function pasteObjects() {
            if (copiedObjectsData.length === 0) return;
            clearSelection();
            const pastedGroup = [];
            copiedObjectsData.forEach(data => {
                const material = new THREE.MeshStandardMaterial({ color: new THREE.Color(data.color), roughness: data.roughness, metalness: data.metalness });
                const mesh = new THREE.Mesh(data.geometry, material);
                mesh.position.copy(data.position).add(new THREE.Vector3(1.5, 0, 1.5));
                mesh.quaternion.copy(data.quaternion); mesh.scale.copy(data.scale);
                mesh.castShadow = true; mesh.receiveShadow = true;
                
                if (data.keyframes) {
                    mesh.userData.keyframes = data.keyframes.map(kf => ({
                        frame: kf.frame,
                        position: new THREE.Vector3(kf.position.x + 1.5, kf.position.y, kf.position.z + 1.5),
                        quaternion: new THREE.Quaternion(kf.quaternion._x, kf.quaternion._y, kf.quaternion._z, kf.quaternion._w),
                        scale: new THREE.Vector3(kf.scale.x, kf.scale.y, kf.scale.z)
                    }));
                }

                objectsGroup.add(mesh); pastedGroup.push(mesh);
                if (mesh.material && mesh.material.emissive) mesh.material.emissive.setHex(0x222244);
                selectedObjects.push(mesh);
            });
            actionHistory.push(pastedGroup);
            switchTool('move');
            if (selectedObjects.length === 1) transformControls.attach(selectedObjects[0]);
        }

        function undoAction() {
            if (actionHistory.length > 0) {
                clearSelection();
                const lastAction = actionHistory.pop();
                if (Array.isArray(lastAction) && lastAction[0] && lastAction[0].type === 'move') {
                    lastAction.forEach(item => { item.object.position.copy(item.from); });
                } else {
                    lastAction.forEach(obj => { objectsGroup.remove(obj); });
                }
            }
        }

        function setupUI() {
            const tools = ['view', 'move', 'brush', 'shape'];
            tools.forEach(tool => { document.getElementById(`tool-${tool}`).addEventListener('click', () => { switchTool(tool); }); });

            const subShapes = ['box', 'sphere', 'cone', 'cylinder', 'torus'];
            subShapes.forEach(shape => {
                const btn = document.getElementById(`sub-shape-${shape}`);
                if (shape === activeSubShape) btn.classList.add('active');
                btn.addEventListener('click', (e) => {
                    e.stopPropagation(); 
                    subShapes.forEach(s => document.getElementById(`sub-shape-${s}`).classList.remove('active'));
                    btn.classList.add('active'); activeSubShape = shape; switchTool('shape', true);
                });
            });

            document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
            document.getElementById('btn-export-img').addEventListener('click', exportImage);
            document.getElementById('btn-export-obj').addEventListener('click', exportOBJ);

            const fileInput = document.getElementById('obj-file-input');
            document.getElementById('btn-import-obj').addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', handleOBJImport);

            document.getElementById('btn-mode-translate').addEventListener('click', () => { if (currentTool === 'move') transformControls.setMode('translate'); });
            document.getElementById('btn-mode-rotate').addEventListener('click', () => { if (currentTool === 'move') transformControls.setMode('rotate'); });
            document.getElementById('btn-mode-scale').addEventListener('click', () => { if (currentTool === 'move') transformControls.setMode('scale'); });

            document.getElementById('btn-delete-selected').addEventListener('click', deleteSelectedObjects);
            document.getElementById('btn-undo').addEventListener('click', undoAction);
            document.getElementById('btn-clear').addEventListener('click', clearCanvas);
            document.getElementById('btn-copy').addEventListener('click', copySelectedObjects);
            document.getElementById('btn-paste').addEventListener('click', pasteObjects);

            const colorPicker = document.getElementById('block-color');
            colorPicker.addEventListener('input', (e) => {
                paintColor = e.target.value; document.getElementById('color-hex').innerText = paintColor.toUpperCase();
                selectedObjects.forEach(obj => { if (obj.material) obj.material.color.set(paintColor); });
            });

            const sizeSlider = document.getElementById('block-size');
            sizeSlider.addEventListener('input', (e) => { brushSize = parseFloat(e.target.value); document.getElementById('size-val').innerText = brushSize; });
            document.getElementById('mat-roughness').addEventListener('input', (e) => { roughness = parseFloat(e.target.value); selectedObjects.forEach(obj => { if(obj.material) obj.material.roughness = roughness; }); });
            document.getElementById('mat-metalness').addEventListener('input', (e) => { metalness = parseFloat(e.target.value); selectedObjects.forEach(obj => { if(obj.material) obj.material.metalness = metalness; }); });

            document.getElementById('panel-toggle').addEventListener('click', () => {
                const panel = document.getElementById('properties-panel'); const toggle = document.getElementById('panel-toggle');
                panel.classList.toggle('collapsed'); toggle.classList.toggle('collapsed');
            });

            // 🎬 绑定时间轴UI节点触发动作
            document.getElementById('btn-insert-key').addEventListener('click', insertKeyframe);
            
            const playToggle = document.getElementById('btn-play-toggle');
            playToggle.addEventListener('click', () => {
                isPlaying = !isPlaying;
                playToggle.innerHTML = isPlaying ? '<i class="fa-solid fa-pause"></i>' : '<i class="fa-solid fa-play"></i>';
                if(isPlaying) animationClock.getDelta(); // 重置时间步长
            });

            frameTimeline.addEventListener('input', (e) => {
                currentFrame = parseInt(e.target.value);
                document.getElementById('lbl-current-frame').innerText = currentFrame;
                applyKeyframeInterpolation(currentFrame); // 拖动滑块时即时更新物体状态
            });
        }

        function handleOBJImport(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function (evt) {
                const text = evt.target.result;
                try {
                    const lines = text.split('\n'); const vertices = []; const indices = [];
                    for (let i = 0; i < lines.length; i++) {
                        const line = lines[i].trim();
                        if (line.startsWith('v ')) {
                            const parts = line.split(/\s+/).slice(1).map(Number); vertices.push(new THREE.Vector3(parts[0], parts[1], parts[2]));
                        } else if (line.startsWith('f ')) {
                            const parts = line.split(/\s+/).slice(1).map(p => parseInt(p.split('/')[0]) - 1);
                            for (let j = 1; j < parts.length - 1; j++) indices.push(parts[0], parts[j], parts[j+1]);
                        }
                    }
                    if (vertices.length === 0) { alert("未在文件中解析出合法的3D顶点数据。"); return; }
                    const geometry = new THREE.BufferGeometry(); const finalPositions = [];
                    indices.forEach(idx => { const v = vertices[idx]; if (v) finalPositions.push(v.x, v.y, v.z); });
                    geometry.setAttribute('position', new THREE.Float32BufferAttribute(finalPositions, 3)); geometry.computeVertexNormals();

                    const material = new THREE.MeshStandardMaterial({ color: new THREE.Color(paintColor), roughness: roughness, metalness: metalness });
                    const mesh = new THREE.Mesh(geometry, material); mesh.castShadow = true; mesh.receiveShadow = true;
                    geometry.computeBoundingBox(); const center = new THREE.Vector3(); geometry.boundingBox.getCenter(center);
                    mesh.position.sub(center); mesh.position.y += 1;

                    objectsGroup.add(mesh); actionHistory.push([mesh]); 
                    switchTool('move'); handleObjectSelection(mesh, false);
                    alert("模型导入成功！");
                } catch (error) { alert("OBJ 模型解析失败。"); }
            };
            reader.readAsText(file); e.target.value = '';
        }

        function setupShortcuts() {
            window.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') { e.preventDefault(); undoAction(); return; }
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'c') { e.preventDefault(); copySelectedObjects(); return; }
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'v') { e.preventDefault(); pasteObjects(); return; }

                const key = e.key.toLowerCase();
                
                // 🎬 快捷键 [I] 对应 Blender 插入关键帧
                if (key === 'i') {
                    e.preventDefault();
                    insertKeyframe();
                    return;
                }
                // 空格键控制播放/暂停
                if (e.code === 'Space') {
                    e.preventDefault();
                    document.getElementById('btn-play-toggle').click();
                    return;
                }

                if (currentTool === 'move' && selectedObjects.length > 0) {
                    if (key === 'w') transformControls.setMode('translate');
                    else if (key === 'e') transformControls.setMode('rotate');
                    else if (key === 'r') transformControls.setMode('scale');
                }

                if (key === 'v') switchTool('view');
                else if (key === 'm') switchTool('move');
                else if (key === 'b') switchTool('brush');
                else if (key === 's') switchTool('shape');
                else if (key === 'delete' || key === 'backspace') deleteSelectedObjects();
            });
        }

        function getIntersectionPoint(e) {
            let clientX = e.clientX, clientY = e.clientY;
            if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
            mouse.x = (clientX / window.innerWidth) * 2 - 1; mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            if (currentTool === 'shape' && objectsGroup.children.length > 0) {
                const intersectsObjects = raycaster.intersectObjects(objectsGroup.children);
                if(intersectsObjects.length > 0) return intersectsObjects[0].point.add(intersectsObjects[0].face.normal.clone().multiplyScalar(brushSize/2));
            }
            const intersectsPlane = raycaster.intersectObject(drawingPlane);
            if (intersectsPlane.length > 0) return intersectsPlane[0].point;
            return null;
        }

        function createInstance(point, type) {
            let geometry; const shapeType = (type === 'brush') ? 'brush' : activeSubShape;
            if (shapeType === 'box' || shapeType === 'brush') geometry = new THREE.BoxGeometry(brushSize, brushSize, brushSize);
            else if (shapeType === 'sphere') geometry = new THREE.SphereGeometry(brushSize / 2, 32, 32);
            else if (shapeType === 'cone') geometry = new THREE.ConeGeometry(brushSize / 2, brushSize, 32);
            else if (shapeType === 'cylinder') geometry = new THREE.CylinderGeometry(brushSize / 2, brushSize / 2, brushSize, 32);
            else if (shapeType === 'torus') geometry = new THREE.TorusGeometry(brushSize / 2.5, brushSize / 8, 16, 100);

            const material = new THREE.MeshStandardMaterial({ color: new THREE.Color(paintColor), roughness: roughness, metalness: metalness });
            const mesh = new THREE.Mesh(geometry, material); mesh.position.copy(point);
            if (type !== 'brush' && (shapeType === 'box' || shapeType === 'cylinder' || shapeType === 'cone')) mesh.position.y = Math.max(mesh.position.y, brushSize / 2);

            mesh.castShadow = true; mesh.receiveShadow = true;
            mesh.scale.set(1, 1, 1);
            objectsGroup.add(mesh); currentStrokeObjects.push(mesh);
        }

        function onPointerDown(e) {
            if (currentTool === 'move') {
                if (transformControls.dragging) return;
                let clientX = e.clientX, clientY = e.clientY;
                if (e.touches && e.touches.length > 0) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
                mouse.x = (clientX / window.innerWidth) * 2 - 1; mouse.y = -(clientY / window.innerHeight) * 2 + 1;
                raycaster.setFromCamera(mouse, camera);
                const intersects = raycaster.intersectObjects(objectsGroup.children, true);
                if (intersects.length > 0) {
                    const isTouch = (e.pointerType === 'touch' || e.touches);
                    handleObjectSelection(intersects[0].object, isTouch ? true : e.shiftKey);
                } else {
                    if (e.pointerType === 'touch' || !e.shiftKey) clearSelection();
                }
                return;
            }
            if (currentTool === 'view') return;
            const point = getIntersectionPoint(e); if (!point) return;
            isDrawing = true; currentStrokeObjects = []; createInstance(point, currentTool);
        }

        function onPointerMove(e) {
            if (!isDrawing || currentTool === 'view' || currentTool === 'move') return;
            const point = getIntersectionPoint(e); if (!point) return;
            if (currentTool === 'brush') {
                const lastObj = currentStrokeObjects[currentStrokeObjects.length - 1];
                if (lastObj && lastObj.position.distanceTo(point) > brushSize * 0.3) createInstance(point, 'brush');
                else if (!lastObj) createInstance(point, 'brush');
            }
        }

        function onPointerUp() { if (isDrawing && currentStrokeObjects.length > 0) actionHistory.push(currentStrokeObjects); isDrawing = false; }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
            if (currentTool === 'shape') {
                const submenu = document.getElementById('shape-submenu'); const shapeBtn = document.getElementById('tool-shape'); const rect = shapeBtn.getBoundingClientRect();
                if (window.innerWidth <= 768) {
                    submenu.style.flexDirection = 'column-reverse'; submenu.style.left = (rect.left + rect.width / 2) + 'px'; submenu.style.top = (rect.top - 12) + 'px'; submenu.style.transform = 'translateY(-100%) translateX(-50%)';
                } else {
                    submenu.style.flexDirection = 'row'; submenu.style.left = (rect.right + 12) + 'px'; submenu.style.top = (rect.top + rect.height / 2) + 'px'; submenu.style.transform = 'translateY(-50%)';
                }
            }
        }

        // 🎬 核心更新：时间轴播放驱动与多关键帧插值应用
        let frameAccumulator = 0;
        function animate() {
            requestAnimationFrame(animate);
            if (currentTool === 'view') controls.update();

            if (isPlaying) {
                const delta = animationClock.getDelta();
                frameAccumulator += delta * 24; // 以 24 帧/秒 (FPS) 速率递增时间轴

                if (frameAccumulator >= 1) {
                    const framesToAdvance = Math.floor(frameAccumulator);
                    currentFrame = (currentFrame + framesToAdvance) % (maxFrames + 1);
                    frameAccumulator -= framesToAdvance;

                    // 同步更新时间轴 UI 滑块数值
                    frameTimeline.value = currentFrame;
                    document.getElementById('lbl-current-frame').innerText = currentFrame;

                    // 计算并更新场景中所有物体在该帧下的姿态
                    applyKeyframeInterpolation(currentFrame);
                }
            }

            renderer.render(scene, camera);
        }
    </script>
