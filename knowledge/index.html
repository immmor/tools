<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>高定极简莫兰迪 - 3D 知识网球</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%; overflow: hidden;
            background: radial-gradient(circle at 50% 50%, #1a1c24 0%, #0d0e12 100%);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", sans-serif;
            user-select: none;
        }

        /* 极简高级标题 */
        .ui-header {
            position: absolute; top: 30px; left: 30px; z-index: 10; pointer-events: none;
        }
        .ui-header h1 {
            font-size: 1.1rem; font-weight: 300; letter-spacing: 4px; color: #f1f5f9; text-transform: uppercase;
        }
        .ui-header p {
            font-size: 0.75rem; color: #64748b; margin-top: 6px; letter-spacing: 1px;
        }

        /* 悬浮交互提示 */
        .ui-controls-hint {
            position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 10;
            padding: 10px 24px; background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(241, 245, 249, 0.7); font-size: 12px; letter-spacing: 2px; white-space: nowrap; pointer-events: none;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        /* 莫兰迪极简知识卡片 */
        #tooltip {
            position: absolute; z-index: 20; padding: 18px 22px;
            background: rgba(22, 25, 35, 0.75); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 16px;
            color: #f8fafc; pointer-events: none; opacity: 0;
            transform: translate(-50%, -120%) scale(0.95);
            transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1), transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            max-width: 290px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        #tooltip.active { opacity: 1; transform: translate(-50%, -120%) scale(1); }
        #tooltip .tag {
            display: inline-block; font-size: 0.7rem; padding: 3px 8px;
            background: rgba(255, 255, 255, 0.08); color: #cbd5e1; border-radius: 6px; margin-bottom: 10px; font-weight: 500;
        }
        #tooltip .title { font-size: 1.1rem; font-weight: 500; color: #ffffff; margin-bottom: 6px; letter-spacing: 0.5px; }
        #tooltip .desc { font-size: 0.8rem; color: #94a3b8; line-height: 1.6; }

        canvas { display: block; width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div class="ui-header">
        <h1>KNOWLEDGE ATLAS</h1>
        <p>莫兰迪 3D 艺术交互图谱</p>
    </div>

    <div class="ui-controls-hint">
        拖拽旋转 • 缩放视图 • 点击节点查看知识
    </div>

    <div id="tooltip">
        <div class="tag" id="tt-cat">分类</div>
        <div class="title" id="tt-title">知识点</div>
        <div class="desc" id="tt-desc">描述...</div>
    </div>

    <!-- ES Module 配置 -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 真实知识图谱数据
        const rawKnowledgeData = [
            { label: "深度学习", cat: "人工智能", desc: "基于多层人工神经网络进行特征学习与模式识别的算法架构。" },
            { label: "Transformer", cat: "人工智能", desc: "基于自注意力机制的神经网络架构，大语言模型的核心基石。" },
            { label: "强化学习", cat: "人工智能", desc: "智能体通过与环境交互试错、以最大化累积奖励为目标的学习范式。" },
            { label: "卷积神经网络", cat: "人工智能", desc: "常用于图像处理与计算机视觉的深度前馈神经网络。" },
            { label: "大语言模型", cat: "人工智能", desc: "具备海量参数与涌现能力的超大规模文本生成预训练模型。" },
            { label: "分布式系统", cat: "计算机", desc: "多台独立计算机通过网络协作完成统一任务的软件组件集合。" },
            { label: "共识算法", cat: "计算机", desc: "确保分布式节点对某项数据或状态达成一致的决策机制。" },
            { label: "图论", cat: "计算机", desc: "研究由顶点和边构成的图结构及其性质的数学分支。" },
            { label: "量子纠缠", cat: "物理学", desc: "多粒子系统在微观尺度下产生的非局域关联物理现象。" },
            { label: "广义相对论", cat: "物理学", desc: "将引力解释为时空弯曲几何效应的经典引力理论。" },
            { label: "CRISPR 基因编辑", cat: "生物学", desc: "源自细菌免疫系统、能对基因组实施精确定点修饰的分子生物技术。" },
            { label: "合成生物学", cat: "生物学", desc: "利用工程学思维设计并合成人工生物元件、途径或生命系统。" },
            { label: "认识论", cat: "哲学", desc: "探讨知识的本质、来源、边界与有效性的哲学分支。" },
            { label: "纳什均衡", cat: "博弈论", desc: "非合作博弈中，任意参与方在他人策略不变时均无法单方面获益的稳定状态。" },
            { label: "行为经济学", cat: "经济学", desc: "结合心理学观察，研究人类非理性决策对市场影响的理论体系。" },
            { label: "复杂系统", cat: "系统科学", desc: "由大量相互作用的组分构成、展现出非线性与涌现特性的系统。" }
        ];

        // 柔和高雅莫兰迪配色 (Morandi Palette)
        const catColors = {
            "人工智能": 0x93b5cf, // 雾霾蓝
            "计算机": 0x8192a6, // 鼠尾草灰
            "物理学": 0xaf9f8e, // 暖砂灰
            "生物学": 0x8fa382, // 橄榄青
            "哲学": 0xcbb7a2, // 燕麦色
            "博弈论": 0xbd7c78, // 豆沙干玫瑰
            "经济学": 0xd9a08b, // 陶土粉
            "系统科学": 0x9f91a6  // 香芋灰
        };

        let scene, camera, renderer, controls, raycaster;
        let sphereGroup, nodesGroup, linesGroup;
        let hoveredNode = null;
        let mouse = new THREE.Vector2();

        const nodesData = [];
        const TOTAL_NODES = 260; // 稍稍减少密度，增加留白与呼吸感
        const SPHERE_RADIUS = 55;

        init();
        animate();

        function init() {
            scene = new THREE.Scene();

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 10, 160);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping; // 电影级色调映射
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.04;
            controls.rotateSpeed = 0.4;
            controls.autoRotate = true;
            controls.autoRotateSpeed = 0.15;
            controls.enableZoom = true;
            controls.minDistance = 50;
            controls.maxDistance = 280;

            sphereGroup = new THREE.Group();
            nodesGroup = new THREE.Group();
            linesGroup = new THREE.Group();
            sphereGroup.add(nodesGroup);
            sphereGroup.add(linesGroup);
            scene.add(sphereGroup);

            raycaster = new THREE.Raycaster();

            buildNodesData();
            createNodes();
            createLines();

            // 艺术级柔光灯光（柔和三点式打光）
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.9);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0xffeedd, 1.2);
            dirLight1.position.set(100, 100, 100);
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0x88bbff, 0.6);
            dirLight2.position.set(-100, -100, -100);
            scene.add(dirLight2);

            window.addEventListener('resize', onWindowResize);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('click', onClick);
        }

        function buildNodesData() {
            rawKnowledgeData.forEach((item, index) => {
                nodesData.push({
                    ...item,
                    id: index,
                    isMain: true,
                    color: catColors[item.cat] || 0x93b5cf
                });
            });

            for (let i = nodesData.length; i < TOTAL_NODES; i++) {
                const parent = nodesData[i % rawKnowledgeData.length];
                nodesData.push({
                    id: i,
                    label: `${parent.label} 支脉 #${i - rawKnowledgeData.length + 1}`,
                    cat: parent.cat,
                    desc: `属于 [${parent.cat}] 领域，与 [${parent.label}] 深度相关的衍生概念。`,
                    isMain: false,
                    color: parent.color,
                    parentId: parent.id
                });
            }

            // 斐波那契分布
            for (let i = 0; i < nodesData.length; i++) {
                const y = 1 - (i / (nodesData.length - 1)) * 2;
                const radiusAtY = Math.sqrt(1 - y * y);
                const theta = Math.PI * (3 - Math.sqrt(5)) * i;

                nodesData[i].position = new THREE.Vector3(
                    Math.cos(theta) * radiusAtY * SPHERE_RADIUS,
                    y * SPHERE_RADIUS,
                    Math.sin(theta) * radiusAtY * SPHERE_RADIUS
                );
            }
        }

        // 节点：具有流光质感与高级玉石感/玻璃感的 3D 几何体
        function createNodes() {
            const mainGeometry = new THREE.IcosahedronGeometry(1.6, 2); // 20面体细分，更有时尚几何感
            const leafGeometry = new THREE.SphereGeometry(0.5, 16, 16);

            nodesData.forEach(data => {
                // Physical 材质赋予节点玻璃与玉石光泽
                const material = new THREE.MeshPhysicalMaterial({
                    color: data.color,
                    roughness: 0.2, // 光滑度
                    metalness: 0.1,
                    clearcoat: 0.8, // 表面清漆层
                    clearcoatRoughness: 0.1,
                    transparent: true,
                    opacity: data.isMain ? 0.95 : 0.65
                });

                const mesh = new THREE.Mesh(data.isMain ? mainGeometry : leafGeometry, material);
                mesh.position.copy(data.position);
                mesh.userData = data;
                nodesGroup.add(mesh);
            });
        }

        // 连线：极其柔和的高级灰半透明微细连线
        function createLines() {
            const points = [];
            const lineColors = [];

            for (let i = 0; i < nodesData.length; i++) {
                for (let j = i + 1; j < nodesData.length; j++) {
                    const nodeA = nodesData[i];
                    const nodeB = nodesData[j];
                    const dist = nodeA.position.distanceTo(nodeB.position);

                    let shouldConnect = false;

                    if (nodeA.isMain && nodeB.isMain && nodeA.cat === nodeB.cat && dist < 65) {
                        shouldConnect = true;
                    } else if (!nodeA.isMain && nodeB.id === nodeA.parentId) {
                        shouldConnect = true;
                    } else if (nodeA.cat === nodeB.cat && dist < 20) {
                        shouldConnect = true;
                    }

                    if (shouldConnect) {
                        points.push(nodeA.position);
                        points.push(nodeB.position);

                        const colorA = new THREE.Color(nodeA.color);
                        const colorB = new THREE.Color(nodeB.color);

                        lineColors.push(colorA.r, colorA.g, colorA.b);
                        lineColors.push(colorB.r, colorB.g, colorB.b);
                    }
                }
            }

            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            geometry.setAttribute('color', new THREE.Float32BufferAttribute(lineColors, 3));

            const material = new THREE.LineBasicMaterial({
                vertexColors: true,
                transparent: true,
                opacity: 0.22, // 保持低调典雅
                linewidth: 1
            });

            const lines = new THREE.LineSegments(geometry, material);
            linesGroup.add(lines);
        }

        function onMouseMove(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            checkInteraction(false);
        }

        function onClick(event) {
            checkInteraction(true);
        }

        const tooltip = document.getElementById('tooltip');
        const ttCat = document.getElementById('tt-cat');
        const ttTitle = document.getElementById('tt-title');
        const ttDesc = document.getElementById('tt-desc');

        function checkInteraction(isClick) {
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(nodesGroup.children);

            if (intersects.length > 0) {
                const nodeMesh = intersects[0].object;
                const data = nodeMesh.userData;

                if (hoveredNode !== nodeMesh) {
                    if (hoveredNode) {
                        hoveredNode.scale.set(1, 1, 1);
                        hoveredNode.material.opacity = hoveredNode.userData.isMain ? 0.95 : 0.65;
                    }

                    hoveredNode = nodeMesh;
                    // 平滑呼吸放大
                    hoveredNode.scale.set(2.2, 2.2, 2.2);
                    hoveredNode.material.opacity = 1;

                    ttCat.innerText = data.cat;
                    ttCat.style.color = `#${data.color.toString(16).padStart(6, '0')}`;
                    ttTitle.innerText = data.label;
                    ttDesc.innerText = data.desc;
                }

                const vector = nodeMesh.position.clone();
                vector.project(camera);
                const x = (vector.x + 1) / 2 * window.innerWidth;
                const y = (-vector.y + 1) / 2 * window.innerHeight;

                tooltip.style.left = x + 'px';
                tooltip.style.top = y + 'px';
                tooltip.classList.add('active');

                if(data.isMain && isClick) {
                    controls.autoRotate = false;
                }

            } else {
                if (hoveredNode) {
                    hoveredNode.scale.set(1, 1, 1);
                    hoveredNode.material.opacity = hoveredNode.userData.isMain ? 0.95 : 0.65;
                    hoveredNode = null;
                }
                tooltip.classList.remove('active');
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            const time = Date.now() * 0.0004;
            sphereGroup.position.y = Math.sin(time) * 1.5; // 高雅微幅浮动
            nodesGroup.rotation.y += 0.0001;
            linesGroup.rotation.y += 0.0001;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
