<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>司天监 · 星轨御演玄谱</title>
    <style>
        /* --- 盛唐重彩与星空玄学配色 --- */
        :root {
            --cosmic-bg: #0F1319;   /* 深邃星夜暗底 */
            --mural-gold: #D4AF37;  /* 敦煌流金 */
            --mural-blue: #1C3D5A;  /* 壁画石青 */
            --mural-red: #A93838;   /* 宫墙朱砂 */
            --mural-green: #2E5C4E; /* 古法翡翠 */
            --star-white: #E6EBED;  /* 月华星芒 */
        }

        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--cosmic-bg);
            color: var(--star-white);
            font-family: 'Noto Serif SC', serif;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 模拟神秘星宿与罗盘背景 */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.03) 0%, transparent 60%),
                radial-gradient(rgba(230, 235, 237, 0.02) 1px, transparent 0);
            background-size: 100% 100%, 30px 30px;
        }

        /* 浑天仪御演法阵卡片 */
        .astronomy-plate {
            max-width: 850px;
            width: 100%;
            background: linear-gradient(145deg, #131A22, #0A0D12);
            border: 2px solid var(--mural-gold);
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.15);
            padding: 45px;
            position: relative;
            overflow: hidden;
        }

        /* 边缘重彩回字纹或金边线条装饰 */
        .astronomy-plate::before {
            content: "";
            position: absolute;
            top: 4px; left: 4px; right: 4px; bottom: 4px;
            border: 1px dashed rgba(212, 175, 55, 0.3);
            pointer-events: none;
        }

        /* --- 顶部华丽星盘星轨 --- */
        header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .star-gate {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px auto;
            border: 2px dashed var(--mural-gold);
            border-radius: 50%;
            position: relative;
            animation: rotateGate 25s infinite linear;
        }
        .star-gate::after {
            content: "★";
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: var(--mural-gold);
            font-size: 1.2rem;
            text-shadow: 0 0 10px var(--mural-gold);
        }
        @keyframes rotateGate { 100% { transform: rotate(360deg); } }

        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--mural-gold);
            letter-spacing: 5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .desc-text {
            font-size: 0.85rem;
            letter-spacing: 3px;
            color: #8C96A0;
            margin-top: 8px;
        }

        /* --- 按钮式天机法阵切换 --- */
        .gate-selectors {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
        }
        .gate-btn {
            background: rgba(28, 61, 90, 0.3);
            border: 1px solid rgba(212, 175, 55, 0.4);
            color: var(--star-white);
            padding: 10px 25px;
            font-family: inherit;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 2px;
            transition: all 0.4s;
        }
        .gate-btn.active {
            background: var(--mural-gold);
            color: var(--cosmic-bg);
            font-weight: 700;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            border-color: var(--mural-gold);
        }

        /* --- 暗黑璀璨表单输入 --- */
        .star-input-group {
            margin-bottom: 20px;
        }
        .star-input-group label {
            display: block;
            font-size: 0.9rem;
            color: var(--mural-gold);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .star-input-group input, .star-input-group select {
            width: 100%;
            background: #141A24;
            border: 1px solid rgba(230, 235, 237, 0.15);
            padding: 12px;
            color: var(--star-white);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        .star-input-group input:focus, .star-input-group select:focus {
            border-color: var(--mural-gold);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.2);
        }

        .btn-divining {
            width: 100%;
            background: linear-gradient(to right, var(--mural-red), #BD4343);
            color: white;
            border: none;
            padding: 15px;
            font-family: inherit;
            font-size: 1.15rem;
            letter-spacing: 4px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(169, 56, 56, 0.4);
            transition: transform 0.2s;
        }
        .btn-divining:active { transform: scale(0.99); }

        /* --- 测算盘局：星象罗盘风 --- */
        .star-result-area {
            margin-top: 40px;
            padding-top: 35px;
            border-top: 1px double rgba(212, 175, 55, 0.3);
            display: none;
        }

        /* 八字星宫格 */
        .constellation-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .star-palace {
            background: rgba(28, 61, 90, 0.2);
            border: 1px solid rgba(212, 175, 55, 0.2);
            padding: 15px 10px;
            text-align: center;
            position: relative;
        }
        .star-palace .palace-title {
            color: #8C96A0;
            font-size: 0.8rem;
            border-bottom: 1px dashed rgba(230, 235, 237, 0.1);
            padding-bottom: 6px;
            margin-bottom: 10px;
        }
        .star-palace .ganzhi-char {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--star-white);
            text-shadow: 0 0 8px rgba(255,255,255,0.2);
        }
        .star-palace .ganzhi-char.prime {
            color: var(--mural-gold);
            text-shadow: 0 0 10px rgba(212,175,55,0.4);
        }
        .star-palace .wuxing-element {
            display: inline-block;
            font-size: 0.75rem;
            padding: 2px 6px;
            background: var(--mural-green);
            margin-top: 8px;
            border-radius: 2px;
        }

        /* 六爻星图阵 */
        .hexagram-matrix {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 50px;
            background: rgba(10, 13, 18, 0.6);
            padding: 25px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            margin-bottom: 35px;
        }
        .matrix-gua {
            display: flex;
            flex-direction: column-reverse;
            gap: 10px;
            width: 140px;
        }
        .star-yao {
            height: 12px;
            background: linear-gradient(to right, var(--mural-gold), #FFF, var(--mural-gold));
            box-shadow: 0 0 8px rgba(212,175,55,0.5);
        }
        .star-yao.yin-dark {
            background: transparent;
            display: flex;
            justify-content: space-between;
            box-shadow: none;
        }
        .star-yao.yin-dark::before, .star-yao.yin-dark::after {
            content: "";
            width: 44%;
            height: 100%;
            background: linear-gradient(to right, #4A607A, #1C3D5A);
        }

        /* 披沙拣金神签体断语 */
        .decree-box {
            background: rgba(19, 26, 34, 0.8);
            border-left: 4px solid var(--mural-red);
            padding: 20px;
            font-size: 1.05rem;
            line-height: 1.8;
            letter-spacing: 1px;
            text-align: justify;
            color: #D2D9E0;
            margin-bottom: 25px;
        }
        .decree-header {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--mural-gold);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .decree-header::before {
            content: "✦";
            color: var(--mural-red);
        }
    </style>
</head>
<body>

<div class="astronomy-plate">
    <header>
        <div class="star-gate"></div>
        <h1>司天监 · 浑天演命法阵</h1>
        <div class="desc-text">观乎天文以察时变 · 步历巡天穷极玄微</div>
    </header>

    <div class="gate-selectors">
        <button class="gate-btn active" id="btn-bz" onclick="switchMode('bz')">巡天步历 (生辰八字)</button>
        <button class="gate-btn" id="btn-ly" onclick="switchMode('ly')">演谋河洛 (六爻问占)</button>
    </div>

    <!-- 八字表单 -->
    <div id="panel-bz">
        <div class="star-input-group" style="display: grid; grid-template-columns: 2fr 1fr; gap: 15px;">
            <div>
                <label>修道斋主</label>
                <input type="text" id="username" placeholder="请输入尊名">
            </div>
            <div>
                <label>乾坤法相</label>
                <select id="usergender">
                    <option value="乾造">男 (乾造)</option>
                    <option value="坤造">女 (坤造)</option>
                </select>
            </div>
        </div>
        <div class="star-input-group">
            <label>降诞凡尘时刻 (公历时间)</label>
            <input type="datetime-local" id="birthdate">
        </div>
    </div>

    <!-- 六爻说明 -->
    <div id="panel-ly" style="display: none;">
        <p style="text-align: center; color: #8C96A0; font-size: 0.95rem; line-height: 1.8; padding: 15px 0;">
            「天不言而四时行，地不言而万物生。」<br>
            请双目微闭，摒弃心中杂念，将求问之事凝于指尖，点击下方法阵进行通玄夜演。
        </p>
    </div>

    <button class="btn-divining" onclick="startCosmicDivination()">夜 观 天 象 · 开启法阵</button>

    <!-- 推演结果显现 -->
    <div class="star-result-area" id="result-board">
        <h3 id="result-meta" style="text-align: center; color: var(--mural-gold); margin-bottom: 30px; letter-spacing: 2px;"></h3>
        
        <!-- 八字星盘 -->
        <div class="constellation-grid" id="bazi-star-grid" style="display: none;">
            <!-- 动态注入柱象 -->
        </div>

        <!-- 六爻星阵 -->
        <div class="hexagram-matrix" id="liuyao-star-matrix" style="display: none;">
            <div>
                <div style="font-size:0.8rem; text-align:center; color:var(--mural-gold); margin-bottom:10px;">本象 (事之初)</div>
                <div class="matrix-gua" id="matrix-ben"></div>
            </div>
            <div style="color: var(--mural-gold); font-size: 1.5rem; font-weight: bold; animation: pulse 2s infinite;">➔</div>
            <div>
                <div style="font-size:0.8rem; text-align:center; color:var(--mural-red); margin-bottom:10px;">变象 (事之终)</div>
                <div class="matrix-gua" id="matrix-bian"></div>
            </div>
        </div>

        <!-- 秘本批辞 -->
        <div class="decree-box">
            <div class="decree-header" id="decree-header-1">司天秘传玄理</div>
            <div id="decree-body-1"></div>
        </div>

        <div class="decree-box" style="border-left-color: var(--mural-green);">
            <div class="decree-header" id="decree-header-2">流年星轨判词</div>
            <div id="decree-body-2"></div>
        </div>
    </div>
</div>

<script>
    let mode = 'bz';
    const tg = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
    const dz = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
    const wxColors = {"木":"var(--mural-green)","火":"var(--mural-red)","土":"#8F764B","金":"var(--mural-gold)","水":"#1C3D5A"};
    const elementMap = {"甲":"木","乙":"木","丙":"火","丁":"火","戊":"土","己":"土","庚":"金","辛":"金","壬":"水","癸":"水",
                        "寅":"木","卯":"木","巳":"火","午":"火","辰":"土","戌":"土","丑":"土","未":"土","申":"金","酉":"金","亥":"水","子":"水"};

    function switchMode(targetMode) {
        mode = targetMode;
        document.querySelectorAll('.gate-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${targetMode}`).classList.add('active');
        document.getElementById('panel-bz').style.display = targetMode === 'bz' ? 'block' : 'none';
        document.getElementById('panel-ly').style.display = targetMode === 'ly' ? 'block' : 'none';
        document.getElementById('result-board').style.display = 'none';
    }

    function startCosmicDivination() {
        document.getElementById('result-board').style.display = 'block';
        if (mode === 'bz') {
            calcBaziStar();
        } else {
            calcLiuyaoStar();
        }
        document.getElementById('result-board').scrollIntoView({ behavior: 'smooth' });
    }

    function calcBaziStar() {
        const timeStr = document.getElementById('birthdate').value;
        if(!timeStr) { alert("请法眼先定降诞时刻。"); return; }
        const name = document.getElementById('username').value || "十方缘主";
        const gender = document.getElementById('usergender').value;
        const date = new Date(timeStr);

        let yIdx = (date.getFullYear() - 4) % 60;
        let yG = tg[yIdx % 10], yD = dz[yIdx % 12];
        let mG = tg[(date.getMonth() + 4) % 10], mD = dz[(date.getMonth() + 2) % 12];
        let dG = tg[(date.getDate() + 1) % 10], dD = dz[(date.getDate() % 12)];
        let hD = dz[Math.floor((date.getHours() + 1) / 2) % 12];
        let hG = tg[(tg.indexOf(dG) % 5 * 2 + dz.indexOf(hD)) % 10];

        document.getElementById('result-meta').innerText = `✦ 星历分野：${name} · ${gender} 御批命谱 ✦`;
        document.getElementById('bazi-star-grid').style.display = 'grid';
        document.getElementById('liuyao-star-matrix').style.display = 'none';

        renderPalace('bazi-star-grid', [
            {t:"年尊 · 岁星", g:yG, d:yD, prime:false},
            {t:"月华 · 提纲", g:mG, d:mD, prime:false},
            {t:"日元 · 命主", g:dG, d:dD, prime:true},
            {t:"时轮 · 帝座", g:hG, d:hD, prime:false}
        ]);

        const me = elementMap[dG];
        document.getElementById('decree-header-1').innerText = `元神本命：【${dG} ${me}星曜】照临`;
        
        let p1 = `星象判辞：命主坐【${dG}】天干，五行玄力属【${me}】。`;
        let p2 = "";

        if(me === "木") {
            p1 += "宛如青帝御气，东方生发之机。性灵仁慈，有独木成林、荫庇一方之大格局。";
            p2 = "察今岁星轨流转，木逢丙火，木火通明。此乃才华大放异彩之兆。求财仕途利于向东方星位延伸。需防岁末由于锋芒过盛引发的星宫动荡，行事宜留余地，方可得长生星气护佑。";
        } else if(me === "火") {
            p1 += "宛如荧惑炽烈，南方太阳之威。为人热烈坦荡，明尊守礼，破暗见光，决断如流。";
            p2 = "本命火曜炽盛，逢流年调候得宜。今年官禄宫有紫微吉星掠过，职场或学业上有登高望远之机，姻缘亦有天禧星动。切莫因性急错失暗中相助的贵人，戒骄戒躁，上吉。";
        } else if(me === "土") {
            p1 += "宛如镇星厚重，中央载物之德。性格沉稳深邃，诚信笃实，擅万物包容，根基极固。";
            p2 = "五行土能生金，今年星轨正行至金水相滋的“食伤生财”分野。脑力灵感勃发，适合开拓全新疆域、经商、置业。唯需戒备土气过重导致的固步自封，多听旁人言，财富自然通达。";
        } else if(me === "金") {
            p1 += "宛如太白肃杀，西方变革之锋。秉性刚毅侠烈，宁折不弯，做事杀伐果断，具有统御群英之姿。";
            p2 = "此格杀印相生，太白金星曜耀生辉。今年在事业上有斩获大权或重要契约落定之象。但在人际宫位需注意莫与人争锋，软化言语，以宽仁待人，即可化流年之小凶为大吉。";
        } else {
            p1 += "宛如辰星通达，北方润下之智。心思变幻玲珑，随方就圆，学识如渊似海，长于以柔克刚。";
            p2 = "水主智，本命水势连绵。当前正逢流年文昌星高照，主利考公、参悟玄学、文书晋升。然水多易动荡，需防范感情星宫出现的见异思迁。定下心神，聚焦一处，年终必有大成。";
        }

        document.getElementById('decree-body-1').innerText = p1;
        document.getElementById('decree-body-2').innerText = p2;
    }

    function renderPalace(id, items) {
        const grid = document.getElementById(id);
        grid.innerHTML = '';
        items.forEach(item => {
            const pal = document.createElement('div');
            pal.className = 'star-palace';
            pal.innerHTML = `
                <div class="palace-title">${item.t}</div>
                <div class="ganzhi-char ${item.prime ? 'prime' : ''}">${item.g}</div>
                <div class="ganzhi-char">${item.d}</div>
                <div class="wuxing-element" style="background:${wxColors[elementMap[item.g]]}">${elementMap[item.g]}·${elementMap[item.d]}</div>
            `;
            grid.appendChild(pal);
        });
    }

    function calcLiuyaoStar() {
        document.getElementById('result-meta').innerText = `✦ 河洛演卦：司天监金钱夜演 ✦`;
        document.getElementById('bazi-star-grid').style.display = 'none';
        document.getElementById('liuyao-star-matrix').style.display = 'flex';

        let ben = [], bian = [];
        for(let i=0; i<6; i++) {
            let coin = Math.floor(Math.random() * 2);
            let change = Math.random() > 0.8; 
            ben.push(coin);
            bian.push(change ? (coin === 1 ? 0 : 1) : coin);
        }

        drawStarYao('matrix-ben', ben);
        drawStarYao('matrix-bian', bian);

        document.getElementById('decree-header-1').innerText = "爻动乾坤：本卦气数启示";
        document.getElementById('decree-body-1').innerText = "浑天演象云：世间万物皆在数中。当前所得本卦代表阁下所问之事的客观现状。天机昭示：万事开头难，局中气流在暗中积蓄，需以坚韧之心面对。切忌在时机不成熟时盲目破局。";
        
        let hasChg = ben.some((v, i) => v !== bian[i]);
        document.getElementById('decree-header-2').innerText = "星轨变局：未来演化终局";
        document.getElementById('decree-body-2').innerText = hasChg ? 
            "监测到卦象中存在【动爻】。说明星轨已发生倾斜，当前所谋之事将在短期内迎来重大转折。变卦意味着最终的吉凶走向，提示阁下“顺应无常，以柔克刚”是破解阻碍、达成夙愿的唯一法门。" :
            "此卦纯净而无任何动爻，属于“静卦”。表明你所执着之事目前在轨道内平稳运行，外界干预力量较弱。以静制动，坚守当下的处事策略与初心，切莫自乱阵脚，便可安然渡过。";
    }

    function drawStarYao(id, arr) {
        const target = document.getElementById(id);
        target.innerHTML = '';
        arr.forEach(val => {
            const div = document.createElement('div');
            div.className = `star-yao ${val === 1 ? '' : 'yin-dark'}`;
            target.appendChild(div);
        });
    }
</script>

</body>
</html>
