<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水墨天机 · 观心神算</title>
    <style>
        /* --- 全局色彩与字体 --- */
        :root {
            --bg-paper: #f4efe6;
            --ink-black: #2b2b2b;
            --ink-light: #665f57;
            --vermilion: #b83b28; /* 朱砂红 */
            --vermilion-hover: #982a19;
            --border-ink: #3a332c;
            --paper-card: #FAF6F0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-paper);
            /* 模拟水墨宣纸纹理 */
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(220, 210, 195, 0.4) 0%, transparent 80%),
                radial-gradient(circle at 20% 20%, rgba(0, 0, 0, 0.03) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 0, 0, 0.03) 0%, transparent 50%);
            color: var(--ink-black);
            font-family: "Kaiti SC", "STKaiti", "KaiTi", "Noto Serif SC", serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 10px;
        }

        /* --- 主容器（仿古书卷结构） --- */
        .container {
            width: 100%;
            max-width: 800px;
            background: var(--paper-card);
            border: 2px solid var(--border-ink);
            border-radius: 4px;
            padding: 40px 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12), inset 0 0 80px rgba(184, 134, 11, 0.05);
            position: relative;
            text-align: center;
        }

        /* 古典边框线条 */
        .container::before {
            content: "";
            position: absolute;
            top: 6px; left: 6px; right: 6px; bottom: 6px;
            border: 1px solid rgba(58, 51, 44, 0.3);
            pointer-events: none;
        }

        /* --- 标题与朱印 --- */
        .header {
            margin-bottom: 30px;
            position: relative;
        }

        .seal-mark {
            display: inline-block;
            width: 42px;
            height: 42px;
            border: 2px solid var(--vermilion);
            color: var(--vermilion);
            font-weight: bold;
            font-size: 20px;
            line-height: 38px;
            border-radius: 4px;
            margin-bottom: 10px;
            user-select: none;
        }

        h1 {
            font-size: 2.2rem;
            letter-spacing: 6px;
            color: var(--ink-black);
            font-weight: normal;
        }

        .subtitle {
            font-size: 0.95rem;
            color: var(--ink-light);
            margin-top: 6px;
            letter-spacing: 2px;
        }

        /* --- 表单输入区域 --- */
        .form-area {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .input-box {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .input-box label {
            font-size: 0.9rem;
            color: var(--ink-light);
            margin-bottom: 6px;
        }

        .input-box input, .input-box select {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--border-ink);
            padding: 8px 5px;
            font-size: 1.05rem;
            font-family: inherit;
            color: var(--ink-black);
            outline: none;
            transition: border-color 0.3s;
        }

        .input-box input:focus, .input-box select:focus {
            border-bottom-color: var(--vermilion);
        }

        /* --- 摇签筒互动视觉 --- */
        .pot-wrapper {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bamboo-pot {
            width: 70px;
            height: 100px;
            background: #8c6d53;
            border: 3px solid #4a3728;
            border-radius: 8px 8px 16px 16px;
            position: relative;
            display: flex;
            justify-content: center;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .stick {
            width: 8px;
            height: 60px;
            background: #d9b382;
            border: 1px solid #735431;
            position: absolute;
            top: -30px;
            border-radius: 3px 3px 0 0;
        }

        .stick:nth-child(1) { transform: rotate(-12deg); left: 18px; }
        .stick:nth-child(2) { transform: rotate(-4deg); left: 28px; top: -35px; }
        .stick:nth-child(3) { transform: rotate(10deg); left: 38px; }

        /* 摇晃动画 class */
        .shaking {
            animation: shake 0.6s infinite ease-in-out;
        }

        @keyframes shake {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-8deg); }
            75% { transform: rotate(8deg); }
            100% { transform: rotate(0deg); }
        }

        /* --- 测算按钮 (仿印章样式) --- */
        .submit-btn {
            background-color: var(--vermilion);
            color: #fff;
            border: none;
            padding: 12px 40px;
            font-size: 1.1rem;
            font-family: inherit;
            letter-spacing: 4px;
            cursor: pointer;
            border-radius: 2px;
            box-shadow: 0 4px 10px rgba(184, 59, 40, 0.3);
            transition: all 0.3s;
        }

        .submit-btn:hover {
            background-color: var(--vermilion-hover);
            transform: translateY(-2px);
        }

        /* --- 灵签解盘结果（画卷展开） --- */
        .result-scroll {
            margin-top: 35px;
            background: #f1e9db;
            border: 1px solid var(--border-ink);
            padding: 30px 20px;
            position: relative;
            display: none; /* 默认隐藏 */
            animation: unfold 0.8s ease-out forwards;
        }

        @keyframes unfold {
            from { opacity: 0; transform: scaleY(0.7); }
            to { opacity: 1; transform: scaleY(1); }
        }

        .result-header {
            font-size: 1.5rem;
            color: var(--vermilion);
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .poem-box {
            font-size: 1.2rem;
            line-height: 2;
            margin: 20px 0;
            padding: 15px;
            border-left: 3px solid var(--vermilion);
            border-right: 3px solid var(--vermilion);
            background: rgba(255,255,255,0.4);
            display: inline-block;
            text-align: center;
        }

        .explanation {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--ink-light);
            text-align: left;
            margin-top: 15px;
        }

        .vermilion-seal {
            position: absolute;
            bottom: 15px;
            right: 20px;
            width: 55px;
            height: 55px;
            border: 2px solid var(--vermilion);
            color: var(--vermilion);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(-10deg);
            opacity: 0.85;
            user-select: none;
        }

        /* --- 响应式适配 --- */
        @media (max-width: 600px) {
            .container {
                padding: 25px 15px;
            }
            h1 {
                font-size: 1.7rem;
            }
            .poem-box {
                font-size: 1rem;
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <div class="seal-mark">观</div>
            <h1>水墨天机 · 灵签观心</h1>
            <p class="subtitle">诚心祈念 · 诚意求签 · 诚心解惑</p>
        </div>

        <!-- 互动签筒 -->
        <div class="pot-wrapper">
            <div class="bamboo-pot" id="pot">
                <div class="stick"></div>
                <div class="stick"></div>
                <div class="stick"></div>
            </div>
        </div>

        <!-- 输入表单 -->
        <form id="fateForm" onsubmit="drawStick(event)">
            <div class="form-area">
                <div class="input-box">
                    <label for="name">缘主姓名</label>
                    <input type="text" id="name" placeholder="请输入尊姓名" required>
                </div>
                <div class="input-box">
                    <label for="type">所求事项</label>
                    <select id="type">
                        <option value="career">事业前程</option>
                        <option value="love">红尘姻缘</option>
                        <option value="wealth">求财运势</option>
                        <option value="health">身心安康</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="subBtn">摇签求问</button>
        </form>

        <!-- 卷轴解签结果 -->
        <div class="result-scroll" id="resultScroll">
            <div class="result-header" id="stickTitle">【第一签 · 上上签】</div>
            
            <div class="poem-box" id="stickPoem">
                云开月出正分明<br>
                不须进退问前程<br>
                平生积得心田好<br>
                百事谋望尽遂心
            </div>

            <div class="explanation" id="stickExplain">
                <!-- 动态填充 -->
            </div>

            <div class="vermilion-seal">天机<br>印信</div>
        </div>
    </div>

    <script>
        // 经典签文库
        const fateDatabase = {
            career: [
                {
                    title: "上吉签 · 鹏程万里",
                    poem: "大鹏一日同风起，扶摇直上九万里。<br>假令风歇时下来，犹能簸却沧溟水。",
                    explain: "【断曰】：事业大吉。目前积蓄的力量即将在近期爆发，贵人显现，利于远行、晋升或开拓新方向。切记胸怀大志，勿自寻烦恼。"
                },
                {
                    title: "中吉签 · 潜龙勿用",
                    poem: "沉潜水底守时光，未到风云未可忙。<br>待得一朝雷雨至，定教声价满天下。",
                    explain: "【断曰】：暂宜蓄力。当前或许感到施展不开手脚，此乃积攒能量之良机。切勿急功近利，沉心学习，三月后必有转机。"
                }
            ],
            love: [
                {
                    title: "上上签 · 喜结良缘",
                    poem: "关关雎鸠在河之洲，窈窕淑女君子好逑。<br>金风玉露一相逢，便胜却人间无数。",
                    explain: "【断曰】：情缘大顺。单身者近期桃花暗动，易逢正缘；有伴侣者感情升温，相互包容可成佳偶。宜坦诚相待。"
                },
                {
                    title: "中平签 · 顺其自然",
                    poem: "花开花落自有时，莫将心事锁双眉。<br>若得水到渠成日，方知红豆最相思。",
                    explain: "【断曰】：情丝缠绕。感情不可强求，过于执念反而起反效果。给彼此留些独立空间，顺应自然，心结自解。"
                }
            ],
            wealth: [
                {
                    title: "上吉签 · 财源广进",
                    poem: "运来铁也皆成金，时去金也尽成铁。<br>好将一枕余香在，稳坐高楼看水流。",
                    explain: "【断曰】：财运亨通。无论是偏财还是正财均有小盈。适宜稳健理财，切忌贪婪赌博，见好即收方能长久留财。"
                }
            ],
            health: [
                {
                    title: "上吉签 · 身心安泰",
                    poem: "竹影扫阶尘不动，月穿潭底水无痕。<br>心无挂碍无恐怖，身如琉璃内外明。",
                    explain: "【断曰】：安康之象。近期身心状态有所回升，适宜规律作息、调理饮食。多接触自然，保持心态平和即是最好的滋补。"
                }
            ]
        };

        function drawStick(e) {
            e.preventDefault();

            const name = document.getElementById('name').value;
            const type = document.getElementById('type').value;
            const pot = document.getElementById('pot');
            const subBtn = document.getElementById('subBtn');
            const resultScroll = document.getElementById('resultScroll');

            // 隐藏上一次的结果
            resultScroll.style.display = 'none';

            // 播放摇签筒动画
            pot.classList.add('shaking');
            subBtn.innerText = "诚心求签中...";
            subBtn.disabled = true;

            setTimeout(() => {
                // 停止动画
                pot.classList.remove('shaking');
                subBtn.innerText = "摇签求问";
                subBtn.disabled = false;

                // 算法匹配签文
                const categoryList = fateDatabase[type] || fateDatabase.career;
                const index = Math.abs(hashCode(name + type)) % categoryList.length;
                const fate = categoryList[index];

                // 填充数据
                document.getElementById('stickTitle').innerText = `【${name} 签词】${fate.title}`;
                document.getElementById('stickPoem').innerHTML = fate.poem;
                document.getElementById('stickExplain').innerHTML = fate.explain;

                // 显示卷轴
                resultScroll.style.display = 'block';

            }, 1200); // 1.2秒摇签模拟
        }

        // 简易哈希，保障结果一致性
        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = (hash << 5) - hash + str.charCodeAt(i);
                hash |= 0;
            }
            return hash;
        }
    </script>
</body>
</html>
