<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星轨神谕 · 奥秘塔罗</title>
    <style>
        /* --- 全局暗黑金主题色彩 --- */
        :root {
            --bg-dark: #0a0710;
            --card-dark: rgba(22, 17, 35, 0.85);
            --gold-primary: #dfb15b;
            --gold-light: #f7e3ad;
            --purple-glow: rgba(138, 43, 226, 0.3);
            --border-gold: rgba(223, 177, 91, 0.35);
            --text-gold: #e6cb96;
            --text-sub: #a195b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cinzel', 'Playfair Display', 'Noto Serif SC', Georgia, serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 50% 10%, rgba(88, 28, 135, 0.25) 0%, transparent 60%),
                radial-gradient(circle at 80% 80%, rgba(223, 177, 91, 0.08) 0%, transparent 50%);
            color: var(--text-gold);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 15px;
            overflow-x: hidden;
        }

        /* --- 主容器 --- */
        .container {
            width: 100%;
            max-width: 850px;
            background: var(--card-dark);
            border: 1px solid var(--border-gold);
            border-radius: 12px;
            padding: 40px 30px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9), 0 0 20px var(--purple-glow);
            backdrop-filter: blur(10px);
            position: relative;
            text-align: center;
        }

        /* 哥特几何边框装饰 */
        .container::after {
            content: "";
            position: absolute;
            top: 5px; left: 5px; right: 5px; bottom: 5px;
            border: 1px solid rgba(223, 177, 91, 0.15);
            border-radius: 8px;
            pointer-events: none;
        }

        /* --- 标题与神秘水晶球 --- */
        .header {
            margin-bottom: 30px;
        }

        .orb-wrapper {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #e2b0ff, #581c87 60%, #000);
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.8), inset -5px -5px 15px rgba(0,0,0,0.8);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); box-shadow: 0 0 25px rgba(168, 85, 247, 0.8); }
            50% { transform: translateY(-8px); box-shadow: 0 0 35px rgba(223, 177, 91, 0.9); }
        }

        h1 {
            font-size: 2.2rem;
            color: var(--gold-light);
            letter-spacing: 5px;
            font-weight: 300;
            text-shadow: 0 0 10px rgba(223, 177, 91, 0.3);
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-sub);
            letter-spacing: 3px;
            margin-top: 8px;
            text-transform: uppercase;
        }

        /* --- 输入表单网格 --- */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 35px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .input-group label {
            font-size: 0.8rem;
            color: var(--gold-primary);
            letter-spacing: 1px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .input-group input, .input-group select {
            background: rgba(10, 7, 16, 0.8);
            border: 1px solid var(--border-gold);
            border-radius: 4px;
            padding: 12px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 10px rgba(223, 177, 91, 0.3);
        }

        /* --- 占卜召唤按钮 --- */
        .cast-btn {
            background: transparent;
            color: var(--gold-light);
            border: 1px solid var(--gold-primary);
            padding: 14px 45px;
            font-size: 1.05rem;
            letter-spacing: 4px;
            cursor: pointer;
            position: relative;
            transition: all 0.4s ease;
            text-transform: uppercase;
        }

        .cast-btn:hover {
            background: var(--gold-primary);
            color: var(--bg-dark);
            box-shadow: 0 0 25px rgba(223, 177, 91, 0.6);
        }

        /* --- 结果解盘卡牌动画 --- */
        .result-container {
            margin-top: 40px;
            display: none; /* 默认隐藏 */
            animation: fadeIn 1s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tarot-card {
            background: radial-gradient(circle at 50% 20%, #201335, #0d0817);
            border: 1px solid var(--gold-primary);
            border-radius: 8px;
            padding: 30px 25px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            text-align: left;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-gold);
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 1.4rem;
            color: var(--gold-light);
            letter-spacing: 2px;
        }

        .card-element {
            font-size: 0.85rem;
            color: var(--text-sub);
            border: 1px solid var(--border-gold);
            padding: 2px 8px;
            border-radius: 12px;
        }

        .card-body p {
            font-size: 0.95rem;
            line-height: 1.8;
            color: #d1c7e0;
            margin-bottom: 15px;
        }

        .gold-quote {
            border-left: 2px solid var(--gold-primary);
            padding-left: 12px;
            margin: 15px 0;
            color: var(--gold-primary);
            font-style: italic;
        }

        /* --- 媒体查询响应式 --- */
        @media (max-width: 600px) {
            .container {
                padding: 30px 18px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .cast-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 顶部灵球与标题 -->
        <div class="header">
            <div class="orb-wrapper"></div>
            <h1>A S T R A L</h1>
            <p class="subtitle">—— 星轨神谕 · 奥秘塔罗 ——</p>
        </div>

        <!-- 启示输入框 -->
        <form id="oracle-form" onsubmit="seekOracle(event)">
            <div class="form-grid">
                <div class="input-group">
                    <label for="seeker-name">问卜者代称</label>
                    <input type="text" id="seeker-name" placeholder="Enter your name" required>
                </div>
                <div class="input-group">
                    <label for="sun-sign">太阳星座</label>
                    <select id="sun-sign">
                        <option value="白羊座">白羊座 Aries</option>
                        <option value="金牛座">金牛座 Taurus</option>
                        <option value="双子座">双子座 Gemini</option>
                        <option value="巨蟹座">巨蟹座 Cancer</option>
                        <option value="狮子座">狮子座 Leo</option>
                        <option value="处女座">处女座 Virgo</option>
                        <option value="天秤座">天秤座 Libra</option>
                        <option value="天蝎座">天蝎座 Scorpio</option>
                        <option value="射手座">射手座 Sagittarius</option>
                        <option value="摩羯座">摩羯座 Capricorn</option>
                        <option value="水瓶座">水瓶座 Aquarius</option>
                        <option value="双鱼座">双鱼座 Pisces</option>
                    </select>
                </div>
                <div class="input-group">
                    <label for="query-type">启示领域</label>
                    <select id="query-type">
                        <option value="destiny">命运与启示</option>
                        <option value="love">灵魂羁绊</option>
                        <option value="wealth">物质与位阶</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="cast-btn" id="cast-btn">开启神谕门扉</button>
        </form>

        <!-- 神谕牌面展示 -->
        <div class="result-container" id="result-container">
            <div class="tarot-card">
                <div class="card-header">
                    <div class="card-title" id="card-name">XIX. The Sun 太阳</div>
                    <div class="card-element" id="card-attr">火元素 / 正位</div>
                </div>
                <div class="card-body">
                    <div class="gold-quote" id="card-quote">“星辰不语，但早已在漆黑夜空中指明了归途。”</div>
                    <p id="card-desc">
                        在你所问询的领域中，迷雾即将退去。当下的阻碍只是星体逆行带来的短暂考验，保持你内心的纯粹与专注，秩序与荣光终将重回你的掌控之中。
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 暗黑塔罗/星象数据库
        const oracleDatabase = {
            destiny: [
                {
                    title: "X. Wheel of Fortune (命运之轮)",
                    attr: "木星 / 正位",
                    quote: "“宇宙的轮转从不停歇，你正站在契机与蜕变的交汇点。”",
                    desc: "命运的齿轮已重新开始咬合。过往的沉淀将在近期转化为突破性力量，不必害怕未知的变化，主动顺应势头将开启全新的生命阶梯。"
                },
                {
                    title: "XVII. The Star (星星)",
                    attr: "风元素 / 正位",
                    quote: "“黑夜越是浓郁，指引方向的星芒就越发清晰。”",
                    desc: "精神层面的焦虑正在被治愈。此牌意味着希望与灵感复苏，适合专注于内心真正热爱之事，坚定信念将迎来长远的平静与成就。"
                }
            ],
            love: [
                {
                    title: "VI. The Lovers (恋人)",
                    attr: "双子座 / 正位",
                    quote: "“灵魂的共鸣超越物质的界限，择你所爱，爱你所择。”",
                    desc: "你将建立或深化一段极具理解力的羁绊。无论是沟通还是选择，直面内心最真实的情感需求是解开一切纠葛的唯一钥匙。"
                },
                {
                    title: "II. The High Priestess (女祭司)",
                    attr: "水元素 / 逆位",
                    quote: "“倾听直觉的低语，莫让外在的喧嚣遮蔽了真相。”",
                    desc: "感情中可能存在未显露的信息或思虑过度的倾向。给彼此一些时间与空间，保持克制与观察，时间会给出最真实的答案。"
                }
            ],
            wealth: [
                {
                    title: "I. The Magician (魔术师)",
                    attr: "水星 / 正位",
                    quote: "“所有创造的工具已具足于桌前，只待你挥动权杖。”",
                    desc: "物质与事业运势极佳。你手头已具备成功的要素，极具执行力与创造力。此刻适合开启新项目或签署重要的契约。"
                },
                {
                    title: "ACE of Pentacles (星币首牌)",
                    attr: "土元素 / 正位",
                    quote: "“一颗坚实的种子已播入沃土，静候丰收的降临。”",
                    desc: "极具潜力的财务或职业新机遇正在靠近。这是一个脚踏实地的信号，注重长线规划与积累，将带来稳定而丰厚的回报。"
                }
            ]
        };

        function seekOracle(e) {
            e.preventDefault();

            const name = document.getElementById('seeker-name').value;
            const sign = document.getElementById('sun-sign').value;
            const type = document.getElementById('query-type').value;

            const btn = document.getElementById('cast-btn');
            const resultBox = document.getElementById('result-container');

            // 按钮进入低语仪式状态
            btn.innerText = "聆听星轨低语...";
            btn.style.opacity = "0.6";
            btn.disabled = true;
            resultBox.style.display = "none";

            setTimeout(() => {
                // 恢复按钮
                btn.innerText = "开启神谕门扉";
                btn.style.opacity = "1";
                btn.disabled = false;

                // 读取神谕数据
                const category = oracleDatabase[type] || oracleDatabase.destiny;
                const index = Math.abs(hashCode(name + sign + type)) % category.length;
                const data = category[index];

                // 渲染界面
                document.getElementById('card-name').innerText = data.title;
                document.getElementById('card-attr').innerText = `${sign} · ${data.attr}`;
                document.getElementById('card-quote').innerText = data.quote;
                document.getElementById('card-desc').innerText = `【致 ${name}】${data.desc}`;

                resultBox.style.display = "block";
            }, 1100);
        }

        // 简易哈希计算
        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = (hash << 5) - hash + str.charCodeAt(i);
                hash |= 0;
            }
            return hash;
        }
    </script>
</body>
</html>
