<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神社物语 · 萌灵占卜</title>
    <style>
        /* --- 马卡龙治愈系色彩体系 --- */
        :root {
            --bg-color: #fcf4f6;
            --card-bg: rgba(255, 255, 255, 0.85);
            --pink-main: #ff9ebb;
            --pink-soft: #ffe4ec;
            --blue-soft: #a8dadc;
            --text-main: #5a4b51;
            --text-soft: #8d7a82;
            --gold-accent: #f4a261;
            --border-soft: #f8c8dc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Comic Sans MS', 'MTPixel', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(var(--pink-soft) 20%, transparent 20%),
                radial-gradient(var(--blue-soft) 20%, transparent 20%);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 15px;
        }

        /* --- 主卡片（日式绘马风格） --- */
        .container {
            width: 100%;
            max-width: 700px;
            background: var(--card-bg);
            border: 3px solid #fff;
            border-radius: 30px;
            padding: 40px 25px;
            box-shadow: 0 15px 35px rgba(255, 158, 187, 0.25);
            backdrop-filter: blur(8px);
            position: relative;
            text-align: center;
        }

        /* 顶部小挂绳装饰 */
        .container::before {
            content: "🌸";
            position: absolute;
            top: -22px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 28px;
            background: #fff;
            padding: 2px 12px;
            border-radius: 20px;
            border: 2px solid var(--border-soft);
        }

        /* --- Header --- */
        .header h1 {
            font-size: 2rem;
            color: var(--pink-main);
            margin-bottom: 5px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 0px #fff;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-soft);
            margin-bottom: 25px;
        }

        /* --- 表单输入 --- */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
        }

        .input-group label {
            font-size: 0.85rem;
            color: var(--text-main);
            font-weight: bold;
            margin-bottom: 6px;
            margin-left: 5px;
        }

        .input-group input, .input-group select {
            background: #fff;
            border: 2px solid var(--border-soft);
            border-radius: 16px;
            padding: 12px 15px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        .input-group input:focus, .input-group select:focus {
            border-color: var(--pink-main);
            box-shadow: 0 0 0 3px var(--pink-soft);
        }

        /* --- 萌系求签按钮 --- */
        .draw-btn {
            background: linear-gradient(135deg, var(--pink-main), #ff758c);
            color: #fff;
            border: none;
            padding: 15px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(255, 117, 140, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 2px;
        }

        .draw-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(255, 117, 140, 0.5);
        }

        .draw-btn:active {
            transform: scale(0.98);
        }

        /* --- 御守解盘展示 --- */
        .result-panel {
            margin-top: 30px;
            display: none;
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes bounceIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 模仿日式御守袋 */
        .omamori-card {
            background: #fff;
            border: 3px dashed var(--pink-main);
            border-radius: 20px;
            padding: 25px;
            position: relative;
            text-align: center;
        }

        .omamori-tag {
            display: inline-block;
            background: var(--pink-soft);
            color: var(--pink-main);
            font-weight: bold;
            font-size: 0.85rem;
            padding: 4px 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .result-luck {
            font-size: 2.2rem;
            color: var(--gold-accent);
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .result-text {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-main);
            background: var(--bg-color);
            padding: 15px;
            border-radius: 12px;
            margin-top: 10px;
        }

        /* --- 响应式 --- */
        @media (max-width: 600px) {
            .container {
                padding: 30px 15px;
            }
            .header h1 {
                font-size: 1.6rem;
            }
            .draw-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>⛩️ 萌灵祈愿所</h1>
            <p class="subtitle">—— 摇一摇御守，收获今天的幸运元气吧！ ——</p>
        </div>

        <!-- 输入表单 -->
        <form id="omamori-form" onsubmit="drawOmamori(event)">
            <div class="form-grid">
                <div class="input-group">
                    <label for="nickname">你的昵称</label>
                    <input type="text" id="nickname" placeholder="例如：可爱的猫猫" required>
                </div>
                <div class="input-group">
                    <label for="wish-type">祈愿类型</label>
                    <select id="wish-type">
                        <option value="fortune">✨ 学业/事业必胜</option>
                        <option value="love">🎀 甜甜的恋爱</option>
                        <option value="money">💰 钱包鼓鼓</option>
                        <option value="mood">🍀 每天好心情</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="draw-btn" id="draw-btn">抽取今日御守 🎏</button>
        </form>

        <!-- 御守结果面板 -->
        <div class="result-panel" id="result-panel">
            <div class="omamori-card">
                <div class="omamori-tag" id="res-tag">学业御守</div>
                <div class="result-luck" id="res-luck">【 大 吉 】</div>
                <div class="result-text" id="res-desc">
                    心想事成！今天你的幸运值全满，适合开启任何新计划哦！
                </div>
            </div>
        </div>
    </div>

    <script>
        // 萌系御守文案库
        const omamoriData = {
            fortune: [
                { luck: "【 超 大 吉 】", desc: "灵感如泉涌！今天非常适合攻克难题，遇到的所有困难都会迎刃而解，加油冲呀！" },
                { luck: "【 中 吉 】", desc: "状态渐入佳境。保持你现在的节奏，小小的积累马上就会带来惊喜的回报哦。" }
            ],
            love: [
                { luck: "【 桃花大吉 】", desc: "元气满满！今天你的亲和力爆表，身边的人都会不自觉被你吸引，适合主动打招呼！" },
                { luck: "【 恋爱小吉 】", desc: "平淡中带着丝丝甜意。多留心身边的小细节，可能会收到温馨的小关心哦。" }
            ],
            money: [
                { luck: "【 财运爆发 】", desc: "招财猫附体！今天可能会有意外的小收获或吃上一顿大餐，财运指数偏高！" },
                { luck: "【 稳健加持 】", desc: "钱包非常安全。学会合理规划，小小的储蓄会在未来变成巨大的安全感。" }
            ],
            mood: [
                { luck: "【 治愈满分 】", desc: "坏情绪全都被风吹走啦！今天适合吃一份甜品或者听喜欢的歌，好好宠爱自己一下。" },
                { luck: "【 阳光大吉 】", desc: "今天无论走到哪里都能收获好运与好天气，带着笑容出发吧！" }
            ]
        };

        function drawOmamori(e) {
            e.preventDefault();

            const name = document.getElementById('nickname').value;
            const type = document.getElementById('wish-type').value;
            const btn = document.getElementById('draw-btn');
            const panel = document.getElementById('result-panel');

            // 按钮动画
            btn.innerText = "正在摇晃摇签筒... 🪅";
            btn.style.opacity = "0.7";
            btn.disabled = true;
            panel.style.display = "none";

            setTimeout(() => {
                btn.innerText = "抽取今日御守 🎏";
                btn.style.opacity = "1";
                btn.disabled = false;

                // 算法匹配
                const list = omamoriData[type] || omamoriData.fortune;
                const index = Math.abs(hashCode(name + type)) % list.length;
                const result = list[index];

                // 绘制文案
                const typeText = document.getElementById('wish-type').selectedOptions[0].text;
                document.getElementById('res-tag').innerText = `✨ ${name} 的${typeText.slice(2)}`;
                document.getElementById('res-luck').innerText = result.luck;
                document.getElementById('res-desc').innerText = result.desc;

                panel.style.display = "block";
            }, 800);
        }

        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = (hash << 5) - hash + str.charCodeAt(i);
                hash |= 0;
            }
            return hash;
        }
    </script>
</body>
</html>
