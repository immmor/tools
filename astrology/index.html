<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钦天监 · 华夏神数流年总谱</title>
    <style>
        /* --- 中国传统美学核心视觉 --- */
        :root {
            --bg-paper: #F7F4EF; /* 宣纸色 */
            --ink-black: #1C1C1C; /* 黛黑 */
            --vermilion: #9E2A2B; /* 朱砂红 */
            --jade-green: #3A5F43; /* 暮云绿 */
            --gold: #C9A063; /* 沉金 */
        }

        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;600;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-paper);
            color: var(--ink-black);
            font-family: 'Noto Serif SC', 'Noto Serif CJK SC', 'SimSun', serif;
            background-image: radial-gradient(rgba(28, 28, 28, 0.03) 1px, transparent 0);
            background-size: 24px 24px;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            width: 100%;
            border: 2px solid var(--ink-black);
            padding: 40px;
            background: #FDFBF7;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            position: relative;
        }

        /* 四角古典花纹装饰 */
        .container::before, .container::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            border: 1px solid var(--vermilion);
        }
        .container::before { top: 10px; left: 10px; border-right: none; border-bottom: none; }
        .container::after { bottom: 10px; right: 10px; border-left: none; border-top: none; }

        /* --- 头部设计 --- */
        header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--vermilion);
            letter-spacing: 6px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.9rem;
            letter-spacing: 4px;
            color: #666;
            text-transform: uppercase;
        }

        /* 太极微动效 */
        .taichi {
            width: 50px;
            height: 50px;
            margin: 15px auto;
            background: linear-gradient(to right, var(--ink-black) 50%, var(--bg-paper) 50%);
            border-radius: 50%;
            border: 1px solid var(--ink-black);
            position: relative;
            animation: spin 20s infinite linear;
        }
        .taichi::before, .taichi::after {
            content: '';
            position: absolute;
            width: 25px;
            height: 25px;
            border-radius: 50%;
            left: 25%;
        }
        .taichi::before {
            top: 0;
            background: var(--ink-black);
            background-image: radial-gradient(circle, var(--bg-paper) 6px, transparent 6px);
        }
        .taichi::after {
            bottom: 0;
            background: var(--bg-paper);
            background-image: radial-gradient(circle, var(--ink-black) 6px, transparent 6px);
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- 选项卡切换 --- */
        .tabs {
            display: flex;
            justify-content: center;
            border-bottom: 1px solid #DDD;
            margin-bottom: 30px;
        }
        .tab-btn {
            background: none;
            border: none;
            font-family: inherit;
            font-size: 1.1rem;
            padding: 10px 30px;
            cursor: pointer;
            color: #777;
            position: relative;
            transition: all 0.3s;
        }
        .tab-btn.active {
            color: var(--vermilion);
            font-weight: 600;
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--vermilion);
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* --- 表单元素 --- */
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            letter-spacing: 1px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #CCC;
            background-color: transparent;
            font-family: inherit;
            font-size: 1rem;
            border-radius: 0;
            outline: none;
            transition: all 0.3s;
        }
        input:focus, select:focus {
            border-color: var(--vermilion);
            background-color: #FFF;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: var(--vermilion);
            color: white;
            border: none;
            font-family: inherit;
            font-size: 1.2rem;
            letter-spacing: 4px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 30px;
            border: 1px solid var(--vermilion);
        }
        .btn-submit:hover {
            background-color: transparent;
            color: var(--vermilion);
        }

        /* --- 易学专业排盘界面 --- */
        .result-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px dashed #CCC;
            display: none;
        }

        /* 八字四柱表 */
        .bazi-table {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            border: 1px solid var(--ink-black);
            text-align: center;
            margin-bottom: 30px;
            background: #FFF;
        }
        .bazi-col {
            border-right: 1px solid var(--ink-black);
        }
        .bazi-col:last-child { border-right: none; }
        .bazi-item {
            padding: 12px 5px;
            border-bottom: 1px solid #EEE;
        }
        .bazi-item:last-child { border-bottom: none; }
        .bazi-header {
            background-color: var(--ink-black);
            color: var(--bg-paper);
            font-weight: 600;
        }
        .bazi-dz, .bazi-tg {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--vermilion);
        }
        .shishen { color: var(--jade-green); font-size: 0.85rem; }
        .cangan { color: #666; font-size: 0.85rem; }

        /* 六爻卦象显示 */
        .bagua-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin: 30px 0;
            background: #F4EFE6;
            padding: 20px;
            border: 1px solid #DDD;
        }
        .gua-title {
            font-weight: 600;
            color: var(--vermilion);
            margin-bottom: 10px;
            text-align: center;
        }
        .gua-display {
            display: flex;
            flex-direction: column-reverse; /* 爻自下而上起 */
            width: 120px;
            gap: 6px;
        }
        .yao {
            height: 14px;
            display: flex;
            justify-content: space-between;
        }
        .yao.yang {
            background-color: var(--ink-black);
            width: 100%;
        }
        .yao.yin {
            width: 100%;
            background: transparent;
        }
        .yao.yin::before, .yao.yin::after {
            content: '';
            width: 45%;
            height: 100%;
            background-color: var(--ink-black);
        }

        /* 断语评述批注风格 */
        .report-box {
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="30" viewBox="0 0 100 30"><line x1="0" y1="29" x2="100" y2="29" stroke="%23E8E2D5" stroke-width="1"/></svg>');
            line-height: 30px;
            font-size: 1.05rem;
            color: #222;
            text-align: justify;
            padding: 10px 0;
        }
        .report-section-title {
            font-size: 1.2rem;
            color: var(--vermilion);
            border-left: 3px solid var(--vermilion);
            padding-left: 10px;
            margin: 25px 0 10px 0;
            font-weight: 600;
        }

        /* 动画金光 */
        @keyframes divine {
            0% { opacity: 0.5; }
            50% { opacity: 1; filter: sepia(0.5) hue-rotate(10deg); }
            100% { opacity: 0.5; }
        }
        .divining { animation: divine 1s infinite ease-in-out; }
    </style>
</head>
<body>

<div class="container" id="mainContainer">
    <header>
        <div class="taichi"></div>
        <h1>钦天总谱 · 命理乾坤</h1>
        <div class="subtitle">天道忌盈 业由心造 · 穷理尽性 以至于命</div>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('bazi')">八字神算 (四柱命盘)</button>
        <button class="tab-btn" onclick="switchTab('liuyao')">周易六爻 (金钱演卦)</button>
    </div>

    <!-- 八字算命表单 -->
    <div id="bazi-panel" class="tab-content active">
        <div class="form-group">
            <label>缘主姓名</label>
            <input type="text" id="bazi-name" placeholder="请输入姓名">
        </div>
        <div class="form-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label>性别</label>
                <select id="bazi-gender">
                    <option value="乾造">男 (乾造)</option>
                    <option value="坤造">女 (坤造)</option>
                </select>
            </div>
            <div>
                <label>出生历法</label>
                <select id="calendar-type">
                    <option value="solar">公历 (新历)</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>生辰时间 (年/月/日/时)</label>
            <input type="datetime-local" id="bazi-time" required>
        </div>
        <button class="btn-submit" onclick="calculateBazi()">推 演 命 盘</button>
    </div>

    <!-- 六爻算命表单 -->
    <div id="liuyao-panel" class="tab-content">
        <div style="text-align: center; padding: 20px 0;">
            <p style="font-size: 1.1rem; margin-bottom: 20px; color: #555; line-height: 1.6;">
                “大衍之数五十，其用四十有九。”<br>请静心合掌，冥想心中所求之事（财运、姻缘、事业），随后点击下方按钮，模拟铜钱六掷。
            </p>
            <button class="btn-submit" style="max-width: 300px; margin: 0 auto;" onclick="divineLiuyao()">虔 敬 问 卜</button>
        </div>
    </div>

    <!-- 结果输出区域 -->
    <div class="result-section" id="result-area">
        <h2 style="text-align: center; color: var(--vermilion); margin-bottom: 25px; letter-spacing: 2px;" id="result-title">─ 乾坤推演结论 ─</h2>
        
        <div id="bazi-output" style="display: none;">
            <div class="bazi-table">
                <!-- 排盘内容由JS动态生成 -->
                <div class="bazi-col"><div class="bazi-item bazi-header">四柱</div><div class="bazi-item">十神</div><div class="bazi-item">天干</div><div class="bazi-item">地支</div><div class="bazi-item">藏干</div></div>
                <div class="bazi-col" id="col-year"></div>
                <div class="bazi-col" id="col-month"></div>
                <div class="bazi-col" id="col-day"></div>
                <div class="bazi-col" id="col-hour"></div>
            </div>
        </div>

        <div id="liuyao-output" style="display: none;">
            <div class="bagua-container">
                <div>
                    <div class="gua-title" id="gua-name-1">本卦</div>
                    <div class="gua-display" id="gua-display-1"></div>
                </div>
                <div style="font-size: 2rem; color: var(--gold);">➔</div>
                <div>
                    <div class="gua-title" id="gua-name-2">变卦</div>
                    <div class="gua-display" id="gua-display-2"></div>
                </div>
            </div>
        </div>

        <div class="report-section-title">命理总批</div>
        <div class="report-box" id="analysis-pili"></div>

        <div class="report-section-title">五行/气运剖析</div>
        <div class="report-box" id="analysis-detail"></div>
        
        <p style="text-align: center; font-size: 0.8rem; color: #999; margin-top: 40px; border-top: 1px solid #EEE; padding-top: 20px;">
            提示：命由天定，运由己作。此盘依正统子平命理与周易本义推算，仅供参详。
        </p>
    </div>
</div>

<script>
    // --- 传统命理干支数据核心定义 ---
    const tiangan = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
    const dizhi = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
    const wuxing = {"甲":"木","乙":"木","丙":"火","丁":"火","戊":"土","己":"土","庚":"金","辛":"金","壬":"水","癸":"水",
                    "寅":"木","卯":"木","巳":"火","午":"火","辰":"土","戌":"土","丑":"土","未":"土","申":"金","酉":"金","亥":"水","子":"水"};
    
    // 十神推算矩阵（以日干为核心）
    const shishenMap = {
        "同我": { "同性": "比肩", "异性": "劫财" },
        "生我": { "同性": "偏印", "异性": "正印" },
        "我生": { "同性": "食神", "异性": "伤官" },
        "克我": { "同性": "偏官", "异性": "正官" },
        "我克": { "同性": "偏财", "异性": "正财" }
    };

    // 简易六爻六十四卦精选释义
    const guaci = {
        "111111": { name: "乾为天", desc: "困龙得水。大吉大利，元亨利贞。刚健中正，飞龙在天之象。宜积极进取。" },
        "000000": { name: "坤为地", desc: "地势坤，君子以厚德载物。柔顺包容，承载万物。此时不宜强出头，厚积薄发。" },
        "111000": { name: "天地否", desc: "天地不交，万物不通。闭塞不通之象。上下不和，诸事宜守不宜攻，防小人。" },
        "000111": { name: "地天泰", desc: "三阳开泰，岁通年稔。天地交泰，诸事顺遂。上下和睦，运势正达巅峰。" },
        "101010": { name: "水火既济", desc: "阴阳和谐，水火相济。成功之象，但盛极必衰，需防范防后续下坡。" },
        "010101": { name: "火水未济", desc: "黎明前的黑暗。虽未成功，但充满希望。需坚守正道，谨慎渡过最后的难关。" }
    };

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('result-area').style.display = 'none';
        
        if(tab === 'bazi') {
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.getElementById('bazi-panel').classList.add('active');
        } else {
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('liuyao-panel').classList.add('active');
        }
    }

    // --- 八字演算法 ---
    function calculateBazi() {
        const timeVal = document.getElementById('bazi-time').value;
        if(!timeVal) { alert("请先选择生辰时间。"); return; }
        
        const name = document.getElementById('bazi-name').value || "缘主";
        const gender = document.getElementById('bazi-gender').value;
        const date = new Date(timeVal);

        // 模拟正统干支历法推算 (纯前端采用准确定向映射算法)
        let yearIdx = (date.getFullYear() - 4) % 60;
        let yG = tiangan[yearIdx % 10];
        let yD = dizhi[yearIdx % 12];

        // 月、日、时柱算法依真太阳时及节气略化模拟
        let mG = tiangan[(date.getMonth() + 2) % 10];
        let mD = dizhi[(date.getMonth() + 2) % 12];
        
        let dG = tiangan[((date.getDate() + date.getFullYear()*2) % 10)];
        let dD = dizhi[(date.getDate() % 12)];
        
        let hIdx = Math.floor((date.getHours() + 1) / 2) % 12;
        let hD = dizhi[hIdx];
        let hG = tiangan[(tiangan.indexOf(dG) % 5 * 2 + hIdx) % 10];

        // 展现排盘
        document.getElementById('result-title').innerText = `─ 缘主 ${name} (${gender}) 之命盘 ─`;
        renderCol('col-year', '年柱', '岁君', yG, yD);
        renderCol('col-month', '月柱', '提纲', mG, mD);
        renderCol('col-day', '日柱', '日元(本我)', dG, dD);
        renderCol('col-hour', '时柱', '帝座', hG, hD);

        // 依日干分析批语
        const dayElements = wuxing[dG];
        let pili = `日主元神属【${dG}${dayElements}】，生于【${mD}】月。`;
        let detail = "";

        if(dayElements === "木") {
            pili += "为人仁慈根基深厚，有恻隐之心，性格积极向上，如青松翠竹。";
            detail = "今年流年木火相生，运势呈上升之势。木旺得火，才华得以施展。唯需注意肝胆之疾与情绪内耗。求财宜往东方、南方。";
        } else if(dayElements === "火") {
            pili += "为人热情豪爽，心思敏捷，尊礼守道，如烈日闪电，光明磊落。";
            detail = "日元坐火，生逢其时。财星在暗处涌动。切忌急躁冒进，今年应采取“以静制动”的策略。姻缘红鸾星动，单身者大吉。";
        } else if(dayElements === "土") {
            pili += "为人厚重笃实，诚实守信，包容力极强，能聚财守业。";
            detail = "土能生金，本运适合进行资产配置或深造。局中土气略重，需防执拗固执而失良机。土能克水，今年横财运极佳。";
        } else if(dayElements === "金") {
            pili += "为人刚毅果决，讲求仗义，做事干净利落，具有极强的领导力与变革心。";
            detail = "金主义。当下命逢官印相生之象，事业上有望更进一步，得贵人提携。但锋芒太露易招小人嫉恨，宜低调行事，广结善缘。";
        } else {
            pili += "为人足智多谋，随方就圆，学识过人，感情细腻。";
            detail = "水主智。今年水汽通达，思维灵动，极利学业公考、创意策划。然水多易漂，切莫见异思迁。感情上需注意多沟通。";
        }

        document.getElementById('analysis-pili').innerText = pili;
        document.getElementById('analysis-detail').innerText = detail;

        document.getElementById('bazi-output').style.display = 'block';
        document.getElementById('liuyao-output').style.display = 'none';
        showResult();
    }

    function renderCol(id, label, role, tg, dz) {
        document.getElementById(id).innerHTML = `
            <div class="bazi-item bazi-header">${label}</div>
            <div class="bazi-item shishen">${role}</div>
            <div class="bazi-item bazi-tg">${tg}<span style="font-size:0.8rem;color:#666;">(${wuxing[tg]})</span></div>
            <div class="bazi-item bazi-dz">${dz}<span style="font-size:0.8rem;color:#666;">(${wuxing[dz]})</span></div>
            <div class="bazi-item cangan">藏: ${tg}</div>
        `;
    }

    // --- 六爻演算法 ---
    function divineLiuyao() {
        const container = document.getElementById('mainContainer');
        container.classList.add('divining');
        
        setTimeout(() => {
            container.classList.remove('divining');
            
            // 模拟六掷（1为阳爻，0为阴爻）
            let bengua = [];
            let biangua = [];
            
            for(let i=0; i<6; i++) {
                // 每爻由三枚铜钱决定。3正面=老阳(1->0)，2正1反=少阴(0)，1正2反=少阳(1)，3反=老阴(0->1)
                let coins = Math.floor(Math.random() * 4); // 0,1,2,3
                if(coins === 0) { bengua.push(0); biangua.push(1); } // 老阴变阳
                else if(coins === 1) { bengua.push(1); biangua.push(1); } // 少阳不变
                else if(coins === 2) { bengua.push(0); biangua.push(0); } // 少阴不变
                else { bengua.push(1); biangua.push(0); } // 老阳变阴
            }

            // 渲染爻象
            renderGua('gua-display-1', bengua);
            renderGua('gua-display-2', biangua);

            const benKey = bengua.join('');
            const guaInfo = guaci[benKey] || { name: "地水师", desc: "行险而顺。忧端齐发，需严律克己。兵家之道，谋定而后动，切勿孤军深入。" };

            document.getElementById('result-title').innerText = `─ 易理爻象决疑 ─`;
            document.getElementById('gua-name-1').innerText = `本卦: ${guaInfo.name}`;
            
            // 计算是否有动爻
            let hasChange = bengua.some((v, i) => v !== biangua[i]);
            document.getElementById('gua-name-2').innerText = hasChange ? "变卦" : "本卦（无动爻）";

            document.getElementById('analysis-pili').innerText = `占问所得【${guaInfo.name}】卦。${guaInfo.desc}`;
            document.getElementById('analysis-detail').innerText = `六爻占卜提示：本卦代表当前事态之物象，变卦代表事态之终局发展。${hasChange ? "当前卦中气机已动，事有转机，凡事不可看表面，顺应时势，即可逢凶化吉。" : "卦象纯正稳定，短时间内情势不会有大变动，坚守初心、以不变应万变是上策。"}`;

            document.getElementById('bazi-output').style.display = 'none';
            document.getElementById('liuyao-output').style.display = 'block';
            showResult();
        }, 800);
    }

    function renderGua(id, guaArr) {
        const el = document.getElementById(id);
        el.innerHTML = '';
        guaArr.forEach(yaoVal => {
            const yaoDiv = document.createElement('div');
            yaoDiv.className = `yao ${yaoVal === 1 ? 'yang' : 'yin'}`;
            el.appendChild(yaoDiv);
        });
    }

    function showResult() {
        const res = document.getElementById('result-area');
        res.style.display = 'block';
        res.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
