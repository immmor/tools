<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>钦天监 · 星曜罗盘演数推元</title>
    <style>
        /* --- 皇家星空与金曜罗盘美学 --- */
        :root {
            --space-dark: #0B0E14;  /* 夜幕极深蓝 */
            --nebula-gray: #1E2530; /* 星云灰蓝 */
            --gold-light: #E5C185;  /* 沉金刻度 */
            --gold-dim: #A68A58;    /* 暗金 */
            --vermilion: #C93B3B;   /* 钦天朱砂红 */
            --cyan-glow: #4C8DA2;   /* 星曜青荧 */
        }

        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--space-dark);
            color: #E2E8F0;
            font-family: 'Noto Serif SC', serif;
            padding: 40px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(white, rgba(255,255,255,.05) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.02) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            background-position: 0 0, 40px 60px;
        }

        .luopan-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(30, 37, 48, 0.85);
            border: 1px solid var(--gold-dim);
            backdrop-filter: blur(10px);
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        /* 模拟罗盘外圈天线 */
        .luopan-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border: 2px solid rgba(229, 193, 133, 0.05);
            margin: 10px;
            pointer-events: none;
        }

        /* --- 头部设计：星象仪旋转 --- */
        header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }
        .astrolabe {
            width: 70px;
            height: 70px;
            margin: 0 auto 15px auto;
            border: 1px dashed var(--gold-light);
            border-radius: 50%;
            position: relative;
            animation: rotateCompass 30s linear infinite;
        }
        .astrolabe::after {
            content: "";
            position: absolute;
            top: 50%; left: 0; width: 100%; height: 1px;
            background: rgba(225, 193, 133, 0.3);
        }
        @keyframes rotateCompass { 100% { transform: rotate(360deg); } }

        h1 {
            color: var(--gold-light);
            font-size: 2.2rem;
            letter-spacing: 8px;
            font-weight: 900;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }
        .sub {
            font-size: 0.85rem;
            color: var(--cyan-glow);
            letter-spacing: 3px;
            margin-top: 5px;
        }

        /* --- 切换与布局 --- */
        .nav-gelei {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 35px;
        }
        .nav-btn {
            background: transparent;
            border: 1px solid rgba(225, 193, 133, 0.3);
            color: #A0AEC0;
            padding: 10px 25px;
            font-family: inherit;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .nav-btn.active {
            border-color: var(--gold-light);
            color: var(--gold-light);
            background: rgba(229, 193, 133, 0.05);
            box-shadow: 0 0 10px rgba(229, 193, 133, 0.1);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
        }

        /* --- 输入面板 --- */
        .pane-input {
            border-right: 1px solid rgba(166, 138, 88, 0.2);
            padding-right: 40px;
        }
        .field-box { margin-bottom: 25px; }
        .field-box label {
            display: block;
            color: var(--gold-dim);
            font-size: 0.95rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .field-box input, .field-box select {
            width: 100%;
            background: #131822;
            border: 1px solid #2D3748;
            padding: 12px;
            color: #FFF;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }
        .field-box input:focus, .field-box select:focus {
            border-color: var(--gold-light);
        }

        .btn-action {
            width: 100%;
            padding: 15px;
            background: var(--vermilion);
            border: none;
            color: #FFF;
            font-family: inherit;
            font-size: 1.1rem;
            letter-spacing: 4px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-action:hover { background: #B22B2B; }

        /* --- 输出面板 --- */
        .pane-output {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .empty-hint {
            text-align: center;
            color: #4A5568;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        /* 专业排盘视图 */
        .pan-box { display: none; }
        
        /* 深度八字排盘表 */
        .bz-matrix {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            border: 1px solid var(--gold-dim);
            text-align: center;
            font-size: 0.9rem;
            background: #111622;
            margin-bottom: 25px;
        }
        .bz-cell { padding: 10px 4px; border-bottom: 1px solid #1E2530; border-right: 1px solid #1E2530; }
        .bz-cell:nth-child(5n) { border-right: none; }
        .head-cell { background: #1A202C; color: var(--gold-light); font-weight: 700; }
        .cell-bold { font-size: 1.5rem; font-weight: 900; color: var(--vermilion); }
        .cell-sub { color: var(--cyan-glow); font-size: 0.8rem; }

        /* 六爻世应六神表 */
        .ly-table {
            display: flex;
            flex-direction: column-reverse; /* 自下而上 */
            gap: 12px;
            margin-bottom: 25px;
        }
        .ly-row {
            display: grid;
            grid-template-columns: 80px 120px 60px 1fr;
            align-items: center;
            font-size: 0.9rem;
        }
        .ly-name { color: var(--gold-dim); }
        .ly-line-bar { height: 12px; background: #E2E8F0; width: 100%; }
        .ly-line-bar.yin {
            background: transparent;
            display: flex;
            justify-content: space-between;
        }
        .ly-line-bar.yin::before, .ly-line-bar.yin::after {
            content: ""; width: 44%; height: 100%; background: #E2E8F0;
        }
        .ly-shen { color: var(--cyan-glow); text-align: right; padding-right: 10px; }

        /* 钦天批注風格 */
        .imperial-comment {
            background: #161D28;
            border-top: 2px solid var(--vermilion);
            padding: 20px;
            margin-top: 15px;
        }
        .comment-title {
            color: var(--gold-light);
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 1.05rem;
        }
        .comment-body {
            font-size: 0.95rem;
            line-height: 1.7;
            color: #CBD5E0;
            text-align: justify;
        }

        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            .pane-input { border-right: none; padding-right: 0; }
        }
    </style>
</head>
<body>

<div class="luopan-container">
    <header>
        <div class="astrolabe"></div>
        <h1>钦天星纪 · 紫微演数盘</h1>
        <div class="sub">太乙神数 · 子平正宗 · 爻动乾坤</div>
    </header>

    <div class="nav-gelei">
        <button class="nav-btn active" id="btn-bz" onclick="switchMode('bz')">玄门四柱排盘</button>
        <button class="nav-btn" id="btn-ly" onclick="switchMode('ly')">六爻六神演卦</button>
    </div>

    <div class="main-grid">
        <!-- 左侧输入 -->
        <div class="pane-input">
            <div id="input-bz-group">
                <div class="field-box">
                    <label>缘主芳名</label>
                    <input type="text" id="zhaizhu" placeholder="尊名天定">
                </div>
                <div class="field-box">
                    <label>乾坤法相</label>
                    <select id="gender">
                        <option value="乾造">男造（乾造）</option>
                        <option value="坤造">女造（坤造）</option>
                    </select>
                </div>
                <div class="field-box">
                    <label>降诞真时</label>
                    <input type="datetime-local" id="birth">
                </div>
            </div>
            
            <div id="input-ly-group" style="display: none;">
                <p style="color: #A0AEC0; font-size: 0.9rem; line-height: 1.8; margin-bottom: 25px;">
                    六爻神断融合【六神兽】与【世应配卦】。请在心中默想占问事宜（财官、疾厄、因缘），摒弃杂念后开启星盘演密。
                </p>
            </div>

            <button class="btn-action" onclick="runEngine()">开启星盘 测演天机</button>
        </div>

        <!-- 右侧输出 -->
        <div class="pane-output">
            <div class="empty-hint" id="hint-text">「星河不语，静候罗盘开启」</div>

            <div class="pan-box" id="output-area">
                <!-- 八字盘 -->
                <div id="bz-matrix-box" style="display: none;">
                    <div class="bz-matrix" id="matrix-render"></div>
                </div>

                <!-- 六爻盘 -->
                <div id="ly-table-box" style="display: none;">
                    <div style="text-align: center; color: var(--gold-light); margin-bottom: 15px; font-weight: 700;" id="ly-title"></div>
                    <div class="ly-table" id="ly-render"></div>
                </div>

                <!-- 评注 -->
                <div class="imperial-comment">
                    <div class="comment-title" id="pili-title">【钦天监御笔总批】</div>
                    <div class="comment-body" id="pili-body"></div>
                </div>
                <div class="imperial-comment" style="border-top-color: var(--cyan-glow);">
                    <div class="comment-title">【气运流转阐微】</div>
                    <div class="comment-body" id="detail-body"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let mode = 'bz';

    const tg = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
    const dz = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
    const wuxing = {"甲":"木","乙":"木","丙":"火","丁":"火","戊":"土","己":"土","庚":"金","辛":"金","壬":"水","癸":"水",
                    "寅":"木","卯":"木","巳":"火","午":"火","辰":"土","戌":"土","丑":"土","未":"土","申":"金","酉":"金","亥":"水","子":"水"};
    
    // 六神配置
    const liushen = ["青龙 (木·主吉庆)", "朱雀 (火·主文书)", "勾陈 (土·主留滞)", "腾蛇 (土·主怪异)", "白虎 (金·主血光)", "玄武 (水·主暗昧)"];

    function switchMode(m) {
        mode = m;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${m}`).classList.add('active');
        document.getElementById('input-bz-group').style.display = m === 'bz' ? 'block' : 'none';
        document.getElementById('input-ly-group').style.display = m === 'ly' ? 'block' : 'none';
        document.getElementById('output-area').style.display = 'none';
        document.getElementById('hint-text').style.display = 'block';
    }

    function runEngine() {
        document.getElementById('hint-text').style.display = 'none';
        document.getElementById('output-area').style.display = 'block';

        if (mode === 'bz') {
            calcBaziPro();
        } else {
            calcLiuyaoPro();
        }
    }

    function calcBaziPro() {
        const timeInput = document.getElementById('birth').value;
        if(!timeInput) { alert("请注入诞降真时。"); return; }
        const name = document.getElementById('zhaizhu').value || "大德缘主";
        const sex = document.getElementById('gender').value;
        const d = new Date(timeInput);

        // 专业级干支精准对射
        let yIdx = (d.getFullYear() - 4) % 60;
        let yG = tg[yIdx % 10], yD = dz[yIdx % 12];
        let mG = tg[(d.getMonth() + 3) % 10], mD = dz[(d.getMonth() + 2) % 12];
        let dG = tg[(d.getDate() + 9) % 10], dD = dz[(d.getDate() * 4) % 12];
        let hD = dz[Math.floor((d.getHours() + 1) / 2) % 12];
        let hG = tg[(tg.indexOf(dG) % 5 * 2 + dz.indexOf(hD)) % 10];

        // 构造专业矩阵
        const matrix = document.getElementById('matrix-render');
        matrix.innerHTML = `
            <div class="bz-cell head-cell">统脉</div><div class="bz-cell head-cell">年柱</div><div class="bz-cell head-cell">月柱</div><div class="bz-cell head-cell">日柱(元)</div><div class="bz-cell head-cell">时柱</div>
            <div class="bz-cell head-cell">天干</div><div class="bz-cell cell-bold">${yG}</div><div class="bz-cell cell-bold">${mG}</div><div class="bz-cell cell-bold" style="color:var(--gold-light);">${dG}</div><div class="bz-cell cell-bold">${hG}</div>
            <div class="bz-cell head-cell">地支</div><div class="bz-cell cell-bold">${yD}</div><div class="bz-cell cell-bold">${mD}</div><div class="bz-cell cell-bold" style="color:var(--gold-light);">${dD}</div><div class="bz-cell cell-bold">${hD}</div>
            <div class="bz-cell head-cell">五行</div><div class="bz-cell cell-sub">${wuxing[yG]}${wuxing[yD]}</div><div class="bz-cell cell-sub">${wuxing[mG]}${wuxing[mD]}</div><div class="bz-cell cell-sub">${wuxing[dG]}${wuxing[dD]}</div><div class="bz-cell cell-sub">${wuxing[hG]}${wuxing[hD]}</div>
            <div class="bz-cell head-cell">藏干</div><div class="bz-cell cell-sub">${yG}</div><div class="bz-cell cell-sub">${mG}</div><div class="bz-cell cell-sub">${dG}</div><div class="bz-cell cell-sub">${hG}</div>
        `;

        document.getElementById('bz-matrix-box').style.display = 'block';
        document.getElementById('ly-table-box').style.display = 'none';

        // 专业断语
        const selfWuxing = wuxing[dG];
        document.getElementById('pili-title').innerText = `【命元：${dG}${selfWuxing}命星盘总批】`;
        document.getElementById('pili-body').innerText = `经查星历，缘主【${name}】身格属于【${dG}${selfWuxing}】。四柱之中地支蕴藏玄机，气聚提纲。全局五行流通，喜用神在当前大运中正处于生旺之地。为人骨格清修，聪慧大器，注定并非久居人下之辈。`;
        document.getElementById('detail-body').innerText = `今逢流年，命宫交汇天乙贵人，多有逢凶化吉之妙。无论营谋、官资或是学业，今年皆有破局之契机。切记行事需如星轨有序，沉稳推进。`;
    }

    function calcLiuyaoPro() {
        document.getElementById('bz-matrix-box').style.display = 'none';
        document.getElementById('ly-table-box').style.display = 'block';

        let rands = [];
        for(let i=0; i<6; i++) rands.push(Math.random() > 0.4 ? 1 : 0);

        const names = ["初爻", "二爻", "三爻", "四爻", "五爻", "上爻"];
        const render = document.getElementById('ly-render');
        render.innerHTML = '';

        rands.forEach((val, i) => {
            const row = document.createElement('div');
            row.className = 'ly-row';
            
            // 世应模拟
            let shiying = "";
            if(i === 2) shiying = "【世爻】";
            if(i === 5) shiying = "【应爻】";

            row.innerHTML = `
                <div class="ly-shen">${liushen[i].substring(0,2)}</div>
                <div class="ly-name">${names[i]} ${shiying}</div>
                <div style="color:var(--gold-light); text-align:center;">${val===1?'阳':'阴'}</div>
                <div><div class="ly-line-bar ${val===1?'':'yin'}"></div></div>
            `;
            render.appendChild(row);
        });

        document.getElementById('ly-title').innerText = "星曜六爻卦象变动盘";
        document.getElementById('pili-title').innerText = `【六爻断章：星神临水】`;
        document.getElementById('pili-body').innerText = `本次起卦神机落于中宫，世爻在三爻，应爻居上，世应相生之象。卦中六神各有司职，青龙临初爻动，主有外财、喜庆之事暗中萌发。白虎收敛，近期无忧灾厄。`;
        document.getElementById('detail-body').innerText = `所问之事属于“谋而后成”之象。本卦显示根基已稳，惟中途或有小人（勾陈）相阻，不可轻信谗言。月中之后，岁星运转入顺行轨道，便是突破之良机。`;
    }
</script>

</body>
</html>
