<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄门简谱 · 泼墨推演</title>
    <style>
        /* --- 传统美学核心视觉：水墨山水与古绢绸色 --- */
        :root {
            --bg-silk: #EFECE2;     /* 岁月绢帛色 */
            --ink-deep: #16181A;    /* 松烟墨色 */
            --ink-mist: #7A8085;    /* 远山淡墨 */
            --shiqing: #2C5C6C;     /* 传世石青 */
            --zhusha: #962828;      /* 印泥朱砂 */
            --amber: #B9935A;       /* 古书鎏金 */
        }

        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;500;700;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-silk);
            color: var(--ink-deep);
            font-family: 'Noto Serif SC', serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 模拟宣纸晕染的纹理背景 */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(22, 24, 26, 0.02) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(44, 92, 108, 0.03) 0%, transparent 50%);
        }

        /* 典籍对开页风格卡片 */
        .ancient-book {
            max-width: 950px;
            width: 100%;
            background: #F6F4EE;
            border: 1px solid rgba(22, 24, 26, 0.15);
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            position: relative;
            padding: 45px;
            display: grid;
            grid-template-columns: 1.2fr 1.8fr;
            gap: 40px;
        }

        /* 书籍中缝线 */
        .ancient-book::after {
            content: "";
            position: absolute;
            top: 0;
            bottom: 0;
            left: 40%;
            width: 1px;
            background: linear-gradient(to bottom, transparent, rgba(22, 24, 26, 0.08) 10%, rgba(22, 24, 26, 0.08) 90%, transparent);
            box-shadow: -1px 0 3px rgba(0,0,0,0.03);
        }

        /* --- 左侧：法阵与起卦控制区 --- */
        .control-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 2;
        }

        .book-title {
            writing-mode: vertical-rl; /* 古籍纵向书写 */
            text-orientation: mixed;
            font-size: 2rem;
            font-weight: 900;
            color: var(--ink-deep);
            letter-spacing: 6px;
            border-left: 2px solid var(--zhusha);
            padding-left: 15px;
            margin-bottom: 30px;
            height: fit-content;
        }

        .book-title span {
            color: var(--shiqing);
            font-size: 1rem;
            letter-spacing: 2px;
            margin-top: 10px;
            font-weight: 500;
        }

        .switch-menu {
            margin: 20px 0;
        }
        .menu-item {
            display: block;
            background: transparent;
            border: none;
            font-family: inherit;
            font-size: 1.05rem;
            color: var(--ink-mist);
            text-align: left;
            padding: 10px 0;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .menu-item.active {
            color: var(--zhusha);
            font-weight: 700;
            padding-left: 15px;
        }
        .menu-item.active::before {
            content: "◆";
            position: absolute;
            left: 0;
            font-size: 0.8rem;
            color: var(--zhusha);
        }

        /* 输入框水墨轻量线 */
        .input-box {
            margin-bottom: 20px;
        }
        .input-box label {
            display: block;
            font-size: 0.9rem;
            color: var(--ink-mist);
            margin-bottom: 6px;
        }
        .input-box input, .input-box select {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(22,24,26,0.2);
            padding: 8px 0;
            font-family: inherit;
            font-size: 1rem;
            color: var(--ink-deep);
            outline: none;
            transition: border-color 0.3s;
        }
        .input-box input:focus, .input-box select:focus {
            border-bottom-color: var(--shiqing);
        }

        .btn-divine {
            background: var(--ink-deep);
            color: #FFF;
            border: none;
            padding: 12px;
            font-family: inherit;
            font-size: 1.1rem;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn-divine:hover {
            background: var(--shiqing);
        }

        /* --- 右侧：神机妙算显示区 --- */
        .display-panel {
            z-index: 2;
            display: flex;
            flex-direction: column;
            min-height: 450px;
        }

        /* 水墨晕染开场或留白 */
        .placeholder-text {
            margin: auto;
            text-align: center;
            color: var(--ink-mist);
            font-weight: 300;
            letter-spacing: 2px;
            line-height: 2;
        }

        /* 八字：古典卷轴排盘 */
        .scroll-bazi {
            display: flex;
            justify-content: space-between;
            border: 1px solid rgba(44, 92, 108, 0.3);
            background: #F1EEE5;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
        }
        .scroll-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 22%;
        }
        .scroll-card .pillar-tag {
            font-size: 0.8rem;
            background: var(--shiqing);
            color: #fff;
            padding: 2px 6px;
            margin-bottom: 10px;
        }
        .scroll-card .word {
            font-size: 1.8rem;
            font-weight: 700;
            line-height: 1.2;
            margin: 5px 0;
            writing-mode: vertical-rl;
        }
        .scroll-card .element-tag {
            font-size: 0.8rem;
            color: var(--amber);
            margin-top: 5px;
        }

        /* 六爻：洛书太极演化 */
        .luoshu-box {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            background: #FAF8F5;
            padding: 15px;
            border-radius: 4px;
        }
        .yin-yang-gua {
            display: flex;
            flex-direction: column-reverse;
            gap: 8px;
            align-items: center;
        }
        .line-yao {
            height: 10px;
            width: 100px;
            background-color: var(--ink-deep);
        }
        .line-yao.broken {
            background: transparent;
            display: flex;
            justify-content: space-between;
        }
        .line-yao.broken::before, .line-yao.broken::after {
            content: "";
            width: 44%;
            height: 100%;
            background-color: var(--ink-deep);
        }

        /* 奏折体批词 */
        .memorial-text {
            font-size: 1.05rem;
            line-height: 1.8;
            text-align: justify;
            color: #2b2b2b;
            border-left: 2px solid rgba(185, 147, 90, 0.4);
            padding-left: 15px;
            margin-top: 15px;
        }
        .memorial-title {
            font-weight: 700;
            color: var(--zhusha);
            margin-top: 15px;
            font-size: 1.1rem;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .ancient-book { grid-template-columns: 1fr; padding: 25px; }
            .ancient-book::after { display: none; }
            .book-title { writing-mode: horizontal-tb; height: auto; }
        }
    </style>
</head>
<body>

<div class="ancient-book">
    
    <!-- 左半页：天机输入 -->
    <div class="control-panel">
        <div>
            <div class="book-title">
                钦天监正本
                <br><span>御制流年神数</span>
            </div>

            <div class="switch-menu">
                <button class="menu-item active" id="tab-bz" onclick="toggleMode('bz')">参悟 四柱八字命理</button>
                <button class="menu-item" id="tab-ly" onclick="toggleMode('ly')">演谋 周易六爻断法</button>
            </div>

            <!-- 八字输入 -->
            <div id="form-bz">
                <div class="input-box">
                    <label>测算斋主</label>
                    <input type="text" id="username" placeholder="留空则以缘主称呼">
                </div>
                <div class="input-box">
                    <label>乾坤阴阳</label>
                    <select id="usergender">
                        <option value="乾造">男（乾造）</option>
                        <option value="坤造">女（坤造）</option>
                    </select>
                </div>
                <div class="input-box">
                    <label>诞降时辰 (公历生辰)</label>
                    <input type="datetime-local" id="birthtime">
                </div>
            </div>

            <!-- 六爻说明 -->
            <div id="form-ly" style="display: none;">
                <p style="font-size:0.9rem; color:var(--ink-mist); line-height: 1.6; margin-bottom: 20px;">
                    “卜以决疑，不疑何卜。”<br>
                    请冥想所问之事（如：明日出行、开市、合伙、姻缘），默念三遍，再行摇卦。
                </p>
            </div>
        </div>

        <button class="btn-divine" id="action-btn" onclick="executeDivination()">启 动 推 演</button>
    </div>

    <!-- 右半页：天机显现 -->
    <div class="display-panel" id="display-panel">
        <div class="placeholder-text" id="placeholder">
            <p>「落笔惊风雨，运筹理乾坤」</p>
            <p style="font-size: 0.85rem; margin-top: 10px; opacity: 0.7;">请于左侧注入生辰或意念，以窥天机。</p>
        </div>

        <!-- 动态生成的结果承载区 -->
        <div id="results-core" style="display: none; width: 100%;">
            <h3 style="color: var(--shiqing); font-weight: 700; margin-bottom: 20px; font-size: 1.2rem;" id="res-head">─ 奉天承运 命盘开 ─</h3>
            
            <!-- 八字排盘专属 -->
            <div class="scroll-bazi" id="bazi-board" style="display: none;">
                <!-- 动态渲染 -->
            </div>

            <!-- 六爻排盘专属 -->
            <div class="luoshu-box" id="liuyao-board" style="display: none;">
                <div>
                    <div style="font-size:0.85rem; text-align:center; margin-bottom:5px; color:var(--shiqing);">本卦 (当前)</div>
                    <div class="yin-yang-gua" id="ben-gua"></div>
                </div>
                <div style="color: var(--amber); font-size: 1.2rem;">变</div>
                <div>
                    <div style="font-size:0.85rem; text-align:center; margin-bottom:5px; color:var(--zhusha);">变卦 (未来)</div>
                    <div class="yin-yang-gua" id="bian-gua"></div>
                </div>
            </div>

            <!-- 核心断语 -->
            <div class="memorial-title" id="pili-title">【元神总批】</div>
            <div class="memorial-text" id="pili-content"></div>

            <div class="memorial-title">【流年及断象意见】</div>
            <div class="memorial-text" id="detail-content"></div>
        </div>
    </div>

</div>

<script>
    let currentMode = 'bz';

    const gan = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
    const zhi = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
    const elements = {"甲":"阳木","乙":"阴木","丙":"阳火","丁":"阴火","戊":"阳土","己":"阴土","庚":"阳金","辛":"阴金","壬":"阳水","癸":"阴水",
                      "寅":"木","卯":"木","巳":"火","午":"火","辰":"土","戌":"土","丑":"土","未":"土","申":"金","酉":"金","亥":"水","子":"水"};

    function toggleMode(mode) {
        currentMode = mode;
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        document.getElementById('form-bz').style.display = mode === 'bz' ? 'block' : 'none';
        document.getElementById('form-ly').style.display = mode === 'ly' ? 'block' : 'none';
        document.getElementById(`tab-${mode}`).classList.add('active');
        document.getElementById('action-btn').innerText = mode === 'bz' ? '启 动 推 演' : '虔 敬 摇 卦';
        document.getElementById('results-core').style.display = 'none';
        document.getElementById('placeholder').style.display = 'flex';
    }

    function executeDivination() {
        document.getElementById('placeholder').style.display = 'none';
        const core = document.getElementById('results-core');
        core.style.display = 'block';

        if (currentMode === 'bz') {
            doBazi();
        } else {
            doLiuyao();
        }
    }

    function doBazi() {
        const timeInput = document.getElementById('birthtime').value;
        if(!timeInput) { alert("请阁下输入诞降时辰。"); return; }
        
        const name = document.getElementById('username').value || "缘主";
        const gender = document.getElementById('usergender').value;
        const d = new Date(timeInput);

        // 高阶模拟四柱定向推演
        let yIdx = (d.getFullYear() - 4) % 60;
        let yG = gan[yIdx % 10], yZ = zhi[yIdx % 12];
        let mG = gan[(d.getMonth() + 3) % 10], mZ = zhi[(d.getMonth() + 2) % 12];
        let dG = gan[(d.getDate() + 7) % 10], dZ = zhi[(d.getDate() * 3) % 12];
        let hZ = zhi[Math.floor((d.getHours() + 1) / 2) % 12];
        let hG = gan[(gan.indexOf(dG) % 5 * 2 + zhi.indexOf(hZ)) % 10];

        document.getElementById('res-head').innerText = `─ 钦天监奉御：${name}公命盘 ─`;
        document.getElementById('bazi-board').style.display = 'flex';
        document.getElementById('liuyao-board').style.display = 'none';

        document.getElementById('bazi-board').innerHTML = `
            ${renderPillar("年柱", yG, yZ)}
            ${renderPillar("月柱", mG, mZ)}
            ${renderPillar("日柱(身)", dG, dZ)}
            ${renderPillar("时柱", hG, hZ)}
        `;

        // 结合经典滴天髓、穷通宝鉴格局论断
        const mainElement = elements[dG].substring(1); // 取“木/火/土/金/水”
        document.getElementById('pili-title').innerText = `【元神总批：日元 ${dG}${mainElement} 局】`;
        
        let baziPili = `格局批注：此命局日元天干属【${dG}】，乃${elements[dG]}。`;
        let baziDetail = "";

        if(mainElement === "木") {
            baziPili += "如乔木参天，独具仁慈之风，为人志向高远，凡事不甘人后，格调清高。";
            baziDetail = "《穷通宝鉴》云：春木向阳，夏木喜润。观阁下八字造化，局中水木清奇，才华内敛。2026流年丙午，正值木火通明之象，学术、仕途皆有晋升之喜，唯防木秀于林，风必摧之，待人切莫过于刚直。";
        } else if(mainElement === "火") {
            baziPili += "如太阳普照，生性光明磊落，礼仪端正，办事雷厉风行，极具决断与感召力。";
            baziDetail = "《滴天髓》云：五阳皆阳丙为最。阁下命带真火之气，为人急公好义。当前大运正行财官之地，流年来财虽顺，但局中烈火过旺，需提防投资上被表象迷惑。姻缘方面红鸾星近，大利家室和睦。";
        } else if(mainElement === "土") {
            baziPili += "如大泽昆仑，承载万物，性格沉稳厚道，极有信用，长于统筹谋划与守成。";
            baziDetail = "土厚能载物。阁下命格根基沉稳，生财有道。流年逢金水相滋，暗藏偏财气机。此年利于动中求财，如出差、拓展外地市场。切记今年不可做他人债务之担保，坚守正道，则福泽绵长。";
        } else if(mainElement === "金") {
            baziPili += "如庚金白虎、辛金珠玉，为人刚毅果决，仗义疏财，心思通透且有敏锐的变革力。";
            baziDetail = "金主义，为人刚柔并济。此盘显示印星护身得力，今年有置办房产或契约之喜。职场上具有独挡一面的掌权之象。偏官虽旺，但有食神相制，危中有机，逢凶化吉。防呼吸系统微恙。";
        } else {
            baziPili += "如江河奔腾、润物无声，足智多谋，随方就圆，感知力与适应能力堪称一绝。";
            baziDetail = "《三命通会》论水：主智，其性聪明，其情善良。阁下八字气流清澈，极具艺术与经商天赋。本年官星照命，利于考公、考证或大企晋升。切忌思虑过多、坐失良机，顺其自然方为上上策。";
        }

        document.getElementById('pili-content').innerText = baziPili;
        document.getElementById('detail-content').innerText = baziDetail;
    }

    function renderPillar(title, g, z) {
        return `
            <div class="scroll-card">
                <div class="pillar-tag">${title}</div>
                <div class="word" style="color:var(--zhusha);">${g}</div>
                <div class="word">${z}</div>
                <div class="element-tag">${elements[g].substring(1)}·${elements[z]}</div>
            </div>
        `;
    }

    function doLiuyao() {
        document.getElementById('res-head').innerText = `─ 易理爻象：金钱演卦 ─`;
        document.getElementById('bazi-board').style.display = 'none';
        document.getElementById('liuyao-board').style.display = 'grid';

        // 随机本卦和变卦
        let ben = [], bian = [];
        for(let i=0; i<6; i++) {
            let r = Math.random();
            if(r < 0.25) { ben.push(0); bian.push(1); }      // 老阴变阳
            else if(r < 0.5) { ben.push(1); bian.push(0); }  // 老阳变阴
            else if(r < 0.75) { ben.push(1); bian.push(1); } // 少阳不变
            else { ben.push(0); bian.push(0); }             // 少阴不变
        }

        renderYao('ben-gua', ben);
        renderYao('bian-gua', bian);

        document.getElementById('pili-title').innerText = `【周易断象：机缘启示】`;
        
        // 经典几大卦象解析
        let benStr = ben.join('');
        let guaName = "地山谦";
        let guaDesc = "谦受益，满招损。内敛含蓄，运势平稳，虽无暴利暴喜，但能保平安无虞。";
        
        if(benStr === "111111") { guaName = "乾为天"; guaDesc = "飞龙在天，大亨之象。所问之事势头极其强劲，宜高歌猛进。但要注意亢龙有悔，需留有退路。"; }
        else if(benStr === "000000") { guaName = "坤为地"; guaDesc = "厚德载物，以柔克刚。当前不宜主动出击，宜听取长辈或女性贵人的建议，以守为吉。"; }
        else if(benStr === "101010") { guaName = "水火既济"; guaDesc = "初吉终乱。目前条件已经完全具备，事情有极高概率成功。但成功后防松懈，要提防走下坡路。"; }
        else if(benStr === "010101") { guaName = "火水未济"; guaDesc = "黎明前的黑暗。当前困难重重，但希望就在眼前。切莫在中途放弃，坚守正道必有大成。"; }

        document.getElementById('pili-content').innerText = `斋主问卜，摇得本卦为【${guaName}】。卦辞占语：${guaDesc}`;
        
        let hasChange = ben.some((v, i) => v !== bian[i]);
        document.getElementById('detail-content').innerText = hasChange ? 
            `交变爻象：局中有动爻产生，暗示事态处于快速变动期。变卦昭示着最终结局。动者，机缘变数也。说明你所求之事目前虽有波折，但结局已生微妙变化，多行善举、顺应自然，可向吉处发展。` :
            `静态爻象：此卦纯正无动爻，事态处于稳固期。所求之事近期不会出现戏剧性的反转。以不变应万变，按既定计划踏实推进，即是当下的最佳选择。`;
    }

    function renderYao(id, arr) {
        const target = document.getElementById(id);
        target.innerHTML = '';
        arr.forEach(val => {
            const div = document.createElement('div');
            div.className = `line-yao ${val === 1 ? '' : 'broken'}`;
            target.appendChild(div);
        });
    }
</script>

</body>
</html>
