<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudflare Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-2xl flex flex-col h-[80vh] border border-gray-200 bg-white shadow-sm overflow-hidden">
        <header class="p-4 border-b border-gray-100 flex justify-between items-center bg-white">
            <h1 class="text-sm font-bold tracking-widest uppercase">Global_Room</h1>
            <div class="h-2 w-2 bg-green-500 rounded-full"></div>
        </header>

        <div id="chat-box" class="flex-1 overflow-y-auto p-6 space-y-4 text-sm leading-relaxed">
            </div>

        <footer class="p-4 border-t border-gray-100 bg-gray-50">
            <form id="chat-form" class="flex gap-2">
                <input type="text" id="message-input" placeholder="输入消息..." 
                    class="flex-1 px-4 py-2 border border-gray-200 focus:outline-none focus:border-black transition-colors bg-white">
                <button type="submit" class="bg-black text-white px-6 py-2 hover:bg-gray-800 transition-colors uppercase text-xs font-bold tracking-tighter">
                    Send
                </button>
            </form>
        </footer>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const chatForm = document.getElementById('chat-form');
        const input = document.getElementById('message-input');

        // 根据当前协议确定 WebSocket 协议 (ws 或 wss)
        const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const ws = new WebSocket(`${protocol}://${window.location.host}/ws`);

        ws.onmessage = (event) => {
            const msgDiv = document.createElement('div');
            msgDiv.className = "p-3 border-l-2 border-gray-200 bg-gray-50 animate-in fade-in slide-in-from-left-1";
            msgDiv.textContent = event.data;
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        chatForm.onsubmit = (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                ws.send(input.value);
                input.value = '';
            }
        };

        ws.onopen = () => {
            console.log("Connected to Cloudflare Worker");
        };
    </script>
</body>
</html>
