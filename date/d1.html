<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fragment | 碎片</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --paper-white: #F9F9F7;
            --ink-black: #1A1A1A;
            --muted-gray: #E0E0E0;
            --accent-sage: #8DA399; /* 鼠尾草绿 */
        }

        body {
            background-color: var(--paper-white);
            color: var(--ink-black);
            font-family: "PingFang SC", "Hiragino Sans GB", sans-serif;
            overflow: hidden;
        }

        /* 响应式核心逻辑 */
        .app-grid {
            display: grid;
            height: 100vh;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }

        /* PC端：双栏布局 */
        @media (min-width: 1024px) {
            .app-grid {
                grid-template-columns: 380px 1fr;
                gap: 1px;
                background-color: var(--muted-gray);
            }
            .sidebar { display: flex; background: var(--paper-white); }
            .main-content { background: var(--paper-white); }
            .mobile-nav { display: none; }
        }

        /* 移动端：单栏全屏 */
        @media (max-width: 1023px) {
            .app-grid {
                grid-template-columns: 1fr;
            }
            .sidebar { display: none; }
            .main-content { height: calc(100vh - 70px); }
            .mobile-nav { display: flex; }
        }

        /* 极致清新的卡片设计 */
        .discover-card {
            position: relative;
            aspect-ratio: 3/4;
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
            border-radius: 4px; /* 方正中带微圆，更有设计感 */
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .card-inner {
            height: 100%;
            width: 100%;
            position: relative;
            background: #fff;
        }

        /* 隐藏滚动条 */
        .scroll-hide::-webkit-scrollbar { display: none; }

        /* 按钮悬浮感 */
        .btn-minimal {
            transition: all 0.3s ease;
            mix-blend-mode: multiply;
        }
        .btn-minimal:hover { transform: translateY(-2px); opacity: 0.7; }

        /* 视图切换动画 */
        .fade-in { animation: fadeIn 0.8s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-grid">
        <aside class="sidebar flex-col border-r border-gray-100 p-8">
            <div class="mb-12">
                <h1 class="text-3xl font-extralight tracking-tighter uppercase">Fragment</h1>
                <p class="text-[10px] text-gray-400 tracking-widest mt-2">ESSENTIALISM DATING</p>
            </div>
            
            <nav class="space-y-6 flex-grow">
                <a href="#" class="block text-sm font-light hover:italic transition-all">DISCOVER</a>
                <a href="#" class="block text-sm font-light text-gray-300 hover:text-black">MESSAGES</a>
                <a href="#" class="block text-sm font-light text-gray-300 hover:text-black">COLLECTION</a>
                <a href="#" class="block text-sm font-light text-gray-300 hover:text-black">PROFILE</a>
            </nav>

            <div class="mt-auto pt-8 border-t border-gray-50">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-gray-100 overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=100" class="grayscale">
                    </div>
                    <span class="text-xs tracking-wider">LINUS YU</span>
                </div>
            </div>
        </aside>

        <main class="main-content relative flex flex-col overflow-hidden">
            <header class="lg:hidden p-6 flex justify-between items-center">
                <span class="text-xl font-extralight tracking-tighter">F.</span>
                <div class="w-8 h-8 bg-gray-50 rounded-full flex items-center justify-center">
                    <div class="w-4 h-[1px] bg-black"></div>
                </div>
            </header>

            <div class="flex-grow flex items-center justify-center p-6 lg:p-12">
                <div id="deck-container" class="w-full max-w-4xl grid lg:grid-cols-2 gap-12 items-center">
                    
                    <div class="relative">
                        <div id="active-card" class="discover-card fade-in">
                            <img id="user-img" src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=800" class="w-full h-full object-cover">
                        </div>
                    </div>

                    <div class="info-panel space-y-8">
                        <div>
                            <span class="text-[10px] tracking-[0.3em] text-gray-400 uppercase">Current Muse</span>
                            <h2 id="user-name" class="text-5xl font-extralight mt-2">陈鹿</h2>
                            <p id="user-bio" class="text-sm text-gray-500 font-light leading-relaxed mt-4 max-w-xs">
                                摄影师。喜欢捕捉城市中那些被遗忘的瞬间，希望能遇到一个同样对光影敏感的人。
                            </p>
                        </div>

                        <div class="flex gap-4 pt-4">
                            <button onclick="nextUser()" class="btn-minimal px-8 py-3 bg-black text-white text-[10px] tracking-widest uppercase">
                                Pass
                            </button>
                            <button onclick="nextUser()" class="btn-minimal px-8 py-3 border border-black text-[10px] tracking-widest uppercase">
                                Connect
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <nav class="mobile-nav h-[70px] border-t border-gray-50 flex justify-around items-center px-8 bg-white/50 backdrop-blur-lg">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <svg class="w-5 h-5 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                <div class="w-6 h-6 rounded-full bg-gray-200"></div>
            </nav>
        </main>
    </div>

    <script>
        const users = [
            { name: "陈鹿", bio: "摄影师。喜欢捕捉城市中那些被遗忘的瞬间，希望能遇到一个同样对光影敏感的人。", img: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=800" },
            { name: "安娜", bio: "建筑系学生。比起宏大的叙事，更喜欢观察街道转角处的细节与肌理。", img: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=800" },
            { name: "苏苏", bio: "自由撰稿人。试图通过文字，在喧嚣的世界里找寻一点安静的碎片。", img: "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=800" }
        ];

        let index = 0;

        function nextUser() {
            const card = document.getElementById('active-card');
            const info = document.querySelector('.info-panel');
            
            // 退出动画
            card.style.transform = 'translateY(-20px) rotate(2deg)';
            card.style.opacity = '0';
            info.style.opacity = '0';

            setTimeout(() => {
                index = (index + 1) % users.length;
                document.getElementById('user-img').src = users[index].img;
                document.getElementById('user-name').innerText = users[index].name;
                document.getElementById('user-bio').innerText = users[index].bio;

                // 进入动画
                card.style.transform = 'translateY(10px) rotate(-2deg)';
                setTimeout(() => {
                    card.style.transform = 'translateY(0) rotate(0deg)';
                    card.style.opacity = '1';
                    info.style.opacity = '1';
                }, 50);
            }, 400);
        }

        // 简单的手势支持
        let startX = 0;
        document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            const diff = e.changedTouches[0].clientX - startX;
            if (Math.abs(diff) > 100) nextUser();
        });
    </script>
</body>
</html>
