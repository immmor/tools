<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlassDating Pro - 极致毛玻璃交互</title>
    <style>
        :root {
            --primary: #ff3e7e;
            --secondary: #4facfe;
            --glass: rgba(255, 255, 255, 0.12);
            --border: rgba(255, 255, 255, 0.25);
            --text: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f0c29;
            /* 动态炫光背景 */
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            overflow: hidden;
            perspective: 1000px;
        }

        /* 背景流光装饰 */
        .blob {
            position: absolute;
            width: 400px;
            height: 400px;
            background: linear-gradient(180deg, var(--primary) 0%, #7000ff 100%);
            filter: blur(80px);
            border-radius: 50%;
            z-index: 0;
            animation: move 15s infinite alternate;
        }
        .blob-2 {
            background: var(--secondary);
            right: -100px;
            bottom: -100px;
            animation-delay: -5s;
        }

        @keyframes move {
            from { transform: translate(-50px, -50px); }
            to { transform: translate(150px, 150px); }
        }

        /* 卡片容器 */
        .card-stack {
            position: relative;
            width: 340px;
            height: 520px;
            z-index: 10;
        }

        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            transition: transform 0.5s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.5s;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            user-select: none;
        }

        /* 堆叠效果 */
        .card:nth-child(1) { transform: translateZ(0) translateY(0); z-index: 3; }
        .card:nth-child(2) { transform: scale(0.9) translateY(20px); z-index: 2; opacity: 0.6; }
        .card:nth-child(3) { transform: scale(0.8) translateY(40px); z-index: 1; opacity: 0.3; }

        /* 照片区域 */
        .photo-area {
            width: 100%;
            height: 70%;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 1px solid var(--border);
            position: relative;
        }

        .photo-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .info {
            color: var(--text);
            text-align: left;
        }

        .info h2 { font-size: 1.6rem; margin-bottom: 4px; }
        .info p { font-size: 0.9rem; opacity: 0.8; line-height: 1.5; }

        /* 按钮组 */
        .controls {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
        }

        .icon-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            font-size: 24px;
        }

        .icon-btn:hover {
            background: white;
            color: #333;
            transform: scale(1.1);
        }

        .btn-dislike:hover { color: #ff4b2b; }
        .btn-like:hover { color: #00f2fe; }

        /* 动画类 */
        .swipe-right { transform: translateX(500px) rotate(30deg) !important; opacity: 0 !important; }
        .swipe-left { transform: translateX(-500px) rotate(-30deg) !important; opacity: 0 !important; }

        /* 匹配提示弹窗 */
        .match-toast {
            position: absolute;
            top: 20px;
            padding: 10px 25px;
            background: var(--primary);
            color: white;
            border-radius: 50px;
            font-weight: bold;
            opacity: 0;
            transform: translateY(-20px);
            transition: 0.3s;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div class="blob"></div>
    <div class="blob blob-2"></div>

    <div class="match-toast" id="toast">It's a Match! 🔥</div>

    <div class="card-stack" id="stack">
        <div class="card">
            <div class="photo-area">
                <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=500" alt="user">
            </div>
            <div class="info">
                <h2>Sophia, 22</h2>
                <p>📍 距离 3km · UI/UX 设计师</p>
                <p>生活不只有代码，还有远方的咖啡和夕阳。🎨☕</p>
            </div>
            <div class="controls">
                <div class="icon-btn btn-dislike" onclick="swipe('left')">✕</div>
                <div class="icon-btn btn-like" onclick="swipe('right')">❤</div>
            </div>
        </div>
        <div class="card">
            <div class="photo-area">
                <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=500" alt="user">
            </div>
            <div class="info">
                <h2>Isabella, 25</h2>
                <p>📍 距离 5km · 自由摄影师</p>
                <p>正在寻找能陪我一起去冰岛拍照的那个人。📸❄️</p>
            </div>
            <div class="controls">
                <div class="icon-btn btn-dislike" onclick="swipe('left')">✕</div>
                <div class="icon-btn btn-like" onclick="swipe('right')">❤</div>
            </div>
        </div>
    </div>

    <script>
        const userData = [
            { name: "Mia", age: 23, bio: "喜欢潜水和架子鼓，性格超酷！🥁", img: "https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=500" },
            { name: "Elena", age: 26, bio: "前端开发，希望能找到灵魂契合的队友。💻", img: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=500" }
        ];

        function swipe(direction) {
            const stack = document.getElementById('stack');
            const cards = stack.getElementsByClassName('card');
            
            if (cards.length === 0) return;

            const topCard = cards[0];
            
            // 添加动画类
            topCard.classList.add(direction === 'right' ? 'swipe-right' : 'swipe-left');

            if (direction === 'right') {
                showToast();
            }

            // 移除旧卡片并生成新卡片
            setTimeout(() => {
                topCard.remove();
                if (userData.length > 0) {
                    createNewCard(userData.shift());
                }
            }, 400);
        }

        function createNewCard(data) {
            const stack = document.getElementById('stack');
            const newCard = document.createElement('div');
            newCard.className = 'card';
            newCard.innerHTML = `
                <div class="photo-area">
                    <img src="${data.img}" alt="user">
                </div>
                <div class="info">
                    <h2>${data.name}, ${data.age}</h2>
                    <p>📍 刚刚活跃 · 兴趣匹配</p>
                    <p>${data.bio}</p>
                </div>
                <div class="controls">
                    <div class="icon-btn btn-dislike" onclick="swipe('left')">✕</div>
                    <div class="icon-btn btn-like" onclick="swipe('right')">❤</div>
                </div>
            `;
            stack.appendChild(newCard);
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            toast.style.transform = 'translateY(0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
            }, 1500);
        }
    </script>
</body>
</html>
