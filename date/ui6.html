<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小清新相亲网站图标按钮</title>
    <style>
        :root {
            --color-heart: #ff8fa3;   /* 恋爱粉 */
            --color-chat: #7bc9ff;    /* 沟通蓝 */
            --color-match: #8ae3b6;   /* 契合绿 */
            --color-star: #ffd56b;    /* 收藏黄 */
            --bg-page: #f9fbfd;
        }

        body {
            background-color: var(--bg-page);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        .icon-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            padding: 40px;
            background: #ffffff;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        /* 按钮通用样式 */
        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100px;
            height: 100px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            text-decoration: none;
        }

        .btn span {
            margin-top: 8px;
            font-size: 14px;
            color: #666;
            font-weight: 500;
        }

        .btn svg {
            width: 32px;
            height: 32px;
            transition: transform 0.3s ease;
        }

        /* 悬停效果 */
        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* 专属色彩逻辑 */
        .btn-heart:hover { background-color: #fff5f6; }
        .btn-heart:hover svg { fill: var(--color-heart); transform: scale(1.1); }
        .btn-heart svg { fill: #fabdc8; }

        .btn-chat:hover { background-color: #f0f9ff; }
        .btn-chat:hover svg { fill: var(--color-chat); transform: scale(1.1); }
        .btn-chat svg { fill: #b8e2ff; }

        .btn-match:hover { background-color: #f2fff8; }
        .btn-match:hover svg { fill: var(--color-match); transform: scale(1.1); }
        .btn-match svg { fill: #c1f0d8; }

        .btn-star:hover { background-color: #fffdf2; }
        .btn-star:hover svg { fill: var(--color-star); transform: scale(1.1); }
        .btn-star svg { fill: #ffe9af; }

    </style>
</head>
<body>

<div class="icon-container">
    <button class="btn btn-heart">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
        <span>心动</span>
    </button>

    <button class="btn btn-chat">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/>
        </svg>
        <span>私聊</span>
    </button>

    <button class="btn btn-match">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17 1H7c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-2-2-2zm0 18H7V5h10v14zm-1-6.5l-2.5 3-1.5-1.5L9.5 16h5l2.5-3.5zM12 7c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
        </svg>
        <span>匹配</span>
    </button>

    <button class="btn btn-star">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
        </svg>
        <span>关注</span>
    </button>
</div>

</body>
</html>
