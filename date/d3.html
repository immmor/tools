<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小透明 | 遇见美好</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --cream: #FAF7F2;     /* 奶油色 */
            --sage: #9CAD9A;      /* 鼠尾草绿 */
            --clay: #D4A373;      /* 陶土色 */
            --glass: rgba(255, 255, 255, 0.75);
            --ink: #3D405B;       /* 深青石色（文字） */
        }

        body {
            background-color: var(--cream);
            color: var(--ink);
            font-family: "PingFang SC", "STHeiti", sans-serif;
            overflow: hidden;
            letter-spacing: 0.02em;
        }

        /* 响应式栅格系统 */
        .main-layout {
            display: grid;
            height: 100vh;
            grid-template-columns: 1fr;
        }

        @media (min-width: 1024px) {
            .main-layout {
                grid-template-columns: 350px 1fr 400px;
                background-image: radial-gradient(circle at 20% 20%, #E9EDC9 0%, transparent 40%);
            }
        }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 照片卡片 - 呼吸感动效 */
        .hero-card {
            position: relative;
            width: 100%;
            height: 100%;
            transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .img-container {
            width: 100%;
            height: 100%;
            clip-path: inset(0 0 0 0); /* 默认手机端全屏 */
            transition: all 0.8s ease;
        }

        @media (min-width: 1024px) {
            .img-container {
                width: 90%;
                height: 85%;
                margin: 5vh auto;
                border-radius: 40px;
                clip-path: inset(0 0 0 0 round 40px);
            }
        }

        /* 小清新浮动标签 */
        .vibe-tag {
            padding: 4px 14px;
            background: var(--glass);
            backdrop-filter: blur(8px);
            border: 0.5px solid rgba(255,255,255,0.4);
            border-radius: 100px;
            font-size: 11px;
            color: var(--sage);
            margin: 0 6px 6px 0;
            display: inline-block;
        }

        /* 底部信封资料卡 (手机端) */
        .envelope-panel {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255,255,255,0.3);
            border-radius: 32px 32px 0 0;
            padding: 2.5rem 1.5rem;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            z-index: 40;
        }
        .envelope-panel.active { transform: translateY(0); z-index: 60; }

        /* PC端资料页 */
        .pc-info-panel {
            background: white;
            padding: 4rem 3rem;
            display: none;
            flex-direction: column;
            border-left: 1px solid #EEEAE5;
        }
        @media (min-width: 1024px) { .pc-info-panel { display: flex; } }

        /* 极简按钮 */
        .btn-action {
            width: 50px; height: 50px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #EEE;
            transition: all 0.3s;
        }
        .btn-action:hover { transform: translateY(-3px); border-color: var(--sage); color: var(--sage); }

        /* 背景微光效果 */
        .glow {
            position: absolute;
            width: 300px; height: 300px;
            background: var(--sage);
            filter: blur(100px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="main-layout">
        
        <aside class="hidden lg:flex flex-col p-10 bg-white/30 backdrop-blur-sm">
            <h1 class="text-2xl font-light tracking-[0.2em] mb-12">遇见 / <span class="text-stone-400">MEET</span></h1>
            <nav class="space-y-8">
                <div class="group cursor-pointer">
                    <span class="text-xs text-gray-400 block mb-1">01</span>
                    <span class="text-sm tracking-widest border-b border-black pb-1">每日精选</span>
                </div>
                <div class="group cursor-pointer text-gray-300 hover:text-black transition">
                    <span class="text-xs block mb-1">02</span>
                    <span class="text-sm tracking-widest">灵魂匹配</span>
                </div>
                <div class="group cursor-pointer text-gray-300 hover:text-black transition">
                    <span class="text-xs block mb-1">03</span>
                    <span class="text-sm tracking-widest">附近动态</span>
                </div>
            </nav>
            
            <div class="mt-auto">
                <p class="text-[10px] text-gray-400 tracking-[0.3em] uppercase mb-4">Filtering</p>
                <div class="flex flex-wrap gap-2">
                    <span class="vibe-tag">杭州</span><span class="vibe-tag">170cm+</span><span class="vibe-tag">猫派</span>
                </div>
            </div>
        </aside>

        <main class="relative overflow-hidden flex items-center justify-center">
            <div class="glow top-20 right-20"></div>
            
            <div class="hero-card" id="card">
                <div class="img-container shadow-sm">
                    <img id="main-img" src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=1200" class="w-full h-full object-cover">
                </div>

                <div class="envelope-panel lg:hidden" id="drawer">
                    <div class="w-10 h-1 bg-stone-200 rounded-full mx-auto mb-8 opacity-50 cursor-pointer" onclick="toggleDrawer()"></div>
                    <div class="flex justify-between items-end mb-6">
                        <div>
                            <h2 class="text-3xl font-extralight tracking-tight">苏青野 <span class="text-sm text-stone-300 ml-2">24</span></h2>
                            <p class="text-xs text-stone-400 mt-2 tracking-widest uppercase">UX Designer · 杭州</p>
                        </div>
                        <div class="text-right">
                            <span class="text-xs font-mono text-sage block">89.5%</span>
                            <span class="text-[10px] text-stone-300 uppercase">Match</span>
                        </div>
                    </div>
                    <div class="flex flex-wrap mb-8">
                        <span class="vibe-tag">独立思考</span><span class="vibe-tag">胶片摄影</span><span class="vibe-tag">三只猫</span><span class="vibe-tag">INFJ</span>
                    </div>
                    <p class="text-sm leading-relaxed text-stone-500 font-light italic">
                        “万物皆有裂痕，那是光照进来的地方。”
                    </p>
                </div>
            </div>

            <div class="absolute bottom-10 flex gap-6 z-50">
                <button onclick="nextUser()" class="btn-action text-gray-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                <button onclick="showInfo()" class="btn-action text-gray-400"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></button>
                <button onclick="nextUser()" class="btn-action text-white bg-stone-800 border-none shadow-xl shadow-stone-200"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button>
            </div>
        </main>

        <aside class="pc-info-panel no-scrollbar">
            <section class="mb-12">
                <h3 class="text-[10px] tracking-[0.4em] text-gray-300 uppercase mb-6">Introduction</h3>
                <h2 class="text-4xl font-extralight mb-4">苏青野</h2>
                <div class="flex gap-4 text-xs text-gray-400 mb-8">
                    <span>24岁</span><span>/</span><span>168cm</span><span>/</span><span>浙大硕士</span>
                </div>
                <p class="text-sm leading-loose text-gray-500 font-light">
                    比起热闹的社交，更倾向于在雨后的下午读一本旧书。正在寻找那个可以一起安静发呆，也能一起深度交流的灵魂。
                </p>
            </section>

            <section class="mb-12">
                <h3 class="text-[10px] tracking-[0.4em] text-gray-300 uppercase mb-6">Lifestyle</h3>
                <div class="space-y-4">
                    <div class="flex justify-between items-center pb-2 border-b border-stone-100">
                        <span class="text-xs text-gray-400">生活作息</span>
                        <span class="text-xs text-stone-600">早起鸟</span>
                    </div>
                    <div class="flex justify-between items-center pb-2 border-b border-stone-100">
                        <span class="text-xs text-gray-400">宠物</span>
                        <span class="text-xs text-stone-600">三只性格迥异的猫</span>
                    </div>
                    <div class="flex justify-between items-center pb-2 border-b border-stone-100">
                        <span class="text-xs text-gray-400">性格色彩</span>
                        <span class="text-xs text-stone-600">淡绿 (温润包容)</span>
                    </div>
                </div>
            </section>

            <div class="mt-auto flex items-center gap-4 group cursor-pointer">
                <div class="w-10 h-10 rounded-full border border-stone-100 flex items-center justify-center group-hover:bg-stone-50 transition">
                    <svg class="w-4 h-4 text-stone-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
                </div>
                <span class="text-xs tracking-widest uppercase text-stone-400 group-hover:text-stone-800 transition">私信联系</span>
            </div>
        </aside>

    </div>

    <script>
        function toggleDrawer() {
            const drawer = document.getElementById('drawer');
            drawer.classList.toggle('active');
        }

        function showInfo() {
            toggleDrawer();
        }

        function nextUser() {
            const card = document.getElementById('card');
            const img = document.getElementById('main-img');

            card.style.opacity = '0';
            card.style.transform = 'scale(1.05)';

            setTimeout(() => {
                img.src = "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=1200&t=" + Date.now();
                card.style.opacity = '1';
                card.style.transform = 'scale(1)';
            }, 500);
        }

        window.addEventListener('wheel', (e) => {
            if (window.innerWidth > 1024 && e.deltaY > 0) {
                // 向下滚动的模拟逻辑
            }
        });
    </script>
</body>
</html>
