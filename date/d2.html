<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遇见 | Meet Pure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --soft-white: #FBF9F7;
            --moss-green: #9EB3A0;
            --ink-gray: #4A4A4A;
            --line-color: #EAE5E0;
        }

        body {
            background-color: var(--soft-white);
            color: var(--ink-gray);
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* 响应式框架：Mobile first */
        .app-container {
            display: grid;
            height: 100vh;
            grid-template-columns: 1fr; /* 默认手机端单栏 */
        }

        @media (min-width: 1024px) {
            .app-container {
                grid-template-columns: 320px 1fr; /* 电脑端侧边栏 */
            }
        }

        /* 侧边栏样式 */
        .sidebar {
            background: white;
            border-right: 1px solid var(--line-color);
            padding: 2.5rem;
            display: none; /* 手机端隐藏 */
            flex-direction: column;
        }

        @media (min-width: 1024px) {
            .sidebar { display: flex; }
        }

        /* 沉浸式卡片区域 */
        .content-main {
            position: relative;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* 手机端全屏卡片设计 */
        .mobile-card {
            position: relative;
            height: 100vh;
            width: 100%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 电脑端卡片调整 */
        @media (min-width: 1024px) {
            .mobile-card {
                height: 90vh;
                margin: 5vh auto;
                width: 90%;
                max-width: 1000px;
                flex-direction: row; /* 电脑端横向 */
                background: white;
                border-radius: 20px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.02);
            }
        }

        /* 照片墙 */
        .photo-section {
            flex: 1;
            position: relative;
            height: 100%;
        }

        /* 资料抽屉（手机端向上滑，电脑端常驻右侧） */
        .info-drawer {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 24px 24px 0 0;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            max-height: 45%;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 20;
        }

        @media (min-width: 1024px) {
            .info-drawer {
                position: static;
                width: 400px;
                max-height: 100%;
                border-radius: 0;
                background: white;
                border-left: 1px solid var(--line-color);
                padding: 3rem;
                overflow-y: auto;
            }
        }

        /* 标签小清新样式 */
        .tag {
            padding: 4px 12px;
            background: #F0F2F0;
            border-radius: 100px;
            font-size: 12px;
            color: var(--moss-green);
            display: inline-block;
            margin: 0 8px 8px 0;
        }

        /* 底部操作按钮：悬浮感 */
        .action-bar {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 50;
        }

        .btn-round {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            color: var(--moss-green);
            transition: all 0.2s;
        }

        .btn-round:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="app-container">
        
        <aside class="sidebar">
            <h1 class="text-xl font-medium tracking-widest mb-10 text-stone-400">MEET / 遇见</h1>
            <nav class="space-y-6">
                <div class="text-sm font-medium border-l-2 border-stone-800 pl-4">推荐</div>
                <div class="text-sm text-stone-300 pl-4 hover:text-stone-500 cursor-pointer transition">附近</div>
                <div class="text-sm text-stone-300 pl-4 hover:text-stone-500 cursor-pointer transition">故事</div>
            </nav>
            
            <div class="mt-auto">
                <div class="text-[10px] text-stone-300 uppercase tracking-tighter mb-4">Preference / 偏好</div>
                <div class="flex flex-wrap">
                    <span class="tag">90后</span><span class="tag">本科</span><span class="tag">不抽烟</span>
                </div>
            </div>
        </aside>

        <main class="content-main no-scrollbar">
            
            <div class="mobile-card" id="user-1">
                <div class="photo-section">
                    <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=1200" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-black/20 lg:hidden"></div>
                </div>

                <div class="info-drawer" id="drawer">
                    <div class="w-8 h-1 bg-gray-200 rounded-full mx-auto mb-6 lg:hidden"></div>
                    
                    <div class="mb-6">
                        <div class="flex items-center justify-between">
                            <h2 class="text-2xl font-light">林婉清 <span class="text-sm text-gray-300 ml-2">24 / 杭州</span></h2>
                            <span class="text-xs text-stone-400 font-mono">92% Match</span>
                        </div>
                        <p class="text-xs text-stone-400 mt-2 tracking-widest">UX设计师 / 喜欢猫、油画与慢跑</p>
                    </div>

                    <div class="space-y-6">
                        <div>
                            <h4 class="text-[10px] uppercase tracking-widest text-gray-300 mb-3">About Me / 个人独白</h4>
                            <p class="text-sm leading-relaxed text-stone-500 font-light">
                                希望能遇到一个可以一起吃早餐，在周末一起去画展的人。生活不需要太快，但每一步都要走得踏实。
                            </p>
                        </div>
                        
                        <div>
                            <h4 class="text-[10px] uppercase tracking-widest text-gray-300 mb-3">Interests / 标签</h4>
                            <div class="flex flex-wrap">
                                <span class="tag">电影</span><span class="tag">咖啡控</span><span class="tag">胶片摄影</span><span class="tag">JAZZ</span>
                            </div>
                        </div>
                    </div>

                    <div class="hidden lg:flex gap-4 mt-10">
                        <button class="flex-1 py-3 bg-stone-800 text-white text-xs tracking-widest uppercase rounded-sm hover:bg-stone-700 transition">Say Hello</button>
                        <button class="w-12 border border-stone-200 flex items-center justify-center rounded-sm hover:bg-stone-50 transition">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>
                        </button>
                    </div>
                </div>
            </div>

        </main>

        <div class="action-bar lg:hidden">
            <button class="btn-round" onclick="swipe('left')">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5"><path d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <button class="btn-round bg-stone-800 !text-white" onclick="swipe('right')">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </button>
        </div>

    </div>

    <script>
        // 手机端抽屉滑动交互
        let startY = 0;
        const drawer = document.getElementById('drawer');

        drawer.addEventListener('touchstart', e => {
            startY = e.touches[0].clientY;
        });

        drawer.addEventListener('touchmove', e => {
            const currentY = e.touches[0].clientY;
            const diff = startY - currentY;
            
            // 向上滑展开详情
            if (diff > 50) {
                drawer.style.maxHeight = '80%';
            } 
            // 向下滑收起详情
            else if (diff < -50) {
                drawer.style.maxHeight = '45%';
            }
        });

        function swipe(dir) {
            const card = document.getElementById('user-1');
            const offset = dir === 'left' ? '-100%' : '100%';
            card.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s';
            card.style.transform = `translateX(${offset}) rotate(${dir==='left'?-10:10}deg)`;
            card.style.opacity = '0';
            
            setTimeout(() => {
                alert("匹配下一位清新伙伴...");
                card.style.transform = 'none';
                card.style.opacity = '1';
            }, 600);
        }
    </script>
</body>
</html>
