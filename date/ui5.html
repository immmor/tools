<style>
    /* 核心样式定义 */
    .fresh-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 16px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(10px);
        border-radius: 40px;
    }

    .btn-fresh {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        border: none;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        background: #ffffff;
        box-shadow: 0 6px 12px rgba(0, 0, 0, 0.04);
    }

    .btn-fresh:hover {
        transform: translateY(-4px) scale(1.05);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
    }

    .btn-fresh:active {
        transform: scale(0.9);
    }

    /* 不同按钮的颜色配置 */
    .btn-undo { width: 50px; height: 50px; border-radius: 16px; color: #ffca3a; } /* 黄色-撤回 */
    .btn-dislike { width: 60px; height: 60px; border-radius: 20px; color: #94a3b8; } /* 灰色-无感 */
    .btn-filter { width: 50px; height: 50px; border-radius: 16px; color: #8ac926; } /* 绿色-筛选 */
    .btn-info { width: 50px; height: 50px; border-radius: 16px; color: #1982c4; } /* 蓝色-资料 */
    .btn-like { width: 70px; height: 70px; border-radius: 24px; color: #ff595e; } /* 红色-心动 */

    /* 喜欢按钮的特殊光效 */
    .btn-like::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 24px;
        background: radial-gradient(circle, rgba(255,89,94,0.1) 0%, transparent 70%);
        opacity: 0;
        transition: opacity 0.3s;
    }
    .btn-like:hover::after { opacity: 1; }
</style>

<div class="fresh-container">
    <button onclick="handleUndo()" class="btn-fresh btn-undo" title="撤回">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg>
    </button>

    <button onclick="handleBtnSwipe('left')" class="btn-fresh btn-dislike" title="不喜欢">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>

    <button onclick="openFilter()" class="btn-fresh btn-filter" title="筛选">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="21" x2="4" y2="14"></line><line x1="4" y1="10" x2="4" y2="3"></line><line x1="12" y1="21" x2="12" y2="12"></line><line x1="12" y1="8" x2="12" y2="3"></line><line x1="20" y1="21" x2="20" y2="16"></line><line x1="20" y1="12" x2="20" y2="3"></line><line x1="1" y1="14" x2="7" y2="14"></line><line x1="9" y1="8" x2="15" y2="8"></line><line x1="17" y1="16" x2="23" y2="16"></line></svg>
    </button>

    <button onclick="toggleCardInfo()" class="btn-fresh btn-info" title="查看资料">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
    </button>

    <button onclick="handleBtnSwipe('right')" class="btn-fresh btn-like" title="喜欢">
        <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
    </button>
</div>
