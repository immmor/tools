    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #fb7185;
            --primary-dark: #f43f5e;
            --primary-light: #fda4af;
            --primary-bg: #fef2f2;
        }
        body { background-color: #fdf2f8; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; padding-bottom: 80px; }
        
        .deck-container {
            position: relative;
            width: 400px;
            height: calc(100vh - 170px);
            margin: 0.3vh auto;
        }

        .card {
            position: absolute;
            inset: 0;
            background: white;
            border-radius: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            overflow: hidden;
            user-select: none;
            touch-action: none;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s;
        }

        /* 顶部照片进度条 */
        .progress-container {
            position: absolute;
            top: 12px; left: 12px; right: 12px;
            display: flex; gap: 4px; z-index: 50;
        }
        .progress-bar { height: 3px; flex: 1; background: rgba(255,255,255,0.3); border-radius: 2px; }
        .progress-bar.active { background: white; box-shadow: 0 0 5px rgba(0,0,0,0.2); }

        /* 点击区域指示 */
        .tap-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 80%;
            z-index: 40; display: flex;
        }
        .tap-left, .tap-right { flex: 1; height: 100%; }

        /* 底部信息阴影 */
        .info-scrim {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 40px 20px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            color: white; pointer-events: none; z-index: 45;
        }

        /* 侧边标签 */
        .card-label {
            position: absolute;
            top: 60px; padding: 4px 12px;
            border: 4px solid; border-radius: 8px;
            font-size: 2rem; font-weight: 900;
            text-transform: uppercase; opacity: 0; z-index: 60;
        }
        .label-like { color: #4ade80; border-color: #4ade80; left: 30px; transform: rotate(-20deg); }
        .label-nope { color: #f87171; border-color: #f87171; right: 30px; transform: rotate(20deg); }

        /* 电脑端适配 */
        @media (min-width: 768px) {
            body { background: #fce7f3; }
            #chat-list-interface, #chat-interface, #profile-interface, .history-content {
                max-width: 480px;
                left: 50%;
                transform: translateX(-50%);
                position: relative;
            }
            .match-avatar { width: 120px !important; height: 120px !important; }
        }
        @media (max-width: 767px) {
            .match-avatar { width: 80px !important; height: 80px !important; }
        }
    </style>
</head>

            { id: 15, name: '欣怡', age: 25, job: '编辑', height: 163, constellation: '天蝎座', bloodType: 'O型', education: '本科', hobby: '写作、电影、旅行', bio: '用文字记录生活，喜欢沉浸在故事里。期待遇见能一起分享故事的你～', photos: ['https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=500', 'https://images.unsplash.com/photo-1531123897727-8f129e1688ce?w=500'] },
            { id: 16, name: '宇轩', age: 27, job: '金融分析师', height: 176, constellation: '双子座', bloodType: 'B型', education: '硕士', hobby: '投资、高尔夫、阅读', bio: '理性分析市场，感性对待生活。希望找到能一起规划未来的你～', photos: ['https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=500', 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=500'] },
            { id: 17, name: '雨萱', age: 23, job: '空乘', height: 170, constellation: '射手座', bloodType: 'A型', education: '本科', hobby: '旅行、美食、摄影', bio: '飞遍世界各地，期待在旅途中遇见对的人～', photos: ['https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=500', 'https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=500'] },
            { id: 18, name: '明轩', age: 28, job: '音乐人', height: 179, constellation: '天秤座', bloodType: 'O型', education: '本科', hobby: '音乐、吉他、旅行', bio: '用音乐表达情感，希望找到能听懂我歌声的你～', photos: ['https://images.unsplash.com/photo-1515602195436-756a5c0d0677?w=500', 'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=500'] }
        ];

        let stack = [];

        function init() {
            userData.forEach((user, idx) => {
                const card = createCard(user, idx);
                document.getElementById('deck').appendChild(card);
                stack.push(card);
            });
        }

        function createCard(user, idx) {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.zIndex = userData.length - idx;
            card.dataset.userId = user.id;
            card.dataset.photoIdx = 0;

            card.innerHTML = `
                <div class="label-like card-label">LIKE</div>
                <div class="label-nope card-label">NOPE</div>
                <div class="progress-container">
                    ${user.photos.map((_, i) => `<div class="progress-bar ${i===0?'active':''}"></div>`).join('')}
                </div>
                <div class="tap-overlay">
                    <div class="tap-left" onclick="changePhoto(event, -1)"></div>
                    <div class="tap-right" onclick="changePhoto(event, 1)"></div>
                </div>
                <img src="${user.photos[0]}" class="w-full h-full object-cover main-img">
                <div class="info-scrim">
                    <h2 class="text-2xl font-bold">${user.name}, ${user.age}</h2>
                    <p class="text-sm opacity-80">${user.job || user.bio}</p>
                </div>
            `;

            setupDrag(card);
            return card;
        }

        // 核心：点击切换图片
        window.changePhoto = function(e, dir) {
            e.stopPropagation();
            const card = e.currentTarget.closest('.card');
            const user = userData.find(u => u.id == card.dataset.userId);
            let pIdx = parseInt(card.dataset.photoIdx);
            
            pIdx = (pIdx + dir + user.photos.length) % user.photos.length;
            card.dataset.photoIdx = pIdx;
            
            card.querySelector('.main-img').src = user.photos[pIdx];
            const bars = card.querySelectorAll('.progress-bar');
            bars.forEach((b, i) => b.classList.toggle('active', i === pIdx));
        };

        // 核心：处理拖拽与点击冲突
        function setupDrag(card) {
            let startX, startY, moveX, isDragging = false;
            let startTime;

            const onStart = (e) => {
                isDragging = true;
                startTime = Date.now();
                const touch = e.type === 'touchstart' ? e.touches[0] : e;
                startX = touch.pageX;
                startY = touch.pageY;
                card.style.transition = 'none';
            };

            const onMove = (e) => {
                if (!isDragging) return;
                const touch = e.type === 'touchmove' ? e.touches[0] : e;
                moveX = touch.pageX - startX;
                const moveY = touch.pageY - startY;

                // 只有水平位移超过一定距离，才认为是在拖拽
                if (Math.abs(moveX) > 10) {
                    const rotation = moveX / 15;
                    card.style.transform = `translate(${moveX}px, ${moveY/5}px) rotate(${rotation}deg)`;
                    
                    // 显示 Like/Nope 标签
                    const like = card.querySelector('.label-like');
                    const nope = card.querySelector('.label-nope');
                    if (moveX > 50) {
                        like.style.opacity = Math.min(moveX / 150, 1);
                        nope.style.opacity = 0;
                    } else if (moveX < -50) {
                        nope.style.opacity = Math.min(Math.abs(moveX) / 150, 1);
                        like.style.opacity = 0;
                    }
                }
            };

            const onEnd = (e) => {
                if (!isDragging) return;
                isDragging = false;
                const duration = Date.now() - startTime;

                // 判断逻辑：如果移动距离很短 且 时间很短，不触发滑动，让点击事件生效
                if (Math.abs(moveX) < 15 || duration < 100) {
                    card.style.transition = 'transform 0.4s ease';
                    card.style.transform = '';
                    card.querySelectorAll('.card-label').forEach(l => l.style.opacity = 0);
                    return;
                }

                if (Math.abs(moveX) > 120) {
                    completeSwipe(card, moveX > 0 ? 'right' : 'left');
                } else {
                    card.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    card.style.transform = '';
                    card.querySelectorAll('.card-label').forEach(l => l.style.opacity = 0);
                }
                moveX = 0;
            };

            card.addEventListener('mousedown', onStart);
            card.addEventListener('touchstart', onStart, {passive: true});
            window.addEventListener('mousemove', onMove);
            window.addEventListener('touchmove', onMove, {passive: false});
            window.addEventListener('mouseup', onEnd);
            window.addEventListener('touchend', onEnd);
        }

        let swipeHistory = [];

        function completeSwipe(card, dir) {
            const x = dir === 'right' ? 1000 : -1000;
            card.style.transition = 'all 0.6s ease-in';
            card.style.transform = `translate(${x}px, 0) rotate(${dir === 'right' ? 45 : -45}deg)`;
            card.style.opacity = '0';
            
            const user = userData.find(u => u.id == card.dataset.userId);
            swipeHistory.push({ user, dir });
            
            stack = stack.filter(c => c !== card);
            setTimeout(() => card.remove(), 600);

            if (dir === 'right' && stack.length > 0) {
                showMatchEffect();
            } else if (stack.length === 0) {
                document.getElementById('deck').style.display = 'none';
                const emptyState = document.getElementById('empty-state');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            }
        }

                        <div class="match-avatar" style="border-radius: 50%; background: url('https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=200') center/cover; box-shadow: 0 10px 30px rgba(0,0,0,0.3); flex-shrink: 0;"></div>

                    <p style="color: white; font-size: 1.5rem; margin-bottom: 3rem;">你们彼此喜欢，开始聊天吧！</p>
                    <div style="display: flex; flex-direction: column; gap: 1rem; width: 100%; max-w: 300px;">
                        <button onclick="startChatFromMatch()" style="padding: 1.2rem 3.5rem; background: white; border-radius: 50px; font-size: 1.3rem; font-weight: bold; color: #f43f5e; box-shadow: 0 15px 35px rgba(0,0,0,0.3); transition: all 0.3s; transform: rotate(-5deg); cursor: pointer;" onmouseover="this.style.transform='scale(1.1) rotate(-5deg)'; this.style.boxShadow='0 20px 40px rgba(0,0,0,0.4)'" onmouseout="this.style.transform='scale(1) rotate(-5deg)'; this.style.boxShadow='0 15px 35px rgba(0,0,0,0.3)'">
                            <i class="fas fa-comment-dots" style="margin-right: 0.5rem;"></i>开始聊天
                        </button>
                        <button onclick="closeMatch()" style="padding: 1rem 2.5rem; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); border-radius: 50px; font-size: 1.1rem; font-weight: bold; color: white; backdrop-filter: blur(10px); transition: all 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.3)'; this.style.borderColor='rgba(255,255,255,0.6)'" onmouseout="this.style.background='rgba(255,255,255,0.2)'; this.style.borderColor='rgba(255,255,255,0.4)'">
                            <i class="fas fa-user-friends" style="margin-right: 0.5rem;"></i>继续浏览
                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(matchDiv);
        }

        function closeMatch() {
            const matchDiv = document.querySelector('[style*="z-index: 1000"]');
            if (matchDiv) matchDiv.remove();
        }

        let fromMatch = false;

        function startChatFromMatch() {

        window.openSwipeHistory = function() {

        window.openFilter = function() {

                </div>

            document.body.appendChild(filterDiv);

        window.setFilter = function(type, value) {
            const btns = document.querySelectorAll(`[id^="filter-"]`);
            btns.forEach(btn => {
                if (btn.id.startsWith('filter-') && !btn.id.includes('age') && !btn.id.includes('distance')) {
                    btn.className = btn.className.replace('bg-pink-500 text-white', 'bg-gray-200 text-gray-700');
                }
            });
            document.getElementById(`filter-${value}`).className = document.getElementById(`filter-${value}`).className.replace('bg-gray-200 text-gray-700', 'bg-pink-500 text-white');
        };

        window.applyFilter = function() {
            const gender = document.querySelector('[id^="filter-"].bg-pink-500')?.id.replace('filter-', '') || 'all';
            const ageMin = parseInt(document.getElementById('filter-age-min').value) || 18;
            const ageMax = parseInt(document.getElementById('filter-age-max').value) || 40;
            const distance = parseInt(document.getElementById('filter-distance').value) || 50;
            
            const filteredData = userData.filter(u => {
                const age = u.age;
                return age >= ageMin && age <= ageMax;
            });
            
            if (filteredData.length < userData.length) {
                document.getElementById('deck').innerHTML = '';
                stack = [];
                filteredData.forEach((user, idx) => {
                    const card = createCard(user, idx);
                    document.getElementById('deck').appendChild(card);
                    stack.push(card);
                });
            }
        };

        window.toggleCardInfo = function() {
            const topCard = stack.reduce((max, card) => {
                return parseInt(card.style.zIndex) > parseInt(max.style.zIndex) ? card : max;
            }, stack[0]);
            if (!topCard) return;
            
            const user = userData.find(u => u.id == topCard.dataset.userId);
            const infoScrim = topCard.querySelector('.info-scrim');
            const currentContent = infoScrim.innerHTML;
            
            if (currentContent.includes(user.hobby)) {
                infoScrim.innerHTML = `<h2 class="text-2xl font-bold">${user.name}, ${user.age}</h2><p class="text-sm opacity-80">${user.job || user.bio}</p>`;
            } else {
                infoScrim.innerHTML = `
                    <h2 class="text-2xl font-bold">${user.name}, ${user.age}</h2>
                    <p class="text-sm opacity-80 mb-1">${user.job}</p>
                    <p class="text-xs mb-1">${user.height}cm · ${user.constellation} · ${user.bloodType}</p>

                    <p class="text-xs mb-1">爱好: ${user.hobby}</p>
                    <p class="text-xs mt-2 leading-relaxed">${user.bio}</p>
                `;
            }
        };

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes popIn { 0% { transform: scale(0); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        `;
        document.head.appendChild(style);

        function handleBtnSwipe(dir) {
            const topCard = stack.reduce((max, card) => {
                return parseInt(card.style.zIndex) > parseInt(max.style.zIndex) ? card : max;
            }, stack[0]);
            if (topCard) {
                topCard.querySelector(`.label-${dir === 'right' ? 'like' : 'nope'}`).style.opacity = 1;
                completeSwipe(topCard, dir);
            }
        }

        init();
    </script>
