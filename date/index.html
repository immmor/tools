<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HiGo Pro | 极致交互</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f1f5f9; font-family: system-ui, -apple-system, sans-serif; overflow-x: hidden; padding-bottom: 80px; }
        
        .deck-container {
            position: relative;
            width: 400px;
            height: calc(100vh - 180px);
            margin: 1vh auto;
        }

        .card {
            position: absolute;
            inset: 0;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
            user-select: none;
            touch-action: none;
            transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.3s;
        }

        /* 顶部照片进度条 */
        .progress-container {
            position: absolute;
            top: 12px; left: 12px; right: 12px;
            display: flex; gap: 4px; z-index: 50;
        }
        .progress-bar { height: 3px; flex: 1; background: rgba(255,255,255,0.3); border-radius: 2px; }
        .progress-bar.active { background: white; box-shadow: 0 0 5px rgba(0,0,0,0.2); }

        /* 点击区域指示 */
        .tap-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 80%;
            z-index: 40; display: flex;
        }
        .tap-left, .tap-right { flex: 1; height: 100%; }

        /* 底部信息阴影 */
        .info-scrim {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 40px 20px 20px;
            background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
            color: white; pointer-events: none; z-index: 45;
        }

        /* 侧边标签 */
        .card-label {
            position: absolute;
            top: 60px; padding: 4px 12px;
            border: 4px solid; border-radius: 8px;
            font-size: 2rem; font-weight: 900;
            text-transform: uppercase; opacity: 0; z-index: 60;
        }
        .label-like { color: #4ade80; border-color: #4ade80; left: 30px; transform: rotate(-20deg); }
        .label-nope { color: #f87171; border-color: #f87171; right: 30px; transform: rotate(20deg); }

        /* 电脑端适配 */
        @media (min-width: 768px) {
            body { background: #e2e8f0; }
            #chat-list-interface, #chat-interface, #profile-interface {
                max-width: 480px;
                left: 50%;
                transform: translateX(-50%);
            }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

        </div>

    <main class="flex-grow flex items-center justify-center p-4">
        <div class="deck-container" id="deck"></div>
        <div id="empty-state" class="hidden flex-col items-center justify-center text-center space-y-4">

    <div id="profile-interface" class="flex flex-col h-screen fixed inset-0 z-50 bg-white" style="display: none;">

                        <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?w=300" class="w-full h-full object-cover">
                    </div>
                    <div class="aspect-square rounded-xl bg-gray-200 overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=300" class="w-full h-full object-cover">
                    </div>

    <script>
        const userData = [
            { id: 1, name: '苏苏', age: 22, job: '大学生', height: 165, constellation: '天秤座', bloodType: 'A型', education: '本科在读', hobby: '摄影、旅行、咖啡', bio: '比起看海，更喜欢和你一起看海。喜欢摄影和旅行，希望遇到志同道合的朋友～', photos: ['https://images.unsplash.com/photo-1517841905240-472988babdf9?w=500', 'https://images.unsplash.com/photo-1524504388940-b1c1722653e1?w=500'] },
            { id: 2, name: '阿泽', age: 25, job: '自由摄影师', height: 178, constellation: '射手座', bloodType: 'O型', education: '硕士', hobby: '户外、摄影、徒步', bio: '用镜头记录生活，喜欢户外和摄影。期待与你一起探索世界的美好～', photos: ['https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=500', 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=500'] },
            { id: 3, name: '琳达', age: 24, job: '咖啡师', height: 162, constellation: '双鱼座', bloodType: 'B型', education: '本科', hobby: '咖啡、阅读、瑜伽', bio: '一杯咖啡，一本书，享受宁静的时光。热爱生活，期待遇见有趣的你～', photos: ['https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?w=500', 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=500'] }
        ];

        let stack = [];

        function init() {
            userData.forEach((user, idx) => {
                const card = createCard(user, idx);
                document.getElementById('deck').appendChild(card);
                stack.push(card);
            });
        }

        function createCard(user, idx) {
            const card = document.createElement('div');
            card.className = 'card';
            card.style.zIndex = userData.length - idx;
            card.dataset.userId = user.id;
            card.dataset.photoIdx = 0;

            card.innerHTML = `
                <div class="label-like card-label">LIKE</div>
                <div class="label-nope card-label">NOPE</div>
                <div class="progress-container">
                    ${user.photos.map((_, i) => `<div class="progress-bar ${i===0?'active':''}"></div>`).join('')}
                </div>
                <div class="tap-overlay">
                    <div class="tap-left" onclick="changePhoto(event, -1)"></div>
                    <div class="tap-right" onclick="changePhoto(event, 1)"></div>
                </div>
                <img src="${user.photos[0]}" class="w-full h-full object-cover main-img">
                <div class="info-scrim">
                    <h2 class="text-2xl font-bold">${user.name}, ${user.age}</h2>
                    <p class="text-sm opacity-80">${user.job || user.bio}</p>
                </div>
            `;

            setupDrag(card);
            return card;
        }

        // 核心：点击切换图片
        window.changePhoto = function(e, dir) {
            e.stopPropagation();
            const card = e.currentTarget.closest('.card');
            const user = userData.find(u => u.id == card.dataset.userId);
            let pIdx = parseInt(card.dataset.photoIdx);
            
            pIdx = (pIdx + dir + user.photos.length) % user.photos.length;
            card.dataset.photoIdx = pIdx;
            
            card.querySelector('.main-img').src = user.photos[pIdx];
            const bars = card.querySelectorAll('.progress-bar');
            bars.forEach((b, i) => b.classList.toggle('active', i === pIdx));
        };

        // 核心：处理拖拽与点击冲突
        function setupDrag(card) {
            let startX, startY, moveX, isDragging = false;
            let startTime;

            const onStart = (e) => {
                isDragging = true;
                startTime = Date.now();
                const touch = e.type === 'touchstart' ? e.touches[0] : e;
                startX = touch.pageX;
                startY = touch.pageY;
                card.style.transition = 'none';
            };

            const onMove = (e) => {
                if (!isDragging) return;
                const touch = e.type === 'touchmove' ? e.touches[0] : e;
                moveX = touch.pageX - startX;
                const moveY = touch.pageY - startY;

                // 只有水平位移超过一定距离，才认为是在拖拽
                if (Math.abs(moveX) > 10) {
                    const rotation = moveX / 15;
                    card.style.transform = `translate(${moveX}px, ${moveY/5}px) rotate(${rotation}deg)`;
                    
                    // 显示 Like/Nope 标签
                    const like = card.querySelector('.label-like');
                    const nope = card.querySelector('.label-nope');
                    if (moveX > 50) {
                        like.style.opacity = Math.min(moveX / 150, 1);
                        nope.style.opacity = 0;
                    } else if (moveX < -50) {
                        nope.style.opacity = Math.min(Math.abs(moveX) / 150, 1);
                        like.style.opacity = 0;
                    }
                }
            };

            const onEnd = (e) => {
                if (!isDragging) return;
                isDragging = false;
                const duration = Date.now() - startTime;

                // 判断逻辑：如果移动距离很短 且 时间很短，不触发滑动，让点击事件生效
                if (Math.abs(moveX) < 15 || duration < 100) {
                    card.style.transition = 'transform 0.4s ease';
                    card.style.transform = '';
                    card.querySelectorAll('.card-label').forEach(l => l.style.opacity = 0);
                    return;
                }

                if (Math.abs(moveX) > 120) {
                    completeSwipe(card, moveX > 0 ? 'right' : 'left');
                } else {
                    card.style.transition = 'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                    card.style.transform = '';
                    card.querySelectorAll('.card-label').forEach(l => l.style.opacity = 0);
                }
                moveX = 0;
            };

            card.addEventListener('mousedown', onStart);
            card.addEventListener('touchstart', onStart, {passive: true});
            window.addEventListener('mousemove', onMove);
            window.addEventListener('touchmove', onMove, {passive: false});
            window.addEventListener('mouseup', onEnd);
            window.addEventListener('touchend', onEnd);
        }

        function completeSwipe(card, dir) {
            const x = dir === 'right' ? 1000 : -1000;
            card.style.transition = 'all 0.6s ease-in';
            card.style.transform = `translate(${x}px, 0) rotate(${dir === 'right' ? 45 : -45}deg)`;
            card.style.opacity = '0';
            stack = stack.filter(c => c !== card);
            setTimeout(() => card.remove(), 600);

            if (dir === 'right' && stack.length > 0) {
                showMatchEffect();
            } else if (stack.length === 0) {
                document.getElementById('deck').style.display = 'none';
                const emptyState = document.getElementById('empty-state');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            }
        }

        function showMatchEffect() {
            const matchDiv = document.createElement('div');
            matchDiv.style.cssText = `
                position: fixed;
                top: 0; left: 0; width: 100%; height: 100%;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                z-index: 1000;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                padding: 2rem;
            `;
            
            matchDiv.innerHTML = `
                <div style="text-align: center; animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);">
                    <div style="display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem;">
                        <div style="width: 120px; height: 120px; border-radius: 50%; background: url('https://images.unsplash.com/photo-1517841905240-472988babdf9?w=200') center/cover; box-shadow: 0 10px 30px rgba(0,0,0,0.3);"></div>
                        <div style="display: flex; flex-direction: column; justify-content: center; align-items: center; color: white;">
                            <div style="font-size: 4rem; font-weight: 900; font-style: italic; text-shadow: 0 4px 10px rgba(0,0,0,0.3);">MATCH!</div>
                            <div style="font-size: 1.2rem; opacity: 0.9;">It's a match!</div>
                        </div>
                        <div style="width: 120px; height: 120px; border-radius: 50%; background: url('https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=200') center/cover; box-shadow: 0 10px 30px rgba(0,0,0,0.3);"></div>
                    </div>
                    <p style="color: white; font-size: 1.5rem; margin-bottom: 3rem;">你们彼此喜欢，开始聊天吧！</p>
                    <div style="display: flex; flex-direction: column; gap: 1rem; width: 100%; max-w: 300px;">
                        <button onclick="startChatFromMatch()" style="padding: 1.2rem 3.5rem; background: white; border-radius: 50px; font-size: 1.3rem; font-weight: bold; color: #764ba2; box-shadow: 0 15px 35px rgba(0,0,0,0.3); transition: all 0.3s; transform: rotate(-5deg); cursor: pointer;" onmouseover="this.style.transform='scale(1.1) rotate(-5deg)'; this.style.boxShadow='0 20px 40px rgba(0,0,0,0.4)'" onmouseout="this.style.transform='scale(1) rotate(-5deg)'; this.style.boxShadow='0 15px 35px rgba(0,0,0,0.3)'">
                            <i class="fas fa-comment-dots" style="margin-right: 0.5rem;"></i>开始聊天
                        </button>
                        <button onclick="closeMatch()" style="padding: 1rem 2.5rem; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.4); border-radius: 50px; font-size: 1.1rem; font-weight: bold; color: white; backdrop-filter: blur(10px); transition: all 0.3s;" onmouseover="this.style.background='rgba(255,255,255,0.3)'; this.style.borderColor='rgba(255,255,255,0.6)'" onmouseout="this.style.background='rgba(255,255,255,0.2)'; this.style.borderColor='rgba(255,255,255,0.4)'">
                            <i class="fas fa-user-friends" style="margin-right: 0.5rem;"></i>继续浏览
                        </button>
                    </div>
                </div>
            `;
            
            document.body.appendChild(matchDiv);
        }

        function closeMatch() {
            const matchDiv = document.querySelector('[style*="z-index: 1000"]');
            if (matchDiv) matchDiv.remove();
        }

        let fromMatch = false;

        function startChatFromMatch() {
            fromMatch = true;
            const matchDiv = document.querySelector('[style*="z-index: 1000"]');
            if (matchDiv) matchDiv.remove();

            const chatInterface = document.getElementById('chat-interface');
            chatInterface.style.display = 'flex';

            document.querySelector('header').style.display = 'none';
            document.querySelector('main').style.display = 'none';
            document.querySelector('footer').style.display = 'none';
        }

        function openChat() {
            const matchDiv = document.querySelector('[style*="z-index: 1000"]');
            if (matchDiv) matchDiv.remove();

            const chatInterface = document.getElementById('chat-interface');
            chatInterface.style.display = 'flex';

            document.querySelector('header').style.display = 'none';
            document.querySelector('main').style.display = 'none';
            document.querySelector('footer').style.display = 'none';
        }

        function openChatList() {
            const matchDiv = document.querySelector('[style*="z-index: 1000"]');
            if (matchDiv) matchDiv.remove();

            const chatListInterface = document.getElementById('chat-list-interface');
            chatListInterface.style.display = 'flex';

            document.querySelector('header').style.display = 'none';
            document.querySelector('main').style.display = 'none';
            document.querySelector('footer').style.display = 'none';
        }

        function closeChatList() {
            document.getElementById('chat-list-interface').style.display = 'none';
            document.querySelector('header').style.display = 'flex';
            document.querySelector('main').style.display = 'flex';
            document.querySelector('footer').style.display = 'flex';
        }

        function openChat(userId) {
            const chatListInterface = document.getElementById('chat-list-interface');
            chatListInterface.style.display = 'none';

            const chatInterface = document.getElementById('chat-interface');
            chatInterface.style.display = 'flex';
        }

        function closeChat() {
            document.getElementById('chat-interface').style.display = 'none';
            if (fromMatch) {
                fromMatch = false;
                document.querySelector('header').style.display = 'flex';
                document.querySelector('main').style.display = 'flex';
                document.querySelector('footer').style.display = 'flex';
            } else {
                document.getElementById('chat-list-interface').style.display = 'flex';
            }
        }

        function openProfile() {
            document.getElementById('profile-interface').style.display = 'flex';
            document.querySelector('header').style.display = 'none';
            document.querySelector('main').style.display = 'none';
            document.querySelector('footer').style.display = 'none';
        }

        function closeProfile() {
            document.getElementById('profile-interface').style.display = 'none';
            document.querySelector('header').style.display = 'flex';
            document.querySelector('main').style.display = 'flex';
            document.querySelector('footer').style.display = 'flex';
        }

        function saveProfile() {
            closeProfile();
        }

        window.toggleCardInfo = function() {
            const topCard = stack.reduce((max, card) => {
                return parseInt(card.style.zIndex) > parseInt(max.style.zIndex) ? card : max;
            }, stack[0]);
            if (!topCard) return;
            
            const user = userData.find(u => u.id == topCard.dataset.userId);
            const infoScrim = topCard.querySelector('.info-scrim');
            const currentContent = infoScrim.innerHTML;
            
            if (currentContent.includes(user.hobby)) {
                infoScrim.innerHTML = `<h2 class="text-2xl font-bold">${user.name}, ${user.age}</h2><p class="text-sm opacity-80">${user.job || user.bio}</p>`;
            } else {
                infoScrim.innerHTML = `
                    <h2 class="text-2xl font-bold">${user.name}, ${user.age}</h2>
                    <p class="text-sm opacity-80 mb-1">${user.job}</p>
                    <p class="text-xs mb-1">${user.height}cm · ${user.constellation} · ${user.bloodType}</p>
                    <p class="text-xs mb-1">${user.education}</p>
                    <p class="text-xs mb-1">爱好: ${user.hobby}</p>
                    <p class="text-xs mt-2 leading-relaxed">${user.bio}</p>
                `;
            }
        };

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes popIn { 0% { transform: scale(0); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        `;
        document.head.appendChild(style);

        function handleBtnSwipe(dir) {
            const topCard = stack.reduce((max, card) => {
                return parseInt(card.style.zIndex) > parseInt(max.style.zIndex) ? card : max;
            }, stack[0]);
            if (topCard) {
                topCard.querySelector(`.label-${dir === 'right' ? 'like' : 'nope'}`).style.opacity = 1;
                completeSwipe(topCard, dir);
            }
        }

        init();
    </script>
</body>
</html>
