<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AETHER | 极简连接</title>
    <style>
        :root {
            --bg: #ffffff;
            --text: #000000;
            --sub: #666666;
            --line: rgba(0,0,0,0.06);
            --accent: #0071e3; /* 仅在交互时出现的克制色彩 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
            line-height: 1.5;
        }

        /* 响应式基础容器 */
        .container {
            width: 100%;
            max-width: 1440px;
            margin: 0 auto;
            padding: 0 40px;
        }

        /* 导航栏：极简主义 */
        nav {
            height: 100px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--line);
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        /* Hero 区域：流体字号 */
        .hero {
            padding: 120px 0;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .hero h1 {
            /* 根据屏幕宽度自动调整字号，在电脑端巨大，在手机端适中 */
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 500;
            line-height: 1;
            letter-spacing: -0.04em;
            max-width: 900px;
        }

        .hero p {
            font-size: clamp(1rem, 2vw, 1.25rem);
            color: var(--sub);
            max-width: 500px;
            font-weight: 400;
        }

        /* 价格矩阵：从横向改为响应式网格 */
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1px; /* 线条感 */
            background: var(--line); /* 通过背景色和 gap 制造极细边框 */
            margin-bottom: 100px;
        }

        .price-card {
            background: var(--bg);
            padding: 60px 40px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 400px;
        }

        .price-card:hover {
            background: #fcfcfc;
            padding-top: 50px; /* 产生微妙的上移错觉 */
        }

        .tag {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--sub);
            margin-bottom: 20px;
            display: block;
        }

        .amount {
            font-size: 48px;
            font-weight: 300;
            margin-bottom: 30px;
        }

        .amount span {
            font-size: 16px;
            color: var(--sub);
        }

        /* 动作按钮：无边框高级感 */
        .buy-btn {
            display: inline-block;
            padding: 15px 0;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            color: var(--text);
            border-bottom: 2px solid var(--text);
            align-self: flex-start;
            transition: all 0.3s;
        }

        .buy-btn:hover {
            color: var(--accent);
            border-color: var(--accent);
        }

        /* 页脚 */
        footer {
            padding: 60px 0;
            border-top: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--sub);
        }

        /* 手机端适配优化 */
        @media (max-width: 768px) {
            .container { padding: 0 24px; }
            nav { height: 80px; }
            .hero { padding: 60px 0; }
            .pricing-grid { grid-template-columns: 1fr; }
            .price-card { padding: 40px 24px; min-height: auto; }
            footer { flex-direction: column; gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <nav>
            <div class="logo">AETHER.</div>
            <div style="font-size: 13px;">ENC. PROTOCOL</div>
        </nav>

        <section class="hero">
            <p>基于硬件级加密的私人通道</p>
            <h1>流动、安全、<br>无迹可寻。</h1>
        </section>

        <section class="pricing-grid">
            <div class="price-card">
                <div>
                    <span class="tag">Lightweight</span>
                    <div class="amount">¥28<span>/mo</span></div>
                    <p style="color:var(--sub); font-size: 14px;">适合基础加密需求，支持 3 台设备。</p>
                </div>
                <a href="#" class="buy-btn">即刻接入 —</a>
            </div>

            <div class="price-card">
                <div>
                    <span class="tag" style="color: var(--accent);">Professional</span>
                    <div class="amount">¥56<span>/mo</span></div>
                    <p style="color:var(--sub); font-size: 14px;">全节点解锁，最高 1Gbps 带宽。</p>
                </div>
                <a href="#" class="buy-btn">即刻接入 —</a>
            </div>

            <div class="price-card">
                <div>
                    <span class="tag">Enterprise</span>
                    <div class="amount">¥199<span>/mo</span></div>
                    <p style="color:var(--sub); font-size: 14px;">定制化私有节点，金融级安全标准。</p>
                </div>
                <a href="#" class="buy-btn">联系我们 —</a>
            </div>
        </section>

        <footer>
            <div>&copy; 2026 AETHER NETWORK INC.</div>
            <div>PRIVACY POLICY / TERMS OF SERVICE</div>
        </footer>
    </div>

</body>
</html>
