<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clash Controller</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: radial-gradient(circle at top left, #1a1a2e, #16213e);
            color: #e9ecef;
            font-family: 'Inter', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .status-glow {
            box-shadow: 0 0 15px #4ade80;
        }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto space-y-6">
        <div class="glass rounded-3xl p-6 relative overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-bold tracking-tight">CLASH CORE</h2>
                <div class="h-3 w-3 bg-green-400 rounded-full status-glow"></div>
            </div>
            <div class="text-sm opacity-60">实时流量 (Upload/Download)</div>
            <div class="text-2xl font-mono mt-2 text-blue-400">1.2 MB/s | 4.5 MB/s</div>
        </div>

        <div class="space-y-3">
            <h3 class="text-xs font-semibold uppercase tracking-widest opacity-50 ml-2">节点选择</h3>
            <div class="glass rounded-2xl p-4 flex items-center justify-between border-l-4 border-blue-500">
                <span>香港 高速 01</span>
                <span class="text-xs text-green-400 font-mono">24ms</span>
            </div>
            <div class="glass rounded-2xl p-4 flex items-center justify-between opacity-50">
                <span>日本 东京 02</span>
                <span class="text-xs font-mono">110ms</span>
            </div>
            <div class="glass rounded-2xl p-4 flex items-center justify-between opacity-50">
                <span>美国 洛杉矶 03</span>
                <span class="text-xs font-mono">185ms</span>
            </div>
        </div>

        <button class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-2xl font-bold transition-all shadow-lg shadow-blue-900/40">
            启动服务
        </button>
    </div>
</body>
</html>
