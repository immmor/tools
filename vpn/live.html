<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

<video id="v" controls autoplay muted playsinline width="100%"></video>

<script>
const video = document.getElementById('v');

const hls = new Hls({
    debug:true
});

hls.loadSource(
'https://ldcctvwbcdbyte.volcfcdn.com/ldcctvwbcd/cdrmldcctv5_1/index.m3u8?BR=td'
);

hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){
    console.log('manifest ok');
    video.play();
});

hls.on(Hls.Events.ERROR,function(event,data){
    console.log('HLS ERROR',data);
});
</script>

</body>
</html>
