<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CyberClash Terminal v4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap');

        :root {
            --cyan: #00f3ff;
            --purple: #bc13fe;
            --bg: #030305;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            margin: 0;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* 顶部装饰条 */
        .header-line {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 4px;
            background: linear-gradient(90deg, var(--cyan), var(--purple), transparent);
            z-index: 100;
        }

        /* 赛博网格 */
        .overlay-grid {
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(rgba(0,243,255,0.03) 1px, transparent 1px) 0 0 / 40px 40px,
                linear-gradient(90deg, rgba(0,243,255,0.03) 1px, transparent 1px) 0 0 / 40px 40px;
            pointer-events: none;
            z-index: 2;
        }

        /* 页面切换动画 */
        .page { display: none; height: 100vh; position: relative; z-index: 10; flex-direction: column; }
        .page.active { display: flex; }

        /* 节点卡片样式 */
        .node-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 243, 255, 0.1);
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        .node-card::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,243,255,0.1), transparent);
            transition: 0.5s;
        }
        .node-card:active::after { left: 100%; }
        .node-card.selected { border-color: var(--cyan); background: rgba(0,243,255,0.05); }

        /* 底部导航 */
        .bottom-nav {
            position: fixed;
            bottom: 0; width: 100%; height: 80px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(0,243,255,0.2);
            display: flex; z-index: 100;
        }
        .nav-item {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; color: #555; transition: 0.3s;
        }
        .nav-item.active { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
    </style>
</head>
<body>
    <div class="header-line"></div>
    <div class="overlay-grid"></div>
    <div id="canvas-container" style="position: fixed; inset: 0; z-index: 1;"></div>

    <!-- 页面 1: 连接主界面 -->
    <div id="page-home" class="page active px-6 pt-12">
        <div class="flex justify-between">
            <div>
                <h1 style="font-family: 'Syncopate';" class="text-xl font-bold tracking-tighter text-cyan-400">Node_Commander</h1>
                <p class="text-[9px] opacity-50">Secure Protocol v4.0.2</p>
            </div>
            <div class="text-right">
                <div id="signal-bar" class="flex gap-1 justify-end mb-1">
                    <div class="w-1 h-3 bg-cyan-500"></div>
                    <div class="w-1 h-3 bg-cyan-500"></div>
                    <div class="w-1 h-3 bg-cyan-900"></div>
                </div>
                <p class="text-[9px]">Ping: <span class="text-cyan-400">24ms</span></p>
            </div>
        </div>

        <div class="flex-grow flex items-center justify-center">
            <div onclick="toggleConnect()" id="power-btn" class="w-40 h-40 rounded-full border-2 border-dashed border-cyan-900 flex items-center justify-center relative cursor-pointer">
                <div id="btn-glow" class="absolute inset-0 rounded-full opacity-0 transition-opacity duration-700" style="box-shadow: inset 0 0 30px var(--cyan), 0 0 20px var(--cyan);"></div>
                <div class="text-center z-10">
                    <div id="status-icon" class="text-3xl mb-2 text-cyan-900">⚡</div>
                    <div id="status-text" class="text-[10px] font-bold text-gray-600 tracking-widest">Connect</div>
                </div>
            </div>
        </div>

        <div class="mb-32 p-4 node-card border-l-4 border-l-cyan-500">
            <div class="flex justify-between items-center">
                <div>
                    <span class="text-[8px] text-gray-500">Active Node</span>
                    <h3 id="current-city" class="text-lg font-bold tracking-widest">Tokyo, Japan</h3>
                </div>
                <div class="text-right">
                    <span class="text-[8px] text-gray-500">Encryption</span>
                    <p class="text-xs">ChaCha20</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 页面 2: 节点列表 -->
    <div id="page-nodes" class="page px-6 pt-12 pb-32 overflow-y-auto">
        <h2 class="text-sm font-bold mb-6 tracking-widest text-cyan-400 border-b border-cyan-900 pb-2">Location_Registry</h2>
        <div class="space-y-3">
            <div onclick="selectNode(35.6, 139.7, 'Tokyo, Japan')" class="node-card p-4 flex justify-between items-center selected">
                <span class="text-sm font-bold">🇯🇵 Tokyo - JP</span>
                <span class="text-[10px] text-cyan-500">24ms</span>
            </div>
            <div onclick="selectNode(37.7, -122.4, 'S-Francisco, US')" class="node-card p-4 flex justify-between items-center">
                <span class="text-sm font-bold">🇺🇸 San Francisco - US</span>
                <span class="text-[10px] text-purple-500">115ms</span>
            </div>
            <div onclick="selectNode(51.5, -0.1, 'London, UK')" class="node-card p-4 flex justify-between items-center">
                <span class="text-sm font-bold">🇬🇧 London - UK</span>
                <span class="text-[10px] text-yellow-500">190ms</span>
            </div>
            <div onclick="selectNode(1.3, 103.8, 'Singapore, SG')" class="node-card p-4 flex justify-between items-center">
                <span class="text-sm font-bold">🇸🇬 Singapore - SG</span>
                <span class="text-[10px] text-green-500">68ms</span>
            </div>
            <div onclick="selectNode(-33.8, 151.2, 'Sydney, AU')" class="node-card p-4 flex justify-between items-center">
                <span class="text-sm font-bold">🇦🇺 Sydney - AU</span>
                <span class="text-[10px] text-blue-500">145ms</span>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div onclick="showPage('home')" id="nav-home" class="nav-item active">
            <span class="text-lg">◈</span><span>Status</span>
        </div>
        <div onclick="showPage('nodes')" id="nav-nodes" class="nav-item">
            <span class="text-lg">◎</span><span>Nodes</span>
        </div>
    </nav>

    <script>
        let scene, camera, renderer, globe, atmosphere;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const loader = new THREE.TextureLoader();
            // 使用一张高对比度的、带发光边界的国家轮廓地图（模拟加载）
            // 在实际使用中，这张地图应该是黑底+青色边界的陆地
            const earthTex = loader.load('https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg');
            
            // 核心地球
            const geometry = new THREE.SphereGeometry(5, 64, 64);
            const material = new THREE.MeshPhongMaterial({
                map: earthTex,
                color: 0x112233,
                emissive: 0x001122,
                shininess: 20,
                transparent: true,
                opacity: 0.9
            });
            globe = new THREE.Mesh(geometry, material);
            scene.add(globe);

            // 增加一层发光大气层（关键：让边缘亮起来，反衬陆地）
            const atmoGeo = new THREE.SphereGeometry(5.2, 64, 64);
            const atmoMat = new THREE.MeshBasicMaterial({
                color: 0x00f3ff,
                wireframe: true,
                transparent: true,
                opacity: 0.1
            });
            atmosphere = new THREE.Mesh(atmoGeo, atmoMat);
            scene.add(atmosphere);

            // 灯光：正对着屏幕的光，照亮国家轮廓
            const mainLight = new THREE.DirectionalLight(0xffffff, 1);
            mainLight.position.set(0, 0, 10);
            scene.add(mainLight);
            scene.add(new THREE.AmbientLight(0x404040, 2));

            camera.position.z = 15;
            
            // 初始对准日本
            rotateTo(35.6, 139.7, 0);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            atmosphere.rotation.y += 0.001;
            renderer.render(scene, camera);
        }

        function rotateTo(lat, lon, duration = 2) {
            // 极坐标转换修正
            const phi = (lat) * (Math.PI / 180);
            const theta = (lon) * (Math.PI / 180);

            gsap.to(globe.rotation, {
                duration: duration,
                x: phi,
                y: theta + Math.PI, // 修正对齐
                ease: "expo.out"
            });
        }

        function selectNode(lat, lon, name) {
            document.getElementById('current-city').innerText = name;
            rotateTo(lat, lon);
            showPage('home');
            
            // UI反馈
            document.querySelectorAll('.node-card').forEach(c => c.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
        }

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
        }

        let isConnected = false;
        function toggleConnect() {
            isConnected = !isConnected;
            const glow = document.getElementById('btn-glow');
            const icon = document.getElementById('status-icon');
            const text = document.getElementById('status-text');
            const btn = document.getElementById('power-btn');

            if(isConnected) {
                glow.style.opacity = "1";
                icon.style.color = "var(--cyan)";
                icon.innerHTML = "◈";
                text.innerText = "Active";
                text.style.color = "var(--cyan)";
                btn.style.borderStyle = "solid";
                btn.style.borderColor = "var(--cyan)";
            } else {
                glow.style.opacity = "0";
                icon.style.color = "#111";
                icon.innerHTML = "⚡";
                text.innerText = "Connect";
                text.style.color = "#444";
                btn.style.borderStyle = "dashed";
                btn.style.borderColor = "#111";
            }
        }

        window.onload = init;
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
