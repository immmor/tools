<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUI-TRANSIT | 极简私人出行</title>
    <style>
        :root {
            /* 瑞士风格核心配色 */
            --bg-color: #ffffff;
            --line-color: #e0e0e0;
            --text-main: #1a1a1a;
            --text-mute: #888888;
            --accent: #000000;
            
            /* 流体排版公式: 最小32px - 最大80px */
            --fluid-h1: clamp(2rem, 8vw + 1rem, 5rem);
            --fluid-p: clamp(0.9rem, 0.5vw + 0.7rem, 1.1rem);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", sans-serif;
            line-height: 1.2;
            overflow-x: hidden;
        }

        /* 工业感参考线背景 */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-left: 0.5px solid var(--line-color);
        }

        .grid-overlay div {
            border-right: 0.5px solid var(--line-color);
        }

        /* 整体布局容器 */
        main {
            padding: 10vh 5vw;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            margin-bottom: 15vh;
            border-bottom: 0.5px solid var(--text-main);
            padding-bottom: 20px;
        }

        .logo {
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* 流体标题 */
        h1 {
            font-size: var(--fluid-h1);
            font-weight: 500;
            letter-spacing: -0.04em;
            margin-bottom: 2rem;
            max-width: 1200px;
            line-height: 0.95;
        }

        .hero-desc {
            font-size: var(--fluid-p);
            color: var(--text-mute);
            max-width: 400px;
            margin-left: auto;
            text-align: right;
        }

        /* 功能区域 */
        .booking-section {
            margin-top: auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 4rem;
        }

        .input-group {
            position: relative;
            border-bottom: 0.5px solid var(--line-color);
            padding: 10px 0;
            transition: border-color 0.3s ease;
        }

        .input-group:focus-within {
            border-color: var(--text-main);
        }

        label {
            font-size: 0.7rem;
            color: var(--text-mute);
            display: block;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 1.2rem;
            background: transparent;
            font-weight: 300;
        }

        /* 文字链接及其动效下划线 */
        .cta-link {
            display: inline-block;
            margin-top: 3rem;
            font-size: 1.5rem;
            color: var(--text-main);
            text-decoration: none;
            position: relative;
            padding-bottom: 5px;
            cursor: pointer;
        }

        .cta-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: var(--text-main);
            transform: scaleX(0);
            transform-origin: right;
            transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .cta-link:hover::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* 侧边信息层 */
        .side-info {
            position: fixed;
            right: 5vw;
            top: 50%;
            transform: translateY(-50%) rotate(90deg);
            transform-origin: right;
            font-size: 0.7rem;
            color: var(--line-color);
            letter-spacing: 0.5em;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .grid-overlay { grid-template-columns: repeat(2, 1fr); }
            .hero-desc { text-align: left; margin-left: 0; margin-top: 2rem; }
        }
    </style>
</head>
<body>

    <div class="grid-overlay">
        <div></div><div></div><div></div><div></div>
    </div>

    <main>
        <header>
            <div class="logo">SUI — TRANSIT</div>
        </header>

        <section class="hero">
            <h1>私人出行<br>精密的城市位移系统</h1>
            <p class="hero-desc">拒绝冗余，只提供最高效的路径。为您预留的车辆已就绪，实时接入苏黎世标准的调度网络。</p>
        </section>

        <section class="booking-section">
            <div class="input-group">
                <label>起点 ORIGIN</label>
                <input type="text" placeholder="输入当前坐标...">
            </div>
            <div class="input-group">
                <label>终点 DESTINATION</label>
                <input type="text" placeholder="输入目的地...">
            </div>
            <div class="input-group" style="border: none;">
                <a href="#" class="cta-link">即刻呼叫调度 &rarr;</a>
            </div>
        </section>

        <div class="side-info">PRECISION / PRIVACY / INDUSTRIAL</div>
    </main>

</body>
</html>
