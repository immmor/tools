<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Quantum Phantom VPN Interface</title>
    <style>
        :root {
            --bg-dark: #000000;
            --panel-bg: rgba(10, 10, 15, 0.8);
            --text-main: #ffffff;
            --text-muted: #666677;
            
            /* 霓虹色谱 */
            --clr-cyan: #00f2ff;
            --clr-purple: #bc13fe;
            --clr-rose: #ff0055;
            --clr-lime: #ccff00;
            --clr-amber: #ffaa00;
            --clr-blue: #0066ff;
            
            --transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(20, 20, 30, 0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(20, 20, 30, 0.5) 1px, transparent 1px);
            background-size: 50px 50px; /* 科技网格底纹 */
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 30px;
            padding: 80px 40px;
            margin: 0;
            font-family: 'Ocra', 'Segoe UI Monospace', monospace; /* 使用等宽字体增强科技感 */
            -webkit-font-smoothing: antialiased;
        }

        /* 核心按钮容器 - 赛博模块感 */
        .quantum-btn {
            position: relative;
            height: 200px;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px; /* 稍微硬朗一点的圆角 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            overflow: hidden;
            transition: var(--transition);
            backdrop-filter: blur(10px);
        }

        /* 悬停时的多维发光边界 */
        .quantum-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), 
                                        rgba(255, 255, 255, 0.1) 0%, 
                                        transparent 60%);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1;
        }

        .quantum-btn:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 15px rgba(var(--accent-rgb), 0.3);
        }

        .quantum-btn:hover::before {
            opacity: 1;
        }

        /* SVG 图标通用样式 - 增加发光和混合模式 */
        .icon-wrapper {
            position: relative;
            z-index: 2;
            width: 70px;
            height: 70px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quantum-btn svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke-width: 1.5;
            stroke-linecap: square; /* 尖锐的线条更具科幻感 */
            stroke-linejoin: miter;
            transition: var(--transition);
            filter: drop-shadow(0 0 10px var(--accent-color));
        }

        /* 鼠标悬停时的图标动画 */
        .quantum-btn:hover svg {
            stroke-width: 2;
            transform: scale(1.1);
            filter: drop-shadow(0 0 15px var(--accent-color)) drop-shadow(0 0 30px var(--accent-color));
        }

        /* 创意的路径描边动画 (适用于部分图标) */
        .quantum-btn:hover svg .draw-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 2s linear infinite;
        }

        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }

        /* 文字样式 - 极简科技感 */
        .text-group {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .title {
            color: var(--text-main);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
            transition: var(--transition);
        }

        .desc {
            color: var(--text-muted);
            font-size: 11px;
            letter-spacing: 1px;
            transition: var(--transition);
        }

        .quantum-btn:hover .title {
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-color);
        }

        .quantum-btn:hover .desc {
            color: var(--text-main);
        }

        /* 不同按钮的配色方案 */
        .connect { --accent-color: var(--clr-cyan); --accent-rgb: 0, 242, 255; }
        .global  { --accent-color: var(--clr-purple); --accent-rgb: 188, 19, 254; }
        .secure  { --accent-color: var(--clr-rose); --accent-rgb: 255, 0, 85; }
        .stream  { --accent-color: var(--clr-lime); --accent-rgb: 204, 255, 0; }
        .multi   { --accent-color: var(--clr-amber); --accent-rgb: 255, 170, 0; }
        .support { --accent-color: var(--clr-blue); --accent-rgb: 0, 102, 255; }
        .tor     { --accent-color: #ffffff; --accent-rgb: 255, 255, 255; } /* 纯白发光 */

    </style>
</head>
<body>

    <a href="#" class="quantum-btn connect">
        <div class="icon-wrapper">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="10" fill="var(--accent-color)" opacity="0.5"/>
                <path d="M50 10 V35 M50 65 V90 M10 50 H35 M65 50 H90" stroke="var(--accent-color)"/>
                <path class="draw-path" d="M30 30 L70 70 M70 30 L30 70" stroke="var(--accent-color)" stroke-dasharray="10 10"/>
                <circle cx="50" cy="50" r="45" stroke="var(--accent-color)" stroke-width="1" stroke-dasharray="5 5"/>
            </svg>
        </div>
        <div class="text-group">
            <div class="title">量子跃迁</div>
            <div class="desc">QUANTUM CONNECT</div>
        </div>
    </a>

    <a href="#" class="quantum-btn global">
        <div class="icon-wrapper">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" stroke="var(--accent-color)"/>
                <path d="M50 5 V95 M5 50 H95" stroke="var(--accent-color)" opacity="0.5"/>
                <path class="draw-path" d="M15 30 Q50 50 85 30 M15 70 Q50 50 85 70" stroke="var(--accent-color)"/>
                <ellipse cx="50" cy="50" rx="20" ry="45" stroke="var(--accent-color)"/>
            </svg>
        </div>
        <div class="text-group">
            <div class="title">星际网面</div>
            <div class="desc">GLOBAL GALAXY</div>
        </div>
    </a>

    <a href="#" class="quantum-btn secure">
        <div class="icon-wrapper">
            <svg viewBox="0 0 100 100">
                <path d="M50 10 L85 25 V60 C85 80 50 90 50 90 Q15 80 15 60 V25 Z" stroke="var(--accent-color)"/>
                <rect x="42" y="50" width="16" height="12" fill="var(--accent-color)"/>
                <path class="draw-path" d="M35 40 H65 M30 30 H70 M25 20 H75" stroke="var(--accent-color)" opacity="0.3"/>
                <path d="M50 50 V75 M40 65 H60" stroke="#000" stroke-width="2"/>
            </svg>
        </div>
        <div class="text-group">
            <div class="title">数字重卡</div>
            <div class="desc">CYBER FORTRSS</div>
        </div>
    </a>

    <a href="#" class="quantum-btn stream">
        <div class="icon-wrapper">
            <svg viewBox="0 0 100 100">
                <rect x="10" y="20" width="80" height="60" rx="5" stroke="var(--accent-color)"/>
                <path d="M10 65 H90" stroke="var(--accent-color)" opacity="0.5"/>
                <path class="draw-path" d="M40 40 L65 50 L40 60 Z" fill="var(--accent-color)"/>
                <path d="M90 30 Q100 50 90 70" stroke="var(--accent-color)" stroke-dasharray="5 5"/>
            </svg>
        </div>
        <div class="text-group">
            <div class="title">幻影极速</div>
            <div class="desc">STREAM PHANTOM</div>
        </div>
    </a>

    <a href="#" class="quantum-btn multi">
        <div class="icon-wrapper">
            <svg viewBox="0 0 100 100">
                <rect x="25" y="10" width="50" height="80" rx="5" stroke="var(--accent-color)"/>
                <rect x="10" y="30" width="30" height="50" rx="3" stroke="var(--accent-color)" opacity="0.6"/>
                <rect x="60" y="30" width="30" height="50" rx="3" stroke="var(--accent-color)" opacity="0.6"/>
                <path class="draw-path" d="M40 50 H60 M25 70 H75 M25 30 H75" stroke="var(--accent-color)" stroke-dasharray="5 5"/>
                <circle cx="50" cy="82" r="3" fill="var(--accent-color)"/>
            </svg>
        </div>
        <div class="text-group">
            <div class="title">万物互联</div>
            <div class="desc">INFINITY DEVICES</div>
        </div>
    </a>

    <a href="#" class="quantum-btn tor">
        <div class="icon-wrapper">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" stroke="var(--accent-color)" stroke-width="1"/>
                <circle cx="50" cy="50" r="35" stroke="var(--accent-color)" stroke-width="1" stroke-dasharray="10 5"/>
                <circle cx="50" cy="50" r="25" stroke="var(--accent-color)" stroke-width="1" stroke-dasharray="5 10"/>
                <path class="draw-path" d="M50 50 m-15 0 a 15 15 0 1 0 30 0 a 15 15 0 1 0 -30 0" stroke="var(--accent-color)" fill="var(--accent-color)" fill-opacity="0.1"/>
            </svg>
        </div>
        <div class="text-group">
            <div class="title">暗物质</div>
            <div class="desc">DARK ROUTE</div>
        </div>
    </a>

    <script>
        // 增加一点鼠标跟随的微交互，让背景发光更灵动
        const btns = document.querySelectorAll('.quantum-btn');
        btns.forEach(btn => {
            btn.addEventListener('mousemove', e => {
                const rect = btn.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                btn.style.setProperty('--mouse-x', `${x}px`);
                btn.style.setProperty('--mouse-y', `${y}px`);
            });
        });
    </script>
</body>
</html>
