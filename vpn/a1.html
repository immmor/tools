<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL-AXIS | AI 工业培训</title>
    <style>
        :root {
            --bg-color: #000000;
            --text-color: #ffffff;
            --line-color: #1a1a1a;
            --accent-color: #888888;
            /* 流体字号设置 */
            --fs-h1: clamp(3rem, 12vw, 8rem);
            --fs-h2: clamp(1.5rem, 4vw, 2.5rem);
            --fs-body: clamp(0.9rem, 1vw, 1.1rem);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: "Helvetica Neue", Helvetica, Arial, "PingFang SC", sans-serif;
            line-height: 1.4;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* 基础网格系统 */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            min-height: 100vh;
            border-left: 0.5px solid var(--line-color);
            border-right: 0.5px solid var(--line-color);
            margin: 0 20px;
        }

        .grid-line {
            grid-column: span 1;
            border-right: 0.5px solid var(--line-color);
            pointer-events: none;
        }

        /* 顶部导航 */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 100;
            mix-blend-mode: difference;
        }

        .logo {
            font-weight: 700;
            letter-spacing: -1px;
            font-size: 1.2rem;
        }

        /* 核心视觉区域 */
        main {
            position: relative;
            grid-column: 1 / -1;
            padding: 160px 40px 80px;
            display: flex;
            flex-direction: column;
        }

        .hero-title {
            font-size: var(--fs-h1);
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            margin-bottom: 60px;
        }

        .section-header {
            border-top: 0.5px solid var(--line-color);
            padding-top: 10px;
            grid-column: span 4;
            margin-bottom: 100px;
        }

        .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--accent-color);
            letter-spacing: 2px;
            margin-bottom: 20px;
            display: block;
        }

        /* 课程列表 - 工业感列表 */
        .course-list {
            margin-top: 40px;
        }

        .course-item {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            padding: 30px 0;
            border-bottom: 0.5px solid var(--line-color);
            transition: background 0.3s ease;
        }

        .course-item:hover {
            background: #050505;
        }

        .course-index {
            grid-column: span 1;
            font-size: 0.8rem;
            color: var(--accent-color);
        }

        .course-info {
            grid-column: span 7;
        }

        .course-info h3 {
            font-size: var(--fs-h2);
            font-weight: 500;
            margin-bottom: 10px;
        }

        .course-meta {
            grid-column: span 4;
            text-align: right;
        }

        /* 瑞士主义文字链接动效 */
        .text-link {
            color: var(--text-color);
            text-decoration: none;
            position: relative;
            display: inline-block;
            font-weight: 600;
            padding-bottom: 4px;
        }

        .text-link::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 1px;
            bottom: 0;
            left: 0;
            background-color: var(--text-color);
            transform: scaleX(0);
            transform-origin: bottom right;
            transition: transform 0.4s cubic-bezier(0.86, 0, 0.07, 1);
        }

        .text-link:hover::after {
            transform: scaleX(1);
            transform-origin: bottom left;
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            .grid-container { margin: 0 10px; }
            .course-item { display: block; }
            .course-meta { text-align: left; margin-top: 10px; }
            .hero-title { margin-bottom: 30px; }
        }

        /* 装饰用细线层 */
        .bg-lines {
            position: fixed;
            top: 0;
            left: 20px;
            right: 20px;
            bottom: 0;
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            z-index: -1;
            pointer-events: none;
        }
        .bg-lines div {
            border-right: 0.5px solid var(--line-color);
        }
    </style>
</head>
<body>

    <div class="bg-lines">
        <div></div><div></div><div></div><div></div>
        <div></div><div></div><div></div><div></div>
        <div></div><div></div><div></div><div></div>
    </div>

    <nav>
        <div class="logo">NEURAL-AXIS / 2026</div>
        <div>
            <a href="#" class="text-link">登录系统</a>
        </div>
    </nav>

    <div class="grid-container">
        <main>
            <span class="label">INDUSTRIAL AI TRAINING TERMINAL</span>
            <h1 class="hero-title">
                人工<br>智能<br>架构
            </h1>

            <div class="section-header">
                <p>专注于大模型底层的精密训练与多智能体协同系统。我们不提供基础课程，只交付工业级的生产力架构。</p>
            </div>

            <div class="course-list">
                <div class="course-item">
                    <span class="course-index">01</span>
                    <div class="course-info">
                        <h3>模型微调演算法</h3>
                        <p>针对特定工业场景的 LoRA 与 QLoRA 高级部署实践。</p>
                    </div>
                    <div class="course-meta">
                        <a href="#" class="text-link">查看详情</a>
                    </div>
                </div>

                <div class="course-item">
                    <span class="course-index">02</span>
                    <div class="course-info">
                        <h3>多智能体编排</h3>
                        <p>构建具备自我迭代能力的 Agent 集群系统。</p>
                    </div>
                    <div class="course-meta">
                        <a href="#" class="text-link">查看详情</a>
                    </div>
                </div>

                <div class="course-item">
                    <span class="course-index">03</span>
                    <div class="course-info">
                        <h3>神经接口设计</h3>
                        <p>AI 驱动的动态 UI 逻辑与极致交互协议。</p>
                    </div>
                    <div class="course-meta">
                        <a href="#" class="text-link">查看详情</a>
                    </div>
                </div>
            </div>

            <footer style="margin-top: 100px; padding-bottom: 40px;">
                <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <div class="label">© 2026 NEURAL-AXIS. ALL RIGHTS RESERVED.</div>
                    <a href="#" class="text-link">联系机密协议</a>
                </div>
            </footer>
        </main>
    </div>

</body>
</html>
