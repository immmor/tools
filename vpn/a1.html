<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Titanium Flux VPN</title>
    <style>
        :root {
            --bg: #000;
            --panel: #0a0a0a;
            --cyan: #00f2ff;
            --purple: #bc13fe;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            /* 科技感底纹背景 */
            background-image: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                              linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 100px 20px;
            margin: 0;
            font-family: "Segoe UI", sans-serif;
        }

        /* 核心按钮容器 */
        .btn-card {
            position: relative;
            width: 180px;
            height: 220px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.5s;
            overflow: hidden;
            text-decoration: none;
        }

        /* 悬停时的流光边框效果 */
        .btn-card::before {
            content: '';
            position: absolute;
            width: 100px;
            height: 300%;
            background: linear-gradient(var(--accent-color), transparent);
            animation: rotate 4s linear infinite;
            opacity: 0;
            transition: 0.5s;
        }

        .btn-card:hover::before { opacity: 1; }

        .btn-card::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: var(--panel);
            border-radius: 18px;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 图标内容 */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .icon-svg {
            width: 60px;
            height: 60px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px var(--accent-color));
        }

        /* 文字样式 */
        .title {
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .desc {
            color: #666;
            font-size: 12px;
            text-align: center;
        }

        /* 具体的配色方案 */
        .connect { --accent-color: #00f2ff; }
        .secure { --accent-color: #ff0055; }
        .global { --accent-color: #7000ff; }
        .speed { --accent-color: #00ff41; }
        .price { --accent-color: #ffaa00; }
        .support { --accent-color: #ffffff; }

        /* 动态浮动动画 */
        .btn-card:hover .icon-svg {
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <a href="#" class="btn-card connect">
        <div class="content">
            <svg class="icon-svg" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#0066ff;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <circle cx="50" cy="50" r="15" fill="url(#g1)" />
                <circle cx="50" cy="50" r="30" stroke="url(#g1)" stroke-width="2" stroke-dasharray="10 5" />
                <path d="M50 5 L50 25 M50 75 L50 95 M5 50 L25 50 M75 50 L95 50" stroke="url(#g1)" stroke-width="4" />
            </svg>
            <div class="title">一键穿梭</div>
            <div class="desc">INSTANT ACCESS</div>
        </div>
    </a>

    <a href="#" class="btn-card secure">
        <div class="content">
            <svg class="icon-svg" viewBox="0 0 100 100">
                <path d="M50 10 L85 25 V55 C85 80 50 90 50 90 C50 90 15 80 15 55 V25 L50 10Z" fill="none" stroke="var(--accent-color)" stroke-width="5"/>
                <rect x="40" y="45" width="20" height="15" rx="2" fill="var(--accent-color)" />
                <path d="M45 45 V38 A5 5 0 0 1 55 38 V45" stroke="var(--accent-color)" stroke-width="3" fill="none"/>
            </svg>
            <div class="title">军工加密</div>
            <div class="desc">AES-256 BIT</div>
        </div>
    </a>

    <a href="#" class="btn-card global">
        <div class="content">
            <svg class="icon-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="40" stroke="var(--accent-color)" stroke-width="2" fill="none" />
                <ellipse cx="50" cy="50" rx="40" ry="15" stroke="var(--accent-color)" stroke-width="2" fill="none" />
                <ellipse cx="50" cy="50" rx="15" ry="40" stroke="var(--accent-color)" stroke-width="2" fill="none" />
                <path d="M30 30 L70 70 M70 30 L30 70" stroke="var(--accent-color)" stroke-width="1" opacity="0.5"/>
            </svg>
            <div class="title">全球骨干</div>
            <div class="desc">GLOBAL NODES</div>
        </div>
    </a>

    <a href="#" class="btn-card speed">
        <div class="content">
            <svg class="icon-svg" viewBox="0 0 100 100">
                <path d="M20 70 L40 10 L80 10 L60 90 Z" fill="none" stroke="var(--accent-color)" stroke-width="4" />
                <path d="M45 30 H65 M40 50 H60 M35 70 H55" stroke="var(--accent-color)" stroke-width="4" />
            </svg>
            <div class="title">自研协议</div>
            <div class="desc">LIGHTSPEED PRO</div>
        </div>
    </a>

    <a href="#" class="btn-card price">
        <div class="content">
            <svg class="icon-svg" viewBox="0 0 100 100">
                <path d="M25 35 L50 15 L75 35 L50 85 Z" fill="none" stroke="var(--accent-color)" stroke-width="4" />
                <path d="M25 35 H75 M50 15 V85" stroke="var(--accent-color)" stroke-width="1" />
            </svg>
            <div class="title">特惠套餐</div>
            <div class="desc">VIP PRICING</div>
        </div>
    </a>

    <a href="#" class="btn-card support">
        <div class="content">
            <svg class="icon-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="30" r="8" fill="var(--accent-color)" />
                <circle cx="30" cy="70" r="8" fill="var(--accent-color)" />
                <circle cx="70" cy="70" r="8" fill="var(--accent-color)" />
                <path d="M50 30 L30 70 M50 30 L70 70 M30 70 L70 70" stroke="var(--accent-color)" stroke-width="2" />
            </svg>
            <div class="title">技术支援</div>
            <div class="desc">24/7 EXPERTS</div>
        </div>
    </a>

</body>
</html>
