<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B9DC3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5D6D7E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hatGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A252F;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ghost Body -->
  <path d="M256 480 C140 480 80 380 80 280 L80 200 C80 180 95 165 115 165 C135 165 150 180 150 200 L150 260
           C150 260 130 250 130 220 C130 190 155 170 180 170 C205 170 230 190 230 220
           C230 220 210 200 210 180 C210 150 235 130 256 130 C277 130 302 150 302 180
           C302 200 282 220 282 220 C282 190 307 170 332 170 C357 170 382 190 382 220
           C382 250 362 260 362 260 L362 200 C362 180 377 165 397 165 C417 165 432 180 432 200 L432 280
           C432 380 372 480 256 480 Z"
        fill="url(#bodyGrad)" filter="url(#glow)"/>

  <!-- Ghost Eyes -->
  <ellipse cx="195" cy="230" rx="25" ry="30" fill="#1A1A2E"/>
  <ellipse cx="317" cy="230" rx="25" ry="30" fill="#1A1A2E"/>
  <ellipse cx="200" cy="225" rx="8" ry="10" fill="#FFFFFF"/>
  <ellipse cx="322" cy="225" rx="8" ry="10" fill="#FFFFFF"/>

  <!-- Ghost Mouth -->
  <path d="M220 290 Q256 330 292 290" stroke="#1A1A2E" stroke-width="8" fill="none" stroke-linecap="round"/>

  <!-- Top Hat -->
  <rect x="156" y="60" width="200" height="80" rx="5" fill="url(#hatGrad)"/>
  <rect x="126" y="130" width="260" height="20" rx="3" fill="url(#hatGrad)"/>

  <!-- Hat Band -->
  <rect x="156" y="115" width="200" height="15" fill="#E74C3C"/>

  <!-- Hat Highlight -->
  <rect x="166" y="70" width="80" height="8" rx="4" fill="#FFFFFF" opacity="0.2"/>
</svg>