<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Liquid Heterogenic VPN Matrix</title>
    <style>
        :root {
            --bg-dark: #020204;
            --panel-bg: #08080c;
            --text-main: #ffffff;
            --text-muted: #555566;
            
            /* 异构色谱 - 极高饱和度 */
            --clr-neon-blue: #00ffff;
            --clr-electric-purple: #9d00ff;
            --clr-magma-orange: #ff5e00;
            --clr-cyber-green: #00ff88;
            --clr-hot-pink: #ff0077;
            --clr-stellar-yellow: #ffea00;
            
            --transition-coarse: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            --transition-fine: all 0.2s ease;
        }

        body {
            background-color: var(--bg-dark);
            /* 深邃的网格背景 */
            background-image: 
                linear-gradient(rgba(15, 15, 25, 0.3) 1px, transparent 1px),
                linear-gradient(90deg, rgba(15, 15, 25, 0.3) 1px, transparent 1px);
            background-size: 40px 40px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 35px;
            padding: 100px 50px;
            margin: 0;
            font-family: 'Input Mono', 'Fira Code', monospace; /* 使用尖锐的等宽字体 */
            -webkit-font-smoothing: antialiased;
        }

        /* 核心按钮容器 - 异构模块 */
        .hetero-btn {
            position: relative;
            height: 240px;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            overflow: hidden;
            transition: var(--transition-coarse);
            /* 初始状态的轻微 3D 旋转 */
            transform: perspective(1000px) rotateX(2deg) rotateY(-1deg);
        }

        /* 隐藏的液态能量流 (伪元素) */
        .hetero-btn::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, var(--accent-color) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            transition: var(--transition-coarse);
            filter: blur(60px);
            z-index: 1;
            transform: translate(-50%, -50%) scale(0.1);
        }

        /* 鼠标悬停时的究极反馈 */
        .hetero-btn:hover {
            transform: perspective(1000px) rotateX(0deg) rotateY(0deg) translateY(-10px);
            border-color: rgba(255, 255, 255, 0.1);
            box-shadow: 
                0 20px 50px rgba(0, 0, 0, 0.9), 
                0 0 30px rgba(var(--accent-rgb), 0.2),
                inset 0 0 15px rgba(var(--accent-rgb), 0.1);
        }

        .hetero-btn:hover::before {
            opacity: 0.15;
            transform: translate(-50%, -50%) scale(1);
        }

        /* SVG 图标容器 - 增加异构发光 */
        .icon-matrix {
            position: relative;
            z-index: 2;
            width: 80px;
            height: 80px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hetero-btn svg {
            width: 100%;
            height: 100%;
            fill: none;
            stroke-width: 1.2;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: var(--transition-coarse);
            /* 核心异构发光：多重 drop-shadow */
            filter: 
                drop-shadow(0 0 5px var(--accent-color))
                drop-shadow(0 0 15px var(--accent-color));
        }

        /* 悬停时的图标液态融和动效 */
        .hetero-btn:hover svg {
            stroke-width: 1.8;
            transform: scale(1.15);
            filter: 
                drop-shadow(0 0 10px var(--accent-color))
                drop-shadow(0 0 25px var(--accent-color))
                drop-shadow(0 0 50px var(--accent-color));
        }

        /* 创意的液态路径动画 (通过 stroke-dasharray 实现) */
        .hetero-btn svg path.liquid-trace {
            stroke-dasharray: 20 300;
            stroke-dashoffset: 0;
            animation: liquidFlow 4s linear infinite;
        }

        @keyframes liquidFlow {
            to { stroke-dashoffset: -320; }
        }

        /* 文字样式 - 极简赛博感 */
        .text-group {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 100%;
            padding: 0 15px;
        }

        .title {
            color: var(--text-main);
            font-size: 17px;
            font-weight: 800;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-bottom: 7px;
            transition: var(--transition-coarse);
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.1);
        }

        .desc {
            color: var(--text-muted);
            font-size: 11px;
            letter-spacing: 1.5px;
            transition: var(--transition-coarse);
        }

        .hetero-btn:hover .title {
            color: var(--accent-color);
            text-shadow: 0 0 15px var(--accent-color);
        }

        .hetero-btn:hover .desc {
            color: var(--text-main);
        }

        /* ==================== 
           单个按钮配色和创意设计
           ==================== */

        /* 1. 量子跃迁 (Connect) */
        .connect { --accent-color: var(--clr-neon-blue); --accent-rgb: 0, 255, 255; }
        
        /* 2. 星际传送门 (Global) */
        .global  { --accent-color: var(--clr-electric-purple); --accent-rgb: 157, 0, 255; }

        /* 3. 数字重卡 (Shield) */
        .secure  { --accent-color: var(--clr-magma-orange); --accent-rgb: 255, 94, 0; }

        /* 4. 幻影极速 (Stream) */
        .stream  { --accent-color: var(--clr-cyber-green); --accent-rgb: 0, 255, 136; }

        /* 5. 万物互联 (Multi) */
        .multi   { --accent-color: var(--clr-hot-pink); --accent-rgb: 255, 0, 119; }

        /* 6. 特惠套餐 (Price) */
        .price   { --accent-color: var(--clr-stellar-yellow); --accent-rgb: 255, 234, 0; }

    </style>
</head>
<body>

    <a href="#" class="hetero-btn connect">
        <div class="icon-matrix">
            <svg viewBox="0 0 100 100">
                <defs>
                    <radialGradient id="grad-connect" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" style="stop-color:var(--clr-neon-blue);stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#000;stop-opacity:0.2" />
                    </radialGradient>
                </defs>
                <circle cx="50" cy="50" r="12" fill="url(#grad-connect)"/>
                <path d="M50 5 V30 M50 70 V95 M5 50 H30 M70 50 H95" stroke="var(--accent-color)"/>
                <path class="liquid-trace" d="M30 30 Q50 50 70 70 M70 30 Q50 50 30 70" stroke="var(--accent-color)" stroke-dasharray="15 15"/>
                <path d="M10 10 L25 25 M90 90 L75 75 M90 10 L75 25 M10 90 L25 75" stroke="var(--accent-color)" opacity="0.3"/>
            </svg>
        </div>
        <div class="text-group">
            <div class="title">量子跃迁</div>
            <div class="desc">QUANTUM FLUX</div>
        </div>
    </a>

    <a href="#" class="hetero-btn global">
        <div class="icon-matrix">
            <svg viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" stroke="var(--accent-color)"/>
                <path d="M5 50 Q50 50 95 50 M50 5 Q50 50 50 95" stroke="var(--accent-color)" opacity="0.3"/>
                <path class="liquid-trace" d="M20 20 A40 40 0 0 1 80 80 M80 20 A40 40 0 0 0 20 80" stroke="var(--accent-color)"/>
                <path d="M50 30 A20 20 0 1 1 50 70 A20 20 0 1 1 50 30" stroke="var(--accent-color)" stroke-dasharray="5 5"/>
            </svg>
        </div>
        <div class="text-group">
            <div class="title">星际网面</div>
            <div class="desc">GLOBAL WEAVE</div>
        </div>
    </a>

    <a href="#" class="hetero-btn secure">
        <div class="icon-matrix">
            <svg viewBox="0 0 100 100">
                <path d="M50 5 L90 25 V65 L50 95 L10 65 V25 Z" stroke="var(--accent-color)"/>
                <rect x="40" y="50" width="20" height="15" fill="var(--accent-color)" fill-opacity="0.3"/>
                <path class="liquid-trace" d="M30 35 H70 M25 25 H75 M20 15 H80" stroke="var(--accent-color)" opacity="0.5"/>
                <path d="M50 50 V80 M35 70 H65" stroke="#000" stroke-width="2.5"/>
                <circle cx="50" cy="15" r="3" fill="var(--accent-color)"/>
            </svg>
        </div>
        <div class="text-group">
            <div class="title">数字重卡</div>
            <div class="desc">CYBER FORTRSS</div>
        </div>
    </a>

    <a href="#" class="hetero-btn stream">
        <div class="icon-matrix">
            <svg viewBox="0 0 100 100">
                <rect x="10" y="20" width="80" height="60" rx="6" stroke="var(--accent-color)"/>
                <path d="M10 65 H90" stroke="var(--accent-color)" opacity="0.5"/>
                <path class="liquid-trace" d="M35 35 L70 50 L35 65 Z" fill="var(--accent-color)" fill-opacity="0.2"/>
                <path d="M90 30 Q105 50 90 70 M80 35 Q90 50 80 65" stroke="var(--accent-color)" stroke-dasharray="4 4"/>
                <circle cx="50" cy="83" r="3" fill="var(--accent-color)"/>
            </svg>
        </div>
        <div class="text-group">
            <div class="title">幻影极速</div>
            <div class="desc">STREAM PHANTOM</div>
        </div>
    </a>

    <a href="#" class="hetero-btn multi">
        <div class="icon-matrix">
            <svg viewBox="0 0 100 100">
                <rect x="25" y="10" width="50" height="80" rx="6" stroke="var(--accent-color)"/>
                <rect x="10" y="30" width="35" height="55" rx="4" stroke="var(--accent-color)" opacity="0.6"/>
                <rect x="55" y="30" width="35" height="55" rx="4" stroke="var(--accent-color)" opacity="0.6"/>
                <path class="liquid-trace" d="M35 50 H65 M25 75 H75 M25 25 H75" stroke="var(--accent-color)" stroke-dasharray="8 8"/>
                <circle cx="50" cy="82" r="4" fill="var(--accent-color)"/>
            </svg>
        </div>
        <div class="text-group">
            <div class="title">万物互联</div>
            <div class="desc">INFINITY HUB</div>
        </div>
    </a>

    <a href="#" class="hetero-btn price">
        <div class="icon-matrix">
            <svg viewBox="0 0 100 100">
                <path d="M25 35 L50 10 L75 35 L50 90 Z" fill="none" stroke="var(--accent-color)" stroke-width="2.5" />
                <path d="M25 35 H75 M50 10 V90" stroke="var(--accent-color)" stroke-width="1" opacity="0.5"/>
                <circle class="liquid-trace" cx="50" cy="35" r="8" fill="var(--accent-color)" fill-opacity="0.2"/>
                <path d="M15 45 Q50 45 85 45 M20 55 Q50 55 80 55" stroke="var(--accent-color)" opacity="0.3"/>
            </svg>
        </div>
        <div class="text-group">
            <div class="title">特惠套餐</div>
            <div class="desc">VIP PRICING</div>
        </div>
    </a>

</body>
</html>
