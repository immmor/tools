<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1235"/>
      <stop offset="100%" stop-color="#0a0618"/>
    </radialGradient>

    <linearGradient id="phantomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>

    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <clipPath id="phantomClip">
      <path d="M50,40 C50,40 85,25 125,40 C155,51 155,90 135,115 C115,140 85,165 85,165 L65,165 C65,165 75,130 75,105 C75,75 50,75 50,40 Z"/>
    </clipPath>

    <style>
      /* 呼吸灯动画 */
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.9; filter: drop-shadow(0 0 8px rgba(168,85,247,0.4)); }
        50% { transform: scale(1.02); opacity: 1; filter: drop-shadow(0 0 18px rgba(6,182,212,0.7)); }
      }

      /* 幽灵漂浮动画 */
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }

      /* VPN 信号波纹动画 */
      @keyframes wave {
        0% { r: 10px; opacity: 0.6; stroke-width: 2; }
        100% { r: 75px; opacity: 0; stroke-width: 0.5; }
      }

      /* 核心流束扫描动画 */
      @keyframes scan {
        0% { transform: translateX(-150px) skewX(-30deg); }
        100% { transform: translateX(250px) skewX(-30deg); }
      }

      /* 样式应用 */
      .bg { fill: url(#bgGrad); }
      .animated-group {
        transform-origin: center;
        animation: float 4s ease-in-out infinite;
      }
      .main-shape {
        fill: url(#phantomGrad);
        transform-origin: center;
        animation: pulse 4s ease-in-out infinite;
      }
      .scan-line {
        fill: url(#scanGrad);
        animation: scan 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      .vpn-wave {
        fill: none;
        stroke: #06b6d4;
        transform-origin: 105px 75px;
        animation: wave 3s cubic-bezier(0.1, 0.8, 0.3, 1) infinite;
      }
      .vpn-wave-delayed {
        animation-delay: 1.5s;
      }
      .eye {
        fill: #ffffff;
        filter: drop-shadow(0 0 4px #06b6d4);
      }
    </style>
  </defs>

  <rect width="200" height="200" rx="30" class="bg"/>

  <circle cx="105" cy="75" r="20" class="vpn-wave" />
  <circle cx="105" cy="75" r="20" class="vpn-wave vpn-wave-delayed" />

  <g class="animated-group">
    <g clip-path="url(#phantomClip)">
      <path d="M50,40 C50,40 85,25 125,40 C155,51 155,90 135,115 C115,140 85,165 85,165 L65,165 C65,165 75,130 75,105 C75,75 50,75 50,40 Z" class="main-shape"/>
      <rect x="0" y="20" width="60" height="150" class="scan-line" />
    </g>

    <ellipse cx="105" cy="75" rx="5" ry="8" class="eye" transform="rotate(-10 105 75)" />
  </g>
</svg>
