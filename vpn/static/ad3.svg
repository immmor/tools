<svg width="970" height="200" viewBox="0 0 970 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a"/>
      <stop offset="50%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
      <animate attributeName="x1" values="0%;50%;0%" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;150%;100%" dur="10s" repeatCount="indefinite"/>
    </linearGradient>
    
    <!-- 文字渐变 -->
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF5A00"/>
      <stop offset="50%" style="stop-color:#FF9400"/>
      <stop offset="100%" style="stop-color:#FF5A00"/>
      <animate attributeName="x1" values="0%;100%;0%" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100%;200%;100%" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    
    <!-- 发光滤镜 -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 动态背景 -->
  <rect width="970" height="200" fill="url(#bgGradient)" rx="8"/>
  
  <!-- 装饰性光效 -->
  <ellipse cx="100" cy="100" rx="150" ry="80" fill="#FF5A00" opacity="0.1">
    <animate attributeName="cx" values="100;200;100" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  
  <ellipse cx="870" cy="100" rx="150" ry="80" fill="#FF9400" opacity="0.1">
    <animate attributeName="cx" values="870;770;870" dur="8s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="4s" repeatCount="indefinite"/>
  </ellipse>
  
  <!-- 主标题 - 带发光和渐变效果 -->
  <text x="485" y="105" font-family="Arial, sans-serif" font-size="64" font-weight="bold" fill="url(#textGradient)" text-anchor="middle" filter="url(#glow)">
    全球苹果 ID 销售
    <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
  </text>
  
  <!-- 副标题 - 带淡入效果 -->
  <text x="485" y="150" font-family="Arial, sans-serif" font-size="20" fill="#FF9400" text-anchor="middle">
    稳定可靠 · 价格优惠
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </text>
  
  <!-- 闪烁的小星星装饰 -->
  <g fill="#FF9400">
    <circle cx="200" cy="50" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="770" cy="50" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="485" cy="180" r="2">
      <animate attributeName="opacity" values="0;1;0" dur="1.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
