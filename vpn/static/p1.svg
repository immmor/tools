<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a1c29" />
      <stop offset="100%" stop-color="#0e1017" />
    </radialGradient>

    <linearGradient id="phantomGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7f00ff" />
      <stop offset="100%" stop-color="#ff007f" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <style>
    /* 基础画布样式 */
    rect.bg {
      fill: url(#bgGrad);
    }

    /* 核心幽灵盾牌：呼吸与悬浮动画 */
    .phantom-shield {
      animation: float 4s ease-in-out infinite;
      transform-origin: 100px 100px;
    }

    /* 幽灵的双眼：闪烁与凝视 */
    .eyes {
      animation: blink 6s ease-in-out infinite;
      transform-origin: 100px 95px;
    }

    /* 外围安全防护圈：旋转与脉冲 */
    .defense-ring {
      animation: rotateRing 12s linear infinite;
      transform-origin: 100px 100px;
      stroke-dasharray: 12 12 60 12;
    }

    .pulse-ring {
      animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      transform-origin: 100px 100px;
    }

    /* 关键帧动画定义 */
    @keyframes float {
      0%, 100% {
        transform: translateY(0px) scale(1);
      }
      50% {
        transform: translateY(-6px) scale(1.02);
      }
    }

    @keyframes blink {
      0%, 45%, 55%, 100% {
        transform: scaleY(1);
        opacity: 1;
      }
      50% {
        transform: scaleY(0.1);
        opacity: 0.3;
      }
    }

    @keyframes rotateRing {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0% {
        transform: scale(0.7);
        opacity: 0.8;
      }
      100% {
        transform: scale(1.2);
        opacity: 0;
      }
    }
  </style>

  <rect class="bg" width="200" height="200" rx="24" />

  <circle class="pulse-ring" cx="100" cy="100" r="65" fill="none" stroke="#00f2fe" stroke-width="1" opacity="0.4" filter="url(#glow)"/>

  <circle class="defense-ring" cx="100" cy="100" r="75" fill="none" stroke="#4facfe" stroke-width="2" stroke-linecap="round" opacity="0.6" />

  <g class="phantom-shield">
    <path d="M100 45 C125 45 145 55 145 85 C145 125 100 155 100 155 C100 155 55 125 55 85 C55 55 75 45 100 45 Z" 
          fill="url(#coreGrad)" opacity="0.5" filter="url(#glow)"/>
          
    <path d="M100 50 C120 50 138 58 138 85 C138 118 100 145 100 145 C100 145 62 118 62 85 C62 58 80 50 100 50 Z" 
          fill="none" stroke="url(#phantomGrad)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
    
    <path d="M100 65 C115 65 125 75 125 90 C125 110 100 130 100 130 C100 130 75 110 75 90 C75 75 85 65 100 65 Z" 
          fill="#131520" />

    <g class="eyes" fill="#00f2fe" filter="url(#glow)">
      <path d="M83 92 Q92 92 95 98 Q88 100 83 92 Z" />
      <path d="M117 92 Q108 92 105 98 Q112 100 117 92 Z" />
    </g>
    
    <circle cx="100" cy="115" r="2" fill="#4facfe" />
    <line x1="100" y1="115" x2="100" y2="125" stroke="#4facfe" stroke-width="1.5" stroke-dasharray="2 2" />
  </g>
</svg>
