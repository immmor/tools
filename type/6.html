<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>流光英语 - 渐进野兽派波普版</title>
    <style>
        :root {
            --bg-acid: #ccff00;        /* 荧光强酸绿 */
            --brutal-black: #000000;   /* 绝对油漆黑 */
            --pop-purple: #8a2be2;     /* 浓烈波普紫 */
            --pop-orange: #ff6b00;     /* 阶段过渡橙 */
            --pop-wrong: #ff0055;      /* 强力闪烁红 */
            --font-brutal: "Impact", "Arial Black", -apple-system, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-brutal);
            background-color: var(--bg-acid);
            color: var(--brutal-black);
            min-height: 100vh;
            position: relative;
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 重力几何碎块画布 */
        #brutal-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 绝对正向、硬核对齐的野兽派舞台 */
        .pop-stage {
            width: 88%;
            max-width: 950px;
            background: #ffffff;
            border: 4px solid var(--brutal-black);
            box-shadow: 12px 12px 0px var(--brutal-black);
            padding: clamp(2rem, 5vw, 4rem) clamp(1.5rem, 5vw, 4rem);
            position: relative;
            z-index: 5;
            display: flex;
            flex-direction: column;
            transform: none; /* 坚决正过来，不倾斜 */
            transition: all 0.1s ease;
        }

        /* 顶部横幅 */
        .pop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            border-bottom: 4px solid var(--brutal-black);
            padding-bottom: 15px;
        }

        .brand-logo {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            background: var(--brutal-black);
            color: var(--bg-acid);
            padding: 4px 12px;
        }

        /* 独创：驱动阶段指示器 (难词 -> 短语 -> 全句) */
        .stage-indicator {
            display: flex;
            gap: 10px;
        }
        .step-pill {
            font-size: 0.75rem;
            font-weight: 900;
            padding: 4px 10px;
            border: 2px solid var(--brutal-black);
            background: #ffffff;
            color: var(--brutal-black);
            text-transform: uppercase;
        }
        .step-pill.active {
            background: var(--pop-orange);
            color: #ffffff;
            box-shadow: 2px 2px 0px var(--brutal-black);
        }

        /* 中文含义引导 */
        .translation {
            font-size: clamp(1.2rem, 3vw, 1.7rem);
            color: var(--brutal-black);
            font-weight: 900;
            line-height: 1.5;
            margin-bottom: 3rem;
            text-align: left;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        /* 核心打字矩阵区 */
        .word-area {
            display: flex;
            flex-wrap: wrap;
            row-gap: clamp(20px, 5vw, 32px);
            column-gap: 0px;
            width: 100%;
            min-height: 140px;
        }

        .word-block {
            display: flex;
            margin-right: clamp(16px, 3vw, 26px);
        }

        /* 字母结构 */
        .char {
            font-size: clamp(2.4rem, 6.5vw, 4rem);
            font-weight: 900;
            color: transparent; 
            position: relative;
            display: inline-block;
            text-align: center;
            min-width: clamp(16px, 4vw, 26px);
            height: clamp(3.8rem, 10vw, 5.8rem);
            line-height: clamp(3.8rem, 10vw, 5.8rem);
        }

        .char.symbol {
            color: rgba(0, 0, 0, 0.15);
        }

        /* 强行提示 */
        .word-area.reveal .char {
            color: rgba(0, 0, 0, 0.06);
            -webkit-text-stroke: 1px rgba(0, 0, 0, 0.2);
        }

        /* 输入正确 */
        .char.correct {
            color: #ffffff !important;
            background: var(--brutal-black);
            animation: popStamp 0.12s steps(2, end) forwards;
        }

        /* 错误状态：硬核舞台颤抖 */
        .pop-stage.brutal-shaking {
            animation: brutalShock 0.15s linear;
            background: var(--pop-wrong);
        }

        /* 核心光标：高光矩形块 */
        .char.current::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 0;
            width: 100%;
            height: 80%;
            background: var(--pop-purple);
            z-index: -1;
            animation: hardFlash 0.4s steps(2, start) infinite;
        }

        @keyframes popStamp {
            0% { transform: scale(1.4); }
            100% { transform: scale(1); }
        }

        @keyframes brutalShock {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(-8px, 4px); }
            75% { transform: translate(8px, -4px); }
        }

        @keyframes hardFlash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.1; }
        }

        #hidden-input {
            position: absolute;
            opacity: 0;
            z-index: -1;
            left: -9999px;
        }

        @media (max-width: 768px) {
            .pop-stage {
                width: 92%;
                box-shadow: 6px 6px 0px var(--brutal-black);
                padding: 2rem 1.2rem;
            }
            .pop-header {
                margin-bottom: 2rem;
            }
            .translation {
                margin-bottom: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- 重力几何粒子画布 -->
    <canvas id="brutal-canvas"></canvas>

    <div class="pop-stage" id="main-stage" onclick="focusInput()">
        <!-- 头部导航与阶段锚点 -->
        <div class="pop-header">
            <div class="brand-logo">PROGRESSIVE.POP</div>
            <div class="stage-indicator">
                <div class="step-pill" id="pill-words">1. 难词热身</div>
                <div class="step-pill" id="pill-phrases">2. 短语重组</div>
                <div class="step-pill" id="pill-sentence">3. 完整通关</div>
            </div>
        </div>

        <!-- 语义提示区 -->
        <div class="translation" id="translation">正在架构渐进流水线...</div>
        <!-- 打字互动区 -->
        <div class="word-area" id="word-area"></div>
    </div>

    <input type="text" id="hidden-input" autocomplete="off" autocapitalize="off" spellcheck="false">

    <script>
        let rawSentences = [];
        let sentenceIndex = 0;
        
        // 渐进式驱动控制状态
        let learningStage = 0; // 0: 难词练习, 1: 短语练习, 2: 完整全句
        let stageTasks = [];   // 当前阶段拆分出来的子任务列表
        let taskIndex = 0;     // 当前执行到第几个子任务
        
        let currentLetterIndex = 0;
        let currentTargetString = "";
        let revealTimeout = null;
        let charMapping = [];

        const translationEl = document.getElementById('translation');
        const wordAreaEl = document.getElementById('word-area');
        const hiddenInput = document.getElementById('hidden-input');
        const stageEl = document.getElementById('main-stage');
        const canvas = document.getElementById('brutal-canvas');
        const ctx = canvas.getContext('2d');
        let blocks = [];

        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        async function loadSentences() {
            try {
                const response = await fetch('sentences.json');
                if (!response.ok) throw new Error('ERR');
                rawSentences = await response.json();
                if (rawSentences.length > 0) {
                    sentenceIndex = 0;
                    startSentenceEngine();
                }
            } catch (error) {
                translationEl.textContent = "未检测到本地词库 sentences.json，请启动 Live Server 环境。";
            }
        }

        // --- 三维渐进式任务解构核心引擎 ---
        function startSentenceEngine() {
            learningStage = 0;
            taskIndex = 0;
            
            const currentItem = rawSentences[sentenceIndex];
            
            // 建立当前句子的阶段拆解任务库
            // 1. 难词任务包 (若库中未配置难词，则自动抓取全句中长度 > 6 的词)
            let hardWords = currentItem.hard_words || [];
            if (hardWords.length === 0) {
                hardWords = currentItem.en.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").split(' ').filter(w => w.length >= 6);
            }
            // 去重
            hardWords = [...new Set(hardWords)];

            // 2. 短语任务包 (自动根据每 2-3 个单词切分块)
            let rawWords = currentItem.en.split(' ');
            let phrases = [];
            for (let i = 0; i < rawWords.length; i += 3) {
                phrases.push(rawWords.slice(i, i + 3).join(' '));
            }

            // 3. 将三个阶段的任务结构化存储
            stageTasks = [
                hardWords.map(w => ({ text: w, zh: `【核心难词强化】: ${w}` })),
                phrases.map(p => ({ text: p, zh: `【意群语义拼接】: ${currentItem.zh}` })),
                [{ text: currentItem.en, zh: currentItem.zh }]
            ];

            // 针对无符合难词的句子处理机制
            if (stageTasks[0].length === 0) {
                learningStage = 1; // 直接进入短语阶段
            }

            executeTask();
        }

        function executeTask() {
            // 更新全局高亮指示灯
            document.querySelectorAll('.step-pill').forEach(p => p.classList.remove('active'));
            if(learningStage === 0) document.getElementById('pill-words').classList.add('active');
            if(learningStage === 1) document.getElementById('pill-phrases').classList.add('active');
            if(learningStage === 2) document.getElementById('pill-sentence').classList.add('active');

            const currentTask = stageTasks[learningStage][taskIndex];
            translationEl.textContent = currentTask.zh;
            currentTargetString = currentTask.text;
            currentLetterIndex = 0;
            hiddenInput.value = "";

            const words = currentTargetString.split(' ');
            let globalIndex = 0;
            let htmlBuffer = "";
            charMapping = [];

            words.forEach((wordStr, wordIdx) => {
                htmlBuffer += `<div class="word-block">`;
                wordStr.split('').forEach((char) => {
                    const isLetter = /[a-zA-Z0-9]/.test(char);
                    const typeClass = isLetter ? 'letter' : 'symbol';
                    const currentClass = (globalIndex === 0) ? ' current' : '';
                    
                    htmlBuffer += `<span class="char ${typeClass}${currentClass}" data-index="${globalIndex}">${char}</span>`;
                    charMapping.push({ char: char, isLetter: isLetter });
                    globalIndex++;
                });

                if (wordIdx < words.length - 1) {
                    htmlBuffer += `<span class="char symbol" data-index="${globalIndex}">&nbsp;</span>`;
                    charMapping.push({ char: ' ', isLetter: false });
                    globalIndex++;
                }
                htmlBuffer += `</div>`;
            });

            wordAreaEl.innerHTML = htmlBuffer;
            if (learningStage === 2 && taskIndex === 0) speakSentence(); // 全句阶段自动发音
        }

        function nextTaskStage() {
            taskIndex++;
            // 校验当前阶段内的子任务是否清空
            if (taskIndex < stageTasks[learningStage].length) {
                executeTask();
            } else {
                // 跃迁进入下一级大阶段
                learningStage++;
                taskIndex = 0;
                if (learningStage < 3) {
                    executeTask();
                } else {
                    // 三维闭环全部攻克，流转下一全句
                    sentenceIndex = (sentenceIndex + 1) % rawSentences.length;
                    startSentenceEngine();
                }
            }
        }

        function speakSentence() {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(rawSentences[sentenceIndex].en);
            utterance.lang = 'en-US'; 
            utterance.rate = 1.0; 
            window.speechSynthesis.speak(utterance);
        }

        function peekSentence() {
            if (revealTimeout) clearTimeout(revealTimeout);
            wordAreaEl.classList.add('reveal');
            revealTimeout = setTimeout(() => { wordAreaEl.classList.remove('reveal'); }, 1500);
        }

        // --- Web Audio 电子脉冲效能 ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playKeySound(isCorrect) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            if (isCorrect) {
                osc.type = 'square';
                osc.frequency.setValueAtTime(750, audioCtx.currentTime); 
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                osc.start(); osc.stop(audioCtx.currentTime + 0.03);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(80, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            }
        }

        function playSuccessSound() {
            const notes = [523.25, 659.25, 783.99, 1046.5]; 
            notes.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + index * 0.04);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime + index * 0.04);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + index * 0.04 + 0.12);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + index * 0.04); osc.stop(audioCtx.currentTime + index * 0.04 + 0.12);
            });
        }

        // --- 爆炸性粒子动能引擎 ---
        function triggerExplosion(element) {
            if (!element) return;
            const rect = element.getBoundingClientRect();
            const colors = ['#8a2be2', '#000000', '#ffffff', '#ff6b00'];
            for(let i=0; i<4; i++) {
                blocks.push({
                    x: rect.left + rect.width / 2,
                    y: rect.top + rect.height / 2,
                    w: Math.random() * 14 + 10,
                    h: Math.random() * 14 + 10,
                    vx: (Math.random() - 0.5) * 16,
                    vy: (Math.random() - 0.7) * 14 - 4,
                    angle: Math.random() * Math.PI,
                    va: (Math.random() - 0.5) * 0.3,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = blocks.length - 1; i >= 0; i--) {
                const b = blocks[i]; b.vy += 0.5; b.x += b.vx; b.y += b.vy; b.angle += b.va;
                if (b.y > canvas.height + 50 || b.x < -50 || b.x > canvas.width + 50) { blocks.splice(i, 1); continue; }
                ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.angle); ctx.fillStyle = b.color; ctx.strokeStyle = '#000000'; ctx.lineWidth = 2;
                ctx.fillRect(-b.w/2, -b.h/2, b.w, b.h); ctx.strokeRect(-b.w/2, -b.h/2, b.w, b.h); ctx.restore();
            }
            requestAnimationFrame(animateCanvas);
        }
        animateCanvas();

        function focusInput() { hiddenInput.focus(); }

        hiddenInput.addEventListener('input', () => {
            const spans = wordAreaEl.querySelectorAll('.char');
            const inputValue = hiddenInput.value;
            if (currentLetterIndex >= charMapping.length || stageTasks.length === 0) return;

            const targetChar = charMapping[currentLetterIndex].char;
            const typedChar = inputValue[inputValue.length - 1];
            if (!typedChar) return;

            if (typedChar.toLowerCase() === targetChar.toLowerCase() || (targetChar === ' ' && typedChar === ' ')) {
                const curEl = spans[currentLetterIndex];
                curEl.className = curEl.className.replace('current', '') + ' correct';
                triggerExplosion(curEl);
                playKeySound(true);
                currentLetterIndex++;
                
                while (currentLetterIndex < charMapping.length && !charMapping[currentLetterIndex].isLetter && charMapping[currentLetterIndex].char !== ' ') {
                    spans[currentLetterIndex].className = spans[currentLetterIndex].className.replace('current', '') + ' correct';
                    currentLetterIndex++;
                }
            } else {
                stageEl.classList.add('brutal-shaking');
                playKeySound(false);
                setTimeout(() => { stageEl.classList.remove('brutal-shaking'); }, 150);
            }

            hiddenInput.value = "";

            if (currentLetterIndex < charMapping.length) {
                if(!spans[currentLetterIndex].className.includes('current')) {
                    spans[currentLetterIndex].className += ' current';
                }
            } else {
                playSuccessSound();
                setTimeout(nextTaskStage, 400); // 激进过场
            }
        });

        window.addEventListener('keydown', (e) => {
            if (rawSentences.length === 0) return;
            if (e.shiftKey && (e.key === 'R' || e.key === 'r')) { e.preventDefault(); speakSentence(); }
            if (e.shiftKey && (e.key === 'S' || e.key === 's')) { e.preventDefault(); peekSentence(); }
            focusInput();
        });

        window.onload = () => {
            loadSentences(); 
            focusInput();
            document.body.addEventListener('click', focusInput);
            document.body.addEventListener('touchstart', focusInput);
        };
    </script>
</body>
</html>
