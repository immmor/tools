<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流光英语 - 诗意留白版</title>
    <style>
        /* 默认浅色主题：小清新薄荷奶茶绿 */
        :root {
            --bg-base: #eef3f0;          /* 更具呼吸感的浅灰绿，告别苍白 */
            --text-zh: #6b7770;
            --text-correct: #1c3d27;
            --text-wrong: #d08282;
            --dot-color: #8da396;
            --ripple-color: rgba(28, 61, 39, 0.15);
            --font-serif: "Playfair Display", "Noto Serif CJK SC", "Georgia", serif;
        }

        /* 暗夜竹林主题 */
        [data-theme="dark"] {
            --bg-base: #181e1b;
            --text-zh: #8da396;
            --text-correct: #a3b899;
            --text-wrong: #e09393;
            --dot-color: #4a5750;
            --ripple-color: rgba(163, 184, 153, 0.2);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-serif);
            background-color: var(--bg-base);
            color: var(--text-correct);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; 
            overflow: hidden;
            position: relative;
            transition: background-color 0.5s ease, color 0.5s ease;
        }

        /* 新增：右上角禅意模式切换按钮 */
        .theme-toggle {
            position: absolute;
            top: 2rem;
            right: 2rem;
            font-size: 0.85rem;
            color: var(--text-zh);
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
            z-index: 10;
            letter-spacing: 0.1em;
        }
        .theme-toggle:hover {
            opacity: 1;
        }

        /* 极简舞台：完全无边界 */
        .stage {
            width: 90%;
            max-width: 900px;
            text-align: center;
            z-index: 5;
        }

        /* 杂志排版感的中文字体 */
        .translation {
            font-size: 1.35rem;
            color: var(--text-zh);
            margin-bottom: 5rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            line-height: 1.8;
            opacity: 0.85;
            transition: color 0.5s ease;
        }

        /* 英文打字流 */
        .word-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            row-gap: 32px;
            column-gap: 0px;
            min-height: 120px;
        }

        .word-block {
            display: flex;
            margin-right: 18px; 
        }

        /* 字母块基底 */
        .char {
            font-size: 2.8rem;
            font-weight: 400;
            color: transparent; 
            position: relative;
            display: inline-block;
            text-align: center;
            min-width: 16px;
            height: 4.5rem;
            line-height: 4.5rem;
            transition: color 0.35s cubic-bezier(0.1, 0.8, 0.25, 1);
        }

        /* 植物新芽引导点 */
        .char.letter::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 5px;
            background: var(--dot-color);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.35;
            transition: all 0.2s ease;
        }

        /* 新增功能：打字连击的视觉涟漪特效 */
        .char .ripple {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: transparent;
            border: 1px solid var(--ripple-color);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            animation: rippleEffect 0.5s ease-out forwards;
        }

        /* 符号与标点 */
        .char.symbol {
            color: rgba(107, 119, 112, 0.35);
        }
        .char.symbol::after {
            display: none;
        }

        /* 强行提示 */
        .word-area.reveal .char {
            color: rgba(28, 61, 39, 0.15);
        }
        [data-theme="dark"] .word-area.reveal .char {
            color: rgba(163, 184, 153, 0.15);
        }

        /* 正确输入 */
        .char.correct {
            color: var(--text-correct) !important;
            animation: inkBloom 0.4s cubic-bezier(0.15, 0.85, 0.3, 1) forwards;
        }
        .char.correct::after {
            opacity: 0 !important;
            transform: translate(-50%, -50%) scale(0);
        }

        /* 错误输入 */
        .char.wrong::after {
            background: var(--text-wrong) !important;
            width: 10px;
            height: 10px;
            opacity: 1 !important;
            box-shadow: 0 0 10px rgba(208, 130, 130, 0.4);
        }
        .char.wrong {
            animation: gentleShake 0.2s linear;
        }

        /* 当前光标 */
        .char.current::after {
            width: 8px;
            height: 8px;
            background: var(--text-correct);
            opacity: 1;
            box-shadow: 0 0 8px rgba(28, 61, 39, 0.2);
            animation: breathGlow 1.2s ease-in-out infinite alternate;
        }

        @keyframes inkBloom {
            0% { opacity: 0; transform: scale(0.8) translateY(5px); filter: blur(3px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        @keyframes gentleShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }

        @keyframes breathGlow {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }

        /* 涟漪动画 */
        @keyframes rippleEffect {
            0% { width: 5px; height: 5px; opacity: 1; }
            100% { width: 50px; height: 50px; opacity: 0; }
        }

        #hidden-input {
            position: absolute;
            opacity: 0;
            z-index: -1;
        }

        /* 底部控制线：独立悬浮于最底部，完全不参与居中空间计算 */
        .footer-tips {
            position: absolute;
            bottom: 3rem; 
            left: 50%;
            transform: translateX(-50%); 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            opacity: 0.4;
            transition: opacity 0.3s ease, color 0.5s ease;
            z-index: 10;
        }
        .footer-tips:hover {
            opacity: 0.8;
        }

        .footer-tips span {
            color: var(--text-zh);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            position: relative;
            padding-bottom: 4px;
        }
        .footer-tips span::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 0; height: 1px;
            background: var(--text-zh);
            transition: width 0.25s ease;
        }
        .footer-tips span:hover::after {
            width: 100%;
        }

        /* 空气微风粒子画布 */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="theme-toggle" id="theme-toggle" onclick="toggleTheme(event)">昼 / 夜</div>

    <div class="stage" onclick="focusInput()">
        <div class="translation" id="translation">正在随风载入诗句...</div>
        <div class="word-area" id="word-area"></div>
    </div>

    <div class="footer-tips">
        <span id="btn-audio">听音 (Shift+R)</span>
        <span id="btn-hint">提示 (Shift+S)</span>
        <span id="btn-next">跳过 (Enter)</span>
    </div>

    <input type="text" id="hidden-input" autocomplete="off" autofocus>

    <script>
        let sentences = []; 
        let currentIndex = 0;
        let currentLetterIndex = 0;
        let currentSentence = "";
        let revealTimeout = null;
        let charMapping = []; 
        
        const translationEl = document.getElementById('translation');
        const wordAreaEl = document.getElementById('word-area');
        const hiddenInput = document.getElementById('hidden-input');
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        // --- 主题切换逻辑 ---
        function toggleTheme(e) {
            e.stopPropagation();
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
            }
            focusInput();
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        async function loadSentences() {
            try {
                // 如果本地没有服务，可以用以下备用默认数据演示
                const defaultData = [
                    {"zh": "生活就像一盒巧克力，你永远不知道你会得到什么。", "en": "Life is like a box of chocolates, you never know what you're gonna get."},
                    {"zh": "凡是过去，皆为序章。", "en": "What's past is prologue."},
                    {"zh": "答案在风中飘荡。", "en": "The answer, my friend, is blowing in the wind."}
                ];
                
                const response = await fetch('sentences.json').catch(()=>{});
                if (response && response.ok) {
                    sentences = await response.json();
                } else {
                    sentences = defaultData; // 降级处理防止白屏
                }
                if (sentences.length > 0) initSentence();
            } catch (error) {
                translationEl.textContent = "数据加载遇到了点微风阻碍。";
            }
        }

        function speakSentence() {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(currentSentence);
            utterance.lang = 'en-US'; 
            utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
        }

        function peekSentence() {
            if (revealTimeout) clearTimeout(revealTimeout);
            wordAreaEl.classList.add('reveal');
            revealTimeout = setTimeout(() => {
                wordAreaEl.classList.remove('reveal');
            }, 2000);
        }

        function nextSentence() {
            currentIndex = (currentIndex + 1) % sentences.length;
            initSentence();
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playKeySound(isCorrect) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (isCorrect) {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(420, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.03);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                osc.start(); osc.stop(audioCtx.currentTime + 0.03);
            } else {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(140, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            }
        }

        function playSuccessSound() {
            const notes = [440, 554.37, 659.25, 880]; 
            notes.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + index * 0.07);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime + index * 0.07);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + index * 0.07 + 0.4);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + index * 0.07); osc.stop(audioCtx.currentTime + index * 0.07 + 0.4);
            });
        }

        let environmentParticles = [];
        class EnvParticle {
            constructor() { this.reset(true); }
            reset(init = false) {
                this.x = init ? Math.random() * canvas.width : -10;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.4 + 0.2; 
                this.speedY = (Math.random() - 0.5) * 0.1;
                this.alpha = Math.random() * 0.4 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.reset();
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                // 粒子颜色跟随主题微调
                ctx.fillStyle = document.documentElement.getAttribute('data-theme') === 'dark' ? '#4a5750' : '#8da396';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        for(let i=0; i<30; i++) environmentParticles.push(new EnvParticle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            environmentParticles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        function initSentence() {
            wordAreaEl.classList.remove('reveal');
            if (revealTimeout) clearTimeout(revealTimeout);

            const item = sentences[currentIndex];
            translationEl.textContent = item.zh;
            currentSentence = item.en;
            currentLetterIndex = 0;
            hiddenInput.value = "";

            const words = currentSentence.split(' ');
            let globalIndex = 0;
            let htmlBuffer = "";
            charMapping = [];

            words.forEach((wordStr, wordIdx) => {
                htmlBuffer += `<div class="word-block">`;
                wordStr.split('').forEach((char) => {
                    const isLetter = /[a-zA-Z0-9]/.test(char);
                    const typeClass = isLetter ? 'letter' : 'symbol';
                    const currentClass = (globalIndex === 0) ? ' current' : '';
                    
                    htmlBuffer += `<span class="char ${typeClass}${currentClass}" data-index="${globalIndex}">${char}</span>`;
                    charMapping.push({ char: char, isLetter: isLetter });
                    globalIndex++;
                });

                if (wordIdx < words.length - 1) {
                    htmlBuffer += `<span class="char symbol" data-index="${globalIndex}">&nbsp;</span>`;
                    charMapping.push({ char: ' ', isLetter: false });
                    globalIndex++;
                }
                htmlBuffer += `</div>`;
            });

            wordAreaEl.innerHTML = htmlBuffer;
            speakSentence();
        }

        function focusInput() { hiddenInput.focus(); }

        hiddenInput.addEventListener('input', () => {
            const spans = wordAreaEl.querySelectorAll('.char');
            const inputValue = hiddenInput.value;
            if (currentLetterIndex >= charMapping.length || sentences.length === 0) return;

            const targetChar = charMapping[currentLetterIndex].char;
            const typedChar = inputValue[inputValue.length - 1];
            if (!typedChar) return;

            if (typedChar.toLowerCase() === targetChar.toLowerCase() || (targetChar === ' ' && typedChar === ' ')) {
                const targetSpan = spans[currentLetterIndex];
                
                // 触发新增功能：墨迹涟漪动效
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                targetSpan.appendChild(ripple);
                setTimeout(() => ripple.remove(), 500);

                targetSpan.className = targetSpan.className.replace('current', '') + ' correct';
                playKeySound(true);
                currentLetterIndex++;
                
                while (currentLetterIndex < charMapping.length && !charMapping[currentLetterIndex].isLetter && charMapping[currentLetterIndex].char !== ' ') {
                    spans[currentLetterIndex].className = spans[currentLetterIndex].className.replace('current', '') + ' correct';
                    currentLetterIndex++;
                }
            } else {
                const oldClass = spans[currentLetterIndex].className;
                spans[currentLetterIndex].className += ' wrong';
                playKeySound(false);
                setTimeout(() => {
                    if(spans[currentLetterIndex] && currentLetterIndex < charMapping.length) {
                         spans[currentLetterIndex].className = oldClass;
                    }
                }, 200);
            }

            hiddenInput.value = "";

            if (currentLetterIndex < charMapping.length) {
                if(!spans[currentLetterIndex].className.includes('current')) {
                    spans[currentLetterIndex].className += ' current';
                }
            } else {
                playSuccessSound();
                currentIndex = (currentIndex + 1) % sentences.length;
                setTimeout(initSentence, 800);
            }
        });

        window.addEventListener('keydown', (e) => {
            if (sentences.length === 0) return;
            if (e.shiftKey && (e.key === 'R' || e.key === 'r')) {
                e.preventDefault(); speakSentence();
            } else if (e.shiftKey && (e.key === 'S' || e.key === 's')) {
                e.preventDefault(); peekSentence();
            } else if (e.key === 'Enter') {
                e.preventDefault(); nextSentence();
            }
            focusInput();
        });

        document.getElementById('btn-audio').addEventListener('click', (e) => { e.stopPropagation(); speakSentence(); focusInput(); });
        document.getElementById('btn-hint').addEventListener('click', (e) => { e.stopPropagation(); peekSentence(); focusInput(); });
        document.getElementById('btn-next').addEventListener('click', (e) => { e.stopPropagation(); nextSentence(); focusInput(); });

        window.onload = () => {
            loadSentences(); 
            focusInput();
            document.body.addEventListener('click', focusInput);
        };
    </script>
</body>
</html>
