<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流光英语 - 诗意留白版 Pro Max</title>
    <style>
        :root {
            --bg-base: #eef2ef;
            --text-zh: #5a665f;
            --text-correct: #13331d;
            --text-wrong: #c96b6b;
            --dot-color: #82998b;
            --font-serif: "Playfair Display", "Noto Serif CJK SC", "Georgia", serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-serif);
            background-color: var(--bg-base);
            color: var(--text-correct);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            transition: background-color 0.8s ease;
        }

        /* 极简舞台：绝对留白，完美支持内容过长上下滚动 */
        .stage {
            width: 90%;
            max-width: 950px;
            max-height: 55vh; /* 微微调小舞台最大高度，给底部的单行滑动留出宽裕空间 */
            overflow-y: auto;
            padding: 10px 20px;
            text-align: center;
            z-index: 5;
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.1, 0.8, 0.25, 1);
            scrollbar-width: none;
        }
        .stage::-webkit-scrollbar {
            display: none;
        }

        /* 中文译文区域 */
        .translation {
            font-size: 1.45rem;
            color: var(--text-zh);
            font-weight: 300;
            letter-spacing: 0.15em;
            line-height: 2;
            opacity: 0.85;
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        /* 英文打字流 */
        .word-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            row-gap: 32px;
            column-gap: 0px;
            min-height: 120px;
            animation: fadeIn 0.5s ease forwards;
        }

        .word-block {
            display: flex;
            margin-right: 18px;
        }

        /* 未输入的字母完全隐形 */
        .char {
            font-size: 2.8rem;
            font-weight: 400;
            color: transparent; 
            position: relative;
            display: inline-block;
            text-align: center;
            min-width: 16px;
            height: 4.5rem;
            line-height: 4.5rem;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .char.letter::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 5px;
            background: var(--dot-color);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.35;
            transition: all 0.2s ease;
        }

        body.blind-mode .char.letter::after {
            opacity: 0 !important;
        }

        .char.symbol {
            color: rgba(90, 102, 95, 0.25);
        }
        .char.symbol::after { display: none; }

        .word-area.reveal .char {
            color: rgba(19, 51, 29, 0.12);
        }

        .char.correct {
            color: var(--text-correct) !important;
            animation: inkBloom 0.4s cubic-bezier(0.15, 0.85, 0.3, 1) forwards;
        }
        .char.correct::after {
            opacity: 0 !important;
            transform: translate(-50%, -50%) scale(0);
        }

        .char.wrong::after {
            background: var(--text-wrong) !important;
            width: 10px;
            height: 10px;
            opacity: 1 !important;
            box-shadow: 0 0 10px rgba(201, 107, 107, 0.4);
        }
        .char.wrong {
            animation: gentleShake 0.2s linear;
        }

        .char.current::after {
            width: 8px;
            height: 8px;
            background: var(--text-correct);
            opacity: 1;
            box-shadow: 0 0 8px rgba(19, 51, 29, 0.2);
            animation: breathGlow 1.2s ease-in-out infinite alternate;
        }
        .char.current.caps-warn::after {
            background: var(--text-wrong) !important;
            box-shadow: 0 0 8px rgba(201, 107, 107, 0.6) !important;
        }

        @keyframes inkBloom {
            0% { opacity: 0; transform: scale(0.8) translateY(5px); filter: blur(3px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }
        @keyframes gentleShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }
        @keyframes breathGlow {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #hidden-input {
            position: absolute;
            opacity: 0;
            z-index: -1;
        }

        /* 数据面板 */
        .dashboard {
            position: absolute;
            top: 3rem;
            display: flex;
            gap: 30px;
            font-size: 0.85rem;
            color: var(--text-zh);
            opacity: 0.5;
            z-index: 10;
            letter-spacing: 0.05em;
            transition: opacity 0.3s ease;
            cursor: pointer;
        }
        .dashboard:hover { opacity: 0.9; }

        /* 核心重构：底部控制线——永远保持单行且支持流畅的左右滑动查看 */
        .footer-tips {
            position: absolute;
            bottom: 2.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 950px; /* 与核心舞台最大宽度保持一致 */
            display: block;  /* 改变布局模式以完美兼容水平滚动 */
            white-space: nowrap; /* 核心：强制所有子元素永远不换行 */
            overflow-x: auto;   /* 核心：超出屏幕部分自动开启水平滚动 */
            text-align: center;
            opacity: 0.35;
            transition: opacity 0.3s ease;
            z-index: 10;
            padding: 10px 30px; /* 侧边内边距，保证滑到头时也极具留白感 */
            
            /* 隐藏原生滚动条，保持极其纯净干净的“隐形滑动” */
            scrollbar-width: none; /* Firefox */
            -webkit-overflow-scrolling: touch; /* 让 iOS 的滑动附带阻尼丝滑感 */
        }
        .footer-tips::-webkit-scrollbar {
            display: none; /* Chrome Safari */
        }
        .footer-tips:hover { opacity: 0.9; }

        /* 每个按钮统一变为行内块级，确保不换行排版正常 */
        .footer-tips span {
            display: inline-block;
            color: var(--text-zh);
            font-size: 0.82rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            position: relative;
            padding-bottom: 4px;
            margin: 0 14px; /* 使用水平外边距均匀撑开距离 */
        }
        .footer-tips span::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 0; height: 1px;
            background: var(--text-zh);
            transition: width 0.25s ease;
        }
        .footer-tips span:hover::after { width: 100%; }

        /* 鼠标悬浮（Hover）时优雅显示提示气泡 */
        .footer-tips span::before {
            content: attr(data-tip);
            position: absolute;
            bottom: 150%;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background: rgba(19, 51, 29, 0.85);
            color: #eef2ef;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.1, 0.8, 0.25, 1);
            font-family: sans-serif;
            letter-spacing: 0;
        }
        .footer-tips span:hover::before {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        body.zen-mode .footer-tips, body.zen-mode .dashboard {
            opacity: 0 !important;
            pointer-events: none;
        }

        /* 冥想与弹窗层 */
        .meditation-overlay {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: #dce3de; z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 1s ease;
        }
        .meditation-overlay.active { opacity: 1; pointer-events: auto; }
        .meditation-text { font-size: 1.8rem; color: var(--text-correct); letter-spacing: 0.2em; animation: pulse 4s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 0.4; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.02); } }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(238, 242, 239, 0.95);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #fff; padding: 2.5rem; border-radius: 12px;
            width: 80%; max-width: 500px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: left;
        }
        .modal-content h3 { margin-bottom: 1rem; color: var(--text-correct); }
        .modal-content textarea {
            width: 100%; height: 150px; padding: 10px; border: 1px solid #d0dad4;
            border-radius: 6px; background: #fafcfa; font-family: inherit; margin-bottom: 1.5rem;
            resize: none; outline: none;
        }
        .modal-btns { display: flex; justify-content: flex-end; gap: 15px; }
        .modal-btns button {
            padding: 8px 20px; border: none; border-radius: 4px; cursor: pointer; font-family: inherit;
        }
        .btn-confirm { background: var(--text-correct); color: #fff; }

        #poster-card { text-align: center; font-family: var(--font-serif); color: var(--text-correct); border: 1px solid #e2e8e4; padding: 2rem; background: #fafcfa;}
        #poster-card h4 { font-size: 1.4rem; margin-bottom: 1rem; font-weight: 400;}
        #poster-card p { font-size: 1.1rem; color: var(--text-zh); margin-bottom: 2rem; }
        #poster-meta { font-size: 0.8rem; color: #82998b; border-top: 1px dashed #cedbd2; padding-top: 1rem; }

        #particle-canvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="dashboard" title="点击生成今日诗签海报" onclick="generatePoster()">
        <div>正确率: <span id="val-acc">100</span>%</div>
        <div>进度: <span id="val-progress">0/0</span></div>
    </div>

    <div class="stage" id="stage" onclick="focusInput()">
        <div class="translation" id="translation"></div>
        <div class="word-area" id="word-area"></div>
    </div>

    <div class="footer-tips">
        <span id="btn-audio" data-tip="快捷键: Shift + R">发音</span>
        <span id="btn-hint" data-tip="快捷键: Shift + S">提示</span>
        <span id="btn-zh" data-tip="快捷键: Shift + H">查看译文</span>
        <span id="btn-blind" data-tip="快捷键: Shift + B">盲打</span>
        <span id="btn-zen" data-tip="快捷键: Shift + F">专注</span>
        <span id="btn-sound-mode" data-tip="点击切换输入音色">音效 (水滴)</span>
        <span id="btn-stream" data-tip="开启后自动跳过空格">智能连打 (关)</span>
        <span id="btn-bg" data-tip="开启轻柔的自然白噪音">声景 (雨声)</span>
        <span id="btn-custom" data-tip="粘贴您自己的练习语料">导入诗集</span>
        <span id="btn-wrong-book" data-tip="快捷键: Shift + E">错词集</span>
        <span id="btn-next" data-tip="快捷键: Enter">跳过</span>
    </div>

    <div class="modal" id="custom-modal">
        <div class="modal-content">
            <h3>载入自定义诗集 / 语料</h3>
            <p style="font-size:0.85rem; color:#888; margin-bottom:1rem;">输入规范：每行一条，中英文用竖线 | 隔开：</p>
            <textarea id="custom-input" placeholder="生如夏花之绚烂 | Let life be beautiful like summer flowers."></textarea>
            <div class="modal-btns">
                <button onclick="toggleModal('custom-modal', false)">取消</button>
                <button class="btn-confirm" onclick="saveCustomSentences()">确认载入</button>
            </div>
        </div>
    </div>

    <div class="modal" id="poster-modal">
        <div class="modal-content" style="max-width: 450px;">
            <div id="poster-card">
                <h4 id="post-zh"></h4>
                <p id="post-en"></p>
                <div id="poster-meta"></div>
            </div>
            <div class="modal-btns" style="margin-top: 1.5rem;">
                <button class="btn-confirm" onclick="toggleModal('poster-modal', false)">合上书签</button>
            </div>
        </div>
    </div>

    <div class="meditation-overlay" id="meditation-layer">
        <div class="meditation-text">随风深呼吸，静心歇息...</div>
        <div style="margin-top:2rem; font-size:0.9rem; color:#6b7770;">已连续专注练习15分钟</div>
    </div>

    <input type="text" id="hidden-input" autocomplete="off" autofocus>

    <script>
        const DEFAULT_SENTENCES_URL = './sentences.json';
        const FALLBACK_SENTENCES = [
            {"zh": "草在结它的种子，风在摇它的叶子。", "en": "The grass is heading, the wind is shaking its leaves."},
            {"zh": "我们站着不说话，就十分美好。", "en": "It's beautiful just for us to stand here without a word."},
            {"zh": "你来人间一趟，你要看看太阳。", "en": "You come to the world for a visit, you must see the sun."}
        ];
        let sentences = [];
        let currentIndex = 0;
        let currentLetterIndex = 0;
        let currentSentence = "";
        let revealTimeout = null;
        let charMapping = []; 

        let totalTyped = 0;
        let errorCount = 0;
        let startTime = null;
        let scalePercent = 100;
        let maxWPM = localStorage.getItem('stream_max_wpm') || 0;
        let currentWPM = 0;

        let soundType = 'water'; 
        let isStreamMode = false; 
        let wrongWordsBook = JSON.parse(localStorage.getItem('stream_wrong_book')) || {}; 
        let isShowingTranslation = false;

        let audioCtx = null;
        let bgNode = null; 

        const translationEl = document.getElementById('translation');
        const wordAreaEl = document.getElementById('word-area');
        const hiddenInput = document.getElementById('hidden-input');
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        function getStoredSentences() {
            try {
                const stored = JSON.parse(localStorage.getItem('stream_sentences'));
                return Array.isArray(stored) && stored.length > 0 ? stored : null;
            } catch (error) {
                console.warn('读取本地句库失败，已改用默认句库。', error);
                return null;
            }
        }

        async function loadDefaultSentences() {
            try {
                const response = await fetch(DEFAULT_SENTENCES_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (!Array.isArray(data) || data.length === 0) throw new Error('JSON 内容为空或格式不正确');
                return data;
            } catch (error) {
                console.warn('默认句库加载失败，已回退到内置句库。', error);
                return FALLBACK_SENTENCES;
            }
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function speakSentence() {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(currentSentence);
            utterance.lang = 'en-US'; utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
        }

        function peekSentence() {
            if (isShowingTranslation) hideTranslationMode();
            if (revealTimeout) clearTimeout(revealTimeout);
            wordAreaEl.classList.add('reveal');
            revealTimeout = setTimeout(() => wordAreaEl.classList.remove('reveal'), 2000);
        }

        function nextSentence() {
            currentIndex = (currentIndex + 1) % sentences.length;
            initSentence();
        }

        function toggleTranslationMode() {
            isShowingTranslation = !isShowingTranslation;
            if (isShowingTranslation) {
                wordAreaEl.style.display = 'none';
                translationEl.style.display = 'block';
                document.getElementById('btn-zh').textContent = '恢复打字';
            } else {
                hideTranslationMode();
            }
        }

        function hideTranslationMode() {
            isShowingTranslation = false;
            translationEl.style.display = 'none';
            wordAreaEl.style.display = 'flex';
            document.getElementById('btn-zh').textContent = '查看译文';
            focusInput();
        }

        function toggleBlindMode() { document.body.classList.toggle('blind-mode'); }
        function toggleZenMode() { document.body.classList.toggle('zen-mode'); }
        function toggleStreamMode() {
            isStreamMode = !isStreamMode;
            document.getElementById('btn-stream').textContent = `智能连打 (${isStreamMode ? '开' : '关'})`;
        }
        function toggleSoundType() {
            soundType = (soundType === 'water') ? 'wood' : 'water';
            document.getElementById('btn-sound-mode').textContent = `音效 (${soundType === 'water' ? '水滴' : '木鱼'})`;
        }

        function toggleModal(id, show) { document.getElementById(id).classList.toggle('active', show); }

        function saveCustomSentences() {
            const text = document.getElementById('custom-input').value.trim();
            if(!text) return;
            const lines = text.split('\n');
            let parsed = [];
            lines.forEach(line => {
                const parts = line.split('|');
                if(parts.length === 2) parsed.push({"zh": parts[0].trim(), "en": parts[1].trim()});
            });
            if(parsed.length > 0) {
                sentences = parsed;
                localStorage.setItem('stream_sentences', JSON.stringify(sentences));
                currentIndex = 0; initSentence(); toggleModal('custom-modal', false);
            }
        }

        function generateWrongBookPractice() {
            let sortedWords = Object.keys(wrongWordsBook).sort((a,b) => wrongWordsBook[b] - wrongWordsBook[a]);
            if(sortedWords.length === 0) {
                alert("暂无历史错词记录，继续保持！");
                return;
            }
            let practiceStr = sortedWords.slice(0, 5).join(' ');
            sentences = [{"zh": "✨ 针对您历史高频错词的专项禅意巩固强化", "en": practiceStr}];
            currentIndex = 0; initSentence();
        }

        function generatePoster() {
            document.getElementById('post-zh').textContent = sentences[currentIndex].zh;
            document.getElementById('post-en').textContent = sentences[currentIndex].en;
            const acc = document.getElementById('val-acc').textContent;
            document.getElementById('poster-meta').innerHTML = `流光随笔 • 速度 ${currentWPM} WPM • 正确率 ${acc}%<br><span style="font-size:0.7rem;opacity:0.6;">${new Date().toLocaleDateString()} 打卡留念</span>`;
            toggleModal('poster-modal', true);
        }

        setInterval(() => {
            const layer = document.getElementById('meditation-layer');
            layer.classList.add('active');
            setTimeout(() => layer.classList.remove('active'), 30000); 
        }, 900000); 

        function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

        function playKeySound(isCorrect, isCaps = false) {
            initAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);

            if (isCaps) { 
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.15); return;
            }

            if (isCorrect) {
                if(soundType === 'water') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(420, audioCtx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.03); gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                } else { 
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(220, audioCtx.currentTime); gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
                }
                osc.start(); osc.stop(audioCtx.currentTime + 0.04);
            } else {
                osc.type = 'triangle'; osc.frequency.setValueAtTime(140, audioCtx.currentTime); gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            }
        }

        function toggleAmbientNoise() {
            initAudio();
            if(bgNode) { bgNode.stop(); bgNode = null; document.getElementById('btn-bg').textContent = "声景 (静音)"; return; }
            const bufferSize = 2 * audioCtx.sampleRate, noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate), output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2.0 - 1.0;
            const whiteNoise = audioCtx.createBufferSource(); whiteNoise.buffer = noiseBuffer; whiteNoise.loop = true;
            const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.value = 400;
            const gain = audioCtx.createGain(); gain.gain.value = 0.015;
            whiteNoise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
            whiteNoise.start(); bgNode = whiteNoise; document.getElementById('btn-bg').textContent = "声景 (轻雨)";
        }

        function playSuccessSound() {
            const notes = [440, 554.37, 659.25, 880]; 
            notes.forEach((freq, index) => {
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime + index * 0.07);
                gain.gain.setValueAtTime(0.04, audioCtx.currentTime + index * 0.07); gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + index * 0.07 + 0.4);
                osc.connect(gain); gain.connect(audioCtx.destination); osc.start(audioCtx.currentTime + index * 0.07); osc.stop(audioCtx.currentTime + index * 0.07 + 0.4);
            });
        }

        let environmentParticles = []; let dynamicParticles = [];

        class EnvParticle {
            constructor() { this.reset(true); }
            reset(init = false) {
                this.x = init ? Math.random() * canvas.width : -10; this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5; this.speedX = Math.random() * 0.4 + 0.2; 
                this.speedY = (Math.random() - 0.5) * 0.1; this.alpha = Math.random() * 0.4 + 0.1;
            }
            update() { this.x += this.speedX; this.y += this.speedY; if (this.x > canvas.width) this.reset(); }
            draw() { ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = '#8da396'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
        }

        class InkParticle {
            constructor(x, y, isWrong = false, char = '') {
                this.x = x; this.y = y; this.isWrong = isWrong; this.char = char;
                this.vx = isWrong ? (Math.random() - 0.5) * 2 : (Math.random() - 0.5) * 3; this.vy = isWrong ? Math.random() * 3 + 2 : (Math.random() - 0.5) * 3;
                this.radius = Math.random() * 3 + 2; this.alpha = 0.6;
            }
            update() { this.x += this.vx; this.y += this.vy; this.alpha -= this.isWrong ? 0.015 : 0.02; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha;
                if(this.isWrong) { ctx.fillStyle = '#c96b6b'; ctx.font = "24px var(--font-serif)"; ctx.fillText(this.char, this.x, this.y); }
                else { ctx.fillStyle = '#13331d'; ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill(); }
                ctx.restore();
            }
        }

        function createParticles(el, isWrong = false, char = '') {
            if(!el) return; const rect = el.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2;
            const count = isWrong ? 1 : 8;
            for(let i=0; i<count; i++) dynamicParticles.push(new InkParticle(centerX, centerY, isWrong, char));
        }

        for(let i=0; i<30; i++) environmentParticles.push(new EnvParticle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            environmentParticles.forEach(p => { p.update(); p.draw(); });
            dynamicParticles = dynamicParticles.filter(p => p.alpha > 0); dynamicParticles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        function initSentence() {
            hideTranslationMode();
            if (revealTimeout) clearTimeout(revealTimeout);

            const item = sentences[currentIndex];
            translationEl.textContent = item.zh;
            currentSentence = item.en;
            currentLetterIndex = 0; hiddenInput.value = ""; startTime = null;

            const words = currentSentence.split(' ');
            let globalIndex = 0; let htmlBuffer = ""; charMapping = [];

            words.forEach((wordStr, wordIdx) => {
                htmlBuffer += `<div class="word-block" data-word-id="${wordIdx}">`;
                wordStr.split('').forEach((char) => {
                    const isLetter = /[a-zA-Z0-9]/.test(char);
                    const typeClass = isLetter ? 'letter' : 'symbol';
                    const currentClass = (globalIndex === 0) ? ' current' : '';
                    
                    htmlBuffer += `<span class="char ${typeClass}${currentClass}" data-index="${globalIndex}" data-word-id="${wordIdx}">${char}</span>`;
                    charMapping.push({ char: char, isLetter: isLetter, wordIdx: wordIdx, rawWord: wordStr });
                    globalIndex++;
                });
                if (wordIdx < words.length - 1) {
                    htmlBuffer += `<span class="char symbol" data-index="${globalIndex}" data-word-id="${wordIdx}">&nbsp;</span>`;
                    charMapping.push({ char: ' ', isLetter: false, wordIdx: wordIdx, rawWord: ' ' });
                    globalIndex++;
                }
                htmlBuffer += `</div>`;
            });

            wordAreaEl.innerHTML = htmlBuffer;
            updateDashboard();
            speakSentence();
            document.getElementById('stage').scrollTop = 0;
        }

        function updateDashboard() {
            document.getElementById('val-progress').textContent = `${currentIndex + 1}/${sentences.length}`;
            document.getElementById('val-max-wpm').textContent = maxWPM;
            if(totalTyped > 0) {
                const acc = Math.max(0, Math.min(100, Math.round(((totalTyped - errorCount) / totalTyped) * 100)));
                document.getElementById('val-acc').textContent = acc;
            }
        }

        function focusInput() { hiddenInput.focus(); }

        hiddenInput.addEventListener('input', (e) => {
            if (isShowingTranslation) { hideTranslationMode(); hiddenInput.value = ""; return; }

            const spans = wordAreaEl.querySelectorAll('.char');
            const inputValue = hiddenInput.value;
            if (currentLetterIndex >= charMapping.length || sentences.length === 0) return;

            if(!startTime) startTime = new Date();

            const targetChar = charMapping[currentLetterIndex].char;
            const typedChar = inputValue[inputValue.length - 1];
            if (!typedChar) return;

            if (e.data && /[a-zA-Z]/.test(e.data)) {
                const isTargetUpper = (targetChar === targetChar.toUpperCase() && targetChar !== targetChar.toLowerCase());
                const isTypedUpper = (e.data === e.data.toUpperCase());
                if (isTargetUpper && !isTypedUpper) {
                    spans[currentLetterIndex].classList.add('wrong');
                    setTimeout(() => spans[currentLetterIndex].classList.remove('wrong'), 200);
                    playKeySound(false); hiddenInput.value = ""; return;
                }
            }

            totalTyped++;

            if (typedChar.toLowerCase() === targetChar.toLowerCase() || (targetChar === ' ' && typedChar === ' ')) {
                const currentEl = spans[currentLetterIndex];
                currentEl.className = currentEl.className.replace('current', '').replace('wrong', '') + ' correct';
                
                createParticles(currentEl, false);
                playKeySound(true);
                currentLetterIndex++;
                
                while (currentLetterIndex < charMapping.length && !charMapping[currentLetterIndex].isLetter && charMapping[currentLetterIndex].char !== ' ') {
                    spans[currentLetterIndex].className = spans[currentLetterIndex].className.replace('current', '') + ' correct';
                    currentLetterIndex++;
                }

                if(isStreamMode && currentLetterIndex < charMapping.length && charMapping[currentLetterIndex].char === ' ') {
                    if (spans[currentLetterIndex]) spans[currentLetterIndex].className += ' correct';
                    currentLetterIndex++;
                }
            } else {
                errorCount++;
                spans[currentLetterIndex].classList.add('wrong');
                createParticles(spans[currentLetterIndex], true, typedChar);
                playKeySound(false);

                let wrongWord = charMapping[currentLetterIndex].rawWord;
                if(wrongWord && wrongWord !== ' ') {
                    wrongWordsBook[wrongWord] = (wrongWordsBook[wrongWord] || 0) + 1;
                    localStorage.setItem('stream_wrong_book', JSON.stringify(wrongWordsBook));
                }
            }

            hiddenInput.value = "";

            if(startTime) {
                const elapsedMinutes = (new Date() - startTime) / 60000;
                if(elapsedMinutes > 0.01) {
                    currentWPM = Math.round((currentLetterIndex / 5) / elapsedMinutes);
                    document.getElementById('val-wpm').textContent = currentWPM;
                    if(currentWPM > maxWPM && currentWPM < 200) {
                        maxWPM = currentWPM; localStorage.setItem('stream_max_wpm', maxWPM);
                    }
                }
            }

            if (currentLetterIndex < charMapping.length) {
                if(!spans[currentLetterIndex].className.includes('current')) spans[currentLetterIndex].className += ' current';
                
                const currentEl = spans[currentLetterIndex];
                const stage = document.getElementById('stage');
                if(currentEl.offsetTop > stage.scrollTop + stage.clientHeight - 80) {
                    stage.scrollTop = currentEl.offsetTop - stage.clientHeight + 100;
                }
            } else {
                playSuccessSound();
                currentIndex = (currentIndex + 1) % sentences.length;
                setTimeout(initSentence, 800);
            }
            updateDashboard();
        });

        window.addEventListener('keydown', (e) => {
            if (sentences.length === 0) return;
            const spans = wordAreaEl.querySelectorAll('.char');

            if (isShowingTranslation && e.key !== 'Shift' && e.key !== 'Control') {
                hideTranslationMode(); e.preventDefault(); return;
            }

            if (e.getModifierState && e.getModifierState('CapsLock') && spans[currentLetterIndex]) {
                spans[currentLetterIndex].classList.add('caps-warn');
                if(/[a-zA-Z]/.test(e.key) && e.key === e.key.toUpperCase() && !e.shiftKey) {
                    playKeySound(false, true);
                }
            } else if (spans[currentLetterIndex]) {
                spans[currentLetterIndex].classList.remove('caps-warn');
            }

            if (e.key === 'Backspace' && currentLetterIndex > 0) {
                e.preventDefault();
                if(spans[currentLetterIndex]) spans[currentLetterIndex].classList.remove('current', 'caps-warn');
                currentLetterIndex--;
                while(currentLetterIndex > 0 && !charMapping[currentLetterIndex].isLetter && charMapping[currentLetterIndex].char !== ' ') {
                    spans[currentLetterIndex].className = spans[currentLetterIndex].className.replace('correct', '').replace('wrong', '');
                    currentLetterIndex--;
                }
                spans[currentLetterIndex].className = spans[currentLetterIndex].className.replace('correct', '').replace('wrong', '') + ' current';
                
                const currentEl = spans[currentLetterIndex];
                const stage = document.getElementById('stage');
                if(currentEl.offsetTop < stage.scrollTop + 40) {
                    stage.scrollTop = Math.max(0, currentEl.offsetTop - 40);
                }
                return;
            }

            if (e.shiftKey && (e.key === 'R' || e.key === 'r')) { e.preventDefault(); speakSentence(); }
            else if (e.shiftKey && (e.key === 'S' || e.key === 's')) { e.preventDefault(); peekSentence(); }
            else if (e.shiftKey && (e.key === 'H' || e.key === 'h')) { e.preventDefault(); toggleTranslationMode(); }
            else if (e.shiftKey && (e.key === 'B' || e.key === 'b')) { e.preventDefault(); toggleBlindMode(); }
            else if (e.shiftKey && (e.key === 'F' || e.key === 'f')) { e.preventDefault(); toggleZenMode(); }
            else if (e.shiftKey && (e.key === 'E' || e.key === 'e')) { e.preventDefault(); generateWrongBookPractice(); }
            else if (e.key === 'Enter') { e.preventDefault(); nextSentence(); }
            
            if (e.ctrlKey && (e.key === '=' || e.key === '+')) {
                e.preventDefault(); scalePercent += 10; document.getElementById('stage').style.transform = `scale(${scalePercent/100})`;
            } else if (e.ctrlKey && e.key === '-') {
                e.preventDefault(); scalePercent = Math.max(50, scalePercent - 10); document.getElementById('stage').style.transform = `scale(${scalePercent/100})`;
            }
            focusInput();
        });

        document.getElementById('btn-audio').addEventListener('click', (e) => { e.stopPropagation(); speakSentence(); focusInput(); });
        document.getElementById('btn-hint').addEventListener('click', (e) => { e.stopPropagation(); peekSentence(); focusInput(); });
        document.getElementById('btn-zh').addEventListener('click', (e) => { e.stopPropagation(); toggleTranslationMode(); });
        document.getElementById('btn-blind').addEventListener('click', (e) => { e.stopPropagation(); toggleBlindMode(); focusInput(); });
        document.getElementById('btn-zen').addEventListener('click', (e) => { e.stopPropagation(); toggleZenMode(); focusInput(); });
        document.getElementById('btn-sound-mode').addEventListener('click', (e) => { e.stopPropagation(); toggleSoundType(); focusInput(); });
        document.getElementById('btn-stream').addEventListener('click', (e) => { e.stopPropagation(); toggleStreamMode(); focusInput(); });
        document.getElementById('btn-bg').addEventListener('click', (e) => { e.stopPropagation(); toggleAmbientNoise(); focusInput(); });
        document.getElementById('btn-custom').addEventListener('click', (e) => { e.stopPropagation(); toggleModal('custom-modal', true); });
        document.getElementById('btn-wrong-book').addEventListener('click', (e) => { e.stopPropagation(); generateWrongBookPractice(); focusInput(); });
        document.getElementById('btn-next').addEventListener('click', (e) => { e.stopPropagation(); nextSentence(); focusInput(); });

        window.onload = async () => {
            const storedSentences = getStoredSentences();
            sentences = storedSentences || await loadDefaultSentences();
            initSentence(); focusInput();
            document.body.addEventListener('click', focusInput);
        };
    </script>
</body>
