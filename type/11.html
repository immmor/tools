<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>流光英语 - 诗意留白版</title>
    <style>
        :root {
            /* 升级为更具呼吸感的小清新：浅鼠尾草绿 */
            --bg-base: #eef2f0; 
            --text-zh: #617167;
            --text-correct: #1c3d27;
            --text-wrong: #d08282;
            --dot-color: #8da396;
            --combo-color: #5c836a;
            --font-serif: "Playfair Display", "Noto Serif CJK SC", "Georgia", serif;
            --transition-speed: 0.5s;
        }

        /* 夜幕模式变量 */
        [data-theme="dark"] {
            --bg-base: #1a2420;
            --text-zh: #8ba193;
            --text-correct: #cbdad0;
            --text-wrong: #e29797;
            --dot-color: #4a5f54;
            --combo-color: #8da396;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-serif);
            background-color: var(--bg-base);
            color: var(--text-correct);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center; 
            overflow: hidden;
            position: relative;
            transition: background-color var(--transition-speed) ease, color var(--transition-speed) ease;
        }

        /* 右上角功能区：极简主题切换与连击显示 */
        .top-bar {
            position: absolute;
            top: 2rem;
            right: 3rem;
            left: 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .combo-counter {
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            color: var(--combo-color);
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            transform: translateY(-5px);
        }
        .combo-counter.active {
            opacity: 0.8;
            transform: translateY(0);
        }

        .theme-toggle {
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.3s ease;
            font-size: 1.2rem;
            user-select: none;
        }
        .theme-toggle:hover {
            opacity: 1;
        }

        /* 极简舞台 */
        .stage {
            width: 90%;
            max-width: 900px;
            text-align: center;
            z-index: 5;
        }

        /* 中文字体 */
        .translation {
            font-size: 1.35rem;
            color: var(--text-zh);
            margin-bottom: 5rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            line-height: 1.8;
            opacity: 0.85;
            transition: color var(--transition-speed) ease;
        }

        /* 英文打字流 */
        .word-area {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            row-gap: 32px;
            column-gap: 0px;
            min-height: 120px;
        }

        .word-block {
            display: flex;
            margin-right: 18px; 
        }

        .char {
            font-size: 2.8rem;
            font-weight: 400;
            color: transparent; 
            position: relative;
            display: inline-block;
            text-align: center;
            min-width: 16px;
            height: 4.5rem;
            line-height: 4.5rem;
            transition: all 0.35s cubic-bezier(0.1, 0.8, 0.25, 1);
        }

        .char.letter::after {
            content: '';
            position: absolute;
            width: 5px;
            height: 5px;
            background: var(--dot-color);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.35;
            transition: all 0.2s ease, background var(--transition-speed) ease;
        }

        .char.symbol {
            color: rgba(107, 119, 112, 0.25);
        }
        [data-theme="dark"] .char.symbol {
            color: rgba(203, 218, 208, 0.2);
        }
        .char.symbol::after {
            display: none;
        }

        .word-area.reveal .char {
            color: var(--text-correct);
            opacity: 0.1;
        }
        .word-area.reveal .char::after {
            opacity: 0.05;
        }

        .char.correct {
            color: var(--text-correct) !important;
            animation: inkBloom 0.4s cubic-bezier(0.15, 0.85, 0.3, 1) forwards;
        }
        .char.correct::after {
            opacity: 0 !important;
            transform: translate(-50%, -50%) scale(0);
        }

        .char.wrong::after {
            background: var(--text-wrong) !important;
            width: 10px;
            height: 10px;
            opacity: 1 !important;
            box-shadow: 0 0 10px rgba(208, 130, 130, 0.4);
        }
        .char.wrong {
            animation: gentleShake 0.2s linear;
        }

        .char.current::after {
            width: 8px;
            height: 8px;
            background: var(--text-correct);
            opacity: 1;
            box-shadow: 0 0 8px rgba(28, 61, 39, 0.2);
            animation: breathGlow 1.2s ease-in-out infinite alternate;
        }

        @keyframes inkBloom {
            0% { opacity: 0; transform: scale(0.8) translateY(5px); filter: blur(3px); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
        }

        @keyframes gentleShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-2px); }
            75% { transform: translateX(2px); }
        }

        @keyframes breathGlow {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            100% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }

        #hidden-input {
            position: absolute;
            opacity: 0;
            z-index: -1;
        }

        /* 底部控制线 */
        .footer-tips {
            position: absolute;
            bottom: 3rem; 
            left: 50%;
            transform: translateX(-50%); 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            opacity: 0.4;
            transition: opacity 0.3s ease;
            z-index: 10;
        }
        .footer-tips:hover {
            opacity: 0.8;
        }

        .footer-tips span {
            color: var(--text-zh);
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            position: relative;
            padding-bottom: 4px;
            transition: color var(--transition-speed) ease;
        }
        .footer-tips span::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; width: 0; height: 1px;
            background: var(--text-zh);
            transition: width 0.25s ease, background var(--transition-speed) ease;
        }
        .footer-tips span:hover::after {
            width: 100%;
        }

        /* 空气微风粒子画布 */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="top-bar">
        <div class="combo-counter" id="combo-counter">随风连击 0</div>
        <div class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☼</div>
    </div>

    <div class="stage" onclick="focusInput()">
        <div class="translation" id="translation">正在随风载入诗句...</div>
        <div class="word-area" id="word-area"></div>
    </div>

    <div class="footer-tips">
        <span id="btn-audio">听音 (Shift+R)</span>
        <span id="btn-hint">提示 (Shift+S)</span>
        <span id="btn-next">跳过 (Enter)</span>
    </div>

    <input type="text" id="hidden-input" autocomplete="off" autofocus>

    <script>
        let sentences = []; 
        let currentIndex = 0;
        let currentLetterIndex = 0;
        let currentSentence = "";
        let revealTimeout = null;
        let charMapping = []; 
        let comboCount = 0; // 连击数计数
        let baseSpeed = 0.3; // 粒子基础风速
        
        const translationEl = document.getElementById('translation');
        const wordAreaEl = document.getElementById('word-area');
        const hiddenInput = document.getElementById('hidden-input');
        const comboCounterEl = document.getElementById('combo-counter');
        const themeToggleEl = document.getElementById('theme-toggle');
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 主题切换功能
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.documentElement.removeAttribute('data-theme');
                themeToggleEl.textContent = '☼';
            } else {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeToggleEl.textContent = '☾';
            }
        }

        async function loadSentences() {
            try {
                // 模拟兜底数据，防止本地没有 sentences.json 时彻底白屏
                sentences = [
                    {"zh": "草在结它的种子，风在摇它的叶子。我们站着，不说话，就十分美好。", "en": "The grass is heading, the wind is shaking its leaves. We stand, silent, and it's beautiful."},
                    {"zh": "生如夏花之绚烂，死如秋叶之静美。", "en": "Let life be beautiful like summer flowers and death like autumn leaves."},
                    {"zh": "你走过的地方，山花烂漫。", "en": "Where you pass, mountain flowers bloom in wild profusion."}
                ];
                
                const response = await fetch('sentences.json').catch(()=>{});
                if (response && response.ok) {
                    sentences = await response.json();
                }
                if (sentences.length > 0) initSentence();
            } catch (error) {
                initSentence();
            }
        }

        function speakSentence() {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(currentSentence);
            utterance.lang = 'en-US'; 
            utterance.rate = 0.85; 
            window.speechSynthesis.speak(utterance);
        }

        function peekSentence() {
            if (revealTimeout) clearTimeout(revealTimeout);
            wordAreaEl.classList.add('reveal');
            revealTimeout = setTimeout(() => {
                wordAreaEl.classList.remove('reveal');
            }, 2000);
        }

        function nextSentence() {
            currentIndex = (currentIndex + 1) % sentences.length;
            initSentence();
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playKeySound(isCorrect) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (isCorrect) {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(420 + (comboCount * 5), audioCtx.currentTime); // 连击越高音调越清脆
                osc.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.03);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                osc.start(); osc.stop(audioCtx.currentTime + 0.03);
            } else {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(140, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
            }
        }

        function playSuccessSound() {
            const notes = [440, 554.37, 659.25, 880]; 
            notes.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + index * 0.07);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime + index * 0.07);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + index * 0.07 + 0.4);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + index * 0.07); osc.stop(audioCtx.currentTime + index * 0.07 + 0.4);
            });
        }

        // 环境粒子
        let environmentParticles = [];
        class EnvParticle {
            constructor() {
                this.reset(true);
            }
            reset(init = false) {
                this.x = init ? Math.random() * canvas.width : -10;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.4 + baseSpeed; 
                this.speedY = (Math.random() - 0.5) * 0.1;
                this.alpha = Math.random() * 0.4 + 0.1;
            }
            update() {
                // 根据连击数动态微调粒子风速
                let speedMultiplier = 1 + (comboCount * 0.05);
                this.x += this.speedX * speedMultiplier;
                this.y += this.speedY;
                if (this.x > canvas.width) this.reset();
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                // 从 CSS 变量读取点颜色
                ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--dot-color').trim();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        for(let i=0; i<35; i++) environmentParticles.push(new EnvParticle());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            environmentParticles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        function updateCombo(reset = false) {
            if (reset) {
                comboCount = 0;
                comboCounterEl.classList.remove('active');
            } else {
                comboCount++;
                if (comboCount >= 3) { // 超过 3 连击显示连击特效
                    comboCounterEl.textContent = `随风连击 ${comboCount}`;
                    comboCounterEl.classList.add('active');
                }
            }
        }

        function initSentence() {
            wordAreaEl.classList.remove('reveal');
            if (revealTimeout) clearTimeout(revealTimeout);

            const item = sentences[currentIndex];
            translationEl.textContent = item.zh;
            currentSentence = item.en;
            currentLetterIndex = 0;
            hiddenInput.value = "";
            updateCombo(true);

            const words = currentSentence.split(' ');
            let globalIndex = 0;
            let htmlBuffer = "";
            charMapping = [];

            words.forEach((wordStr, wordIdx) => {
                htmlBuffer += `<div class="word-block">`;
                wordStr.split('').forEach((char) => {
                    const isLetter = /[a-zA-Z0-9]/.test(char);
                    const typeClass = isLetter ? 'letter' : 'symbol';
                    const currentClass = (globalIndex === 0) ? ' current' : '';
                    
                    htmlBuffer += `<span class="char ${typeClass}${currentClass}" data-index="${globalIndex}">${char}</span>`;
                    charMapping.push({ char: char, isLetter: isLetter, state: 'pending' });
                    globalIndex++;
                });

                if (wordIdx < words.length - 1) {
                    htmlBuffer += `<span class="char symbol" data-index="${globalIndex}">&nbsp;</span>`;
                    charMapping.push({ char: ' ', isLetter: false, state: 'pending' });
                    globalIndex++;
                }
                htmlBuffer += `</div>`;
            });

            wordAreaEl.innerHTML = htmlBuffer;
            speakSentence();
        }

        function focusInput() { hiddenInput.focus(); }

        hiddenInput.addEventListener('input', (e) => {
            const spans = wordAreaEl.querySelectorAll('.char');
            const inputValue = hiddenInput.value;
            if (currentLetterIndex >= charMapping.length || sentences.length === 0) return;

            // 处理容错删除功能 (Backspace)
            if (e.inputType === 'deleteContentBackward') {
                if (currentLetterIndex > 0) {
                    // 回退到上一个字母
                    spans[currentLetterIndex].className = spans[currentLetterIndex].className.replace('current', '');
                    currentLetterIndex--;
                    
                    // 如果上一个是自动跳过的符号，继续回退
                    while(currentLetterIndex > 0 && !charMapping[currentLetterIndex].isLetter && charMapping[currentLetterIndex].char !== ' ' && charMapping[currentLetterIndex-1].state === 'auto') {
                        spans[currentLetterIndex].className = spans[currentLetterIndex].className.replace('correct', '').replace('wrong', '');
                        currentLetterIndex--;
                    }
                    
                    spans[currentLetterIndex].className = spans[currentLetterIndex].className.replace('correct', '').replace('wrong', '') + ' current';
                    charMapping[currentLetterIndex].state = 'pending';
                    updateCombo(true); // 断连
                }
                hiddenInput.value = "";
                return;
            }

            const targetChar = charMapping[currentLetterIndex].char;
            const typedChar = inputValue[inputValue.length - 1];
            if (!typedChar) return;

            if (typedChar.toLowerCase() === targetChar.toLowerCase() || (targetChar === ' ' && typedChar === ' ')) {
                spans[currentLetterIndex].className = spans[currentLetterIndex].className.replace('current', '').replace('wrong', '') + ' correct';
                charMapping[currentLetterIndex].state = 'correct';
                playKeySound(true);
                updateCombo(false); // 连击+1
                currentLetterIndex++;
                
                // 自动跳过后面的紧随标点
                while (currentLetterIndex < charMapping.length && !charMapping[currentLetterIndex].isLetter && charMapping[currentLetterIndex].char !== ' ') {
                    spans[currentLetterIndex].className = spans[currentLetterIndex].className.replace('current', '') + ' correct';
                    charMapping[currentLetterIndex].state = 'auto';
                    currentLetterIndex++;
                }
            } else {
                // 输入错误
                if (!spans[currentLetterIndex].className.includes('wrong')) {
                    spans[currentLetterIndex].className += ' wrong';
                }
                charMapping[currentLetterIndex].state = 'wrong';
                playKeySound(false);
                updateCombo(true); // 连击中断
                setTimeout(() => {
                    if(spans[currentLetterIndex] && currentLetterIndex < charMapping.length && charMapping[currentLetterIndex].state === 'wrong') {
                         // 允许错在那，等待修改或盲打通过
                    }
                }, 200);
            }

            hiddenInput.value = "";

            if (currentLetterIndex < charMapping.length) {
                if(!spans[currentLetterIndex].className.includes('current')) {
                    spans[currentLetterIndex].className += ' current';
                }
            } else {
                playSuccessSound();
                currentIndex = (currentIndex + 1) % sentences.length;
                setTimeout(initSentence, 800);
            }
        });

        window.addEventListener('keydown', (e) => {
            if (sentences.length === 0) return;
            // 兼容非 input 事件触发的 Backspace
            if (e.key === 'Backspace') {
                // 触发 input 的删除分支逻辑
                return; 
            }
            if (e.shiftKey && (e.key === 'R' || e.key === 'r')) {
                e.preventDefault(); speakSentence();
            } else if (e.shiftKey && (e.key === 'S' || e.key === 's')) {
                e.preventDefault(); peekSentence();
            } else if (e.key === 'Enter') {
                e.preventDefault(); nextSentence();
            }
            focusInput();
        });

        document.getElementById('btn-audio').addEventListener('click', (e) => { e.stopPropagation(); speakSentence(); focusInput(); });
        document.getElementById('btn-hint').addEventListener('click', (e) => { e.stopPropagation(); peekSentence(); focusInput(); });
        document.getElementById('btn-next').addEventListener('click', (e) => { e.stopPropagation(); nextSentence(); focusInput(); });

        window.onload = () => {
            loadSentences(); 
            focusInput();
            document.body.addEventListener('click', focusInput);
        };
    </script>
</body>
</html>
