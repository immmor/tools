<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>流光英语 - 动能液态暗黑版</title>
    <style>
        :root {
            --bg-base: #0d0f12;         /* 深邃黑曜石 */
            --text-zh: #4a5568;         /* 灰烬暗夜 */
            --text-correct: #00f5d4;    /* 极光冰蓝 */
            --cyber-purple: #7b2cbf;    /* 极光霓虹紫 */
            --cyber-wrong: #ff0055;     /* 量子湮灭红 */
            --font-cyber: "Inter", "Space Grotesk", -apple-system, "Noto Serif CJK SC", sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-cyber);
            background-color: var(--bg-base);
            color: #ffffff;
            min-height: 100vh;
            position: relative;
            overflow: hidden; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 交互动能网格画布 */
        #kinetic-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        /* 赛博舞台 */
        .stage {
            width: 88%;
            max-width: 1100px;
            position: relative;
            z-index: 5;
            padding: 2rem 0;
            display: flex;
            flex-direction: column;
        }

        /* 悬浮控制面板 */
        .control-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            padding-bottom: 20px;
        }

        .brand-neon {
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            background: linear-gradient(45deg, var(--text-correct), var(--cyber-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(0, 245, 212, 0.3));
        }

        .action-group {
            display: flex;
            gap: clamp(10px, 3vw, 25px);
        }

        .action-item {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-zh);
            letter-spacing: 0.1em;
            cursor: pointer;
            text-transform: uppercase;
            padding: 6px 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.01);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .action-item:hover {
            color: #ffffff;
            border-color: var(--text-correct);
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.2);
            transform: translateY(-1px);
        }

        /* 中文：幽深渐现，如烟雾般漂浮 */
        .translation {
            font-size: clamp(1.2rem, 2.8vw, 1.65rem);
            color: #e2e8f0;
            font-weight: 300;
            letter-spacing: 0.08em;
            line-height: 1.8;
            margin-bottom: 5rem;
            max-width: 850px;
            opacity: 0.9;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
            animation: glitchReveal 0.6s ease;
        }

        /* 英文打字流 */
        .word-area {
            display: flex;
            flex-wrap: wrap;
            row-gap: clamp(20px, 5vw, 32px);
            column-gap: 0px;
            width: 100%;
            min-height: 160px;
        }

        .word-block {
            display: flex;
            margin-right: clamp(16px, 3.5vw, 26px);
        }

        /* 字母：未输入时完全隐形 */
        .char {
            font-size: clamp(2.4rem, 6.5vw, 3.8rem);
            font-weight: 700;
            color: transparent; 
            position: relative;
            display: inline-block;
            text-align: center;
            min-width: clamp(16px, 4vw, 26px);
            height: clamp(3.8rem, 10vw, 5.8rem);
            line-height: clamp(3.8rem, 10vw, 5.8rem);
            transition: color 0.3s ease;
        }

        .char.symbol {
            color: rgba(255, 255, 255, 0.08);
        }

        /* 强制提示：幽灵态可见 */
        .word-area.reveal .char {
            color: rgba(255, 255, 255, 0.06);
            text-shadow: 0 0 4px rgba(255, 255, 255, 0.1);
        }

        /* 正确状态：量子坍缩成形，带霓虹呼吸光效 */
        .char.correct {
            color: var(--text-correct) !important;
            text-shadow: 0 0 12px rgba(0, 245, 212, 0.6), 0 0 25px rgba(0, 245, 212, 0.2);
            animation: quantumCollapse 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        /* 错误状态：量子湮灭 */
        .char.wrong {
            animation: quantumAnnihilate 0.25s linear;
        }
        .char.wrong::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(255,0,85,0.4) 0%, transparent 70%);
            animation: particleBlast 0.25s ease-out;
        }

        /* 大胆的核心光标：磁吸流体粒子雾效果 */
        .char.current::before {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--text-correct), var(--cyber-purple));
            box-shadow: 0 0 10px var(--text-correct), 0 0 20px var(--cyber-purple);
            border-radius: 2px;
            animation: streamFlow 1.2s ease-in-out infinite alternate;
        }

        @keyframes glitchReveal {
            0% { opacity: 0; filter: blur(4px) brightness(2); transform: skewX(-5deg); }
            100% { opacity: 0.9; filter: blur(0) brightness(1); transform: skewX(0); }
        }

        @keyframes quantumCollapse {
            0% { transform: scale(1.4) cubic-bezier(0.1, 1, 0.1, 1); filter: brightness(3) blur(2px); }
            100% { transform: scale(1); filter: brightness(1) blur(0); }
        }

        @keyframes quantumAnnihilate {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px) scaleY(0.9); }
            60% { transform: translateX(4px) scaleY(1.1); }
        }

        @keyframes particleBlast {
            0% { transform: scale(0.3); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        @keyframes streamFlow {
            0% { transform: scaleX(0.4); opacity: 0.5; }
            100% { transform: scaleX(1); opacity: 1; }
        }

        #hidden-input {
            position: absolute;
            opacity: 0;
            z-index: -1;
            left: -9999px;
        }

        /* ================= 极暗自适应屏幕适配 ================= */
        @media (max-width: 768px) {
            .stage {
                width: 90%;
            }
            .control-bar {
                margin-bottom: 3rem;
                padding-bottom: 15px;
            }
            .translation {
                margin-bottom: 3.5rem;
            }
            .action-item {
                padding: 4px 10px;
                font-size: 0.7rem;
            }
        }
    </style>
</head>
<body>

    <!-- 交互流体蛛网画布 -->
    <canvas id="kinetic-canvas"></canvas>

    <div class="stage" onclick="focusInput()">
        <!-- 赛博顶栏 -->
        <div class="control-bar">
            <div class="brand-neon">Kinetic.OS</div>
            <div class="action-group">
                <span class="action-item" id="btn-audio">Audio</span>
                <span class="action-item" id="btn-hint">Hint</span>
                <span class="action-item" id="btn-next">Skip</span>
            </div>
        </div>

        <!-- 主内容驱动区 -->
        <div class="translation" id="translation">正在捕获宇宙重力波谱...</div>
        <div class="word-area" id="word-area"></div>
    </div>

    <input type="text" id="hidden-input" autocomplete="off" autocapitalize="off" spellcheck="false">

    <script>
        let sentences = []; 
        let currentIndex = 0;
        let currentLetterIndex = 0;
        let currentSentence = "";
        let revealTimeout = null;
        let charMapping = []; 
        
        const translationEl = document.getElementById('translation');
        const wordAreaEl = document.getElementById('word-area');
        const hiddenInput = document.getElementById('hidden-input');
        const canvas = document.getElementById('kinetic-canvas');
        const ctx = canvas.getContext('2d');

        // 动能网格粒子数组与振幅控制器
        let particles = [];
        let impulse = 0;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }
        window.addEventListener('resize', resizeCanvas);

        // 初始化呈矩阵分布的轻量动能连接节点
        function initParticles() {
            particles = [];
            const cols = 12;
            const rows = 8;
            for(let i=0; i<=cols; i++) {
                for(let j=0; j<=rows; j++) {
                    particles.push({
                        baseX: (canvas.width / cols) * i,
                        baseY: (canvas.height / rows) * j,
                        x: (canvas.width / cols) * i,
                        y: (canvas.height / rows) * j,
                        vx: 0, vy: 0
                    });
                }
            }
        }

        async function loadSentences() {
            try {
                const response = await fetch('sentences.json');
                if (!response.ok) throw new Error('ERR');
                sentences = await response.json();
                if (sentences.length > 0) initSentence();
            } catch (error) {
                translationEl.textContent = "未检测到本地句子库 sentences.json，请启动本地 Live Server 环境。";
            }
        }

        function speakSentence() {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(currentSentence);
            utterance.lang = 'en-US'; 
            utterance.rate = 0.9; 
            window.speechSynthesis.speak(utterance);
        }

        function peekSentence() {
            if (revealTimeout) clearTimeout(revealTimeout);
            wordAreaEl.classList.add('reveal');
            revealTimeout = setTimeout(() => {
                wordAreaEl.classList.remove('reveal');
            }, 2000);
        }

        function nextSentence() {
            currentIndex = (currentIndex + 1) % sentences.length;
            initSentence();
        }

        // --- 晶体数字脉冲声效 (Web Audio API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playKeySound(isCorrect) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (isCorrect) {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.04);
                gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
                osc.start(); osc.stop(audioCtx.currentTime + 0.04);
                impulse = 40; // 产生动能网格剧烈撕扯
            } else {
                osc.type = 'square';
                osc.frequency.setValueAtTime(90, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
                osc.start(); osc.stop(audioCtx.currentTime + 0.08);
                impulse = -25;
            }
        }

        function playSuccessSound() {
            const notes = [587.33, 880, 1174.66]; // 纯澈数字三和弦
            notes.forEach((freq, index) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime + index * 0.05);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime + index * 0.05);
                gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + index * 0.05 + 0.25);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(audioCtx.currentTime + index * 0.05); osc.stop(audioCtx.currentTime + index * 0.05 + 0.25);
            });
        }

        // --- 实时动能网格数学物理仿真 ---
        let mouse = { x: -1000, y: -1000 };
        window.addEventListener('mousemove', (e) => { mouse.x = e.clientX; mouse.y = e.clientY; });
        window.addEventListener('touchmove', (e) => { if(e.touches[0]){ mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; } });

        function animateKineticGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            impulse *= 0.93; // 冲击衰减

            particles.forEach((p, index) => {
                // 计算鼠标与节点距离
                const dx = mouse.x - p.x;
                const dy = mouse.y - p.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                // 鼠标重力场吸引/排斥力
                if(dist < 180) {
                    const force = (180 - dist) / 180;
                    p.vx -= (dx / dist) * force * 1.5;
                    p.vy -= (dy / dist) * force * 1.5;
                }

                // 键盘输入激发的全场动能冲击波动
                if(Math.abs(impulse) > 0.1) {
                    p.vx += Math.sin(p.baseY + impulse) * (impulse * 0.08);
                }

                // 弹性恢复力回到原位
                p.vx += (p.baseX - p.x) * 0.06;
                p.vy += (p.baseY - p.y) * 0.06;

                // 物理摩擦力阻尼
                p.vx *= 0.85;
                p.vy *= 0.85;

                p.x += p.vx;
                p.y += p.vy;
            });

            // 绘制精细的神经网络连线
            ctx.strokeStyle = 'rgba(0, 245, 212, 0.015)';
            ctx.lineWidth = 1;
            for(let i=0; i<particles.length; i++) {
                // 与邻近节点绘制横纵几何丝线
                if((i+1) % 9 !== 0 && i+1 < particles.length) {
                    ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[i+1].x, particles[i+1].y); ctx.stroke();
                }
                if(i + 9 < particles.length) {
                    ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[i+9].x, particles[i+9].y); ctx.stroke();
                }
            }

            requestAnimationFrame(animateKineticGrid);
        }

        // --- 核心逻辑 ---
        function initSentence() {
            wordAreaEl.classList.remove('reveal');
            if (revealTimeout) clearTimeout(revealTimeout);

            const item = sentences[currentIndex];
            translationEl.textContent = item.zh;
            currentSentence = item.en;
            currentLetterIndex = 0;
            hiddenInput.value = "";

            const words = currentSentence.split(' ');
            let globalIndex = 0;
            let htmlBuffer = "";
            charMapping = [];

            words.forEach((wordStr, wordIdx) => {
                htmlBuffer += `<div class="word-block">`;
                wordStr.split('').forEach((char) => {
                    const isLetter = /[a-zA-Z0-9]/.test(char);
                    const typeClass = isLetter ? 'letter' : 'symbol';
                    const currentClass = (globalIndex === 0) ? ' current' : '';
                    
                    htmlBuffer += `<span class="char ${typeClass}${currentClass}" data-index="${globalIndex}">${char}</span>`;
                    charMapping.push({ char: char, isLetter: isLetter });
                    globalIndex++;
                });

                if (wordIdx < words.length - 1) {
                    htmlBuffer += `<span class="char symbol" data-index="${globalIndex}">&nbsp;</span>`;
                    charMapping.push({ char: ' ', isLetter: false });
                    globalIndex++;
                }
                htmlBuffer += `</div>`;
            });

            wordAreaEl.innerHTML = htmlBuffer;
            speakSentence();
        }

        function focusInput() { hiddenInput.focus(); }

        hiddenInput.addEventListener('input', () => {
            const spans = wordAreaEl.querySelectorAll('.char');
            const inputValue = hiddenInput.value;
            if (currentLetterIndex >= charMapping.length || sentences.length === 0) return;

            const targetChar = charMapping[currentLetterIndex].char;
            const typedChar = inputValue[inputValue.length - 1];
            if (!typedChar) return;

            if (typedChar.toLowerCase() === targetChar.toLowerCase() || (targetChar === ' ' && typedChar === ' ')) {
                spans[currentLetterIndex].className = spans[currentLetterIndex].className.replace('current', '') + ' correct';
                playKeySound(true);
                currentLetterIndex++;
                
                while (currentLetterIndex < charMapping.length && !charMapping[currentLetterIndex].isLetter && charMapping[currentLetterIndex].char !== ' ') {
                    spans[currentLetterIndex].className = spans[currentLetterIndex].className.replace('current', '') + ' correct';
                    currentLetterIndex++;
                }
            } else {
                const oldClass = spans[currentLetterIndex].className;
                spans[currentLetterIndex].className += ' wrong';
                playKeySound(false);
                setTimeout(() => {
                    if(spans[currentLetterIndex] && currentLetterIndex < charMapping.length) {
                         spans[currentLetterIndex].className = oldClass;
                    }
                }, 250);
            }

            hiddenInput.value = "";

            if (currentLetterIndex < charMapping.length) {
                if(!spans[currentLetterIndex].className.includes('current')) {
                    spans[currentLetterIndex].className += ' current';
                }
            } else {
                playSuccessSound();
                currentIndex = (currentIndex + 1) % sentences.length;
                setTimeout(initSentence, 750);
            }
        });

        window.addEventListener('keydown', (e) => {
            if (sentences.length === 0) return;
            if (e.shiftKey && (e.key === 'R' || e.key === 'r')) {
                e.preventDefault(); speakSentence();
            } else if (e.shiftKey && (e.key === 'S' || e.key === 's')) {
                e.preventDefault(); peekSentence();
            } else if (e.key === 'Enter') {
                e.preventDefault(); nextSentence();
            }
            focusInput();
        });

        document.getElementById('btn-audio').addEventListener('click', (e) => { e.stopPropagation(); speakSentence(); focusInput(); });
        document.getElementById('btn-hint').addEventListener('click', (e) => { e.stopPropagation(); peekSentence(); focusInput(); });
        document.getElementById('btn-next').addEventListener('click', (e) => { e.stopPropagation(); nextSentence(); focusInput(); });

        window.onload = () => {
            resizeCanvas();
            loadSentences(); 
            animateKineticGrid();
            focusInput();
            document.body.addEventListener('click', focusInput);
            document.body.addEventListener('touchstart', focusInput);
        };
    </script>
</body>
</html>
