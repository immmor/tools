<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Chat</title>
    <style>
        :root {
            --bg-white: #ffffff;
            --text-black: #050505;
            --subtle-gray: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Noto Serif SC", serif; }

        body {
            background-color: var(--bg-white);
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            color: var(--text-black);
        }

        .main-frame {
            width: 100%;
            max-width: 700px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
        }

        @media (min-width: 768px) {
            .main-frame {
                padding: 60px 40px;
            }
        }

        #zenStream {
            flex: 1;
            overflow-y: auto;
            scrollbar-width: none;
            display: flex;
            flex-direction: column;
            gap: 40px;
            padding: 40px 0;
            mask-image: linear-gradient(transparent, black 20%, black 80%, transparent);
        }
        #zenStream::-webkit-scrollbar { display: none; }

        .zen-unit {
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 1.5s cubic-bezier(0.1, 0.9, 0.2, 1) forwards,
                        transform 1.5s cubic-bezier(0.1, 0.9, 0.2, 1) forwards;
            max-width: 100%;
            margin: 0 auto;
            text-align: center;
        }
        .zen-unit.active { opacity: 1; transform: translateY(0); }

        .role-tag {
            font-size: 12px;
            letter-spacing: 2px;
            color: var(--subtle-gray);
            margin-bottom: 10px;
            display: block;
            font-weight: 400;
        }

        .text-content {
            font-size: 17px;
            line-height: 1.7;
            font-weight: 300;
            color: var(--text-black);
            text-align: left;
        }

        @media (min-width: 768px) {
            .text-content {
                font-size: 19px;
            }
        }

        .input-zen {
            padding: 20px 0;
            display: flex;
            justify-content: center;
        }

        #zenInput {
            width: 100%;
            max-width: 600px;
            background: transparent;
            border: none;
            color: var(--text-black);
            font-size: 17px;
            padding: 12px 0;
            text-align: center;
            outline: none;
            border-bottom: 1px solid var(--subtle-gray);
            transition: border-bottom-color 0.3s;
        }

        #zenInput:focus { border-bottom-color: var(--text-black); }
        #zenInput::placeholder { color: var(--subtle-gray); }

        .ink-fade {
            display: inline-block;
            opacity: 0;
            transform: scale(0.8);
            animation: inkIn 0.8s forwards;
        }
        @keyframes inkIn {
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="main-frame">
    <div id="zenStream">
        <div class="zen-unit active">
            <span class="role-tag">你好</span>
            <div class="text-content">欢迎来到 Zen Chat。这里没有干扰，只有纯粹的对话。</div>
        </div>
    </div>

    <div class="input-zen">
        <input type="text" id="zenInput" placeholder="说点什么..." autocomplete="off">
    </div>
</div>

<script>
    const stream = document.getElementById('zenStream');
    const input = document.getElementById('zenInput');

    input.addEventListener('keypress', (e) => {
        if(e.key === 'Enter' && input.value.trim()) {
            emit(input.value.trim());
            input.value = '';
        }
    });

    function emit(text) {
        addUnit('我', text);
        setTimeout(() => aiProcess(), 800);
    }

    function addUnit(sender, text) {
        const div = document.createElement('div');
        div.className = 'zen-unit';
        div.innerHTML = `<span class="role-tag">${sender}</span><div class="text-content">${text}</div>`;
        stream.appendChild(div);
        
        setTimeout(() => div.classList.add('active'), 10);
        scroll();
        return div;
    }

    function aiProcess() {
        const unit = addUnit('Zen AI', '');
        const body = unit.querySelector('.text-content');
        const responses = [
            "在快节奏的世界里，放慢脚步，感受每一次对话的温度。",
            "简洁的界面，是为了让你更专注于内容本身。",
            "每一次对话，都是一次心灵的交流。",
            "让思维如流水般自然流淌，不被打扰。",
            "科技的本质，是连接人心，而非制造距离。",
            "极简的设计，是为了让思想更加清晰。",
            "在这里，我们对话，我们思考，我们成长。",
            "让每一次交流，都成为一种享受。"
        ];
        const response = responses[Math.floor(Math.random() * responses.length)];
        
        let i = 0;
        const timer = setInterval(() => {
            if(i < response.length) {
                const char = document.createElement('span');
                char.className = 'ink-fade';
                char.innerText = response[i];
                char.style.animationDelay = (i * 0.012) + 's';
                body.appendChild(char);
                i++;
                if(i % 5 === 0) scroll();
            } else {
                clearInterval(timer);
            }
        }, 18);
    }

    function scroll() {
        stream.scrollTo({ top: stream.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
