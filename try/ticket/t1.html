<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 演唱会真·正对舞台视角订票</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; background: #000; color: #fff; overflow: hidden; height: 100vh; }
        #webgl-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .interactive { pointer-events: auto; }

        header {
            background: rgba(10, 10, 20, 0.85); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12); padding: 14px 24px; border-radius: 14px;
            display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto; width: 100%;
            box-shadow: 0 12px 30px rgba(0,0,0,0.8);
        }
        .title { font-size: 18px; font-weight: 800; background: linear-gradient(90deg, #00f3ff, #ff0055); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .view-hud {
            position: absolute; left: 24px; top: 90px;
            background: rgba(10, 10, 20, 0.85); border: 1px solid rgba(0, 243, 255, 0.4);
            padding: 10px 18px; border-radius: 12px; font-size: 13px; color: #00f3ff;
            backdrop-filter: blur(12px); display: flex; align-items: center; gap: 10px;
        }

        .booking-card {
            position: absolute; right: 24px; top: 90px; width: 320px;
            background: rgba(15, 15, 25, 0.85); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 18px; padding: 22px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }
        .card-title { font-size: 15px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 10px; margin-bottom: 16px; display: flex; justify-content: space-between; }
        .row { display: flex; justify-content: space-between; font-size: 13px; color: #9999b0; margin-bottom: 10px; }
        .val { font-weight: 600; color: #fff; }
        .price { font-size: 28px; font-weight: 900; color: #00f3ff; margin: 16px 0; text-shadow: 0 0 12px rgba(0,243,255,0.3); }

        .btn-buy {
            width: 100%; padding: 14px; border: none; border-radius: 10px;
            background: linear-gradient(135deg, #00f3ff, #7928ca); color: #fff;
            font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s;
        }
        .btn-buy:disabled { background: #222233; color: #555; cursor: not-allowed; }

        .btn-reset {
            margin-top: 10px; width: 100%; padding: 10px; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15); border-radius: 8px; color: #fff;
            font-size: 12px; cursor: pointer; font-weight: 600;
        }

        .tip-bar { align-self: center; background: rgba(0,0,0,0.8); padding: 8px 20px; border-radius: 20px; font-size: 12px; color: #00f3ff; border: 1px solid rgba(0,243,255,0.2); }
    </style>
    <!-- Three.js + OrbitControls -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="webgl-container"></div>

    <div class="ui-layer">
        <header class="interactive">
            <div>
                <div class="title">2026 WORLD TOUR 演唱会</div>
                <div style="font-size: 12px; color: #8888a0; margin-top: 2px;">绝对正对舞台视角选座</div>
            </div>
        </header>

        <div class="view-hud">
            <span id="hud-text">模式：全景选座模式</span>
        </div>

        <div class="booking-card interactive">
            <div class="card-title">
                <span>看台视野预览</span>
                <span id="badge" style="color: #ff0055; font-size: 12px;">未选座</span>
            </div>
            <div class="row"><span>看台分区：</span><span class="val" id="info-zone">点击看台进入真实视角</span></div>
            <div class="row"><span>视角说明：</span><span class="val" id="info-type">--</span></div>
            <div class="price" id="info-price">¥ 0</div>
            
            <button class="btn-buy" id="btn-buy" disabled>锁定此区域席位</button>
            <button class="btn-reset" id="btn-reset">↺ 返回鸟瞰选座模式</button>
        </div>

        <div class="tip-bar" id="tip-text">
            💡 点击看台后，镜头将平移至座席人眼位置，并强制 100% 正对舞台大屏
        </div>
    </div>

    <script>
        // --- 1. 场景与相机 ---
        const container = document.getElementById('webgl-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020205, 0.005);

        // 绝对核心：舞台中央表演锚点
        const STAGE_CENTER = new THREE.Vector3(0, 10, -35);

        // 全景视角位置
        const OVERVIEW_POS = new THREE.Vector3(0, 75, 100);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.copy(OVERVIEW_POS);

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.copy(STAGE_CENTER); // 视角锚点永远对准舞台中心

        // --- 2. 灯光与舞台构件 ---
        const ambient = new THREE.AmbientLight(0x222233, 1.2);
        scene.add(ambient);

        const spot1 = new THREE.SpotLight(0x00f3ff, 12, 160, 0.45, 0.8);
        spot1.position.set(-20, 35, -25);
        spot1.target.position.copy(STAGE_CENTER);
        scene.add(spot1); scene.add(spot1.target);

        const spot2 = new THREE.SpotLight(0xff0055, 12, 160, 0.45, 0.8);
        spot2.position.set(20, 35, -25);
        spot2.target.position.copy(STAGE_CENTER);
        scene.add(spot2); scene.add(spot2.target);

        // 地面
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x05050a, roughness: 0.3, metalness: 0.7 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 舞台
        const stageGroup = new THREE.Group();
        const stageMat = new THREE.MeshStandardMaterial({ color: 0x11111a, roughness: 0.2, metalness: 0.8 });

        const mainStage = new THREE.Mesh(new THREE.BoxGeometry(38, 2.5, 18), stageMat);
        mainStage.position.set(0, 1.25, -28);
        stageGroup.add(mainStage);

        // 标志性主屏幕（带文字 Canvas 纹理，证明镜头绝对正对）
        const canvas = document.createElement('canvas');
        canvas.width = 512; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#00f3ff'; ctx.fillRect(0, 0, 512, 256);
        ctx.fillStyle = '#000'; ctx.font = 'bold 50px sans-serif';
        ctx.textAlign = 'center'; ctx.fillText('STAGE CENTER', 256, 140);
        
        const screenTexture = new THREE.CanvasTexture(canvas);
        const screenGeo = new THREE.PlaneGeometry(32, 14);
        const screenMat = new THREE.MeshBasicMaterial({ map: screenTexture });
        const screen = new THREE.Mesh(screenGeo, screenMat);
        screen.position.copy(STAGE_CENTER);
        stageGroup.add(screen);

        scene.add(stageGroup);

        // --- 3. 生成环形看台 ---
        const interactiveZones = [];
        const zoneConfigs = [
            { id: 'VIP', name: 'VIP 内场前排区', price: 1880, color: 0xff0055, rMin: 18, rMax: 26, y: 0.2, h: 1.0, type: '前排平视/强临场感' },
            { id: 'CAT1', name: '一层看台核心区', price: 1280, color: 0x00f3ff, rMin: 32, rMax: 42, y: 3.5, h: 5.0, type: '最佳小角度俯视视野' },
            { id: 'CAT2', name: '二层高空观景区', price: 880, color: 0x7928ca, rMin: 46, rMax: 58, y: 11.0, h: 9.0, type: '全局鸟瞰舞美灯光' }
        ];

        zoneConfigs.forEach((zone) => {
            const count = 10;
            const startAng = Math.PI * 0.18;
            const totalAng = Math.PI * 1.64;
            const step = totalAng / count;

            for (let i = 0; i < count; i++) {
                const a1 = startAng + i * step;
                const a2 = a1 + step - 0.03;

                const shape = new THREE.Shape();
                shape.absarc(0, 0, zone.rMax, a1, a2, false);
                shape.lineTo(Math.cos(a2) * zone.rMin, Math.sin(a2) * zone.rMin);
                shape.absarc(0, 0, zone.rMin, a2, a1, true);

                const geometry = new THREE.ExtrudeGeometry(shape, { depth: zone.h, bevelEnabled: true, bevelThickness: 0.2, bevelSize: 0.2 });
                const material = new THREE.MeshStandardMaterial({
                    color: zone.color, roughness: 0.3, metalness: 0.2, transparent: true, opacity: 0.85
                });

                const block = new THREE.Mesh(geometry, material);
                block.rotation.x = -Math.PI / 2;
                block.position.y = zone.y;
                block.position.z = -10;

                // 精准计算人眼位置（看台正面边缘上空 1.6 米）
                const midAngle = (a1 + a2) / 2;
                const rEye = zone.rMin + 1.5;
                const eyeX = Math.cos(midAngle) * rEye;
                const eyeY = zone.y + (zone.h * 0.2) + 1.8; // 保证站高高于座椅
                const eyeZ = Math.sin(midAngle) * rEye - 10;

                block.userData = {
                    name: `${zone.name} - ${i + 1}区`,
                    price: zone.price,
                    type: zone.type,
                    originalColor: zone.color,
                    eyePosition: new THREE.Vector3(eyeX, eyeY, eyeZ)
                };

                scene.add(block);
                interactiveZones.push(block);
            }
        });

        // --- 4. 彻底解决视角的关键动画代码 ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let hoveredBlock = null;
        let selectedBlock = null;

        // 动画变量
        let isAnimating = false;
        let animProgress = 0;
        let animStartPos = new THREE.Vector3();
        let animEndPos = new THREE.Vector3();

        window.addEventListener('pointermove', (e) => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactiveZones);

            if (intersects.length > 0) {
                const hit = intersects[0].object;
                if (hoveredBlock !== hit && hit !== selectedBlock) {
                    if (hoveredBlock && hoveredBlock !== selectedBlock) {
                        hoveredBlock.material.color.setHex(hoveredBlock.userData.originalColor);
                    }
                    hoveredBlock = hit;
                    hoveredBlock.material.color.setHex(0xffffff);
                    document.body.style.cursor = 'pointer';
                }
            } else {
                if (hoveredBlock && hoveredBlock !== selectedBlock) {
                    hoveredBlock.material.color.setHex(hoveredBlock.userData.originalColor);
                    hoveredBlock = null;
                }
                document.body.style.cursor = 'default';
            }
        });

        window.addEventListener('click', () => {
            if (isAnimating) return;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(interactiveZones);

            if (intersects.length > 0) {
                if (selectedBlock) {
                    selectedBlock.material.color.setHex(selectedBlock.userData.originalColor);
                }

                selectedBlock = intersects[0].object;
                selectedBlock.material.color.setHex(0xffff00); // 高亮金黄

                const data = selectedBlock.userData;
                updateUI(data);

                // 开始平滑视角过渡
                startCameraTransition(data.eyePosition);
            }
        });

        function updateUI(data) {
            document.getElementById('info-zone').innerText = data.name;
            document.getElementById('info-type').innerText = data.type;
            document.getElementById('info-price').innerText = `¥ ${data.price}`;
            document.getElementById('badge').innerText = '正对舞台入座';
            document.getElementById('badge').style.color = '#00f3ff';
            document.getElementById('hud-text').innerText = `当前视角：【${data.name}】正面看向【STAGE CENTER】大屏`;

            document.getElementById('btn-buy').disabled = false;
            document.getElementById('btn-buy').innerText = `锁定购买 ¥${data.price}`;
        }

        // 启动平滑视角过度
        function startCameraTransition(targetEyePos) {
            animStartPos.copy(camera.position);
            animEndPos.copy(targetEyePos);
            animProgress = 0;
            isAnimating = true;

            // 1. 强制重置控制器的中心点，确保镜头旋转中心在舞台屏幕正中央
            controls.target.copy(STAGE_CENTER);
            controls.update();
        }

        // 还原鸟瞰模式
        document.getElementById('btn-reset').addEventListener('click', () => {
            if (selectedBlock) {
                selectedBlock.material.color.setHex(selectedBlock.userData.originalColor);
                selectedBlock = null;
            }

            document.getElementById('info-zone').innerText = '点击看台进入真实视角';
            document.getElementById('info-type').innerText = '--';
            document.getElementById('info-price').innerText = '¥ 0';
            document.getElementById('badge').innerText = '未选座';
            document.getElementById('badge').style.color = '#ff0055';
            document.getElementById('hud-text').innerText = '模式：全景选座模式';
            document.getElementById('btn-buy').disabled = true;

            startCameraTransition(OVERVIEW_POS);
        });

        document.getElementById('btn-buy').addEventListener('click', () => {
            if(selectedBlock) {
                alert(`🎉 成功预订！\n\n区域：${selectedBlock.userData.name}\n价格：¥${selectedBlock.userData.price}`);
            }
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 5. 渲染与动画循环 ---
        function animate() {
            requestAnimationFrame(animate);

            // 平滑曲线过渡
            if (isAnimating) {
                animProgress += 0.03; // 过渡速度
                if (animProgress >= 1) {
                    animProgress = 1;
                    isAnimating = false;
                }

                // 采用 SmoothStep 算法实现缓入缓出平滑曲线
                const smoothT = animProgress * animProgress * (3 - 2 * animProgress);
                camera.position.lerpVectors(animStartPos, animEndPos, smoothT);
                
                // 每帧强行修正朝向：对准舞台屏幕中央 (STAGE_CENTER)
                camera.lookAt(STAGE_CENTER);
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>
</html>
