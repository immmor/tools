<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulful - 遇见灵魂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .bg-gradient-mesh {
            background: radial-gradient(circle at 20% 30%, #e0f2fe 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, #f0f9ff 0%, transparent 40%),
                        radial-gradient(circle at 50% 50%, #faf5ff 0%, #f3f4f6 100%);
        }
        .soul-card {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .soul-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
        }
        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            z-index: -1;
            animation: float 8s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-gradient-mesh min-h-screen text-slate-700 font-sans overflow-x-hidden">
    <div class="floating-orb w-64 h-64 bg-blue-100 top-10 left-[-5%]"></div>
    <div class="floating-orb w-80 h-80 bg-purple-100 bottom-10 right-[-10%]" style="animation-delay: -4s;"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [users, setUsers] = useState([
                { id: 1, name: "极光漫步者", tag: "低调学霸", sign: "在代码和诗歌之间寻找平衡。", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=1" },
                { id: 2, name: "抹茶拿铁", tag: "摄影达人", sign: "捕捉生活中的微光。", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=2" },
                { id: 3, name: "星空潜水员", tag: "ACG同好", sign: "今晚的月色真美。", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=3" },
                { id: 4, name: "云端漫游", tag: "独立开发者", sign: "构建一个属于自己的数字世界。", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=4" },
            ]);

            return (
                <div className="max-w-md mx-auto md:max-w-4xl px-4 py-8">
                    {/* Header */}
                    <header className="flex justify-between items-center mb-10">
                        <div>
                            <h1 className="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-500 to-purple-500">
                                Soulful
                            </h1>
                            <p className="text-sm text-slate-400">遇见有趣的灵魂</p>
                        </div>
                        <div className="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center cursor-pointer border border-white/50">
                            <i data-lucide="user" className="w-5 h-5 text-slate-400"></i>
                        </div>
                    </header>

                    {/* Planet Section (Soul特色) */}
                    <section className="mb-12 text-center p-8 rounded-3xl soul-card relative overflow-hidden">
                        <div className="relative z-10">
                            <h2 className="text-xl font-medium mb-2">星球匹配</h2>
                            <p className="text-xs text-slate-400 mb-6">当前有 1,204 个灵魂在线</p>
                            <button className="px-8 py-3 bg-gradient-to-r from-blue-400 to-indigo-400 text-white rounded-full shadow-lg shadow-blue-200 hover:scale-105 transition-transform active:scale-95 font-medium">
                                开启灵魂匹配
                            </button>
                        </div>
                    </section>

                    {/* Feed List */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {users.map(user => (
                            <div key={user.id} className="soul-card p-5 rounded-2xl flex flex-col space-y-4">
                                <div className="flex items-center space-x-4">
                                    <img src={user.avatar} className="w-14 h-14 rounded-full bg-blue-50 p-1" alt="avatar" />
                                    <div>
                                        <h3 className="font-semibold text-slate-800">{user.name}</h3>
                                        <span className="text-[10px] px-2 py-0.5 bg-blue-50 text-blue-500 rounded-full border border-blue-100">
                                            #{user.tag}
                                        </span>
                                    </div>
                                </div>
                                <p className="text-sm text-slate-600 leading-relaxed italic">
                                    "{user.sign}"
                                </p>
                                <div className="flex justify-between items-center pt-2 border-t border-white/40">
                                    <div className="flex space-x-3 text-slate-400">
                                        <button className="hover:text-pink-400 transition-colors">
                                            <i data-lucide="heart" className="w-4 h-4"></i>
                                        </button>
                                        <button className="hover:text-blue-400 transition-colors">
                                            <i data-lucide="message-circle" className="w-4 h-4"></i>
                                        </button>
                                    </div>
                                    <button className="text-xs text-blue-400 font-medium">查看详情</button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* Bottom Nav (Mobile Only) */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm soul-card rounded-2xl p-3 flex justify-around items-center shadow-2xl md:hidden">
                        <i data-lucide="home" className="text-blue-500"></i>
                        <i data-lucide="search" className="text-slate-400"></i>
                        <div className="w-12 h-12 bg-blue-500 rounded-full flex items-center justify-center -translate-y-4 shadow-lg shadow-blue-200">
                            <i data-lucide="plus" className="text-white"></i>
                        </div>
                        <i data-lucide="bell" className="text-slate-400"></i>
                        <i data-lucide="settings" className="text-slate-400"></i>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // 初始化图标
        setTimeout(() => lucide.createIcons(), 100);
    </script>
</body>
</html>
