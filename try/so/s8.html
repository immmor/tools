<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Style - 遇见有趣的灵魂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            margin: 0;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1a 100%);
            overflow-x: hidden;
            color: white;
        }
        /* 模拟星球旋转的背景动画 */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle var(--duration) infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* 隐藏滚动条 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 背景星星组件
        const StarBackground = () => {
            const stars = Array.from({ length: 50 }).map((_, i) => ({
                id: i,
                size: Math.random() * 3 + 'px',
                top: Math.random() * 100 + '%',
                left: Math.random() * 100 + '%',
                duration: (Math.random() * 3 + 2) + 's'
            }));

            return (
                <div className="fixed inset-0 pointer-events-none">
                    {stars.map(star => (
                        <div key={star.id} className="star" style={{
                            width: star.size, height: star.size,
                            top: star.top, left: star.left,
                            '--duration': star.duration
                        }} />
                    ))}
                </div>
            );
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('planet');
            const [users] = useState([
                { id: 1, name: "极光漫步者", tag: "音乐 · 治愈", distance: "0.5km", avatar: "🌌" },
                { id: 2, name: "猫味咖啡粉", tag: "萌宠 · 摄影", distance: "2.3km", avatar: "🐱" },
                { id: 3, name: "晚风收藏家", tag: "旅行 · 记录", distance: "5.0km", avatar: "🍃" },
            ]);

            return (
                <div className="min-h-screen flex flex-col items-center max-w-md mx-auto relative px-4 pb-24">
                    <StarBackground />

                    {/* 顶部导航 */}
                    <header className="w-full pt-8 pb-4 flex justify-between items-center z-10">
                        <h1 className="text-2xl font-light tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-400">
                            SOUL VIBE
                        </h1>
                        <div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center">👤</div>
                    </header>

                    {/* 主内容区域 */}
                    <main className="w-full z-10 mt-6">
                        {activeTab === 'planet' ? (
                            <div className="flex flex-col items-center">
                                {/* 模拟星球中心 */}
                                <div className="w-64 h-64 rounded-full bg-gradient-to-br from-indigo-500/30 to-purple-500/30 flex items-center justify-center animate-pulse mb-10 shadow-[0_0_50px_rgba(79,70,229,0.3)]">
                                    <div className="text-center">
                                        <p className="text-sm opacity-70">正在寻找</p>
                                        <p className="text-lg">共振的灵魂</p>
                                    </div>
                                </div>

                                {/* 用户列表 */}
                                <div className="w-full space-y-4">
                                    {users.map(user => (
                                        <div key={user.id} className="glass-card p-4 rounded-3xl flex items-center transition-transform active:scale-95 cursor-pointer">
                                            <div className="text-3xl mr-4">{user.avatar}</div>
                                            <div className="flex-1">
                                                <h3 className="font-medium">{user.name}</h3>
                                                <p className="text-xs text-white/50 mt-1">{user.tag}</p>
                                            </div>
                                            <div className="text-xs text-blue-300">{user.distance}</div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="text-center py-20 text-white/60 italic">
                                广场功能开发中，敬请期待...
                            </div>
                        )}
                    </main>

                    {/* 底部导航栏 */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-sm glass-card rounded-full p-2 flex justify-around items-center z-50">
                        <button 
                            onClick={() => setActiveTab('planet')}
                            className={`flex-1 py-3 rounded-full transition-all ${activeTab === 'planet' ? 'bg-white/20 text-blue-300' : 'text-white/70'}`}
                        >
                            星球
                        </button>
                        <button 
                            onClick={() => setActiveTab('square')}
                            className={`flex-1 py-3 rounded-full transition-all ${activeTab === 'square' ? 'bg-white/20 text-blue-300' : 'text-white/70'}`}
                        >
                            广场
                        </button>
                        <div className="absolute -top-12 left-1/2 -translate-x-1/2 w-12 h-12 bg-gradient-to-tr from-blue-500 to-purple-600 rounded-full flex items-center justify-center shadow-lg border-4 border-[#1a1a2e] cursor-pointer active:scale-90">
                            <span className="text-2xl">+</span>
                        </div>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
