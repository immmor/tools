<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulStyle - 遇见灵魂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #fef2f2 50%, #f0f9ff 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
        }

        .nav-item-active {
            color: #3b82f6;
            position: relative;
        }

        .nav-item-active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background-color: #3b82f6;
            border-radius: 50%;
        }

        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .planet-glow {
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
            transition: all 0.3s ease;
        }

        .planet-glow:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body class="pb-20 md:pb-0 md:pl-20">

    <nav class="fixed bottom-0 left-0 w-full h-16 md:h-full md:w-20 glass-card rounded-none border-t md:border-t-0 md:border-r z-50 flex md:flex-col items-center justify-around md:justify-center gap-8 md:py-8">
        <div class="hidden md:block mb-auto">
            <div class="w-10 h-10 bg-blue-500 rounded-2xl flex items-center justify-center text-white shadow-lg">
                <i data-lucide="sparkles"></i>
            </div>
        </div>
        <a href="#" class="nav-item-active text-gray-500 hover:text-blue-500 transition-colors">
            <i data-lucide="compass"></i>
        </a>
        <a href="#" class="text-gray-400 hover:text-blue-500 transition-colors">
            <i data-lucide="message-circle"></i>
        </a>
        <a href="#" class="text-gray-400 hover:text-blue-500 transition-colors">
            <i data-lucide="users"></i>
        </a>
        <a href="#" class="text-gray-400 hover:text-blue-500 transition-colors">
            <i data-lucide="user"></i>
        </a>
        <div class="hidden md:block mt-auto text-gray-400 cursor-pointer">
            <i data-lucide="settings"></i>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-8">
        
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-800">星球探索</h1>
                <p class="text-sm text-gray-500">发现有趣的灵魂</p>
            </div>
            <button class="p-2 glass-card rounded-full hover:bg-white transition-all">
                <i data-lucide="search" class="w-5 h-5 text-gray-600"></i>
            </button>
        </header>

        <div class="flex gap-4 mb-8 overflow-x-auto no-scrollbar py-2">
            <button class="px-6 py-2 bg-white text-blue-600 font-medium rounded-full shadow-sm whitespace-nowrap">推荐</button>
            <button class="px-6 py-2 glass-card text-gray-600 hover:bg-white transition-all whitespace-nowrap">拟态星球</button>
            <button class="px-6 py-2 glass-card text-gray-600 hover:bg-white transition-all whitespace-nowrap">同城</button>
            <button class="px-6 py-2 glass-card text-gray-600 hover:bg-white transition-all whitespace-nowrap">语音匹配</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <div class="glass-card p-6 flex flex-col gap-4">
                <div class="flex items-center gap-3">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar" class="w-10 h-10 rounded-full bg-blue-100">
                    <div>
                        <h3 class="font-bold text-gray-800 text-sm">此间少年 <span class="ml-2 text-xs font-normal text-blue-500 bg-blue-50 px-2 py-0.5 rounded">艺术家星球</span></h3>
                        <p class="text-xs text-gray-400">10分钟前 · 1.2km</p>
                    </div>
                </div>
                <p class="text-gray-600 text-sm leading-relaxed">
                    今天在海边看了一场落日，风里夹杂着咸咸的味道。突然觉得，生活虽然忙碌，但总有一些瞬间温柔了岁月。🌊✨
                </p>
                <div class="grid grid-cols-2 gap-2">
                    <div class="aspect-video rounded-xl bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=400&q=80')"></div>
                    <div class="aspect-video rounded-xl bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1519046904884-53103b34b206?auto=format&fit=crop&w=400&q=80')"></div>
                </div>
                <div class="flex justify-between items-center text-gray-400 mt-2">
                    <div class="flex gap-6">
                        <button class="flex items-center gap-1 hover:text-pink-500 transition-colors"><i data-lucide="heart" class="w-4 h-4"></i> <span class="text-xs">128</span></button>
                        <button class="flex items-center gap-1 hover:text-blue-500 transition-colors"><i data-lucide="message-square" class="w-4 h-4"></i> <span class="text-xs">42</span></button>
                    </div>
                    <button class="hover:text-gray-600"><i data-lucide="share-2" class="w-4 h-4"></i></button>
                </div>
            </div>

            <div class="glass-card p-6 flex flex-col gap-4">
                <div class="flex items-center gap-3">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka" alt="Avatar" class="w-10 h-10 rounded-full bg-pink-100">
                    <div>
                        <h3 class="font-bold text-gray-800 text-sm">草莓味晚风</h3>
                        <p class="text-xs text-gray-400">32分钟前 · 5.8km</p>
                    </div>
                </div>
                <div class="bg-blue-50/50 p-4 rounded-2xl flex items-center gap-4 border border-blue-100 cursor-pointer hover:bg-blue-50 transition-all">
                    <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white shadow-md">
                        <i data-lucide="play" class="w-5 h-5 fill-current"></i>
                    </div>
                    <div class="flex-1">
                        <div class="flex gap-1 items-end h-4 mb-1">
                            <div class="w-1 bg-blue-300 h-2 rounded-full"></div>
                            <div class="w-1 bg-blue-400 h-4 rounded-full"></div>
                            <div class="w-1 bg-blue-300 h-3 rounded-full"></div>
                            <div class="w-1 bg-blue-500 h-2 rounded-full"></div>
                            <div class="w-1 bg-blue-200 h-4 rounded-full"></div>
                        </div>
                        <p class="text-xs text-blue-600 font-medium">12"</p>
                    </div>
                </div>
                <p class="text-gray-600 text-sm leading-relaxed">
                    有没有人一起连麦听歌？推荐最近超爱的一首轻音乐 🎵
                </p>
                <div class="flex justify-between items-center text-gray-400 mt-auto">
                    <div class="flex gap-6">
                        <button class="flex items-center gap-1 hover:text-pink-500 transition-colors"><i data-lucide="heart" class="w-4 h-4"></i> <span class="text-xs">56</span></button>
                        <button class="flex items-center gap-1 hover:text-blue-500 transition-colors"><i data-lucide="message-square" class="w-4 h-4"></i> <span class="text-xs">12</span></button>
                    </div>
                    <button class="hover:text-gray-600"><i data-lucide="share-2" class="w-4 h-4"></i></button>
                </div>
            </div>

        </div>

        <button class="fixed right-6 bottom-24 md:bottom-12 md:right-12 w-14 h-14 bg-gradient-to-tr from-blue-400 to-indigo-400 text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-40">
            <i data-lucide="plus" class="w-8 h-8"></i>
        </button>

    </main>

    <script>
        // 初始化 Lucide 图标
        lucide.createIcons();
    </script>
</body>
</html>
