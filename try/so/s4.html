<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulStyle | 寻找有趣的灵魂</title>
    <style>
        :root {
            --bg-color: #0a0b1e;
            --card-bg: rgba(255, 255, 255, 0.1);
            --accent-color: #7ef9ff;
            --text-color: #ffffff;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(126, 249, 255, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(118, 75, 162, 0.2) 0%, transparent 40%);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* 导航栏 */
        nav {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 2px;
            color: var(--accent-color);
        }

        /* 主体布局 */
        main {
            flex: 1;
            padding: 20px 5%;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        /* 星球/动态区 */
        .feed-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .post-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .post-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.15);
        }

        .user-info {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: var(--gradient);
            margin-right: 12px;
            border: 2px solid var(--accent-color);
        }

        .username {
            font-weight: 600;
            font-size: 16px;
        }

        .tag {
            font-size: 12px;
            background: rgba(126, 249, 255, 0.2);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 10px;
        }

        .content {
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 15px;
        }

        /* 侧边栏 (推荐) */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .planet-box {
            background: var(--gradient);
            height: 200px;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .btn-match {
            margin-top: 15px;
            padding: 10px 25px;
            border-radius: 20px;
            border: none;
            background: #fff;
            color: #764ba2;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-match:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--accent-color);
        }

        /* 响应式适配 */
        @media (max-width: 900px) {
            main {
                grid-template-columns: 1fr;
            }
            .sidebar {
                order: -1; /* 手机端推荐位靠上 */
            }
        }

        @media (max-width: 480px) {
            nav { padding: 15px 20px; }
            .logo { font-size: 20px; }
        }

        /* 底部操作栏 (手机端) */
        .mobile-tab {
            display: none;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(10, 11, 30, 0.9);
            backdrop-filter: blur(20px);
            padding: 15px;
            justify-content: space-around;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 600px) {
            .mobile-tab { display: flex; }
            body { padding-bottom: 80px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">SOULVERSE</div>
        <div class="nav-links">
            <span style="cursor:pointer; opacity: 0.8;">广场</span>
        </div>
    </nav>

    <main>
        <section class="feed-section">
            <div class="post-card">
                <div class="user-info">
                    <div class="avatar"></div>
                    <span class="username">孤独的观测者</span>
                    <span class="tag">艺术家星球</span>
                </div>
                <p class="content">今天的晚霞特别温柔，想起了一首歌。如果你也听陈奕迅，那我们就是好朋友了。🌙</p>
                <div style="font-size: 12px; color: rgba(255,255,255,0.4);">2小时前 · 来自北京</div>
            </div>

            <div class="post-card">
                <div class="user-info">
                    <div class="avatar" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);"></div>
                    <span class="username">小岛居民</span>
                    <span class="tag">吃货星球</span>
                </div>
                <p class="content">有人知道这家咖啡店叫什么吗？氛围感拉满了！☕️</p>
                <div style="font-size: 12px; color: rgba(255,255,255,0.4);">5小时前 · 来自上海</div>
            </div>
        </section>

        <aside class="sidebar">
            <div class="planet-box">
                <h2 style="font-size: 20px;">灵魂匹配</h2>
                <p style="font-size: 13px; opacity: 0.8; margin-top: 5px;">找到和你频率一致的人</p>
                <button class="btn-match" onclick="alert('正在穿梭星系查找匹配...')">立即开始</button>
            </div>

            <div class="post-card" style="font-size: 14px;">
                <h3 style="margin-bottom: 10px; color: var(--accent-color);">热门话题</h3>
                <p style="margin-bottom: 8px;"># 熬夜选手的日常</p>
                <p style="margin-bottom: 8px;"># 这里的风景美如画</p>
                <p># 治愈系瞬间</p>
            </div>
        </aside>
    </main>

    <div class="mobile-tab">
        <span>🏠</span>
        <span>🔍</span>
        <span>💬</span>
        <span>👤</span>
    </div>

</body>
</html>
