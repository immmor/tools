<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Style - 治愈系社交</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #e0f2fe 0%, #fef2f2 50%, #f5f3ff 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 毛玻璃核心样式 */
        .glass-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
        }

        /* 模拟Soul星球的漂浮动画 */
        .floating {
            animation: floating 3s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* 底部导航适配 */
        .nav-active { color: #8b5cf6; }
    </style>
</head>
<body class="p-4 md:p-8">

<div id="app" class="max-w-md mx-auto md:max-w-4xl">
    
    <header class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">发现星球</h1>
            <p class="text-xs text-gray-500">找到志趣相投的灵魂</p>
        </div>
        <div class="flex space-x-3">
            <button class="w-10 h-10 glass-card flex items-center justify-center text-gray-600 shadow-sm">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
            <div class="w-10 h-10 rounded-full border-2 border-white shadow-sm overflow-hidden">
                <img src="https://api.dicebear.com/7.x/adventurer/svg?seed=Felix" alt="avatar">
            </div>
        </div>
    </header>

    <section class="relative h-64 md:h-80 glass-card mb-8 flex flex-center items-center justify-center overflow-hidden">
        <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#8b5cf6 1px, transparent 1px); background-size: 20px 20px;"></div>
        
        <div v-for="(node, index) in planets" :key="index" 
             class="absolute floating"
             :style="{ top: node.y + '%', left: node.x + '%', animationDelay: index * 0.5 + 's' }">
            <div class="flex flex-col items-center">
                <div class="w-12 h-12 rounded-full shadow-lg border-2 border-white overflow-hidden bg-white">
                    <img :src="node.img" alt="planet">
                </div>
                <span class="text-[10px] mt-1 bg-white/80 px-2 py-0.5 rounded-full text-gray-600 shadow-sm">{{ node.tag }}</span>
            </div>
        </div>

        <div class="text-center z-10">
            <div class="text-4xl mb-2">✨</div>
            <button class="px-6 py-2 bg-gradient-to-r from-purple-400 to-pink-400 text-white rounded-full font-medium shadow-lg hover:scale-105 transition-transform">
                灵魂匹配
            </button>
        </div>
    </section>

    <div class="grid grid-cols-4 gap-4 mb-8">
        <div v-for="menu in menus" :key="menu.name" class="flex flex-col items-center">
            <div :class="['w-12 h-12 rounded-2xl flex items-center justify-center text-white mb-2 shadow-sm', menu.color]">
                <i :class="menu.icon"></i>
            </div>
            <span class="text-xs text-gray-600">{{ menu.name }}</span>
        </div>
    </div>

    <section class="mb-20">
        <div class="flex justify-between items-end mb-4">
            <h2 class="text-lg font-bold text-gray-800">广场动态</h2>
            <span class="text-xs text-purple-500">查看更多 <i class="fa-solid fa-chevron-right"></i></span>
        </div>

        <div v-for="post in posts" :key="post.id" class="glass-card p-4 mb-4">
            <div class="flex items-center mb-3">
                <img :src="post.avatar" class="w-8 h-8 rounded-full mr-3">
                <div>
                    <div class="text-sm font-bold text-gray-700">{{ post.user }}</div>
                    <div class="text-[10px] text-gray-400">{{ post.time }}</div>
                </div>
            </div>
            <p class="text-sm text-gray-600 leading-relaxed mb-3">{{ post.content }}</p>
            <div class="flex space-x-2 mb-3">
                <span v-for="tag in post.tags" class="text-[10px] bg-purple-50 text-purple-400 px-2 py-1 rounded-md"># {{ tag }}</span>
            </div>
            <div class="flex justify-between items-center text-gray-400 text-xs border-t border-white/50 pt-3">
                <div class="flex space-x-4">
                    <span><i class="fa-regular fa-heart mr-1"></i> {{ post.likes }}</span>
                    <span><i class="fa-regular fa-comment mr-1"></i> {{ post.comments }}</span>
                </div>
                <i class="fa-solid fa-share-nodes"></i>
            </div>
        </div>
    </section>

    <nav class="fixed bottom-4 left-4 right-4 md:relative md:bottom-0 md:left-0 md:right-0 glass-card px-6 py-3 flex justify-between items-center shadow-xl">
        <div class="nav-active flex flex-col items-center">
            <i class="fa-solid fa-earth-asia text-xl"></i>
            <span class="text-[10px] mt-1">星球</span>
        </div>
        <div class="text-gray-400 flex flex-col items-center">
            <i class="fa-solid fa-comment-dots text-xl"></i>
            <span class="text-[10px] mt-1">聊天</span>
        </div>
        <div class="-mt-12 bg-gradient-to-tr from-purple-500 to-indigo-500 w-12 h-12 rounded-full flex items-center justify-center text-white shadow-lg ring-4 ring-white">
            <i class="fa-solid fa-plus"></i>
        </div>
        <div class="text-gray-400 flex flex-col items-center">
            <i class="fa-solid fa-face-smile text-xl"></i>
            <span class="text-[10px] mt-1">动态</span>
        </div>
        <div class="text-gray-400 flex flex-col items-center">
            <i class="fa-solid fa-user text-xl"></i>
            <span class="text-[10px] mt-1">我的</span>
        </div>
    </nav>
</div>

<script>
    new Vue({
        el: '#app',
        data: {
            planets: [
                { x: 10, y: 20, tag: '二次元', img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=1' },
                { x: 75, y: 15, tag: '摄影师', img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=2' },
                { x: 20, y: 65, tag: '深夜食堂', img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=3' },
                { x: 80, y: 70, tag: '代码诗人', img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=4' },
                { x: 50, y: 10, tag: '铲屎官', img: 'https://api.dicebear.com/7.x/avataaars/svg?seed=5' },
            ],
            menus: [
                { name: '语音匹配', icon: 'fa-solid fa-microphone', color: 'bg-blue-400' },
                { name: '群聊派对', icon: 'fa-solid fa-users', color: 'bg-pink-400' },
                { name: '恋爱铃', icon: 'fa-solid fa-bell', color: 'bg-orange-400' },
                { name: '性格测试', icon: 'fa-solid fa-puzzle-piece', color: 'bg-indigo-400' },
            ],
            posts: [
                {
                    id: 1,
                    user: '半夏微醺',
                    avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed=Aria',
                    time: '12分钟前',
                    content: '今天在海边看了一场绝美的日落，感觉整个世界都安静下来了。有人一起分享此刻的温柔吗？✨',
                    tags: ['摄影', '治愈系'],
                    likes: 128,
                    comments: 24
                },
                {
                    id: 2,
                    user: '极客之魂',
                    avatar: 'https://api.dicebear.com/7.x/adventurer/svg?seed=Leo',
                    time: '1小时前',
                    content: '终于把这个 Vue 的动效调通了，写代码的快乐大概就是这种成就感吧。💻',
                    tags: ['程序员', '日常'],
                    likes: 56,
                    comments: 8
                }
            ]
        }
    })
</script>
</body>
</html>
