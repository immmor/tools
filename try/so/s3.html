<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soulful - 遇见有趣的灵魂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(125deg, #e0f2fe 0%, #f0f9ff 50%, #faf5ff 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 动态背景球 */
        .bg-blob {
            position: fixed;
            filter: blur(80px);
            z-index: -1;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        .glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .soul-card:hover {
            transform: translateY(-5px);
            transition: all 0.3s ease;
        }

        /* 隐藏滚动条 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-700">

    <div class="bg-blob w-96 h-96 bg-blue-200 top-[-10%] left-[-10%] opacity-60"></div>
    <div class="bg-blob w-[500px] h-[500px] bg-purple-100 bottom-[-10%] right-[-10%] opacity-60" style="animation-delay: -5s;"></div>

    <nav class="sticky top-0 z-50 glass px-6 py-4 flex justify-between items-center">
        <div class="text-2xl font-bold bg-gradient-to-r from-blue-500 to-purple-500 bg-clip-text text-transparent">
            Soulful
        </div>
        <div class="flex space-x-6 text-slate-500">
            <i class="fa-solid fa-planet-ringed text-xl cursor-pointer hover:text-blue-500"></i>
            <i class="fa-solid fa-comment-dots text-xl cursor-pointer hover:text-blue-500"></i>
            <div class="w-8 h-8 rounded-full bg-slate-200 border-2 border-white overflow-hidden">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="avatar">
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="relative w-full md:w-96">
                <input type="text" placeholder="搜索瞬间、标签、灵魂..." 
                    class="w-full pl-12 pr-4 py-3 rounded-2xl glass outline-none focus:ring-2 focus:ring-blue-300 transition-all">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-slate-400"></i>
            </div>
            <div class="flex space-x-2 no-scrollbar overflow-x-auto w-full md:w-auto">
                <span class="px-4 py-2 rounded-full glass text-sm whitespace-nowrap bg-blue-500 text-white border-none">推荐</span>
                <span class="px-4 py-2 rounded-full glass text-sm whitespace-nowrap hover:bg-white transition-colors cursor-pointer">摄影</span>
                <span class="px-4 py-2 rounded-full glass text-sm whitespace-nowrap hover:bg-white transition-colors cursor-pointer">音乐</span>
                <span class="px-4 py-2 rounded-full glass text-sm whitespace-nowrap hover:bg-white transition-colors cursor-pointer">深夜食堂</span>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            
            <div class="soul-card glass rounded-3xl p-6 relative overflow-hidden group">
                <div class="flex items-center mb-4">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Misty" class="w-12 h-12 rounded-full bg-white shadow-sm" alt="avatar">
                    <div class="ml-3">
                        <h3 class="font-bold text-slate-800">落日收集者</h3>
                        <p class="text-xs text-slate-400 tracking-wide">12分钟前 · 距你3.5km</p>
                    </div>
                </div>
                <p class="text-sm leading-relaxed mb-4 text-slate-600">
                    今天的夕阳真的很像橘子味的汽水，在这个瞬间，感觉全世界都安静下来了。🌇 #日常 #治愈系
                </p>
                <div class="rounded-2xl overflow-hidden mb-4 h-48 bg-slate-100">
                    <img src="https://images.unsplash.com/photo-1470252649358-96957c053e9a?auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt="post">
                </div>
                <div class="flex justify-between items-center text-slate-400">
                    <div class="flex space-x-4">
                        <span class="hover:text-pink-500 cursor-pointer transition-colors"><i class="fa-regular fa-heart mr-1"></i> 128</span>
                        <span class="hover:text-blue-500 cursor-pointer transition-colors"><i class="fa-regular fa-comment mr-1"></i> 32</span>
                    </div>
                    <i class="fa-solid fa-share-nodes cursor-pointer hover:text-slate-600"></i>
                </div>
            </div>

            <div class="soul-card glass rounded-3xl p-6 bg-gradient-to-br from-white/80 to-blue-50/50">
                <div class="flex items-center mb-4">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Coco" class="w-12 h-12 rounded-full bg-white shadow-sm" alt="avatar">
                    <div class="ml-3">
                        <h3 class="font-bold text-slate-800">二进制诗人</h3>
                        <p class="text-xs text-slate-400 tracking-wide">1小时前 · 茫茫人海</p>
                    </div>
                </div>
                <div class="py-6 italic text-center text-lg text-slate-700 font-light">
                    "代码写累了，想找个人聊聊关于宇宙的热寂，或者今晚的月亮。"
                </div>
                <div class="flex flex-wrap gap-2 mb-6">
                    <span class="px-3 py-1 bg-white/50 rounded-lg text-xs text-blue-500">#程序员</span>
                    <span class="px-3 py-1 bg-white/50 rounded-lg text-xs text-purple-500">#INFJ</span>
                </div>
                <div class="flex justify-between items-center text-slate-400">
                    <div class="flex space-x-4">
                        <span class="text-pink-500"><i class="fa-solid fa-heart mr-1"></i> 56</span>
                        <span><i class="fa-regular fa-comment mr-1"></i> 12</span>
                    </div>
                    <button class="bg-blue-500 text-white px-4 py-1 rounded-full text-sm shadow-lg shadow-blue-200 hover:bg-blue-600 transition-all">私聊</button>
                </div>
            </div>

            <div class="soul-card glass rounded-3xl p-6">
                <div class="flex items-center mb-4">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Luna" class="w-12 h-12 rounded-full bg-white shadow-sm" alt="avatar">
                    <div class="ml-3">
                        <h3 class="font-bold text-slate-800">猫咪观察员</h3>
                        <p class="text-xs text-slate-400 tracking-wide">3小时前 · 附近</p>
                    </div>
                </div>
                <p class="text-sm leading-relaxed mb-4 text-slate-600">
                    捡到一只流浪的小三花，还没想好叫什么名字，大家有什么建议吗？🐱
                </p>
                <div class="rounded-2xl overflow-hidden mb-4 h-48 bg-slate-100">
                    <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=800&q=80" class="w-full h-full object-cover" alt="post">
                </div>
                <div class="flex justify-between items-center text-slate-400 text-sm">
                    <div class="flex space-x-4">
                        <span><i class="fa-regular fa-heart mr-1"></i> 210</span>
                        <span><i class="fa-regular fa-comment mr-1"></i> 89</span>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div class="fixed bottom-8 right-6 md:right-12 group">
        <button class="w-14 h-14 bg-gradient-to-tr from-blue-500 to-purple-500 text-white rounded-full shadow-xl flex items-center justify-center text-2xl hover:scale-110 transition-transform active:scale-95">
            <i class="fa-solid fa-plus"></i>
        </button>
    </div>

    <div class="md:hidden fixed bottom-0 left-0 w-full glass border-t border-white/50 flex justify-around py-3">
        <div class="flex flex-col items-center text-blue-500">
            <i class="fa-solid fa-house text-lg"></i>
            <span class="text-[10px] mt-1">广场</span>
        </div>
        <div class="flex flex-col items-center text-slate-400">
            <i class="fa-solid fa-compass text-lg"></i>
            <span class="text-[10px] mt-1">发现</span>
        </div>
        <div class="flex flex-col items-center text-slate-400">
            <i class="fa-solid fa-message text-lg"></i>
            <span class="text-[10px] mt-1">聊天</span>
        </div>
        <div class="flex flex-col items-center text-slate-400">
            <i class="fa-solid fa-user text-lg"></i>
            <span class="text-[10px] mt-1">我的</span>
        </div>
    </div>

</body>
</html>
