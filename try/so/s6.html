<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soul Style - 遇见有趣的灵魂</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f0f9ff 100%);
            margin: 0;
            overflow-x: hidden;
        }
        /* 毛玻璃核心样式 */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
        }
        /* 模拟 Soul 的呼吸动效 */
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        .breathe-btn {
            animation: breathe 3s infinite ease-in-out;
        }
        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 模拟数据：发现页的动态
        const MOCK_POSTS = [
            { id: 1, user: "迷路的猫", content: "今天的夕阳好温柔，像极了你。🌇", tags: ["#摄影", "#心情"], likes: 128 },
            { id: 2, user: "极客森林", content: "深夜写代码的时候，耳机里的爵士乐是唯一的慰藉。", tags: ["#代码人生", "#音乐"], likes: 56 },
            { id: 3, user: "等风来", content: "有没有人推荐一下大理好玩的书店？📚", tags: ["#旅行", "#求助"], likes: 92 },
        ];

        const App = () => {
            const [activeTab, setActiveTab] = useState('square');

            return (
                <div className="min-h-screen max-w-md mx-auto bg-sky-50 shadow-2xl flex flex-col relative overflow-hidden">
                    
                    {/* 顶部导航 */}
                    <header className="p-6 flex justify-between items-center z-10">
                        <h1 className="text-2xl font-medium text-sky-800 tracking-tight">Soul Space</h1>
                        <div className="flex space-x-4 text-sky-600">
                            <i data-lucide="search" className="w-6 h-6"></i>
                            <i data-lucide="bell" className="w-6 h-6"></i>
                        </div>
                    </header>

                    {/* 主内容区域 */}
                    <main className="flex-1 overflow-y-auto no-scrollbar px-6 pb-24">
                        {/* 星球匹配入口 */}
                        <div className="glass-card p-8 mb-8 text-center shadow-sm">
                            <div className="w-32 h-32 bg-gradient-to-tr from-sky-300 to-indigo-300 rounded-full mx-auto mb-4 breathe-btn flex items-center justify-center shadow-lg">
                                <i data-lucide="globe" className="text-white w-12 h-12"></i>
                            </div>
                            <h2 className="text-lg font-medium text-sky-900">灵魂匹配</h2>
                            <p className="text-sm text-sky-600 mt-1">寻找与你频率相同的Ta</p>
                        </div>

                        {/* 动态列表 */}
                        <div className="space-y-6">
                            <h3 className="text-sm font-bold text-sky-400 uppercase tracking-widest">广场动态</h3>
                            {MOCK_POSTS.map(post => (
                                <div key={post.id} className="glass-card p-5 transition-transform active:scale-95">
                                    <div className="flex items-center mb-3">
                                        <div className="w-10 h-10 rounded-full bg-sky-100 flex items-center justify-center text-sky-500 mr-3 border border-white">
                                            {post.user[0]}
                                        </div>
                                        <span className="font-medium text-sky-800 text-sm">{post.user}</span>
                                    </div>
                                    <p className="text-gray-700 leading-relaxed text-sm mb-3">
                                        {post.content}
                                    </p>
                                    <div className="flex flex-wrap gap-2 mb-4">
                                        {post.tags.map(tag => (
                                            <span key={tag} className="text-xs text-indigo-400 bg-indigo-50 px-2 py-1 rounded-full">
                                                {tag}
                                            </span>
                                        ))}
                                    </div>
                                    <div className="flex justify-between items-center text-gray-400">
                                        <div className="flex items-center space-x-1">
                                            <i data-lucide="heart" className="w-4 h-4 text-rose-300"></i>
                                            <span className="text-xs">{post.likes}</span>
                                        </div>
                                        <i data-lucide="more-horizontal" className="w-4 h-4"></i>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* 底部导航栏 */}
                    <nav className="absolute bottom-0 w-full glass-card rounded-t-[32px] rounded-b-none py-4 px-8 flex justify-between items-center shadow-[0_-10px_30px_rgba(0,0,0,0.05)] border-t-0">
                        <NavIcon icon="layout-grid" active={activeTab === 'square'} onClick={() => setActiveTab('square')} />
                        <NavIcon icon="message-circle" active={activeTab === 'chat'} onClick={() => setActiveTab('chat')} />
                        <div className="w-12 h-12 bg-sky-500 rounded-full flex items-center justify-center -mt-12 shadow-lg border-4 border-white text-white">
                            <i data-lucide="plus" className="w-6 h-6"></i>
                        </div>
                        <NavIcon icon="compass" active={activeTab === 'explore'} onClick={() => setActiveTab('explore')} />
                        <NavIcon icon="user" active={activeTab === 'me'} onClick={() => setActiveTab('me')} />
                    </nav>
                </div>
            );
        };

        const NavIcon = ({ icon, active, onClick }) => {
            useEffect(() => {
                lucide.createIcons();
            }, []);
            return (
                <div onClick={onClick} className={`cursor-pointer transition-colors ${active ? 'text-sky-600' : 'text-sky-300'}`}>
                    <i data-lucide={icon} className="w-6 h-6"></i>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // 初始化图标
        setTimeout(() => lucide.createIcons(), 100);
    </script>
</body>
</html>
