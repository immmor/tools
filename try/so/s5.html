<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoulStyle | 遇见有趣的灵魂</title>
    <style>
        /* 全局变量定义：小清新配色 */
        :root {
            --primary-color: #7cebc6; /* 经典的青绿色 */
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #333;
            --text-sub: #888;
            --glass: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            color: var(--text-main);
        }

        /* 导航栏 - 毛玻璃效果 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-color);
            letter-spacing: 2px;
        }

        /* 主体内容容器 */
        .container {
            max-width: 1200px;
            margin: 80px auto 20px;
            padding: 0 20px;
        }

        /* 顶部欢迎语 */
        .header-section {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 0;
        }

        .header-section h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #555;
        }

        /* 广场卡片网格布局 */
        .square-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        /* 单个灵魂卡片 */
        .soul-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.18);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .soul-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary-color);
            margin-right: 12px;
            border: 2px solid #fff;
        }

        .nickname {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .tag {
            font-size: 0.8rem;
            color: var(--primary-color);
            background: rgba(124, 235, 198, 0.2);
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 4px;
            display: inline-block;
        }

        .content {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #666;
            margin-bottom: 15px;
        }

        .footer-action {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-sub);
        }

        /* 底部导航 (手机端专用) */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 60px;
            background: #fff;
            border-top: 1px solid #eee;
            justify-content: space-around;
            align-items: center;
            z-index: 1000;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .header-section {
                padding: 20px 0;
            }
            .header-section h1 {
                font-size: 1.5rem;
            }
            .mobile-nav {
                display: flex;
            }
            .container {
                margin-bottom: 80px; /* 为底部导航留空 */
            }
            nav .menu-items {
                display: none; /* 手机端隐藏顶部冗余菜单 */
            }
        }

        /* 简单的点赞动画 */
        .like-btn:active {
            transform: scale(1.2);
            color: #ff6b6b;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">SOULIGHT</div>
        <div class="menu-items" style="color: var(--text-sub); font-size: 0.9rem;">
            <span>发现</span> &nbsp;&nbsp; <span>星球</span> &nbsp;&nbsp; <span>聊天</span>
        </div>
    </nav>

    <div class="container">
        <header class="header-section">
            <h1>在这个星球，遇见懂你的人</h1>
            <p style="color: var(--text-sub);">3,421 位有趣的灵魂正在活跃</p>
        </header>

        <div class="square-grid" id="soulGrid">
            <div class="soul-card">
                <div class="user-info">
                    <div class="avatar" style="background: #a1c4fd;"></div>
                    <div>
                        <div class="nickname">极光飞行员</div>
                        <span class="tag"># 摄影爱好者</span>
                    </div>
                </div>
                <div class="content">
                    今天在山顶拍到了凌晨四点的星空，感觉那一刻世界只有我一个人。有人想看照片吗？
                </div>
                <div class="footer-action">
                    <span>📍 北京 · 1.2km</span>
                    <span class="like-btn">❤️ 128</span>
                </div>
            </div>

            <div class="soul-card">
                <div class="user-info">
                    <div class="avatar" style="background: #ff9a9e;"></div>
                    <div>
                        <div class="nickname">深夜诗人</div>
                        <span class="tag"># 治愈系</span>
                    </div>
                </div>
                <div class="content">
                    文字是有温度的，希望我的句子能温暖此时此刻失眠的你。🌙
                </div>
                <div class="footer-action">
                    <span>📍 上海 · 3.5km</span>
                    <span class="like-btn">❤️ 85</span>
                </div>
            </div>

            <div class="soul-card">
                <div class="user-info">
                    <div class="avatar" style="background: #cfd9df;"></div>
                    <div>
                        <div class="nickname">猫咪观察员</div>
                        <span class="tag"># 铲屎官</span>
                    </div>
                </div>
                <div class="content">
                    救命！我家猫今天居然学会自己开罐头了，它是要进化了吗？
                </div>
                <div class="footer-action">
                    <span>📍 杭州 · 500m</span>
                    <span class="like-btn">❤️ 256</span>
                </div>
            </div>

            </div>
    </div>

    <div class="mobile-nav">
        <div style="color: var(--primary-color);">✨ 广场</div>
        <div>🪐 星球</div>
        <div>💬 消息</div>
        <div>👤 我的</div>
    </div>

    <script>
        // 简单的交互：点击卡片效果
        document.querySelectorAll('.soul-card').forEach(card => {
            card.addEventListener('click', () => {
                const name = card.querySelector('.nickname').innerText;
                alert('正在连接 ' + name + ' 的信号...');
            });
        });
    </script>
</body>
</html>
