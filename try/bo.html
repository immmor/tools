<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY 娱乐中心</title>
    <style>
        :root {
            --primary-gold: #d4af37;
            --dark-bg: #0f0f12;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --text-light: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            background-image: radial-gradient(circle at top right, #1a1a2e, #0f0f12);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 响应式导航栏 */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 5%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--primary-gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary-gold);
        }

        /* 英雄横幅区 */
        .hero {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1596838132731-dd960a51bf35?auto=format&fit=crop&q=80&w=1600') center/cover;
            padding: 20px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }

        .btn-main {
            background: var(--primary-gold);
            color: black;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-main:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px var(--primary-gold);
        }

        /* 游戏网格 - 核心响应式部分 */
        .game-container {
            padding: 40px 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .game-card {
            background: var(--glass-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.4s;
            position: relative;
        }

        .game-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-gold);
        }

        .game-img {
            width: 100%;
            height: 180px;
            background: #222;
            object-fit: cover;
        }

        .game-info {
            padding: 20px;
            text-align: center;
        }

        .game-info h3 {
            margin-bottom: 10px;
            color: var(--primary-gold);
        }

        /* 底部状态栏 - 针对手机端优化 */
        .mobile-footer-nav {
            display: none;
            position: fixed;
            bottom: 0;
            width: 100%;
            background: #111;
            grid-template-columns: repeat(4, 1fr);
            padding: 10px 0;
            border-top: 1px solid #333;
            z-index: 1000;
        }

        .mobile-nav-item {
            text-align: center;
            font-size: 0.7rem;
            color: #888;
        }

        /* 媒体查询：手机端适配 */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2rem; }
            .nav-links { display: none; }
            .mobile-footer-nav { display: grid; }
            .game-container { padding-bottom: 80px; } /* 为底部导航留白 */
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">GALAXY</div>
        <div class="nav-links">
            <a href="#">首页</a>
            <a href="#">体育博弈</a>
            <a href="#">真人视讯</a>
            <a href="#">电子游艺</a>
            <a href="#">优惠活动</a>
        </div>
        <button class="btn-main" style="padding: 8px 20px;">登录</button>
    </nav>

    <header class="hero">
        <h1>巅峰之境 极速体验</h1>
        <p style="margin-bottom: 2rem;">全球领先的数字娱乐平台，即刻加入领取首存红利</p>
        <button class="btn-main">立即注册</button>
    </header>

    <main class="game-container">
        <div class="game-card">
            <img src="https://images.unsplash.com/photo-1511193311914-0346f16efe90?auto=format&fit=crop&q=80&w=500" alt="Casino" class="game-img">
            <div class="game-info">
                <h3>真人视讯</h3>
                <p>顶级荷官 24小时在线互动</p>
            </div>
        </div>

        <div class="game-card">
            <img src="https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?auto=format&fit=crop&q=80&w=500" alt="Sports" class="game-img">
            <div class="game-info">
                <h3>体育赛事</h3>
                <p>覆盖全球主流联赛 实时水位</p>
            </div>
        </div>

        <div class="game-card">
            <img src="https://images.unsplash.com/photo-1606167668584-78701c57f13d?auto=format&fit=crop&q=80&w=500" alt="Slots" class="game-img">
            <div class="game-info">
                <h3>电子游艺</h3>
                <p>上千款爆奖机型 极高返还</p>
            </div>
        </div>

        <div class="game-card">
            <img src="https://images.unsplash.com/photo-1518893063132-36e46dbe2428?auto=format&fit=crop&q=80&w=500" alt="Lottery" class="game-img">
            <div class="game-info">
                <h3>彩票中心</h3>
                <p>官方开奖 结果公正透明</p>
            </div>
        </div>
    </main>

    <div class="mobile-footer-nav">
        <div class="mobile-nav-item">🏠<br>首页</div>
        <div class="mobile-nav-item">🏆<br>体育</div>
        <div class="mobile-nav-item">💰<br>钱包</div>
        <div class="mobile-nav-item">👤<br>我的</div>
    </div>

</body>
</html>
