<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Studio — 极简电子设计软件</title>
    <!-- 引入 Fabric.js 绘图库 & Google Fonts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f8f9fa;
            --panel-bg: rgba(255, 255, 255, 0.85);
            --border-color: rgba(0, 0, 0, 0.08);
            --accent-color: #111111;
            --accent-hover: #333333;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --radius: 12px;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --blur: blur(20px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 顶部导航栏 */
        header {
            height: 60px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--panel-bg);
            backdrop-filter: var(--blur);
            border-bottom: 1px solid var(--border-color);
            z-index: 10;
        }

        .logo {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-badge {
            width: 8px;
            height: 8px;
            background: #000;
            border-radius: 50%;
        }

        .actions {
            display: flex;
            gap: 12px;
        }

        /* 通用按钮设计 */
        .btn {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-main);
        }

        .btn:hover {
            background: rgba(0,0,0,0.03);
            border-color: rgba(0,0,0,0.2);
        }

        .btn-primary {
            background: var(--accent-color);
            color: #fff;
            border: none;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        /* 主体工作区布局 */
        main {
            flex: 1;
            display: flex;
            position: relative;
            overflow: hidden;
        }

        /* 左侧工具栏 / 右侧属性栏 (通用悬浮面板风格) */
        .panel {
            background: var(--panel-bg);
            backdrop-filter: var(--blur);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 5;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .toolbar {
            position: absolute;
            left: 20px;
            top: 20px;
            width: 60px;
            align-items: center;
        }

        .properties-panel {
            position: absolute;
            right: 20px;
            top: 20px;
            width: 240px;
            max-height: calc(100% - 40px);
        }

        .panel-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .tool-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: none;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            transition: background 0.2s;
        }

        .tool-btn:hover {
            background: rgba(0,0,0,0.05);
        }

        .tool-btn svg {
            width: 20px;
            height: 20px;
            stroke-width: 1.75;
        }

        /* 画布区域 */
        .canvas-container-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(rgba(0, 0, 0, 0.1) 1px, transparent 1px);
            background-size: 24px 24px;
            overflow: auto;
        }

        .canvas-card {
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            border-radius: 4px;
            background: #fff;
        }

        /* 属性控件组 */
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .control-group label {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .control-group input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 100%;
            height: 36px;
            border-radius: 6px;
            cursor: pointer;
            background: none;
        }

        .control-group input[type="color"]::-webkit-color-swatch-wrapper {
            padding: 0;
        }

        .control-group input[type="color"]::-webkit-color-swatch {
            border: 1px solid var(--border-color);
            border-radius: 6px;
        }

        /* 响应式适配：移动端/小屏幕 */
        @media (max-width: 768px) {
            header {
                padding: 0 16px;
            }

            .toolbar {
                left: 50%;
                bottom: 20px;
                top: auto;
                transform: translateX(-50%);
                flex-direction: row;
                width: auto;
                padding: 8px 16px;
                border-radius: 30px;
            }

            .properties-panel {
                right: 0;
                left: 0;
                bottom: 80px;
                top: auto;
                width: calc(100% - 32px);
                margin: 0 auto;
                transform: translateY(150%);
                opacity: 0;
                pointer-events: none;
            }

            .properties-panel.active {
                transform: translateY(0);
                opacity: 1;
                pointer-events: all;
            }
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <header>
        <div class="logo">
            <div class="logo-badge"></div>
            <span>AURA</span>
        </div>
        <div class="actions">
            <button class="btn" onclick="clearCanvas()">清空</button>
            <button class="btn btn-primary" onclick="exportCanvas()">导出 PNG</button>
        </div>
    </header>

    <!-- 主工作区 -->
    <main>
        <!-- 左侧工具栏 -->
        <div class="panel toolbar">
            <button class="tool-btn" onclick="addRectangle()" title="添加矩形">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
            </button>
            <button class="tool-btn" onclick="addCircle()" title="添加圆形">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><circle cx="12" cy="12" r="9"/></svg>
            </button>
            <button class="tool-btn" onclick="addText()" title="添加文本">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M12 6v12m-3 0h6"/></svg>
            </button>
            <button class="tool-btn" onclick="deleteActive()" title="删除选中对象">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
            </button>
        </div>

        <!-- 中间画布 -->
        <div class="canvas-container-wrapper">
            <div class="canvas-card">
                <canvas id="mainCanvas"></canvas>
            </div>
        </div>

        <!-- 右侧属性调整面板 -->
        <div class="panel properties-panel" id="propsPanel">
            <div class="panel-title">属性调整</div>
            <div class="control-group">
                <label>填充颜色</label>
                <input type="color" id="fillColor" value="#111111" onchange="updateColor(this.value)">
            </div>
        </div>
    </main>

    <script>
        let canvas;

        // 初始化画布
        window.onload = () => {
            // 根据设备大小动态计算画布初始尺寸
            const containerWidth = window.innerWidth;
            const canvasWidth = containerWidth < 768 ? Math.min(containerWidth - 40, 360) : 600;
            const canvasHeight = containerWidth < 768 ? 480 : 600;

            canvas = new fabric.Canvas('mainCanvas', {
                width: canvasWidth,
                height: canvasHeight,
                backgroundColor: '#ffffff',
                selection: true
            });

            // 初始化默认生成一个设计元素
            const defaultText = new fabric.IText('Aura Design', {
                left: canvasWidth / 2 - 80,
                top: canvasHeight / 2 - 20,
                fontSize: 28,
                fontFamily: 'Inter',
                fill: '#111111'
            });
            canvas.add(defaultText);

            // 监听选中事件，移动端自动唤起属性面板
            canvas.on('selection:created', showProps);
            canvas.on('selection:updated', showProps);
            canvas.on('selection:cleared', hideProps);
        };

        // 添加矩形
        function addRectangle() {
            const rect = new fabric.Rect({
                left: canvas.width / 2 - 50,
                top: canvas.height / 2 - 50,
                fill: '#e2e8f0',
                width: 100,
                height: 100,
                rx: 8,
                ry: 8
            });
            canvas.add(rect);
            canvas.setActiveObject(rect);
        }

        // 添加圆形
        function addCircle() {
            const circle = new fabric.Circle({
                left: canvas.width / 2 - 40,
                top: canvas.height / 2 - 40,
                fill: '#111111',
                radius: 40
            });
            canvas.add(circle);
            canvas.setActiveObject(circle);
        }

        // 添加文本
        function addText() {
            const text = new fabric.IText('双击编辑文字', {
                left: canvas.width / 2 - 60,
                top: canvas.height / 2 - 10,
                fontSize: 18,
                fontFamily: 'Inter',
                fill: '#333333'
            });
            canvas.add(text);
            canvas.setActiveObject(text);
        }

        // 修改当前选中元素的颜色
        function updateColor(color) {
            const activeObject = canvas.getActiveObject();
            if (activeObject) {
                activeObject.set('fill', color);
                canvas.renderAll();
            }
        }

        // 删除选中元素
        function deleteActive() {
            const activeObjects = canvas.getActiveObjects();
            canvas.discardActiveObject();
            activeObjects.forEach((obj) => canvas.remove(obj));
        }

        // 清空画布
        function clearCanvas() {
            canvas.clear();
            canvas.setBackgroundColor('#ffffff', canvas.renderAll.bind(canvas));
        }

        // 导出为 PNG 图片
        function exportCanvas() {
            const dataURL = canvas.toDataURL({
                format: 'png',
                quality: 1
            });
            const link = document.createElement('a');
            link.download = 'design-aura.png';
            link.href = dataURL;
            link.click();
        }

        // UI 面板控制 (响应式)
        function showProps() {
            document.getElementById('propsPanel').classList.add('active');
            const activeObject = canvas.getActiveObject();
            if (activeObject && activeObject.fill) {
                document.getElementById('fillColor').value = activeObject.fill;
            }
        }

        function hideProps() {
            document.getElementById('propsPanel').classList.remove('active');
        }

        // 窗口 Resize 时保持响应式适配
        window.onresize = () => {
            if (window.innerWidth < 768 && canvas.width > 360) {
                canvas.setWidth(window.innerWidth - 40);
                canvas.renderAll();
            }
        };
    </script>
</body>
</html>
