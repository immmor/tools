<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>长青乐园 - 极简社交空间</title>
    <style>
        :root {
            /* 柔和的莫兰迪蓝色调 */
            --bg-base: #ebf0f7;
            --neu-upper: #ffffff;
            --neu-lower: #c8d0da;
            --glass-white: rgba(255, 255, 255, 0.6);
            --accent-green: #52b788;
            --text-main: #444b54;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            min-height: 100vh;
            padding: env(safe-area-inset-top) 20px 80px 20px; /* 为手机端留出底部导航空间 */
        }

        /* 响应式栅格布局 */
        .app-layout {
            max-width: 1000px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        @media (min-width: 900px) {
            .app-layout {
                grid-template-columns: 260px 1fr;
                padding-top: 40px;
            }
        }

        /* --- 毛玻璃组件 --- */
        .glass-header {
            position: sticky;
            top: 15px;
            z-index: 100;
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 15px 25px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
        }

        /* --- 新拟物容器 (凹陷效果作为背景) --- */
        .neu-inset-container {
            background: var(--bg-base);
            box-shadow: inset 8px 8px 16px var(--neu-lower), 
                        inset -8px -8px 16px var(--neu-upper);
            border-radius: 35px;
            padding: 20px;
            margin-bottom: 25px;
        }

        /* --- 新拟物按钮 (凸起效果) --- */
        .neu-button {
            background: var(--bg-base);
            border: none;
            padding: 18px;
            border-radius: 20px;
            box-shadow: 6px 6px 12px var(--neu-lower), 
                        -6px -6px 12px var(--neu-upper);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-main);
            width: 100%;
        }

        .neu-button:active {
            box-shadow: inset 4px 4px 8px var(--neu-lower), 
                        inset -4px -4px 8px var(--neu-upper);
            transform: scale(0.98);
        }

        /* --- 内容卡片 (毛玻璃 + 新拟物边界) --- */
        .post-card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px);
            border: 2px solid var(--neu-upper);
            border-radius: 30px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 12px 12px 24px var(--neu-lower);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .user-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: var(--bg-base);
            box-shadow: 4px 4px 8px var(--neu-lower), -4px -4px 8px var(--neu-upper);
            border: 3px solid var(--accent-green);
        }

        .post-body {
            font-size: 1.3rem;
            line-height: 1.5;
            color: #2c3e50;
        }

        /* 底部移动端导航 */
        .mobile-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            z-index: 1000;
        }

        @media (min-width: 900px) {
            .mobile-nav { display: none; }
        }

        .nav-item {
            font-size: 1.5rem;
            padding: 10px;
            border-radius: 15px;
        }

        .nav-item.active {
            box-shadow: inset 4px 4px 8px var(--neu-lower), inset -4px -4px 8px var(--neu-upper);
            color: var(--accent-green);
        }

        .big-text { font-size: 1.4rem; font-weight: 600; }
        .sub-text { font-size: 1rem; color: #7f8c8d; }

    </style>
</head>
<body>

    <header class="glass-header">
        <div class="big-text" style="color: var(--accent-green);">🍀 长青乐园</div>
        <div style="font-size: 1.8rem;">🔔</div>
    </header>

    <div class="app-layout">
        <aside class="desktop-only" style="display: none;">
            <div class="neu-inset-container">
                <button class="neu-button" style="margin-bottom: 20px;">🏠 首页</button>
                <button class="neu-button" style="margin-bottom: 20px;">👥 老友记</button>
                <button class="neu-button" style="margin-bottom: 20px;">🏆 荣誉榜</button>
                <button class="neu-button">⚙️ 设置</button>
            </div>
        </aside>

        <main>
            <div class="neu-inset-container">
                <div style="display: flex; gap: 15px; align-items: center;">
                    <div class="user-avatar" style="width: 45px; height: 45px; border:none;"></div>
                    <div style="flex: 1; padding: 12px; font-size: 1.1rem; color: #95a5a6;">说点心里话...</div>
                    <div style="font-size: 1.5rem;">📷</div>
                </div>
            </div>

            <div class="post-card">
                <div class="post-header">
                    <div class="user-avatar" style="background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=Felix'); background-size: cover;"></div>
                    <div>
                        <p class="big-text">李大爷</p>
                        <p class="sub-text">15分钟前 · 晨练中心</p>
                    </div>
                </div>
                <div class="post-body">
                    今天早起在公园打了一套太极拳，感觉浑身舒畅。
                </div>
                <div style="margin-top: 20px; display: flex; gap: 15px;">
                    <button class="neu-button" style="flex: 1; font-size: 1rem; padding: 10px;">👍 点赞</button>
                    <button class="neu-button" style="flex: 1; font-size: 1rem; padding: 10px;">💬 聊天</button>
                </div>
            </div>

            <div class="post-card">
                <div class="post-header">
                    <div class="user-avatar" style="background-image: url('https://api.dicebear.com/7.x/avataaars/svg?seed=Aneka'); background-size: cover;"></div>
                    <div>
                        <p class="big-text">王阿姨</p>
                        <p class="sub-text">2小时前 · 幸福食堂</p>
                    </div>
                </div>
                <div class="post-body">
                    刚包好的皮薄馅大的饺子，邻居们快来看看，手艺减没减？🥟
                </div>
                <div style="margin-top: 15px; border-radius: 20px; overflow: hidden; box-shadow: 4px 4px 10px rgba(0,0,0,0.1);">
                    <div style="background: #ccc; height: 180px; display: flex; align-items: center; justify-content: center; background: linear-gradient(45deg, #e0eafc, #cfdef3);">
                        [ 饺子照片 ]
                    </div>
                </div>
            </div>
        </main>
    </div>

    <nav class="mobile-nav">
        <div class="nav-item active">🏠</div>
        <div class="nav-item">🤝</div>
        <div class="nav-item" style="background: var(--accent-green); color: white; border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; margin-top: -30px; box-shadow: 0 10px 20px rgba(82,183,136,0.4);">➕</div>
        <div class="nav-item">💬</div>
        <div class="nav-item">👤</div>
    </nav>

    <script>
        // 控制侧边栏在宽屏显示
        if (window.innerWidth >= 900) {
            document.querySelector('.desktop-only').style.display = 'block';
        }
    </script>
</body>
</html>
