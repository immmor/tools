<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颐养家园 - 温馨长者社区</title>
    <style>
        :root {
            --bg-base: #f0f2f5; 
            --neu-shadow-dark: #d1d9e6;
            --neu-shadow-light: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-border: rgba(255, 255, 255, 0.4);
            --primary-color: #6c5ce7; 
            --text-title: #2d3436;
            --text-body: #636e72;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            transition: all 0.3s ease;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-body);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 100px; /* 为手机端 Tab Bar 留出空间 */
        }

        /* 核心容器 */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            border-radius: 40px;
            background: var(--bg-base);
            box-shadow: inset 20px 20px 60px var(--neu-shadow-dark), 
                        inset -20px -20px 60px var(--neu-shadow-light);
            padding: 30px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.05);
            margin-bottom: 30px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .logo { font-size: 28px; font-weight: 800; color: var(--primary-color); }

        .main-layout {
            display: grid;
            grid-template-columns: 260px 1fr 300px;
            gap: 30px;
        }

        /* 毛玻璃卡片 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            padding: 25px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.07);
            margin-bottom: 30px;
        }

        /* 手机端 Tab Bar 样式 */
        .mobile-tab-bar {
            display: none; /* 默认隐藏 */
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            height: 75px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            z-index: 1000;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
        }

        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-body);
            text-decoration: none;
            width: 60px;
            height: 60px;
            border-radius: 20px;
            cursor: pointer;
        }

        .tab-item.active {
            color: var(--primary-color);
            background: var(--bg-base);
            box-shadow: inset 4px 4px 8px var(--neu-shadow-dark), 
                        inset -4px -4px 8px var(--neu-shadow-light);
        }

        .tab-icon { font-size: 24px; margin-bottom: 4px; }
        .tab-label { font-size: 12px; font-weight: bold; }

        /* 通用按钮 */
        .glass-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 12px 24px;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 600;
        }

        .avatar {
            width: 55px; height: 55px; border-radius: 50%;
            background: var(--bg-base);
            box-shadow: 4px 4px 8px var(--neu-shadow-dark), -4px -4px 8px var(--neu-shadow-light);
            display: flex; align-items: center; justify-content: center; font-size: 28px;
        }

        /* 响应式适配 */
        @media (max-width: 1100px) {
            .main-layout { grid-template-columns: 1fr 300px; }
            .sidebar-left { display: none; }
        }

        @media (max-width: 768px) {
            body { padding: 10px; padding-bottom: 110px; }
            .app-container { padding: 15px; border-radius: 30px; box-shadow: none; }
            header { padding: 10px 20px; border-radius: 25px; margin-bottom: 20px; }
            .logo { font-size: 22px; }
            .main-layout { grid-template-columns: 1fr; }
            .sidebar-right { display: none; } /* 手机端侧边栏也隐藏，让位给 Tab Bar */
            
            .mobile-tab-bar { display: flex; } /* 开启 Tab Bar */
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div class="logo">🏠 颐养家园</div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <button class="glass-btn">🔔</button>
                <div class="avatar">王</div>
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar-left">
                <div class="glass-card">
                    <p style="margin-bottom:15px; font-weight:bold;">快速导航</p>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <button class="glass-btn" style="text-align: left; background: var(--primary-color); color:white;">🏠 社区首页</button>
                        <button class="glass-btn" style="text-align: left;">👥 我的老友</button>
                        <button class="glass-btn" style="text-align: left;">🎨 兴趣课堂</button>
                        <button class="glass-btn" style="text-align: left;">🩺 健康档案</button>
                    </div>
                </div>
            </aside>

            <main>
                <div class="glass-card">
                    <h2 style="margin-bottom:15px; color: var(--text-title);">早安，张大爷！</h2>
                    <p>今天也是充满活力的一天，来看看老友们的动态吧。</p>
                </div>

                <div class="glass-card">
                    <div style="display: flex; gap: 15px; align-items: center; margin-bottom: 20px;">
                        <div class="avatar">👴</div>
                        <div>
                            <h4 style="color:var(--text-title)">张大爷</h4>
                            <span style="font-size: 14px; color:#aaa;">刚才 · 发布了新照片</span>
                        </div>
                    </div>
                    <p style="font-size: 18px; line-height: 1.6; margin-bottom: 15px;">
                        在社区花园拍的迎春花，开得真不错！春天真的来啦。🌸
                    </p>
                    <div style="width:100%; height:200px; background:#ddd; border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:40px;">📸</div>
                </div>
            </main>

            <aside class="sidebar-right">
                <div class="glass-card">
                    <h3 style="margin-bottom:15px;">📅 近期活动</h3>
                    <div style="padding:10px; background:rgba(0,0,0,0.03); border-radius:15px; margin-bottom:10px;">
                        <strong>周五手工课</strong><br><small>14:30 社区中心</small>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <nav class="mobile-tab-bar">
        <a class="tab-item active">
            <span class="tab-icon">🏠</span>
            <span class="tab-label">首页</span>
        </a>
        <a class="tab-item">
            <span class="tab-icon">👥</span>
            <span class="tab-label">老友</span>
        </a>
        <a class="tab-item" style="transform: translateY(-10px);">
            <div class="avatar" style="width:65px; height:65px; background: var(--primary-color); color:white; border: 5px solid var(--bg-base); box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);">
                ➕
            </div>
        </a>
        <a class="tab-item">
            <span class="tab-icon">🎨</span>
            <span class="tab-label">课堂</span>
        </a>
        <a class="tab-item">
            <span class="tab-icon">👤</span>
            <span class="tab-label">我的</span>
        </a>
    </nav>

    <script>
        // 简单的点击切换效果
        const tabs = document.querySelectorAll('.tab-item');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
            });
        });
    </script>
</body>
</html>
