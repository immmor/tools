<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Flip | 3D 翻页阅读</title>
    <style>
        :root {
            --paper-color: #f4f1ea;
            --text-color: #3e3a36;
            --accent: #d4a373;
            --shadow: rgba(0,0,0,0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #2c2c2e;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: "PingFang SC", "STSong", serif;
        }

        /* 阅读器外壳 - 3D 场景 */
        .scene {
            width: 400px;
            height: 600px;
            perspective: 1500px;
            cursor: pointer;
        }

        .book {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform 0.5s;
        }

        /* 单个页面的样式 */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0; left: 0;
            background: var(--paper-color);
            padding: 40px;
            box-shadow: inset 3px 0 10px rgba(0,0,0,0.1);
            transform-origin: left;
            transform-style: preserve-3d;
            transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            user-select: none;
            overflow: hidden;
        }

        /* 封面 */
        .page.cover {
            background: var(--accent);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .page.cover h1 { font-size: 2rem; border: 2px solid white; padding: 10px 20px; }

        /* 内容文字 */
        .page p {
            font-size: 1.1rem;
            line-height: 1.8;
            text-align: justify;
            color: var(--text-color);
            margin-bottom: 15px;
        }

        /* 翻页状态 */
        .page.flipped {
            transform: rotateY(-160deg);
            z-index: 1;
        }

        /* 底部控制栏 */
        .controls {
            position: fixed;
            bottom: 20px;
            display: flex;
            gap: 20px;
            z-index: 100;
        }

        .btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        .btn:hover { background: var(--accent); }

        /* 手机端适配 */
        @media (max-width: 500px) {
            .scene { width: 90vw; height: 80vh; }
            .page { padding: 25px; }
        }

        /* 装饰：书脊阴影 */
        .page::before {
            content: '';
            position: absolute;
            left: 0; top: 0; width: 10px; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.1), transparent);
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="book" id="book">
            <div class="page cover" id="cover">
                <h1>AURA FLIP</h1>
                <p style="margin-top:20px; color:white; opacity:0.8">点击开启阅读</p>
            </div>
            
            </div>
    </div>

    <div class="controls">
        <input type="file" id="upload" hidden accept=".txt">
        <button class="btn" onclick="document.getElementById('upload').click()">选择 TXT</button>
        <button class="btn" onclick="prevPage()">上一页</button>
        <button class="btn" onclick="nextPage()">下一页</button>
    </div>

    <script>
        const book = document.getElementById('book');
        let pages = [];
        let currentPage = 0;

        // 模拟一些初始内容（防止空屏）
        const demoText = "代码的优雅在于它像一首诗。当你翻开这一页，你不仅在阅读文字，更是在体验一种交互的艺术。每一个旋转角度，每一抹阴影，都是为了让你沉浸在思考的海洋里。".repeat(20);

        function createPages(text) {
            // 清空旧页面（保留封面）
            const cover = document.getElementById('cover');
            book.innerHTML = '';
            book.appendChild(cover);
            
            // 简单的文本切分（实际开发中可根据字符数精确切分）
            const charsPerPage = 300; 
            const totalPages = Math.ceil(text.length / charsPerPage);

            for (let i = 0; i < totalPages; i++) {
                const pageDiv = document.createElement('div');
                pageDiv.className = 'page';
                pageDiv.style.zIndex = totalPages - i;
                
                const content = text.substring(i * charsPerPage, (i + 1) * charsPerPage);
                pageDiv.innerHTML = `<p>${content}</p><div style="position:absolute; bottom:20px; right:40px; font-size:0.8rem; opacity:0.5">${i + 1}</div>`;
                
                book.appendChild(pageDiv);
            }
            pages = document.querySelectorAll('.page');
        }

        function nextPage() {
            if (currentPage < pages.length - 1) {
                pages[currentPage].classList.add('flipped');
                currentPage++;
            }
        }

        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                pages[currentPage].classList.remove('flipped');
            }
        }

        // 文件读取
        document.getElementById('upload').onchange = function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                createPages(event.target.result);
                currentPage = 0;
            };
            reader.readAsText(file);
        };

        // 点击书本翻页
        book.onclick = (e) => {
            const rect = book.getBoundingClientRect();
            if (e.clientX > rect.left + rect.width / 2) {
                nextPage();
            } else {
                prevPage();
            }
        };

        // 初始化
        createPages(demoText);
    </script>
</body>
</html>
