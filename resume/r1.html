<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HTML 真正支持的 PDF OCR 识别</title>
    <!-- 引入 Tesseract.js (OCR 引擎) -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- 引入 PDF.js (用来把 PDF 转成图片) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
</head>
<body>

    <h2>PDF 扫描件文字识别 (PDF.js + Tesseract.js)</h2>
    <input type="file" id="upload" accept=".pdf">
    <p>当前状态：<span id="status">等待上传...</span></p>
    <p>识别结果：</p>
    <div id="output" style="white-space: pre-wrap; border: 1px solid #ccc; padding: 10px; min-height: 100px;"></div>

    <!-- 隐藏的 Canvas，用于在内存中渲染 PDF 页 -->
    <canvas id="pdf-canvas" style="display: none;"></canvas>

    <script>
        // 配置 PDF.js 的 Worker 地址（必须配置，否则无法解析）
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        document.getElementById('upload').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const status = document.getElementById('status');
            const output = document.getElementById('output');
            output.innerText = '';
            
            try {
                status.innerText = '正在读取 PDF 文件...';
                const fileReader = new FileReader();
                
                fileReader.onload = async function() {
                    const typedarray = new Uint8Array(this.result);
                    // 1. 使用 PDF.js 加载文档
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = '';

                    // 2. 逐页将 PDF 转为图片并送入 Tesseract 识别
                    for (let i = 1; i <= pdf.numPages; i++) {
                        status.innerText = `正在渲染第 ${i} / ${pdf.numPages} 页为图片...`;
                        
                        const page = await pdf.getPage(i);
                        const canvas = document.getElementById('pdf-canvas');
                        const context = canvas.getContext('2d');
                        
                        // 放大 2 倍渲染，提升 OCR 的文字识别准确率
                        const viewport = page.getViewport({ scale: 2.0 }); 
                        canvas.height = viewport.height;
                        canvas.width = viewport.width;

                        // 渲染到隐藏的 Canvas 上
                        await page.render({ canvasContext: context, viewport: viewport }).promise;

                        status.innerText = `正在 OCR 识别第 ${i} / ${pdf.numPages} 页的文字...`;
                        
                        // 3. 将 Canvas 作为图像数据直接传给 Tesseract.js
                        const { data: { text } } = await Tesseract.recognize(
                            canvas, 
                            'chi_sim', // 中文简体识别，若纯英文改成 'eng'
                            { logger: m => console.log(`页码 ${i}:`, m) }
                        );

                        fullText += `--- 第 ${i} 页识别结果 ---\n${text}\n\n`;
                        output.innerText = fullText; // 实时更新结果
                    }
                    status.innerText = '识别完成！';
                };
                
                fileReader.readAsArrayBuffer(file);
            } catch (err) {
                status.innerText = '发生错误';
                output.innerText = err.message;
                console.error(err);
            }
        });
    </script>
</body>
</html>
