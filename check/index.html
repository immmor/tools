<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAUV-VISION // 野兽派 AI 人物检测</title>

  <!-- 1. 引入 TensorFlow.js 核心库与 COCO-SSD 人物/物体检测模型 -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>

  <style>
    /* ==========================================
       野兽派全局变量：高饱和配色与粗犷构图
       ========================================== */
    :root {
      --bg-color: #FFDE00;       /* 亮黄底色 */
      --primary-red: #FF0055;    /* 野兽红 */
      --electric-blue: #002244;  /* 深海蓝 */
      --vivid-cyan: #00E5FF;     /* 霓虹青 */
      --raw-orange: #FF5500;     /* 强烈橙 */
      --acid-green: #76FF03;     /* 酸性绿 */
      --border-thick: 6px solid #000000;
      --shadow-brutal: 8px 8px 0px #000000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Impact', 'Arial Black', sans-serif, system-ui;
    }

    body {
      background-color: var(--bg-color);
      color: #000;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 1000px;
      background: var(--primary-red);
      border: var(--border-thick);
      box-shadow: var(--shadow-brutal);
      padding: 20px;
      margin-bottom: 25px;
      transform: rotate(-1.5deg);
    }

    h1 {
      font-size: clamp(1.8rem, 4vw, 3.2rem);
      color: var(--acid-green);
      text-transform: uppercase;
      text-shadow: 4px 4px 0px #000;
      letter-spacing: 2px;
      line-height: 1.1;
    }

    p.subtitle {
      font-size: 1rem;
      color: #FFF;
      background: #000;
      display: inline-block;
      padding: 4px 10px;
      margin-top: 10px;
      font-weight: bold;
    }

    main {
      width: 100%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 25px;
    }

    .viewport-card {
      background: var(--vivid-cyan);
      border: var(--border-thick);
      box-shadow: var(--shadow-brutal);
      padding: 15px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .canvas-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #000;
      border: 4px solid #000;
      overflow: hidden;
    }

    video {
      display: none;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .controls-card {
      background: var(--raw-orange);
      border: var(--border-thick);
      box-shadow: var(--shadow-brutal);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      transform: rotate(1deg);
    }

    .btn-fauve {
      background: var(--acid-green);
      color: #000;
      font-size: 1.2rem;
      font-weight: 900;
      padding: 12px;
      border: 4px solid #000;
      box-shadow: 4px 4px 0px #000;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.1s ease;
    }

    .btn-fauve:disabled {
      background: #CCC;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-fauve:hover:not(:disabled) {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px #000;
      background: #FFF;
    }

    .btn-fauve:active:not(:disabled) {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px #000;
    }

    .btn-flip {
      background: var(--vivid-cyan);
    }

    .stat-box {
      background: #FFF;
      border: 4px solid #000;
      padding: 15px;
      box-shadow: 4px 4px 0px #000;
    }

    .stat-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      background: var(--electric-blue);
      color: #FFF;
      padding: 2px 6px;
      display: inline-block;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--primary-red);
    }

    .wild-tag {
      position: absolute;
      top: -15px;
      right: -15px;
      background: var(--primary-red);
      color: #FFF;
      padding: 5px 15px;
      border: 3px solid #000;
      font-weight: bold;
      transform: rotate(12deg);
      z-index: 10;
    }

    @media (max-width: 768px) {
      body { padding: 12px; }
      main { grid-template-columns: 1fr; gap: 20px; }
      header, .controls-card { transform: rotate(0deg); }
      h1 { font-size: 2rem; }
      .canvas-container { aspect-ratio: 3 / 4; }
      .wild-tag { font-size: 0.8rem; top: -10px; right: -10px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>HUMAN DETECTOR</h1>
    <p class="subtitle">// TF.js 真实 AI 引擎加载中...</p>
  </header>

  <main>
    <section class="viewport-card">
      <div class="wild-tag">AI REALTIME</div>
      <div class="canvas-container" id="canvasContainer">
        <video id="video" autoplay playsinline></video>
        <canvas id="outputCanvas"></canvas>
      </div>
    </section>

    <section class="controls-card">
      <button class="btn-fauve" id="toggleBtn" disabled>正在载入 AI 模型...</button>
      <button class="btn-fauve btn-flip" id="flipBtn">反转镜头 ↺</button>
      
      <div class="stat-box">
        <div class="stat-title">检测到的人数</div>
        <div class="stat-value" id="countVal">0</div>
      </div>

      <div class="stat-box">
        <div class="stat-title">模型状态</div>
        <p id="statusText" style="font-weight: bold; margin-top: 5px; font-size: 0.85rem;">准备就绪</p>
      </div>
    </section>
  </main>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvasContainer');
    
    const toggleBtn = document.getElementById('toggleBtn');
    const flipBtn = document.getElementById('flipBtn');
    const countVal = document.getElementById('countVal');
    const statusText = document.getElementById('statusText');

    let model = null;             // 真实模型对象
    let isStreaming = false;
    let currentFacingMode = 'user';
    let realDetections = [];
    let isDetecting = false;

    // 1. 初始化并加载 TF.js COCO-SSD AI 模型
    async function initModel() {
      try {
        statusText.textContent = '正在下载 AI 权重模型...';
        // 载入轻量级目标检测模型
        model = await cocoSsd.load({ base: 'lite_mobilenet_v2' });
        statusText.textContent = '模型就绪，可以开启检测';
        toggleBtn.disabled = false;
        toggleBtn.textContent = '开启野兽之眼';
      } catch (err) {
        statusText.textContent = '模型加载失败，请检查网络';
        console.error('TF.js 模型加载失败:', err);
      }
    }

    initModel();

    function syncCanvasSize() {
      const rect = container.getBoundingClientRect();
      if (canvas.width !== rect.width || canvas.height !== rect.height) {
        canvas.width = rect.width;
        canvas.height = rect.height;
      }
    }
    window.addEventListener('resize', syncCanvasSize);

    // 2. 调起摄像头
    async function startCamera() {
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: currentFacingMode },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          }
        });
        video.srcObject = stream;
        await video.play();
        isStreaming = true;
        
        toggleBtn.textContent = '关闭检测器';
        toggleBtn.style.background = 'var(--primary-red)';
        toggleBtn.style.color = '#FFF';
        
        statusText.textContent = currentFacingMode === 'user' ? '前置镜头 (运行中)' : '后置镜头 (运行中)';
        requestAnimationFrame(renderLoop);
      } catch (err) {
        alert('无法调起摄像头，请检查权限。');
        console.error(err);
      }
    }

    function stopCamera() {
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
      }
      video.srcObject = null;
      isStreaming = false;
      toggleBtn.textContent = '开启野兽之眼';
      toggleBtn.style.background = 'var(--acid-green)';
      toggleBtn.style.color = '#000';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      countVal.textContent = '0';
    }

    toggleBtn.addEventListener('click', () => {
      if (!isStreaming) startCamera();
      else stopCamera();
    });

    flipBtn.addEventListener('click', () => {
      currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
      if (isStreaming) startCamera();
    });

    // 3. 核心：调用真正的 AI 模型进行人物检测与坐标映射
    async function detectFrame(drawX, drawY, drawW, drawH, videoW, videoH) {
      if (!model || !isStreaming || isDetecting) return;
      
      isDetecting = true;
      try {
        // 调用 TF.js 模型识别图像中的目标
        const predictions = await model.detect(video);
        
        // 只筛选出 'person' (人) 目标
        const persons = predictions.filter(p => p.class === 'person' && p.score > 0.4);
        
        const scaleX = drawW / videoW;
        const scaleY = drawH / videoH;

        realDetections = persons.map(p => {
          let [bx, by, bw, bh] = p.bbox;

          // 若前置摄像头应用了水平镜像，计算坐标反转
          if (currentFacingMode === 'user') {
            bx = videoW - bx - bw;
          }

          return {
            x: drawX + bx * scaleX,
            y: drawY + by * scaleY,
            w: bw * scaleX,
            h: bh * scaleY,
            score: Math.round(p.score * 100)
          };
        });

        countVal.textContent = realDetections.length;
      } catch (e) {
        console.error("AI 检测过程出错:", e);
      } finally {
        isDetecting = false;
      }
    }

    // 4. 渲染循环
    function renderLoop() {
      if (!isStreaming) return;

      syncCanvasSize();

      const canvasW = canvas.width;
      const canvasH = canvas.height;
      const videoW = video.videoWidth || 640;
      const videoH = video.videoHeight || 480;

      // 等比例 Cover 适配计算（防止画面拉伸扭曲）
      const canvasAspect = canvasW / canvasH;
      const videoAspect = videoW / videoH;

      let drawW, drawH, drawX, drawY;
      if (videoAspect > canvasAspect) {
        drawH = canvasH;
        drawW = canvasH * videoAspect;
        drawX = (canvasW - drawW) / 2;
        drawY = 0;
      } else {
        drawW = canvasW;
        drawH = canvasW / videoAspect;
        drawX = 0;
        drawY = (canvasH - drawH) / 2;
      }

      // 渲染视频画面
      ctx.save();
      ctx.clearRect(0, 0, canvasW, canvasH);

      if (currentFacingMode === 'user') {
        ctx.translate(canvasW, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, canvasW - (drawX + drawW), drawY, drawW, drawH);
      } else {
        ctx.drawImage(video, drawX, drawY, drawW, drawH);
      }
      ctx.restore();

      // 触发 AI 检测任务
      detectFrame(drawX, drawY, drawW, drawH, videoW, videoH);

      // 绘制野兽派检测框
      drawFauvistBoxes();

      requestAnimationFrame(renderLoop);
    }

    // 5. 绘制野兽派框选风格
    function drawFauvistBoxes() {
      realDetections.forEach((det) => {
        ctx.save();
        
        // 填充撞色半透明底
        ctx.fillStyle = 'rgba(255, 0, 85, 0.3)';
        ctx.fillRect(det.x, det.y, det.w, det.h);

        // 粗黑边框
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 6;
        ctx.strokeRect(det.x, det.y, det.w, det.h);

        // 高亮绿双层边框
        ctx.strokeStyle = '#76FF03';
        ctx.lineWidth = 4;
        ctx.strokeRect(det.x - 4, det.y - 4, det.w + 8, det.h + 8);

        // 标签背景块
        const labelText = `HUMAN // ${det.score}%`;
        ctx.fillStyle = '#00E5FF';
        ctx.fillRect(det.x - 4, det.y - 38, 165, 32);
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.strokeRect(det.x - 4, det.y - 38, 165, 32);

        // 标签文字
        ctx.fillStyle = '#000';
        ctx.font = '900 15px Impact, Arial Black';
        ctx.fillText(labelText, det.x + 4, det.y - 16);

        ctx.restore();
      });
    }
  </script>
</body>
</html>
