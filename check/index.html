<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FAUV-VISION // 野兽派人物检测</title>
  <style>
    /* ==========================================
       野兽派全局变量：高饱和配色与粗犷构图
       ========================================== */
    :root {
      --bg-color: #FFDE00;       /* 亮黄底色 */
      --primary-red: #FF0055;    /* 野兽红 */
      --electric-blue: #002244;  /* 深海蓝 */
      --vivid-cyan: #00E5FF;     /* 霓虹青 */
      --raw-orange: #FF5500;     /* 强烈橙 */
      --acid-green: #76FF03;     /* 酸性绿 */
      --border-thick: 6px solid #000000;
      --shadow-brutal: 8px 8px 0px #000000;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Impact', 'Arial Black', sans-serif, system-ui;
    }

    body {
      background-color: var(--bg-color);
      color: #000;
      padding: 20px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ==========================================
       Header：不对称与强烈色彩冲撞
       ========================================== */
    header {
      width: 100%;
      max-width: 1000px;
      background: var(--primary-red);
      border: var(--border-thick);
      box-shadow: var(--shadow-brutal);
      padding: 20px;
      margin-bottom: 25px;
      transform: rotate(-1.5deg);
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      color: var(--acid-green);
      text-transform: uppercase;
      text-shadow: 4px 4px 0px #000;
      letter-spacing: 2px;
      line-height: 1.1;
    }

    p.subtitle {
      font-size: 1.1rem;
      color: #FFF;
      background: #000;
      display: inline-block;
      padding: 4px 10px;
      margin-top: 10px;
      font-weight: bold;
    }

    /* ==========================================
       主布局：桌面双栏 / 手机单栏
       ========================================== */
    main {
      width: 100%;
      max-width: 1000px;
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 25px;
    }

    /* 视口与检测画布容器 */
    .viewport-card {
      background: var(--vivid-cyan);
      border: var(--border-thick);
      box-shadow: var(--shadow-brutal);
      padding: 15px;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .canvas-container {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #000;
      border: 4px solid #000;
      overflow: hidden;
    }

    video {
      display: none; /* 隐藏原生 video */
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* 控制面板 */
    .controls-card {
      background: var(--raw-orange);
      border: var(--border-thick);
      box-shadow: var(--shadow-brutal);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      transform: rotate(1deg);
    }

    .btn-fauve {
      background: var(--acid-green);
      color: #000;
      font-size: 1.2rem;
      font-weight: 900;
      padding: 12px;
      border: 4px solid #000;
      box-shadow: 4px 4px 0px #000;
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.1s ease;
    }

    .btn-fauve:hover {
      transform: translate(-2px, -2px);
      box-shadow: 6px 6px 0px #000;
      background: #FFF;
    }

    .btn-fauve:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px #000;
    }

    .btn-flip {
      background: var(--vivid-cyan);
    }

    .stat-box {
      background: #FFF;
      border: 4px solid #000;
      padding: 15px;
      box-shadow: 4px 4px 0px #000;
    }

    .stat-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      background: var(--electric-blue);
      color: #FFF;
      padding: 2px 6px;
      display: inline-block;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 900;
      color: var(--primary-red);
    }

    .wild-tag {
      position: absolute;
      top: -15px;
      right: -15px;
      background: var(--primary-red);
      color: #FFF;
      padding: 5px 15px;
      border: 3px solid #000;
      font-weight: bold;
      transform: rotate(12deg);
      z-index: 10;
    }

    @media (max-width: 768px) {
      body {
        padding: 12px;
      }

      main {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      header, .controls-card {
        transform: rotate(0deg);
      }

      h1 {
        font-size: 2.2rem;
      }

      .canvas-container {
        /* 在移动端将画幅设为 3:4，更适合手机竖屏成像视角 */
        aspect-ratio: 3 / 4;
      }

      .wild-tag {
        font-size: 0.8rem;
        top: -10px;
        right: -10px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>HUMAN DETECTOR</h1>
    <p class="subtitle">// 野兽派视觉捕捉引擎</p>
  </header>

  <main>
    <section class="viewport-card">
      <div class="wild-tag">RAW CANVAS</div>
      <div class="canvas-container" id="canvasContainer">
        <video id="video" autoplay playsinline></video>
        <canvas id="outputCanvas"></canvas>
      </div>
    </section>

    <section class="controls-card">
      <button class="btn-fauve" id="toggleBtn">开启野兽之眼</button>
      <button class="btn-fauve btn-flip" id="flipBtn">反转镜头 ↺</button>
      
      <div class="stat-box">
        <div class="stat-title">检测到的目标</div>
        <div class="stat-value" id="countVal">0</div>
      </div>

      <div class="stat-box">
        <div class="stat-title">镜头状态</div>
        <p id="cameraModeText" style="font-weight: bold; margin-top: 5px; font-size: 0.9rem;">前置镜头 (FACING USER)</p>
      </div>
    </section>
  </main>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('outputCanvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('canvasContainer');
    
    const toggleBtn = document.getElementById('toggleBtn');
    const flipBtn = document.getElementById('flipBtn');
    const countVal = document.getElementById('countVal');
    const cameraModeText = document.getElementById('cameraModeText');

    let isStreaming = false;
    let currentFacingMode = 'user'; // 'user' (前置) 或 'environment' (后置)
    let mockDetections = [];

    // 存储渲染时的裁切与缩放参数，保证像素坐标对齐
    let renderTransform = { drawX: 0, drawY: 0, drawW: 0, drawH: 0, scale: 1 };

    // 适配画布尺寸（像素级对齐容器）
    function syncCanvasSize() {
      const rect = container.getBoundingClientRect();
      if (canvas.width !== rect.width || canvas.height !== rect.height) {
        canvas.width = rect.width;
        canvas.height = rect.height;
      }
    }

    window.addEventListener('resize', syncCanvasSize);

    // 启动/重启摄像头流
    async function startCamera() {
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
      }

      const constraints = {
        video: {
          facingMode: { exact: currentFacingMode },
          width: { ideal: 1920 },
          height: { ideal: 1080 }
        }
      };

      try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        await video.play();
        isStreaming = true;
        
        toggleBtn.textContent = '关闭检测器';
        toggleBtn.style.background = 'var(--primary-red)';
        toggleBtn.style.color = '#FFF';
        
        cameraModeText.textContent = currentFacingMode === 'user' ? '前置镜头 (FACING USER)' : '后置镜头 (ENVIRONMENT)';
        requestAnimationFrame(renderFrame);
      } catch (err) {
        // 如果指定 exact 模式失败，尝试降级请求
        try {
          const fallbackStream = await navigator.mediaDevices.getUserMedia({ video: true });
          video.srcObject = fallbackStream;
          await video.play();
          isStreaming = true;
          requestAnimationFrame(renderFrame);
        } catch (e) {
          alert('无法获取指定的摄像头。设备可能不支持或权限被拒绝。');
          console.error(err);
        }
      }
    }

    // 关闭摄像头
    function stopCamera() {
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
      }
      video.srcObject = null;
      isStreaming = false;
      toggleBtn.textContent = '开启野兽之眼';
      toggleBtn.style.background = 'var(--acid-green)';
      toggleBtn.style.color = '#000';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      countVal.textContent = '0';
    }

    // 开启 / 关闭按钮
    toggleBtn.addEventListener('click', () => {
      if (!isStreaming) {
        startCamera();
      } else {
        stopCamera();
      }
    });

    // 切换前后镜头
    flipBtn.addEventListener('click', () => {
      currentFacingMode = (currentFacingMode === 'user') ? 'environment' : 'user';
      if (isStreaming) {
        startCamera(); // 重新加载新视角的流
      } else {
        cameraModeText.textContent = currentFacingMode === 'user' ? '预设：前置镜头' : '预设：后置镜头';
      }
    });

    // 主渲染循环：核心解决【比例不扭曲】
    function renderFrame() {
      if (!isStreaming) return;

      syncCanvasSize();

      const canvasW = canvas.width;
      const canvasH = canvas.height;
      const videoW = video.videoWidth || 640;
      const videoH = video.videoHeight || 480;

      // === 算法：不扭曲的等比例 Cover 填充计算 ===
      const canvasAspect = canvasW / canvasH;
      const videoAspect = videoW / videoH;

      let drawW, drawH, drawX, drawY;

      if (videoAspect > canvasAspect) {
        // 视频较宽，按高度对齐，裁剪两边
        drawH = canvasH;
        drawW = canvasH * videoAspect;
        drawX = (canvasW - drawW) / 2;
        drawY = 0;
      } else {
        // 视频较窄/较长，按宽度对齐，裁剪上下
        drawW = canvasW;
        drawH = canvasW / videoAspect;
        drawX = 0;
        drawY = (canvasH - drawH) / 2;
      }

      // 保存变换矩阵（前置摄像头自动镜像翻转，更符合人类直觉）
      ctx.save();
      ctx.clearRect(0, 0, canvasW, canvasH);

      if (currentFacingMode === 'user') {
        ctx.translate(canvasW, 0);
        ctx.scale(-1, 1);
        // 水平镜像后，绘图坐标需要反向计算
        ctx.drawImage(video, canvasW - (drawX + drawW), drawY, drawW, drawH);
      } else {
        ctx.drawImage(video, drawX, drawY, drawW, drawH);
      }
      ctx.restore();

      // 记录渲染比例，用于把检测框精准叠加在视频对应位置
      renderTransform = { drawX, drawY, drawW, drawH, scale: drawW / videoW };

      // 更新并绘制人像检测框
      updateMockDetections(drawX, drawY, drawW, drawH);
      drawFauvistBoxes();

      countVal.textContent = mockDetections.length;

      requestAnimationFrame(renderFrame);
    }

    // 模拟基于渲染区域的相对位置框
    function updateMockDetections(x, y, w, h) {
      const time = Date.now() * 0.003;
      // 保证框限制在视频真实绘制区域内，不发生形变
      mockDetections = [
        {
          x: x + w * 0.3 + Math.sin(time) * 15,
          y: y + h * 0.2 + Math.cos(time) * 10,
          w: w * 0.4,
          h: h * 0.55,
          label: 'HUMAN // 99%'
        }
      ];
    }

    // 野兽派笔触绘制（检测框）
    function drawFauvistBoxes() {
      mockDetections.forEach((det) => {
        ctx.save();
        
        // 1. 半透明撞色填充
        ctx.fillStyle = 'rgba(255, 0, 85, 0.25)';
        ctx.fillRect(det.x, det.y, det.w, det.h);

        // 2. 粗黑主框
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 6;
        ctx.strokeRect(det.x, det.y, det.w, det.h);

        // 3. 霓虹绿偏移边框（野兽派重叠线条）
        ctx.strokeStyle = '#76FF03';
        ctx.lineWidth = 4;
        ctx.strokeRect(det.x - 5, det.y - 5, det.w + 10, det.h + 10);

        // 4. 标签底快与文字
        ctx.fillStyle = '#00E5FF';
        ctx.fillRect(det.x - 5, det.y - 40, 160, 32);
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.strokeRect(det.x - 5, det.y - 40, 160, 32);

        ctx.fillStyle = '#000';
        ctx.font = '900 15px Impact, Arial Black';
        ctx.fillText(det.label, det.x + 5, det.y - 18);

        ctx.restore();
      });
    }
  </script>
</body>
</html>
